<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080f0b;--card:#111e16;--card2:#162218;
  --border:rgba(74,222,128,.13);--border2:rgba(74,222,128,.28);
  --green:#3ddb7a;--green2:#2ab862;
  --gold:#f5c842;--blue:#60a5fa;--rose:#f87171;--purple:#a78bfa;
  --ink:#e8f2ee;--ink2:#9ab8aa;--ink3:#4a6b5a;
  --t:.2s cubic-bezier(.4,0,.2,1);
  --hh:60px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column}

/* ── HEADER ── */
.lesson-header{
  height:var(--hh);flex-shrink:0;
  background:rgba(8,15,11,.97);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 14px;
}
.btn-back{
  width:34px;height:34px;border-radius:9px;border:1px solid var(--border);
  background:var(--card);color:var(--ink2);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--t);
}
.btn-back:hover{border-color:var(--border2);color:var(--ink)}
.progress-area{flex:1;display:flex;flex-direction:column;gap:4px}
.progress-track{height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.progress-fill{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg,var(--green2),var(--green));
  transition:width .5s cubic-bezier(.4,0,.2,1);width:0%
}
.progress-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--ink3);font-weight:600}
.hud{display:flex;align-items:center;gap:5px;flex-shrink:0}
.hud-pill{
  display:flex;align-items:center;gap:2px;
  background:var(--card);border:1px solid var(--border);
  border-radius:999px;padding:4px 8px;font-size:11px;font-weight:700;
}
.hud-pill.hp{color:var(--rose)}
.hud-pill.en{color:var(--gold)}

/* ── LESSON BODY ── */
.lesson-body{
  flex:1;overflow-y:auto;
  max-width:520px;width:100%;margin:0 auto;
  padding:20px 14px 32px;
}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(74,222,128,.2);border-radius:3px}

/* ── ANIMATIONS ── */
@keyframes exIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
#lesson-root{animation:exIn .3s ease both}

/* ── EXERCISE CARD ── */
.ex-card{
  background:var(--card);border:1px solid var(--border);border-radius:22px;
  padding:22px 18px;display:flex;flex-direction:column;gap:14px;
}

/* ── BADGES ── */
.ex-badge{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:999px;padding:5px 13px;font-size:11px;font-weight:700;
  letter-spacing:.04em;align-self:flex-start;
}
.badge-new{background:rgba(61,219,122,.12);border:1px solid rgba(61,219,122,.25);color:var(--green)}
.badge-img{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);color:var(--blue)}
.badge-mc{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);color:var(--purple)}
.badge-audio{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);color:var(--blue)}
.badge-fill{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);color:var(--gold)}
.badge-wb{background:rgba(61,219,122,.1);border:1px solid rgba(61,219,122,.2);color:var(--green)}
.badge-order{background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.2);color:#fb923c}

/* ── INTRO ── */
.ex-intro{background:linear-gradient(135deg,rgba(61,219,122,.07),var(--card))}
.intro-center{text-align:center;padding:8px 0}
.btn-audio{
  background:rgba(61,219,122,.12);border:1px solid rgba(61,219,122,.2);
  border-radius:999px;padding:6px 16px;color:var(--green);
  font-size:14px;font-weight:700;cursor:pointer;transition:all var(--t);margin-bottom:8px;
}
.btn-audio:hover{background:rgba(61,219,122,.22)}
.intro-zh{font-family:'Noto Sans SC',sans-serif;font-size:60px;font-weight:900;color:var(--ink);line-height:1.1;text-shadow:0 0 40px rgba(61,219,122,.2)}
.intro-py{font-size:20px;color:var(--green);font-weight:600;letter-spacing:.06em;margin:6px 0}
.intro-en{font-size:18px;color:var(--ink2);font-weight:500;margin-bottom:8px}
.intro-type{background:var(--card2);border:1px solid var(--border);border-radius:999px;padding:3px 10px;font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;display:inline-block}
.intro-sep{height:1px;background:var(--border);margin:4px 0}
.intro-ctx-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
.intro-ctx-zh{
  font-family:'Noto Sans SC',sans-serif;font-size:18px;color:var(--ink);
  background:var(--card2);border:1px solid var(--border);border-radius:13px;
  padding:13px 15px;cursor:pointer;line-height:1.7;
}
.intro-ctx-zh:hover{border-color:var(--border2)}
.intro-ctx-py{font-size:11px;color:var(--ink3);padding:0 2px;margin-top:-4px}
.intro-ctx-en{font-size:13px;color:var(--ink2);font-style:italic}
.word-hl{color:var(--green);font-weight:700;background:rgba(61,219,122,.1);border-radius:4px;padding:0 2px}

/* ── IMAGE GRID ── */
.ex-word-display{
  display:flex;align-items:center;gap:10px;cursor:pointer;
  background:var(--card2);border:1px solid var(--border);border-radius:13px;padding:14px 16px;
}
.ex-word-display:hover{border-color:var(--border2)}
.ex-zh{font-family:'Noto Sans SC',sans-serif;font-size:28px;font-weight:700;color:var(--ink)}
.ex-py{font-size:14px;color:var(--green);font-weight:500}
.audio-hint{font-size:16px;opacity:.5;margin-left:auto}
.img-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.img-option{
  aspect-ratio:1;border-radius:16px;border:2px solid var(--border);
  background:var(--card2);cursor:pointer;transition:all var(--t);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  padding:10px;
}
.img-option:hover{border-color:var(--border2);transform:scale(1.02)}
.img-option.img-selected{border-color:var(--blue);background:rgba(96,165,250,.1)}
.img-option.img-correct{border-color:var(--green);background:rgba(61,219,122,.12)}
.img-option.img-wrong{border-color:var(--rose);background:rgba(248,113,113,.1)}
.img-emoji{font-size:44px;line-height:1}
.img-label{font-size:12px;font-weight:600;color:var(--ink2);text-align:center}

/* ── MC OPTIONS ── */
.ex-english-prompt{
  font-family:'Playfair Display',serif;font-size:22px;font-weight:700;
  color:var(--ink);text-align:center;padding:8px 0;
}
.mc-options{display:flex;flex-direction:column;gap:9px}
.mc-opt{
  width:100%;padding:14px 16px;border-radius:13px;
  border:1.5px solid var(--border);background:var(--card2);
  cursor:pointer;transition:all var(--t);text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.mc-opt:hover:not(:disabled){border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.06)}
.mc-opt.mc-selected{border-color:var(--blue);background:rgba(96,165,250,.1);color:var(--blue)}
.mc-opt.mc-correct{border-color:var(--green)!important;background:rgba(61,219,122,.12)!important}
.mc-opt.mc-wrong{border-color:var(--rose)!important;background:rgba(248,113,113,.1)!important}
.mc-opt:disabled{cursor:default}
.mc-py{font-size:11px;color:var(--ink3);font-weight:500}
.mc-zh{font-family:'Noto Sans SC',sans-serif;font-size:20px;font-weight:700;color:var(--ink)}
.mc-en{font-size:15px;font-weight:600;color:var(--ink)}
.mc-opt-zh .mc-zh{font-size:22px}

/* ── TAP WHAT YOU HEAR ── */
.audio-btns-row{display:flex;gap:10px}
.btn-play-big{
  flex:2;padding:16px;border-radius:14px;
  background:rgba(96,165,250,.12);border:1.5px solid rgba(96,165,250,.25);
  color:var(--blue);font-size:15px;font-weight:700;cursor:pointer;transition:all var(--t);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-play-big:hover{background:rgba(96,165,250,.22)}
.btn-play-slow{
  flex:1;padding:16px;border-radius:14px;
  background:rgba(245,200,66,.08);border:1.5px solid rgba(245,200,66,.2);
  color:var(--gold);font-size:13px;font-weight:700;cursor:pointer;transition:all var(--t);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-play-slow:hover{background:rgba(245,200,66,.15)}
.play-icon{font-size:18px}
.hear-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hear-opt{
  padding:14px 10px;border-radius:13px;border:1.5px solid var(--border);
  background:var(--card2);cursor:pointer;transition:all var(--t);
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.hear-opt:hover{border-color:var(--border2)}
.hear-opt.hear-selected{border-color:var(--blue);background:rgba(96,165,250,.1)}
.hear-opt.hear-correct{border-color:var(--green);background:rgba(61,219,122,.12)}
.hear-opt.hear-wrong{border-color:var(--rose);background:rgba(248,113,113,.1)}
.hear-py{font-size:11px;color:var(--ink3);font-weight:500}
.hear-zh{font-family:'Noto Sans SC',sans-serif;font-size:20px;font-weight:700;color:var(--ink)}

/* ── GAP FILL ── */
.gap-sentence{
  font-family:'Noto Sans SC',sans-serif;font-size:20px;color:var(--ink);
  background:var(--card2);border:1px solid var(--border);border-radius:13px;
  padding:14px 16px;cursor:pointer;line-height:1.7;
}
.gap-en{font-size:12px;color:var(--ink3);font-style:italic}

/* ── WORD BANK ── */
.wb-prompt-en{
  font-family:'Playfair Display',serif;font-size:20px;font-weight:700;
  color:var(--ink);text-align:center;line-height:1.4;padding:4px 0;
}
.wb-prompt-zh{
  font-family:'Noto Sans SC',sans-serif;font-size:18px;color:var(--ink);
  background:var(--card2);border:1px solid var(--border);border-radius:13px;
  padding:13px 15px;cursor:pointer;line-height:1.7;
}
.wb-answer{
  min-height:54px;background:rgba(61,219,122,.04);border:1.5px dashed rgba(61,219,122,.22);
  border-radius:13px;padding:10px 12px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;
  transition:background var(--t);
}
.wb-answer-placeholder{font-size:12px;color:var(--ink3);font-style:italic}
.wb-divider{height:1px;background:var(--border)}
.wb-bank{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}
.wb-tile{
  padding:8px 14px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--card2);color:var(--ink);font-size:15px;
  font-family:'Noto Sans SC',sans-serif;cursor:pointer;transition:all var(--t);
}
.wb-tile:hover{border-color:var(--border2);background:rgba(61,219,122,.06)}
.wb-tile.wb-in-answer{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3);color:var(--blue)}

/* ── WORD ORDER ── */
.wo-en{font-size:15px;color:var(--ink2);text-align:center;font-style:italic}
.wo-answer{
  min-height:54px;background:rgba(96,165,250,.04);border:1.5px dashed rgba(96,165,250,.22);
  border-radius:13px;padding:10px 12px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;
}
.wo-placeholder{font-size:12px;color:var(--ink3);font-style:italic}
.wo-bank{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}
.wo-tile{
  padding:8px 14px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--card2);color:var(--ink);
  font-family:'Noto Sans SC',sans-serif;font-size:16px;cursor:pointer;transition:all var(--t);
}
.wo-tile:hover{border-color:var(--border2)}
.wo-tile.wo-in-answer{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.3);color:var(--blue)}

/* ── CHECK BUTTON ── */
.btn-check{
  width:100%;padding:15px;border-radius:13px;border:none;
  background:rgba(255,255,255,.06);color:var(--ink3);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all var(--t);letter-spacing:.02em;
}
.btn-check-ready{
  background:linear-gradient(135deg,var(--green),var(--green2))!important;
  color:#080f0b!important;box-shadow:0 3px 14px rgba(61,219,122,.25)!important;
}
.btn-check-ready:hover{transform:translateY(-1px);box-shadow:0 5px 22px rgba(61,219,122,.35)!important}

/* ── FEEDBACK ── */
.feedback-box{border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.fb-ok{background:rgba(61,219,122,.1);border:1px solid rgba(61,219,122,.25)}
.fb-fail{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.22)}
.fb-top{display:flex;align-items:center;gap:8px}
.fb-icon{font-size:18px;font-weight:800}
.fb-ok .fb-icon,.fb-ok .fb-text{color:var(--green);font-weight:700;font-size:15px}
.fb-fail .fb-icon,.fb-fail .fb-text{color:var(--rose);font-weight:700;font-size:15px}
.fb-explain{
  font-size:12px;color:var(--ink2);line-height:1.6;
  background:rgba(0,0,0,.15);border-radius:10px;padding:10px 12px;
  border-left:3px solid var(--rose);white-space:pre-line;
}
.fb-ok .fb-explain{border-left-color:var(--green)}
.btn-continue{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:#080f0b;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all var(--t);box-shadow:0 3px 12px rgba(61,219,122,.2);
}
.btn-continue:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(61,219,122,.3)}

/* ── GOT IT / PRIMARY BUTTON ── */
.btn-got-it{
  width:100%;padding:15px;border-radius:13px;border:none;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:#080f0b;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all var(--t);box-shadow:0 3px 14px rgba(61,219,122,.25);
}
.btn-got-it:hover{transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#d97706)!important;color:#1a0e00!important}
.btn-rose{background:linear-gradient(135deg,var(--rose),#dc2626)!important;color:#fff!important}
.btn-secondary{
  width:100%;padding:13px;border-radius:12px;border:1px solid var(--border);
  background:transparent;color:var(--ink2);font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;transition:all var(--t);
}
.btn-secondary:hover{border-color:var(--border2);color:var(--ink)}

/* ── SOLVE IT WARNING ── */
.solve-warn{
  background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.3);
  border-radius:10px;padding:9px 13px;font-size:12px;font-weight:600;
  color:var(--gold);text-align:center;
}

/* ── WALL CARDS ── */
.wall-card{text-align:center;gap:16px}
.wall-emoji{font-size:54px}
.wall-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink)}
.wall-sub{font-size:13px;color:var(--ink2);line-height:1.6}

/* ── SESSION DONE ── */
.session-done{text-align:center;gap:16px;padding:28px 18px}
.done-emoji{font-size:56px}
.done-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--ink)}
.done-sub{font-size:13px;color:var(--ink3)}
.done-stats{
  display:flex;gap:0;
  background:var(--card2);border:1px solid var(--border);border-radius:16px;overflow:hidden;
}
.done-stat{flex:1;padding:14px 8px;text-align:center;border-right:1px solid var(--border)}
.done-stat:last-child{border-right:none}
.ds-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.ds-lbl{font-size:10px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.ds-green{color:var(--green)}.ds-gold{color:var(--gold)}.ds-blue{color:var(--blue)}
.done-accuracy{background:var(--card2);border:1px solid var(--border);border-radius:13px;padding:13px}
.acc-bar-wrap{height:8px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;margin-bottom:7px}
.acc-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green2),var(--green));transition:width 1s cubic-bezier(.4,0,.2,1)}
.acc-label{font-size:12px;color:var(--ink2);font-weight:600}

/* ── LOADING / ERROR ── */
.loading-state{text-align:center;padding:60px 20px;color:var(--ink2)}
.loading-spinner{width:36px;height:36px;border:3px solid rgba(74,222,128,.15);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;font-weight:500}
.error-state{text-align:center;padding:60px 20px}
.error-icon{font-size:40px;margin-bottom:12px}
.error-msg{font-size:13px;color:var(--rose);margin-bottom:16px;line-height:1.5}

/* ── INTRO CARD (pre-lesson) ── */
.intro-card{gap:16px}
.intro-card-hdr{display:flex;align-items:center;gap:12px}
.intro-card-badge{
  width:46px;height:46px;border-radius:12px;flex-shrink:0;
  background:rgba(61,219,122,.12);border:1.5px solid rgba(61,219,122,.28);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:var(--green);
}
.intro-card-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--ink)}
.intro-card-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.intro-checkpoint-badge{
  background:rgba(245,200,66,.12);border:1px solid rgba(245,200,66,.3);
  border-radius:999px;padding:5px 14px;font-size:11px;font-weight:700;
  color:var(--gold);align-self:flex-start;
}
.intro-split{
  display:flex;background:var(--card2);border:1px solid var(--border);
  border-radius:13px;overflow:hidden;
}
.intro-split-item{flex:1;padding:14px 8px;text-align:center;border-right:1px solid var(--border)}
.intro-split-item:last-child{border-right:none}
.is-num{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.is-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.is-new .is-num{color:var(--green)}.is-rev .is-num{color:var(--blue)}.is-ex .is-num{color:var(--gold)}
.intro-words-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3)}
.intro-word-list{display:flex;flex-direction:column;gap:7px}
.intro-word-row{
  display:flex;align-items:center;gap:10px;
  background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:10px 13px;
}
.iw-zh{font-family:'Noto Sans SC',sans-serif;font-size:20px;font-weight:700;color:var(--ink);cursor:pointer;min-width:44px;flex-shrink:0}
.iw-zh:hover{color:var(--green)}
.iw-py{font-size:11px;color:var(--green);font-weight:500;flex-shrink:0}
.iw-en{font-size:12px;color:var(--ink2);margin-left:auto;text-align:right}
</style>
</head>
<body>

<header class="lesson-header">
  <button class="btn-back" onclick="history.back()">←</button>
  <div class="progress-area">
    <div class="progress-meta">
      <span id="lesson-label" style="color:var(--green);font-size:10px;font-weight:700">Loading…</span>
      <span id="lesson-progress-label" style="color:var(--ink3)">0 / 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="lesson-progress-fill"></div>
    </div>
  </div>
  <div class="hud">
    <div class="hud-pill hp" id="hud-hearts">❤️❤️❤️❤️❤️</div>
    <div class="hud-pill en" id="hud-energy">⚡25</div>
  </div>
</header>

<main class="lesson-body">
  <div id="lesson-root">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading lesson…</div>
    </div>
  </div>
</main>

<script src="engine.js"></script>

<script>
(async function boot() {
  const p       = new URLSearchParams(location.search);
  const level   = parseInt(p.get('level')  || 1);
  const lessonNum = parseInt(p.get('lesson') || 1);
  const mode    = p.get('replay') === '1' ? 'review' : (p.get('mode') || 'new');
  const lessonId = MaobaiEngine.makeLessonId(level, lessonNum);
  const isCP    = MaobaiEngine.isCheckpointLesson(lessonNum);

  // Header
  const cpTag = isCP ? ' · 🏆 Checkpoint' : '';
  document.getElementById('lesson-label').textContent = `HSK ${level} · Lesson ${lessonNum}${cpTag}`;

  try {
    await MaobaiEngine.init();

    const session = await MaobaiEngine.buildSession({ level, lessonNum, lessonId, mode });

    // Show pre-lesson intro card
    _showIntroCard(session, () => MaobaiUI.startSession(session));

  } catch (err) {
    document.getElementById('lesson-root').innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠️</div>
        <div class="error-msg">${err.message || 'Failed to load. Check connection.'}</div>
        <button class="btn-secondary" onclick="history.back()">← Go Back</button>
      </div>`;
    console.error('[Lesson]', err);
  }

  // HUD live updates
  window.addEventListener('engine:heartUpdate', e => {
    const el = document.getElementById('hud-hearts');
    const h  = e.detail.hearts;
    if (el) el.textContent = '❤️'.repeat(h) + '🖤'.repeat(Math.max(0, 5 - h));
  });
  window.addEventListener('engine:energyUpdate', e => {
    const el = document.getElementById('hud-energy');
    if (el) el.textContent = `⚡${e.detail.energy}`;
  });
  window.addEventListener('engine:xpUpdate', e => _xpToast(e.detail.gained));
  window.addEventListener('engine:sessionComplete', () => {
    setTimeout(() => history.back(), 4500);
  });
})();

function _showIntroCard(session, onStart) {
  const root = document.getElementById('lesson-root');
  const isCP = session.isCheckpoint;

  const wordRows = session.words.slice(0, 6).map(w => `
    <div class="intro-word-row">
      <span class="iw-zh" onclick="MaobaiEngine.speak('${w.zh}')">${w.zh}</span>
      <span class="iw-py">${w.pinyin}</span>
      <span class="iw-en">${w.english}</span>
    </div>`).join('');

  root.innerHTML = `
    <div class="ex-card intro-card">
      ${isCP ? `<div class="intro-checkpoint-badge">🏆 Checkpoint — Lessons ${session.checkpointRange}</div>` : ''}
      <div class="intro-card-hdr">
        <div class="intro-card-badge">HSK&nbsp;${session.level}</div>
        <div>
          <div class="intro-card-title">${isCP ? 'Checkpoint Review' : `Lesson ${session.lessonNum}`}</div>
          <div class="intro-card-sub">${session.totalExercises} exercises · ${session.xpReward} XP</div>
        </div>
      </div>
      <div class="intro-split">
        <div class="intro-split-item is-new">
          <div class="is-num">${isCP ? session.words.length : session.words.length}</div>
          <div class="is-lbl">${isCP ? 'Words' : 'New'}</div>
        </div>
        <div class="intro-split-item is-rev">
          <div class="is-num">${session.reviewWords?.length || 0}</div>
          <div class="is-lbl">Review</div>
        </div>
        <div class="intro-split-item is-ex">
          <div class="is-num">${session.totalExercises}</div>
          <div class="is-lbl">Exercises</div>
        </div>
      </div>
      <div class="intro-words-label">${isCP ? 'Words covered' : "Today's new words"}</div>
      <div class="intro-word-list">${wordRows}</div>
      <button class="btn-got-it" id="btn-start">▶ ${isCP ? 'Start Checkpoint' : 'Start Lesson'}</button>
      <button class="btn-secondary" onclick="history.back()">← Back</button>
    </div>`;

  document.getElementById('btn-start').addEventListener('click', onStart);
}

// XP toast
let _xpTimer;
function _xpToast(amt) {
  let t = document.getElementById('xp-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'xp-toast';
    Object.assign(t.style, {
      position:'fixed',bottom:'24px',right:'16px',zIndex:'999',
      background:'rgba(61,219,122,.15)',border:'1px solid rgba(61,219,122,.3)',
      borderRadius:'999px',padding:'7px 16px',fontFamily:'DM Sans,sans-serif',
      fontSize:'13px',fontWeight:'700',color:'#3ddb7a',
      opacity:'0',transition:'opacity .25s,transform .25s',
      transform:'translateY(6px)',pointerEvents:'none',
    });
    document.body.appendChild(t);
  }
  t.textContent = `+${amt} XP`;
  t.style.opacity = '1'; t.style.transform = 'translateY(0)';
  clearTimeout(_xpTimer);
  _xpTimer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(6px)'; }, 1200);
}
</script>
</body>
</html>
