<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HSK Simulation Exam — Maobai</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080f0b;--bg2:#0c1610;--card:#111e16;--card2:#162218;
  --border:rgba(74,222,128,.13);--border2:rgba(74,222,128,.28);
  --green:#3ddb7a;--green2:#2ab862;
  --gold:#f5c842;--blue:#60a5fa;--rose:#f87171;--purple:#a78bfa;
  --ink:#e8f2ee;--ink2:#9ab8aa;--ink3:#4a6b5a;
  --t:.22s cubic-bezier(.4,0,.2,1);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;display:flex;flex-direction:column}
#app{flex:1;display:flex;flex-direction:column;max-width:520px;margin:0 auto;width:100%;padding:0 0 32px}

/* INTRO SCREEN */
.intro-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px 20px;text-align:center;gap:20px}
.intro-badge{background:linear-gradient(135deg,rgba(245,200,66,.2),rgba(245,200,66,.05));border:2px solid var(--gold);border-radius:20px;padding:28px 32px;width:100%}
.intro-level{font-size:48px;font-weight:900;color:var(--gold);font-family:'Noto Sans SC',sans-serif}
.intro-title{font-size:20px;font-weight:700;color:var(--ink);margin-top:4px}
.intro-sub{font-size:13px;color:var(--ink2);margin-top:6px}
.intro-rules{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;text-align:left;display:flex;flex-direction:column;gap:12px}
.rule{display:flex;align-items:flex-start;gap:12px;font-size:13px;color:var(--ink2)}
.rule-icon{font-size:18px;flex-shrink:0;margin-top:-1px}
.rule strong{color:var(--ink);display:block;margin-bottom:2px}
.sections-preview{display:flex;gap:8px;width:100%}
.section-pill{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.sp-icon{font-size:20px;margin-bottom:4px}
.sp-name{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.sp-pts{font-size:12px;color:var(--ink2);margin-top:2px}
.sp-name.listen{color:var(--blue)}
.sp-name.read{color:var(--green)}
.sp-name.write{color:var(--purple)}
.btn-start{width:100%;padding:18px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--gold),#e6a800);color:#000;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:800;cursor:pointer;letter-spacing:.02em}

/* EXAM HEADER */
.exam-header{position:sticky;top:0;z-index:50;background:var(--bg);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.exam-section-tag{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:999px}
.section-listen .exam-section-tag{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);color:var(--blue)}
.section-read   .exam-section-tag{background:rgba(61,219,122,.1);border:1px solid rgba(61,219,122,.25);color:var(--green)}
.section-write  .exam-section-tag{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);color:var(--purple)}
.timer-wrap{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:700;color:var(--ink)}
.timer-wrap.urgent{color:var(--rose);animation:pulse .6s ease infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.5}}
.exam-progress{width:100%;height:5px;background:var(--card);margin-top:8px}
.exam-progress-fill{height:100%;background:var(--gold);transition:width .4s}

/* QUESTION AREA */
.q-area{flex:1;padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.q-num{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.q-prompt{font-size:16px;font-weight:600;color:var(--ink);line-height:1.6}
.q-zh{font-family:'Noto Sans SC',sans-serif;font-size:32px;font-weight:800;color:var(--green);text-align:center;margin:12px 0;text-shadow:0 0 20px rgba(61,219,122,.2)}
.options{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.opt{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;font-size:15px;font-weight:500;cursor:pointer;text-align:left;color:var(--ink);transition:all var(--t);display:flex;align-items:center;gap:12px}
.opt:hover{border-color:var(--border2);background:var(--card2)}
.opt.selected{border-color:var(--gold);background:rgba(245,200,66,.08)}
.opt.correct{border-color:var(--green);background:rgba(61,219,122,.1);color:var(--green)}
.opt.wrong{border-color:var(--rose);background:rgba(248,113,113,.08);color:var(--rose)}
.opt-letter{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.06);display:grid;place-items:center;font-size:12px;font-weight:700;flex-shrink:0}
.fill-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;font-size:16px;font-family:'Noto Sans SC',sans-serif;color:var(--ink);outline:none;transition:border-color var(--t)}
.fill-input:focus{border-color:var(--gold)}
.btn-next{width:100%;padding:16px;border-radius:14px;border:none;background:var(--gold);color:#000;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;display:none}
.btn-next.show{display:block}
.feedback-bar{padding:14px 16px;border-radius:12px;font-size:14px;font-weight:600;display:none;align-items:center;gap:10px}
.feedback-bar.show{display:flex}
.feedback-bar.correct{background:rgba(61,219,122,.1);border:1px solid rgba(61,219,122,.25);color:var(--green)}
.feedback-bar.wrong{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--rose)}

/* SECTION TRANSITION */
.section-transition{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px 20px;text-align:center;gap:16px}
.st-icon{font-size:56px}
.st-title{font-size:22px;font-weight:800}
.st-sub{font-size:14px;color:var(--ink2);max-width:280px}
.st-score{font-size:18px;font-weight:700;color:var(--gold);margin-top:4px}
.btn-continue{padding:16px 40px;border-radius:14px;border:none;background:var(--gold);color:#000;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px}

/* RESULTS SCREEN */
.results-screen{display:flex;flex-direction:column;align-items:center;padding:32px 20px;gap:20px}
.score-circle{width:160px;height:160px;position:relative;margin:8px auto}
.score-circle svg{transform:rotate(-90deg)}
.score-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-big{font-size:42px;font-weight:900;color:var(--gold)}
.score-denom{font-size:14px;color:var(--ink2);font-weight:600}
.score-grade{font-size:24px;font-weight:800;margin-top:4px}
.result-verdict{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;text-align:center}
.rv-title{font-size:18px;font-weight:800;margin-bottom:6px}
.rv-sub{font-size:13px;color:var(--ink2);line-height:1.6}
.section-breakdown{width:100%;display:flex;flex-direction:column;gap:10px}
.sb-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.sb-label{font-size:13px;font-weight:600;color:var(--ink2)}
.sb-score{font-size:18px;font-weight:800}
.sb-score.listen{color:var(--blue)}
.sb-score.read{color:var(--green)}
.sb-score.write{color:var(--purple)}
.sb-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:999px;margin:0 12px;overflow:hidden}
.sb-bar{height:100%;border-radius:999px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.result-actions{width:100%;display:flex;flex-direction:column;gap:10px}
.btn-primary{width:100%;padding:16px;border-radius:14px;border:none;background:var(--green2);color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer}
.btn-secondary{width:100%;padding:16px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer}
.pass-badge{background:linear-gradient(135deg,rgba(61,219,122,.2),rgba(61,219,122,.05));border:2px solid var(--green);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700;color:var(--green);text-align:center;width:100%}
.fail-badge{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;color:var(--rose);text-align:center;width:100%}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;color:var(--ink2)}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Loading exam...</div>
  </div>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────
const _sb = window.supabase.createClient(
  'https://cuiznbvvlqtwcoocehnd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1aXpuYnZ2bHF0d2Nvb2NlaG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzI0NTUsImV4cCI6MjA4OTI0ODQ1NX0.QXAjvDdvih1ue1W8BaoqBfBr_fUJb9W5FYFZSC_JI8w'
);

// ── STATE ─────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const hskLevel = Number(params.get('level') || 1);
let _uid       = null;
let words      = [];   // all words for this HSK level
let questions  = [];   // flat array of all exam questions
let qIndex     = 0;
let scores     = { listen:0, listenTotal:0, read:0, readTotal:0, write:0, writeTotal:0 };
let sectionPhase = 'listen'; // listen → read → write
let examTimeLeft = 0;
let examTimer    = null;
let answered     = false;

// HSK exam timing (real HSK format in seconds)
const EXAM_TIME = { 1:1500, 2:1800, 3:2100, 4:2400, 5:2700, 6:3000 };
// HSK exam question counts per section (real HSK proportions)
const EXAM_COUNTS = {
  1: { listen:15, read:15, write:5 },
  2: { listen:20, read:20, write:5 },
  3: { listen:20, read:20, write:10},
  4: { listen:25, read:25, write:10},
  5: { listen:25, read:25, write:10},
  6: { listen:25, read:25, write:10},
};
// Points per correct answer (total = 300)
const POINTS_PER = {
  1: { listen:6, read:6, write:6 },
  2: { listen:5, read:5, write:10},
  3: { listen:5, read:5, write:5 },
  4: { listen:4, read:4, write:6 },
  5: { listen:4, read:4, write:6 },
  6: { listen:4, read:4, write:6 },
};

const app = document.getElementById('app');

// ── UTILS ─────────────────────────────────────────────────
function key(k) { return `${k}_${_uid}`; }
function shuffle(arr) { return [...arr].sort(()=>Math.random()-.5); }
function pick(arr, n) { return shuffle(arr).slice(0,n); }

function buildDistractors(word, pool, n=3) {
  const same = pool.filter(w => w.id !== word.id && w.category === word.category);
  const other = pool.filter(w => w.id !== word.id && w.category !== word.category);
  const candidates = [...shuffle(same), ...shuffle(other)];
  return candidates.slice(0, n);
}

// ── QUESTION GENERATORS ───────────────────────────────────

// LISTENING: hear the Chinese → pick meaning
function makeListenMeaning(word, pool) {
  const d = buildDistractors(word, pool, 3);
  const opts = shuffle([word, ...d]);
  return {
    section: 'listen',
    type: 'listen_meaning',
    word,
    prompt: 'What does this word mean?',
    zhShow: word.zh,
    options: opts.map(w => w.en),
    answer: word.en,
    points: POINTS_PER[hskLevel].listen
  };
}

// LISTENING: hear sentence → true or false
function makeListenTF(word, pool) {
  const isTrue = Math.random() > 0.5;
  let displayZh, displayEn;
  if (isTrue) {
    displayZh = word.ex?.zh || word.zh;
    displayEn = word.ex?.en || word.en;
  } else {
    const wrong = pool.find(w => w.id !== word.id && w.en !== word.en);
    displayZh = word.ex?.zh || word.zh;
    displayEn = wrong ? wrong.en : 'incorrect meaning';
  }
  return {
    section: 'listen',
    type: 'listen_tf',
    word,
    prompt: 'Does the English match the Chinese?',
    zhShow: displayZh,
    enShow: displayEn,
    options: ['✓ Correct', '✗ Incorrect'],
    answer: isTrue ? '✓ Correct' : '✗ Incorrect',
    points: POINTS_PER[hskLevel].listen
  };
}

// READING: see Chinese → pick meaning
function makeReadMeaning(word, pool) {
  const d = buildDistractors(word, pool, 3);
  const opts = shuffle([word, ...d]);
  return {
    section: 'read',
    type: 'read_meaning',
    word,
    prompt: 'What is the meaning of this word?',
    zhShow: word.zh,
    options: opts.map(w => w.en),
    answer: word.en,
    points: POINTS_PER[hskLevel].read
  };
}

// READING: see English → pick Chinese character
function makeReadHanzi(word, pool) {
  const d = buildDistractors(word, pool, 3);
  const opts = shuffle([word, ...d]);
  return {
    section: 'read',
    type: 'read_hanzi',
    word,
    prompt: 'Which character means:',
    enShow: word.en,
    options: opts.map(w => w.zh),
    answer: word.zh,
    points: POINTS_PER[hskLevel].read,
    isChinese: true
  };
}

// READING: fill the blank in a sentence
function makeReadFill(word) {
  const sentence = word.ex?.zh;
  if (!sentence || !sentence.includes(word.zh)) {
    return makeReadMeaning(word, words);
  }
  const blank = sentence.replace(word.zh, '＿＿＿');
  return {
    section: 'read',
    type: 'read_fill',
    word,
    prompt: 'Fill in the blank:',
    sentence: blank,
    answer: word.zh,
    points: POINTS_PER[hskLevel].read,
    isInput: true
  };
}

// WRITING: type the pinyin for a character
function makeWritePinyin(word) {
  return {
    section: 'write',
    type: 'write_pinyin',
    word,
    prompt: 'Type the pinyin for this character:',
    zhShow: word.zh,
    answer: word.py.replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i').replace(/[ōóǒò]/g,'o').replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜü]/g,'u').toLowerCase().trim(),
    answerDisplay: word.py,
    points: POINTS_PER[hskLevel].write,
    isInput: true,
    isPinyin: true
  };
}

// WRITING: arrange words into correct order
function makeWriteOrder(word) {
  if (!word.ex?.zh) return makeWritePinyin(word);
  const parts = word.ex.zh.split('').filter(c => c.trim());
  if (parts.length < 3 || parts.length > 8) return makeWritePinyin(word);
  // Use word-level shuffling for short sentences
  const wordsInSentence = word.ex.zh.match(/[\u4e00-\u9fff]+|[a-zA-Z]+|[，。！？、：；""''（）]/g) || [];
  if (wordsInSentence.length < 3) return makeWritePinyin(word);
  return {
    section: 'write',
    type: 'write_order',
    word,
    prompt: 'Put the words in order:',
    pieces: shuffle(wordsInSentence),
    answer: wordsInSentence.join(''),
    translation: word.ex.en,
    points: POINTS_PER[hskLevel].write,
    isOrder: true
  };
}

// ── BUILD FULL EXAM ───────────────────────────────────────
function buildExam() {
  const counts = EXAM_COUNTS[hskLevel] || EXAM_COUNTS[1];
  const pool = words;
  const q = [];

  // LISTENING questions
  const listenWords = shuffle(pool);
  let li = 0;
  for (let i = 0; i < counts.listen; i++) {
    const w = listenWords[li % listenWords.length]; li++;
    q.push(i % 3 === 0 ? makeListenTF(w, pool) : makeListenMeaning(w, pool));
  }

  // READING questions
  const readWords = shuffle(pool);
  let ri = 0;
  for (let i = 0; i < counts.read; i++) {
    const w = readWords[ri % readWords.length]; ri++;
    if (i % 3 === 0) q.push(makeReadFill(w));
    else if (i % 2 === 0) q.push(makeReadHanzi(w, pool));
    else q.push(makeReadMeaning(w, pool));
  }

  // WRITING questions
  const writeWords = shuffle(pool);
  let wi = 0;
  for (let i = 0; i < counts.write; i++) {
    const w = writeWords[wi % writeWords.length]; wi++;
    q.push(i % 2 === 0 ? makeWriteOrder(w) : makeWritePinyin(w));
  }

  return q;
}

// ── TIMER ─────────────────────────────────────────────────
function startTimer() {
  examTimeLeft = EXAM_TIME[hskLevel] || 1500;
  examTimer = setInterval(() => {
    examTimeLeft--;
    renderTimerDisplay();
    if (examTimeLeft <= 0) {
      clearInterval(examTimer);
      showResults();
    }
  }, 1000);
}

function renderTimerDisplay() {
  const el = document.getElementById('timer-display');
  if (!el) return;
  const m = Math.floor(examTimeLeft / 60);
  const s = examTimeLeft % 60;
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const wrap = el.closest('.timer-wrap');
  if (wrap) wrap.classList.toggle('urgent', examTimeLeft < 120);
}

// ── RENDER ────────────────────────────────────────────────
function getSectionLabel(s) {
  return s === 'listen' ? '🎧 Listening' : s === 'read' ? '📖 Reading' : '✍️ Writing';
}

function renderIntro() {
  const counts = EXAM_COUNTS[hskLevel] || EXAM_COUNTS[1];
  const totalQ = counts.listen + counts.read + counts.write;
  const mins = Math.round((EXAM_TIME[hskLevel] || 1500) / 60);
  app.innerHTML = `
    <div class="intro-screen">
      <div class="intro-badge">
        <div class="intro-level">HSK ${hskLevel}</div>
        <div class="intro-title">Simulation Exam</div>
        <div class="intro-sub">${totalQ} questions · ${mins} minutes · Scored out of 300</div>
      </div>
      <div class="sections-preview">
        <div class="section-pill"><div class="sp-icon">🎧</div><div class="sp-name listen">Listening</div><div class="sp-pts">${counts.listen}Q · 100pts</div></div>
        <div class="section-pill"><div class="sp-icon">📖</div><div class="sp-name read">Reading</div><div class="sp-pts">${counts.read}Q · 100pts</div></div>
        <div class="section-pill"><div class="sp-icon">✍️</div><div class="sp-name write">Writing</div><div class="sp-pts">${counts.write}Q · 100pts</div></div>
      </div>
      <div class="intro-rules">
        <div class="rule"><div class="rule-icon">⏱️</div><div><strong>Timed exam</strong>Real HSK format — ${mins} minutes total</div></div>
        <div class="rule"><div class="rule-icon">🎯</div><div><strong>Pass score: 180/300</strong>Each section scored separately out of 100</div></div>
        <div class="rule"><div class="rule-icon">🧠</div><div><strong>Spaced repetition</strong>Wrong answers will appear more in future lessons</div></div>
        <div class="rule"><div class="rule-icon">💡</div><div><strong>No hearts</strong>This is a real exam — no penalties for wrong answers</div></div>
      </div>
      <button class="btn-start" onclick="startExam()">Start HSK ${hskLevel} Exam →</button>
      <button style="background:none;border:none;color:var(--ink2);font-size:14px;cursor:pointer;padding:8px" onclick="goBack()">← Not ready yet</button>
    </div>`;
}

function renderQuestion() {
  if (qIndex >= questions.length) { showResults(); return; }

  // Section transitions
  const q = questions[qIndex];
  const prevQ = qIndex > 0 ? questions[qIndex - 1] : null;
  if (prevQ && prevQ.section !== q.section) {
    renderSectionTransition(q.section);
    return;
  }

  answered = false;
  const total = questions.length;
  const pct = Math.round((qIndex / total) * 100);

  // Determine section class
  const sClass = `section-${q.section}`;

  let qHtml = '';
  const letters = ['A','B','C','D'];

  if (q.isInput || q.isPinyin) {
    qHtml = `
      <div class="q-num">Question ${qIndex+1} of ${total} · ${q.points} pts</div>
      <div class="q-prompt">${q.prompt}</div>
      ${q.zhShow ? `<div class="q-zh">${q.zhShow}</div>` : ''}
      ${q.sentence ? `<div class="q-zh" style="font-size:20px;line-height:1.6">${q.sentence}</div>` : ''}
      ${q.enShow ? `<div style="font-size:18px;font-weight:600;color:var(--ink2);text-align:center;margin:8px 0">${q.enShow}</div>` : ''}
      <input class="fill-input" id="fill-input" placeholder="${q.isPinyin ? 'Type pinyin (no tones needed)...' : 'Type your answer...'}" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <div class="feedback-bar" id="feedback"></div>
      <button class="btn-next show" id="btn-next" onclick="submitInput()">Submit →</button>`;
  } else if (q.isOrder) {
    const pieces = q.pieces || [];
    qHtml = `
      <div class="q-num">Question ${qIndex+1} of ${total} · ${q.points} pts</div>
      <div class="q-prompt">${q.prompt}</div>
      <div style="font-size:13px;color:var(--ink2);margin-bottom:4px">Arrange: "${q.translation}"</div>
      <div id="order-target" style="min-height:48px;background:var(--card);border:1.5px dashed var(--border2);border-radius:12px;padding:10px 14px;font-family:'Noto Sans SC',sans-serif;font-size:18px;color:var(--green);margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center"></div>
      <div id="order-pieces" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        ${pieces.map((p,i)=>`<button onclick="pickPiece(this,'${p.replace(/'/g,"\\'")}',${i})" style="background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-family:'Noto Sans SC',sans-serif;font-size:16px;color:var(--ink);cursor:pointer" id="piece-${i}">${p}</button>`).join('')}
      </div>
      <div id="order-clear" style="color:var(--ink2);font-size:12px;cursor:pointer;text-decoration:underline" onclick="clearOrder()">Clear</div>
      <div class="feedback-bar" id="feedback"></div>
      <button class="btn-next" id="btn-next" onclick="submitOrder()">Submit →</button>`;
  } else {
    qHtml = `
      <div class="q-num">Question ${qIndex+1} of ${total} · ${q.points} pts</div>
      <div class="q-prompt">${q.prompt}</div>
      ${q.zhShow ? `<div class="q-zh">${q.zhShow}</div>` : ''}
      ${q.enShow ? `<div style="font-size:20px;font-weight:700;color:var(--ink);text-align:center;margin:8px 0">${q.enShow}</div>` : ''}
      ${q.sentence ? `<div class="q-zh" style="font-size:20px;line-height:1.6">${q.sentence}</div>` : ''}
      <div class="options" id="options">
        ${(q.options||[]).map((opt,i)=>`
          <button class="opt" id="opt-${i}" onclick="selectOption(${i})">
            <span class="opt-letter">${letters[i]||i+1}</span>
            <span style="${q.isChinese?'font-family:\'Noto Sans SC\',sans-serif;font-size:20px':''}">${opt}</span>
          </button>`).join('')}
      </div>
      <div class="feedback-bar" id="feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next →</button>`;
  }

  app.innerHTML = `
    <div class="${sClass}">
      <div class="exam-header">
        <span class="exam-section-tag">${getSectionLabel(q.section)}</span>
        <div class="timer-wrap" id="timer-wrap">⏱ <span id="timer-display">--:--</span></div>
      </div>
      <div class="exam-progress"><div class="exam-progress-fill" style="width:${pct}%"></div></div>
      <div class="q-area">${qHtml}</div>
    </div>`;

  renderTimerDisplay();

  // Order state
  if (q.isOrder) window._orderBuilt = [];

  // Auto-focus input
  const inp = document.getElementById('fill-input');
  if (inp) {
    inp.focus();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitInput(); });
  }
}

// ── ORDER QUESTION LOGIC ──────────────────────────────────
function pickPiece(btn, text, idx) {
  if (!window._orderBuilt) window._orderBuilt = [];
  window._orderBuilt.push(text);
  btn.style.opacity = '0.3';
  btn.disabled = true;
  const target = document.getElementById('order-target');
  if (target) {
    const span = document.createElement('span');
    span.textContent = text;
    span.style.cssText = 'background:rgba(61,219,122,.1);border:1px solid rgba(61,219,122,.25);border-radius:6px;padding:4px 8px;cursor:pointer;font-family:\'Noto Sans SC\',sans-serif';
    span.onclick = () => {
      // Remove last piece
      window._orderBuilt = window._orderBuilt.filter((_,i)=>i!==window._orderBuilt.lastIndexOf(text));
      const orig = document.getElementById(`piece-${idx}`);
      if (orig) { orig.style.opacity='1'; orig.disabled=false; }
      span.remove();
    };
    target.appendChild(span);
  }
  document.getElementById('btn-next')?.classList.add('show');
}

function clearOrder() {
  window._orderBuilt = [];
  const target = document.getElementById('order-target');
  if (target) target.innerHTML = '';
  document.querySelectorAll('[id^="piece-"]').forEach(b => { b.style.opacity='1'; b.disabled=false; });
  document.getElementById('btn-next')?.classList.remove('show');
}

function submitOrder() {
  const q = questions[qIndex];
  const built = (window._orderBuilt || []).join('');
  const correct = built === q.answer;
  recordAnswer(q, correct, built);
  showFeedback(correct, q.answerDisplay || q.answer);
}

// ── MCQ SELECTION ─────────────────────────────────────────
let _selectedOpt = null;
function selectOption(i) {
  if (answered) return;
  _selectedOpt = i;
  document.querySelectorAll('.opt').forEach((o,j) => {
    o.classList.toggle('selected', j === i);
  });
  document.getElementById('btn-next')?.classList.add('show');
  // Auto-submit after brief delay for snappiness
  setTimeout(() => { if (!answered) confirmOption(); }, 300);
}

function confirmOption() {
  if (answered) return;
  const q = questions[qIndex];
  const chosen = (q.options || [])[_selectedOpt];
  const correct = chosen === q.answer;
  recordAnswer(q, correct, chosen);
  // Highlight
  document.querySelectorAll('.opt').forEach((o, j) => {
    const val = (q.options || [])[j];
    if (val === q.answer) o.classList.add('correct');
    else if (j === _selectedOpt && !correct) o.classList.add('wrong');
  });
  showFeedback(correct, q.answer);
}

function submitInput() {
  if (answered) return;
  const q = questions[qIndex];
  const inp = document.getElementById('fill-input');
  if (!inp) return;
  const userVal = inp.value.trim().toLowerCase().replace(/\s+/g,'');
  const correctVal = (q.answer || '').toLowerCase().replace(/\s+/g,'');
  const correct = userVal === correctVal;
  recordAnswer(q, correct, inp.value.trim());
  inp.style.borderColor = correct ? 'var(--green)' : 'var(--rose)';
  inp.disabled = true;
  showFeedback(correct, q.answerDisplay || q.answer);
}

function showFeedback(correct, answer) {
  answered = true;
  const fb = document.getElementById('feedback');
  if (fb) {
    fb.className = `feedback-bar show ${correct ? 'correct' : 'wrong'}`;
    fb.innerHTML = correct
      ? `✓ Correct!`
      : `✗ Correct answer: <strong style="font-family:'Noto Sans SC',sans-serif;margin-left:6px">${answer}</strong>`;
  }
  const nb = document.getElementById('btn-next');
  if (nb) { nb.classList.add('show'); nb.textContent = 'Next →'; nb.onclick = nextQuestion; }
}

function recordAnswer(q, correct, chosen) {
  // Update scores
  const section = q.section;
  scores[section + 'Total'] = (scores[section + 'Total'] || 0) + q.points;
  if (correct) scores[section] = (scores[section] || 0) + q.points;
  // SRS: wrong answers in exam get priority in future lessons
  if (!correct && q.word?.id) {
    try {
      const sb = window._sb;
      sb.auth.getSession().then(({data}) => {
        const user = data?.session?.user;
        if (!user) return;
        sb.from('word_progress').select('*').eq('user_id',user.id).eq('word_id',q.word.id).single()
          .then(({data:ex}) => {
            const now = new Date();
            const next = new Date(now.getTime() + 86400000); // review tomorrow
            if (!ex) {
              sb.from('word_progress').insert({user_id:user.id,word_id:q.word.id,level:1,streak:0,correct_count:0,wrong_count:1,last_seen:now,next_review:next});
            } else {
              sb.from('word_progress').update({wrong_count:(ex.wrong_count||0)+1,level:Math.max(1,(ex.level||1)-1),streak:0,last_seen:now,next_review:next}).eq('id',ex.id);
            }
          });
      });
    } catch(e) { console.warn('exam SRS error:', e); }
  }
}

function nextQuestion() {
  qIndex++;
  renderQuestion();
}

// ── SECTION TRANSITIONS ───────────────────────────────────
function renderSectionTransition(nextSection) {
  const prevSection = nextSection === 'read' ? 'listen' : 'read';
  const sectionScore = Math.round(scores[prevSection] || 0);
  const sectionTotal = Math.round(scores[prevSection + 'Total'] || 100);
  const pct = sectionTotal > 0 ? Math.round((sectionScore/sectionTotal)*100) : 0;

  const icons = {listen:'🎧', read:'📖', write:'✍️'};
  const names = {listen:'Listening', read:'Reading', write:'Writing'};

  clearInterval(examTimer);

  app.innerHTML = `
    <div class="section-transition">
      <div class="st-icon">${icons[prevSection]}</div>
      <div class="st-title">${names[prevSection]} Complete</div>
      <div class="st-score">Score: ~${pct}%</div>
      <div class="st-sub">Take a breath. Next up: ${icons[nextSection]} ${names[nextSection]}</div>
      <button class="btn-continue" onclick="continueExam()">Continue → ${names[nextSection]}</button>
    </div>`;
}

function continueExam() {
  startTimer();
  renderQuestion();
}

// ── RESULTS ───────────────────────────────────────────────
function computeFinalScore() {
  const lScore = Math.min(100, Math.round(scores.listen || 0));
  const rScore = Math.min(100, Math.round(scores.read   || 0));
  const wScore = Math.min(100, Math.round(scores.write  || 0));
  return { lScore, rScore, wScore, total: lScore + rScore + wScore };
}

function showResults() {
  clearInterval(examTimer);
  const {lScore, rScore, wScore, total} = computeFinalScore();
  const passed = total >= 180 && lScore >= 60 && rScore >= 60 && wScore >= 60;
  const pct = Math.round((total/300)*100);
  const circ = 2 * Math.PI * 70;
  const offset = circ * (1 - pct/100);

  let grade = '', gradeColor = '';
  if (total >= 270) { grade = 'Outstanding 🌟'; gradeColor = '#f5c842'; }
  else if (total >= 240) { grade = 'Excellent ⭐'; gradeColor = '#3ddb7a'; }
  else if (total >= 210) { grade = 'Good 👍'; gradeColor = '#60a5fa'; }
  else if (total >= 180) { grade = 'Pass ✓'; gradeColor = '#9ab8aa'; }
  else { grade = 'Keep Studying 💪'; gradeColor = '#f87171'; }

  let verdict = '', verdictSub = '';
  if (total >= 270) {
    verdict = 'Exceptional Performance!';
    verdictSub = `You scored ${total}/300. You are fully ready for the real HSK ${hskLevel} exam. Your accuracy puts you in the top tier of test-takers. Proceed to HSK ${Math.min(hskLevel+1,6)}!`;
  } else if (total >= 240) {
    verdict = 'Excellent — Ready for the Real Exam!';
    verdictSub = `You scored ${total}/300. You have a strong command of HSK ${hskLevel} material. A little more review of weaker areas and you'll pass with confidence.`;
  } else if (total >= 210) {
    verdict = 'Good — Almost Ready!';
    verdictSub = `You scored ${total}/300. You understand most of HSK ${hskLevel} but some gaps remain. The SRS system will prioritize your weak words in upcoming lessons.`;
  } else if (total >= 180) {
    verdict = 'Pass — But More Practice Needed';
    verdictSub = `You passed with ${total}/300 but some sections need strengthening. Continue lessons to deepen your memory before the real exam.`;
  } else {
    verdict = 'Not Ready Yet — Keep Going!';
    verdictSub = `You scored ${total}/300. Don't worry — this is exactly what the simulation is for. Your weak words will now appear more often in lessons. You'll get there!`;
  }

  // Clear the exam pending flag
  if (_uid) localStorage.removeItem(`hsk_exam_pending_${_uid}`);

  // Save exam result to supabase
  saveExamResult(total, lScore, rScore, wScore, passed);

  app.innerHTML = `
    <div class="results-screen">
      <div style="font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)">HSK ${hskLevel} Simulation Results</div>

      <div class="score-circle">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <circle cx="80" cy="80" r="70" stroke="rgba(255,255,255,.06)" stroke-width="12" fill="none"/>
          <circle cx="80" cy="80" r="70" stroke="${gradeColor}" stroke-width="12" fill="none"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
            stroke-linecap="round"/>
        </svg>
        <div class="score-num">
          <div class="score-big">${total}</div>
          <div class="score-denom">/300</div>
        </div>
      </div>

      <div class="score-grade" style="color:${gradeColor}">${grade}</div>

      ${passed
        ? `<div class="pass-badge">🎉 PASS — All sections met minimum score (60/100)</div>`
        : `<div class="fail-badge">HSK requires 180/300 total + 60/100 per section to pass</div>`}

      <div class="result-verdict">
        <div class="rv-title">${verdict}</div>
        <div class="rv-sub">${verdictSub}</div>
      </div>

      <div class="section-breakdown">
        <div class="sb-row">
          <div class="sb-label">🎧 Listening</div>
          <div class="sb-bar-wrap"><div class="sb-bar" style="width:${lScore}%;background:var(--blue)"></div></div>
          <div class="sb-score listen">${lScore}/100</div>
        </div>
        <div class="sb-row">
          <div class="sb-label">📖 Reading</div>
          <div class="sb-bar-wrap"><div class="sb-bar" style="width:${rScore}%;background:var(--green)"></div></div>
          <div class="sb-score read">${rScore}/100</div>
        </div>
        <div class="sb-row">
          <div class="sb-label">✍️ Writing</div>
          <div class="sb-bar-wrap"><div class="sb-bar" style="width:${wScore}%;background:var(--purple)"></div></div>
          <div class="sb-score write">${wScore}/100</div>
        </div>
      </div>

      <div class="result-actions">
        ${!passed ? `<button class="btn-primary" onclick="retakeExam()">🔄 Retake Exam</button>` : ''}
        <button class="${passed?'btn-primary':'btn-secondary'}" onclick="window.location.href='/app/dashboard.html'">
          ${passed ? '→ Continue to HSK '+(hskLevel<6?hskLevel+1:hskLevel) : '← Back to Lessons'}
        </button>
      </div>
    </div>`;
}

async function saveExamResult(total, listen, read, write, passed) {
  try {
    const { data } = await _sb.auth.getSession();
    const user = data?.session?.user;
    if (!user) return;
    await _sb.from('exam_results').upsert({
      user_id: user.id,
      hsk_level: hskLevel,
      total_score: total,
      listen_score: listen,
      read_score: read,
      write_score: write,
      passed,
      taken_at: new Date().toISOString()
    }, { onConflict: 'user_id,hsk_level' }).select();
  } catch(e) { console.warn('saveExamResult:', e); }
}

function retakeExam() {
  qIndex = 0;
  scores = { listen:0, listenTotal:0, read:0, readTotal:0, write:0, writeTotal:0 };
  questions = buildExam();
  startTimer();
  renderQuestion();
}

function startExam() {
  questions = buildExam();
  qIndex = 0;
  startTimer();
  renderQuestion();
}

function goBack() {
  window.location.href = '/app/dashboard.html';
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
  try {
    const { data } = await _sb.auth.getSession();
    const user = data?.session?.user;
    if (!user) { window.location.replace('/app/login.html'); return; }
    _uid = user.id;

    // Load words for this HSK level
    const { data: wordsData, error } = await _sb
      .from('words')
      .select('*')
      .eq('hsk_level', hskLevel);

    if (error || !wordsData || wordsData.length === 0) {
      app.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--rose)">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div style="font-size:16px;font-weight:600">No words found for HSK ${hskLevel}</div>
        <div style="font-size:13px;color:var(--ink2);margin-top:8px">Please complete the database setup first</div>
        <button onclick="goBack()" style="margin-top:20px;padding:14px 28px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--ink);font-size:14px;cursor:pointer">← Back</button>
      </div>`;
      return;
    }

    words = wordsData.map(w => ({
      id: w.id,
      zh: w.zh,
      py: w.pinyin,
      en: w.english,
      category: w.category || 'general',
      word_type: w.word_type,
      ex: { zh: w.example_zh, py: w.example_pinyin, en: w.example_en }
    }));

    renderIntro();
  } catch(e) {
    app.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--rose);font-size:14px">
      Error: ${e.message}<br><br>
      <a href="/app/dashboard.html" style="color:var(--green)">← Back</a>
    </div>`;
  }
}

init();
</script>
</body>
</html>
