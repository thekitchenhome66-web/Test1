<style>
:root{
  --bg:#0f1923;--bg2:#0d1720;--card:#162235;--card2:#1a2a3d;
  --border:#1f3349;--border2:#243d57;
  --green:#4ade80;--green-dark:#22c55e;--green-muted:rgba(74,222,128,.10);--green-glow:rgba(74,222,128,.28);
  --text:#e8f4ef;--text-mid:#8fb3c4;--text-muted:#5a7a8a;
  --gold:#fbbf24;--gold-soft:rgba(251,191,36,.12);
  --blue:#60a5fa;--blue-soft:rgba(96,165,250,.10);
  --rose:#f87171;--rose-soft:rgba(248,113,113,.10);
  --purple:#a78bfa;--purple-soft:rgba(167,139,250,.10);
  --radius:20px;--radius-sm:12px;--t:.2s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:60px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:60;height:64px;background:rgba(15,25,35,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px}
.btn-back{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:6px 14px 6px 10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text-mid);cursor:pointer;text-decoration:none;transition:background var(--t),border-color var(--t),color var(--t)}
.btn-back:hover{background:var(--card2);border-color:var(--border2);color:var(--text)}
.btn-back svg{width:14px;height:14px}
.header-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.3px}
.header-spacer{width:80px}

/* ── PAGE ── */
.page{max-width:520px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;gap:20px}

/* ── AVATAR CARD ── */
.avatar-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;display:flex;align-items:center;gap:18px;position:relative;overflow:hidden;animation:fadeUp .35s ease both}
.avatar-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 0% 50%,rgba(74,222,128,.07) 0%,transparent 65%);pointer-events:none}
.avatar-circle{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,rgba(74,222,128,.25),rgba(74,222,128,.08));border:2.5px solid rgba(74,222,128,.4);display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:var(--green);flex-shrink:0;position:relative;cursor:pointer;transition:border-color var(--t),box-shadow var(--t)}
.avatar-circle:hover{border-color:rgba(74,222,128,.7);box-shadow:0 0 20px rgba(74,222,128,.2)}
.avatar-edit-badge{position:absolute;bottom:2px;right:2px;width:20px;height:20px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid var(--card)}
.avatar-info{flex:1;min-width:0}
.avatar-name{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:var(--text);letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.avatar-email{font-size:12px;color:var(--text-muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.avatar-level{display:inline-flex;align-items:center;gap:5px;background:var(--green-muted);border:1px solid rgba(74,222,128,.2);border-radius:999px;padding:3px 10px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;color:var(--green);margin-top:8px;letter-spacing:.05em}
.btn-edit-name{display:flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border2);border-radius:999px;padding:6px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--text-mid);cursor:pointer;transition:all var(--t);white-space:nowrap;flex-shrink:0}
.btn-edit-name:hover{border-color:var(--green);color:var(--green)}

/* ── SECTION LABEL ── */
.section-label{font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;padding:0 2px;animation:fadeUp .4s ease both}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;animation:fadeUp .4s ease .05s both}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 14px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden;transition:border-color var(--t)}
.stat-card:hover{border-color:var(--border2)}
.stat-card::before{content:'';position:absolute;inset:0;pointer-events:none}
.stat-card.xp-card::before{background:linear-gradient(135deg,rgba(74,222,128,.08),transparent)}
.stat-card.streak-card::before{background:linear-gradient(135deg,rgba(251,191,36,.08),transparent)}
.stat-card.rank-card::before{background:linear-gradient(135deg,rgba(96,165,250,.08),transparent)}
.stat-card.lessons-card::before{background:linear-gradient(135deg,rgba(167,139,250,.08),transparent)}
.stat-card.hearts-card::before{background:linear-gradient(135deg,rgba(248,113,113,.08),transparent)}
.stat-card.accuracy-card::before{background:linear-gradient(135deg,rgba(34,197,94,.08),transparent)}
.stat-icon{font-size:20px;line-height:1}
.stat-val{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:var(--text);letter-spacing:-.5px;line-height:1}
.stat-card.xp-card .stat-val{color:var(--green)}
.stat-card.streak-card .stat-val{color:var(--gold)}
.stat-card.rank-card .stat-val{color:var(--blue)}
.stat-card.lessons-card .stat-val{color:var(--purple)}
.stat-card.hearts-card .stat-val{color:var(--rose)}
.stat-label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.03em}

/* ── LEVEL PROGRESS ── */
.level-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 16px;animation:fadeUp .4s ease .08s both}
.level-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.level-card-title{font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--text)}
.level-card-pct{font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;color:var(--green)}
.level-bars{display:flex;flex-direction:column;gap:8px}
.level-bar-row{display:flex;align-items:center;gap:10px}
.level-bar-name{font-size:11px;font-weight:700;color:var(--text-muted);width:44px;flex-shrink:0;font-family:'Nunito',sans-serif}
.level-bar-track{flex:1;height:7px;background:var(--border);border-radius:999px;overflow:hidden}
.level-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green-dark),var(--green));transition:width .8s cubic-bezier(.4,0,.2,1)}
.level-bar-num{font-size:11px;font-weight:800;color:var(--text-mid);width:24px;text-align:right;font-family:'Nunito',sans-serif;flex-shrink:0}

/* ── BADGES ── */
.badges-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;animation:fadeUp .4s ease .1s both}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.badge-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;position:relative;transition:transform var(--t)}
.badge-icon:hover{transform:scale(1.06)}
.badge-icon.earned{background:var(--card2);border:1.5px solid var(--border2)}
.badge-icon.locked{background:var(--bg2);border:1.5px dashed var(--border);opacity:.45;filter:grayscale(1)}
.badge-lock{position:absolute;bottom:3px;right:3px;font-size:10px;line-height:1}
.badge-name{font-size:10px;font-weight:700;color:var(--text-muted);text-align:center;line-height:1.3;font-family:'Nunito',sans-serif}
.badge-name.earned{color:var(--text-mid)}

/* ── HISTORY ── */
.history-list{display:flex;flex-direction:column;gap:8px;animation:fadeUp .4s ease .12s both}
.history-row{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:12px;transition:border-color var(--t)}
.history-row:hover{border-color:var(--border2)}
.history-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.history-icon.lesson{background:var(--green-muted);border:1px solid rgba(74,222,128,.2)}
.history-icon.streak{background:var(--gold-soft);border:1px solid rgba(251,191,36,.2)}
.history-icon.rank{background:var(--blue-soft);border:1px solid rgba(96,165,250,.2)}
.history-info{flex:1;min-width:0}
.history-title{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-time{font-size:11px;color:var(--text-muted);margin-top:1px}
.history-xp{font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;color:var(--green);flex-shrink:0}

/* ── SETTINGS ── */
.settings-list{display:flex;flex-direction:column;gap:2px;animation:fadeUp .4s ease .14s both}
.setting-row{background:var(--card);border:1px solid transparent;border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:background var(--t),border-color var(--t)}
.setting-row:hover{background:var(--card2);border-color:var(--border)}
.setting-row:first-child{border-radius:var(--radius-sm) var(--radius-sm) 4px 4px}
.setting-row:last-child{border-radius:4px 4px var(--radius-sm) var(--radius-sm)}
.setting-row + .setting-row{margin-top:2px}
.setting-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.setting-icon.green{background:var(--green-muted);border:1px solid rgba(74,222,128,.2)}
.setting-icon.blue{background:var(--blue-soft);border:1px solid rgba(96,165,250,.2)}
.setting-icon.gold{background:var(--gold-soft);border:1px solid rgba(251,191,36,.2)}
.setting-icon.rose{background:var(--rose-soft);border:1px solid rgba(248,113,113,.2)}
.setting-icon.purple{background:var(--purple-soft);border:1px solid rgba(167,139,250,.2)}
.setting-label{flex:1;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--text)}
.setting-label small{display:block;font-size:11px;font-weight:600;color:var(--text-muted);margin-top:1px}
.setting-arrow{color:var(--text-muted);font-size:16px}
.setting-row.danger .setting-label{color:var(--rose)}
.setting-row.danger:hover{border-color:rgba(248,113,113,.25);background:var(--rose-soft)}

/* ── EDIT NAME MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--t)}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:520px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:999px;margin:0 auto 20px}
.modal-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:var(--text);margin-bottom:16px;letter-spacing:-.3px}
.modal-input{width:100%;background:var(--bg2);border:1.5px solid var(--border2);border-radius:14px;padding:14px 16px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:var(--text);outline:none;transition:border-color var(--t);caret-color:var(--green)}
.modal-input:focus{border-color:rgba(74,222,128,.5)}
.modal-input::placeholder{color:var(--text-muted)}
.modal-hint{font-size:11px;color:var(--text-muted);margin-top:6px;font-weight:600}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-modal-cancel{flex:1;background:var(--bg2);border:1.5px solid var(--border2);border-radius:14px;padding:14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--text-mid);cursor:pointer;transition:all var(--t)}
.btn-modal-cancel:hover{border-color:var(--border2);color:var(--text)}
.btn-modal-save{flex:2;background:var(--green);border:none;border-radius:14px;padding:14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:#0f1923;cursor:pointer;transition:all var(--t);box-shadow:0 4px 16px var(--green-glow)}
.btn-modal-save:hover{box-shadow:0 6px 22px rgba(74,222,128,.38);transform:translateY(-1px)}
.btn-modal-save:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border2);border-radius:999px;padding:10px 20px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--text);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SIGN OUT CONFIRM ── */
.signout-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity var(--t)}
.signout-overlay.show{opacity:1;pointer-events:all}
.signout-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;max-width:320px;width:100%;text-align:center;transform:scale(.95);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.signout-overlay.show .signout-card{transform:scale(1)}
.signout-icon{font-size:42px;margin-bottom:12px}
.signout-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:var(--text);margin-bottom:8px}
.signout-desc{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:20px}
.signout-btns{display:flex;gap:10px}
.btn-cancel-so{flex:1;background:var(--bg2);border:1.5px solid var(--border2);border-radius:12px;padding:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--text-mid);cursor:pointer;transition:all var(--t)}
.btn-cancel-so:hover{color:var(--text);border-color:var(--border2)}
.btn-confirm-so{flex:1;background:var(--rose);border:none;border-radius:12px;padding:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:#fff;cursor:pointer;transition:all var(--t)}
.btn-confirm-so:hover{opacity:.85;transform:translateY(-1px)}

/* ── LOADING ── */
.loading-screen{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--green);animation:spin .8s linear infinite}
.loading-text{font-size:13px;color:var(--text-muted);font-family:'Nunito',sans-serif;font-weight:700}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  /* ── BOTTOM NAV ── */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:68px;background:rgba(13,23,32,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 6px;z-index:100}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;padding:8px 4px;cursor:pointer;text-decoration:none;border-radius:12px;transition:background .2s;-webkit-tap-highlight-color:transparent;position:relative}
  .nav-item:hover{background:rgba(255,255,255,.04)}
  .nav-icon{font-size:21px;line-height:1;transition:transform .16s}
  .nav-item:hover .nav-icon{transform:translateY(-2px)}
  .nav-label{font-family:'Nunito',sans-serif;font-size:9.5px;font-weight:800;color:var(--text-muted);letter-spacing:.2px}
  .nav-item.active .nav-label{color:var(--green)}
  .nav-item.active .nav-icon{filter:drop-shadow(0 0 5px var(--green))}
  .nav-item.active::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--green)}

</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-spacer"></div>
  <div class="header-title">👤 Profile</div>
  <div class="header-spacer"></div>
</header>

<!-- PAGE -->
<div class="page" id="page">
  <div class="loading-screen" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading profile…</div>
  </div>
</div>

<!-- EDIT NAME MODAL -->
<div class="modal-overlay" id="name-modal" onclick="handleModalBgClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ Change Username</div>
    <input class="modal-input" id="name-input" type="text" maxlength="20" placeholder="Enter your username…" autocomplete="off" spellcheck="false"/>
    <div class="modal-hint">2–20 characters · visible on leaderboard</div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeNameModal()">Cancel</button>
      <button class="btn-modal-save"   id="btn-save-name" onclick="saveName()">Save</button>
    </div>
  </div>
</div>

<!-- SIGN OUT CONFIRM -->
<div class="signout-overlay" id="so-overlay" onclick="handleSOBgClick(event)">
  <div class="signout-card">
    <div class="signout-icon">🚪</div>
    <div class="signout-title">Sign Out?</div>
    <div class="signout-desc">You'll need to sign back in to continue learning. Your progress is saved.</div>
    <div class="signout-btns">
      <button class="btn-cancel-so" onclick="closeSignOut()">Cancel</button>
      <button class="btn-confirm-so" onclick="confirmSignOut()">Sign Out</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const sb = window._sb;

// ── State
let userId   = null;
let userData = null;
let username = null;
let lbData   = null;
let lbRank   = null;

// ── Key helper (matches dashboard)
function key(name) { return `${name}_${userId}`; }

// ── Toast
let toastTimer = null;
function showToast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = ok ? 'rgba(74,222,128,.3)' : 'rgba(248,113,113,.3)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Name modal
function openNameModal() {
  const inp = document.getElementById('name-input');
  inp.value = username || '';
  document.getElementById('name-modal').classList.add('show');
  setTimeout(() => inp.focus(), 350);
}
function closeNameModal() { document.getElementById('name-modal').classList.remove('show'); }
function handleModalBgClick(e) { if (e.target === document.getElementById('name-modal')) closeNameModal(); }

async function saveName() {
  const inp = document.getElementById('name-input');
  const val = inp.value.trim();
  if (val.length < 2) { showToast('Username must be at least 2 characters', false); return; }
  if (val.length > 20) { showToast('Username must be 20 characters or less', false); return; }

  const btn = document.getElementById('btn-save-name');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    // Save to Supabase leaderboard
    const { error } = await sb.from('leaderboard').update({ username: val }).eq('user_id', userId);
    if (error) throw error;

    username = val;
    localStorage.setItem(key('username'), val);

    // Update avatar and name display
    document.getElementById('profile-name').textContent = val;
    document.getElementById('avatar-initials').textContent = val.slice(0,2).toUpperCase();

    closeNameModal();
    showToast('✅ Username updated!');
  } catch(e) {
    showToast('Could not save — try again', false);
    console.error(e);
  } finally {
    btn.disabled = false; btn.textContent = 'Save';
  }
}

// ── Sign out
function openSignOut()          { document.getElementById('so-overlay').classList.add('show'); }
function closeSignOut()         { document.getElementById('so-overlay').classList.remove('show'); }
function handleSOBgClick(e)     { if (e.target === document.getElementById('so-overlay')) closeSignOut(); }
async function confirmSignOut() {
  await sb.auth.signOut();
  window.location.replace('/app/index.html');
}

// ── Badges definition
const BADGES = [
  { id:'first_lesson', icon:'🎓', name:'First Step',   desc:'Complete your first lesson',      check: (s) => s.lessons >= 1 },
  { id:'streak_3',     icon:'🔥', name:'On Fire',      desc:'3-day streak',                    check: (s) => s.streak >= 3 },
  { id:'streak_7',     icon:'⚡', name:'Unstoppable',  desc:'7-day streak',                    check: (s) => s.streak >= 7 },
  { id:'xp_100',       icon:'💯', name:'Century',      desc:'Earn 100 XP',                     check: (s) => s.xp >= 100 },
  { id:'xp_500',       icon:'🏅', name:'Gold Rush',    desc:'Earn 500 XP',                     check: (s) => s.xp >= 500 },
  { id:'lessons_10',   icon:'📚', name:'Bookworm',     desc:'Complete 10 lessons',             check: (s) => s.lessons >= 10 },
  { id:'lessons_30',   icon:'🎯', name:'Dedicated',    desc:'Complete 30 lessons',             check: (s) => s.lessons >= 30 },
  { id:'top3',         icon:'🏆', name:'Podium',       desc:'Reach top 3 on leaderboard',      check: (s) => s.rank > 0 && s.rank <= 3 },
  { id:'hsk2',         icon:'🀄', name:'HSK 2 Hero',   desc:'Unlock HSK 2',                    check: (s) => s.level >= 2 },
  { id:'hsk3',         icon:'🌟', name:'Intermediate', desc:'Unlock HSK 3',                    check: (s) => s.level >= 3 },
  { id:'perfect',      icon:'💎', name:'Perfectionist', desc:'Complete a lesson with 100% accuracy', check: (s) => s.hasPerfect },
  { id:'streak_30',    icon:'👑', name:'Champion',     desc:'30-day streak',                   check: (s) => s.streak >= 30 },
];

function renderBadges(stats) {
  const grid = document.createElement('div');
  grid.className = 'badges-grid';
  BADGES.forEach(b => {
    const earned = b.check(stats);
    const item = document.createElement('div');
    item.className = 'badge-item';
    item.title = b.desc;
    item.innerHTML = `
      <div class="badge-icon ${earned?'earned':'locked'}">
        ${b.icon}
        ${!earned ? '<span class="badge-lock">🔒</span>' : ''}
      </div>
      <div class="badge-name ${earned?'earned':''}">${b.name}</div>`;
    grid.appendChild(item);
  });
  return grid;
}

// ── History (from localStorage)
function buildHistory(uid) {
  const completed = JSON.parse(localStorage.getItem(`completed_lessons_${uid}`) || '[]');
  const streak    = Number(localStorage.getItem(`streak_${uid}`) || 0);
  const xp        = Number(localStorage.getItem(`xp_${uid}`) || 0);

  const items = [];
  const now   = new Date();

  // Show last 5 completed lessons
  const shown = completed.slice(-5).reverse();
  shown.forEach((lessonId, i) => {
    items.push({
      icon: 'lesson',
      emoji: '📖',
      title: `Lesson ${lessonId} completed`,
      time: i === 0 ? 'Recently' : `${i + 1} lessons ago`,
      xp: '+10 XP'
    });
  });

  if (streak >= 1) items.push({ icon:'streak', emoji:'🔥', title:`${streak}-day streak active`, time:'Keep it up!', xp: '' });
  if (lbRank)     items.push({ icon:'rank',   emoji:'🏆', title:`Ranked #${lbRank} on leaderboard`, time:'Current rank', xp: '' });

  return items.slice(0, 6);
}

// ── Main render
function renderProfile(stats) {
  const page = document.getElementById('page');
  page.innerHTML = '';

  const lvlNames = ['','HSK 1 · Beginner','HSK 2 · Elementary','HSK 3 · Intermediate','HSK 4 · Upper-Intermediate','HSK 5 · Advanced','HSK 6 · Mastery'];

  // ── AVATAR CARD
  const avatarCard = document.createElement('div');
  avatarCard.className = 'avatar-card';
  const initials = (username || 'NN').slice(0,2).toUpperCase();
  avatarCard.innerHTML = `
    <div class="avatar-circle" onclick="openNameModal()">
      <span id="avatar-initials">${initials}</span>
      <div class="avatar-edit-badge">✏️</div>
    </div>
    <div class="avatar-info">
      <div class="avatar-name" id="profile-name">${username || 'Learner'}</div>
      <div class="avatar-email" id="profile-email">${userData?.email || ''}</div>
      <div class="avatar-level">${lvlNames[stats.level] || 'HSK 1 · Beginner'}</div>
    </div>
    <button class="btn-edit-name" onclick="openNameModal()">
      ✏️ Edit
    </button>`;
  page.appendChild(avatarCard);

  // ── STATS
  const slabel = document.createElement('div');
  slabel.className = 'section-label';
  slabel.textContent = 'Your Stats';
  page.appendChild(slabel);

  const grid = document.createElement('div');
  grid.className = 'stats-grid';
  const statItems = [
    { cls:'xp-card',       icon:'⚡', val: stats.xp,      label:'Total XP'      },
    { cls:'streak-card',   icon:'🔥', val: stats.streak,  label:'Day Streak'    },
    { cls:'rank-card',     icon:'🏆', val: lbRank ? '#'+lbRank : '—', label:'Leaderboard Rank' },
    { cls:'lessons-card',  icon:'📖', val: stats.lessons, label:'Lessons Done'  },
    { cls:'hearts-card',   icon:'❤️', val: stats.hearts,  label:'Hearts Left'   },
    { cls:'accuracy-card', icon:'🎯', val: stats.accuracy+'%', label:'Avg Accuracy' },
  ];
  statItems.forEach(s => {
    const card = document.createElement('div');
    card.className = 'stat-card ' + s.cls;
    card.innerHTML = `<div class="stat-icon">${s.icon}</div><div class="stat-val">${s.val}</div><div class="stat-label">${s.label}</div>`;
    grid.appendChild(card);
  });
  page.appendChild(grid);

  // ── LEVEL PROGRESS
  const lpLabel = document.createElement('div');
  lpLabel.className = 'section-label';
  lpLabel.textContent = 'HSK Progress';
  page.appendChild(lpLabel);

  const TOTAL_LESSONS_PER_LEVEL = 30;
  const currentLesson = Number(localStorage.getItem(key('user_lesson')) || 1);
  const currentLevel  = stats.level;

  const lvCard = document.createElement('div');
  lvCard.className = 'level-card';
  const lvls = [
    { name:'HSK 1', lessons: currentLevel > 1 ? TOTAL_LESSONS_PER_LEVEL : Math.min(currentLesson - 1, TOTAL_LESSONS_PER_LEVEL) },
    { name:'HSK 2', lessons: currentLevel > 2 ? TOTAL_LESSONS_PER_LEVEL : currentLevel === 2 ? Math.min(currentLesson - 1, TOTAL_LESSONS_PER_LEVEL) : 0 },
    { name:'HSK 3', lessons: currentLevel > 3 ? TOTAL_LESSONS_PER_LEVEL : currentLevel === 3 ? Math.min(currentLesson - 1, TOTAL_LESSONS_PER_LEVEL) : 0 },
    { name:'HSK 4', lessons: currentLevel > 4 ? TOTAL_LESSONS_PER_LEVEL : currentLevel === 4 ? Math.min(currentLesson - 1, TOTAL_LESSONS_PER_LEVEL) : 0 },
    { name:'HSK 5', lessons: currentLevel > 5 ? TOTAL_LESSONS_PER_LEVEL : currentLevel === 5 ? Math.min(currentLesson - 1, TOTAL_LESSONS_PER_LEVEL) : 0 },
    { name:'HSK 6', lessons: currentLevel === 6 ? Math.min(currentLesson - 1, TOTAL_LESSONS_PER_LEVEL) : 0 },
  ];
  const totalDone = lvls.reduce((a,b) => a + b.lessons, 0);
  const totalAll  = TOTAL_LESSONS_PER_LEVEL * 6;
  const overallPct = Math.round((totalDone / totalAll) * 100);

  lvCard.innerHTML = `
    <div class="level-card-top">
      <div class="level-card-title">Overall Completion</div>
      <div class="level-card-pct">${overallPct}%</div>
    </div>
    <div class="level-bars">
      ${lvls.map(l => {
        const pct = Math.round((l.lessons / TOTAL_LESSONS_PER_LEVEL) * 100);
        return `
          <div class="level-bar-row">
            <div class="level-bar-name">${l.name}</div>
            <div class="level-bar-track"><div class="level-bar-fill" style="width:${pct}%"></div></div>
            <div class="level-bar-num">${l.lessons}</div>
          </div>`;
      }).join('')}
    </div>`;
  page.appendChild(lvCard);

  // ── BADGES
  const blabel = document.createElement('div');
  blabel.className = 'section-label';
  blabel.textContent = 'Badges';
  page.appendChild(blabel);
  page.appendChild(renderBadges(stats));

  // ── LEARNING HISTORY
  const hlabel = document.createElement('div');
  hlabel.className = 'section-label';
  hlabel.textContent = 'Recent Activity';
  page.appendChild(hlabel);

  const histItems = buildHistory(userId);
  if (histItems.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:20px;color:var(--text-muted);font-size:13px;font-weight:700';
    empty.textContent = 'Complete a lesson to see your activity here!';
    page.appendChild(empty);
  } else {
    const hlist = document.createElement('div');
    hlist.className = 'history-list';
    histItems.forEach(h => {
      const row = document.createElement('div');
      row.className = 'history-row';
      row.innerHTML = `
        <div class="history-icon ${h.icon}">${h.emoji}</div>
        <div class="history-info">
          <div class="history-title">${h.title}</div>
          <div class="history-time">${h.time}</div>
        </div>
        ${h.xp ? `<div class="history-xp">${h.xp}</div>` : ''}`;
      hlist.appendChild(row);
    });
    page.appendChild(hlist);
  }

  // ── SETTINGS
  const setlabel = document.createElement('div');
  setlabel.className = 'section-label';
  setlabel.textContent = 'Settings';
  page.appendChild(setlabel);

  const settingsList = document.createElement('div');
  settingsList.className = 'settings-list';
  const settings = [
    { icon:'green', emoji:'✏️', label:'Change Username',     sub:'Update your display name',       action: openNameModal },
    { icon:'blue',  emoji:'🔔', label:'Notifications',       sub:'Manage reminders',               action: () => showToast('Coming soon!') },
    { icon:'gold',  emoji:'🌐', label:'App Language',        sub:'English',                         action: () => showToast('Coming soon!') },
    { icon:'purple',emoji:'🎯', label:'Daily Goal',          sub:'3 lessons per day',               action: () => showToast('Coming soon!') },
    { icon:'rose',  emoji:'🔑', label:'Change Password',     sub:'Update via email link',           action: sendPasswordReset },
    { icon:'',      emoji:'🚪', label:'Sign Out',            sub:'',                                action: openSignOut, danger: true },
  ];
  settings.forEach(s => {
    const row = document.createElement('div');
    row.className = 'setting-row' + (s.danger ? ' danger' : '');
    row.onclick = s.action;
    row.innerHTML = `
      <div class="setting-icon ${s.icon}">${s.emoji}</div>
      <div class="setting-label">${s.label}${s.sub ? `<small>${s.sub}</small>` : ''}</div>
      <div class="setting-arrow">›</div>`;
    settingsList.appendChild(row);
  });
  page.appendChild(settingsList);

  // Version tag
  const ver = document.createElement('div');
  ver.style.cssText = 'text-align:center;font-size:11px;color:var(--text-muted);padding:8px;font-weight:600';
  ver.textContent = 'Maobai v1.0 · Made with 🐼';
  page.appendChild(ver);
}

async function sendPasswordReset() {
  if (!userData?.email) return;
  try {
    await sb.auth.resetPasswordForEmail(userData.email);
    showToast('✅ Password reset email sent!');
  } catch(e) {
    showToast('Could not send email', false);
  }
}

// ── INIT
async function init() {
  try {
    const { data: sessionData } = await sb.auth.getSession();
    const user = sessionData?.session?.user;
    if (!user) { window.location.replace('/app/index.html'); return; }

    userId   = user.id;
    userData = user;

    // Get username — leaderboard first, then localStorage, then metadata
    const { data: lbRow } = await sb.from('leaderboard').select('xp, username').eq('user_id', userId).maybeSingle();
    lbData = lbRow;

    // Get rank
    const { data: allUsers } = await sb.from('leaderboard').select('user_id, xp').order('xp', { ascending: false });
    if (allUsers) {
      const idx = allUsers.findIndex(u => u.user_id === userId);
      lbRank = idx >= 0 ? idx + 1 : null;
    }

    username = lbRow?.username
      || localStorage.getItem(key('username'))
      || user.user_metadata?.full_name
      || user.user_metadata?.name
      || user.email?.split('@')[0]
      || 'Learner';

    // Build stats from localStorage
    const xp       = Number(localStorage.getItem(key('xp'))      || lbRow?.xp || 0);
    const streak   = Number(localStorage.getItem(key('streak'))   || 0);
    const hearts   = Number(localStorage.getItem(key('hearts'))   || 5);
    const level    = Number(localStorage.getItem(key('user_level')) || 1);
    const completed= JSON.parse(localStorage.getItem(key('completed_lessons')) || '[]');
    const lessons  = completed.length;
    const mistakes = JSON.parse(localStorage.getItem(key('mistakes')) || '[]');
    const totalQ   = lessons * 8; // rough estimate
    const accuracy = totalQ > 0 ? Math.max(0, Math.round(((totalQ - mistakes.length) / totalQ) * 100)) : 100;
    const hasPerfect = false; // could track this later

    const stats = { xp, streak, hearts, level, lessons, accuracy, hasPerfect, rank: lbRank || 0 };

    renderProfile(stats);

  } catch(e) {
    console.error('Profile init error:', e);
    document.getElementById('page').innerHTML = '<div style="text-align:center;padding:60px 24px;color:var(--text-muted);font-size:14px">Could not load profile. <a href="/app/dashboard.html" style="color:var(--green)">← Go back</a></div>';
  }
}

init();
</script>
