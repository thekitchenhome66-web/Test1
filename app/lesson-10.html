function checkTranslateEN(answer, w) {
  if (answeredStep) return;
  const input = document.getElementById('ten-input');
  if (!input) return;
  const userAns = input.value.trim().toLowerCase();
  // Accept if user answer contains key words from the answer
  const keyWords = answer.toLowerCase().replace(/[\/\(\)]/g,' ').split(/[\s,]+/).filter(x=>x.length>2);
  const isCorrect = keyWords.length > 0 && keyWords.some(kw => userAns.includes(kw));
  answeredStep = true;
  input.style.borderColor = isCorrect ? 'var(--green)' : 'var(--rose)';
  input.disabled = true;
  consumeEnergy();
  if (!isCorrect) { loseHeart(); sessionMistakes.push({word:w,type:'translate_en'}); addToRetry(steps[currentStep]); }
  else { sessionXP += 3; }
  const fb = document.getElementById('feedback');
  if (fb) { fb.className=`feedback show ${isCorrect?'ok':'err'}`; fb.innerHTML=isCorrect?`<div class="fb-icon">✓</div><div><div class="fb-main">Correct! +3 XP</div><div class="fb-hint">${answer}</div></div>`:`<div class="fb-icon">✗</div><div><div class="fb-main">Answer: ${answer}</div></div>`; }
  if (steps[currentStep].section) updateCheckpointScore(steps[currentStep].section, isCorrect);
  handleAnswer(isCorrect, w);
  bottomArea.innerHTML=''; const nb=document.createElement('button'); nb.className='btn-primary';
  nb.textContent=isCorrect?'Continue →':'I understand →'; nb.addEventListener('click',nextStep); bottomArea.appendChild(nb);
}

// ── USAGE PICK: which sentence uses the word CORRECTLY? ────────
function renderUsagePick(step) {
  const w = step.word;
  const pool = step.pool || _wordCache[lesson?.plan?.levelNum] || [];

  // Build a correct sentence and 2-3 wrong ones
  const correctSentence = w.ex?.zh || `他很${w.zh}。`;
  // Generate wrong sentences by misplacing the word
  const wrongs = [
    w.ex?.zh ? `${w.zh}他很。` : `他${w.zh}很。`,   // wrong word order
    w.ex?.zh ? `他是${w.zh}很。` : `他是很${w.zh}。`, // added 是 wrongly
  ].filter(s => s !== correctSentence);

  const options = shuffle([correctSentence, ...wrongs.slice(0,2)]);
  const labels  = ['A','B','C','D'];

  stepArea.innerHTML = '';
  const card = document.createElement('div');
  card.style.cssText = 'display:flex;flex-direction:column;gap:14px';
  card.innerHTML = `
    <div class="q-label read">📖 Correct Usage</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px">
      <div style="font-size:12px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Which sentence uses <span style="font-family:'Noto Sans SC',sans-serif;color:var(--gold)">${w.zh}</span> correctly?</div>
      <div style="font-size:13px;color:var(--ink2)">Meaning: ${w.en} (${w.py})</div>
    </div>
    <div id="usage-opts" style="display:flex;flex-direction:column;gap:10px"></div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;
  stepArea.appendChild(card);

  const optCont = document.getElementById('usage-opts');
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.style.cssText = "display:flex;align-items:center;gap:12px;text-align:left;padding:14px 16px";
    btn.innerHTML = `<span style="background:var(--border);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:800;color:var(--ink2);flex-shrink:0">${labels[i]}</span><span style="font-family:'Noto Sans SC',sans-serif;font-size:18px">${opt}</span>`;
    btn.addEventListener('click', () => {
      if (answeredStep) return;
      const isCorrect = opt === correctSentence;
      answeredStep = true; consumeEnergy();
      document.querySelectorAll('#usage-opts .opt-btn').forEach((b,j) => {
        if (options[j] === correctSentence) b.classList.add('correct');
        else if (j === i && !isCorrect) b.classList.add('wrong');
        b.disabled = true;
      });
      if (!isCorrect) { loseHeart(); sessionMistakes.push({word:w,type:'usage_pick'}); addToRetry(steps[currentStep]); }
      else { sessionXP += 2; }
      const fb = document.getElementById('feedback');
      if (fb) { fb.className=`feedback show ${isCorrect?'ok':'err'}`; fb.innerHTML=isCorrect?`<div class="fb-icon">✓</div><div><div class="fb-main">Correct!</div></div>`:`<div class="fb-icon">✗</div><div><div class="fb-main">Correct: <span style="font-family:'Noto Sans SC',sans-serif">${correctSentence}</span></div></div>`; }
      if (steps[currentStep].section) updateCheckpointScore(steps[currentStep].section, isCorrect);
      handleAnswer(isCorrect, w);
      bottomArea.innerHTML=''; const nb=document.createElement('button'); nb.className='btn-primary';
      nb.textContent=isCorrect?'Continue →':'I understand →'; nb.addEventListener('click',nextStep); bottomArea.appendChild(nb);
    });
    optCont.appendChild(btn);
  });
  bottomArea.innerHTML='';
}

// SPEED TIMER
// ══════════════════════════════════════════════════════════
function startSpeedTimer() {
  speedTimeLeft = 8;
  const timerWrap = document.createElement('div');
  timerWrap.innerHTML =
    '<div class="speed-bar-wrap"><div class="speed-bar" id="speed-bar" style="width:100%"></div></div>' +
    '<div class="speed-counter" id="speed-counter">8s</div>';
  stepArea.insertBefore(timerWrap, stepArea.firstChild);

  speedTimer = setInterval(() => {
    speedTimeLeft = Math.max(0, speedTimeLeft - 0.1);
    const bar = document.getElementById('speed-bar');
    const cnt = document.getElementById('speed-counter');
    if (!bar || !cnt) { clearInterval(speedTimer); return; }
    const pct = (speedTimeLeft / 8) * 100;
    bar.style.width = pct + '%';
    bar.className = 'speed-bar' + (pct < 40 ? ' warning' : '') + (pct < 15 ? ' danger' : '');
    cnt.textContent = Math.ceil(speedTimeLeft) + 's';
    if (speedTimeLeft <= 0) {
      clearInterval(speedTimer);
      if (!answeredStep) {
        answeredStep = true;
        loseHeart();
        showFeedback(false, steps[currentStep]?.word, 'Too slow!');
        bottomArea.innerHTML = `<button class="btn-primary" onclick="nextStep()">Next →</button>`;
      }
    }
  }, 100);
}

function updateCheckpointScore(section, isCorrect) {
  if (!section) return;
  checkpointScores[section + 'Total'] = (checkpointScores[section + 'Total'] || 0) + 1;
  if (isCorrect) checkpointScores[section] = (checkpointScores[section] || 0) + 1;
}

// ══════════════════════════════════════════════════════════
// SRS
// ══════════════════════════════════════════════════════════
function updateSRS(wordId, correct) {
  if (!wordId || !_uid) return;
  try {
    const srs = JSON.parse(localStorage.getItem(key('srs')) || '{}');
    const entry = srs[wordId] || { score: 0 };
    const intervals = [0, 86400000, 259200000, 604800000, 1209600000, 2592000000];
    entry.score = correct ? Math.min(5, entry.score + 1) : Math.max(0, entry.score - 1);
    entry.nextReview = Date.now() + (intervals[entry.score] || 0);
    srs[wordId] = entry;
    localStorage.setItem(key('srs'), JSON.stringify(srs));
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════
// NEXT STEP
// ══════════════════════════════════════════════════════════
function nextStep() {
  clearInterval(speedTimer);
  currentStep++;
  // If we've finished original steps, add any retry items to the end once
  if (currentStep >= steps.length && retryQueue.length > 0) {
    steps.push(...retryQueue);
    retryQueue = [];
  }
  if (currentStep >= steps.length) { showComplete(); return; }
  stepArea.className = 'step-area';
  setTimeout(() => {
    stepArea.className = 'step-area step-in';
    renderStep(currentStep);
  }, 60);
}

// Add a step to retry queue (wrong answer → added to end)
function addToRetry(step) {
  // Don't add speed, word_card, grammar, or already-retry steps
  if (step.speed || step.type === 'word_card' || step.type === 'grammar') return;
  if (step.isRetry) return; // prevent infinite retry loops
  // Deduplicate by word id
  const wordId = step.word?.id;
  if (wordId && retryQueue.some(r => r.word?.id === wordId)) return;
  retryQueue.push({...step, isRetry: true});
}

async function showComplete() {
  clearInterval(speedTimer);
  progressEl.style.width = '100%';
  bottomArea.innerHTML = '';

  const plan    = lesson.plan;
  const isCP    = plan.isCheckpoint;
  const isSpeed = plan.isSpeed;
  let earnedXP  = sessionXP + (isSpeed ? 20 : 10);
  if (isCP) earnedXP += 15;

  // Save progress
  const completedLessons = JSON.parse(localStorage.getItem(key('completed_lessons')) || '[]');
  if (!completedLessons.includes(plan.lessonNum)) {
    const newXP = Number(localStorage.getItem(key('xp')) || 0) + earnedXP;
    localStorage.setItem(key('xp'), newXP);
    localStorage.setItem(key('completed_lessons'), JSON.stringify([...completedLessons, plan.lessonNum]));
    // Level advancement
    // Count lessons from LESSON_VOCAB for this level, fallback to word-based calc
    const levelLessons = Object.keys(LESSON_VOCAB).filter(k => k.startsWith(plan.levelNum + '-')).length;
    const totalLessonsInLevel = levelLessons > 0 ? levelLessons : Math.ceil((_wordCache[plan.levelNum]?.length || 0) / 3);
    const nextLessonNum = plan.lessonNum + 1;
    if (nextLessonNum > totalLessonsInLevel && plan.levelNum < 6) {
      // All lessons in this level done → flag for HSK simulation exam before advancing
      localStorage.setItem(key('hsk_exam_pending'), String(plan.levelNum));
      localStorage.setItem(key('user_level'), String(plan.levelNum + 1));
      localStorage.setItem(key('user_lesson'), '1');
    } else {
      localStorage.setItem(key('user_lesson'), String(nextLessonNum));
    }

    // Daily count
    const today = new Date().toDateString();
    if (localStorage.getItem(key('lesson_day')) !== today) {
      localStorage.setItem(key('lesson_day'), today);
      localStorage.setItem(key('lessons_today'), '0');
    }
    const done = Number(localStorage.getItem(key('lessons_today')) || 0) + 1;
    localStorage.setItem(key('lessons_today'), done);

    // Streak
    const streakToday   = new Date().toDateString();
    const yesterday     = new Date(Date.now() - 86400000).toDateString();
    const lastStreakDay = localStorage.getItem(key('streak_day'));
    let streak = Number(localStorage.getItem(key('streak')) || 0);
    if (lastStreakDay !== streakToday) {
      streak = lastStreakDay === yesterday ? streak + 1 : 1;
      localStorage.setItem(key('streak'), streak);
      localStorage.setItem(key('streak_day'), streakToday);
    }
    await saveXP(earnedXP);

    // Diamonds reward
    const diamondsEarned = isCP ? 10 : isSpeed ? 5 : 3;
    diamonds += diamondsEarned;
    renderDiamonds();
  }

  // Perfect lesson bonus energy
  const isPerfect = sessionMistakes.length === 0 && steps.length >= 5;
  if (isPerfect) {
    energy = Math.min(MAX_ENERGY, energy + 1);
    renderEnergy();
    // Show energy bonus animation
    setTimeout(() => {
      const anim = document.getElementById('energy-bonus-anim');
      if (anim) {
        anim.classList.add('show');
        playTing(true);
        setTimeout(() => anim.classList.remove('show'), 1800);
      }
    }, 600);
  }

  // Checkpoint ring
  let ringHtml = '';
  if (isCP) {
    const total   = (checkpointScores.listenTotal||0) + (checkpointScores.readTotal||0) + (checkpointScores.writeTotal||0);
    const correct = (checkpointScores.listen||0) + (checkpointScores.read||0) + (checkpointScores.write||0);
    const pct     = total > 0 ? Math.round((correct / total) * 100) : 0;
    const circ    = 2 * Math.PI * 52;
    const offset  = circ * (1 - pct / 100);
    ringHtml = `
      <div class="score-ring-wrap">
        <svg viewBox="0 0 120 120"><circle class="score-ring-track" cx="60" cy="60" r="52"/><circle class="score-ring-fill" cx="60" cy="60" r="52" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/></svg>
        <div class="score-ring-text"><div class="score-pct">${pct}%</div><div class="score-label">Score</div></div>
      </div>
      <div class="checkpoint-section-scores">
        <div class="section-score"><div class="ss-label">Listening</div><div class="ss-val listen">${checkpointScores.listen||0}/${checkpointScores.listenTotal||0}</div></div>
        <div class="section-score"><div class="ss-label">Reading</div><div class="ss-val read">${checkpointScores.read||0}/${checkpointScores.readTotal||0}</div></div>
        <div class="section-score"><div class="ss-label">Writing</div><div class="ss-val write">${checkpointScores.write||0}/${checkpointScores.writeTotal||0}</div></div>
      </div>`;
  }

  const accuracy = steps.length > 0
    ? Math.round(((steps.length - sessionMistakes.length) / steps.length) * 100)
    : 100;

  stepArea.innerHTML = `
    <div class="complete-screen">
      <div class="complete-emoji">${isCP ? '🏆' : isSpeed ? '⚡' : '🎉'}</div>
      <div class="complete-title">${isCP ? 'Checkpoint Complete!' : isSpeed ? 'Speed Challenge Done!' : 'Lesson Complete!'}</div>
      <div class="complete-sub">${plan.name} · HSK ${plan.levelNum}</div>
      ${ringHtml}
      <div class="xp-pill" id="xp-pill">+${earnedXP} XP</div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        ${isPerfect ? '<div style="background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);border-radius:999px;padding:5px 14px;font-size:13px;font-weight:700;color:var(--gold)">⚡ +1 Energy Bonus!</div>' : ''}
        <div style="background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);border-radius:999px;padding:5px 14px;font-size:13px;font-weight:700;color:var(--purple)">💎 +${isCP?10:isSpeed?5:3} Diamonds</div>
      </div>
      <div class="complete-stats">
        <div class="stat-box"><div class="sv">${steps.length}</div><div class="sl">Steps</div></div>
        <div class="stat-box"><div class="sv">${sessionMistakes.length}</div><div class="sl">Errors</div></div>

async function saveXP(earned) {
  try {
    const sb = window._sb;

      user_id: _uid,
      xp: totalXP,
      username: username,
      hsk_level: hskLevel

}

// INIT
// ══════════════════════════════════════════════════════════
async function init() {
  // Safety: if loading takes > 12s, show error instead of spinning forever
  const loadingTimeout = setTimeout(() => {
    const sa = document.getElementById('step-area');
    if (sa && sa.querySelector('.spinner')) {
      sa.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--rose);font-size:14px"><strong>Loading timed out</strong><br/>Please check your connection.<br/><br/><a href="/app/dashboard.html" style="color:var(--green)">← Back</a></div>';
    }
  }, 12000);

  try {
    const { data } = await sb.auth.getSession();
    const user = data?.session?.user;
    if (!user) { window.location.replace('/app/login.html'); return; }
    _uid = user.id;

    hearts = Number(localStorage.getItem(key('hearts')) ?? 5);
    xp     = Number(localStorage.getItem(key('xp')) || 0);
    if (isNaN(hearts) || hearts < 0) hearts = 5;
    renderHearts();
    loadEnergy();

    const levelNum  = Number(params.get('level')  || localStorage.getItem(key('user_level'))  || 1);
    const lessonNum = Number(params.get('lesson') || localStorage.getItem(key('user_lesson')) || 1);

    // Load full word cache for this level (needed for distractors/pool)
    await loadWords(levelNum);

    // SMART SRS SELECTION — prioritise due + new words
    const smartWords = await generateSmartWords(levelNum);

    // Build lesson plan; for dynamic (non-handcrafted) plans, override newWords
    // with the SRS-prioritised selection so due words appear first
    const plan = getLessonPlan(levelNum, lessonNum);
    if (!plan.isHandcrafted && !plan.isCheckpoint && !plan.isSpeed && smartWords.length > 0) {
      // Deduplicate against reviewWords and cap at 4 new words
      const reviewIds = new Set((plan.reviewWords || []).map(w => w.id));
      const smartNew = smartWords.filter(w => !reviewIds.has(w.id)).slice(0, 4);
      if (smartNew.length > 0) plan.newWords = smartNew;
    }
    lesson = { plan };
    steps  = buildSteps(plan);

    if (!steps || steps.length === 0) {
      window.location.replace('/app/dashboard.html'); return;
    }

    document.getElementById('info-tag').textContent  = 'HSK ' + levelNum + ' · Lesson ' + lessonNum;
    document.getElementById('info-type').textContent = plan.name;

    document.getElementById('btn-close').onclick = () => {
      if (confirm('Leave this lesson? Progress will be lost.')) {
        window.location.href = '/app/dashboard.html';
      }
    };

    // Wire energy overlay buttons
    const eoAdBtn = document.getElementById('eo-ad-btn');
    if (eoAdBtn) eoAdBtn.addEventListener('click', watchEnergyAd);
    const eoProBtn = document.getElementById('eo-pro-btn');
    if (eoProBtn) eoProBtn.addEventListener('click', () => showToast('Pro subscription coming soon! 🌟'));
    const eoQuitBtn = document.getElementById('eo-quit-btn');
    if (eoQuitBtn) eoQuitBtn.addEventListener('click', loseAllPointsAndQuit);

    if (hearts <= 0) {
      clearTimeout(loadingTimeout);
      document.getElementById('nh-overlay').classList.add('show');
    } else {
      try {
        renderStep(0);
      } catch(renderErr) {
        const sa = document.getElementById('step-area');
        if (sa) sa.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--rose);font-size:14px;word-break:break-all"><strong>Render Error:</strong><br/>' + renderErr.message + '<br/><br/><a href="/app/dashboard.html" style="color:var(--green)">← Back</a></div>';
      }
    }

  } catch(e) {
    clearTimeout(loadingTimeout);
    const sa = document.getElementById('step-area');
    if (sa) sa.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--rose);font-size:14px;word-break:break-all"><strong>Init Error:</strong><br/>' + e.message + '<br/><br/><a href="/app/dashboard.html" style="color:var(--green)">← Back</a></div>';
  }
}

init();



</script>
<!-- initSmartLesson removed: init() handles all startup logic -->
</body>
</html>
