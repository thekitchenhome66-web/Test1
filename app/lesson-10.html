// === WORD MEMORY SYSTEM ===
async function updateWordProgress(word_id, isCorrect) {
  if (!word_id) return;
  const sb = window._sb;
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;

    const { data: existing } = await sb
      .from("word_progress")
      .select("*")
      .eq("user_id", user.id)
      .eq("word_id", word_id)
      .single();

    let level = existing?.level || 1;
    let streak = existing?.streak || 0;
    let correct_count = existing?.correct_count || 0;
    let wrong_count = existing?.wrong_count || 0;

    if (isCorrect) {
      level = Math.min(level + 1, 5);
      streak += 1;
      correct_count += 1;
    } else {
      level = Math.max(level - 1, 1);
      streak = 0;
      wrong_count += 1;
    }

    const now = new Date();
    const intervals = [1,3,7,14,30];
    const days = intervals[level-1] || 1;
    const next_review = new Date(now.getTime() + days * 86400000);

    if (!existing) {
      await sb.from("word_progress").insert({
        user_id: user.id,
        word_id,
        level,
        streak,
        correct_count,
        wrong_count,
        last_seen: now,
        next_review
      });
    } else {
      await sb.from("word_progress")
        .update({
          level,
          streak,
          correct_count,
          wrong_count,
          last_seen: now,
          next_review
        })
        .eq("id", existing.id);
    }
  } catch(e) {
    console.warn("updateWordProgress error:", e);
  }
}

// ── ANSWER HANDLER — single entry point for all question outcomes ─
// ── RETRY STEP GENERATOR ─────────────────────────────────────────
// Creates a simple MCQ exercise step from a word, used for retry queue
function generateStepFromWord(w) {
  if (!w || !w.id) return null;
  const pool = _wordCache[lesson?.plan?.levelNum] || [];
  const distractors = buildDistractors(w, pool, 2);
  return {
    type: 'mcq_meaning',
    word: w,
    distractors,
    pool,
    isRetry: true
  };
}

function handleAnswer(isCorrect, words) {
  if (!words) return;
  const list = Array.isArray(words) ? words : [words];
  list.forEach(w => {
    if (!w || !w.id) return;

    // Update Supabase SRS record
    updateWordProgress(w.id, isCorrect);

    // 🔥 Retry wrong words: add an MCQ step to the end of the lesson
    if (!isCorrect && typeof retryQueue !== 'undefined') {
      // Avoid duplicates: one retry per word per lesson
      if (!retryQueue.some(r => r.word?.id === w.id)) {
        const retryStep = typeof generateStepFromWord === 'function'
          ? generateStepFromWord(w)
          : null;
        if (retryStep) retryQueue.push(retryStep);
      }
    }
  });
}

</script>

<script>
// ══════════════════════════════════════════════════════════
// SUPABASE WORD LOADER
// ══════════════════════════════════════════════════════════
// _wordCache[level] = array of word objects loaded from Supabase
const _wordCache = {};

async function loadWords(level = 1) {
  if (_wordCache[level]) return _wordCache[level];
  const sb = window._sb;
  const { data, error } = await sb
    .from("words")
    .select("*")
    .eq("hsk_level", level);
  if (error) {
    console.error("Error loading words:", error);
    return [];
  }
  const words = data.map(w => ({
    id: w.id,
    zh: w.zh,
    py: w.pinyin,
    en: w.english,
    ex: {
      zh: w.example_zh,
      py: w.example_pinyin,
      en: w.example_en
    }
  }));
  _wordCache[level] = words;
  return words;
}

// ══════════════════════════════════════════════════════════
// SRS WORD SELECTION — Real spaced repetition from Supabase
// ══════════════════════════════════════════════════════════

async function getDueWords(level = 1, limit = 10) {
  try {
    const sb = window._sb;
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return [];

    // Filter by hsk_level via join instead of sending hundreds of IDs in .in()
    const { data, error } = await sb
      .from("word_progress")
      .select(`
        word_id,
        next_review,
        vocabulary:words!inner (
          id,
          hsk_level,
          zh,
          pinyin,
          english,
          example_zh,
          example_pinyin,
          example_en
        )
      `)
      .eq("user_id", user.id)
      .eq("vocabulary.hsk_level", level)
      .lte("next_review", new Date().toISOString())
      .order("next_review", { ascending: true })
      .limit(limit);

    if (error || !data) return [];

    return data
      .filter(d => d.vocabulary)
      .map(d => ({
        id: d.vocabulary.id,
        zh: d.vocabulary.zh,
        py: d.vocabulary.pinyin,
        en: d.vocabulary.english,
        ex: {
          zh: d.vocabulary.example_zh,
          py: d.vocabulary.example_pinyin,
          en: d.vocabulary.example_en
        }
      }));
  } catch(e) {
    console.warn("getDueWords error:", e);
    return [];
  }
}

async function getNewWords(level = 1, limit = 5) {
  try {
    if (!_wordCache[level] || _wordCache[level].length === 0) {
      await loadWords(level);
    }
    const levelWords = _wordCache[level] || [];
    if (levelWords.length === 0) return [];

    const sb = window._sb;
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return levelWords.slice(0, limit);

    // Chunk IDs into batches of 80 to stay under URL limits
    const levelIds = levelWords.map(w => w.id);
    const chunks = [];
    for (let i = 0; i < levelIds.length; i += 80) chunks.push(levelIds.slice(i, i + 80));

    const seenIds = new Set();
    for (const chunk of chunks) {
      const { data: seen } = await sb
        .from("word_progress")
        .select("word_id")
        .eq("user_id", user.id)
        .in("word_id", chunk);
      (seen || []).forEach(d => seenIds.add(d.word_id));
    }

    const unseen = levelWords.filter(w => !seenIds.has(w.id));
    const source = unseen.length > 0 ? unseen : levelWords;
    return source.slice(0, limit);
  } catch(e) {
    console.warn("getNewWords error:", e);
    return (_wordCache[level] || []).slice(0, limit);
  }
}

async function generateSmartWords(level = 1) {
  try {
    const due   = await getDueWords(level, 10);
    const fresh = await getNewWords(level, 5);

    // Deduplicate: due words first, then new words not already in due list
    const seen = new Set(due.map(w => w.id));
    const uniqueFresh = fresh.filter(w => !seen.has(w.id));

    const combined = [...due, ...uniqueFresh];

    // Shuffle while keeping due words weighted to the front
    // (first half stays ordered by next_review, second half shuffled)
    const half = Math.ceil(combined.length / 2);
    const prioritized = combined.slice(0, half);
    const rest = combined.slice(half).sort(() => Math.random() - 0.5);

    return [...prioritized, ...rest];
  } catch(e) {
    console.warn("generateSmartWords error:", e);
    return _wordCache[level] || [];
  }
}

function key(n) { return n + '_' + _uid; }

// ══════════════════════════════════════════════════════════
// AUDIO — Web Speech API
// ══════════════════════════════════════════════════════════
let zhVoice = null;
function loadVoice() {
  const voices = window.speechSynthesis?.getVoices() || [];
  zhVoice = voices.find(v => v.lang.startsWith('zh')) || null;
}
if (window.speechSynthesis) {
  loadVoice();
  window.speechSynthesis.addEventListener('voiceschanged', loadVoice);
}

// ══════════════════════════════════════════════════════════
// TING SOUNDS — Web Audio API
// ══════════════════════════════════════════════════════════
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _audioCtx;
}

function playTing(correct) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  // Unlock audio context on first user interaction
  if (ctx.state === 'suspended') ctx.resume();
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  if (correct) {
    // Bright happy ting: two rising notes
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1320, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.type = 'sine';
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } else {
    // Sad low ting: descending
    osc.frequency.setValueAtTime(440, ctx.currentTime);
    osc.frequency.setValueAtTime(330, ctx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.14, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.type = 'triangle';
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
  }
}

function speak(text, rate = 0.85) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = rate; u.pitch = 1;
  if (zhVoice) u.voice = zhVoice;
  window.speechSynthesis.speak(u);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(arr, n) { return shuffle(arr).slice(0, n); }
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getDistractors(correct, pool, field, n = 3) {
  const others = pool.filter(w => w[field] !== correct[field]);
  return shuffle(others).slice(0, n);
}

function renderHearts() {
  heartsEl.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const s = document.createElement('span');
    s.className = 'heart' + (i >= hearts ? ' lost' : '');
    s.textContent = '❤️';
    heartsEl.appendChild(s);
  }
}

// ── ENERGY & DIAMONDS
function renderEnergy() {
  const pct = Math.round((energy / MAX_ENERGY) * 100);
  const fill = document.getElementById('energy-fill');
  const count = document.getElementById('energy-count');
  if (fill) fill.style.width = pct + '%';
  if (count) count.textContent = energy + '/' + MAX_ENERGY;
  if (_uid) {
    localStorage.setItem(key('energy'), energy);
    localStorage.setItem(key('energy_ts'), Date.now());
  }
}

function renderDiamonds() {
  const el = document.getElementById('diamond-count');
  if (el) el.textContent = diamonds;
  if (_uid) localStorage.setItem(key('diamonds'), diamonds);
}

function loadEnergy() {
  if (!_uid) return;
  const saved = Number(localStorage.getItem(key('energy')));
  const ts    = Number(localStorage.getItem(key('energy_ts')) || 0);
  if (!isNaN(saved) && saved >= 0) {
    // Refill based on time elapsed
    const elapsed = Date.now() - ts;
    const refilled = Math.floor(elapsed / ENERGY_REFILL_RATE_MS);
    energy = Math.min(MAX_ENERGY, saved + refilled);
  } else {
    energy = MAX_ENERGY;
  }
  diamonds = Number(localStorage.getItem(key('diamonds')) || 0);
  renderEnergy();
  renderDiamonds();
  // Start refill timer
  setInterval(() => {
    if (energy < MAX_ENERGY) {
      energy = Math.min(MAX_ENERGY, energy + 1);
      renderEnergy();
    }
  }, ENERGY_REFILL_RATE_MS);
}

function consumeEnergy() {
  if (energy <= 0) {
    showEnergyOverlay();
    return false;
  }
  energy = Math.max(0, energy - 1);
  renderEnergy();
  if (energy === 0) {
    setTimeout(() => showEnergyOverlay(), 400);
  }
  return true;
}

function showEnergyOverlay() {
  document.getElementById('energy-overlay').classList.add('show');
}

function hideEnergyOverlay() {
  document.getElementById('energy-overlay').classList.remove('show');
  clearInterval(eoAdTimer);
  document.getElementById('eo-bar-wrap').style.display = 'none';
  document.getElementById('eo-bar-lbl').textContent = '';
  const adBtn = document.getElementById('eo-ad-btn');
  if (adBtn) { adBtn.disabled = false; adBtn.textContent = '📺 Watch Ad (+15 Energy, 15s)'; }
}

function watchEnergyAd() {
  const btn  = document.getElementById('eo-ad-btn');
  const bar  = document.getElementById('eo-bar-wrap');
  const fill = document.getElementById('eo-bar-fill');
  const lbl  = document.getElementById('eo-bar-lbl');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = 'Ad playing…';
  bar.style.display = 'block';
  fill.style.width = '0%';
  const AD_DURATION = 15000;
  let elapsed = 0;
  clearInterval(eoAdTimer);
  eoAdTimer = setInterval(() => {
    elapsed += 80;
    fill.style.width = Math.min(100, (elapsed / AD_DURATION) * 100) + '%';
    if (elapsed >= AD_DURATION) {
      clearInterval(eoAdTimer);
      lbl.textContent = 'Done!';
      energy = Math.min(MAX_ENERGY, energy + 15);
      localStorage.setItem(key('energy'), energy);
      renderEnergy();
      hideEnergyOverlay();
      showToast('⚡ +15 Energy! Keep going!');
    } else {
      lbl.textContent = 'Ad playing… ' + Math.ceil((AD_DURATION - elapsed) / 1000) + 's';
    }
  }, 80);
}

function buyEnergyDiamonds(amount, cost) {
  if (diamonds < cost) { showToast('Not enough diamonds! 💎'); return; }
  diamonds -= cost;
  energy = Math.min(MAX_ENERGY, energy + amount);
  renderEnergy();
  renderDiamonds();
  hideEnergyOverlay();
  showToast('⚡ +' + amount + ' Energy!');
}

function loseAllPointsAndQuit() {
  if (!confirm('Quit and lose all XP from this lesson?')) return;
  sessionXP = 0;
  hideEnergyOverlay();
  window.location.href = '/app/dashboard.html';
}

function showDiamondShop() {
  showToast('💎 Diamond shop coming soon!');
}

function updateProgress() {
  const pct = steps.length ? Math.round((currentStep / steps.length) * 100) : 0;
  progressEl.style.width = Math.min(pct, 100) + '%';
}

function loseHeart() {
  hearts = Math.max(0, hearts - 1);
  localStorage.setItem(key('hearts'), hearts);
  renderHearts();
  if (hearts <= 0) {
    setTimeout(() => document.getElementById('nh-overlay').classList.add('show'), 600);
  }
}

// Get same-category distractors for a word
function getDistractorsFor(wordId, count=2) {
  const cat = Object.entries(WORD_CATS).find(([,ids]) => ids.includes(wordId));
  if (!cat) return null;
  const pool = cat[1].filter(id => id !== wordId);
  return shuffle(pool).slice(0, count);
}

// ── MASTERY TRACKING ─────────────────────────────────────────────
// Each word/grammar pattern has a mastery level:
// 0=New  1=Learning  2=Familiar  3=Strong  4=Mastered
// Level advances on correct answers, drops on errors.
// Speed bonus: answering in <3s adds +0.5 level progress.

function getMastery(uid) {
  try { return JSON.parse(localStorage.getItem('mastery_'+uid)||'{}'); } catch(e) { return {}; }
}
function saveMastery(uid, d) { localStorage.setItem('mastery_'+uid, JSON.stringify(d)); }

function updateMastery(uid, itemId, correct, speedMs) {
  if (!uid) return;
  const m = getMastery(uid);
  const e = m[itemId] || { lvl:0, correct:0, total:0, streak:0 };
  e.total++;
  if (correct) {
    e.correct++;
    e.streak = (e.streak||0) + 1;
    const speedBonus = speedMs && speedMs < 3000 ? 0.5 : 0;
    e.lvl = Math.min(4, e.lvl + (e.streak >= 3 ? 1.5 + speedBonus : 1 + speedBonus));
  } else {
    e.streak = 0;
    e.lvl = Math.max(0, e.lvl - 1);
  }
  m[itemId] = e;
  saveMastery(uid, m);
}

function getMasteryLabel(uid, itemId) {
  const e = getMastery(uid)[itemId];
  if (!e) return 'New';
  const labels = ['New','Learning','Familiar','Strong','Mastered'];
  return labels[Math.min(4, Math.floor(e.lvl))];
}

function getWeakItems(uid, levelNum, count=8) {
  const m = getMastery(uid);
  return (_wordCache[levelNum] || [])
    .filter(w => {
      const me = m[w.id];
      return !me || me.lvl < 2 || (me.total > 0 && me.correct/me.total < 0.7);
    })
    .sort((a,b) => {
      const la = (getMastery(uid)[a.id]?.lvl||0);
      const lb = (getMastery(uid)[b.id]?.lvl||0);
      return la - lb;
    })
    .slice(0, count);
}

// ── DAILY REVIEW QUEUE ───────────────────────────────────────────
// Returns ordered list of items due for review today.
// Priority: failed items > due items > weak items > new items

function getDailyReviewQueue(uid, levelNum, maxItems=20) {
  const mastery = getMastery(uid);
  const allWords = _wordCache[levelNum] || [];

  const failed   = [];
  const due      = [];
  const weak     = [];
  const newItems = [];

  allWords.forEach(w => {
    const m = mastery[w.id];

    if (!m) {
      newItems.push(w);
    } else if ((m.fails||0) > 0) {
      failed.push(w);
    } else if (false) { // placeholder — Supabase handles due dates
      due.push(w);
    } else if ((m.correct||0) > 0 && (m.correct/m.total) < 0.6) {
      weak.push(w);
    }
  });

  return [
    ...shuffle(failed).slice(0,8),
    ...shuffle(due).slice(0,8),
    ...shuffle(weak).slice(0,4),
  ].slice(0, maxItems);
}

// ── PATCH generateLessonSteps for HSK3-6 ─────────────────────────
// For higher levels, add harder exercise types:
// HSK3+: sentence_placement (where does this word go?)
// HSK4+: translate_order (harder sentence reorder)
// HSK5+: reading_passage, error_correction

// ── LESSON GENERATOR (variety-based, no repeats) ──────────────────
// No word gets same exercise type twice. Rotates intro/production
// types across words. Includes dictation, timed_recall, hanzi_write.
function generateLessonSteps(levelNum, lessonNum, allWords) {
  const key = levelNum + '-' + lessonNum;
  const vocab = LESSON_VOCAB[key];
  if (!vocab) return null;

  const newIds   = vocab.new || [];
  const newWords = newIds.map(id => allWords.find(w=>w.id===id)).filter(Boolean);
  if (newWords.length === 0) return null;

  const reviewIds = [];
  for (let l = Math.max(1, lessonNum-8); l < lessonNum; l++) {
    const prev = LESSON_VOCAB[levelNum+'-'+l];
    if (prev) reviewIds.push(...(prev.new||[]));
  }
  const reviewWords = shuffle(
    reviewIds.map(id=>allWords.find(w=>w.id===id)).filter(Boolean)
  ).slice(0, 6);

  const steps = [];

  // PHASE 1: Word cards always first
  newWords.forEach(w => steps.push({type:'word_card', word:w}));

  // PHASE 2: First contact — each word gets a DIFFERENT recognition type
  const introPool = shuffle(['audio_char','mcq_meaning','listen_pick','mcq_hanzi','context_pick','translate_en']);
  newWords.forEach((w, i) => {
    const type = introPool[i % introPool.length];
    const d = buildDistractors(w, allWords, 2);
    steps.push({type, word:w, distractors:d, pool:allWords});
  });

  // PHASE 3: Production — each word gets a DIFFERENT typing/building type
  const prodPool = shuffle(['pinyin_type','fill_blank','sentence_build','word_position','hanzi_write','timed_recall','translate_cn','usage_pick']);
  newWords.forEach((w, i) => {
    const type = prodPool[i % prodPool.length];
    if (type === 'fill_blank' && w.ex?.zh?.includes(w.zh)) {
      steps.push({type:'fill_blank', word:w});
    } else if (type === 'sentence_build' && w.ex?.zh) {
      const chars = [...w.ex.zh];
      if (chars.length >= 3 && chars.length <= 8)
        steps.push({type:'sentence_build', sentence:w.ex.zh, chars, extras:[], word:w});
      else steps.push({type:'pinyin_type', word:w});
    } else if (type === 'timed_recall') {
      steps.push({type:'timed_recall', word:w});
    } else if (type === 'hanzi_write') {
      steps.push({type:'hanzi_write', word:w});
    } else if (type === 'word_position') {
      steps.push({type:'word_position', word:w});
    } else if (type === 'translate_cn') {
      steps.push({type:'translate_cn', word:w});
    } else if (type === 'usage_pick') {
      steps.push({type:'usage_pick', word:w, pool:allWords});
    } else {
      steps.push({type:'pinyin_type', word:w});
    }
  });

  // PHASE 4: One dictation per lesson (listen → type exact sentence)
  const dictWord = newWords.find(w => w.ex?.zh && w.ex.zh.length >= 4);
  if (dictWord) steps.push({type:'dictation', word:dictWord});

  // PHASE 5: One grammar fill-in max
  const blanks = getContextualBlanks(levelNum, lessonNum, newWords, allWords);
  if (blanks.length > 0) steps.push(blanks[0]);

  // PHASE 6: Review with variety — 4 review words, each gets different type
  if (reviewWords.length >= 2) {
    const revPool = shuffle(['mcq_meaning','mcq_hanzi','tf_sentence','listen_pick','pinyin_type','context_pick']);
    shuffle([...reviewWords]).slice(0,4).forEach((w, i) => {
      const d = buildDistractors(w, allWords, 2);
      steps.push({type: revPool[i % revPool.length], word:w, distractors:d, pool:allWords});
    });
    const matchW = shuffle([...reviewWords]).slice(0, Math.min(4, reviewWords.length));
    if (matchW.length >= 2) steps.push({type:'match', words:matchW});
  }

  // Error detection
  const errStep = getErrorStep(levelNum, lessonNum, newWords, allWords);
  if (errStep) steps.push(errStep);

  // Dedupe: no word gets same exercise type twice in one lesson
  const seen = new Map();
  const deduped = [];
  for (const step of steps) {
    if (!step.word?.id) { deduped.push(step); continue; }
    if (!seen.has(step.word.id)) seen.set(step.word.id, new Set());
    const used = seen.get(step.word.id);
    if (!used.has(step.type)) { used.add(step.type); deduped.push(step); }
  }

  const cards = deduped.filter(s => s.type === 'word_card');
  const rest  = shuffle(deduped.filter(s => s.type !== 'word_card'));
  return [...cards, ...rest];
}

// Build plausible-but-wrong distractors from same semantic category
function buildDistractors(word, allWords, count=2) {
  // Try category-based first
  const catIds = getDistractorsFor(word.id, count+2);
  if (catIds && catIds.length >= count) {
    const fromCat = catIds.map(id=>allWords.find(w=>w.id===id)).filter(Boolean);
    if (fromCat.length >= count) return fromCat.slice(0, count);
  }
  // Fallback: same-length words
  const fallback = shuffle(allWords.filter(w =>
    w.id !== word.id && Math.abs(w.zh.length - word.zh.length) <= 1
  )).slice(0, count);
  return fallback;
}

// Get fill-in-the-blank steps with unambiguous context
function getContextualBlanks(levelNum, lessonNum, newWords, allWords) {
  const steps = [];
  const key = levelNum + '-' + lessonNum;
  const topic = LESSON_VOCAB[key]?.topic || '';

  // Topic → pattern key mapping (expanded)
  const TOPIC_MAP = {
    grammar_shi: ['shi_positive','shi_negative'],
    identity:    ['shi_positive','shi_negative'],
    adj:         ['hen_adj','adj_degree'],
    adj_weather: ['hen_adj','adj_degree'],
    adj_feeling: ['hen_adj','adj_degree'],
    food:        ['svo_verb','ba_structure'],
    study:       ['svo_verb','time_expr'],
    modal:       ['modal_neng_hui','modal_yao_xihuan','modal_nuance'],
    modal2:      ['keyi_yinggai','modal_nuance'],
    location:    ['location_zai','prep_duiyu'],
    adverb:      ['ye_dou','adv_position','time_expr'],
    time:        ['time_first','time_expr'],
    connectors:  ['danshi_suoyi','yinwei_suoyi','adv_position'],
    prepositions:['bi_comparison','prep_duiyu','comparison'],
    sequence:    ['xian_zai_ranhou','time_expr'],
    freq:        ['frequency','adv_position'],
    comparison3: ['comparison','bi_comparison'],
    change:      ['hsk3_yuelaiyue','time_expr'],
    connectors3: ['danshi_suoyi','yinwei_suoyi','hsk3_suiran'],
    emotions:    ['adj_degree','modal_nuance'],
    time3:       ['time_expr','time_first'],
    ba_structure:['ba_structure','result_comp'],
    bei_passive: ['bei_passive','ba_structure'],
    concession4: ['hsk3_suiran','adv_position'],
    condition4:  ['adv_position','modal_nuance'],
    causation4:  ['danshi_suoyi','yinwei_suoyi'],
    grammar4:    ['ba_structure','bei_passive','result_comp'],
    passive4:    ['bei_passive','ba_structure'],
  };

  const patternKeys = TOPIC_MAP[topic] || [];
  let pool = patternKeys.flatMap(k => GRAMMAR_PATTERNS[k] || []);

  // Level-based fallback pool (escalating complexity)
  if (pool.length === 0) {
    if (levelNum <= 1) pool = [...GRAMMAR_PATTERNS.svo_verb, ...GRAMMAR_PATTERNS.hen_adj, ...GRAMMAR_PATTERNS.location_zai];
    else if (levelNum === 2) pool = [...GRAMMAR_PATTERNS.danshi_suoyi, ...GRAMMAR_PATTERNS.modal_nuance, ...GRAMMAR_PATTERNS.time_expr];
    else if (levelNum === 3) pool = [...GRAMMAR_PATTERNS.hsk3_suiran, ...GRAMMAR_PATTERNS.hsk3_yuelaiyue, ...GRAMMAR_PATTERNS.comparison, ...GRAMMAR_PATTERNS.adv_position];
    else pool = [...GRAMMAR_PATTERNS.ba_structure, ...GRAMMAR_PATTERNS.bei_passive, ...GRAMMAR_PATTERNS.result_comp, ...GRAMMAR_PATTERNS.prep_duiyu];
  }

  // Use lesson number as seed to rotate patterns — same topic gets different patterns each lesson
  const offset = (lessonNum * 3) % Math.max(pool.length, 1);
  const rotated = [...pool.slice(offset), ...pool.slice(0, offset)];

  rotated.slice(0, 1).forEach(p => {
    steps.push({
      type:'fill_blank_hc',
      sentence:    p.s,
      answer:      p.a,
      options:     shuffle([p.a, ...p.x]).slice(0, 4),
      translation: p.tr,
      explanation: p.ex || null,
    });
  });

  return steps;
}

    ],
    adverb:       [
      {bad:'我都也去',            good:'我也去',                  tip:"也 = too/also. 都 = all/both. Don't stack them."},
      {bad:'她不也来',            good:'她也不来',                tip:'也 comes before the negative 不'},
      {bad:'他们都也是学生',      good:'他们都是学生',            tip:'都 already means "all" — 也 is redundant here'},
    ],
    time:         [
      {bad:'我今天昨天去',        good:'我昨天去',                tip:'Use only one time word per clause'},
      {bad:'昨天他了去',          good:'昨天他去了',              tip:'了 comes after the verb, not between subject and verb'},
      {bad:'我去了昨天',          good:'我昨天去了',              tip:'Time words come before the verb (or at sentence start)'},
    ],
    motion:       [
      {bad:'我学校去',            good:'我去学校',                tip:'Verb before destination: 去+place'},
      {bad:'他来北京了从上海',    good:'他从上海来北京了',        tip:'从 (from) + place comes before 来/去 + destination'},
    ],
    connectors:   [
      {bad:'因为下雨，但是我们不去', good:'因为下雨，所以我们不去', tip:'因为 (because) pairs with 所以 (therefore), not 但是'},
      {bad:'虽然累，因为他工作',     good:'虽然累，但是他工作',     tip:'虽然 (although) pairs with 但是/还是, not 因为'},
      {bad:'不但聪明，因为努力',     good:'不但聪明，而且努力',     tip:'不但 (not only) pairs with 而且 (but also)'},
    ],
    ba_structure: [
      {bad:'我把书在桌子放',      good:'我把书放在桌子上',        tip:'把 structure: 把+Object+Verb+Complement'},
      {bad:'把他批评了老师',      good:'老师把他批评了',          tip:'Subject + 把 + Object + Verb — subject comes first'},
      {bad:'我把水喝',            good:'我把水喝完了',            tip:'把 needs a result or complement after the verb'},
    ],
    bei_passive:  [
      {bad:'蛋糕被了孩子吃',      good:'蛋糕被孩子吃了',         tip:'被 structure: Object + 被 + Agent + Verb + 了'},
      {bad:'他被批评老师了',      good:'他被老师批评了',          tip:'被 + agent (who did it) + verb'},
    ],
    comparison3:  [
      {bad:'他高比我',            good:'他比我高',                tip:'比 comparison: A + 比 + B + Adjective'},
      {bad:'苹果比香蕉更甜一点',  good:'苹果比香蕉甜一点',       tip:"After 比, don't add 更 — the comparison is already implied"},
    ],
    connectors3:  [
      {bad:'虽然很忙，所以他来了',  good:'虽然很忙，但是他来了',  tip:'虽然 pairs with 但是/还是, not 所以'},
      {bad:'因为很好，虽然他喜欢', good:'因为很好，所以他喜欢',   tip:'因为 pairs with 所以'},
    ],
    time3:        [
      {bad:'他已经去了刚',        good:'他刚去了',                tip:'刚 (just now) and 已经 (already) have different timing — choose one'},
      {bad:'我就到家了马上',      good:'我马上就到家了',          tip:'马上 (immediately) + 就 go before the verb'},
    ],
    prepositions: [
      {bad:'我对他跟去',          good:'我跟他去',                tip:'跟 = with (accompaniment). 对 = to/towards (relationship)'},
      {bad:'关于他，我对他说了',  good:'关于他，我跟他说了',      tip:'跟 = with/to someone. 关于 = about a topic.'},
    ],
    default:      [
      {bad:'我水喝',              good:'我喝水',                  tip:'Subject + Verb + Object order in Chinese'},
      {bad:'今天是很热',          good:'今天很热',                tip:'No 是 before adjective predicates — use 很'},
      {bad:'他去了昨天',          good:'他昨天去了',              tip:'Time words go before the verb'},
      {bad:'我们很努力学习',      good:'我们努力地学习',          tip:'Adverbs modifying verbs use 地: Adj+地+Verb'},
      {bad:'她不来也',            good:'她也不来',                tip:'也 goes before the negative: 也不/也没'},
    ],
  };

  const pool = ERRORS[topic] || ERRORS['default'];
  if (!pool || pool.length === 0) return null;
  // Rotate by lessonNum so same topic gives different error each lesson
  const e = pool[lessonNum % pool.length];
  return {type:'error_hc', wrong:e.bad, correct:e.good, tip:e.tip};
}

// ── LESSON PLAN RESOLVER ─────────────────────────────────────────
function getLessonPlan(levelNum, lessonNum) {
  const key = levelNum + '-' + lessonNum;
  const allWords = _wordCache[levelNum] || [];

  if (LESSON_VOCAB[key]) {
    const vocab = LESSON_VOCAB[key];
    const newWordObjs = (vocab.new||[]).map(id=>allWords.find(w=>w.id===id)).filter(Boolean);
    return {
      name:          vocab.title || ('Lesson '+lessonNum),
      key, levelNum, lessonNum,
      newWords:      newWordObjs,
      isHandcrafted: true,
      isSpeed:       false,
      isCheckpoint:  false,
    };
  }

  // Fallback for levels without LESSON_VOCAB entries
  const allW   = _wordCache[levelNum] || [];
  const pos    = ((lessonNum-1)%6);
  const blk    = Math.ceil(lessonNum/6);
  const start  = ((blk-1)*4) % Math.max(allW.length,1);
  const nw     = allW.slice(start, start+4);
  const rs     = Math.max(0,start-8);
  const rw     = start>0 ? allW.slice(rs,start) : [];
  const gram   = ([])[blk % Math.max(([]).length,1)];
  const NAMES  = ['Introduction','Reinforcement','Expansion','Mixed Practice','⚡ Speed','✓ Checkpoint'];
  return {
    name:NAMES[pos], key, levelNum, lessonNum,
    newWords:nw, reviewWords:rw, grammarItem:gram,
    isHandcrafted:false, isSpeed:pos===4, isCheckpoint:pos===5, posInBlock:pos,
  };
}

// ── STEP BUILDER ─────────────────────────────────────────────────
function buildSteps(plan) {
  if (plan.isHandcrafted) {
    const allWords = _wordCache[plan.levelNum] || [];
    const uid = window._uid || null;

    // Generate core steps
    const core = generateLessonSteps(plan.levelNum, plan.lessonNum, allWords) || [];

    return (core || []).filter(Boolean);
  }
  if (plan.isCheckpoint) return buildCheckpointSteps(plan);
  if (plan.isSpeed)      return buildSpeedSteps(plan);
  return buildDynamicSteps(plan);
}

function buildDynamicSteps(plan) {
  const {newWords, reviewWords, grammarItem, levelNum, lessonNum} = plan;
  const allWords = _wordCache[levelNum] || [];
  const nw = newWords || [];
  const rw = reviewWords?.length > 0 ? reviewWords : allWords.slice(0, 4);
  const ln = lessonNum || 1;

  const steps = [];

  // Word cards first
  nw.forEach(w => steps.push({type:'word_card', word:w}));
  if (grammarItem) steps.push({type:'grammar', grammar:grammarItem});

  // First contact — rotate types per word
  const introTypes = shuffle(['audio_char','mcq_meaning','listen_pick','mcq_hanzi']);
  nw.forEach((w, i) => {
    const type = introTypes[i % introTypes.length];
    const d = buildDistractors(w, allWords, 2);
    steps.push({type, word:w, distractors:d, pool:allWords});
  });

  // Production — rotate types per word
  const prodTypes = shuffle(['pinyin_type','fill_blank','sentence_build','word_position']);
  nw.forEach((w, i) => {
    const type = prodTypes[i % prodTypes.length];
    if (type === 'fill_blank' && w.ex?.zh?.includes(w.zh)) {
      steps.push({type:'fill_blank', word:w});
    } else if (type === 'sentence_build' && w.ex?.zh) {
      const chars = [...w.ex.zh];
      if (chars.length >= 3 && chars.length <= 8) {
        steps.push({type:'sentence_build', sentence:w.ex.zh, chars, extras:[], word:w});
      } else steps.push({type:'pinyin_type', word:w});
    } else if (type === 'word_position') {
      steps.push({type:'word_position', word:w});
    } else {
      steps.push({type:'pinyin_type', word:w});
    }
  });

  // One context step
  if (nw.length > 0) {
    steps.push({type: ln % 2 === 0 ? 'tf_sentence' : 'listen_pick',
      word:nw[0], distractors:buildDistractors(nw[0],allWords,2), pool:allWords});
  }

  // Review — rotate types
  const reviewTypePool = shuffle(['mcq_meaning','mcq_hanzi','tf_sentence','pinyin_type']);
  shuffle([...rw]).slice(0,3).forEach((w,i) => {
    const type = reviewTypePool[i % reviewTypePool.length];
    const d = buildDistractors(w, allWords, 2);
    steps.push({type, word:w, distractors:d, pool:allWords});
  });

  // Match at end
  const matchWords = shuffle([...rw,...nw]).slice(0,4);
  if (matchWords.length >= 2) steps.push({type:'match', words:matchWords});

  // Dedupe: no word gets same type twice
  const seen = new Map();
  const deduped = [];
  for (const step of steps) {
    if (!step.word?.id) { deduped.push(step); continue; }
    if (!seen.has(step.word.id)) seen.set(step.word.id, new Set());
    const usedTypes = seen.get(step.word.id);
    if (!usedTypes.has(step.type)) { usedTypes.add(step.type); deduped.push(step); }
  }

  const cards = deduped.filter(s => s.type === 'word_card' || s.type === 'grammar');
  return [...cards, ...shuffle(deduped.filter(s => s.type !== 'word_card' && s.type !== 'grammar'))].filter(Boolean);
}

function buildCheckpointSteps(plan) {
  const allWords = _wordCache[plan.levelNum] || [];
  // Pull recent words: last 3 lesson blocks = ~12 words
  const recentStart = Math.max(0, allWords.length - 16);
  const pool = allWords.slice(recentStart);
  const words = pool.length >= 4 ? pool : allWords.slice(0, 8);
  let s = [];
  // LISTENING section
  words.slice(0,4).forEach(w => {
    const d = buildDistractors(w, allWords, 2);
    s.push({type:'tf_sentence', word:w, pool:allWords, section:'listen'});
    s.push({type:'mcq_meaning', word:w, distractors:d, pool:allWords, section:'listen'});
  });
  // READING section
  words.slice(0,5).forEach(w => {
    const d = buildDistractors(w, allWords, 2);
    s.push({type:'mcq_hanzi', word:w, distractors:d, pool:allWords, section:'read'});
    s.push({type:'fill_blank', word:w, section:'read'});
  });
  // WRITING section
  words.slice(0,3).forEach(w => {
    s.push({type:'sentence_order', word:w, section:'write'});
    s.push({type:'word_position', word:w, section:'write'});
  });
  s.push({type:'match', words:shuffle([...words]).slice(0,4), section:'write'});
  return s.filter(Boolean);
}

function buildSpeedSteps(plan) {
  const allWords = _wordCache[plan.levelNum] || [];
  const pool = plan.newWords?.length > 0 ? plan.newWords : allWords.slice(0, 8);
  let s = [];
  pool.forEach(w => {
    const d = buildDistractors(w, allWords, 2);
    s.push({type:'mcq_meaning', word:w, distractors:d, pool:allWords, speed:true});
    s.push({type:'mcq_hanzi',  word:w, distractors:d, pool:allWords, speed:true});
  });
  return shuffle(s).filter(Boolean);
}



function renderStep(idx) {
  if (idx >= steps.length) { showComplete(); return; }
  answeredStep = false;
  matchState = null;
  wordBankState = null;
  clearInterval(speedTimer);

  const step = steps[idx];
  stepArea.className = 'step-area step-in';
  bottomArea.innerHTML = '';
  updateProgress();

  // Update info bar section indicator
  const sectionColors = { listen:'var(--blue)', read:'var(--green)', write:'var(--purple)' };
  const sectionLabels = { listen:'🎧 Listening', read:'📖 Reading', write:'✍️ Writing' };
  if (step.section) {
    document.getElementById('info-type').style.background = `rgba(${step.section === 'listen' ? '96,165,250' : step.section === 'read' ? '61,219,122' : '167,139,250'},.1)`;
    document.getElementById('info-type').textContent = sectionLabels[step.section] + (lesson.plan.isCheckpoint ? ' · Checkpoint' : '');
  }

  switch (step.type) {
    case 'word_card':     renderWordCard(step); break;
    case 'grammar':       renderGrammar(step); break;
    case 'mcq_meaning':   renderMCQ(step, 'meaning'); break;
    case 'mcq_hanzi':     renderMCQ(step, 'hanzi'); break;
    case 'tf_sentence':   renderTrueFalse(step, false); break;
    case 'listen_tf':     renderListenTF(step); break;
    case 'fill_blank':    renderFillBlank(step); break;
    case 'sentence_order':renderSentenceOrder(step); break;
    case 'match':         renderMatch(step); break;
    case 'error_correction': renderErrorCorrection(step); break;
    case 'reading_passage':  renderReadingPassage(step); break;
    case 'pinyin_type':      renderPinyinType(step); break;
    case 'listen_sentence':  renderListenSentence(step); break;
    case 'translate_order':  renderTranslateOrder(step); break;
    case 'word_position':      renderWordPosition(step); break;
    case 'sentence_placement': renderSentencePlacement(step); break;
    case 'audio_char':    renderAudioChar(step); break;
    case 'listen_pick':   renderListenPick(step); break;
    case 'sentence_build':renderSentenceBuild(step); break;
    case 'fill_blank_hc': renderFillBlankHC(step); break;
    case 'error_hc':      renderErrorHC(step); break;
    case 'dictation':     renderDictation(step); break;
    case 'timed_recall':  renderTimedRecall(step); break;
    case 'hanzi_write':   renderHanziWrite(step); break;
    case 'context_pick':  renderContextPick(step); break;
    case 'translate_cn':  renderTranslateCN(step); break;
    case 'translate_en':  renderTranslateEN(step); break;
    case 'usage_pick':    renderUsagePick(step); break;
    default: nextStep();
  }

  if (step.speed) startSpeedTimer();
}

// ── WORD CARD
function renderWordCard(step) {
  const w = step.word;
  const AUDIO_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';

  stepArea.innerHTML = '';

  // Build card using DOM — NO inline onclick with Chinese strings
  const card = document.createElement('div');
  card.className = 'word-card';

  // Top row: hanzi + audio button
  const top = document.createElement('div');
  top.className = 'wc-top';
  const hanzi = document.createElement('div');
  hanzi.className = 'wc-hanzi';
  hanzi.textContent = w.zh;
  const ab = document.createElement('button');
  ab.className = 'btn-audio';
  ab.innerHTML = AUDIO_SVG;
  ab.addEventListener('click', function() { speak(w.zh); });
  top.appendChild(hanzi);
  top.appendChild(ab);
  card.appendChild(top);

  // Pinyin + meaning
  const py = document.createElement('div');
  py.className = 'wc-pinyin';
  py.textContent = w.py;
  card.appendChild(py);

  const mn = document.createElement('div');
  mn.className = 'wc-meaning';
  mn.textContent = w.en;
  card.appendChild(mn);

  // Example sentence
  if (w.ex) {
    const ex = document.createElement('div');
    ex.className = 'wc-example';

    const lbl = document.createElement('div');
    lbl.className = 'ex-label';
    lbl.textContent = 'Example';

    const zhRow = document.createElement('div');
    zhRow.className = 'ex-zh';
    const zhTxt = document.createElement('span');
    zhTxt.textContent = w.ex.zh + ' ';
    const ab2 = document.createElement('button');
    ab2.className = 'btn-audio';
    ab2.style.cssText = 'display:inline-flex;width:22px;height:22px';
    ab2.innerHTML = AUDIO_SVG;
    ab2.addEventListener('click', function() { speak(w.ex.zh); });
    zhRow.appendChild(zhTxt);
    zhRow.appendChild(ab2);

    const pyRow = document.createElement('div');
    pyRow.className = 'ex-py';
    pyRow.textContent = w.ex.py;

    const enRow = document.createElement('div');
    enRow.className = 'ex-en';
    enRow.textContent = w.ex.en;

    ex.appendChild(lbl);
    ex.appendChild(zhRow);
    ex.appendChild(pyRow);
    ex.appendChild(enRow);
    card.appendChild(ex);
  }

  stepArea.appendChild(card);
  speak(w.zh);
  bottomArea.innerHTML = '<button class="btn-primary" onclick="nextStep()">Got it →</button>';
}

// ── MCQ
function renderMCQ(step, mode) {
  const w = step.word;
  const pool = step.pool || [];
  let question, options, correct;

  if (mode === 'meaning') {
    question = `What does <span class="zh">${w.zh}</span> mean?`;
    correct  = w.en;
    const wrong = getDistractors(w, pool, 'en', 3).map(d => d.en);
    options = shuffle([correct, ...wrong]);
  } else {
    question = `How do you write <em style="color:var(--green);font-style:normal">"${w.en}"</em> in Chinese?`;
    correct  = w.zh;
    const wrong = getDistractors(w, pool, 'zh', 3).map(d => d.zh);
    options = shuffle([correct, ...wrong]);
  }

  const section = step.section || '';
  const sectionClass = section === 'listen' ? 'listen' : section === 'write' ? 'write' : 'read';
  const sectionLabel = section === 'listen' ? '🎧 Listening' : section === 'write' ? '✍️ Writing' : '📖 Reading';

  stepArea.innerHTML = `
    <div class="q-label ${sectionClass}">${sectionLabel}</div>
    <div class="q-text">${question}</div>
    <div class="options-grid" id="opts"></div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;

  const grid = document.getElementById('opts');
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = mode === 'hanzi' ? `<span style="font-family:'Noto Sans SC',sans-serif;font-size:22px">${opt}</span>` : opt;
    btn.addEventListener('click', () => {
      if (answeredStep) return;
      answeredStep = true;
      clearInterval(speedTimer);
      consumeEnergy();
      const isCorrect = opt === correct;
      grid.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
      btn.classList.add(isCorrect ? 'correct' : 'wrong');
      if (!isCorrect) {
        grid.querySelectorAll('.opt-btn').forEach(b => { if (b.innerHTML.includes(correct) || b.textContent.trim() === correct) b.classList.add('correct'); });
        loseHeart();
        sessionMistakes.push({ word: w, type: mode });
        addToRetry(step);
      } else {
        sessionXP += step.speed ? 2 : 1;
      }
      showFeedback(isCorrect, w);
      if (step.section) updateCheckpointScore(step.section, isCorrect);
      handleAnswer(isCorrect, w);
      const nextBtn = document.createElement('button');
      nextBtn.className = 'btn-primary';
      nextBtn.textContent = isCorrect ? 'Continue →' : 'I understand →';
      nextBtn.addEventListener('click', nextStep);
      bottomArea.innerHTML = '';
      bottomArea.appendChild(nextBtn);
    });
    grid.appendChild(btn);
  });
}

// ── TRUE/FALSE
// _tfCorrect/_tfHint as module vars — no onclick string escaping needed
let _tfCorrect = "";
let _tfHint    = "";

function renderTrueFalse(step, isListen) {
  const w    = step.word;
  const pool = (step.pool || _wordCache[lesson.plan.levelNum] || []).filter(x => x.zh !== w.zh);
  const isTrue     = Math.random() > 0.5;
  const spokenWord = (isTrue || pool.length === 0) ? w : rand(pool);

  _tfCorrect = isTrue ? "对" : "错";
  _tfHint    = isTrue
    ? (w.zh + " = " + w.en)
    : (spokenWord.zh + ' means "' + spokenWord.en + '", not "' + w.en + '"');

  let questionHtml;
  if (isListen) {
    questionHtml =
      '<div class="q-label listen">🎧 Listening — True or False</div>' +
      '<div class="q-text">Does the spoken word mean: <span class="zh">' + w.en + '</span></div>';
  } else {
    questionHtml =
      '<div class="q-label read">📖 Reading — True or False</div>' +
      '<div class="q-text">Does <span class="zh">' + spokenWord.zh + '</span> mean "' + w.en + '"?</div>';
  }

  stepArea.innerHTML = questionHtml +
    '<div class="tf-grid">' +
      '<button class="tf-btn" id="btn-tf-true">✓ <span class="tf-label">对 (True)</span></button>' +
      '<button class="tf-btn" id="btn-tf-false">✗ <span class="tf-label">错 (False)</span></button>' +
    '</div>' +
    '<div class="feedback" id="feedback">' +
      '<div class="fb-icon"></div>' +
      '<div><div class="fb-main"></div><div class="fb-hint"></div></div>' +
    '</div>';

  document.getElementById("btn-tf-true").addEventListener("click",  function() { handleTF("对", this); });
  document.getElementById("btn-tf-false").addEventListener("click", function() { handleTF("错", this); });

  if (isListen) {
    speak(spokenWord.zh);
    const listenBtn = document.createElement("button");
    listenBtn.className = "btn-play-big";
    listenBtn.innerHTML = '<span class="play-icon">🔊</span> Tap to hear again';
    listenBtn.addEventListener("click", function() { speak(spokenWord.zh); });
    const tfGrid = stepArea.querySelector(".tf-grid");
    if (tfGrid) stepArea.insertBefore(listenBtn, tfGrid);
  }
}

function renderListenTF(step) { renderTrueFalse(step, true); }

function handleTF(chosen, btn) {
  if (answeredStep) return;
  answeredStep = true;
  clearInterval(speedTimer);
  const isCorrect = (chosen === _tfCorrect);
  const step      = steps[currentStep];
  const truBtn = document.getElementById("btn-tf-true");
  const flsBtn = document.getElementById("btn-tf-false");
  if (truBtn) truBtn.disabled = true;
  if (flsBtn) flsBtn.disabled = true;
  btn.classList.add(isCorrect ? "correct" : "wrong");
  consumeEnergy();
  if (!isCorrect) {
    const correctBtn = (_tfCorrect === "对") ? truBtn : flsBtn;
    if (correctBtn) correctBtn.classList.add("correct");
    loseHeart();
    sessionMistakes.push({ word: step.word, type: "tf" });
    addToRetry(step);
  } else {
    sessionXP += 1;
  }
  const fb = document.getElementById("feedback");
  if (fb) {
    fb.className = "feedback show " + (isCorrect ? "ok" : "err");
    fb.querySelector(".fb-icon").textContent = isCorrect ? "✓" : "✕";
    fb.querySelector(".fb-main").textContent = isCorrect ? "Correct!" : "Not quite";
    fb.querySelector(".fb-hint").textContent = _tfHint;
  }
  if (step.section) updateCheckpointScore(step.section, isCorrect);
  handleAnswer(isCorrect, step.word);
  const tfnb = document.createElement('button'); tfnb.className='btn-primary';
  tfnb.textContent = isCorrect ? 'Continue →' : 'I understand →';
  tfnb.addEventListener('click', nextStep);
  bottomArea.innerHTML=''; bottomArea.appendChild(tfnb);
}

}

// ══════════════════════════════════════════════════════════
// SENTENCE ORDER
// ══════════════════════════════════════════════════════════
function renderSentenceOrder(step) {
  const w = step.word;
  const ex = w.ex;
  if (!ex) { nextStep(); return; }
  const fullSentence = ex.zh;
  // Split into ~4 chunks
  const chunkSize = Math.ceil(fullSentence.length / 4);
  const chunks = [];
  for (let i = 0; i < fullSentence.length; i += chunkSize) {
    chunks.push(fullSentence.slice(i, i + chunkSize));
  }
  const shuffled = shuffle([...chunks]);
  wordBankState = { chunks, shuffled, placed: [], answer: fullSentence };
  // Store sentence words on step for multi-word SRS tracking
  const _soStep = steps[currentStep];
  if (_soStep) {
    const _soAllWords = _wordCache[lesson.plan.levelNum] || [];
    const _soRaw = fullSentence.replace(/[。！？，]/g,'').trim();
    const _soFound = _soAllWords
      .filter(wd => _soRaw.includes(wd.zh) && wd.zh.length >= 2)
      .sort((a,b) => b.zh.length - a.zh.length);
    _soStep.words = _soFound.length > 0 ? _soFound : [w];
  }

  stepArea.innerHTML = `
    <div class="q-label write">✍️ Build the Sentence</div>
    <div style="font-size:12px;color:var(--ink2);margin-bottom:4px">${ex.en}</div>
    <div class="sentence-display" id="sentence-display">
      <span style="color:var(--ink3);font-size:14px">Tap words in order</span>
    </div>
    <div class="word-chips" id="word-chips"></div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;
  renderChips();
}

function renderChips() {
  const chipsEl = document.getElementById('word-chips');
  const dispEl  = document.getElementById('sentence-display');
  if (!chipsEl || !dispEl) return;
  chipsEl.innerHTML = '';
  dispEl.innerHTML = wordBankState.placed.length
    ? wordBankState.placed.join('')
    : '<span style="color:var(--ink3);font-size:14px">Tap words in order</span>';

  if (wordBankState.placed.length > 0) {
    const clearBtn = document.createElement('button');
    clearBtn.style.cssText = 'background:none;border:none;color:var(--rose);font-size:11px;font-weight:700;cursor:pointer;margin-left:6px';
    clearBtn.textContent = '✕ Clear';
    clearBtn.onclick = () => { wordBankState.placed = []; renderChips(); };
    dispEl.appendChild(clearBtn);
  }

  wordBankState.shuffled.forEach(chunk => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (wordBankState.placed.includes(chunk) ? ' used' : '');
    chip.textContent = chunk;
    chip.onclick = () => {
      if (answeredStep || wordBankState.placed.includes(chunk)) return;
      wordBankState.placed.push(chunk);
      renderChips();
      // Show Check button when all chips placed
      if (wordBankState.placed.length === wordBankState.shuffled.length) {
        const ckBtn = document.createElement('button');
        ckBtn.className = 'btn-check';
        ckBtn.textContent = 'Check →';
        ckBtn.addEventListener('click', checkSentenceOrder);
        bottomArea.innerHTML = '';
        bottomArea.appendChild(ckBtn);
      } else {
        bottomArea.innerHTML = '';
      }
    };
    chipsEl.appendChild(chip);
  });
}

function checkSentenceOrder() {
  if (answeredStep) return;
  if (!wordBankState || wordBankState.placed.length !== wordBankState.shuffled.length) return;
  answeredStep = true;
  consumeEnergy();
  const built = wordBankState.placed.join('');
  const isCorrect = built === wordBankState.answer;
  const step = steps[currentStep];
  const dispEl = document.getElementById('sentence-display');
  if (!isCorrect) {
    loseHeart();
    sessionMistakes.push({ word: step.word, type:'sentence_order' });
    addToRetry(step);
    if (dispEl) dispEl.classList.add('wrong-border');
    handleAnswer(false, step.words || [step.word]);
    showFeedback(false, step.word, 'Wrong order', wordBankState.answer);
    setTimeout(() => {
      wordBankState.placed = [];
      answeredStep = false;
      if (dispEl) dispEl.classList.remove('wrong-border');
      renderChips();
      bottomArea.innerHTML = '';
    }, 1200);
    answeredStep = false;
  } else {
    sessionXP += 3;
    if (dispEl) { dispEl.classList.add('correct-border'); }
    showFeedback(true, step.word);
    if (step.section) updateCheckpointScore(step.section, true);
    handleAnswer(true, step.words || [step.word]);
    const nb = document.createElement('button'); nb.className='btn-primary';
    nb.textContent='Continue →'; nb.addEventListener('click', nextStep);
    bottomArea.innerHTML=''; bottomArea.appendChild(nb);
  }
}


// ══════════════════════════════════════════════════════════
// LISTENING SENTENCE — hear sentence, tap words to rebuild
// ══════════════════════════════════════════════════════════
function renderListenSentence(step) {
  const w = step.word;
  const ex = w.ex;
  if (!ex || !ex.zh) { nextStep(); return; }

  // Split sentence into individual Chinese words/chars (split at spaces or every 2-3 chars)
  const raw = ex.zh.replace(/[。！？，]/g,'').trim();
  // Create word tokens: prefer splitting by natural breaks
  let tokens = [];
  // Try to split into 3-5 meaningful chunks
  const allWords = _wordCache[lesson.plan.levelNum] || [];
  // Find words from this level that appear in the sentence
  const foundWords = allWords.filter(wd => raw.includes(wd.zh) && wd.zh.length >= 2)
    .sort((a,b) => b.zh.length - a.zh.length);
  let remaining = raw;
  const usedTokens = [];
  foundWords.forEach(fw => {
    if (remaining.includes(fw.zh)) {
      remaining = remaining.replace(fw.zh, '|' + fw.zh + '|');
      usedTokens.push(fw.zh);
    }
  });
  tokens = remaining.split('|').filter(t => t.trim().length > 0);
  if (tokens.length < 3) {
    // Fallback: split every 2 chars
    tokens = [];
    for (let i=0; i<raw.length; i+=2) tokens.push(raw.slice(i,i+2));
  }
  tokens = tokens.filter(t=>t.length>0);
  const shuffled = shuffle([...tokens]);
  listenSentState = { tokens, shuffled, placed: [], answer: tokens.join('') };
  // Store sentence words on step for multi-word SRS tracking
  const _step = steps[currentStep];
  if (_step) {
    const _sentenceWords = foundWords.filter(fw => raw.includes(fw.zh));
    _step.words = _sentenceWords.length > 0 ? _sentenceWords : [w];
  }

  stepArea.innerHTML = '';
  const lbl = document.createElement('div'); lbl.className='q-label listen'; lbl.textContent='🎧 Build what you hear';
  stepArea.appendChild(lbl);

  // Play button
  const playBtn = document.createElement('button');
  playBtn.className = 'ls-play-btn';
  playBtn.innerHTML = '<span style="font-size:20px">🔊</span> Tap to hear the sentence';
  playBtn.addEventListener('click', () => speak(ex.zh, 0.8));
  stepArea.appendChild(playBtn);

  // Build area
  const buildArea = document.createElement('div');
  buildArea.className = 'ls-build-area'; buildArea.id = 'ls-build';
  const placeholder = document.createElement('div');
  placeholder.className = 'ls-placeholder'; placeholder.id = 'ls-ph'; placeholder.textContent = 'Tap words below to build the sentence';
  buildArea.appendChild(placeholder);
  stepArea.appendChild(buildArea);

  // Word bank
  const bank = document.createElement('div'); bank.className = 'ls-word-bank'; bank.id = 'ls-bank';
  stepArea.appendChild(bank);

  // Feedback
  const fb = document.createElement('div'); fb.className='feedback'; fb.id='feedback';
  fb.innerHTML='<div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div>';
  stepArea.appendChild(fb);

  speak(ex.zh, 0.85);
  renderListenSentChips();
}

function renderListenSentChips() {
  const buildArea = document.getElementById('ls-build');
  const bank      = document.getElementById('ls-bank');
  const ph        = document.getElementById('ls-ph');
  if (!buildArea || !bank || !listenSentState) return;

  // Update build area
  if (ph) ph.style.display = listenSentState.placed.length ? 'none' : 'block';
  // Remove old placed chips
  buildArea.querySelectorAll('.ls-chip-placed').forEach(e=>e.remove());
  listenSentState.placed.forEach((tok, idx) => {
    const chip = document.createElement('div');
    chip.className = 'ls-chip-placed';
    chip.textContent = tok;
    chip.title = 'Tap to remove';
    chip.addEventListener('click', () => {
      listenSentState.placed.splice(idx,1);
      renderListenSentChips();
      bottomArea.innerHTML = '';
    });
    buildArea.appendChild(chip);
  });

  // Rebuild bank
  bank.innerHTML = '';
  listenSentState.shuffled.forEach(tok => {
    const chip = document.createElement('div');
    chip.className = 'ls-chip' + (listenSentState.placed.includes(tok) ? ' used' : '');
    chip.textContent = tok;
    chip.addEventListener('click', () => {
      if (answeredStep) return;
      // Allow same token twice if it appears twice (use count check)
      const usedCount = listenSentState.placed.filter(t=>t===tok).length;
      const totalCount = listenSentState.shuffled.filter(t=>t===tok).length;
      if (usedCount >= totalCount) return;
      listenSentState.placed.push(tok);
      renderListenSentChips();
      if (listenSentState.placed.length === listenSentState.shuffled.length) {
        const ckBtn = document.createElement('button');
        ckBtn.className = 'btn-check'; ckBtn.textContent = 'Check →';
        ckBtn.addEventListener('click', checkListenSentence);
        bottomArea.innerHTML = ''; bottomArea.appendChild(ckBtn);
      }
    });
    bank.appendChild(chip);
  });
}

function checkListenSentence() {
  if (answeredStep || !listenSentState) return;

// ── WORD POSITION EXERCISE ─────────────────────────────────────────────────
// Each hanzi character is a separate tile. User taps them into the answer slots.
function renderWordPosition(step) {
  const w = step.word;
  if (!w || !w.zh) { nextStep(); return; }

  const zh = w.zh;
  const chars = [...zh]; // split into individual characters
  if (chars.length < 2) { nextStep(); return; }

  // Build shuffled character bank
  const shuffled = shuffle([...chars]);
  wordBankState = { chars, shuffled, placed: Array(chars.length).fill(null) };

  // Difficulty: show pinyin hint for HSK 1-3, hide for HSK 4+
  const lvl = step.word?.id ? Number(step.word.id.split('-')[0]) : 1;
  const showHint = true; // always show pinyin

  stepArea.innerHTML = `
    <div class="q-label write">✍️ Build the Word</div>
    <div style="font-size:13px;color:var(--ink2);margin-bottom:8px">${w.en}</div>
    ${showHint ? `<div style="font-size:12px;color:var(--blue);margin-bottom:8px;letter-spacing:1px">${w.py}</div>` : ''}
    <div class="wp-slots" id="wp-slots"></div>
    <div style="font-size:11px;color:var(--ink3);margin:8px 0 4px">Tap a character to place it</div>
    <div class="wp-bank" id="wp-bank"></div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;

  renderWPTiles();

  // Check button
  const checkBtn = document.createElement('button');
  checkBtn.className = 'btn-check';
  checkBtn.id = 'check-btn';
  checkBtn.textContent = 'Check';
  checkBtn.disabled = true;
  checkBtn.onclick = checkWordPosition;
  bottomArea.appendChild(checkBtn);
}

function renderWPTiles() {
  const slotsEl = document.getElementById('wp-slots');
  const bankEl  = document.getElementById('wp-bank');
  if (!slotsEl || !bankEl) return;

  const { chars, placed, shuffled } = wordBankState;

  // Render answer slots
  slotsEl.innerHTML = '';
  chars.forEach((_, i) => {
    const slot = document.createElement('div');
    slot.className = 'wp-slot' + (placed[i] ? ' filled' : '');
    slot.textContent = placed[i] || '';
    slot.dataset.idx = i;
    if (placed[i]) {
      slot.onclick = () => {
        // Return char to bank
        wordBankState.placed[i] = null;
        renderWPTiles();
        updateWPCheck();
      };
    }
    slotsEl.appendChild(slot);
  });

  // Render character bank (used chars greyed out)
  bankEl.innerHTML = '';
  const usedChars = [...wordBankState.placed.filter(Boolean)];
  shuffled.forEach((ch, si) => {
    // Count how many times this char is already placed
    const needed = wordBankState.placed.filter(p => p === ch).length;
    const inBank = shuffled.filter((c,i) => c === ch && i <= si).length;
    const alreadyUsed = usedChars.filter(u => u === ch).splice(0, 1);
    if (alreadyUsed.length > 0) { usedChars.splice(usedChars.indexOf(ch), 1); }

    const isUsed = alreadyUsed.length > 0;
    const tile = document.createElement('div');
    tile.className = 'wp-tile' + (isUsed ? ' used' : '');
    tile.textContent = ch;
    tile.dataset.si = si;
    if (!isUsed) {
      tile.onclick = () => {
        // Place in first empty slot
        const emptyIdx = wordBankState.placed.findIndex(p => p === null);
        if (emptyIdx >= 0) {
          wordBankState.placed[emptyIdx] = ch;
          renderWPTiles();
          updateWPCheck();
        }
      };
    }
    bankEl.appendChild(tile);
  });
}

function updateWPCheck() {
  const btn = document.getElementById('check-btn');
  if (!btn) return;
  const allFilled = wordBankState.placed.every(p => p !== null);
  btn.disabled = !allFilled;
}

function checkWordPosition() {
  if (answeredStep) return;
  const { chars, placed } = wordBankState;
  const isCorrect = chars.every((ch, i) => placed[i] === ch);
  consumeEnergy();
  if (isCorrect) {
    answeredStep = true;
    sessionXP += 3;
    const step = steps[currentStep];
    handleAnswer(true, step?.words || [step?.word]);
    showFeedback(true, null);
    bottomArea.innerHTML = '<button class="btn-primary" onclick="nextStep()">Continue →</button>';
  } else {
    // Reset placed so they can try again
    wordBankState.placed = Array(chars.length).fill(null);
    const step = steps[currentStep];
    handleAnswer(false, step?.words || [step?.word]);
    loseHeart();
    showFeedback(false, null, chars.join(''));
    renderWPTiles();
    const btn = document.getElementById('check-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Check'; }
    setTimeout(() => {
      const fb = document.getElementById('feedback');
      if (fb) fb.className = 'feedback';
    }, 1500);
  }
}



// ══════════════════════════════════════════════════════════
// SENTENCE PLACEMENT — Which sentence correctly uses this word?
// Shows 4 complete sentences. Only one uses the word correctly.
// Perfect for adverbs (再,也,都), prepositions (在,从,对), adjectives.
// ══════════════════════════════════════════════════════════
function renderSentencePlacement(step) {
  const w = step.word;
  if (!w || !w.ex || !w.ex.zh) { nextStep(); return; }

  const correctSentence = w.ex.zh;
  const targetWord      = w.zh;
  const allWords        = step.pool || [];

  // Build 3 wrong sentences: take the correct sentence and move the target
  // word to wrong positions within it
  const chars = [...correctSentence];

  // Find where the target word is in the correct sentence
  const tChars = [...targetWord];
  let targetIdx = -1;
  for (let i = 0; i <= chars.length - tChars.length; i++) {
    if (tChars.every((ch, j) => chars[i + j] === ch)) { targetIdx = i; break; }
  }

  // If can't find it, fallback
  if (targetIdx < 0) { nextStep(); return; }

  // Generate wrong sentences by moving the target word to different positions
  const wrongSentences = [];
  const sentWithout = [...chars.slice(0, targetIdx), ...chars.slice(targetIdx + tChars.length)];
  const positions = [];

  // Pick 3 wrong insertion positions (different from correct)
  const len = sentWithout.length;
  const candidatePositions = [];
  for (let i = 0; i <= len; i++) {
    if (i !== targetIdx) candidatePositions.push(i);
  }
  const wrongPositions = shuffle(candidatePositions).slice(0, 3);

  wrongPositions.forEach(pos => {
    const arr = [...sentWithout];
    arr.splice(pos, 0, ...tChars);
    wrongSentences.push(arr.join(''));
  });

  // Build 4 options: 1 correct + 3 wrong, shuffled
  const options = shuffle([
    { text: correctSentence, correct: true },
    ...wrongSentences.map(s => ({ text: s, correct: false }))
  ]);

  stepArea.innerHTML = `
    <div class="q-label write">📍 Which sentence is correct?</div>
    <div style="font-size:13px;color:var(--ink2);margin-bottom:6px">Which one correctly uses:</div>
    <div style="font-size:22px;font-weight:800;color:#a78bfa;padding:8px 14px;background:rgba(167,139,250,.12);border-radius:10px;display:inline-block;margin-bottom:14px;letter-spacing:2px">${targetWord} <span style="font-size:13px;font-weight:400;color:var(--blue)">${w.py}</span> <span style="font-size:12px;font-weight:400;color:var(--ink2)">· ${w.en}</span></div>
    <div id="sp-options" style="display:flex;flex-direction:column;gap:10px"></div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;

  const optsEl = document.getElementById('sp-options');

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.style.cssText = 'background:var(--card2);border:2px solid var(--border2);border-radius:14px;padding:14px 16px;font-size:16px;color:var(--ink);text-align:left;cursor:pointer;width:100%;line-height:1.5;letter-spacing:.5px;transition:all .15s';

    // Highlight the target word in the sentence
    const highlighted = opt.text.replace(
      targetWord,
      `<span style="color:#a78bfa;font-weight:800">${targetWord}</span>`
    );
    btn.innerHTML = highlighted;

    btn.addEventListener('click', () => {
      if (answeredStep) return;
      answeredStep = true;
      consumeEnergy();

      // Disable all buttons
      optsEl.querySelectorAll('button').forEach(b => b.style.cursor = 'default');

      if (opt.correct) {
        btn.style.borderColor = 'var(--green)';
        btn.style.background  = 'rgba(61,219,122,.1)';
        sessionXP += 3;
        handleAnswer(true, step.words || [w]);
        showFeedback(true, null);
      } else {
        btn.style.borderColor = 'var(--rose)';
        btn.style.background  = 'rgba(248,113,113,.08)';
        loseHeart();
        handleAnswer(false, step.words || [w]);
        // Highlight correct answer
        optsEl.querySelectorAll('button').forEach((b, bi) => {
          if (options[bi].correct) {
            b.style.borderColor = 'var(--green)';
            b.style.background  = 'rgba(61,219,122,.1)';
          }
        });
        showFeedback(false, null, w.ex.en);
      }
      bottomArea.innerHTML = '<button class="btn-primary" onclick="nextStep()">Continue →</button>';
    });

    optsEl.appendChild(btn);
  });
}



// ══════════════════════════════════════════════════════════
// AUDIO CHAR — Hear audio → pick correct character/word
// ══════════════════════════════════════════════════════════
function renderAudioChar(step) {

  const opts = shuffle([w, ...step.distractors.slice(0,2)]);

// SENTENCE BUILD — Tap characters in correct order
// Each character is a separate tile
// ══════════════════════════════════════════════════════════
function renderSentenceBuild(step) {
  const sentence = step.sentence;
  if (!sentence) { nextStep(); return; }

  // Each character in the target sentence = one tile
  const targetChars = [...sentence];
  // Add up to 2 distractor characters
  const extras = (step.extras||[]).flatMap(tok => [...tok]).filter(ch => !targetChars.includes(ch)).slice(0,2);
  const allTiles = shuffle([...targetChars, ...extras]);

  wordBankState = { target: sentence, placed: [], allTiles };
  // Store sentence words on step for multi-word SRS tracking
  const _sbStep = steps[currentStep];
  if (_sbStep && _sbStep.word) {
    const _sbAllWords = _wordCache[lesson.plan.levelNum] || [];
    const _sbFound = _sbAllWords
      .filter(wd => sentence.includes(wd.zh) && wd.zh.length >= 2)
      .sort((a,b) => b.zh.length - a.zh.length);
    _sbStep.words = _sbFound.length > 0 ? _sbFound : [_sbStep.word];
  }

  stepArea.innerHTML = `
    <div class="q-label write">✍️ Build the Sentence</div>
    <div style="font-size:13px;color:var(--ink2);margin-bottom:4px">${step.word?.en || ''}</div>
    <div class="sentence-display" id="sentence-display">
      <span style="color:var(--ink3);font-size:14px">Tap characters in order</span>
    </div>
    <div class="wp-bank" id="tile-bank" style="margin-top:12px"></div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;

  renderBuildTiles();

  const checkBtn = document.createElement('button');
  checkBtn.className = 'btn-check'; checkBtn.id = 'check-btn';
  checkBtn.textContent = 'Check'; checkBtn.disabled = true;
  checkBtn.onclick = checkSentenceBuild;
  bottomArea.appendChild(checkBtn);
}

function renderBuildTiles() {
  const dispEl = document.getElementById('sentence-display');
  const bankEl = document.getElementById('tile-bank');
  if (!dispEl || !bankEl) return;
  const { placed, allTiles } = wordBankState;

  // Display area
  if (placed.length > 0) {
    dispEl.innerHTML = '';
    placed.forEach((ch, i) => {
      const sp = document.createElement('span');
      sp.style.cssText = 'display:inline-block;font-size:26px;font-weight:700;padding:4px 8px;margin:2px;background:rgba(61,219,122,.12);border-radius:8px;cursor:pointer;border:2px solid var(--green)';
      sp.textContent = ch;
      sp.onclick = () => { wordBankState.placed.splice(i,1); renderBuildTiles(); updateBuildCheck(); };
      dispEl.appendChild(sp);
    });
  } else {
    dispEl.innerHTML = '<span style="color:var(--ink3);font-size:14px">Tap characters in order</span>';
  }

  // Tile bank — track used count
  bankEl.innerHTML = '';
  const usedCounts = {};
  placed.forEach(ch => { usedCounts[ch] = (usedCounts[ch]||0) + 1; });
  const availCounts = {};
  allTiles.forEach(ch => { availCounts[ch] = (availCounts[ch]||0) + 1; });

  const shown = {};
  allTiles.forEach(ch => {
    if (shown[ch]) return;
    shown[ch] = true;
    const avail = (availCounts[ch]||0) - (usedCounts[ch]||0);
    for (let i = 0; i < (availCounts[ch]||0); i++) {
      const isUsed = i >= avail;
      const tile = document.createElement('div');
      tile.className = 'wp-tile' + (isUsed ? ' used' : '');
      tile.style.cssText = 'width:52px;height:52px;font-size:24px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;border-radius:12px;border:2px solid '+(isUsed?'var(--border)':'var(--border2)')+';background:var(--card);margin:4px;cursor:'+(isUsed?'default':'pointer')+';opacity:'+(isUsed?'.3':'1');
      tile.textContent = ch;
      if (!isUsed) tile.addEventListener('click', () => {
        wordBankState.placed.push(ch);
        renderBuildTiles();
        updateBuildCheck();
      });
      bankEl.appendChild(tile);
    }
  });
}

function updateBuildCheck() {
  const btn = document.getElementById('check-btn');
  if (!btn) return;
  const allFilled = wordBankState.placed.length === [...wordBankState.target].length;
  btn.disabled = !allFilled;
}

function checkSentenceBuild() {
  if (answeredStep) return;
  const { target, placed } = wordBankState;
  const built = placed.join('');
  const ok = built === target;
  const _sbWord = steps[currentStep]?.word;
  answeredStep = true;
  consumeEnergy();
  if (ok) {
    sessionXP += 4;
    handleAnswer(true, steps[currentStep]?.words || [_sbWord]);
    showFeedback(true, null);
    bottomArea.innerHTML = '<button class="btn-primary" onclick="nextStep()">Continue →</button>';
  } else {
    loseHeart();
    handleAnswer(false, steps[currentStep]?.words || [_sbWord]);
    wordBankState.placed = [];
    showFeedback(false, null, target);
    renderBuildTiles();
    const btn = document.getElementById('check-btn');
    if (btn) { btn.disabled = true; answeredStep = false; }
    setTimeout(() => {
      const fb = document.getElementById('feedback');
      if (fb) fb.className = 'feedback';
    }, 2000);
  }
}

function renderTranslateOrder(step) {
  const w = step.word;
  const ex = w.ex;
  if (!ex || !ex.zh) { nextStep(); return; }

  // Same tokenization as listen_sentence
  const raw = ex.zh.replace(/[。！？，]/g,'').trim();
  const allWords = _wordCache[lesson.plan.levelNum] || [];
  const foundWords = allWords.filter(wd => raw.includes(wd.zh) && wd.zh.length >= 2)
    .sort((a,b) => b.zh.length - a.zh.length);
  let remaining = raw;
  foundWords.forEach(fw => {
    if (remaining.includes(fw.zh)) remaining = remaining.replace(fw.zh, '|' + fw.zh + '|');
  });
  let tokens = remaining.split('|').filter(t=>t.trim().length>0);
  if (tokens.length < 3) {
    tokens = [];
    for (let i=0; i<raw.length; i+=2) tokens.push(raw.slice(i,i+2));
  }
  tokens = tokens.filter(t=>t.length>0);
  const shuffled = shuffle([...tokens]);
  listenSentState = { tokens, shuffled, placed: [], answer: tokens.join('') };
  // Store sentence words on step for multi-word SRS tracking
  const _toStep = steps[currentStep];
  if (_toStep) {
    const _toFound = foundWords.filter(fw => raw.includes(fw.zh));
    _toStep.words = _toFound.length > 0 ? _toFound : [w];
  }

  stepArea.innerHTML = '';
  const lbl = document.createElement('div'); lbl.className='q-label write'; lbl.textContent='✍️ Translate into Chinese';

  const buildArea = document.createElement('div');

  placeholder.className = 'ls-placeholder'; placeholder.id = 'ls-ph'; placeholder.textContent = 'Tap Chinese words to translate';

  stepArea.appendChild(bank);

  // Feedback
  const fb = document.createElement('div'); fb.className='feedback'; fb.id='feedback';
  fb.innerHTML='<div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div>';

// ══════════════════════════════════════════════════════════
// MATCHING
// ══════════════════════════════════════════════════════════
function renderMatch(step) {
  // Deduplicate by id and by english meaning to prevent duplicate pairs
  const seen = new Set();
  const deduped = (step.words || []).filter(Boolean).filter(w => {
    const key = w.id + '|' + w.en;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  }).slice(0, 4);
  const words = deduped;
  if (words.length < 2) { nextStep(); return; }
  const zhItems = shuffle(words.map(w => ({ text: w.zh, id: w.id, side:'zh' })));
  const enItems = shuffle(words.map(w => ({ text: w.en, id: w.id, side:'en' })));
  let selected = null;
  let matched  = new Set();

  stepArea.innerHTML = `
    <div class="q-label read">📖 Match the Words</div>
    <div class="match-grid" id="match-grid"></div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;

  const grid = document.getElementById('match-grid');
  const col1 = document.createElement('div');
  const col2 = document.createElement('div');
  col1.style.cssText = col2.style.cssText = 'display:flex;flex-direction:column;gap:8px';

  function makeItem(item) {
    const el = document.createElement('div');
    el.className = 'match-item' + (item.side === 'zh' ? ' zh' : '');
    el.dataset.id = item.id; el.dataset.side = item.side;
    el.textContent = item.text;
    el.onclick = () => {
      if (matched.has(item.id + item.side)) return;
      if (selected === null) {
        selected = { el, item }; el.classList.add('selected');
      } else {
        if (selected.item.side === item.side) {
          selected.el.classList.remove('selected');
          selected = { el, item }; el.classList.add('selected'); return;
        }
        const isCorrect = selected.item.id === item.id;
        if (isCorrect) {
          selected.el.classList.remove('selected');
          selected.el.classList.add('matched'); el.classList.add('matched');
          matched.add(item.id + 'zh'); matched.add(item.id + 'en');
          sessionXP += 1;
          speak(words.find(w => w.id === item.id)?.zh || '');
          handleAnswer(true, words.find(w => w.id === item.id) || { id: item.id });
          if (matched.size === words.length * 2) {
            answeredStep = true;
            showFeedback(true, null);
            bottomArea.innerHTML = `<button class="btn-primary" onclick="nextStep()">Continue →</button>`;
          }
        } else {
          selected.el.classList.add('wrong-shake'); el.classList.add('wrong-shake');
          loseHeart();
          handleAnswer(false, words.find(w => w.id === item.id) || { id: item.id });
          setTimeout(() => { selected.el.classList.remove('selected','wrong-shake'); el.classList.remove('wrong-shake'); }, 400);
        }
        selected = null;
      }
    };
    return el;
  }
  zhItems.forEach(item => col1.appendChild(makeItem(item)));
  enItems.forEach(item => col2.appendChild(makeItem(item)));
  grid.appendChild(col1); grid.appendChild(col2);
}

  _tfCorrect = correct;
  _tfHint    = useWrong
    ? ('Should be: ' + sentence)

  stepArea.innerHTML = `

function stripTones(s) {
  return s.toLowerCase()
    .replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i')
    .replace(/[ōóǒò]/g,'o').replace(/[ūúǔùǖǘǚǜ]/g,'u')
    .replace(/\s+/g,' ').trim();
}

function checkPinyin() {
  if (answeredStep) return;
  const input = document.getElementById('py-input');
  if (!input) return;
  const w = steps[currentStep].word;
  const isCorrect = stripTones(input.value.trim()) === stripTones(w.py);
  answeredStep = true;
  input.classList.add(isCorrect ? 'ok' : 'err');
  input.disabled = true;
  consumeEnergy();
  if (!isCorrect) {
    loseHeart();
    sessionMistakes.push({ word: w, type:'pinyin' });

    sessionXP += 2;

  if (steps[currentStep].section) updateCheckpointScore(steps[currentStep].section, isCorrect);
  handleAnswer(isCorrect, steps[currentStep].word);

  pynb.addEventListener('click', nextStep);
  bottomArea.innerHTML=''; bottomArea.appendChild(pynb);
}

let _trTimer = null;

function renderTimedRecall(step) {
  const w = step.word;
  clearInterval(_trTimer);

  stepArea.innerHTML = '';
  const card = document.createElement('div');
  card.style.cssText = 'display:flex;flex-direction:column;gap:16px';

      <input class="typing-input" id="tr-input" type="text" placeholder="Type in Chinese…"

    </div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;
  stepArea.appendChild(card);

  const input = document.getElementById('tr-input');
  if (input) { input.focus(); input.addEventListener('keydown', e => { if(e.key==='Enter') submitTimedRecall(); }); }

  let left = 5;
  _trTimer = setInterval(() => {
    left = Math.max(0, left - 0.1);
    const pct = (left / 5) * 100;
    const te = document.getElementById('tr-timer');
    const be = document.getElementById('tr-bar');
    if (te) { te.textContent = Math.ceil(left); te.style.color = pct < 40 ? 'var(--rose)' : 'var(--gold)'; }
    if (be) { be.style.width = pct + '%'; be.style.background = pct < 40 ? 'var(--rose)' : 'var(--gold)'; }
    if (left <= 0) {
      clearInterval(_trTimer);
      if (!answeredStep) {
        answeredStep = true; consumeEnergy(); loseHeart();
        const w2 = steps[currentStep]?.word;
        if (w2) { sessionMistakes.push({word:w2,type:'timed_recall'}); addToRetry(steps[currentStep]); }
        const fb = document.getElementById('feedback');

        handleAnswer(false, w2);
        bottomArea.innerHTML=''; const btn=document.createElement('button'); btn.className='btn-primary'; btn.textContent='Next →';
        btn.addEventListener('click',nextStep); bottomArea.appendChild(btn);
      }
    }
  }, 100);

  bottomArea.innerHTML='';
  const btn=document.createElement('button'); btn.className='btn-primary'; btn.textContent='Submit →';
  btn.addEventListener('click', submitTimedRecall); bottomArea.appendChild(btn);
}

function renderContextPick(step) {

  const pool = step.pool || _wordCache[lesson?.plan?.levelNum] || [];
  const distractors = buildDistractors(w, pool, 3);

  bottomArea.innerHTML=''; const btn=document.createElement('button'); btn.className='btn-primary'; btn.textContent='Check →';
  btn.addEventListener('click', () => checkTranslateEN(answer, w)); bottomArea.appendChild(btn);
