<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080f0b;--bg2:#0c1610;--card:#111e16;--card2:#162218;
  --border:rgba(74,222,128,.12);--border2:rgba(74,222,128,.25);
  --green:#3ddb7a;--green2:#2ab862;--green-muted:rgba(61,219,122,.10);
  --gold:#f5c842;--gold-soft:rgba(245,200,66,.12);
  --silver:#cbd5e1;--bronze:#fb923c;
  --blue:#60a5fa;--blue-soft:rgba(96,165,250,.10);
  --rose:#f87171;--rose-soft:rgba(248,113,113,.10);
  --purple:#a78bfa;
  --ink:#e8f2ee;--ink2:#9ab8aa;--ink3:#4a6b5a;
  --nav-h:68px;--t:.22s cubic-bezier(.4,0,.2,1);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;padding-bottom:calc(var(--nav-h)+16px)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(74,222,128,.2);border-radius:3px}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:60;background:rgba(8,15,11,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;justify-content:center;padding:0 18px}
.header-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.header-title em{color:var(--green);font-style:normal}

/* ── TABS ── */
.tabs-wrap{position:sticky;top:64px;z-index:55;background:rgba(8,15,11,.96);backdrop-filter:blur(20px);padding:12px 16px;border-bottom:1px solid var(--border)}
.tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:4px;gap:3px}
.tab{flex:1;padding:9px 6px;border-radius:10px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:var(--ink3);cursor:pointer;transition:all var(--t);display:flex;align-items:center;justify-content:center;gap:5px;letter-spacing:.02em}
.tab.active{background:var(--green-muted);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.tab-dot{width:5px;height:5px;border-radius:50%;background:var(--green);display:none}
.tab.active .tab-dot{display:block}

/* ── VIEWS ── */
.view{display:none}.view.active{display:block}
.main{max-width:520px;margin:0 auto;padding:14px 16px 0;display:flex;flex-direction:column;gap:12px}

/* ── LEAGUE BANNER ── */
.league-banner{border-radius:18px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.lb-gold{background:linear-gradient(135deg,rgba(245,200,66,.15),rgba(245,200,66,.05));border:1.5px solid rgba(245,200,66,.35)}
.lb-silver{background:linear-gradient(135deg,rgba(203,213,225,.1),rgba(203,213,225,.04));border:1.5px solid rgba(203,213,225,.25)}
.lb-bronze{background:linear-gradient(135deg,rgba(251,146,60,.1),rgba(251,146,60,.04));border:1.5px solid rgba(251,146,60,.25)}
.lb-diamond{background:linear-gradient(135deg,rgba(96,165,250,.12),rgba(96,165,250,.04));border:1.5px solid rgba(96,165,250,.3)}
.league-left{}
.league-tag{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px}
.league-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;letter-spacing:-.3px}
.league-sub{font-size:11px;color:var(--ink2);margin-top:2px}
.league-icon{font-size:44px;filter:drop-shadow(0 0 16px rgba(245,200,66,.3))}

/* ── TIMER ── */
.timer-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.timer-left{display:flex;align-items:center;gap:10px}
.timer-icon{font-size:20px}
.timer-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:2px}
.timer-val{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--green)}
.timer-note{font-size:11px;color:var(--ink3)}

/* ── YOU CARD ── */
.you-card{background:var(--green-muted);border:1.5px solid rgba(74,222,128,.25);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.you-rank-box{background:rgba(74,222,128,.15);border-radius:10px;padding:8px 12px;text-align:center;flex-shrink:0}
.you-rank-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:1px}
.you-rank-num{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--green);line-height:1}
.you-info{flex:1;min-width:0}
.you-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:2px}
.you-name{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.you-xp{font-size:11px;color:var(--ink2);margin-top:2px}
.you-move{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:800;flex-shrink:0;padding:4px 8px;border-radius:999px}
.you-move.up{background:rgba(61,219,122,.12);color:var(--green)}
.you-move.down{background:var(--rose-soft);color:var(--rose)}
.you-move.same{background:var(--card2);color:var(--ink3)}

/* ── NEXT TARGET ── */
.next-target{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.next-target-icon{font-size:22px;flex-shrink:0}
.next-target-info{flex:1;min-width:0}
.next-target-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:2px}
.next-target-text{font-size:14px;font-weight:700;color:var(--ink)}
.next-target-sub{font-size:11px;color:var(--ink2);margin-top:1px}
.next-target-xp{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold);flex-shrink:0}

/* ── PODIUM ── */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:8px 0}
.podium-slot{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:120px;cursor:pointer;transition:transform var(--t)}
.podium-slot:hover{transform:translateY(-2px)}
.podium-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-size:18px;font-weight:900;position:relative;flex-shrink:0}
.p1 .podium-avatar{background:linear-gradient(135deg,rgba(245,200,66,.3),rgba(245,200,66,.1));border:2.5px solid rgba(245,200,66,.6);color:var(--gold);width:64px;height:64px;font-size:22px}
.p2 .podium-avatar{background:linear-gradient(135deg,rgba(203,213,225,.2),rgba(203,213,225,.05));border:2px solid rgba(203,213,225,.4);color:var(--silver)}
.p3 .podium-avatar{background:linear-gradient(135deg,rgba(251,146,60,.2),rgba(251,146,60,.05));border:2px solid rgba(251,146,60,.4);color:var(--bronze)}
.podium-crown{position:absolute;top:-14px;font-size:18px}
.podium-name{font-size:11px;font-weight:700;color:var(--ink);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;padding:0 4px}
.p1 .podium-name{font-size:12px;color:var(--gold)}
.podium-xp{font-size:10px;color:var(--ink3)}
.podium-base{font-size:18px}
.podium-bar{border-radius:8px 8px 0 0;width:100%}
.p1 .podium-bar{height:56px;background:linear-gradient(180deg,rgba(245,200,66,.2),rgba(245,200,66,.06));border:1px solid rgba(245,200,66,.2)}
.p2 .podium-bar{height:40px;background:rgba(203,213,225,.06);border:1px solid rgba(203,213,225,.15)}
.p3 .podium-bar{height:32px;background:rgba(251,146,60,.06);border:1px solid rgba(251,146,60,.15)}

/* ── SECTION HEADING ── */
.section-heading{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);padding:0 2px;display:flex;align-items:center;gap:8px}
.section-heading::after{content:'';flex:1;height:1px;background:var(--border)}
.danger-label{color:var(--rose)}
.danger-dot{width:6px;height:6px;border-radius:50%;background:var(--rose);animation:blink 1.2s ease infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LB ROW ── */
.lb-list{display:flex;flex-direction:column;gap:6px}
.lb-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all var(--t);position:relative;overflow:hidden}
.lb-row:hover{border-color:var(--border2);background:var(--card2);transform:translateX(2px)}
.lb-row.is-me{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.05)}
.lb-row.danger{border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.03)}
.lb-row.danger::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rose);border-radius:3px 0 0 3px}
.lb-row.is-me::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);border-radius:3px 0 0 3px}
.lb-rank{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:800;color:var(--ink3);width:28px;flex-shrink:0;text-align:center}
.lb-rank.r1{color:var(--gold)}.lb-rank.r2{color:var(--silver)}.lb-rank.r3{color:var(--bronze)}
.lb-avatar{width:36px;height:36px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:800;color:var(--ink2);flex-shrink:0}
.lb-row.is-me .lb-avatar{background:var(--green-muted);border-color:rgba(74,222,128,.35);color:var(--green)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.lb-row.is-me .lb-name{color:var(--green)}
.you-badge{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.2);border-radius:4px;padding:1px 5px;font-size:8px;font-weight:800;color:var(--green);letter-spacing:.06em}
.lb-sub{font-size:10px;color:var(--ink3);margin-top:1px}
.lb-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.lb-xp{font-size:12px;font-weight:700;color:var(--ink2)}
.lb-row.is-me .lb-xp{color:var(--green)}
.lb-move{font-size:10px;font-weight:800;padding:2px 6px;border-radius:999px}
.lb-move.up{background:rgba(61,219,122,.1);color:var(--green)}
.lb-move.down{background:var(--rose-soft);color:var(--rose)}
.lb-move.same{color:var(--ink3)}
.danger-warn{font-size:10px;color:var(--rose);font-weight:600;margin-top:2px}

/* ── GLOBAL LIST ── */
.global-stats{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-around}
.gs-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.gs-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--ink)}
.gs-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3)}
.gs-divider{width:1px;height:32px;background:var(--border)}
.gl-list{display:flex;flex-direction:column;gap:5px}
.gl-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all var(--t)}
.gl-row:hover{border-color:var(--border2);transform:translateX(2px)}
.gl-row.is-me{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.04)}
.gl-row.rank-1{border-color:rgba(245,200,66,.25)}
.gl-row.rank-2{border-color:rgba(203,213,225,.2)}
.gl-row.rank-3{border-color:rgba(251,146,60,.2)}
.gl-num{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:800;width:28px;flex-shrink:0;text-align:center;color:var(--ink3)}
.gl-num.g1{color:var(--gold)}.gl-num.g2{color:var(--silver)}.gl-num.g3{color:var(--bronze)}
.gl-avatar{width:32px;height:32px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--ink2);flex-shrink:0;font-family:'DM Sans',sans-serif}
.gl-row.is-me .gl-avatar{background:var(--green-muted);border-color:rgba(74,222,128,.3);color:var(--green)}
.gl-info{flex:1;min-width:0}
.gl-name{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gl-row.is-me .gl-name{color:var(--green)}
.gl-sub{font-size:10px;color:var(--ink3)}
.gl-xp{font-size:12px;font-weight:700;color:var(--ink2);flex-shrink:0}
.gl-row.is-me .gl-xp{color:var(--green)}
.gl-sep{text-align:center;color:var(--ink3);font-size:12px;padding:2px 0;letter-spacing:4px}

/* ── FRIENDS TAB ── */
.friends-header{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.social-counts{display:flex;gap:0}
.sc-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 16px;border-radius:10px;transition:background var(--t)}
.sc-item:hover{background:var(--card2)}
.sc-num{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--ink)}
.sc-lbl{font-size:10px;font-weight:700;color:var(--ink3)}
.sc-div{width:1px;background:var(--border);align-self:stretch}
.btn-find{background:var(--green);border:none;border-radius:999px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:#080f0b;cursor:pointer;transition:all var(--t);box-shadow:0 3px 12px rgba(61,219,122,.25);white-space:nowrap}
.btn-find:hover{background:var(--green2);transform:translateY(-1px)}
.gps-card{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.gps-icon{font-size:20px;flex-shrink:0}
.gps-info{flex:1;min-width:0}
.gps-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:1px}
.gps-sub{font-size:11px;color:var(--ink3)}
.btn-gps{background:var(--blue);border:none;border-radius:999px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:#06101e;cursor:pointer;transition:all var(--t);flex-shrink:0}
.btn-gps:hover{opacity:.85}
.btn-gps:disabled{opacity:.45;cursor:not-allowed}
.fr-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all var(--t);position:relative;overflow:hidden}
.fr-row:hover{border-color:var(--border2);transform:translateX(2px)}
.fr-row.is-me{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.04)}
.fr-row.rank-1::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:3px 0 0 3px}
.fr-row.rank-2::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--silver);border-radius:3px 0 0 3px}
.fr-row.rank-3::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--bronze);border-radius:3px 0 0 3px}
.fr-rank{font-size:14px;width:28px;flex-shrink:0;text-align:center}
.fr-avatar{width:36px;height:36px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--ink2);flex-shrink:0;font-family:'DM Sans',sans-serif}
.fr-row.is-me .fr-avatar{background:var(--green-muted);border-color:rgba(74,222,128,.3);color:var(--green)}
.fr-info{flex:1;min-width:0}
.fr-name{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fr-row.is-me .fr-name{color:var(--green)}
.fr-sub{font-size:10px;color:var(--ink3);margin-top:1px}
.fr-xp{font-size:12px;font-weight:700;color:var(--ink2);flex-shrink:0}
.fr-row.is-me .fr-xp{color:var(--green)}
.nearby-badge{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.2);border-radius:999px;padding:1px 6px;font-size:9px;font-weight:700;color:var(--blue);margin-left:4px}

/* ── FIND FRIENDS MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-sheet{background:var(--bg);border-radius:24px 24px 0 0;padding:0;max-height:90vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:999px;margin:14px auto 0}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--ink)}
.modal-close{background:var(--card);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--ink2);transition:all var(--t)}
.modal-close:hover{background:var(--card2)}
.modal-search{padding:12px 16px;border-bottom:1px solid var(--border)}
.search-input{width:100%;background:var(--card);border:1.5px solid var(--border2);border-radius:12px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:var(--ink);outline:none;caret-color:var(--green);transition:border-color var(--t)}
.search-input:focus{border-color:rgba(74,222,128,.4)}
.search-input::placeholder{color:var(--ink3);font-weight:400}
.modal-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.ff-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color var(--t)}
.ff-row:hover{border-color:var(--border2)}
.ff-avatar{width:38px;height:38px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--ink2);flex-shrink:0;font-family:'DM Sans',sans-serif}
.ff-info{flex:1;min-width:0}
.ff-name{font-size:13px;font-weight:700;color:var(--ink)}
.ff-meta{font-size:11px;color:var(--ink3);margin-top:1px}
.btn-follow{border-radius:999px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all var(--t);border:none;flex-shrink:0}
.btn-follow.follow{background:var(--green);color:#080f0b;box-shadow:0 2px 8px rgba(61,219,122,.2)}
.btn-follow.follow:hover{background:var(--green2)}
.btn-follow.following{background:var(--card2);border:1.5px solid var(--border2);color:var(--ink2)}
.btn-follow.following:hover{border-color:var(--rose);color:var(--rose)}

/* ── EMPTY / LOADING / ERROR ── */
.empty{text-align:center;padding:48px 24px;color:var(--ink2)}
.empty-emoji{font-size:44px;display:block;margin-bottom:12px}
.empty-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--ink);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--ink3);line-height:1.6}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:14px}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--green);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--ink3);font-weight:600}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(8,15,11,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 6px;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:8px 4px;cursor:pointer;text-decoration:none;border-radius:12px;transition:background var(--t);-webkit-tap-highlight-color:transparent}
.nav-item:hover{background:rgba(255,255,255,.04)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase}
.nav-item.active .nav-label{color:var(--green)}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 4px var(--green))}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border2);border-radius:999px;padding:9px 18px;font-size:13px;font-weight:700;color:var(--ink);opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-title">🏆 Leaderboard</div>
</header>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" id="tab-weekly"  onclick="switchTab('weekly')">
      <span>⚔️</span> Weekly <div class="tab-dot"></div>
    </button>
    <button class="tab" id="tab-global"  onclick="switchTab('global')">
      <span>🌍</span> Global <div class="tab-dot"></div>
    </button>
    <button class="tab" id="tab-friends" onclick="switchTab('friends')">
      <span>👥</span> Friends <div class="tab-dot"></div>
    </button>
  </div>
</div>

<!-- WEEKLY VIEW -->
<div class="view active" id="view-weekly">
  <div class="main" id="main-weekly">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Loading league…</div></div>
  </div>
</div>

<!-- GLOBAL VIEW -->
<div class="view" id="view-global">
  <div class="main" id="main-global">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Loading rankings…</div></div>
  </div>
</div>

<!-- FRIENDS VIEW -->
<div class="view" id="view-friends">
  <div class="main" id="main-friends">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Loading friends…</div></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item" href="/app/dashboard.html"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
  <a class="nav-item" href="/app/practice.html"><span class="nav-icon">⚡</span><span class="nav-label">Practice</span></a>
  <a class="nav-item active"><span class="nav-icon">🏆</span><span class="nav-label">Ranks</span></a>
  <a class="nav-item" href="/app/profile.html"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
</nav>

<!-- FIND FRIENDS MODAL -->
<div class="modal-overlay" id="ff-overlay" onclick="if(event.target===this)closeFindFriends()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">👥 Find Friends</div>
      <div class="modal-close" onclick="closeFindFriends()">✕</div>
    </div>
    <div class="modal-search">
      <input class="search-input" id="ff-input" type="text" placeholder="Search by username…"
        autocomplete="off" spellcheck="false"
        oninput="clearTimeout(_ffTimer);_ffTimer=setTimeout(()=>renderFFResults(this.value),250)"/>
    </div>
    <div class="modal-list" id="ff-list"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const sb = window._sb;
let _uid          = null;
let _username     = null;
let _myXP         = 0;
let allUsers      = [];
let followingIds  = new Set();
let activeTab     = 'weekly';
let globalLoaded  = false;
let friendsLoaded = false;
let userLat       = null;
let userLng       = null;
let _ffTimer      = null;
let _ffAll        = [];

function key(n) { return n + '_' + _uid; }

// ── TOAST
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── NAME
function displayName(u) {
  if (_uid && u.user_id === _uid && _username) return _username;
  if (u.username && u.username !== 'Learner') return u.username;
  return 'Learner ' + (u.user_id || '??????').slice(0,6).toUpperCase();
}
function initials(u) { return displayName(u).slice(0,2).toUpperCase(); }

// ── PROFILE NAV
function openProfile(userId) {
  if (!userId) return;
  if (userId === _uid) { window.location.href = '/app/profile.html'; return; }
  window.location.href = '/app/public_profile.html?uid=' + encodeURIComponent(userId) + '&from=' + encodeURIComponent('/app/leaderboard.html');
}

// ── TAB SWITCH
function switchTab(tab) {
  activeTab = tab;
  ['weekly','global','friends'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('view-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'global'  && !globalLoaded)  renderGlobal();
  if (tab === 'friends' && !friendsLoaded) loadFriends();
}

// ── LEAGUE
function getLeague(topXP) {
  if (topXP >= 500) return { name:'Diamond League', icon:'💎', cls:'lb-diamond', color:'var(--blue)' };
  if (topXP >= 200) return { name:'Gold League',    icon:'🏆', cls:'lb-gold',    color:'var(--gold)' };
  if (topXP >= 100) return { name:'Silver League',  icon:'🥈', cls:'lb-silver',  color:'var(--silver)' };
  return                   { name:'Bronze League',  icon:'🛡️', cls:'lb-bronze',  color:'var(--bronze)' };
}

// ── RANK MOVEMENT
function getRankMove(userId, currentRank) {
  const k = 'lb_rank_' + userId;
  const prev = localStorage.getItem(k);
  localStorage.setItem(k, String(currentRank));
  if (!prev) return { dir:'same', label:'NEW' };
  const diff = parseInt(prev) - currentRank;
  if (diff > 0) return { dir:'up',   label:'↑' + diff };
  if (diff < 0) return { dir:'down', label:'↓' + Math.abs(diff) };
  return               { dir:'same', label:'—' };
}

// ── TIMER
function startTimer() {
  function nextMonday() {
    const now = new Date(), day = now.getDay();
    const d = day === 1 ? 7 : (8 - day) % 7 || 7;
    const next = new Date(now);
    next.setDate(now.getDate() + d);
    next.setHours(0,0,0,0);
    return next;
  }
  function fmt(ms) {
    const t = Math.floor(ms/1000);
    const d = Math.floor(t/86400), h = Math.floor((t%86400)/3600), m = Math.floor((t%3600)/60), s = t%60;
    if (d > 0) return d + 'd ' + h + 'h left';
    if (h > 0) return h + 'h ' + m + 'm left';
    return m + 'm ' + s + 's left';
  }
  function tick() {
    const el = document.getElementById('timer-val');
    if (!el) return;
    const diff = nextMonday() - new Date();
    el.textContent = diff > 0 ? fmt(diff) : 'Resetting…';
  }
  tick();
  setInterval(tick, 1000);
}

// ══════════════════════════════════════════
// WEEKLY VIEW
// ══════════════════════════════════════════
function renderWeekly(users) {
  const main = document.getElementById('main-weekly');
  main.innerHTML = '';

  if (!users || users.length === 0) {
    main.innerHTML = '<div class="empty"><span class="empty-emoji">🚀</span><div class="empty-title">No players yet</div><div class="empty-sub">Complete a lesson to join the leaderboard!</div></div>';
    return;
  }

  const total      = users.length;
  const topXP      = users[0]?.xp || 0;
  const league     = getLeague(topXP);
  const dangerStart = Math.max(total - 5, 3);
  const myIdx      = users.findIndex(u => u.user_id === _uid);
  const myRank     = myIdx + 1;
  const myData     = myIdx >= 0 ? users[myIdx] : null;

  // League banner
  const banner = document.createElement('div');
  banner.className = 'league-banner ' + league.cls;
  banner.style.animation = 'fadeUp .3s ease both';
  banner.innerHTML =
    '<div class="league-left">' +
      '<div class="league-tag">Current League</div>' +
      '<div class="league-name" style="color:' + league.color + '">' + league.name + '</div>' +
      '<div class="league-sub">' + total + ' player' + (total!==1?'s':'') + ' competing</div>' +
    '</div>' +
    '<div class="league-icon">' + league.icon + '</div>';
  main.appendChild(banner);

  // Timer
  const timerEl = document.createElement('div');
  timerEl.className = 'timer-card';
  timerEl.innerHTML =
    '<div class="timer-left">' +
      '<div class="timer-icon">⏳</div>' +
      '<div><div class="timer-label">Resets In</div><div class="timer-val" id="timer-val">…</div></div>' +
    '</div>' +
    '<div class="timer-note">League resets every Monday</div>';
  main.appendChild(timerEl);
  startTimer();

  // You card
  if (_uid) {
    const move   = myData ? getRankMove(_uid, myRank) : { dir:'same', label:'—' };
    const youEl  = document.createElement('div');
    youEl.className = 'you-card';
    if (myData) {
      youEl.innerHTML =
        '<div class="you-rank-box"><div class="you-rank-label">Rank</div><div class="you-rank-num">#' + myRank + '</div></div>' +
        '<div class="you-info"><div class="you-tag">You</div><div class="you-name">' + displayName(myData) + '</div><div class="you-xp">⚡ ' + (myData.xp||0) + ' XP</div></div>' +
        '<div class="you-move ' + move.dir + '">' + move.label + '</div>';
    } else {
      youEl.innerHTML =
        '<div class="you-rank-box"><div class="you-rank-label">Rank</div><div class="you-rank-num">—</div></div>' +
        '<div class="you-info"><div class="you-tag">You</div><div class="you-name">' + (_username||'You') + '</div><div class="you-xp">Complete a lesson to rank up!</div></div>';
    }
    main.appendChild(youEl);

    // Next target
    if (myData && myRank > 1) {
      const above = users[myIdx - 1];
      const need  = (above.xp||0) - (myData.xp||0) + 1;
      const tEl = document.createElement('div');
      tEl.className = 'next-target';
      tEl.innerHTML =
        '<div class="next-target-icon">🎯</div>' +
        '<div class="next-target-info">' +
          '<div class="next-target-label">Next Target</div>' +
          '<div class="next-target-text">Beat ' + displayName(above) + '</div>' +
          '<div class="next-target-sub">' + need + ' XP needed · they have ' + (above.xp||0) + ' XP</div>' +
        '</div>' +
        '<div class="next-target-xp">+' + need + '</div>';
      main.appendChild(tEl);
    } else if (myData && myRank === 1) {
      const tEl = document.createElement('div');
      tEl.className = 'next-target';
      tEl.innerHTML = '<div class="next-target-icon">👑</div><div class="next-target-info"><div class="next-target-label">You\'re #1</div><div class="next-target-text">Defend your throne!</div></div>';
      main.appendChild(tEl);
    }
  }

  // Podium (top 3)
  if (total >= 2) {
    const podiumEl = document.createElement('div');
    podiumEl.className = 'podium';
    const slots = total >= 3
      ? [ {u:users[1],r:2,cls:'p2'}, {u:users[0],r:1,cls:'p1'}, {u:users[2],r:3,cls:'p3'} ]
      : [ {u:users[0],r:1,cls:'p1'}, {u:users[1],r:2,cls:'p2'} ];
    slots.forEach(s => {
      const isMe = s.u.user_id === _uid;
      const slot = document.createElement('div');
      slot.className = 'podium-slot ' + s.cls;
      slot.onclick = () => openProfile(s.u.user_id);
      const medals = ['','🥇','🥈','🥉'];
      slot.innerHTML =
        '<div class="podium-bar"></div>' +
        '<div class="podium-avatar">' + (s.r===1?'<div class="podium-crown">👑</div>':'') + initials(s.u) + '</div>' +
        '<div class="podium-name">' + displayName(s.u) + (isMe?' 👤':'') + '</div>' +
        '<div class="podium-xp">⚡ ' + (s.u.xp||0) + '</div>' +
        '<div class="podium-base">' + medals[s.r] + '</div>';
      podiumEl.appendChild(slot);
    });
    main.appendChild(podiumEl);
  }

  // Full ranked list (rank 4+)
  const listStart = Math.min(3, total);
  if (listStart < total) {
    const hEl = document.createElement('div');
    hEl.className = 'section-heading';
    hEl.textContent = 'All Rankings';
    main.appendChild(hEl);

    const list = document.createElement('div');
    list.className = 'lb-list';

    for (let i = listStart; i < total; i++) {
      const u      = users[i];
      const rank   = i + 1;
      const isMe   = u.user_id === _uid;
      const isDanger = i >= dangerStart;
      const move   = isMe ? getRankMove(_uid, rank) : null;

      if (i === dangerStart) {
        const dz = document.createElement('div');
        dz.className = 'section-heading danger-label';
        dz.innerHTML = '<div class="danger-dot"></div> Danger Zone — Bottom 5';
        list.appendChild(dz);
      }

      const row = document.createElement('div');
      row.className = 'lb-row' + (isDanger?' danger':'') + (isMe?' is-me':'');
      row.onclick = () => openProfile(u.user_id);

      const rankCls = rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
      row.innerHTML =
        '<div class="lb-rank ' + rankCls + '">#' + rank + '</div>' +
        '<div class="lb-avatar">' + initials(u) + '</div>' +
        '<div class="lb-info">' +
          '<div class="lb-name">' + displayName(u) + (isMe?'<span class="you-badge">YOU</span>':'') + '</div>' +
          '<div class="lb-sub">' + (rank<=10?'⚡ Top 10':'📚 Studying') + (isDanger&&!isMe?' · Danger zone':'') + '</div>' +
          (isDanger&&isMe?'<div class="danger-warn">⚠️ At risk of demotion!</div>':'') +
        '</div>' +
        '<div class="lb-right">' +
          '<div class="lb-xp">⚡ ' + (u.xp||0) + '</div>' +
          (move?'<div class="lb-move ' + move.dir + '">' + move.label + '</div>':'') +
        '</div>';
      list.appendChild(row);
    }
    main.appendChild(list);
  }

  if (_uid && !myData) {
    const nr = document.createElement('div');
    nr.style.cssText = 'text-align:center;padding:14px;font-size:13px;color:var(--ink2);background:var(--card);border-radius:12px;border:1px solid var(--border)';
    nr.innerHTML = 'Complete a lesson to claim your spot! 💪';
    main.appendChild(nr);
  }
}

// ══════════════════════════════════════════
// GLOBAL VIEW
// ══════════════════════════════════════════
function renderGlobal() {
  globalLoaded = true;
  const main = document.getElementById('main-global');
  main.innerHTML = '';

  const users = allUsers;
  if (!users || users.length === 0) {
    main.innerHTML = '<div class="empty"><span class="empty-emoji">🌍</span><div class="empty-title">No global data</div><div class="empty-sub">Be the first on the global leaderboard!</div></div>';
    return;
  }

  const myIdx  = users.findIndex(u => u.user_id === _uid);
  const myRank = myIdx + 1;
  const total  = users.length;

  // Stats bar
  const stats = document.createElement('div');
  stats.className = 'global-stats';
  stats.innerHTML =
    '<div class="gs-item"><div class="gs-val">' + total + '</div><div class="gs-lbl">Players</div></div>' +
    '<div class="gs-divider"></div>' +
    '<div class="gs-item"><div class="gs-val" style="color:var(--green)">' + (myRank>0?'#'+myRank:'—') + '</div><div class="gs-lbl">Your Rank</div></div>' +
    '<div class="gs-divider"></div>' +
    '<div class="gs-item"><div class="gs-val" style="color:var(--gold)">' + (users[0]?.xp||0) + '</div><div class="gs-lbl">Top XP</div></div>';
  main.appendChild(stats);

  const lbl = document.createElement('div');
  lbl.className = 'section-heading';
  lbl.textContent = 'All ' + total + ' Learners';
  main.appendChild(lbl);

  const list = document.createElement('div');
  list.className = 'gl-list';

  users.forEach((u, i) => {
    const rank = i + 1;
    const isMe = u.user_id === _uid;

    // Show top 5, user's context (+/-2), and last 2
    const showAlways = rank <= 5 || i >= total-2 || (myIdx >= 0 && Math.abs(i - myIdx) <= 2);
    if (!showAlways) {
      if (rank === 6 && myIdx > 7) {
        const sep = document.createElement('div');
        sep.className = 'gl-sep';
        sep.textContent = '· · ·';
        list.appendChild(sep);
      }
      return;
    }

    const row = document.createElement('div');
    let rc = 'gl-row';
    if (rank===1) rc+=' rank-1'; else if (rank===2) rc+=' rank-2'; else if (rank===3) rc+=' rank-3';
    if (isMe) rc+=' is-me';
    row.className = rc;
    row.onclick = () => openProfile(u.user_id);

    const numCls = rank===1?'g1':rank===2?'g2':rank===3?'g3':'';
    const rankTxt = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'#'+rank;
    const sub = rank===1?'👑 Champion':rank<=3?'🔥 Top 3':rank<=10?'⚡ Top 10':'📚 Studying';

    row.innerHTML =
      '<div class="gl-num ' + numCls + '">' + rankTxt + '</div>' +
      '<div class="gl-avatar">' + displayName(u).slice(0,2).toUpperCase() + '</div>' +
      '<div class="gl-info"><div class="gl-name">' + displayName(u) + (isMe?' 👤':'') + '</div><div class="gl-sub">' + sub + '</div></div>' +
      '<div class="gl-xp">⚡ ' + (u.xp||0) + '</div>';
    list.appendChild(row);
  });
  main.appendChild(list);
}

// ══════════════════════════════════════════
// FRIENDS VIEW
// ══════════════════════════════════════════
async function loadFriends() {
  friendsLoaded = true;
  const main = document.getElementById('main-friends');
  main.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">Loading friends…</div></div>';

  if (!_uid) {
    main.innerHTML = '<div class="empty"><span class="empty-emoji">🔒</span><div class="empty-title">Not logged in</div></div>';
    return;
  }

  try {
    const [{ data: follData }, { count: followerCount }, { count: followingCount }] = await Promise.all([
      sb.from('follows').select('following_id').eq('follower_id', _uid),
      sb.from('follows').select('*', { count:'exact', head:true }).eq('following_id', _uid),
      sb.from('follows').select('*', { count:'exact', head:true }).eq('follower_id', _uid),
    ]);

    followingIds = new Set((follData||[]).map(f => f.following_id));

    // Leaderboard for friends + self
    const ids = [...followingIds, _uid];
    const { data: frData } = await sb.from('leaderboard')
      .select('user_id,xp,username,lat,lng')
      .in('user_id', ids)
      .order('xp', { ascending:false });

    main.innerHTML = '';

    // Header
    const header = document.createElement('div');
    header.className = 'friends-header';
    header.innerHTML =
      '<div class="social-counts">' +
        '<div class="sc-item" onclick="openFindFriends()"><div class="sc-num">' + (followingCount||0) + '</div><div class="sc-lbl">Following</div></div>' +
        '<div class="sc-div"></div>' +
        '<div class="sc-item" onclick="openFindFriends()"><div class="sc-num">' + (followerCount||0) + '</div><div class="sc-lbl">Followers</div></div>' +
      '</div>' +
      '<button class="btn-find" onclick="openFindFriends()">👥 Find Friends</button>';
    main.appendChild(header);

    // GPS card
    const gps = document.createElement('div');
    gps.className = 'gps-card';
    gps.innerHTML =
      '<div class="gps-icon">📍</div>' +
      '<div class="gps-info"><div class="gps-title">Find nearby learners</div><div class="gps-sub" id="gps-sub">' + (userLat?'Location active':'Enable location to find people near you') + '</div></div>' +
      '<button class="btn-gps" id="btn-gps" onclick="requestGPS()" ' + (userLat?'disabled':'') + '>' + (userLat?'✅ On':'Enable') + '</button>';
    main.appendChild(gps);

    if (!frData || frData.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.innerHTML = '<span class="empty-emoji">👥</span><div class="empty-title">No friends yet</div><div class="empty-sub">Tap "Find Friends" to follow other learners!</div>';
      main.appendChild(empty);
      return;
    }

    const lbl = document.createElement('div');
    lbl.className = 'section-heading';
    lbl.textContent = 'Friends Leaderboard · ' + frData.length;
    main.appendChild(lbl);

    const list = document.createElement('div');
    list.className = 'lb-list';
    frData.forEach((u, i) => {
      const rank  = i + 1;
      const isMe  = u.user_id === _uid;
      const name  = displayName(u);
      const isNear = userLat && u.lat && u.lng && distKm(userLat,userLng,u.lat,u.lng) < 10;

      const row = document.createElement('div');
      let rc = 'fr-row';
      if (rank===1) rc+=' rank-1'; else if (rank===2) rc+=' rank-2'; else if (rank===3) rc+=' rank-3';
      if (isMe) rc+=' is-me';
      row.className = rc;
      row.onclick = () => openProfile(u.user_id);

      const medals = ['','🥇','🥈','🥉'];
      row.innerHTML =
        '<div class="fr-rank">' + (rank<=3?medals[rank]:'#'+rank) + '</div>' +
        '<div class="fr-avatar">' + name.slice(0,2).toUpperCase() + '</div>' +
        '<div class="fr-info">' +
          '<div class="fr-name">' + name + (isMe?' 👤':'') + (isNear?'<span class="nearby-badge">📍 Nearby</span>':'') + '</div>' +
          '<div class="fr-sub">' + (rank===1?'👑 Champion':rank<=3?'🔥 Top 3':'📚 Studying') + (isMe?' · You':'') + '</div>' +
        '</div>' +
        '<div class="fr-xp">⚡ ' + (u.xp||0) + '</div>';
      list.appendChild(row);
    });
    main.appendChild(list);

  } catch(e) {
    console.error('Friends error:', e);
    document.getElementById('main-friends').innerHTML = '<div class="empty"><span class="empty-emoji">⚠️</span><div class="empty-title">Could not load</div><div class="empty-sub">Check your connection and try again.</div></div>';
  }
}

// ── GPS
function distKm(lat1,lng1,lat2,lng2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function requestGPS() {
  const btn = document.getElementById('btn-gps');
  const sub = document.getElementById('gps-sub');
  if (btn) { btn.textContent='Locating…'; btn.disabled=true; }
  if (!navigator.geolocation) {
    if (sub) sub.textContent = 'GPS not supported on this device';
    if (btn) { btn.textContent='N/A'; }
    return;
  }
  navigator.geolocation.getCurrentPosition(async pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    if (sub) sub.textContent = 'Location active — showing nearby users';
    if (btn) { btn.textContent='✅ On'; }
    try {
      await sb.from('leaderboard').update({ lat:userLat, lng:userLng }).eq('user_id', _uid);
    } catch(e) {}
    friendsLoaded = false;
    loadFriends();
  }, () => {
    if (sub) sub.textContent = 'Location denied';
    if (btn) { btn.textContent='Denied'; btn.disabled=false; }
  }, { timeout:8000 });
}

// ══════════════════════════════════════════
// FIND FRIENDS MODAL
// ══════════════════════════════════════════
async function openFindFriends() {
  document.getElementById('ff-overlay').classList.add('show');
  setTimeout(() => document.getElementById('ff-input')?.focus(), 350);

  if (_ffAll.length === 0) {
    try {
      const { data } = await sb.from('leaderboard').select('user_id,username,xp').order('xp',{ascending:false});
      _ffAll = (data||[]).filter(u => u.user_id !== _uid);
      const { data: foll } = await sb.from('follows').select('following_id').eq('follower_id', _uid);
      followingIds = new Set((foll||[]).map(f => f.following_id));
    } catch(e) {}
  }
  renderFFResults('');
}

function closeFindFriends() {
  document.getElementById('ff-overlay').classList.remove('show');
}

function renderFFResults(query) {
  const list = document.getElementById('ff-list');
  if (!list) return;
  list.innerHTML = '';
  const q = query.toLowerCase().trim();
  const results = q
    ? _ffAll.filter(u => (u.username||'').toLowerCase().includes(q))
    : _ffAll.slice(0, 20);

  if (results.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:28px;color:var(--ink3);font-size:13px">No users found</div>';
    return;
  }

  results.forEach(u => {
    const isFollowing = followingIds.has(u.user_id);
    const name = displayName(u);
    const row = document.createElement('div');
    row.className = 'ff-row';
    row.onclick = e => { if (!e.target.classList.contains('btn-follow')) openProfile(u.user_id); };

    const avatar = document.createElement('div');
    avatar.className = 'ff-avatar';
    avatar.textContent = name.slice(0,2).toUpperCase();

    const info = document.createElement('div');
    info.className = 'ff-info';
    info.innerHTML = '<div class="ff-name">' + name + '</div><div class="ff-meta">⚡ ' + (u.xp||0) + ' XP</div>';

    const followBtn = document.createElement('button');
    followBtn.className = 'btn-follow ' + (isFollowing?'following':'follow');
    followBtn.textContent = isFollowing ? 'Following' : 'Follow';
    followBtn.addEventListener('click', function() { toggleFollow(u.user_id, this); });

    row.appendChild(avatar);
    row.appendChild(info);
    row.appendChild(followBtn);
    list.appendChild(row);
  });
}

async function toggleFollow(targetId, btn) {
  if (!_uid) return;
  const isFollowing = followingIds.has(targetId);
  btn.disabled = true;
  try {
    if (isFollowing) {
      await sb.from('follows').delete().eq('follower_id',_uid).eq('following_id',targetId);
      followingIds.delete(targetId);
      btn.textContent = 'Follow'; btn.className = 'btn-follow follow';
      showToast('Unfollowed');
    } else {
      await sb.from('follows').insert({ follower_id:_uid, following_id:targetId });
      followingIds.add(targetId);
      btn.textContent = 'Following'; btn.className = 'btn-follow following';
      showToast('✅ Following!');
    }
    friendsLoaded = false;
  } catch(e) { showToast('Error — try again'); }
  btn.disabled = false;
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init() {
  try {
    const { data } = await sb.auth.getSession();
    const user = data?.session?.user;
    if (user) {
      _uid = user.id;
      _username = localStorage.getItem('username_' + _uid)
        || user.user_metadata?.full_name
        || user.email?.split('@')[0]
        || null;
      _myXP = Number(localStorage.getItem('xp_' + _uid) || 0);
    }
  } catch(e) { console.warn('Auth:', e); }

  try {
    const { data, error } = await sb.from('leaderboard')
      .select('user_id,xp,username')
      .order('xp', { ascending:false });

    if (error || !data) {
      document.getElementById('main-weekly').innerHTML = '<div class="empty"><span class="empty-emoji">⚠️</span><div class="empty-title">Could not load</div><div class="empty-sub">Check your connection.</div></div>';
      return;
    }

    allUsers = data;

    // Patch current user's name locally if leaderboard has stale value
    if (_uid && _username) {
      const me = allUsers.find(u => u.user_id === _uid);
      if (me && (!me.username || me.username === 'Learner')) me.username = _username;
    }

    renderWeekly(allUsers);

  } catch(e) {
    document.getElementById('main-weekly').innerHTML = '<div class="empty"><span class="empty-emoji">⚠️</span><div class="empty-title">Error loading</div><div class="empty-sub">' + e.message + '</div></div>';
  }
}

init();
</script>
