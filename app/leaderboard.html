<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maobai — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:          #0f1923;
    --bg2:         #0d1720;
    --card:        #162235;
    --card2:       #1a2a3d;
    --border:      #1f3349;
    --border2:     #243d57;
    --green:       #4ade80;
    --green-dark:  #22c55e;
    --green-glow:  rgba(74,222,128,.28);
    --green-muted: rgba(74,222,128,.10);
    --text:        #e8f4ef;
    --text-mid:    #8fb3c4;
    --text-muted:  #5a7a8a;
    --gold:        #fbbf24;
    --silver:      #cbd5e1;
    --bronze:      #fb923c;
    --radius:      20px;
    --radius-sm:   12px;
    --t:           .2s cubic-bezier(.4,0,.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 48px;
  }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── HEADER ── */
  .header-outer {
    position: sticky; top: 0; z-index: 60;
    background: rgba(15,25,35,.96);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .header {
    max-width: 520px; margin: 0 auto;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px;
  }
  .btn-back {
    display: flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 999px; padding: 6px 14px 6px 10px;
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--text-mid); cursor: pointer; text-decoration: none;
    transition: background var(--t), border-color var(--t), color var(--t);
  }
  .btn-back:hover { background: var(--card2); border-color: var(--border2); color: var(--text); }
  .btn-back svg { width: 14px; height: 14px; }
  .header-title {
    font-family: 'Nunito', sans-serif;
    font-size: 18px; font-weight: 900;
    color: var(--text); letter-spacing: -.3px;
  }
  .header-spacer { width: 80px; }

  /* ── MAIN ── */
  .main {
    max-width: 520px; margin: 0 auto;
    padding: 24px 16px 0;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* ── USER CARD ── */
  .user-card {
    background: var(--card);
    border: 1.5px solid rgba(74,222,128,.25);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex; align-items: center; gap: 16px;
    position: relative; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(74,222,128,.06), 0 8px 32px rgba(74,222,128,.06);
    animation: fadeUp .4s ease both;
  }
  .user-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 0% 50%, rgba(74,222,128,.07) 0%, transparent 65%);
    pointer-events: none;
  }
  .user-rank-badge {
    width: 52px; height: 52px; border-radius: 14px;
    background: var(--green-muted);
    border: 1.5px solid rgba(74,222,128,.3);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .rank-label { font-size: 9px; font-weight: 900; color: rgba(74,222,128,.6); letter-spacing: .5px; }
  .rank-num   { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; color: var(--green); line-height: 1.1; }
  .user-info  { flex: 1; }
  .user-you   { font-size: 10px; font-weight: 800; color: var(--green); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 2px; }
  .user-name  { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900; color: var(--text); letter-spacing: -.1px; }
  .user-xp    { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .user-xp span { color: var(--green); font-weight: 700; }

  /* ── SECTION HEADING ── */
  .section-heading {
    font-family: 'Nunito', sans-serif;
    font-size: 11px; font-weight: 800;
    color: var(--text-muted); letter-spacing: .12em;
    text-transform: uppercase; padding: 0 2px;
    animation: fadeUp .4s ease .05s both;
  }

  /* ── LEADERBOARD LIST ── */
  .lb-list {
    display: flex; flex-direction: column; gap: 8px;
    animation: fadeUp .4s ease .08s both;
  }
  .lb-row {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    transition: border-color var(--t), background var(--t), transform var(--t);
    position: relative; overflow: hidden;
  }
  .lb-row:hover { background: var(--card2); transform: translateX(2px); }

  /* rank accent strips */
  .lb-row.rank-1 { border-color: rgba(251,191,36,.3); background: rgba(251,191,36,.03); }
  .lb-row.rank-1::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--gold); border-radius:3px 0 0 3px; }
  .lb-row.rank-2 { border-color: rgba(203,213,225,.2); background: rgba(203,213,225,.02); }
  .lb-row.rank-2::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--silver); border-radius:3px 0 0 3px; }
  .lb-row.rank-3 { border-color: rgba(251,146,60,.22); background: rgba(251,146,60,.02); }
  .lb-row.rank-3::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--bronze); border-radius:3px 0 0 3px; }

  /* current user */
  .lb-row.is-me { border-color: rgba(74,222,128,.28); background: rgba(74,222,128,.04); box-shadow: 0 0 0 1px rgba(74,222,128,.07); }
  .you-badge {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-family: 'Nunito', sans-serif; font-size: 9px; font-weight: 900;
    color: var(--green); letter-spacing: .1em;
    background: var(--green-muted); border: 1px solid rgba(74,222,128,.2);
    border-radius: 999px; padding: 2px 7px;
  }

  .lb-rank {
    width: 28px; flex-shrink: 0;
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900;
    text-align: center; line-height: 1;
  }
  .lb-rank.r1 { color: var(--gold); }
  .lb-rank.r2 { color: var(--silver); }
  .lb-rank.r3 { color: var(--bronze); }
  .lb-rank.rn { color: var(--text-muted); font-size: 11px; }

  .lb-medal { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }

  .lb-info { flex: 1; min-width: 0; }
  .lb-name {
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
    color: var(--text); letter-spacing: -.1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lb-row.is-me .lb-name { color: var(--green); }
  .lb-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .lb-xp {
    font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900;
    flex-shrink: 0; display: flex; align-items: center; gap: 3px;
    color: var(--text-mid);
  }
  .lb-xp .xi { font-size: 11px; }
  .lb-row.rank-1 .lb-xp { color: var(--gold); }
  .lb-row.rank-2 .lb-xp { color: var(--silver); }
  .lb-row.rank-3 .lb-xp { color: var(--bronze); }
  .lb-row.is-me  .lb-xp { color: var(--green); }

  /* ── DIVIDER ── */
  .divider {
    height: 1px; background: var(--border);
    margin: 4px 0; border-radius: 1px;
    opacity: .5;
  }

  /* ── NOT IN TOP 20 ── */
  .not-ranked {
    background: var(--card); border: 1px dashed var(--border2);
    border-radius: var(--radius-sm); padding: 14px 18px;
    font-size: 13px; color: var(--text-muted); text-align: center;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    animation: fadeUp .4s ease .14s both;
  }
  .not-ranked strong { color: var(--text); }

  /* ── REFRESH ── */
  .btn-refresh {
    align-self: center;
    display: flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 999px; padding: 8px 18px;
    font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800;
    color: var(--text-muted); cursor: pointer;
    transition: background var(--t), border-color var(--t), color var(--t);
    animation: fadeUp .4s ease .2s both;
  }
  .btn-refresh:hover:not(:disabled) { background: var(--card2); border-color: var(--green); color: var(--green); }
  .btn-refresh:disabled { opacity: .5; cursor: not-allowed; }
  .btn-refresh svg { width: 13px; height: 13px; }
  .btn-refresh.spinning svg { animation: spin .8s linear infinite; }

  /* ── LOADING ── */
  .loading-wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 24px; gap: 14px;
    animation: fadeUp .3s ease both;
  }
  .spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--border2); border-top-color: var(--green); animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-muted); font-family: 'Nunito', sans-serif; font-weight: 700; }

  /* ── EMPTY ── */
  .empty-wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 72px 24px; gap: 12px; text-align: center;
    animation: fadeUp .4s ease both;
  }
  .empty-emoji { font-size: 56px; }
  .empty-title { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; color: var(--text); }
  .empty-sub   { font-size: 13px; color: var(--text-muted); line-height: 1.6; max-width: 260px; }

  /* ── ERROR ── */
  .error-wrap {
    background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2);
    border-radius: var(--radius-sm); padding: 16px 18px;
    font-size: 13px; color: #f87171;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    text-align: center; animation: fadeUp .3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header-outer">
  <div class="header">
    <a class="btn-back" href="/app/dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back
    </a>
    <div class="header-title">🏆 Leaderboard</div>
    <div class="header-spacer"></div>
  </div>
</div>

<!-- MAIN -->
<main class="main" id="main">
  <div class="loading-wrap" id="initial-loader">
    <div class="spinner"></div>
    <div class="loading-text">Loading rankings…</div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── SUPABASE — use shared client (same as dashboard/lesson)
window._supabaseClient = window.supabase.createClient(
  "https://cuiznbvvlqtwcoocehnd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1aXpuYnZ2bHF0d2Nvb2NlaG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzI0NTUsImV4cCI6MjA4OTI0ODQ1NX0.QXAjvDdvih1ue1W8BaoqBfBr_fUJb9W5FYFZSC_JI8w"
);
const supabase = window._supabaseClient;

const main = document.getElementById("main");
let currentUserId = null;

// ── HELPERS
function medal(rank) {
  if (rank === 1) return "🥇";
  if (rank === 2) return "🥈";
  if (rank === 3) return "🥉";
  return "";
}
function rankClass(rank) {
  return rank <= 3 ? `rank-${rank}` : "";
}
function rankColor(rank) {
  if (rank === 1) return "r1";
  if (rank === 2) return "r2";
  if (rank === 3) return "r3";
  return "rn";
}
function displayName(id) {
  // Show first 6 chars of UUID as a short ID
  return "Learner " + id.slice(0, 6).toUpperCase();
}
function subLabel(rank) {
  if (rank === 1) return "👑 Champion";
  if (rank <= 3)  return "🔥 Top 3";
  if (rank <= 10) return "⚡ Top 10";
  return "📚 Studying";
}

// ── BUILD UI
function buildUI(top20, allUsers, userId) {
  main.innerHTML = "";

  const me        = allUsers.find(u => u.id === userId);
  const userRank  = allUsers.findIndex(u => u.id === userId) + 1;
  const inTop20   = top20.some(u => u.id === userId);

  // ── Your card
  if (me) {
    const card = document.createElement("div");
    card.className = "user-card";
    card.innerHTML = `
      <div class="user-rank-badge">
        <div class="rank-label">RANK</div>
        <div class="rank-num">${userRank > 0 ? "#" + userRank : "—"}</div>
      </div>
      <div class="user-info">
        <div class="user-you">Your standing</div>
        <div class="user-name">${displayName(me.id)}</div>
        <div class="user-xp"><span>${me.xp.toLocaleString()} XP</span></div>
      </div>
    `;
    main.appendChild(card);
  }

  // ── Empty state
  if (top20.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-wrap";
    empty.innerHTML = `
      <div class="empty-emoji">🚀</div>
      <div class="empty-title">Be the first!</div>
      <div class="empty-sub">No one on the leaderboard yet. Complete a lesson to claim the top spot!</div>
    `;
    main.appendChild(empty);
    return;
  }

  // ── Heading
  const heading = document.createElement("div");
  heading.className = "section-heading";
  heading.textContent = `Top ${top20.length} Learners`;
  main.appendChild(heading);

  // ── List
  const list = document.createElement("div");
  list.className = "lb-list";

  top20.forEach((u, i) => {
    const rank = i + 1;
    const isMe = u.id === userId;

    // Add divider after rank 3
    if (rank === 4) {
      const div = document.createElement("div");
      div.className = "divider";
      list.appendChild(div);
    }

    const row = document.createElement("div");
    row.className = `lb-row ${rankClass(rank)} ${isMe ? "is-me" : ""}`;
    row.innerHTML = `
      ${isMe ? '<div class="you-badge">YOU</div>' : ""}
      <div class="lb-rank ${rankColor(rank)}">${rank <= 3 ? "" : "#" + rank}</div>
      <div class="lb-medal">${medal(rank)}</div>
      <div class="lb-info">
        <div class="lb-name">${displayName(u.id)}</div>
        <div class="lb-sub">${subLabel(rank)}</div>
      </div>
      <div class="lb-xp"><span class="xi">⚡</span>${u.xp.toLocaleString()}</div>
    `;
    list.appendChild(row);
  });

  main.appendChild(list);

  // ── Not in top 20 message
  if (!inTop20 && me && userRank > 0) {
    const banner = document.createElement("div");
    banner.className = "not-ranked";
    banner.innerHTML = `You're ranked <strong>#${userRank}</strong> globally — keep studying to reach the top 20! 💪`;
    main.appendChild(banner);
  }

  // ── Refresh button
  const refreshBtn = document.createElement("button");
  refreshBtn.className = "btn-refresh";
  refreshBtn.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    Refresh
  `;
  refreshBtn.onclick = async () => {
    refreshBtn.classList.add("spinning");
    refreshBtn.disabled = true;
    await loadLeaderboard(currentUserId);
    refreshBtn.classList.remove("spinning");
    refreshBtn.disabled = false;
  };
  main.appendChild(refreshBtn);
}

// ── LOAD DATA — fetches all users from profiles, ordered by XP
async function loadLeaderboard(userId) {
  // Fix 2 — fallback timeout to prevent infinite loading spinner
  const timeoutId = setTimeout(() => {
    if (main.innerHTML.includes("Loading")) {
      main.innerHTML = `
        <div class="error-wrap">
          ⚠️ Loading took too long.<br>
          Possible database or permission issue.
        </div>
      `;
    }
  }, 5000);

  console.log("Loading leaderboard...");

  const { data, error } = await supabase
    .from('profiles')
    .select('id, xp')
    .order('xp', { ascending: false });

  clearTimeout(timeoutId);

  // Fix 1 — show error message instead of silent return
  if (error) {
    console.error(error);
    main.innerHTML = `
      <div class="error-wrap">
        ❌ Failed to load leaderboard<br><br>
        ${error.message}
      </div>
    `;
    return;
  }

  console.log("Leaderboard data:", data);

  if (!data || data.length === 0) {
    showEmptyState();
    return;
  }

  renderLeaderboard(data, userId);
}

function showEmptyState() {
  main.innerHTML = "";
  const empty = document.createElement("div");
  empty.className = "empty-wrap";
  empty.innerHTML = `
    <div class="empty-emoji">🚀</div>
    <div class="empty-title">Be the first!</div>
    <div class="empty-sub">No one on the leaderboard yet. Complete a lesson to claim the top spot!</div>
  `;
  main.appendChild(empty);
}

function renderLeaderboard(users, userId) {
  buildUI(users.slice(0, 20), users, userId);
}

// ── INIT
async function init() {
  try {
    const { data, error } = await supabase.auth.getSession();

    if (error || !data?.session) {
      window.location.href = "/auth/index.html";
      return;
    }

    const user = data.session.user;
    currentUserId = user.id;
    await loadLeaderboard(currentUserId);
  } catch(err) {
    console.error("Auth error:", err);
    main.innerHTML = `<div class="error-wrap">⚠️ Authentication failed. <a href="/auth/index.html" style="color:var(--green)">Sign in →</a></div>`;
  }
}

init();
</script>
</body>
</html>
