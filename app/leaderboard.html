<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080f0b;--bg2:#0c1610;--card:#111e16;--card2:#162218;
  --border:rgba(74,222,128,.12);--border2:rgba(74,222,128,.25);
  --green:#3ddb7a;--green2:#2ab862;--green-muted:rgba(61,219,122,.10);
  --gold:#f5c842;--gold-soft:rgba(245,200,66,.12);
  --silver:#cbd5e1;--bronze:#fb923c;
  --blue:#60a5fa;--blue-soft:rgba(96,165,250,.10);
  --rose:#f87171;--rose-soft:rgba(248,113,113,.10);
  --purple:#a78bfa;
  --ink:#e8f2ee;--ink2:#9ab8aa;--ink3:#4a6b5a;
  --nav-h:68px;--t:.22s cubic-bezier(.4,0,.2,1);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;padding-bottom:calc(var(--nav-h)+16px)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(74,222,128,.2);border-radius:3px}

/* HEADER */
.header{position:sticky;top:0;z-index:60;background:rgba(8,15,11,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;justify-content:center}
.header-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--ink)}
.header-title em{color:var(--green);font-style:normal}

/* TABS */
.tabs-wrap{position:sticky;top:64px;z-index:55;background:rgba(8,15,11,.96);backdrop-filter:blur(20px);padding:10px 14px;border-bottom:1px solid var(--border)}
.tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:3px;gap:2px}
.tab{flex:1;padding:8px 4px;border-radius:10px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;color:var(--ink3);cursor:pointer;transition:all var(--t);display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap}
.tab.active{background:var(--green-muted);color:var(--green);border:1px solid rgba(74,222,128,.2)}

/* VIEWS */
.view{display:none}.view.active{display:block}
.main{max-width:520px;margin:0 auto;padding:14px 14px 0;display:flex;flex-direction:column;gap:11px}

/* LEAGUE BANNER */
.league-banner{border-radius:18px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;animation:fadeUp .3s ease both}
.lb-gold{background:linear-gradient(135deg,rgba(245,200,66,.15),rgba(245,200,66,.04));border:1.5px solid rgba(245,200,66,.35)}
.lb-silver{background:linear-gradient(135deg,rgba(203,213,225,.1),rgba(203,213,225,.03));border:1.5px solid rgba(203,213,225,.22)}
.lb-bronze{background:linear-gradient(135deg,rgba(251,146,60,.1),rgba(251,146,60,.03));border:1.5px solid rgba(251,146,60,.22)}
.lb-diamond{background:linear-gradient(135deg,rgba(96,165,250,.12),rgba(96,165,250,.03));border:1.5px solid rgba(96,165,250,.28)}
.league-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:2px}
.league-name{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;letter-spacing:-.2px}
.league-sub{font-size:11px;color:var(--ink2);margin-top:2px}
.league-icon{font-size:40px;filter:drop-shadow(0 0 12px rgba(245,200,66,.25))}

/* TIMER */
.timer-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.timer-left{display:flex;align-items:center;gap:9px}
.timer-icon{font-size:18px}
.timer-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:1px}
.timer-val{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--green)}
.timer-note{font-size:10px;color:var(--ink3)}

/* PRIZES BANNER */
.prizes-banner{background:linear-gradient(135deg,rgba(245,200,66,.08),rgba(245,200,66,.02));border:1px solid rgba(245,200,66,.2);border-radius:14px;padding:12px 14px}
.prizes-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.prizes-grid{display:flex;gap:8px}
.prize-item{flex:1;background:rgba(245,200,66,.06);border:1px solid rgba(245,200,66,.15);border-radius:10px;padding:8px 6px;text-align:center}
.prize-rank{font-size:16px;margin-bottom:3px}
.prize-xp{font-size:11px;font-weight:800;color:var(--gold)}
.prize-badge{font-size:9px;color:var(--ink3);margin-top:1px}

/* YOU CARD */
.you-card{background:var(--green-muted);border:1.5px solid rgba(74,222,128,.25);border-radius:16px;padding:13px 14px;display:flex;align-items:center;gap:11px}
.you-rank-box{background:rgba(74,222,128,.15);border-radius:10px;padding:7px 11px;text-align:center;flex-shrink:0}
.you-rank-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:1px}
.you-rank-num{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--green);line-height:1}
.you-info{flex:1;min-width:0}
.you-tag{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:1px}
.you-name{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.you-xp{font-size:11px;color:var(--ink2);margin-top:1px}
.you-move{font-size:11px;font-weight:800;flex-shrink:0;padding:4px 8px;border-radius:999px}
.you-move.up{background:rgba(61,219,122,.12);color:var(--green)}
.you-move.down{background:var(--rose-soft);color:var(--rose)}
.you-move.same{background:var(--card2);color:var(--ink3)}

/* XP BATTLE BAR */
.battle-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px}
.battle-title{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-align:center;margin-bottom:8px}
.battle-names{display:flex;justify-content:space-between;margin-bottom:5px}
.battle-you{font-size:11px;font-weight:800;color:var(--blue)}
.battle-them{font-size:11px;font-weight:800;color:var(--rose)}
.battle-bar{height:16px;border-radius:999px;overflow:hidden;display:flex;background:var(--border)}
.battle-blue{height:100%;background:linear-gradient(90deg,#3b82f6,var(--blue));border-radius:999px 0 0 999px;transition:width .9s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:5px;min-width:16px}
.battle-red{height:100%;background:linear-gradient(90deg,var(--rose),#ef4444);border-radius:0 999px 999px 0;transition:width .9s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;padding-left:5px;min-width:16px}
.battle-pct{font-size:8px;font-weight:900;color:#fff}
.battle-result{text-align:center;font-size:11px;font-weight:700;margin-top:6px}
.battle-result.winning{color:var(--green)}
.battle-result.losing{color:var(--rose)}
.battle-result.tied{color:var(--gold)}

/* NEXT TARGET */
.next-target{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 13px;display:flex;align-items:center;gap:10px}
.nt-icon{font-size:20px;flex-shrink:0}
.nt-info{flex:1;min-width:0}
.nt-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:1px}
.nt-text{font-size:13px;font-weight:700;color:var(--ink)}
.nt-sub{font-size:10px;color:var(--ink2);margin-top:1px}
.nt-xp{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gold);flex-shrink:0}

/* PODIUM */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:6px;padding:6px 0}
.podium-slot{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;max-width:110px;cursor:pointer;transition:transform var(--t)}
.podium-slot:hover{transform:translateY(-2px)}
.p-avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:900;position:relative}
.p1 .p-avatar{width:60px;height:60px;font-size:20px;background:linear-gradient(135deg,rgba(245,200,66,.28),rgba(245,200,66,.08));border:2.5px solid rgba(245,200,66,.55);color:var(--gold)}
.p2 .p-avatar{width:50px;height:50px;font-size:16px;background:rgba(203,213,225,.1);border:2px solid rgba(203,213,225,.35);color:var(--silver)}
.p3 .p-avatar{width:50px;height:50px;font-size:16px;background:rgba(251,146,60,.1);border:2px solid rgba(251,146,60,.35);color:var(--bronze)}
.p-crown{position:absolute;top:-13px;font-size:16px}
.p-name{font-size:10px;font-weight:700;color:var(--ink);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;padding:0 3px}
.p1 .p-name{color:var(--gold);font-size:11px}
.p-xp{font-size:9px;color:var(--ink3)}
.p-medal{font-size:16px}
.p-bar{border-radius:7px 7px 0 0;width:100%}
.p1 .p-bar{height:50px;background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.15);border-bottom:none}
.p2 .p-bar{height:36px;background:rgba(203,213,225,.04);border:1px solid rgba(203,213,225,.1);border-bottom:none}
.p3 .p-bar{height:28px;background:rgba(251,146,60,.04);border:1px solid rgba(251,146,60,.1);border-bottom:none}

/* SECTION HEADING */
.sh{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);display:flex;align-items:center;gap:7px}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}
.sh.danger{color:var(--rose)}
.danger-dot{width:5px;height:5px;border-radius:50%;background:var(--rose);animation:blink 1.2s ease infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* LB ROW */
.lb-list{display:flex;flex-direction:column;gap:5px}
.lb-row{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:all var(--t);position:relative;overflow:hidden}
.lb-row:hover{border-color:var(--border2);background:var(--card2);transform:translateX(2px)}
.lb-row.is-me{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.04)}
.lb-row.danger{border-color:rgba(248,113,113,.18)}
.lb-row.danger::before,.lb-row.is-me::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.lb-row.danger::before{background:var(--rose)}
.lb-row.is-me::before{background:var(--green)}
.lb-rank{font-size:12px;font-weight:800;color:var(--ink3);width:26px;flex-shrink:0;text-align:center}
.lb-rank.r1{color:var(--gold)}.lb-rank.r2{color:var(--silver)}.lb-rank.r3{color:var(--bronze)}
.lb-av{width:34px;height:34px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--ink2);flex-shrink:0;font-family:'DM Sans',sans-serif}
.lb-row.is-me .lb-av{background:var(--green-muted);border-color:rgba(74,222,128,.3);color:var(--green)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.lb-row.is-me .lb-name{color:var(--green)}
.you-chip{background:rgba(74,222,128,.15);border-radius:4px;padding:1px 5px;font-size:7px;font-weight:800;color:var(--green)}
.lb-sub{font-size:9px;color:var(--ink3);margin-top:1px}
.lb-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.lb-xp{font-size:11px;font-weight:700;color:var(--ink2)}
.lb-row.is-me .lb-xp{color:var(--green)}
.lb-mv{font-size:9px;font-weight:800;padding:2px 5px;border-radius:999px}
.lb-mv.up{background:rgba(61,219,122,.1);color:var(--green)}
.lb-mv.down{background:var(--rose-soft);color:var(--rose)}
.lb-mv.same{color:var(--ink3)}
.danger-warn{font-size:9px;color:var(--rose);font-weight:600;margin-top:1px}
.gl-sep{text-align:center;color:var(--ink3);font-size:11px;padding:2px 0;letter-spacing:3px}

/* GLOBAL STATS */
.global-stats{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 14px;display:flex;align-items:center;justify-content:space-around}
.gs-val{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--ink);display:block;text-align:center}
.gs-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);text-align:center;margin-top:2px}
.gs-div{width:1px;height:28px;background:var(--border)}

/* FRIENDS */
.friends-hdr{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.sc-wrap{display:flex;gap:0}
.sc-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 14px;border-radius:9px;transition:background var(--t)}
.sc-item:hover{background:var(--card2)}
.sc-num{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--ink)}
.sc-lbl{font-size:9px;font-weight:700;color:var(--ink3)}
.sc-div{width:1px;background:var(--border);align-self:stretch}
.btn-find{background:var(--green);border:none;border-radius:999px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:#080f0b;cursor:pointer;transition:all var(--t);white-space:nowrap;box-shadow:0 3px 10px rgba(61,219,122,.22)}
.btn-find:hover{background:var(--green2);transform:translateY(-1px)}
.gps-card{background:var(--card);border:1px solid var(--border2);border-radius:13px;padding:11px 13px;display:flex;align-items:center;gap:10px}
.gps-icon{font-size:18px;flex-shrink:0}
.gps-info{flex:1;min-width:0}
.gps-title{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:1px}
.gps-sub{font-size:10px;color:var(--ink3)}
.btn-gps{background:var(--blue);border:none;border-radius:999px;padding:6px 13px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;color:#06101e;cursor:pointer;transition:all var(--t);flex-shrink:0}
.btn-gps:disabled{opacity:.45;cursor:not-allowed}
.fr-row{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:all var(--t);position:relative;overflow:hidden}
.fr-row:hover{border-color:var(--border2);transform:translateX(2px)}
.fr-row.is-me{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.04)}
.fr-row.rank-1::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:3px 0 0 3px}
.fr-row.rank-2::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--silver);border-radius:3px 0 0 3px}
.fr-row.rank-3::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--bronze);border-radius:3px 0 0 3px}
.fr-rank{font-size:13px;width:26px;flex-shrink:0;text-align:center}
.fr-av{width:34px;height:34px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--ink2);flex-shrink:0;font-family:'DM Sans',sans-serif}
.fr-row.is-me .fr-av{background:var(--green-muted);border-color:rgba(74,222,128,.3);color:var(--green)}
.fr-info{flex:1;min-width:0}
.fr-name{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.fr-row.is-me .fr-name{color:var(--green)}
.fr-sub{font-size:9px;color:var(--ink3);margin-top:1px}
.fr-xp{font-size:11px;font-weight:700;color:var(--ink2);flex-shrink:0}
.nearby-badge{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.2);border-radius:999px;padding:1px 5px;font-size:8px;font-weight:700;color:var(--blue)}

/* INVITES TAB */
.invite-card{background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(167,139,250,.03));border:1.5px solid rgba(167,139,250,.25);border-radius:16px;padding:16px 14px}
.invite-card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--purple);margin-bottom:4px}
.invite-card-sub{font-size:12px;color:var(--ink2);margin-bottom:12px;line-height:1.5}
.invite-link-wrap{background:var(--bg2);border:1px solid rgba(167,139,250,.2);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.invite-link-text{flex:1;font-size:11px;font-weight:600;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-copy{background:var(--purple);border:none;border-radius:8px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;transition:all var(--t)}
.btn-copy:hover{opacity:.85}
.share-btns{display:flex;gap:7px}
.btn-share{flex:1;padding:9px 8px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all var(--t);display:flex;align-items:center;justify-content:center;gap:5px}
.btn-share.whatsapp{background:#25d366;color:#fff}
.btn-share.telegram{background:#2aabee;color:#fff}
.btn-share:hover{transform:translateY(-1px);opacity:.9}
.invite-stats{display:flex;gap:8px;margin-top:10px}
.inv-stat{flex:1;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.15);border-radius:10px;padding:10px 8px;text-align:center}
.inv-stat-num{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--purple)}
.inv-stat-lbl{font-size:9px;font-weight:700;color:var(--ink3);margin-top:2px}
.inv-xp-note{font-size:10px;color:var(--green);font-weight:600;text-align:center;margin-top:6px}

/* INVITE LEADERBOARD TABS */
.inv-tabs{display:flex;gap:6px;margin-bottom:2px}
.inv-tab{flex:1;padding:7px;border-radius:9px;border:1.5px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;color:var(--ink3);cursor:pointer;transition:all var(--t)}
.inv-tab.active{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.3);color:var(--purple)}

/* INVITE ROW */
.inv-row{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:all var(--t);position:relative;overflow:hidden}
.inv-row:hover{border-color:var(--border2);transform:translateX(2px)}
.inv-row.is-me{border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.04)}
.inv-row.top3::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.inv-row.top1::before{background:var(--gold)}
.inv-row.top2::before{background:var(--silver)}
.inv-row.top3::before{background:var(--bronze)}
.inv-rank{font-size:13px;width:26px;text-align:center;flex-shrink:0}
.inv-av{width:34px;height:34px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--ink2);flex-shrink:0}
.inv-row.is-me .inv-av{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.3);color:var(--purple)}
.inv-info{flex:1;min-width:0}
.inv-name{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-row.is-me .inv-name{color:var(--purple)}
.inv-sub{font-size:9px;color:var(--ink3);margin-top:1px}
.inv-count{font-size:13px;font-weight:800;color:var(--purple);flex-shrink:0}
.inv-prize{font-size:9px;color:var(--gold);font-weight:700;flex-shrink:0;text-align:right}

/* WINNER MODAL */
.winner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:400;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .3s}
.winner-overlay.show{opacity:1;pointer-events:all}
.winner-card{background:var(--card);border:1.5px solid rgba(245,200,66,.4);border-radius:24px;padding:28px 24px;max-width:320px;width:100%;text-align:center;transform:scale(.9);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.winner-overlay.show .winner-card{transform:scale(1)}
.winner-emoji{font-size:56px;display:block;margin-bottom:10px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.winner-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:6px}
.winner-sub{font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:16px}
.winner-xp{background:linear-gradient(135deg,var(--gold),#d97706);color:#1a0e00;font-size:18px;font-weight:800;border-radius:999px;padding:9px 24px;display:inline-block;margin-bottom:14px}
.btn-winner-close{width:100%;padding:12px;border-radius:12px;background:var(--green);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:#080f0b;cursor:pointer}

/* FIND FRIENDS MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-sheet{background:var(--bg);border-radius:24px 24px 0 0;max-height:88vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:999px;margin:13px auto 0}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--ink)}
.modal-close{background:var(--card);border:1px solid var(--border);border-radius:50%;width:29px;height:29px;display:grid;place-items:center;cursor:pointer;font-size:13px;color:var(--ink2)}
.modal-search{padding:10px 14px;border-bottom:1px solid var(--border)}
.search-inp{width:100%;background:var(--card);border:1.5px solid var(--border2);border-radius:11px;padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--ink);outline:none;caret-color:var(--green);transition:border-color var(--t)}
.search-inp:focus{border-color:rgba(74,222,128,.4)}
.search-inp::placeholder{color:var(--ink3);font-weight:400}
.modal-list{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:7px}
.ff-row{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:border-color var(--t)}
.ff-row:hover{border-color:var(--border2)}
.ff-av{width:36px;height:36px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--ink2);flex-shrink:0}
.ff-info{flex:1;min-width:0}
.ff-name{font-size:12px;font-weight:700;color:var(--ink)}
.ff-meta{font-size:10px;color:var(--ink3);margin-top:1px}
.btn-fl{border-radius:999px;padding:6px 13px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all var(--t);border:none;flex-shrink:0}
.btn-fl.follow{background:var(--green);color:#080f0b}
.btn-fl.following{background:var(--card2);border:1.5px solid var(--border2);color:var(--ink2)}
.btn-fl.following:hover{border-color:var(--rose);color:var(--rose)}

/* EMPTY / LOADING */
.empty{text-align:center;padding:44px 20px;color:var(--ink2)}
.empty-emoji{font-size:40px;display:block;margin-bottom:10px}
.empty-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--ink);margin-bottom:5px}
.empty-sub{font-size:12px;color:var(--ink3);line-height:1.6}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 20px;gap:12px}
.spinner{width:30px;height:30px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--green);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--ink3);font-weight:600}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(8,15,11,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 6px;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:8px 4px;cursor:pointer;text-decoration:none;border-radius:12px;transition:background var(--t);-webkit-tap-highlight-color:transparent}
.nav-item:hover{background:rgba(255,255,255,.04)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase}
.nav-item.active .nav-label{color:var(--green)}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 4px var(--green))}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border2);border-radius:999px;padding:9px 18px;font-size:12px;font-weight:700;color:var(--ink);opacity:0;transition:all .3s;pointer-events:none;z-index:500;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header class="header">
  <div class="header-title">🏆 <em>Hànlù</em> Leaderboard</div>
</header>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" id="tab-weekly"  onclick="switchTab('weekly')">⚔️ Weekly</button>
    <button class="tab"        id="tab-global"  onclick="switchTab('global')">🌍 Global</button>
    <button class="tab"        id="tab-friends" onclick="switchTab('friends')">👥 Friends</button>
    <button class="tab"        id="tab-invites" onclick="switchTab('invites')">🎁 Invites</button>
  </div>
</div>

<!-- WEEKLY -->
<div class="view active" id="view-weekly">
  <div class="main" id="main-weekly">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Loading league…</div></div>
  </div>
</div>

<!-- GLOBAL -->
<div class="view" id="view-global">
  <div class="main" id="main-global">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Loading…</div></div>
  </div>
</div>

<!-- FRIENDS -->
<div class="view" id="view-friends">
  <div class="main" id="main-friends">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Loading friends…</div></div>
  </div>
</div>

<!-- INVITES -->
<div class="view" id="view-invites">
  <div class="main" id="main-invites">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Loading…</div></div>
  </div>
</div>

<!-- NAV -->
<nav class="bottom-nav">
  <a class="nav-item" href="/app/dashboard.html"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
  <a class="nav-item" href="/app/practice.html"><span class="nav-icon">⚡</span><span class="nav-label">Practice</span></a>
  <a class="nav-item active"><span class="nav-icon">🏆</span><span class="nav-label">Ranks</span></a>
  <a class="nav-item" href="/app/profile.html"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
</nav>

<!-- FIND FRIENDS MODAL -->
<div class="modal-overlay" id="ff-overlay" onclick="if(event.target===this)closeFF()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <div class="modal-title">👥 Find Friends</div>
      <div class="modal-close" onclick="closeFF()">✕</div>
    </div>
    <div class="modal-search">
      <input class="search-inp" id="ff-inp" type="text" placeholder="Search username…"
        autocomplete="off" spellcheck="false"
        oninput="clearTimeout(_fft);_fft=setTimeout(()=>renderFF(this.value),240)"/>
    </div>
    <div class="modal-list" id="ff-list"></div>
  </div>
</div>

<!-- WINNER MODAL -->
<div class="winner-overlay" id="winner-overlay">
  <div class="winner-card">
    <span class="winner-emoji" id="w-emoji">🏆</span>
    <div class="winner-title" id="w-title">League Champion!</div>
    <div class="winner-sub" id="w-sub">You finished #1 last week!</div>
    <div class="winner-xp" id="w-xp">+500 XP</div>
    <button class="btn-winner-close" onclick="closeWinner()">Awesome! 🎉</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const sb = window._sb;
let _uid       = null;
let _username  = null;
let _myXP      = 0;
let allUsers   = [];
let followIds  = new Set();
let activeTab  = 'weekly';
let globalDone = false;
let friendsDone= false;
let invitesDone= false;
let userLat    = null;
let userLng    = null;
let _fft       = null;
let _ffAll     = [];
let _myInviteCount = 0;

function key(n) { return n + '_' + _uid; }

// ── Toast
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Name helper
function dName(u) {
  if (_uid && u.user_id === _uid && _username) return _username;
  if (u.username && u.username !== 'Learner') return u.username;
  return 'Learner ' + (u.user_id||'???').slice(0,6).toUpperCase();
}

// ── Open profile
function openProfile(uid) {
  if (!uid) return;
  if (uid === _uid) { window.location.href = '/app/profile.html'; return; }
  window.location.href = '/app/public_profile.html?uid=' + encodeURIComponent(uid) + '&from=' + encodeURIComponent('/app/leaderboard.html');
}

// ── Tab switch
function switchTab(tab) {
  activeTab = tab;
  ['weekly','global','friends','invites'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('view-'+t).classList.toggle('active', t===tab);
  });
  if (tab==='global'  && !globalDone)  renderGlobal();
  if (tab==='friends' && !friendsDone) loadFriends();
  if (tab==='invites' && !invitesDone) loadInvites();
}

// ── League
function getLeague(topXP) {
  if (topXP >= 500) return { name:'Diamond League', icon:'💎', cls:'lb-diamond', color:'var(--blue)' };
  if (topXP >= 200) return { name:'Gold League',    icon:'🏆', cls:'lb-gold',    color:'var(--gold)' };
  if (topXP >= 100) return { name:'Silver League',  icon:'🥈', cls:'lb-silver',  color:'var(--silver)' };
  return                   { name:'Bronze League',  icon:'🛡️', cls:'lb-bronze',  color:'var(--bronze)' };
}

// ── Rank movement
function rankMove(uid, cur) {
  const k='lb_rank_'+uid, prev=localStorage.getItem(k);
  localStorage.setItem(k, String(cur));
  if (!prev) return {dir:'same',label:'NEW'};
  const d = parseInt(prev)-cur;
  if (d>0) return {dir:'up',label:'↑'+d};
  if (d<0) return {dir:'down',label:'↓'+Math.abs(d)};
  return {dir:'same',label:'—'};
}

// ── Timer
function startTimer() {
  function nextMon() {
    const now=new Date(), d=now.getDay();
    const n=new Date(now); n.setDate(now.getDate()+(d===1?7:(8-d)%7||7)); n.setHours(0,0,0,0); return n;
  }
  function fmt(ms) {
    const t=Math.floor(ms/1000), d=Math.floor(t/86400), h=Math.floor((t%86400)/3600), m=Math.floor((t%3600)/60), s=t%60;
    if(d>0) return d+'d '+h+'h left';
    if(h>0) return h+'h '+m+'m left';
    return m+'m '+s+'s left';
  }
  function tick() { const e=document.getElementById('timer-val'); if(e){ const diff=nextMon()-new Date(); e.textContent=diff>0?fmt(diff):'Resetting…'; } }
  tick(); setInterval(tick, 1000);
}

// ── XP Battle bar builder
function buildBattleBar(myXP, theirXP, theirName) {
  const total = (myXP + theirXP) || 1;
  const myPct = Math.round((myXP / total) * 100);
  const thPct = 100 - myPct;
  const myWins = myXP > theirXP;
  const tied   = myXP === theirXP;
  const msg    = tied ? '⚖️ Tied — make your move!' : myWins ? '🔥 You\'re ahead — keep it up!' : '😤 ' + theirName + ' leads — time to grind!';
  const cls    = tied ? 'tied' : myWins ? 'winning' : 'losing';

  const el = document.createElement('div');
  el.className = 'battle-wrap';
  el.innerHTML =
    '<div class="battle-title">⚔️ XP Battle — You vs #' + (allUsers.findIndex(u=>u.user_id===(_uid||''))-0) + ' above</div>' +
    '<div class="battle-names"><span class="battle-you">You · ' + myXP + ' XP</span><span class="battle-them">' + theirName + ' · ' + theirXP + ' XP</span></div>' +
    '<div class="battle-bar">' +
      '<div class="battle-blue" style="width:' + myPct + '%">' + (myPct>=15?'<span class="battle-pct">'+myPct+'%</span>':'') + '</div>' +
      '<div class="battle-red"  style="width:' + thPct + '%">' + (thPct>=15?'<span class="battle-pct">'+thPct+'%</span>':'') + '</div>' +
    '</div>' +
    '<div class="battle-result ' + cls + '">' + msg + '</div>';
  return el;
}

// ══════════════════════════════════════════
// WEEKLY VIEW
// ══════════════════════════════════════════
function renderWeekly(users) {
  const main = document.getElementById('main-weekly');
  main.innerHTML = '';

  if (!users || users.length === 0) {
    main.innerHTML = '<div class="empty"><span class="empty-emoji">🚀</span><div class="empty-title">No players yet</div><div class="empty-sub">Complete a lesson to join!</div></div>';
    return;
  }

  const total       = users.length;
  const topXP       = users[0]?.xp || 0;
  const league      = getLeague(topXP);
  const dangerStart = Math.max(total - 5, 3);
  const myIdx       = users.findIndex(u => u.user_id === _uid);
  const myRank      = myIdx + 1;
  const myData      = myIdx >= 0 ? users[myIdx] : null;

  // ── League Banner
  const banner = document.createElement('div');
  banner.className = 'league-banner ' + league.cls;
  banner.innerHTML =
    '<div class="league-left"><div class="league-tag">Current League</div>' +
    '<div class="league-name" style="color:' + league.color + '">' + league.name + '</div>' +
    '<div class="league-sub">' + total + ' players · resets Monday</div></div>' +
    '<div class="league-icon">' + league.icon + '</div>';
  main.appendChild(banner);

  // ── Timer
  const timerEl = document.createElement('div');
  timerEl.className = 'timer-card';
  timerEl.innerHTML =
    '<div class="timer-left"><div class="timer-icon">⏳</div>' +
    '<div><div class="timer-label">Resets In</div><div class="timer-val" id="timer-val">…</div></div></div>' +
    '<div class="timer-note">Winners get XP + badge</div>';
  main.appendChild(timerEl);
  startTimer();

  // ── Prizes banner
  const prizes = document.createElement('div');
  prizes.className = 'prizes-banner';
  prizes.innerHTML =
    '<div class="prizes-title">🎁 Weekly Prizes</div>' +
    '<div class="prizes-grid">' +
      '<div class="prize-item"><div class="prize-rank">🥇</div><div class="prize-xp">+500 XP</div><div class="prize-badge">Champion badge</div></div>' +
      '<div class="prize-item"><div class="prize-rank">🥈</div><div class="prize-xp">+300 XP</div><div class="prize-badge">Runner-up badge</div></div>' +
      '<div class="prize-item"><div class="prize-rank">🥉</div><div class="prize-xp">+100 XP</div><div class="prize-badge">Top 3 badge</div></div>' +
    '</div>';
  main.appendChild(prizes);

  // ── You Card
  if (_uid) {
    const move   = myData ? rankMove(_uid, myRank) : {dir:'same',label:'—'};
    const youEl  = document.createElement('div');
    youEl.className = 'you-card';
    if (myData) {
      youEl.innerHTML =
        '<div class="you-rank-box"><div class="you-rank-lbl">Rank</div><div class="you-rank-num">#'+myRank+'</div></div>' +
        '<div class="you-info"><div class="you-tag">You</div>' +
        '<div class="you-name">'+dName(myData)+'</div>' +
        '<div class="you-xp">⚡ '+(myData.xp||0)+' XP</div></div>' +
        '<div class="you-move '+move.dir+'">'+move.label+'</div>';
    } else {
      youEl.innerHTML =
        '<div class="you-rank-box"><div class="you-rank-lbl">Rank</div><div class="you-rank-num">—</div></div>' +
        '<div class="you-info"><div class="you-tag">You</div><div class="you-name">'+(_username||'You')+'</div>' +
        '<div class="you-xp">Complete a lesson to rank!</div></div>';
    }
    main.appendChild(youEl);

    // ── XP Battle Bar (vs person directly above)
    if (myData && myRank > 1) {
      const above = users[myIdx - 1];
      main.appendChild(buildBattleBar(myData.xp||0, above.xp||0, dName(above)));

      // Next Target
      const need = (above.xp||0) - (myData.xp||0) + 1;
      const nt = document.createElement('div');
      nt.className = 'next-target';
      nt.innerHTML =
        '<div class="nt-icon">🎯</div>' +
        '<div class="nt-info"><div class="nt-label">Next Target</div>' +
        '<div class="nt-text">Beat '+dName(above)+'</div>' +
        '<div class="nt-sub">'+need+' XP needed · they have '+(above.xp||0)+' XP</div></div>' +
        '<div class="nt-xp">+'+need+'</div>';
      main.appendChild(nt);
    } else if (myData && myRank === 1) {
      const nt = document.createElement('div');
      nt.className = 'next-target';
      nt.innerHTML = '<div class="nt-icon">👑</div><div class="nt-info"><div class="nt-label">You\'re #1</div><div class="nt-text">Defend your throne this week!</div></div>';
      main.appendChild(nt);
    }
  }

  // ── Podium (top 3)
  if (total >= 2) {
    const podium = document.createElement('div');
    podium.className = 'podium';
    const slots = total >= 3
      ? [{u:users[1],r:2,cls:'p2'},{u:users[0],r:1,cls:'p1'},{u:users[2],r:3,cls:'p3'}]
      : [{u:users[0],r:1,cls:'p1'},{u:users[1],r:2,cls:'p2'}];
    slots.forEach(s => {
      const isMe = s.u.user_id === _uid;
      const slot = document.createElement('div');
      slot.className = 'podium-slot '+s.cls;
      slot.onclick = () => openProfile(s.u.user_id);
      const medals = ['','🥇','🥈','🥉'];
      slot.innerHTML =
        '<div class="p-bar"></div>' +
        '<div class="p-avatar">'+(s.r===1?'<div class="p-crown">👑</div>':'')+dName(s.u).slice(0,2).toUpperCase()+'</div>' +
        '<div class="p-name">'+dName(s.u)+(isMe?' 👤':'')+'</div>' +
        '<div class="p-xp">⚡ '+(s.u.xp||0)+'</div>' +
        '<div class="p-medal">'+medals[s.r]+'</div>';
      podium.appendChild(slot);
    });
    main.appendChild(podium);
  }

  // ── Ranked list (4+)
  const listStart = Math.min(3, total);
  if (listStart < total) {
    const hEl = document.createElement('div');
    hEl.className = 'sh'; hEl.textContent = 'All Rankings';
    main.appendChild(hEl);

    const list = document.createElement('div');
    list.className = 'lb-list';

    for (let i = listStart; i < total; i++) {
      const u = users[i], rank = i+1, isMe = u.user_id === _uid;
      const isDanger = i >= dangerStart;
      const move = isMe ? rankMove(_uid, rank) : null;

      if (i === dangerStart) {
        const dz = document.createElement('div');
        dz.className = 'sh danger';
        dz.innerHTML = '<div class="danger-dot"></div> Danger Zone — Bottom 5';
        list.appendChild(dz);
      }

      const row = document.createElement('div');
      row.className = 'lb-row'+(isDanger?' danger':'')+(isMe?' is-me':'');
      row.onclick = () => openProfile(u.user_id);
      const rc = rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
      row.innerHTML =
        '<div class="lb-rank '+rc+'">#'+rank+'</div>' +
        '<div class="lb-av">'+dName(u).slice(0,2).toUpperCase()+'</div>' +
        '<div class="lb-info">' +
          '<div class="lb-name">'+dName(u)+(isMe?'<span class="you-chip">YOU</span>':'')+'</div>' +
          '<div class="lb-sub">'+(rank<=10?'⚡ Top 10':'📚 Studying')+(isDanger&&!isMe?' · Danger zone':'')+'</div>' +

// ── GPS
function distKm(a,b,c,d){const R=6371,dA=(c-a)*Math.PI/180,dB=(d-b)*Math.PI/180;const x=Math.sin(dA/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dB/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function reqGPS(){
  const btn=document.getElementById('btn-gps'),sub=document.getElementById('gps-sub');
  if(btn){btn.textContent='Locating…';btn.disabled=true;}
  if(!navigator.geolocation){if(sub)sub.textContent='Not supported';return;}
  navigator.geolocation.getCurrentPosition(async pos=>{
    userLat=pos.coords.latitude;userLng=pos.coords.longitude;
    if(sub)sub.textContent='Location active';if(btn){btn.textContent='✅ On';}
    try{await sb.from('leaderboard').update({lat:userLat,lng:userLng}).eq('user_id',_uid);}catch(e){}
    friendsDone=false;loadFriends();
  },()=>{if(sub)sub.textContent='Location denied';if(btn){btn.textContent='Denied';btn.disabled=false;}},{timeout:8000});
}

// WEEKLY WINNER CHECK (runs on Monday)
// ══════════════════════════════════════════
async function checkWeeklyWinner() {
  if (!_uid) return;
  const lastCheck = localStorage.getItem('winner_check_' + _uid);
  const now = new Date();
  const thisMonday = new Date(now);
  const day = now.getDay();
  thisMonday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  thisMonday.setHours(0,0,0,0);
  const mondayKey = thisMonday.toISOString().split('T')[0];

  if (lastCheck === mondayKey) return; // already checked this week

  // Check if user was in top 3 last week
  try {
    const { data: winData } = await sb.from('weekly_winners')
      .select('rank,bonus_xp,badge')
      .eq('user_id', _uid)
      .eq('week_start', mondayKey)
      .maybeSingle();

    if (winData) {
      localStorage.setItem('winner_check_' + _uid, mondayKey);
      showWinnerModal(winData.rank, winData.bonus_xp, winData.badge);

      // Apply bonus XP
      const curXP = Number(localStorage.getItem(key('xp'))||0);
      localStorage.setItem(key('xp'), curXP + winData.bonus_xp);
      await sb.from('leaderboard').update({ xp: curXP + winData.bonus_xp }).eq('user_id', _uid);
    } else {
      // Save weekly snapshot if we're in top 3
      const myIdx = allUsers.findIndex(u=>u.user_id===_uid);
      if (myIdx >= 0 && myIdx < 3) {
        const rank = myIdx + 1;
        const bonusXP = [500,300,100][rank-1];
        const badge   = ['League Champion','League Runner-Up','League Top 3'][rank-1];
        await sb.from('weekly_winners').upsert({
          user_id:_uid, rank, xp:allUsers[myIdx].xp, week_start:mondayKey, bonus_xp:bonusXP, badge
        });
        localStorage.setItem('winner_check_' + _uid, mondayKey);
        showWinnerModal(rank, bonusXP, badge);
      }
    }
  } catch(e) { console.warn('Winner check:', e); }
}

function showWinnerModal(rank, bonusXP, badge) {
  const emojis = ['🏆','🥈','🥉'];
  const titles = ['League Champion!','Runner-Up!','Top 3 Finish!'];
  document.getElementById('w-emoji').textContent = emojis[rank-1]||'🎉';
  document.getElementById('w-title').textContent = titles[rank-1]||'Well done!';
  document.getElementById('w-sub').textContent = 'You finished #'+rank+' last week! Badge unlocked: '+badge;
  document.getElementById('w-xp').textContent = '+'+bonusXP+' XP';
  document.getElementById('winner-overlay').classList.add('show');
}
function closeWinner(){document.getElementById('winner-overlay').classList.remove('show');}

async function handleReferral() {
  if (!_uid) return;
  const refParam = new URLSearchParams(location.search).get('ref');
  if (!refParam) return;

  // Check if this user was already referred
  const already = localStorage.getItem('ref_claimed_' + _uid);
  if (already) return;

  try {
    // Find referrer by username
    const { data: refUser } = await sb.from('leaderboard')
      .select('user_id,xp').eq('username', refParam).maybeSingle();

    if (!refUser || refUser.user_id === _uid) return;

    // Insert referral
    await sb.from('referrals').upsert({
      referrer_id: refUser.user_id,
      referred_id: _uid
    });

    // Give referrer +50 XP
    await sb.from('leaderboard').update({ xp: (refUser.xp||0) + 50 }).eq('user_id', refUser.user_id);

    // Give new user +20 XP welcome bonus
    const myXP = Number(localStorage.getItem(key('xp'))||0) + 20;
    localStorage.setItem(key('xp'), myXP);
    await sb.from('leaderboard').update({ xp: myXP }).eq('user_id', _uid);

    localStorage.setItem('ref_claimed_' + _uid, '1');
    showToast('🎉 +20 XP welcome bonus!');
  } catch(e) { console.warn('Referral:', e); }
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init() {
  try {
    const {data} = await sb.auth.getSession();
    const user = data?.session?.user;
    if (user) {
      _uid = user.id;
      _username = localStorage.getItem('username_'+_uid) || user.user_metadata?.full_name || user.email?.split('@')[0] || null;
      _myXP = Number(localStorage.getItem('xp_'+_uid)||0);
    }
  } catch(e) { console.warn('Auth:', e); }

  try {
    const {data,error} = await sb.from('leaderboard').select('user_id,xp,username').order('xp',{ascending:false});
    if (error) throw error;
    allUsers = data || [];

    // Patch my username locally
    if (_uid && _username) {
      const me = allUsers.find(u=>u.user_id===_uid);
      if (me && (!me.username||me.username==='Learner')) me.username=_username;
    }

    renderWeekly(allUsers);
    handleReferral();
    checkWeeklyWinner();
  } catch(e) {
    document.getElementById('main-weekly').innerHTML =
      '<div class="empty"><span class="empty-emoji">⚠️</span><div class="empty-title">Could not load</div><div class="empty-sub">'+e.message+'</div></div>';
  }
}

init();
</script>
