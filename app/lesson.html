<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#080f0b;--bg2:#0c1610;--card:#111e16;--card2:#162218;
  --border:rgba(74,222,128,.13);--border2:rgba(74,222,128,.28);
  --green:#3ddb7a;--green2:#2ab862;--green3:#1a8a45;
  --green-muted:rgba(61,219,122,.10);
  --gold:#f5c842;--blue:#60a5fa;--rose:#f87171;--purple:#a78bfa;
  --ink:#e8f2ee;--ink2:#9ab8aa;--ink3:#4a6b5a;
  --t:.22s cubic-bezier(.4,0,.2,1);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}
#app{flex:1;display:flex;flex-direction:column;max-width:520px;margin:0 auto;width:100%;padding:0 0 24px}

/* ── HEADER ── */
.lesson-header{position:sticky;top:0;z-index:50;background:var(--bg);padding:14px 16px 10px;display:flex;align-items:center;gap:10px}
.btn-close{width:34px;height:34px;border-radius:50%;border:none;background:var(--card);color:var(--ink2);cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:all var(--t)}
.btn-close:hover{background:var(--card2);color:var(--ink)}
.btn-close svg{width:15px;height:15px}
.progress-wrap{flex:1;height:9px;background:var(--card);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green2),var(--green));border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(61,219,122,.4)}
.hearts-row{display:flex;gap:3px;flex-shrink:0}
.heart{font-size:16px;transition:all .2s}
.heart.lost{opacity:.18;transform:scale(.85)}

/* ── LESSON INFO BAR ── */
.info-bar{display:flex;align-items:center;justify-content:space-between;padding:0 16px 10px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.info-tag{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);border-radius:999px;padding:3px 10px;color:var(--blue)}
.info-type{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:999px;padding:3px 10px;color:var(--purple)}

/* ── STEP AREA ── */
.step-area{flex:1;padding:10px 16px 0;display:flex;flex-direction:column;gap:16px}
@keyframes slideIn{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-32px)}}
.step-in{animation:slideIn .3s cubic-bezier(.4,0,.2,1) forwards}
.step-out{animation:slideOut .22s cubic-bezier(.4,0,.2,1) forwards}

/* ── WORD CARD ── */
.word-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 20px 24px;text-align:center;position:relative;overflow:hidden}
.word-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(61,219,122,.07),transparent 65%);pointer-events:none}
.wc-top{display:flex;align-items:flex-start;justify-content:center;gap:8px;margin-bottom:4px}
.wc-hanzi{font-family:'Noto Sans SC',sans-serif;font-size:clamp(54px,14vw,78px);font-weight:700;line-height:1;color:var(--ink);text-shadow:0 0 30px rgba(61,219,122,.18)}
.btn-audio{background:rgba(61,219,122,.1);border:1px solid rgba(61,219,122,.25);border-radius:50%;width:30px;height:30px;display:grid;place-items:center;cursor:pointer;color:var(--green);flex-shrink:0;margin-top:8px;transition:all var(--t)}
.btn-audio:hover{background:rgba(61,219,122,.2);transform:scale(1.1)}
.btn-audio svg{width:13px;height:13px}
.wc-pinyin{font-size:18px;color:var(--green);font-weight:500;margin-bottom:5px;letter-spacing:.04em}
.wc-meaning{font-size:15px;color:var(--ink2);margin-bottom:18px}
.wc-example{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:12px 14px;text-align:left}
.ex-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.ex-zh{font-family:'Noto Sans SC',sans-serif;font-size:14px;color:var(--ink);margin-bottom:3px;line-height:1.5}
.ex-py{font-size:11px;color:var(--ink2);margin-bottom:2px}
.ex-en{font-size:11px;color:var(--ink3);font-style:italic}

/* ── QUESTION LABEL ── */
.q-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.q-label.listen{color:var(--blue)}
.q-label.read{color:var(--green)}
.q-label.write{color:var(--purple)}
.q-label.speed{color:var(--gold)}
.q-badge{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);border-radius:999px;padding:2px 8px;font-size:9px}

/* ── QUESTION TEXT ── */
.q-text{font-size:clamp(16px,4.5vw,20px);font-weight:600;line-height:1.6;color:var(--ink)}
.q-text .zh{font-family:'Noto Sans SC',sans-serif;font-size:clamp(28px,7vw,38px);font-weight:800;color:var(--green);display:block;margin-top:8px;text-shadow:0 0 20px rgba(61,219,122,.2)}

/* ── AUDIO PLAY BUTTON (large, for listening questions) ── */
.btn-play-big{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:18px;border-radius:16px;border:none;
  background:linear-gradient(135deg,rgba(96,165,250,.15),rgba(96,165,250,.05));
  border:1.5px solid rgba(96,165,250,.3);
  color:var(--blue);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all var(--t);
}
.btn-play-big:hover{background:linear-gradient(135deg,rgba(96,165,250,.25),rgba(96,165,250,.1));transform:translateY(-1px)}
.btn-play-big.playing{border-color:var(--green);color:var(--green);background:rgba(61,219,122,.08)}
.play-icon{font-size:24px}
.play-waves{display:flex;gap:3px;align-items:center}
.wave{width:3px;border-radius:2px;background:var(--blue);animation:wave 1s ease infinite}
.wave:nth-child(1){height:8px;animation-delay:0s}
.wave:nth-child(2){height:16px;animation-delay:.15s}
.wave:nth-child(3){height:12px;animation-delay:.3s}
.wave:nth-child(4){height:20px;animation-delay:.1s}
.wave:nth-child(5){height:10px;animation-delay:.25s}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}
.btn-play-big.playing .wave{background:var(--green)}

/* ── TRUE/FALSE ── */
.tf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tf-btn{
  padding:20px 10px;border-radius:16px;border:2px solid var(--border);
  background:var(--card);font-family:'DM Sans',sans-serif;font-size:22px;font-weight:800;
  color:var(--ink);cursor:pointer;transition:all var(--t);text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.tf-btn .tf-label{font-size:13px;font-weight:600;color:var(--ink2)}
.tf-btn:hover:not(:disabled){transform:translateY(-2px);border-color:var(--border2)}
.tf-btn.correct{border-color:var(--green);background:rgba(61,219,122,.12);color:var(--green)}
.tf-btn.wrong{border-color:var(--rose);background:rgba(248,113,113,.1);color:var(--rose)}
.tf-btn:disabled{cursor:not-allowed}

/* ── OPTIONS GRID ── */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.options-grid.single{grid-template-columns:1fr}
.opt-btn{
  background:var(--card);border:2px solid var(--border);border-radius:14px;
  padding:14px 12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  color:var(--ink);cursor:pointer;transition:all var(--t);text-align:center;line-height:1.4;
  font-family:'Noto Sans SC',sans-serif;
}
.opt-btn:hover:not(:disabled){border-color:rgba(61,219,122,.5);background:var(--card2);transform:translateY(-1px)}
.opt-btn.correct{border-color:var(--green);background:rgba(61,219,122,.12);color:var(--green)}
.opt-btn.wrong{border-color:var(--rose);background:rgba(248,113,113,.1);color:var(--rose)}
.opt-btn:disabled{cursor:not-allowed}

/* ── SENTENCE ORDER ── */
.sentence-display{font-family:'Noto Sans SC',sans-serif;font-size:clamp(20px,5vw,26px);font-weight:700;color:var(--ink);text-align:center;background:var(--card2);border:2px solid var(--border2);border-radius:16px;padding:20px 16px;min-height:64px;line-height:1.5;display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center}
.blank-slot{display:inline-flex;align-items:center;justify-content:center;min-width:60px;height:36px;border-bottom:3px solid var(--green);padding:0 6px;font-size:18px;font-weight:800;color:var(--green);cursor:pointer;transition:all var(--t)}
.blank-slot:hover{border-bottom-color:var(--green2)}
.word-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px}
.chip{
  background:var(--card);border:2px solid var(--border);border-radius:10px;
  padding:10px 16px;font-family:'Noto Sans SC',sans-serif;font-size:16px;font-weight:500;
  color:var(--ink);cursor:pointer;transition:all var(--t);
}
.chip:hover:not(.used){border-color:rgba(61,219,122,.5);background:var(--card2);transform:translateY(-1px)}
.chip.used{opacity:.25;pointer-events:none}
.chip.correct{border-color:var(--green);background:rgba(61,219,122,.12);color:var(--green)}
.chip.wrong{border-color:var(--rose);background:rgba(248,113,113,.1);color:var(--rose);animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ── FILL IN BLANK ── */
.fill-sentence{font-family:'Noto Sans SC',sans-serif;font-size:clamp(22px,6vw,32px);font-weight:800;color:var(--ink);line-height:2;text-align:center;background:var(--card2);border:2px solid var(--border2);border-radius:16px;padding:24px 16px;letter-spacing:.04em}
.fill-blank{display:inline-block;font-size:clamp(22px,6vw,32px);font-weight:900;border-bottom:4px solid var(--green);min-width:70px;text-align:center;color:var(--green);padding:0 6px;text-shadow:0 0 16px rgba(61,219,122,.45);vertical-align:middle}

/* ── TYPING INPUT ── */
.typing-wrap{position:relative}
.typing-input{width:100%;padding:15px 18px;border-radius:14px;border:2px solid var(--border);background:var(--card);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color var(--t);caret-color:var(--green)}
.typing-input:focus{border-color:rgba(61,219,122,.5)}
.typing-input.ok{border-color:var(--green);background:rgba(61,219,122,.06)}
.typing-input.err{border-color:var(--rose);background:rgba(248,113,113,.06)}
.typing-hint{font-size:11px;color:var(--ink3);margin-top:5px;text-align:right}

/* ── READING PASSAGE ── */
.passage-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
.passage-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.passage-text{font-family:'Noto Sans SC',sans-serif;font-size:15px;line-height:2;color:var(--ink);padding:12px;background:var(--bg2);border-radius:10px;border:1px solid var(--border)}
.passage-py{font-size:11px;color:var(--ink2);margin-top:8px;line-height:1.8}
.passage-en{font-size:12px;color:var(--ink3);font-style:italic;margin-top:6px;line-height:1.6}

/* ── MATCHING ── */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.match-item{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 10px;font-size:15px;font-weight:500;text-align:center;cursor:pointer;transition:all var(--t);min-height:54px;display:flex;align-items:center;justify-content:center;word-break:break-word}
.match-item.zh{font-family:'Noto Sans SC',sans-serif;font-size:18px}
.match-item:hover:not(.matched):not(.disabled){border-color:rgba(61,219,122,.4);background:var(--card2);transform:translateY(-1px)}
.match-item.selected{border-color:var(--green);background:rgba(61,219,122,.1);color:var(--green)}
.match-item.matched{border-color:var(--green);background:rgba(61,219,122,.08);color:var(--green);opacity:.55;cursor:default}
.match-item.wrong-shake{border-color:var(--rose);background:rgba(248,113,113,.1);animation:shake .35s ease}
.match-item.disabled{opacity:.35;cursor:not-allowed}

/* ── SPEED TIMER ── */
.speed-bar-wrap{height:5px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:4px}
.speed-bar{height:100%;border-radius:999px;background:var(--green);transition:width .1s linear}
.speed-bar.warning{background:var(--gold)}
.speed-bar.danger{background:var(--rose)}
.speed-counter{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:var(--ink3);text-align:right;margin-bottom:12px}

/* ── FEEDBACK BANNER ── */
.feedback{border-radius:14px;padding:12px 16px;font-size:14px;font-weight:500;display:flex;align-items:flex-start;gap:10px;opacity:0;transform:translateY(6px);transition:all .28s;min-height:20px}
.feedback.show{opacity:1;transform:translateY(0)}
.feedback.ok{background:rgba(61,219,122,.12);border:1px solid rgba(61,219,122,.3);color:var(--green)}
.feedback.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--rose)}
.fb-icon{font-size:18px;flex-shrink:0;margin-top:-1px}
.fb-main{font-weight:700}
.fb-hint{font-size:12px;opacity:.8;margin-top:2px}

/* ── BOTTOM AREA ── */
.bottom-area{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.btn-primary{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--green),var(--green2));color:#080f0b;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all var(--t);box-shadow:0 4px 16px rgba(61,219,122,.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(61,219,122,.35)}
.btn-skip{width:100%;padding:12px;border-radius:14px;background:transparent;border:1.5px solid var(--border2);color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all var(--t)}
.btn-skip:hover{border-color:var(--green);color:var(--green)}

/* ── COMPLETE SCREEN ── */
.complete-screen{display:flex;flex-direction:column;align-items:center;text-align:center;padding:32px 20px;gap:14px}
.complete-emoji{font-size:72px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.complete-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--ink)}
.complete-sub{font-size:14px;color:var(--ink2)}
.xp-pill{background:linear-gradient(135deg,var(--green),var(--green2));color:#080f0b;font-family:'DM Sans',sans-serif;font-size:20px;font-weight:800;border-radius:999px;padding:10px 28px;box-shadow:0 4px 20px rgba(61,219,122,.3)}
.complete-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;margin:4px 0}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:4px}
.stat-box .sv{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink)}
.stat-box .sl{font-size:10px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.complete-actions{display:flex;flex-direction:column;gap:8px;width:100%}
.btn-ad{width:100%;padding:13px;border-radius:14px;background:transparent;border:1.5px solid rgba(245,200,66,.3);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all var(--t)}
.btn-ad:hover{background:rgba(245,200,66,.08)}
.btn-ad:disabled{opacity:.45;cursor:not-allowed}

/* ── CHECKPOINT SCORE RING ── */
.score-ring-wrap{position:relative;width:120px;height:120px;margin:0 auto}
.score-ring-wrap svg{width:120px;height:120px;transform:rotate(-90deg)}
.score-ring-track{fill:none;stroke:var(--border);stroke-width:10}
.score-ring-fill{fill:none;stroke:var(--green);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.score-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-pct{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--green)}
.score-label{font-size:10px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.checkpoint-section-scores{display:flex;gap:10px;width:100%}
.section-score{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center}
.ss-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.ss-val{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
.ss-val.listen{color:var(--blue)}.ss-val.read{color:var(--green)}.ss-val.write{color:var(--purple)}

/* ── LOADING ── */
.loading-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--green);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── NO HEARTS ── */
.no-hearts-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;display:none}
.no-hearts-overlay.show{display:flex}
.nh-card{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:28px 24px;max-width:320px;width:100%;text-align:center}
.nh-icon{font-size:48px;margin-bottom:12px;display:block}
.nh-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--ink);margin-bottom:8px}
.nh-desc{font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:20px}
.nh-ad-bar{height:5px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:6px;display:none}
.nh-ad-fill{height:100%;border-radius:999px;background:var(--green);width:0%;transition:width .1s linear}
.nh-ad-label{font-size:11px;color:var(--ink3);margin-bottom:14px;font-weight:600}
.nh-btns{display:flex;flex-direction:column;gap:8px}

/* ── GRAMMAR CARD ── */
.grammar-card{background:var(--card);border:1px solid rgba(167,139,250,.2);border-radius:16px;padding:22px 18px}
.gc-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--ink);margin-bottom:10px}
.gc-pattern{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:10px;padding:10px 14px;font-family:'Noto Sans SC',sans-serif;font-size:14px;color:var(--purple);margin-bottom:10px;font-weight:500}
.gc-body{font-size:13px;color:var(--ink2);line-height:1.8;margin-bottom:12px}
.gc-examples{display:flex;flex-direction:column;gap:8px}
.gc-ex{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.gc-ex-zh{font-family:'Noto Sans SC',sans-serif;font-size:14px;color:var(--ink);margin-bottom:2px}
.gc-ex-en{font-size:11px;color:var(--ink3);font-style:italic}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border2);border-radius:999px;padding:9px 18px;font-size:13px;font-weight:700;color:var(--ink);opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  {id:'1-120',zh:'电影',   py:'diànyǐng',  en:'movie / film',    ex:{zh:'我们去看电影吧！',        py:'Wǒmen qù kàn diànyǐng ba!',          en:"Let's go watch a movie!"}},

  {id:'1-124',zh:'同学',   py:'tóngxué',   en:'classmate',       ex:{zh:'他是我的同学。',          py:'Tā shì wǒ de tóngxué.',              en:'He is my classmate.'}},

  {id:'1-127',zh:'漂亮',   py:'piàoliang', en:'beautiful / pretty',ex:{zh:'她很漂亮。',            py:'Tā hěn piàoliang.',                  en:'She is very beautiful.'}},
  {id:'1-128',zh:'高',     py:'gāo',       en:'tall / high',     ex:{zh:'他很高，有一米八。',      py:'Tā hěn gāo, yǒu yī mǐ bā.',         en:'He is very tall, 1.8 meters.'}},
  {id:'1-129',zh:'累',     py:'lèi',       en:'tired',           ex:{zh:'我今天很累。',            py:'Wǒ jīntiān hěn lèi.',                en:'I am very tired today.'}},
  {id:'1-130',zh:'了解',   py:'liǎojiě',   en:'to understand',   ex:{zh:'我了解这个问题。',        py:'Wǒ liǎojiě zhège wèntí.',            en:'I understand this problem.'}},
  {id:'1-131',zh:'知道',   py:'zhīdào',    en:'to know (a fact)', ex:{zh:'你知道他住在哪里吗？',   py:'Nǐ zhīdào tā zhù zài nǎlǐ ma?',     en:'Do you know where he lives?'}},

  {id:'1-133',zh:'希望',   py:'xīwàng',    en:'to hope / wish',  ex:{zh:'我希望明天天气好。',      py:'Wǒ xīwàng míngtiān tiānqì hǎo.',     en:'I hope the weather is good tomorrow.'}},

  {id:'1-138',zh:'问题',   py:'wèntí',     en:'question / problem',ex:{zh:'你有问题吗？',          py:'Nǐ yǒu wèntí ma?',                   en:'Do you have any questions?'}},
  {id:'1-139',zh:'意思',   py:'yìsi',      en:'meaning',         ex:{zh:'这个词是什么意思？',      py:'Zhège cí shì shénme yìsi?',           en:'What is the meaning of this word?'}},
  {id:'1-140',zh:'名字',   py:'míngzi',    en:'name',            ex:{zh:'你的名字叫什么？',        py:'Nǐ de míngzi jiào shénme?',           en:'What is your name?'}},
  {id:'1-141',zh:'地方',   py:'dìfang',    en:'place',           ex:{zh:'这是个好地方。',          py:'Zhè shìgè hǎo dìfang.',              en:'This is a good place.'}},
  {id:'1-142',zh:'东西',   py:'dōngxi',    en:'thing / stuff',   ex:{zh:'我要买一些东西。',        py:'Wǒ yào mǎi yīxiē dōngxi.',          en:'I want to buy some things.'}},
  {id:'1-143',zh:'时间',   py:'shíjiān',   en:'time',            ex:{zh:'我没有时间。',            py:'Wǒ méiyǒu shíjiān.',                 en:"I don't have time."}},

  {id:'1-148',zh:'走',     py:'zǒu',       en:'to walk / leave', ex:{zh:'我们走吧。',              py:'Wǒmen zǒu ba.',                      en:"Let's go."}},
  {id:'1-149',zh:'打',     py:'dǎ',        en:'to hit / make (call)',ex:{zh:'我给你打电话。',      py:'Wǒ gěi nǐ dǎ diànhuà.',              en:'I will call you.'}},
  {id:'1-150',zh:'找',     py:'zhǎo',      en:'to look for / find',ex:{zh:'我在找我的钥匙。',      py:'Wǒ zài zhǎo wǒ de yàoshi.',          en:'I am looking for my keys.'}},
], grammar:[
  {title:'Subject + 是 + Object', pattern:'S + 是 + O', explain:'Use 是 (shì) to say "X is Y". For negation use 不是 (bù shì).', examples:[{zh:'我是学生。',en:'I am a student.'},{zh:'他不是老师。',en:'He is not a teacher.'},{zh:'这是我的书。',en:'This is my book.'}]},
  {title:'Subject + 有 + Object', pattern:'S + 有 + O', explain:'Use 有 (yǒu) to say "X has Y" or "there is Y". Negation: 没有 (méiyǒu).', examples:[{zh:'我有一本书。',en:'I have one book.'},{zh:'这里没有椅子。',en:'There is no chair here.'},{zh:'你有手机吗？',en:'Do you have a phone?'}]},
  {title:'很 + Adjective', pattern:'S + 很 + Adj', explain:'In Chinese, 很 (hěn, very) connects subject to adjective. Without 很, the sentence implies comparison.', examples:[{zh:'她很漂亮。',en:'She is very beautiful.'},{zh:'今天很冷。',en:'It is very cold today.'},{zh:'这个苹果很大。',en:'This apple is very big.'}]},
  {title:'Questions with 吗', pattern:'Statement + 吗？', explain:'Add 吗 at the end of any sentence to make it a yes/no question. No word order change needed.', examples:[{zh:'你是学生吗？',en:'Are you a student?'},{zh:'你喜欢中国菜吗？',en:'Do you like Chinese food?'},{zh:'他在家吗？',en:'Is he at home?'}]},
]},
2:{ words:[
  {id:'2-1', zh:'但是',py:'dànshì',   en:'but / however',   ex:{zh:'我想去，但是很忙。',       py:'Wǒ xiǎng qù, dànshì hěn máng.',     en:'I want to go, but I am busy.'}},
  {id:'2-2', zh:'因为',py:'yīnwèi',   en:'because',         ex:{zh:'因为下雨，我没去。',       py:'Yīnwèi xià yǔ, wǒ méi qù.',         en:"Because it rained, I didn't go."}},
  {id:'2-3', zh:'所以',py:'suǒyǐ',    en:'so / therefore',  ex:{zh:'我饿了，所以要吃饭。',     py:'Wǒ è le, suǒyǐ yào chī fàn.',       en:'I am hungry, so I want to eat.'}},
  {id:'2-4', zh:'如果',py:'rúguǒ',    en:'if',              ex:{zh:'如果明天不下雨，我就去。', py:'Rúguǒ míngtiān bù xià yǔ, wǒ jiù qù.',en:"If it doesn't rain tomorrow, I'll go."}},
  {id:'2-5', zh:'虽然',py:'suīrán',   en:'although',        ex:{zh:'虽然贵，但是很好。',       py:'Suīrán guì, dànshì hěn hǎo.',       en:"Although it's expensive, it's very good."}},
  {id:'2-6', zh:'一起',py:'yīqǐ',     en:'together',        ex:{zh:'我们一起去吧！',           py:'Wǒmen yīqǐ qù ba!',                 en:"Let's go together!"}},
  {id:'2-7', zh:'已经',py:'yǐjīng',   en:'already',         ex:{zh:'我已经吃过了。',           py:'Wǒ yǐjīng chī guò le.',             en:'I have already eaten.'}},
  {id:'2-8', zh:'还是',py:'háishi',   en:'or (in questions)',ex:{zh:'你喝茶还是咖啡？',        py:'Nǐ hē chá háishi kāfēi?',           en:'Do you drink tea or coffee?'}},
  {id:'2-9', zh:'或者',py:'huòzhě',   en:'or (statements)', ex:{zh:'你可以坐公交或者出租车。',py:'Nǐ kěyǐ zuò gōngjiāo huòzhě chūzūchē.',en:'You can take a bus or taxi.'}},
  {id:'2-10',zh:'然后',py:'rán hòu',  en:'then / after that',ex:{zh:'先吃饭，然后去散步。',    py:'Xiān chī fàn, rán hòu qù sànbù.',    en:'First eat, then go for a walk.'}},

  {id:'2-12',zh:'再',  py:'zài',      en:'again / then',    ex:{zh:'你再说一遍。',             py:'Nǐ zài shuō yī biàn.',               en:'Say it one more time.'}},
  {id:'2-13',zh:'从',  py:'cóng',     en:'from (place/time)',ex:{zh:'我从家来学校。',           py:'Wǒ cóng jiā lái xuéxiào.',           en:'I came to school from home.'}},

  {id:'2-15',zh:'对',  py:'duì',      en:'correct / towards',ex:{zh:'你说得对。',              py:'Nǐ shuō de duì.',                    en:'What you said is correct.'}},
  {id:'2-16',zh:'比',  py:'bǐ',       en:'compared to / than',ex:{zh:'他比我高。',             py:'Tā bǐ wǒ gāo.',                      en:'He is taller than me.'}},

  {id:'2-18',zh:'给',  py:'gěi',      en:'to give / for',   ex:{zh:'他给了我一本书。',         py:'Tā gěile wǒ yī běn shū.',            en:'He gave me a book.'}},
  {id:'2-19',zh:'把',  py:'bǎ',       en:'(disposal marker)',ex:{zh:'把书放在桌子上。',        py:'Bǎ shū fàng zài zhuōzi shàng.',      en:'Put the book on the table.'}},
  {id:'2-20',zh:'被',  py:'bèi',      en:'(passive marker)', ex:{zh:'手机被我弄丢了。',        py:'Shǒujī bèi wǒ nòng diū le.',         en:'The phone was lost by me (I lost the phone).'}},
  {id:'2-21',zh:'当然',py:'dāngrán',  en:'of course',       ex:{zh:'当然，我很乐意帮你。',     py:'Dāngrán, wǒ hěn lèyì bāng nǐ.',     en:"Of course, I'm happy to help you."}},
  {id:'2-22',zh:'可以',py:'kěyǐ',     en:'can / may / OK',  ex:{zh:'你可以用我的手机吗？',     py:'Nǐ kěyǐ yòng wǒ de shǒujī ma?',     en:'Can you use my phone?'}},

  {id:'2-34',zh:'以前',py:'yǐqián',   en:'before / in the past',ex:{zh:'以前我不会中文。',     py:'Yǐqián wǒ bù huì zhōngwén.',         en:"Before I couldn't speak Chinese."}},

  {id:'2-42',zh:'复习',py:'fùxí',     en:'to review',       ex:{zh:'我在复习昨天的课。',       py:'Wǒ zài fùxí zuótiān de kè.',         en:"I am reviewing yesterday's lesson."}},

], grammar:[
  {title:'比 Comparison', pattern:'A + 比 + B + Adj', explain:'Use 比 to compare two things. A 比 B 大 = A is bigger than B.', examples:[{zh:'她比我高。',en:'She is taller than me.'},{zh:'今天比昨天冷。',en:'Today is colder than yesterday.'},{zh:'这个比那个贵。',en:'This one is more expensive than that one.'}]},
  {title:'Resultative Complements', pattern:'Verb + 得 + Result', explain:'得 (de) connects a verb to its result or degree. It describes HOW an action was done.', examples:[{zh:'他说得很好。',en:'He speaks very well.'},{zh:'她跑得很快。',en:'She runs very fast.'},{zh:'你写得不太清楚。',en:'You write not very clearly.'}]},
  {title:'把 Construction', pattern:'S + 把 + O + Verb + Result', explain:'把 moves the object before the verb to emphasize the result or disposition of the object.', examples:[{zh:'把书放在桌子上。',en:'Put the book on the table.'},{zh:'我把作业做完了。',en:'I finished my homework.'},{zh:'他把那瓶水喝完了。',en:'He drank up that bottle of water.'}]},
  {title:'被 Passive', pattern:'S + 被 + Agent + Verb', explain:'被 marks the passive voice. The subject receives the action rather than doing it.', examples:[{zh:'书被他拿走了。',en:'The book was taken by him.'},{zh:'我被老师批评了。',en:'I was criticized by the teacher.'},{zh:'手机被我弄丢了。',en:'The phone was lost by me.'}]},
]},
3:{words:[
  {id:'3-1',zh:'按照',py:'ànzhào',en:"according to",ex:{zh:'请按照顺序排队。',py:'Qǐng ànzhào shùnxù páiduì.',en:"Please line up in order."}},
  {id:'3-2',zh:'把',py:'bǎ',en:"disposal marker",ex:{zh:'请把书放在桌子上。',py:'Qǐng bǎ shū fàng zài zhuōzi shàng.',en:"Please put the book on the table."}},
  {id:'3-3',zh:'班',py:'bān',en:"class / shift",ex:{zh:'我们班有三十个学生。',py:'Wǒmen bān yǒu sānshí gè xuésheng.',en:"Our class has thirty students."}},
  {id:'3-4',zh:'搬',py:'bān',en:"to move objects",ex:{zh:'帮我搬一下这个箱子。',py:'Bāng wǒ bān yīxià zhège xiāngzi.',en:"Help me move this box."}},
  {id:'3-5',zh:'办法',py:'bànfǎ',en:"method / way",ex:{zh:'我们需要找到解决办法。',py:'Wǒmen xūyào zhǎodào jiějué bànfǎ.',en:"We need to find a solution."}},
  {id:'3-6',zh:'办公室',py:'bàngōngshì',en:"office",ex:{zh:'他在办公室工作。',py:'Tā zài bàngōngshì gōngzuò.',en:"He works in an office."}},
  {id:'3-7',zh:'保护',py:'bǎohù',en:"to protect",ex:{zh:'我们要保护环境。',py:'Wǒmen yào bǎohù huánjìng.',en:"We must protect the environment."}},
  {id:'3-8',zh:'比较',py:'bǐjiào',en:"to compare / relatively",ex:{zh:'这个比较好。',py:'Zhège bǐjiào hǎo.',en:"This one is relatively better."}},
  {id:'3-9',zh:'变化',py:'biànhuà',en:"change / to change",ex:{zh:'天气变化很快。',py:'Tiānqì biànhuà hěn kuài.',en:"The weather changes quickly."}},
  {id:'3-10',zh:'别人',py:'biéren',en:"other people",ex:{zh:'不要总是依赖别人。',py:'Bùyào zǒngshì yīlài biéren.',en:"Do not always rely on others."}},
  {id:'3-11',zh:'冰箱',py:'bīngxiāng',en:"refrigerator",ex:{zh:'冰箱里有很多食物。',py:'Bīngxiāng lǐ yǒu hěn duō shíwù.',en:"There is a lot of food in the fridge."}},
  {id:'3-12',zh:'才',py:'cái',en:"only then / just",ex:{zh:'他昨天才回来。',py:'Tā zuótiān cái huílai.',en:"He only came back yesterday."}},
  {id:'3-13',zh:'参加',py:'cānjiā',en:"to participate",ex:{zh:'我想参加这次比赛。',py:'Wǒ xiǎng cānjiā zhè cì bǐsài.',en:"I want to join this competition."}},
  {id:'3-14',zh:'超市',py:'chāoshì',en:"supermarket",ex:{zh:'我要去超市买东西。',py:'Wǒ yào qù chāoshì mǎi dōngxi.',en:"I need to go to the supermarket."}},
  {id:'3-15',zh:'成功',py:'chénggōng',en:"to succeed / success",ex:{zh:'努力学习才能成功。',py:'Nǔlì xuéxí cái néng chénggōng.',en:"You must study hard to succeed."}},
  {id:'3-16',zh:'成为',py:'chéngwéi',en:"to become",ex:{zh:'他想成为一名医生。',py:'Tā xiǎng chéngwéi yī míng yīshēng.',en:"He wants to become a doctor."}},
  {id:'3-17',zh:'城市',py:'chéngshì',en:"city",ex:{zh:'北京是一个大城市。',py:'Běijīng shì yīgè dà chéngshì.',en:"Beijing is a big city."}},
  {id:'3-18',zh:'迟到',py:'chídào',en:"to be late",ex:{zh:'对不起，我迟到了。',py:'Duìbuqǐ, wǒ chídào le.',en:"Sorry, I am late."}},
  {id:'3-19',zh:'除了',py:'chúle',en:"except / besides",ex:{zh:'除了他，大家都来了。',py:'Chúle tā, dàjiā dōu lái le.',en:"Everyone came except him."}},
  {id:'3-20',zh:'词典',py:'cídiǎn',en:"dictionary",ex:{zh:'我需要一本词典。',py:'Wǒ xūyào yī běn cídiǎn.',en:"I need a dictionary."}},
  {id:'3-21',zh:'从来',py:'cónglái',en:"always / never with neg.",ex:{zh:'我从来不迟到。',py:'Wǒ cónglái bù chídào.',en:"I never arrive late."}},
  {id:'3-22',zh:'大概',py:'dàgài',en:"approximately / probably",ex:{zh:'他大概三十岁。',py:'Tā dàgài sānshí suì.',en:"He is probably thirty years old."}},
  {id:'3-23',zh:'当',py:'dāng',en:"to serve as / when",ex:{zh:'他想当老师。',py:'Tā xiǎng dāng lǎoshī.',en:"He wants to be a teacher."}},
  {id:'3-24',zh:'灯',py:'dēng',en:"lamp / light",ex:{zh:'请把灯打开。',py:'Qǐng bǎ dēng dǎkāi.',en:"Please turn on the light."}},
  {id:'3-25',zh:'地方',py:'dìfang',en:"place / region",ex:{zh:'这是一个美丽的地方。',py:'Zhè shì yīgè měilì de dìfang.',en:"This is a beautiful place."}},
  {id:'3-26',zh:'地图',py:'dìtú',en:"map",ex:{zh:'你有这个城市的地图吗？',py:'Nǐ yǒu zhège chéngshì de dìtú ma?',en:"Do you have a map of this city?"}},
  {id:'3-27',zh:'电梯',py:'diàntī',en:"elevator",ex:{zh:'电梯在哪里？',py:'Diàntī zài nǎlǐ?',en:"Where is the elevator?"}},
  {id:'3-28',zh:'而且',py:'érqiě',en:"furthermore / and also",ex:{zh:'他聪明而且勤奋。',py:'Tā cōngming érqiě qínfèn.',en:"He is smart and also hardworking."}},
  {id:'3-29',zh:'发现',py:'fāxiàn',en:"to discover / to find",ex:{zh:'他发现了一个问题。',py:'Tā fāxiànle yīgè wèntí.',en:"He discovered a problem."}},
  {id:'3-30',zh:'方便',py:'fāngbiàn',en:"convenient",ex:{zh:'住在这里很方便。',py:'Zhù zài zhèlǐ hěn fāngbiàn.',en:"Living here is very convenient."}},
  {id:'3-31',zh:'复习',py:'fùxí',en:"to review / to revise",ex:{zh:'考试前要好好复习。',py:'Kǎoshì qián yào hǎohǎo fùxí.',en:"Review well before the exam."}},
  {id:'3-32',zh:'附近',py:'fùjìn',en:"nearby",ex:{zh:'附近有没有超市？',py:'Fùjìn yǒu méiyǒu chāoshì?',en:"Is there a supermarket nearby?"}},
  {id:'3-33',zh:'感觉',py:'gǎnjué',en:"feeling / to feel",ex:{zh:'我感觉很累。',py:'Wǒ gǎnjué hěn lèi.',en:"I feel very tired."}},
  {id:'3-34',zh:'刚才',py:'gāngcái',en:"just now",ex:{zh:'刚才他打电话来了。',py:'Gāngcái tā dǎ diànhuà lái le.',en:"He just called a moment ago."}},
  {id:'3-35',zh:'更',py:'gèng',en:"even more",ex:{zh:'今天比昨天更冷。',py:'Jīntiān bǐ zuótiān gèng lěng.',en:"Today is even colder than yesterday."}},
  {id:'3-36',zh:'故事',py:'gùshi',en:"story",ex:{zh:'他讲了一个有趣的故事。',py:'Tā jiǎngle yīgè yǒuqù de gùshi.',en:"He told an interesting story."}},
  {id:'3-37',zh:'关键',py:'guānjiàn',en:"key / crucial",ex:{zh:'坚持是成功的关键。',py:'Jiānchí shì chénggōng de guānjiàn.',en:"Persistence is the key to success."}},
  {id:'3-38',zh:'害怕',py:'hàipà',en:"to be afraid",ex:{zh:'她害怕蜘蛛。',py:'Tā hàipà zhīzhū.',en:"She is afraid of spiders."}},
  {id:'3-39',zh:'好像',py:'hǎoxiàng',en:"to seem / as if",ex:{zh:'他好像不高兴。',py:'Tā hǎoxiàng bù gāoxìng.',en:"He seems unhappy."}},
  {id:'3-40',zh:'合适',py:'héshì',en:"suitable / appropriate",ex:{zh:'这件衣服很合适。',py:'Zhè jiàn yīfu hěn héshì.',en:"This clothing is very suitable."}},
  {id:'3-41',zh:'后来',py:'hòulái',en:"later / afterwards",ex:{zh:'后来他明白了。',py:'Hòulái tā míngbai le.',en:"Later he understood."}},
  {id:'3-42',zh:'互联网',py:'hùliánwǎng',en:"the internet",ex:{zh:'互联网改变了我们的生活。',py:'Hùliánwǎng gǎibiànle wǒmen de shēnghuó.',en:"The internet has changed our lives."}},
  {id:'3-43',zh:'护照',py:'hùzhào',en:"passport",ex:{zh:'出国需要护照。',py:'Chū guó xūyào hùzhào.',en:"You need a passport to go abroad."}},
  {id:'3-44',zh:'环境',py:'huánjìng',en:"environment",ex:{zh:'保护环境很重要。',py:'Bǎohù huánjìng hěn zhòngyào.',en:"Protecting the environment is important."}},
  {id:'3-45',zh:'活动',py:'huódòng',en:"activity / event",ex:{zh:'学校组织了很多活动。',py:'Xuéxiào zǔzhīle hěn duō huódòng.',en:"The school organized many activities."}},
  {id:'3-46',zh:'机会',py:'jīhuì',en:"opportunity / chance",ex:{zh:'不要错过这个机会。',py:'Bùyào cuòguò zhège jīhuì.',en:"Do not miss this opportunity."}},
  {id:'3-47',zh:'几乎',py:'jīhū',en:"almost / nearly",ex:{zh:'他几乎每天都跑步。',py:'Tā jīhū měitiān dōu pǎobù.',en:"He runs almost every day."}},
  {id:'3-48',zh:'计划',py:'jìhuà',en:"plan / to plan",ex:{zh:'你有什么计划？',py:'Nǐ yǒu shénme jìhuà?',en:"What plans do you have?"}},
  {id:'3-49',zh:'记得',py:'jìde',en:"to remember",ex:{zh:'你还记得我吗？',py:'Nǐ hái jìde wǒ ma?',en:"Do you still remember me?"}},
  {id:'3-50',zh:'结果',py:'jiéguǒ',en:"result / outcome",ex:{zh:'考试结果怎么样？',py:'Kǎoshì jiéguǒ zěnmeyàng?',en:"How were the exam results?"}},
  {id:'3-51',zh:'借',py:'jiè',en:"to borrow / to lend",ex:{zh:'我可以借你的笔吗？',py:'Wǒ kěyǐ jiè nǐ de bǐ ma?',en:"Can I borrow your pen?"}},
  {id:'3-52',zh:'进行',py:'jìnxíng',en:"to carry out",ex:{zh:'会议正在进行中。',py:'Huìyì zhèngzài jìnxíng zhōng.',en:"The meeting is in progress."}},
  {id:'3-53',zh:'经过',py:'jīngguò',en:"to pass / via",ex:{zh:'他经过了很多困难。',py:'Tā jīngguòle hěn duō kùnnan.',en:"He went through many difficulties."}},
  {id:'3-54',zh:'空气',py:'kōngqì',en:"air",ex:{zh:'这里的空气很清新。',py:'Zhèlǐ de kōngqì hěn qīngxīn.',en:"The air here is very fresh."}},
  {id:'3-55',zh:'离开',py:'líkāi',en:"to leave / to depart",ex:{zh:'他明天离开北京。',py:'Tā míngtiān líkāi Běijīng.',en:"He leaves Beijing tomorrow."}},
  {id:'3-56',zh:'礼物',py:'lǐwù',en:"gift / present",ex:{zh:'他送给我一份礼物。',py:'Tā sòng gěi wǒ yī fèn lǐwù.',en:"He gave me a gift."}},
  {id:'3-57',zh:'联系',py:'liánxì',en:"to contact",ex:{zh:'保持联系！',py:'Bǎochí liánxì!',en:"Keep in touch!"}},
  {id:'3-58',zh:'了解',py:'liǎojiě',en:"to understand / to know about",ex:{zh:'我想了解更多。',py:'Wǒ xiǎng liǎojiě gèng duō.',en:"I want to know more."}},
  {id:'3-59',zh:'流利',py:'liúlì',en:"fluent",ex:{zh:'她说中文很流利。',py:'Tā shuō Zhōngwén hěn liúlì.',en:"She speaks Chinese fluently."}},
  {id:'3-60',zh:'满意',py:'mǎnyì',en:"satisfied",ex:{zh:'我对这个结果很满意。',py:'Wǒ duì zhège jiéguǒ hěn mǎnyì.',en:"I am very satisfied with this result."}},
  {id:'3-61',zh:'明显',py:'míngxiǎn',en:"obvious / clear",ex:{zh:'这个问题很明显。',py:'Zhège wèntí hěn míngxiǎn.',en:"This problem is very obvious."}},
  {id:'3-62',zh:'目的',py:'mùdì',en:"purpose / goal",ex:{zh:'你学习的目的是什么？',py:'Nǐ xuéxí de mùdì shì shénme?',en:"What is your purpose for studying?"}},
  {id:'3-63',zh:'年龄',py:'niánlíng',en:"age",ex:{zh:'你的年龄是多少？',py:'Nǐ de niánlíng shì duōshao?',en:"How old are you?"}},
  {id:'3-64',zh:'普通话',py:'pǔtōnghuà',en:"Mandarin Chinese",ex:{zh:'他的普通话说得很好。',py:'Tā de pǔtōnghuà shuō de hěn hǎo.',en:"He speaks Mandarin very well."}},
  {id:'3-65',zh:'其他',py:'qítā',en:"other / else",ex:{zh:'还有其他问题吗？',py:'Hái yǒu qítā wèntí ma?',en:"Are there any other questions?"}},
  {id:'3-66',zh:'认识',py:'rènshi',en:"to know / to recognize",ex:{zh:'很高兴认识你。',py:'Hěn gāoxìng rènshi nǐ.',en:"Nice to meet you."}},
  {id:'3-67',zh:'如果',py:'rúguǒ',en:"if / in case",ex:{zh:'如果明天下雨，我们就不去了。',py:'Rúguǒ míngtiān xià yǔ, wǒmen jiù bù qù le.',en:"If it rains tomorrow, we will not go."}},
  {id:'3-68',zh:'散步',py:'sànbù',en:"to take a walk",ex:{zh:'我喜欢饭后散步。',py:'Wǒ xǐhuān fàn hòu sànbù.',en:"I like to take a walk after meals."}},
  {id:'3-69',zh:'上网',py:'shàngwǎng',en:"to go online",ex:{zh:'他每天都上网。',py:'Tā měitiān dōu shàngwǎng.',en:"He goes online every day."}},
  {id:'3-70',zh:'生气',py:'shēngqì',en:"to be angry",ex:{zh:'妈妈生气了。',py:'Māma shēngqì le.',en:"Mom is angry."}},
  {id:'3-71',zh:'世界',py:'shìjiè',en:"world",ex:{zh:'世界很大。',py:'Shìjiè hěn dà.',en:"The world is very big."}},
  {id:'3-72',zh:'速度',py:'sùdù',en:"speed",ex:{zh:'火车的速度很快。',py:'Huǒchē de sùdù hěn kuài.',en:"The train speed is very fast."}},
  {id:'3-73',zh:'所以',py:'suǒyǐ',en:"therefore / so",ex:{zh:'我很累，所以早点睡。',py:'Wǒ hěn lèi, suǒyǐ zǎo diǎn shuì.',en:"I am tired so I will sleep early."}},
  {id:'3-74',zh:'太阳',py:'tàiyáng',en:"sun",ex:{zh:'今天太阳很好。',py:'Jīntiān tàiyáng hěn hǎo.',en:"The sun is bright today."}},
  {id:'3-75',zh:'特别',py:'tèbié',en:"special / especially",ex:{zh:'他特别喜欢音乐。',py:'Tā tèbié xǐhuān yīnyuè.',en:"He especially likes music."}},
  {id:'3-76',zh:'提高',py:'tígāo',en:"to improve / to raise",ex:{zh:'我想提高我的中文水平。',py:'Wǒ xiǎng tígāo wǒ de Zhōngwén shuǐpíng.',en:"I want to improve my Chinese level."}},
  {id:'3-77',zh:'同意',py:'tóngyì',en:"to agree",ex:{zh:'我同意你的看法。',py:'Wǒ tóngyì nǐ de kànfǎ.',en:"I agree with your view."}},
  {id:'3-78',zh:'图书馆',py:'túshūguǎn',en:"library",ex:{zh:'我去图书馆借书。',py:'Wǒ qù túshūguǎn jiè shū.',en:"I go to the library to borrow books."}},
  {id:'3-79',zh:'突然',py:'tūrán',en:"suddenly",ex:{zh:'他突然站起来了。',py:'Tā tūrán zhàn qǐlai le.',en:"He suddenly stood up."}},
  {id:'3-80',zh:'完成',py:'wánchéng',en:"to complete / to finish",ex:{zh:'他完成了任务。',py:'Tā wánchéngle rènwù.',en:"He completed the task."}},
  {id:'3-81',zh:'网站',py:'wǎngzhàn',en:"website",ex:{zh:'请访问我们的网站。',py:'Qǐng fǎngwèn wǒmen de wǎngzhàn.',en:"Please visit our website."}},
  {id:'3-82',zh:'为了',py:'wèile',en:"in order to / for",ex:{zh:'为了健康，要多运动。',py:'Wèile jiànkāng, yào duō yùndòng.',en:"For health, you should exercise more."}},
  {id:'3-83',zh:'文章',py:'wénzhāng',en:"article / essay",ex:{zh:'他写了一篇文章。',py:'Tā xiěle yī piān wénzhāng.',en:"He wrote an article."}},
  {id:'3-84',zh:'西',py:'xī',en:"west",ex:{zh:'太阳从西边落下。',py:'Tàiyáng cóng xī biān luòxia.',en:"The sun sets in the west."}},
  {id:'3-85',zh:'相同',py:'xiāngtóng',en:"same / identical",ex:{zh:'我们的看法相同。',py:'Wǒmen de kànfǎ xiāngtóng.',en:"Our views are the same."}},
  {id:'3-86',zh:'效果',py:'xiàoguǒ',en:"effect / result",ex:{zh:'这个方法效果很好。',py:'Zhège fāngfǎ xiàoguǒ hěn hǎo.',en:"This method has a good effect."}},
  {id:'3-87',zh:'辛苦',py:'xīnkǔ',en:"hard / laborious",ex:{zh:'你辛苦了。',py:'Nǐ xīnkǔ le.',en:"You have worked hard."}},
  {id:'3-88',zh:'信息',py:'xìnxī',en:"information",ex:{zh:'我需要更多信息。',py:'Wǒ xūyào gèng duō xìnxī.',en:"I need more information."}},
  {id:'3-89',zh:'行',py:'xíng',en:"OK / will do",ex:{zh:'行，我明天去。',py:'Xíng, wǒ míngtiān qù.',en:"OK, I will go tomorrow."}},
  {id:'3-90',zh:'选择',py:'xuǎnzé',en:"to choose / choice",ex:{zh:'你有很多选择。',py:'Nǐ yǒu hěn duō xuǎnzé.',en:"You have many choices."}},
  {id:'3-91',zh:'要求',py:'yāoqiú',en:"to require / requirement",ex:{zh:'老师对我们要求很高。',py:'Lǎoshī duì wǒmen yāoqiú hěn gāo.',en:"The teacher has high requirements for us."}},
  {id:'3-92',zh:'一定',py:'yīdìng',en:"certainly / must",ex:{zh:'你一定能成功。',py:'Nǐ yīdìng néng chénggōng.',en:"You will certainly succeed."}},
  {id:'3-93',zh:'意见',py:'yìjiàn',en:"opinion / suggestion",ex:{zh:'你有什么意见？',py:'Nǐ yǒu shénme yìjiàn?',en:"What is your opinion?"}},
  {id:'3-94',zh:'因为',py:'yīnwèi',en:"because",ex:{zh:'因为下雨，所以没去。',py:'Yīnwèi xià yǔ, suǒyǐ méi qù.',en:"Because of the rain, I did not go."}},
  {id:'3-95',zh:'影响',py:'yǐngxiǎng',en:"influence / to affect",ex:{zh:'这件事影响了他的决定。',py:'Zhè jiàn shì yǐngxiǎngle tā de juédìng.',en:"This event affected his decision."}},
  {id:'3-96',zh:'用',py:'yòng',en:"to use",ex:{zh:'你怎么用这个？',py:'Nǐ zěnme yòng zhège?',en:"How do you use this?"}},
  {id:'3-97',zh:'重要',py:'zhòngyào',en:"important",ex:{zh:'学习很重要。',py:'Xuéxí hěn zhòngyào.',en:"Learning is very important."}},
  {id:'3-98',zh:'注意',py:'zhùyì',en:"to pay attention / be careful",ex:{zh:'过马路要注意安全。',py:'Guò mǎlù yào zhùyì ānquán.',en:"Be careful when crossing the road."}},
  {id:'3-99',zh:'准备',py:'zhǔnbèi',en:"to prepare",ex:{zh:'我在准备考试。',py:'Wǒ zài zhǔnbèi kǎoshì.',en:"I am preparing for the exam."}},
  {id:'3-100',zh:'总是',py:'zǒngshì',en:"always",ex:{zh:'他总是很准时。',py:'Tā zǒngshì hěn zhǔnshí.',en:"He is always very punctual."}},

  {id:'3-101',zh:'爱好',py:'àihào',en:"hobby / interest",ex:{zh:'他的爱好是打篮球。',py:'Tā de àihào shì dǎ lánqiú.',en:"His hobby is playing basketball."}},
  {id:'3-102',zh:'安静',py:'ānjìng',en:"quiet / peaceful",ex:{zh:'图书馆里很安静。',py:'Túshūguǎn lǐ hěn ānjìng.',en:"The library is very quiet."}},
  {id:'3-103',zh:'把握',py:'bǎwò',en:"to grasp / to be confident",ex:{zh:'我对这次考试有把握。',py:'Wǒ duì zhè cì kǎoshì yǒu bǎwò.',en:"I am confident about this exam."}},
  {id:'3-104',zh:'帮忙',py:'bāngmáng',en:"to help / to lend a hand",ex:{zh:'请帮我一个忙。',py:'Qǐng bāng wǒ yīgè máng.',en:"Please do me a favor."}},

  {id:'3-107',zh:'必须',py:'bìxū',en:"must / have to",ex:{zh:'你必须认真学习。',py:'Nǐ bìxū rènzhēn xuéxí.',en:"You must study seriously."}},

  {id:'3-111',zh:'冰',py:'bīng',en:"ice",ex:{zh:'冬天河里结冰了。',py:'Dōngtiān hé lǐ jié bīng le.',en:"The river froze in winter."}},

  {id:'3-114',zh:'参观',py:'cānguān',en:"to visit / to tour",ex:{zh:'我们去参观了博物馆。',py:'Wǒmen qù cānguānle bówùguǎn.',en:"We went to visit the museum."}},

  {id:'3-116',zh:'超',py:'chāo',en:"to exceed / super",ex:{zh:'这超出了我的预算。',py:'Zhè chāochūle wǒ de yùsuàn.',en:"This exceeded my budget."}},
  {id:'3-117',zh:'吵',py:'chǎo',en:"noisy / to quarrel",ex:{zh:'外面太吵了。',py:'Wàimiàn tài chǎo le.',en:"It is too noisy outside."}},
  {id:'3-118',zh:'衬衫',py:'chènshān',en:"shirt",ex:{zh:'他穿了一件白衬衫。',py:'Tā chuānle yī jiàn bái chènshān.',en:"He wore a white shirt."}},
  {id:'3-119',zh:'成绩',py:'chéngjì',en:"result / grade / achievement",ex:{zh:'他的成绩很好。',py:'Tā de chéngjì hěn hǎo.',en:"His grades are very good."}},
  {id:'3-120',zh:'乘坐',py:'chéngzuò',en:"to take / to ride",ex:{zh:'我乘坐地铁上班。',py:'Wǒ chéngzuò dìtiě shàngbān.',en:"I take the subway to work."}},

  {id:'3-126',zh:'聪明',py:'cōngming',en:"smart / clever",ex:{zh:'她是一个聪明的女孩。',py:'Tā shì yīgè cōngming de nǚhái.',en:"She is a smart girl."}},

  {id:'3-130',zh:'打折',py:'dǎzhé',en:"to give a discount",ex:{zh:'这件衣服打折了。',py:'Zhè jiàn yīfu dǎzhé le.',en:"This clothing is on discount."}},
  {id:'3-131',zh:'打针',py:'dǎzhēn',en:"to give/get an injection",ex:{zh:'医生给他打了针。',py:'Yīshēng gěi tā dǎle zhēn.',en:"The doctor gave him an injection."}},

  {id:'3-136',zh:'登机',py:'dēngjī',en:"to board a plane",ex:{zh:'请准备登机。',py:'Qǐng zhǔnbèi dēngjī.',en:"Please prepare to board."}},

  {id:'3-138',zh:'电影院',py:'diànyǐngyuàn',en:"cinema / movie theater",ex:{zh:'我们去电影院看电影。',py:'Wǒmen qù diànyǐngyuàn kàn diànyǐng.',en:"We go to the cinema to watch a film."}},

  {id:'3-180',zh:'好处',py:'hǎochù',en:"benefit / advantage",ex:{zh:'运动有很多好处。',py:'Yùndòng yǒu hěn duō hǎochù.',en:"Exercise has many benefits."}},

  {id:'3-182',zh:'合同',py:'hétong',en:"contract",ex:{zh:'请签好合同再离开。',py:'Qǐng qiān hǎo hétong zài líkāi.',en:"Please sign the contract before leaving."}},

  {id:'3-190',zh:'活泼',py:'huópō',en:"lively / vivacious",ex:{zh:'这个孩子很活泼。',py:'Zhège háizi hěn huópō.',en:"This child is very lively."}},

  {id:'3-194',zh:'坚强',py:'jiānqiáng',en:"strong / tough",ex:{zh:'她是一个坚强的人。',py:'Tā shì yīgè jiānqiáng de rén.',en:"She is a strong person."}},

  {id:'3-196',zh:'简单',py:'jiǎndān',en:"simple / easy",ex:{zh:'这道题很简单。',py:'Zhè dào tí hěn jiǎndān.',en:"This question is very simple."}},

  {id:'3-200',zh:'节日',py:'jiérì',en:"holiday / festival",ex:{zh:'春节是最重要的节日。',py:'Chūnjié shì zuì zhòngyào de jiérì.',en:"Spring Festival is the most important holiday."}},

  {id:'3-221',zh:'零钱',py:'língqián',en:"change / small money",ex:{zh:'你有零钱吗？',py:'Nǐ yǒu língqián ma?',en:"Do you have any change?"}},
  {id:'3-222',zh:'另外',py:'lìngwài',en:"in addition / another",ex:{zh:'另外，我还有一个问题。',py:'Lìngwài, wǒ hái yǒu yīgè wèntí.',en:"In addition, I have one more question."}},

  {id:'3-276',zh:'味道',py:'wèidào',en:"taste / flavor",ex:{zh:'这道菜味道很好。',py:'Zhè dào cài wèidào hěn hǎo.',en:"This dish tastes very good."}},

  {id:'3-285',zh:'系',py:'xì',en:"department / to tie",ex:{zh:'他在中文系学习。',py:'Tā zài Zhōngwén xì xuéxí.',en:"He studies in the Chinese department."}},

  {id:'3-289',zh:'羡慕',py:'xiànmù',en:"to envy / to admire",ex:{zh:'我很羡慕他的才能。',py:'Wǒ hěn xiànmù tā de cáinéng.',en:"I admire his talent greatly."}},
  {id:'3-290',zh:'消费',py:'xiāofèi',en:"to consume / consumption",ex:{zh:'这家店消费很高。',py:'Zhè jiā diàn xiāofèi hěn gāo.',en:"Spending at this shop is very high."}},

  {id:'3-292',zh:'心情',py:'xīnqíng',en:"mood / state of mind",ex:{zh:'今天他心情很好。',py:'Jīntiān tā xīnqíng hěn hǎo.',en:"He is in a good mood today."}},
  {id:'3-293',zh:'幸福',py:'xìngfú',en:"happiness / happy",ex:{zh:'他们一家人很幸福。',py:'Tāmen yījiārén hěn xìngfú.',en:"Their whole family is very happy."}},
  {id:'3-294',zh:'许多',py:'xǔduō',en:"many / a lot of",ex:{zh:'这里有许多有趣的地方。',py:'Zhèlǐ yǒu xǔduō yǒuqù de dìfang.',en:"There are many interesting places here."}},
  {id:'3-295',zh:'学期',py:'xuéqī',en:"semester / school term",ex:{zh:'这个学期很充实。',py:'Zhège xuéqī hěn chōngshí.',en:"This semester has been very fulfilling."}},
  {id:'3-296',zh:'压力',py:'yālì',en:"pressure / stress",ex:{zh:'他工作压力很大。',py:'Tā gōngzuò yālì hěn dà.',en:"He has a lot of work pressure."}},
  {id:'3-297',zh:'严格',py:'yángé',en:"strict / rigorous",ex:{zh:'这位老师要求很严格。',py:'Zhè wèi lǎoshī yāoqiú hěn yángé.',en:"This teacher has very strict requirements."}},
  {id:'3-298',zh:'研究',py:'yánjiū',en:"research / to study",ex:{zh:'他正在研究这个问题。',py:'Tā zhèngzài yánjiū zhège wèntí.',en:"He is researching this problem."}},
  {id:'3-299',zh:'演讲',py:'yǎnjiǎng',en:"speech / to give a speech",ex:{zh:'他做了一个精彩的演讲。',py:'Tā zuòle yīgè jīngcǎi de yǎnjiǎng.',en:"He gave a wonderful speech."}},
  {id:'3-300',zh:'一般',py:'yībān',en:"general / ordinary / usually",ex:{zh:'他一般七点起床。',py:'Tā yībān qī diǎn qǐchuáng.',en:"He usually gets up at seven."}},
],grammar:[
  {title:'把 Construction',pattern:'Subject + 把 + Object + Verb + Result',explain:'把 moves the object before the verb to emphasize what happens to it.',examples:[{zh:'请把窗户关上。',en:"Please close the window."},{zh:'他把作业做完了。',en:"He finished the homework."}]},
  {title:'比 Comparison',pattern:'A + 比 + B + Adjective',explain:'Used to compare two things directly.',examples:[{zh:'今天比昨天冷。',en:"Today is colder than yesterday."},{zh:'他比我高。',en:"He is taller than me."}]},
  {title:'是...的 Construction',pattern:'是 + time/place/manner + 的',explain:'Emphasizes when, where, or how a past action occurred.',examples:[{zh:'我是昨天来的。',en:"It was yesterday that I came."},{zh:'他是坐飞机去的。',en:"He went by plane."}]},
{title:'得 Degree Complement',pattern:'Verb + 得 + Adjective/Result',explain:'得 connects a verb to describe HOW the action was performed. Used to evaluate quality or result.',examples:[{zh:'他说得很好。',en:"He speaks very well."},{zh:'她跑得很快。',en:"She runs very fast."}]},
  {title:'被 Passive',pattern:'Subject + 被 + Agent + Verb',explain:'被 marks passive voice. The subject receives the action. Common when something negative happens.',examples:[{zh:'他的钱包被偷了。',en:"His wallet was stolen."},{zh:'作业被老师批改了。',en:"The homework was corrected by the teacher."}]},
  {title:'连...都/也',pattern:'连 + noun/verb + 都/也 + verb',explain:'Emphasizes "even". Shows something surprising or extreme is included.',examples:[{zh:'他连饭都没吃就去上学了。',en:"He went to school without even eating."},{zh:'这道题连老师也不会。',en:"Even the teacher can't do this question."}]},
  {title:'不但...而且',pattern:'不但 + A + 而且 + B',explain:'Means "not only A but also B". Used to add emphasis by stacking positive qualities.',examples:[{zh:'他不但会说中文，而且会说日语。',en:"He not only speaks Chinese but also Japanese."},{zh:'这里不但便宜，而且好吃。',en:"Not only is it cheap here, but also delicious."}]},
  {title:'虽然...但是',pattern:'虽然 + A + 但是/可是 + B',explain:'Means "although A, but B". A concession followed by a contrasting point.',examples:[{zh:'虽然很贵，但是质量很好。',en:"Although expensive, the quality is very good."},{zh:'虽然下雨了，但是我们还是去了。',en:"Although it rained, we still went."}]},
  {title:'只要...就',pattern:'只要 + condition + 就 + result',explain:'Means "as long as... then". A sufficient condition for the result.',examples:[{zh:'只要努力，就会成功。',en:"As long as you work hard, you will succeed."},{zh:'只要你来，我就高兴。',en:"As long as you come, I will be happy."}]},
  {title:'先...再/然后',pattern:'先 + action 1 + 再/然后 + action 2',explain:'Shows sequential actions: first do A then do B.',examples:[{zh:'先洗手，再吃饭。',en:"Wash hands first, then eat."},{zh:'先做完作业，然后再玩。',en:"Finish homework first, then play."}]},
  {title:'一边...一边',pattern:'一边 + action 1 + 一边 + action 2',explain:'Shows two actions happening simultaneously.',examples:[{zh:'他一边吃饭一边看电视。',en:"He eats while watching TV."},{zh:'她一边唱歌一边跳舞。',en:"She sings while dancing."}]},
  {title:'既...又',pattern:'既 + A + 又 + B',explain:'Means "both A and B". Used to describe two qualities that coexist.',examples:[{zh:'这道菜既好看又好吃。',en:"This dish is both beautiful and delicious."},{zh:'他既聪明又勤奋。',en:"He is both smart and hardworking."}]},
  {title:'越来越 / 越...越',pattern:'越来越 + adj  OR  越 + A + 越 + B',explain:'越来越 = getting more and more. 越A越B = the more A the more B.',examples:[{zh:'他的中文越来越好了。',en:"His Chinese is getting better and better."},{zh:'越努力越成功。',en:"The harder you work the more successful you are."}]},
  {title:'除了...以外/之外',pattern:'除了 + exception + 以外/之外',explain:'Means "besides / except for". Can add with 还/都.',examples:[{zh:'除了他以外，大家都来了。',en:"Everyone came except for him."},{zh:'除了中文，他还学了日语。',en:"Besides Chinese, he also studied Japanese."}]},
]},
4:{words:[
  {id:'4-1',zh:'按时',py:'ànshí',en:"on time",ex:{zh:'请按时完成作业。',py:'Qǐng ànshí wánchéng zuòyè.',en:"Please finish the homework on time."}},
  {id:'4-2',zh:'把握',py:'bǎwò',en:"to grasp / confidence",ex:{zh:'他对这次考试很有把握。',py:'Tā duì zhè cì kǎoshì hěn yǒu bǎwò.',en:"He is very confident about this exam."}},
  {id:'4-3',zh:'摆',py:'bǎi',en:"to place / to arrange",ex:{zh:'把书摆整齐。',py:'Bǎ shū bǎi zhěngqí.',en:"Arrange the books neatly."}},
  {id:'4-4',zh:'保持',py:'bǎochí',en:"to keep / to maintain",ex:{zh:'保持联系很重要。',py:'Bǎochí liánxì hěn zhòngyào.',en:"Keeping in touch is important."}},
  {id:'4-5',zh:'保存',py:'bǎocún',en:"to preserve / to save",ex:{zh:'请保存好这份文件。',py:'Qǐng bǎocún hǎo zhè fèn wénjiàn.',en:"Please save this document."}},
  {id:'4-6',zh:'报告',py:'bàogào',en:"report / to report",ex:{zh:'他写了一份工作报告。',py:'Tā xiěle yī fèn gōngzuò bàogào.',en:"He wrote a work report."}},
  {id:'4-7',zh:'报名',py:'bàomíng',en:"to sign up / to register",ex:{zh:'我已经报名参加比赛了。',py:'Wǒ yǐjīng bàomíng cānjiā bǐsài le.',en:"I have already signed up for the competition."}},
  {id:'4-8',zh:'悲观',py:'bēiguān',en:"pessimistic",ex:{zh:'不要太悲观，要有信心。',py:'Bùyào tài bēiguān, yào yǒu xìnxīn.',en:"Don't be too pessimistic, have confidence."}},
  {id:'4-9',zh:'本来',py:'běnlái',en:"originally / at first",ex:{zh:'本来我想去，但是太忙了。',py:'Běnlái wǒ xiǎng qù, dànshì tài máng le.',en:"I originally wanted to go but was too busy."}},
  {id:'4-10',zh:'必然',py:'bìrán',en:"inevitable / certainly",ex:{zh:'努力学习必然会成功。',py:'Nǔlì xuéxí bìrán huì chénggōng.',en:"Hard study will inevitably lead to success."}},
  {id:'4-11',zh:'避免',py:'bìmiǎn',en:"to avoid",ex:{zh:'我们要避免犯同样的错误。',py:'Wǒmen yào bìmiǎn fàn tóngyàng de cuòwù.',en:"We should avoid making the same mistakes."}},
  {id:'4-12',zh:'编辑',py:'biānjí',en:"editor / to edit",ex:{zh:'他是一名杂志编辑。',py:'Tā shì yī míng zázhì biānjí.',en:"He is a magazine editor."}},
  {id:'4-13',zh:'标准',py:'biāozhǔn',en:"standard / criterion",ex:{zh:'这个产品符合质量标准。',py:'Zhège chǎnpǐn fúhé zhìliàng biāozhǔn.',en:"This product meets quality standards."}},
  {id:'4-14',zh:'表达',py:'biǎodá',en:"to express",ex:{zh:'他很难表达自己的感情。',py:'Tā hěn nán biǎodá zìjǐ de gǎnqíng.',en:"He finds it hard to express his feelings."}},
  {id:'4-15',zh:'表面',py:'biǎomiàn',en:"surface / appearance",ex:{zh:'不要只看表面现象。',py:'Bùyào zhǐ kàn biǎomiàn xiànxiàng.',en:"Don't just look at the surface phenomenon."}},
  {id:'4-16',zh:'表明',py:'biǎomíng',en:"to indicate / to show",ex:{zh:'数据表明情况在改善。',py:'Shùjù biǎomíng qíngkuàng zài gǎishàn.',en:"The data shows the situation is improving."}},
  {id:'4-17',zh:'不断',py:'bùduàn',en:"continuously / constantly",ex:{zh:'他不断努力提高自己。',py:'Tā bùduàn nǔlì tígāo zìjǐ.',en:"He constantly works to improve himself."}},
  {id:'4-18',zh:'不得不',py:'bùdébù',en:"have no choice but to",ex:{zh:'天黑了，我不得不回家。',py:'Tiān hēi le, wǒ bùdébù huíjiā.',en:"It got dark so I had no choice but to go home."}},
  {id:'4-19',zh:'不管',py:'bùguǎn',en:"no matter / regardless",ex:{zh:'不管多难，我都要坚持。',py:'Bùguǎn duō nán, wǒ dōu yào jiānchí.',en:"No matter how difficult, I will persist."}},
  {id:'4-20',zh:'不仅',py:'bùjǐn',en:"not only",ex:{zh:'他不仅聪明，而且勤奋。',py:'Tā bùjǐn cōngming, érqiě qínfèn.',en:"He is not only smart but also hardworking."}},
  {id:'4-21',zh:'财产',py:'cáichǎn',en:"property / assets",ex:{zh:'他拥有大量财产。',py:'Tā yōngyǒu dàliàng cáichǎn.',en:"He owns a large amount of property."}},
  {id:'4-22',zh:'采取',py:'cǎiqǔ',en:"to adopt / to take measures",ex:{zh:'政府采取了有效措施。',py:'Zhèngfǔ cǎiqǔle yǒuxiào cuòshī.',en:"The government adopted effective measures."}},
  {id:'4-23',zh:'策略',py:'cèlüè',en:"strategy / tactics",ex:{zh:'我们需要改变策略。',py:'Wǒmen xūyào gǎibiàn cèlüè.',en:"We need to change our strategy."}},
  {id:'4-24',zh:'曾经',py:'céngjīng',en:"once / formerly / used to",ex:{zh:'他曾经在北京工作过。',py:'Tā céngjīng zài Běijīng gōngzuò guò.',en:"He once worked in Beijing."}},
  {id:'4-25',zh:'产生',py:'chǎnshēng',en:"to produce / to generate",ex:{zh:'压力会产生负面影响。',py:'Yālì huì chǎnshēng fùmiàn yǐngxiǎng.',en:"Stress can produce negative effects."}},
  {id:'4-26',zh:'超过',py:'chāoguò',en:"to exceed / to surpass",ex:{zh:'他的成绩超过了我。',py:'Tā de chéngjì chāoguòle wǒ.',en:"His grades exceeded mine."}},
  {id:'4-27',zh:'沉默',py:'chénmò',en:"silent / to be silent",ex:{zh:'他沉默了很长时间。',py:'Tā chénmòle hěn cháng shíjiān.',en:"He was silent for a long time."}},
  {id:'4-28',zh:'程度',py:'chéngdù',en:"degree / extent / level",ex:{zh:'他的中文达到了很高的程度。',py:'Tā de Zhōngwén dádàole hěn gāo de chéngdù.',en:"His Chinese has reached a high level."}},
  {id:'4-29',zh:'吃亏',py:'chīkuī',en:"to suffer a loss / to be at a disadvantage",ex:{zh:'不懂法律会吃亏。',py:'Bù dǒng fǎlǜ huì chīkuī.',en:"Not knowing the law puts you at a disadvantage."}},
  {id:'4-30',zh:'传统',py:'chuántǒng',en:"tradition / traditional",ex:{zh:'中国有很多传统节日。',py:'Zhōngguó yǒu hěn duō chuántǒng jiérì.',en:"China has many traditional festivals."}},
  {id:'4-31',zh:'此外',py:'cǐwài',en:"moreover / in addition",ex:{zh:'此外，我们还需要更多时间。',py:'Cǐwài, wǒmen hái xūyào gèng duō shíjiān.',en:"Moreover, we also need more time."}},
  {id:'4-32',zh:'聪明',py:'cōngming',en:"clever / intelligent",ex:{zh:'她是一个聪明的孩子。',py:'Tā shì yīgè cōngming de háizi.',en:"She is a clever child."}},
  {id:'4-33',zh:'存在',py:'cúnzài',en:"to exist / existence",ex:{zh:'这个问题依然存在。',py:'Zhège wèntí yīrán cúnzài.',en:"This problem still exists."}},
  {id:'4-34',zh:'错误',py:'cuòwù',en:"mistake / error",ex:{zh:'每个人都会犯错误。',py:'Měi gè rén dōu huì fàn cuòwù.',en:"Everyone makes mistakes."}},
  {id:'4-35',zh:'达到',py:'dádào',en:"to achieve / to reach",ex:{zh:'他达到了自己的目标。',py:'Tā dádàole zìjǐ de mùbiāo.',en:"He achieved his goal."}},
  {id:'4-36',zh:'代表',py:'dàibiǎo',en:"representative / to represent",ex:{zh:'她代表学校参加比赛。',py:'Tā dàibiǎo xuéxiào cānjiā bǐsài.',en:"She represented the school in the competition."}},
  {id:'4-37',zh:'当地',py:'dāngdì',en:"local",ex:{zh:'当地居民非常友好。',py:'Dāngdì jūmín fēicháng yǒuhǎo.',en:"The local residents are very friendly."}},
  {id:'4-38',zh:'当时',py:'dāngshí',en:"at that time",ex:{zh:'当时我不知道这件事。',py:'Dāngshí wǒ bù zhīdào zhè jiàn shì.',en:"At that time I didn't know about this."}},
  {id:'4-39',zh:'导致',py:'dǎozhì',en:"to lead to / to cause",ex:{zh:'粗心导致了这次失败。',py:'Cūxīn dǎozhìle zhè cì shībài.',en:"Carelessness led to this failure."}},
  {id:'4-40',zh:'道理',py:'dàolǐ',en:"reason / truth / principle",ex:{zh:'你说的很有道理。',py:'Nǐ shuō de hěn yǒu dàolǐ.',en:"What you say makes a lot of sense."}},
  {id:'4-41',zh:'得意',py:'déyì',en:"proud / complacent",ex:{zh:'他考了第一名，非常得意。',py:'Tā kǎole dì yī míng, fēicháng déyì.',en:"He came first in the exam and was very proud."}},
  {id:'4-42',zh:'登记',py:'dēngjì',en:"to register / to check in",ex:{zh:'请先在前台登记。',py:'Qǐng xiān zài qiántái dēngjì.',en:"Please register at the front desk first."}},
  {id:'4-43',zh:'等于',py:'děngyú',en:"to equal / to be equivalent to",ex:{zh:'一公里等于一千米。',py:'Yī gōnglǐ děngyú yīqiān mǐ.',en:"One kilometer equals one thousand meters."}},
  {id:'4-44',zh:'地球',py:'dìqiú',en:"the Earth",ex:{zh:'我们只有一个地球。',py:'Wǒmen zhǐyǒu yīgè dìqiú.',en:"We only have one Earth."}},
  {id:'4-45',zh:'地区',py:'dìqū',en:"region / area",ex:{zh:'这个地区经济发展很快。',py:'Zhège dìqū jīngjì fāzhǎn hěn kuài.',en:"This region's economy is developing rapidly."}},
  {id:'4-46',zh:'调查',py:'diàochá',en:"investigation / to investigate",ex:{zh:'警察正在调查这件事。',py:'Jǐngchá zhèngzài diàochá zhè jiàn shì.',en:"The police are investigating this matter."}},
  {id:'4-47',zh:'独立',py:'dúlì',en:"independent / independence",ex:{zh:'年轻人要学会独立生活。',py:'Niánqīngrén yào xuéhuì dúlì shēnghuó.',en:"Young people should learn to live independently."}},
  {id:'4-48',zh:'丰富',py:'fēngfù',en:"rich / abundant",ex:{zh:'他有丰富的工作经验。',py:'Tā yǒu fēngfù de gōngzuò jīngyàn.',en:"He has rich work experience."}},
  {id:'4-49',zh:'否则',py:'fǒuzé',en:"otherwise / or else",ex:{zh:'要努力，否则会失败。',py:'Yào nǔlì, fǒuzé huì shībài.',en:"You must work hard, otherwise you will fail."}},
  {id:'4-50',zh:'符合',py:'fúhé',en:"to conform to / to meet",ex:{zh:'这个结果符合我们的预期。',py:'Zhège jiéguǒ fúhé wǒmen de yùqī.',en:"This result meets our expectations."}},
  {id:'4-51',zh:'负责',py:'fùzé',en:"responsible / to be in charge of",ex:{zh:'他负责这个项目。',py:'Tā fùzé zhège xiàngmù.',en:"He is responsible for this project."}},
  {id:'4-52',zh:'改革',py:'gǎigé',en:"reform / to reform",ex:{zh:'教育改革势在必行。',py:'Jiàoyù gǎigé shì zài bìxíng.',en:"Educational reform is imperative."}},
  {id:'4-53',zh:'改善',py:'gǎishàn',en:"to improve",ex:{zh:'生活条件不断改善。',py:'Shēnghuó tiáojiàn bùduàn gǎishàn.',en:"Living conditions are constantly improving."}},
  {id:'4-54',zh:'干燥',py:'gānzào',en:"dry / arid",ex:{zh:'冬天空气很干燥。',py:'Dōngtiān kōngqì hěn gānzào.',en:"The air is very dry in winter."}},
  {id:'4-55',zh:'感激',py:'gǎnjī',en:"grateful / to appreciate",ex:{zh:'我非常感激你的帮助。',py:'Wǒ fēicháng gǎnjī nǐ de bāngzhù.',en:"I am very grateful for your help."}},
  {id:'4-56',zh:'个别',py:'gèbié',en:"individual / exceptional",ex:{zh:'个别学生没有完成作业。',py:'Gèbié xuésheng méiyǒu wánchéng zuòyè.',en:"Individual students didn't complete their homework."}},
  {id:'4-57',zh:'工资',py:'gōngzī',en:"wages / salary",ex:{zh:'他的工资比以前高多了。',py:'Tā de gōngzī bǐ yǐqián gāo duō le.',en:"His salary is much higher than before."}},
  {id:'4-58',zh:'公平',py:'gōngpíng',en:"fair / just",ex:{zh:'比赛结果是公平的。',py:'Bǐsài jiéguǒ shì gōngpíng de.',en:"The competition result is fair."}},
  {id:'4-59',zh:'功能',py:'gōngnéng',en:"function / feature",ex:{zh:'这个手机功能很多。',py:'Zhège shǒujī gōngnéng hěn duō.',en:"This phone has many functions."}},
  {id:'4-60',zh:'贡献',py:'gòngxiàn',en:"contribution / to contribute",ex:{zh:'他为公司做出了很大贡献。',py:'Tā wèi gōngsī zuòchūle hěn dà gòngxiàn.',en:"He made a great contribution to the company."}},
  {id:'4-61',zh:'构成',py:'gòuchéng',en:"to constitute / to form",ex:{zh:'这些元素构成了整体。',py:'Zhèxiē yuánsù gòuchéngle zhěngtǐ.',en:"These elements form the whole."}},
  {id:'4-62',zh:'鼓励',py:'gǔlì',en:"to encourage",ex:{zh:'老师经常鼓励我们。',py:'Lǎoshī jīngcháng gǔlì wǒmen.',en:"The teacher often encourages us."}},
  {id:'4-63',zh:'顾客',py:'gùkè',en:"customer / client",ex:{zh:'这家店的顾客很多。',py:'Zhè jiā diàn de gùkè hěn duō.',en:"This shop has many customers."}},
  {id:'4-64',zh:'关注',py:'guānzhù',en:"to pay attention to / to follow",ex:{zh:'大家都很关注这件事。',py:'Dàjiā dōu hěn guānzhù zhè jiàn shì.',en:"Everyone is paying close attention to this."}},
  {id:'4-65',zh:'管理',py:'guǎnlǐ',en:"management / to manage",ex:{zh:'他擅长管理团队。',py:'Tā shàncháng guǎnlǐ tuánduì.',en:"He is good at managing teams."}},
  {id:'4-66',zh:'规定',py:'guīdìng',en:"regulation / to stipulate",ex:{zh:'请遵守公司规定。',py:'Qǐng zūnshǒu gōngsī guīdìng.',en:"Please follow company regulations."}},
  {id:'4-67',zh:'规律',py:'guīlǜ',en:"law / pattern / regularity",ex:{zh:'学习要有规律。',py:'Xuéxí yào yǒu guīlǜ.',en:"Studying should be done regularly."}},
  {id:'4-68',zh:'过分',py:'guòfèn',en:"excessive / going too far",ex:{zh:'他的要求有点过分。',py:'Tā de yāoqiú yǒudiǎn guòfèn.',en:"His demands are a bit excessive."}},
  {id:'4-69',zh:'豪华',py:'háohuá',en:"luxurious / luxury",ex:{zh:'这是一家豪华酒店。',py:'Zhè shì yī jiā háohuá jiǔdiàn.',en:"This is a luxury hotel."}},
  {id:'4-70',zh:'何况',py:'hékuàng',en:"let alone / much less",ex:{zh:'小事都做不好，何况大事？',py:'Xiǎo shì dōu zuò bù hǎo, hékuàng dà shì?',en:"Can't even do small things well, let alone big things."}},
  {id:'4-71',zh:'合法',py:'héfǎ',en:"legal / lawful",ex:{zh:'这种行为是合法的。',py:'Zhè zhǒng xíngwéi shì héfǎ de.',en:"This behavior is legal."}},
  {id:'4-72',zh:'忽视',py:'hūshì',en:"to ignore / to neglect",ex:{zh:'不能忽视这个问题。',py:'Bù néng hūshì zhège wèntí.',en:"We cannot ignore this problem."}},
  {id:'4-73',zh:'积极',py:'jījí',en:"positive / active / enthusiastic",ex:{zh:'他工作态度非常积极。',py:'Tā gōngzuò tàidù fēicháng jījí.',en:"His work attitude is very positive."}},
  {id:'4-74',zh:'基本',py:'jīběn',en:"basic / fundamental",ex:{zh:'这是最基本的要求。',py:'Zhè shì zuì jīběn de yāoqiú.',en:"This is the most basic requirement."}},
  {id:'4-75',zh:'及时',py:'jíshí',en:"timely / promptly",ex:{zh:'问题要及时解决。',py:'Wèntí yào jíshí jiějué.',en:"Problems should be solved promptly."}},
  {id:'4-76',zh:'集中',py:'jízhōng',en:"to concentrate / to focus",ex:{zh:'上课时要集中注意力。',py:'Shàngkè shí yào jízhōng zhùyìlì.',en:"You should concentrate in class."}},
  {id:'4-77',zh:'坚持',py:'jiānchí',en:"to persist / to insist",ex:{zh:'无论多难，都要坚持。',py:'Wúlùn duō nán, dōu yào jiānchí.',en:"No matter how hard, you must persist."}},
  {id:'4-78',zh:'减少',py:'jiǎnshǎo',en:"to reduce / to decrease",ex:{zh:'要减少不必要的浪费。',py:'Yào jiǎnshǎo bù bìyào de làngfèi.',en:"We should reduce unnecessary waste."}},
  {id:'4-79',zh:'交流',py:'jiāoliú',en:"to exchange / communication",ex:{zh:'多交流可以增进了解。',py:'Duō jiāoliú kěyǐ zēngjìn liǎojiě.',en:"More communication can deepen understanding."}},
  {id:'4-80',zh:'角度',py:'jiǎodù',en:"angle / perspective",ex:{zh:'从不同角度看问题。',py:'Cóng bùtóng jiǎodù kàn wèntí.',en:"Look at the problem from different angles."}},
  {id:'4-81',zh:'阶段',py:'jiēduàn',en:"stage / phase",ex:{zh:'我们处于发展的初级阶段。',py:'Wǒmen chǔyú fāzhǎn de chūjí jiēduàn.',en:"We are at the initial stage of development."}},
  {id:'4-82',zh:'结合',py:'jiéhé',en:"to combine / to integrate",ex:{zh:'理论要结合实践。',py:'Lǐlùn yào jiéhé shíjiàn.',en:"Theory should be combined with practice."}},
  {id:'4-83',zh:'解决',py:'jiějué',en:"to solve / to resolve",ex:{zh:'我们需要立刻解决这个问题。',py:'Wǒmen xūyào lìkè jiějué zhège wèntí.',en:"We need to solve this problem immediately."}},
  {id:'4-84',zh:'尽管',py:'jǐnguǎn',en:"although / even though",ex:{zh:'尽管很难，他还是坚持了。',py:'Jǐnguǎn hěn nán, tā hái shì jiānchí le.',en:"Although it was hard, he still persisted."}},
  {id:'4-85',zh:'紧张',py:'jǐnzhāng',en:"nervous / tense",ex:{zh:'考试前他非常紧张。',py:'Kǎoshì qián tā fēicháng jǐnzhāng.',en:"He was very nervous before the exam."}},

],grammar:[
  {title:'不管...都',pattern:'不管 + condition + 都/也 + result',explain:'Means "no matter... always". Used to show a result is constant regardless of conditions.',examples:[{zh:'不管多忙，他都会回家吃饭。',en:"No matter how busy, he always comes home to eat."},{zh:'不管天气怎样，我都要去。',en:"No matter what the weather is like, I will go."}]},
  {title:'只有...才',pattern:'只有 + condition + 才 + result',explain:'Means "only if... then". Emphasizes that the condition is the ONLY way to get the result.',examples:[{zh:'只有努力，才能成功。',en:"Only through hard work can one succeed."},{zh:'只有你来，我才放心。',en:"Only when you come will I feel at ease."}]},
  {title:'既然...就',pattern:'既然 + known fact + 就 + conclusion',explain:'Means "since... then". Used when drawing a logical conclusion from an established fact.',examples:[{zh:'既然你同意，我们就开始吧。',en:"Since you agree, let us begin."},{zh:'既然已经来了，就好好玩吧。',en:"Since you are already here, enjoy yourself."}]},
  {title:'宁可...也不',pattern:'宁可 + accepted option + 也不 + rejected option',explain:'Means "would rather... than". Shows a preference for one undesirable option over another.',examples:[{zh:'宁可站着死，也不跪着生。',en:"Would rather die standing than live kneeling."},{zh:'我宁可少睡，也不能不学习。',en:"I would rather sleep less than not study."}]},
  {title:'越来越',pattern:'越来越 + adjective/verb',explain:'Means "more and more". Shows a gradual increase or change.',examples:[{zh:'他的中文越来越好了。',en:"His Chinese is getting better and better."},{zh:'天气越来越冷了。',en:"The weather is getting colder and colder."}]},
  {title:'越...越',pattern:'越 + A + 越 + B',explain:'Means "the more A, the more B". Shows two things increasing together.',examples:[{zh:'越努力，越成功。',en:"The harder you work, the more successful you are."},{zh:'他越说越兴奋。',en:"The more he talked the more excited he got."}]},
  {title:'尽管...还是',pattern:'尽管 + obstacle + 还是 + action',explain:'Means "despite/although... still". Shows an action continues despite difficulties.',examples:[{zh:'尽管很难，他还是坚持了。',en:"Despite the difficulty, he still persisted."},{zh:'尽管下雨，他还是来了。',en:"Despite the rain, he still came."}]},
  {title:'不是...而是',pattern:'不是 + wrong interpretation + 而是 + correct one',explain:'Means "not... but rather". Used to correct a misconception or clarify.',examples:[{zh:'他不是不想去，而是没时间。',en:"He doesn't not want to go, but rather has no time."},{zh:'问题不是钱，而是态度。',en:"The issue is not money but attitude."}]},
  {title:'对...来说',pattern:'对 + person/group + 来说',explain:'Means "for... / from the perspective of...". Used to introduce a viewpoint.',examples:[{zh:'对学生来说，学习是最重要的。',en:"For students, studying is the most important thing."},{zh:'对我来说，健康比金钱重要。',en:"For me, health is more important than money."}]},
  {title:'由于...因此',pattern:'由于 + cause + 因此/所以 + result',explain:'Means "due to... therefore". A formal way to express cause and effect.',examples:[{zh:'由于天气原因，比赛取消了。',en:"Due to weather conditions, the match was cancelled."},{zh:'由于努力学习，他考了第一名。',en:"Due to studying hard, he came first in the exam."}]},
  {title:'一旦...就',pattern:'一旦 + condition + 就 + result',explain:'Means "once/as soon as... then". Signals that a result follows immediately from a condition.',examples:[{zh:'一旦开始，就不能停下来。',en:"Once you start, you cannot stop."},{zh:'一旦下决心，就要坚持。',en:"Once you make up your mind, you must persist."}]},
  {title:'与其...不如',pattern:'与其 + less preferred + 不如 + more preferred',explain:'Means "rather than A, it is better to B". Used to compare options and recommend one.',examples:[{zh:'与其抱怨，不如行动。',en:"Rather than complaining, it is better to take action."},{zh:'与其等待，不如主动出击。',en:"Rather than waiting, it is better to take the initiative."}]},
]},

// AUDIO — Web Speech API
// ══════════════════════════════════════════════════════════
let zhVoice = null;
function loadVoice() {
  const voices = window.speechSynthesis?.getVoices() || [];
  zhVoice = voices.find(v => v.lang.startsWith('zh')) || null;
}
if (window.speechSynthesis) {
  loadVoice();
  window.speechSynthesis.addEventListener('voiceschanged', loadVoice);
}

function speak(text, rate = 0.85) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = rate; u.pitch = 1;
  if (zhVoice) u.voice = zhVoice;
  window.speechSynthesis.speak(u);
}

// HELPERS
// ══════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(arr, n) { return shuffle(arr).slice(0, n); }
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getDistractors(correct, pool, field, n = 3) {
  const others = pool.filter(w => w[field] !== correct[field]);
  return shuffle(others).slice(0, n);
}

function renderHearts() {
  heartsEl.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const s = document.createElement('span');
    s.className = 'heart' + (i >= hearts ? ' lost' : '');
    s.textContent = '❤️';
    heartsEl.appendChild(s);
  }
}

function updateProgress() {
  const pct = steps.length ? Math.round((currentStep / steps.length) * 100) : 0;
  progressEl.style.width = Math.min(pct, 100) + '%';
}

function loseHeart() {
  hearts = Math.max(0, hearts - 1);
  localStorage.setItem(key('hearts'), hearts);
  renderHearts();
  if (hearts <= 0) {
    setTimeout(() => document.getElementById('nh-overlay').classList.add('show'), 600);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ══════════════════════════════════════════════════════════
// LESSON PLAN GENERATOR
// ══════════════════════════════════════════════════════════
function getLessonPlan(levelNum, lessonNum) {
  const posInBlock = ((lessonNum - 1) % 6); // 0=Intro,1=Reinforce,2=Expand,3=Mixed,4=Speed,5=Checkpoint
  const blockNum   = Math.ceil(lessonNum / 6);
  const words      = HSK[levelNum]?.words || [];
  const grammar    = HSK[levelNum]?.grammar || [];

  // Words for this block — 5 per block, cycle if stub level doesn't have enough
  const blockStart  = words.length > 0 ? ((blockNum - 1) * 5) % Math.max(words.length, 1) : 0;
  const rawNew      = words.slice(blockStart, blockStart + 5);
  const newWords    = rawNew.length >= 2 ? rawNew : words.slice(0, Math.min(5, words.length));
  const reviewStart = Math.max(0, blockStart - 10);
  const reviewWords = blockStart > 0 ? words.slice(reviewStart, blockStart) : [];
  const grammarItem = grammar.length > 0 ? (grammar[blockNum % grammar.length] || grammar[0]) : null;

  const LESSON_NAMES = ['Introduction','Reinforcement','Expansion','Mixed Practice','⚡ Speed Challenge','✓ Checkpoint'];
  const plan = {
    name: LESSON_NAMES[posInBlock],
    posInBlock,
    blockNum,
    levelNum,
    lessonNum,
    newWords,
    reviewWords,
    grammarItem,
    isSpeed: posInBlock === 4,
    isCheckpoint: posInBlock === 5,
  };
  return plan;
}

function buildSteps(plan) {
  const { posInBlock, newWords, reviewWords, grammarItem, levelNum } = plan;
  const allWords = HSK[levelNum]?.words || [];
  let s = [];

  if (plan.isCheckpoint) {
    return buildCheckpointSteps(plan);
  }

  if (plan.isSpeed) {
    return buildSpeedSteps(plan);
  }

  if (posInBlock === 0) {
    // LESSON 1: Introduction — word cards + grammar + basic MCQ
    newWords.forEach(w => s.push({ type:'word_card', word: w }));
    if (grammarItem) s.push({ type:'grammar', grammar: grammarItem });
    newWords.forEach(w => s.push({ type:'mcq_meaning', word: w, pool: allWords }));
    s.push({ type:'match', words: newWords.slice(0,4) });
  } else if (posInBlock === 1) {
    // LESSON 2: Reinforcement — review + TF + fill blank + pinyin
    newWords.forEach(w => s.push({ type:'tf_sentence', word: w, pool: allWords }));
    newWords.forEach(w => s.push({ type:'mcq_hanzi', word: w, pool: allWords }));
    newWords.slice(0,3).forEach(w => s.push({ type:'fill_blank', word: w }));
    if (reviewWords.length > 0) pick(reviewWords, 2).forEach(w => s.push({ type:'mcq_meaning', word: w, pool: allWords }));
    s.push({ type:'match', words: newWords.slice(0,4) });
  } else if (posInBlock === 2) {
    // LESSON 3: Expansion — 2 new + listening + sentence build
    const extraStart = Math.min(newWords.length * 2, allWords.length - 2);
    const extraWords = allWords.slice(extraStart, extraStart + 2);
    extraWords.forEach(w => s.push({ type:'word_card', word: w }));
    newWords.forEach(w => s.push({ type:'listen_tf', word: w }));
    newWords.slice(0,3).forEach(w => s.push({ type:'sentence_order', word: w }));
    if (reviewWords.length > 0) pick(reviewWords, 3).forEach(w => s.push({ type:'mcq_meaning', word: w, pool: allWords }));
    s.push({ type:'match', words: [...newWords.slice(0,2), ...extraWords.slice(0,2)] });
  } else if (posInBlock === 3) {
    // LESSON 4: Mixed Practice — no new words, error correction, reading passage
    const practiceWords = [...newWords, ...reviewWords.slice(0,3)];
    practiceWords.forEach(w => s.push({ type:'mcq_meaning', word: w, pool: allWords }));
    practiceWords.slice(0,3).forEach(w => s.push({ type:'error_correction', word: w, pool: allWords }));
    newWords.slice(0,2).forEach(w => s.push({ type:'reading_passage', word: w }));
    if (newWords.length >= 4) s.push({ type:'match', words: newWords.slice(0,4) });
    practiceWords.slice(0,3).forEach(w => s.push({ type:'pinyin_type', word: w }));
  }

  return s.filter(Boolean);
}

function buildSpeedSteps(plan) {
  const { newWords, reviewWords, levelNum } = plan;
  const allWords = HSK[levelNum]?.words || [];
  const pool = shuffle([...newWords, ...reviewWords]).slice(0, 10);
  const types = ['mcq_meaning','mcq_hanzi','tf_sentence','listen_tf'];
  return pool.map(w => ({ type: rand(types), word: w, pool: allWords, speed: true }));
}

function buildCheckpointSteps(plan) {
  const { newWords, reviewWords, levelNum } = plan;
  const allWords = HSK[levelNum]?.words || [];
  const pool = [...newWords, ...reviewWords].filter(Boolean);
  let s = [];
  // Part 1 — Listening (5 questions)
  shuffle(pool).slice(0,5).forEach(w => s.push({ type:'listen_tf', word: w, section:'listen' }));
  // Part 2 — Reading (5 questions)
  shuffle(pool).slice(0,3).forEach(w => s.push({ type:'mcq_meaning', word: w, pool: allWords, section:'read' }));
  shuffle(pool).slice(0,2).forEach(w => s.push({ type:'reading_passage', word: w, section:'read' }));
  // Part 3 — Writing (3 questions)
  shuffle(pool).slice(0,2).forEach(w => s.push({ type:'sentence_order', word: w, section:'write' }));
  shuffle(pool).slice(0,1).forEach(w => s.push({ type:'pinyin_type', word: w, section:'write' }));
  return s;
}

// ══════════════════════════════════════════════════════════
// RENDER STEP
// ══════════════════════════════════════════════════════════
function renderStep(idx) {
  if (idx >= steps.length) { showComplete(); return; }
  answeredStep = false;
  matchState = null;
  wordBankState = null;
  clearInterval(speedTimer);

  const step = steps[idx];
  stepArea.className = 'step-area step-in';
  bottomArea.innerHTML = '';
  updateProgress();

  // Update info bar section indicator
  const sectionColors = { listen:'var(--blue)', read:'var(--green)', write:'var(--purple)' };
  const sectionLabels = { listen:'🎧 Listening', read:'📖 Reading', write:'✍️ Writing' };
  if (step.section) {
    document.getElementById('info-type').style.background = `rgba(${step.section === 'listen' ? '96,165,250' : step.section === 'read' ? '61,219,122' : '167,139,250'},.1)`;
    document.getElementById('info-type').textContent = sectionLabels[step.section] + (lesson.plan.isCheckpoint ? ' · Checkpoint' : '');
  }

  switch (step.type) {
    case 'word_card':     renderWordCard(step); break;
    case 'grammar':       renderGrammar(step); break;
    case 'mcq_meaning':   renderMCQ(step, 'meaning'); break;
    case 'mcq_hanzi':     renderMCQ(step, 'hanzi'); break;
    case 'tf_sentence':   renderTrueFalse(step, false); break;
    case 'listen_tf':     renderListenTF(step); break;
    case 'fill_blank':    renderFillBlank(step); break;
    case 'sentence_order':renderSentenceOrder(step); break;
    case 'match':         renderMatch(step); break;
    case 'error_correction': renderErrorCorrection(step); break;
    case 'reading_passage':  renderReadingPassage(step); break;
    case 'pinyin_type':   renderPinyinType(step); break;
    default: nextStep();
  }

  if (step.speed) startSpeedTimer();
}

// ── WORD CARD
function renderWordCard(step) {
  const w = step.word;
  const AUDIO_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';

  stepArea.innerHTML = '';

  // Build card using DOM — NO inline onclick with Chinese strings
  const card = document.createElement('div');
  card.className = 'word-card';

  // Top row: hanzi + audio button
  const top = document.createElement('div');
  top.className = 'wc-top';
  const hanzi = document.createElement('div');
  hanzi.className = 'wc-hanzi';
  hanzi.textContent = w.zh;
  const ab = document.createElement('button');
  ab.className = 'btn-audio';
  ab.innerHTML = AUDIO_SVG;
  ab.addEventListener('click', function() { speak(w.zh); });
  top.appendChild(hanzi);
  top.appendChild(ab);
  card.appendChild(top);

  // Pinyin + meaning
  const py = document.createElement('div');
  py.className = 'wc-pinyin';
  py.textContent = w.py;
  card.appendChild(py);

  const mn = document.createElement('div');
  mn.className = 'wc-meaning';
  mn.textContent = w.en;
  card.appendChild(mn);

  // Example sentence
  if (w.ex) {
    const ex = document.createElement('div');
    ex.className = 'wc-example';

    const lbl = document.createElement('div');
    lbl.className = 'ex-label';
    lbl.textContent = 'Example';

    const zhRow = document.createElement('div');
    zhRow.className = 'ex-zh';
    const zhTxt = document.createElement('span');
    zhTxt.textContent = w.ex.zh + ' ';
    const ab2 = document.createElement('button');
    ab2.className = 'btn-audio';
    ab2.style.cssText = 'display:inline-flex;width:22px;height:22px';
    ab2.innerHTML = AUDIO_SVG;
    ab2.addEventListener('click', function() { speak(w.ex.zh); });
    zhRow.appendChild(zhTxt);
    zhRow.appendChild(ab2);

    const pyRow = document.createElement('div');
    pyRow.className = 'ex-py';
    pyRow.textContent = w.ex.py;

    const enRow = document.createElement('div');
    enRow.className = 'ex-en';
    enRow.textContent = w.ex.en;

    ex.appendChild(lbl);
    ex.appendChild(zhRow);
    ex.appendChild(pyRow);
    ex.appendChild(enRow);
    card.appendChild(ex);
  }

  stepArea.appendChild(card);
  speak(w.zh);
  bottomArea.innerHTML = '<button class="btn-primary" onclick="nextStep()">Got it →</button>';
}

// ── GRAMMAR
function renderGrammar(step) {
  const g = step.grammar;
  if (!g) { nextStep(); return; }
  const AUDIO_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';

  stepArea.innerHTML = '';
  const ql = document.createElement('div');
  ql.className = 'q-label read';
