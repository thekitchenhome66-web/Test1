  {id:'5-810',zh:'立意',py:'lìyì',en:"theme / underlying idea / moral",ex:{zh:'文章立意要高远。',py:'Wénzhāng lìyì yào gāoyuǎn.',en:"The theme of an article must be lofty."}},
  {id:'5-811',zh:'量力而行',py:'liàng lì ér xíng',en:"to act within one's means",ex:{zh:'要量力而行，不能好高骛远。',py:'Yào liàng lì ér xíng, bùnéng hào gāo wù yuǎn.',en:"Act within your means and don't have unrealistic ambitions."}},
  {id:'5-812',zh:'淋漓尽致',py:'lín lí jìn zhì',en:"vividly / thoroughly / to the fullest",ex:{zh:'他的表演淋漓尽致，感人至深。',py:'Tā de biǎoyǎn lín lí jìn zhì, gǎnrén zhì shēn.',en:"His performance was thorough and deeply moving."}},
  {id:'5-813',zh:'凛然',py:'lǐnrán',en:"awe-inspiring / stern",ex:{zh:'他义正词严，凛然正气。',py:'Tā yì zhèng cí yán, lǐnrán zhèngqì.',en:"He spoke sternly and with righteous authority."}},
  {id:'5-814',zh:'流光溢彩',py:'liú guāng yì cǎi',en:"sparkling with brilliant colors",ex:{zh:'夜晚的城市流光溢彩。',py:'Yèwǎn de chéngshì liú guāng yì cǎi.',en:"The city at night sparkles with brilliant colors."}},
  {id:'5-815',zh:'屡战屡败',py:'lǚ zhàn lǚ bài',en:"to lose every battle",ex:{zh:'屡战屡败不可怕，重要的是不放弃。',py:'Lǚ zhàn lǚ bài bù kěpà, zhòngyào de shì bù fàngqì.',en:"Losing every battle is not frightening — what matters is not giving up."}},
  {id:'5-816',zh:'论证',py:'lùnzhèng',en:"to demonstrate / argumentation / proof",ex:{zh:'要用充分的事实论证观点。',py:'Yào yòng chōngfèn de shìshí lùnzhèng guāndiǎn.',en:"Use sufficient facts to demonstrate your viewpoint."}},
  {id:'5-817',zh:'落落大方',py:'luò luò dà fāng',en:"natural and graceful / poised",ex:{zh:'她言谈举止落落大方。',py:'Tā yántán jǔzhǐ luò luò dà fāng.',en:"Her manner of speaking and conduct is natural and graceful."}},
  {id:'5-818',zh:'马到成功',py:'mǎ dào chéng gōng',en:"to succeed immediately upon arrival",ex:{zh:'祝你马到成功，旗开得胜。',py:'Zhù nǐ mǎ dào chéng gōng, qí kāi dé shèng.',en:"I wish you immediate success upon arrival."}},
  {id:'5-819',zh:'茅塞顿开',py:'máo sè dùn kāi',en:"to suddenly become enlightened",ex:{zh:'老师的一句话让他茅塞顿开。',py:'Lǎoshī de yī jù huà ràng tā máo sè dùn kāi.',en:"The teacher's words suddenly enlightened him."}},
  {id:'5-820',zh:'美轮美奂',py:'měi lún měi huàn',en:"magnificent and splendid",ex:{zh:'这座建筑美轮美奂，令人叹为观止。',py:'Zhè zuò jiànzhú měi lún měi huàn, lìng rén tàn wéi guān zhǐ.',en:"This building is magnificent and splendid, making people marvel."}},
  {id:'5-821',zh:'妙趣横生',py:'miào qù héng shēng',en:"full of wit and humor",ex:{zh:'他的演讲妙趣横生，引人入胜。',py:'Tā de yǎnjiǎng miào qù héng shēng, yǐn rén rù shèng.',en:"His speech was full of wit and humor, captivating the audience."}},
  {id:'5-822',zh:'明辨是非',py:'míng biàn shì fēi',en:"to distinguish right from wrong",ex:{zh:'做人要明辨是非，坚持正义。',py:'Zuòrén yào míng biàn shì fēi, jiānchí zhèngyì.',en:"A person must distinguish right from wrong and uphold justice."}},
  {id:'5-823',zh:'默契',py:'mòqì',en:"tacit understanding / rapport",ex:{zh:'他们两人配合默契。',py:'Tāmen liǎng rén pèihé mòqì.',en:"The two of them have a tacit understanding."}},
  {id:'5-824',zh:'奈何',py:'nàihé',en:"how / but alas / what can be done",ex:{zh:'奈何时不我待，只好加紧行动。',py:'Nàihé shí bù wǒ dài, zhǐhǎo jiājǐn xíngdòng.',en:"Alas, time waits for no one, so we must act quickly."}},
  {id:'5-825',zh:'能者多劳',py:'néng zhě duō láo',en:"the capable must work harder",ex:{zh:'能者多劳，他承担了更多任务。',py:'Néng zhě duō láo, tā chéngdānle gèng duō rènwù.',en:"The capable must work harder — he took on more tasks."}},
  {id:'5-826',zh:'宁死不屈',py:'nìng sǐ bù qū',en:"to rather die than submit",ex:{zh:'他宁死不屈，坚守信仰。',py:'Tā nìng sǐ bù qū, jiānshǒu xìnyǎng.',en:"He would rather die than submit and held fast to his beliefs."}},
  {id:'5-827',zh:'浓墨重彩',py:'nóng mò zhòng cǎi',en:"with rich ink and heavy colors / lavish",ex:{zh:'历史将浓墨重彩地记录这一时刻。',py:'Lìshǐ jiāng nóng mò zhòng cǎi de jìlù zhè yī shíkè.',en:"History will record this moment in rich and vivid terms."}},
  {id:'5-828',zh:'旁征博引',py:'páng zhēng bó yǐn',en:"to cite copiously from many sources",ex:{zh:'他旁征博引，论据充分。',py:'Tā páng zhēng bó yǐn, lùnjù chōngfèn.',en:"He cited copiously from many sources with sufficient evidence."}},
  {id:'5-829',zh:'培根铸魂',py:'péi gēn zhù hún',en:"to cultivate roots and forge souls",ex:{zh:'教育的根本任务是培根铸魂。',py:'Jiàoyù de gēnběn rènwù shì péi gēn zhù hún.',en:"The fundamental task of education is to cultivate roots and forge souls."}},
  {id:'5-830',zh:'蓬莱仙境',py:'Pénglái xiānjìng',en:"Penglai fairyland / paradise",ex:{zh:'这个地方美如蓬莱仙境。',py:'Zhège dìfāng měi rú Pénglái xiānjìng.',en:"This place is as beautiful as the Penglai fairyland."}},
  {id:'5-831',zh:'披肝沥胆',py:'pī gān lì dǎn',en:"to give one's heart and soul",ex:{zh:'他为事业披肝沥胆，无怨无悔。',py:'Tā wèi shìyè pī gān lì dǎn, wú yuàn wú huǐ.',en:"He gave his heart and soul to his career without regret."}},
  {id:'5-832',zh:'品味',py:'pǐnwèi',en:"to taste / to savor / taste",ex:{zh:'要用心品味生活的美好。',py:'Yào yòngxīn pǐnwèi shēnghuó de měihǎo.',en:"You must savor the beauty of life with your heart."}},
  {id:'5-833',zh:'平易近人',py:'píng yì jìn rén',en:"easy to approach / amiable",ex:{zh:'他平易近人，没有一点架子。',py:'Tā píng yì jìn rén, méiyǒu yīdiǎn jiàzi.',en:"He is easy to approach with no airs at all."}},
  {id:'5-834',zh:'泼墨',py:'pō mò',en:"to splash ink / to paint freely",ex:{zh:'他泼墨挥毫，一气呵成。',py:'Tā pō mò huī háo, yī qì hē chéng.',en:"He splashed ink and wielded his brush in one unbroken flow."}},
  {id:'5-835',zh:'铺垫',py:'pūdiàn',en:"to pave the way / groundwork",ex:{zh:'前期工作为成功铺垫了基础。',py:'Qiánqī gōngzuò wèi chénggōng pūdiànle jīchǔ.',en:"The preliminary work laid the groundwork for success."}},
  {id:'5-836',zh:'奇光异彩',py:'qí guāng yì cǎi',en:"dazzling brilliance / extraordinary radiance",ex:{zh:'这部作品奇光异彩，令人叹为观止。',py:'Zhè bù zuòpǐn qí guāng yì cǎi, lìng rén tàn wéi guān zhǐ.',en:"This work shines with extraordinary radiance, making people marvel."}},
  {id:'5-837',zh:'器宇轩昂',py:'qì yǔ xuān áng',en:"dignified bearing / impressive presence",ex:{zh:'他器宇轩昂，仪表堂堂。',py:'Tā qì yǔ xuān áng, yíbiǎo tángtáng.',en:"He has a dignified bearing and an impressive appearance."}},
  {id:'5-838',zh:'千变万化',py:'qiān biàn wàn huà',en:"ever-changing / kaleidoscopic",ex:{zh:'世界千变万化，要灵活应对。',py:'Shìjiè qiān biàn wàn huà, yào línghuó yìngduì.',en:"The world is ever-changing and you must respond flexibly."}},
  {id:'5-839',zh:'千锤百炼',py:'qiān chuí bǎi liàn',en:"thoroughly tempered / refined through hard work",ex:{zh:'这句话是千锤百炼的经典。',py:'Zhè jù huà shì qiān chuí bǎi liàn de jīngdiǎn.',en:"This phrase is a classic refined through much effort."}},
  {id:'5-840',zh:'千丝万缕',py:'qiān sī wàn lǚ',en:"a thousand and one links / intricately connected",ex:{zh:'两者之间有着千丝万缕的联系。',py:'Liǎng zhě zhī jiān yǒuzhe qiān sī wàn lǚ de liánxì.',en:"The two are intricately connected in countless ways."}},
  {id:'5-841',zh:'前车之鉴',py:'qián chē zhī jiàn',en:"a lesson from a predecessor's failure",ex:{zh:'要以前车之鉴，避免重蹈覆辙。',py:'Yào yǐ qián chē zhī jiàn, bìmiǎn chóngdǎo fùzhé.',en:"Learn from the lesson of predecessors' failures to avoid repeating the same mistakes."}},
  {id:'5-842',zh:'潜在',py:'qiánzài',en:"potential / latent / hidden",ex:{zh:'要发掘潜在的市场机会。',py:'Yào fājué qiánzài de shìchǎng jīhuì.',en:"Latent market opportunities must be discovered."}},
  {id:'5-843',zh:'恰如其分',py:'qià rú qí fèn',en:"just right / appropriate",ex:{zh:'他的评价恰如其分。',py:'Tā de píngjià qià rú qí fèn.',en:"His evaluation is just right."}},
  {id:'5-844',zh:'奇思妙想',py:'qí sī miào xiǎng',en:"brilliant ideas / whimsical thoughts",ex:{zh:'创新来自奇思妙想。',py:'Chuàngxīn láizì qí sī miào xiǎng.',en:"Innovation comes from brilliant ideas."}},
  {id:'5-845',zh:'情真意切',py:'qíng zhēn yì qiē',en:"sincere feelings / heartfelt",ex:{zh:'他的信写得情真意切。',py:'Tā de xìn xiě de qíng zhēn yì qiē.',en:"His letter was written with sincere and heartfelt feelings."}},
  {id:'5-846',zh:'求贤若渴',py:'qiú xián ruò kě',en:"to eagerly seek talented people",ex:{zh:'他求贤若渴，广纳人才。',py:'Tā qiú xián ruò kě, guǎng nà réncái.',en:"He eagerly seeks talented people and recruits them widely."}},
  {id:'5-847',zh:'取精用宏',py:'qǔ jīng yòng hóng',en:"to select the best and use it broadly",ex:{zh:'学习要取精用宏，融会贯通。',py:'Xuéxí yào qǔ jīng yòng hóng, róng huì guān tōng.',en:"Learning means selecting the best and integrating it comprehensively."}},
  {id:'5-848',zh:'热泪盈眶',py:'rè lèi yíng kuàng',en:"eyes brimming with tears",ex:{zh:'听到这个消息，他热泪盈眶。',py:'Tīngdào zhège xiāoxi, tā rè lèi yíng kuàng.',en:"Upon hearing this news, his eyes brimmed with tears."}},
  {id:'5-849',zh:'仁者见仁',py:'rén zhě jiàn rén',en:"different people have different views",ex:{zh:'仁者见仁，智者见智。',py:'Rén zhě jiàn rén, zhì zhě jiàn zhì.',en:"Different people have different views on the same thing."}},
  {id:'5-850',zh:'如梦初醒',py:'rú mèng chū xǐng',en:"as if awakening from a dream",ex:{zh:'听了他的话，我如梦初醒。',py:'Tīngle tā de huà, wǒ rú mèng chū xǐng.',en:"After hearing his words, I awoke as if from a dream."}},
  {id:'5-851',zh:'人心所向',py:'rén xīn suǒ xiàng',en:"the direction of popular sentiment",ex:{zh:'和平是人心所向，大势所趋。',py:'Hépíng shì rén xīn suǒ xiàng, dà shì suǒ qū.',en:"Peace is where popular sentiment points and the general trend flows."}},
  {id:'5-852',zh:'融入其中',py:'róngrù qízhōng',en:"to be immersed in it",ex:{zh:'他完全融入其中，忘我工作。',py:'Tā wánquán róngrù qízhōng, wàngwǒ gōngzuò.',en:"He was completely immersed in it and worked selflessly."}},
  {id:'5-853',zh:'如期完成',py:'rúqī wánchéng',en:"to complete on schedule",ex:{zh:'任务如期完成，超出预期。',py:'Rènwù rúqī wánchéng, chāochū yùqī.',en:"The task was completed on schedule, exceeding expectations."}},
  {id:'5-854',zh:'三人行必有我师',py:'sān rén xíng bì yǒu wǒ shī',en:"among any three people there is one I can learn from",ex:{zh:'三人行必有我师，要虚心学习。',py:'Sān rén xíng bì yǒu wǒ shī, yào xūxīn xuéxí.',en:"Among any three people there is one to learn from — be humble."}},
  {id:'5-855',zh:'深耕',py:'shēngēng',en:"to till deeply / to work in depth",ex:{zh:'要深耕专业领域，提高核心能力。',py:'Yào shēngēng zhuānyè lǐngyù, tígāo héxīn nénglì.',en:"You must work deeply in your professional field to improve core capabilities."}},
  {id:'5-856',zh:'深情厚谊',py:'shēnqíng hòuyì',en:"deep feelings and profound friendship",ex:{zh:'他们之间有深情厚谊。',py:'Tāmen zhī jiān yǒu shēnqíng hòuyì.',en:"There are deep feelings and profound friendship between them."}},
  {id:'5-857',zh:'绳锯木断',py:'shéng jù mù duàn',en:"constant effort can overcome any obstacle",ex:{zh:'绳锯木断，水滴石穿，坚持就是胜利。',py:'Shéng jù mù duàn, shuǐ dī shí chuān, jiānchí jiùshì shènglì.',en:"Constant effort can overcome any obstacle — persistence is victory."}},
  {id:'5-858',zh:'势如破竹',py:'shì rú pò zhú',en:"with irresistible force / like splitting bamboo",ex:{zh:'他们势如破竹，一路高歌猛进。',py:'Tāmen shì rú pò zhú, yīlù gāo gē měng jìn.',en:"They advanced with irresistible force."}},
  {id:'5-859',zh:'守正创新',py:'shǒu zhèng chuàng xīn',en:"to uphold integrity and pursue innovation",ex:{zh:'守正创新是新时代的要求。',py:'Shǒu zhèng chuàng xīn shì xīn shídài de yāoqiú.',en:"Upholding integrity while pursuing innovation is the requirement of the new era."}},
  {id:'5-860',zh:'述往思来',py:'shù wǎng sī lái',en:"to reflect on the past and think of the future",ex:{zh:'述往思来，展望未来。',py:'Shù wǎng sī lái, zhānwàng wèilái.',en:"Reflect on the past and look forward to the future."}},
  {id:'5-861',zh:'双管齐下',py:'shuāng guǎn qí xià',en:"to work on both fronts simultaneously",ex:{zh:'要双管齐下，内外兼修。',py:'Yào shuāng guǎn qí xià, nèi wài jiān xiū.',en:"Work on both fronts simultaneously, cultivating both inner and outer qualities."}},
  {id:'5-862',zh:'水到渠成',py:'shuǐ dào qú chéng',en:"when conditions are ripe success will naturally follow",ex:{zh:'只要努力，水到渠成，成功自然来临。',py:'Zhǐyào nǔlì, shuǐ dào qú chéng, chénggōng zìrán lálín.',en:"As long as you work hard, success will naturally follow when conditions are ripe."}},
  {id:'5-863',zh:'水乳交融',py:'shuǐ rǔ jiāo róng',en:"perfectly blended / harmoniously united",ex:{zh:'中西文化在此水乳交融。',py:'Zhōngxī wénhuà zài cǐ shuǐ rǔ jiāo róng.',en:"Chinese and Western cultures are harmoniously blended here."}},
  {id:'5-864',zh:'硕果累累',py:'shuò guǒ léi léi',en:"laden with fruit / great achievements",ex:{zh:'他的科研成果硕果累累。',py:'Tā de kēyán chéngguǒ shuò guǒ léi léi.',en:"His scientific research achievements are abundant."}},
  {id:'5-865',zh:'丝毫',py:'sīháo',en:"the slightest / at all",ex:{zh:'他没有丝毫犹豫地做出了决定。',py:'Tā méiyǒu sīháo yóuyù de zuòchūle juédìng.',en:"He made the decision without the slightest hesitation."}},
  {id:'5-866',zh:'宋词',py:'Sòng cí',en:"Song Dynasty poetry",ex:{zh:'宋词是中国古代文学的瑰宝。',py:'Sòng cí shì Zhōngguó gǔdài wénxué de guìbǎo.',en:"Song Dynasty poetry is a treasure of ancient Chinese literature."}},
  {id:'5-867',zh:'溯本求源',py:'sù běn qiú yuán',en:"to trace back to the origin",ex:{zh:'解决问题要溯本求源。',py:'Jiějué wèntí yào sù běn qiú yuán.',en:"When solving problems you must trace back to the origin."}},
  {id:'5-868',zh:'随遇而安',py:'suí yù ér ān',en:"to feel at home wherever one is",ex:{zh:'他性格随遇而安，到哪里都快乐。',py:'Tā xìnggé suí yù ér ān, dào nǎlǐ dōu kuàilè.',en:"He feels at home wherever he is and is happy anywhere."}},
  {id:'5-869',zh:'拓宽眼界',py:'tuòkuān yǎnjiè',en:"to broaden one's horizons",ex:{zh:'旅行能拓宽眼界，增长见识。',py:'Lǚxíng néng tuòkuān yǎnjiè, zēngzhǎng jiànshi.',en:"Travel can broaden horizons and increase knowledge."}},
  {id:'5-870',zh:'挽救',py:'wǎnjiù',en:"to save / to rescue",ex:{zh:'他的及时到来挽救了局面。',py:'Tā de jíshí dào lái wǎnjiùle júmiàn.',en:"His timely arrival saved the situation."}},
  {id:'5-871',zh:'万紫千红',py:'wàn zǐ qiān hóng',en:"a riot of colors / spring's abundance",ex:{zh:'春天花园里万紫千红。',py:'Chūntiān huāyuán lǐ wàn zǐ qiān hóng.',en:"The garden is a riot of colors in spring."}},
  {id:'5-872',zh:'韦编三绝',py:'wéi biān sān jué',en:"to study assiduously / to read a book many times",ex:{zh:'他韦编三绝，刻苦读书。',py:'Tā wéi biān sān jué, kèkǔ dúshū.',en:"He studied assiduously and read books many times."}},
  {id:'5-873',zh:'维护',py:'wéihù',en:"to safeguard / to protect / to maintain",ex:{zh:'要维护国家的统一和尊严。',py:'Yào wéihù guójiā de tǒngyī hé zūnyán.',en:"The unity and dignity of the country must be safeguarded."}},
  {id:'5-874',zh:'文化底色',py:'wénhuà dǐsè',en:"cultural background color / cultural foundation",ex:{zh:'这里的文化底色深厚。',py:'Zhèlǐ de wénhuà dǐsè shēnhòu.',en:"The cultural foundation here is profound."}},
  {id:'5-875',zh:'问鼎',py:'wèndǐng',en:"to aspire to supremacy / to aim for the top",ex:{zh:'他问鼎世界冠军宝座。',py:'Tā wèndǐng shìjiè guànjūn bǎozuò.',en:"He aimed for the world championship throne."}},
  {id:'5-876',zh:'无懈可击',py:'wú xiè kě jī',en:"impeccable / invulnerable",ex:{zh:'他的方案无懈可击。',py:'Tā de fāngàn wú xiè kě jī.',en:"His plan is impeccable."}},
  {id:'5-877',zh:'熙熙攘攘',py:'xī xī rǎng rǎng',en:"bustling / busy with people",ex:{zh:'街道上熙熙攘攘，十分热闹。',py:'Jiēdào shàng xī xī rǎng rǎng, shífēn rènào.',en:"The streets are bustling and very lively."}},
  {id:'5-878',zh:'携手',py:'xiéshǒu',en:"hand in hand / to join hands",ex:{zh:'两国携手合作，共同发展。',py:'Liǎng guó xiéshǒu hézuò, gòngtóng fāzhǎn.',en:"The two countries join hands to cooperate and develop together."}},
  {id:'5-879',zh:'心无旁骛',py:'xīn wú páng wù',en:"to focus single-mindedly",ex:{zh:'要心无旁骛，专注于学习。',py:'Yào xīn wú páng wù, zhuānzhù yú xuéxí.',en:"Focus single-mindedly on your studies."}},
  {id:'5-880',zh:'兴废',py:'xīngfèi',en:"rise and fall / prosperity and decline",ex:{zh:'国家的兴废与每个人息息相关。',py:'Guójiā de xīngfèi yǔ měi gè rén xī xī xiāng guān.',en:"The rise and fall of the nation is closely linked to everyone."}},
  {id:'5-881',zh:'形象',py:'xíngxiàng',en:"image / vivid / concrete",ex:{zh:'他的描述形象生动。',py:'Tā de miáoshù xíngxiàng shēngdòng.',en:"His description is vivid and concrete."}},
  {id:'5-882',zh:'性情',py:'xìngqíng',en:"temperament / nature / character",ex:{zh:'他性情温和，待人友善。',py:'Tā xìngqíng wēnhé, dài rén yǒushàn.',en:"He has a gentle temperament and is friendly to others."}},
  {id:'5-883',zh:'雄辩',py:'xióngbiàn',en:"eloquent / to argue convincingly",ex:{zh:'事实胜于雄辩。',py:'Shìshí shèng yú xióngbiàn.',en:"Facts speak louder than eloquence."}},
  {id:'5-884',zh:'旭日东升',py:'xùrì dōng shēng',en:"the sun rises in the east",ex:{zh:'旭日东升，朝霞满天，预示着美好的一天。',py:'Xùrì dōng shēng, zhāoxiá mǎn tiān, yùshìzhe měihǎo de yī tiān.',en:"The sun rises in the east and the morning glow fills the sky, heralding a beautiful day."}},
  {id:'5-885',zh:'循环',py:'xúnhuán',en:"cycle / to circulate",ex:{zh:'自然界存在着各种循环。',py:'Zìrán jiè cúnzàizhe gèzhǒng xúnhuán.',en:"Various cycles exist in the natural world."}},
  {id:'5-886',zh:'演绎',py:'yǎnyì',en:"to deduce / to perform / deduction",ex:{zh:'他精彩地演绎了这个角色。',py:'Tā jīngcǎi de yǎnyìle zhège juésè.',en:"He brilliantly performed this role."}},
  {id:'5-887',zh:'仰望',py:'yǎngwàng',en:"to look up at / to admire",ex:{zh:'我们仰望星空，思考未来。',py:'Wǒmen yǎngwàng xīngkōng, sīkǎo wèilái.',en:"We look up at the starry sky and think about the future."}},
  {id:'5-888',zh:'夜以继日',py:'yè yǐ jì rì',en:"day and night without rest",ex:{zh:'他夜以继日地工作，终于完成了任务。',py:'Tā yè yǐ jì rì de gōngzuò, zhōngyú wánchéngle rènwù.',en:"He worked day and night and finally completed the task."}},
  {id:'5-889',zh:'一石二鸟',py:'yī shí èr niǎo',en:"to kill two birds with one stone",ex:{zh:'这个方案一石二鸟，一举两得。',py:'Zhège fāngàn yī shí èr niǎo, yī jǔ liǎng dé.',en:"This plan kills two birds with one stone."}},
  {id:'5-890',zh:'意气风发',py:'yì qì fēng fā',en:"full of high spirits and vitality",ex:{zh:'年轻人要意气风发，朝气蓬勃。',py:'Niánqīngrén yào yì qì fēng fā, zhāo qì péng bó.',en:"Young people should be full of high spirits and vitality."}},
  {id:'5-891',zh:'游刃有余',py:'yóu rèn yǒu yú',en:"to handle things with ease",ex:{zh:'他处理这些工作游刃有余。',py:'Tā chǔlǐ zhèxiē gōngzuò yóu rèn yǒu yú.',en:"He handles this work with ease."}},
  {id:'5-892',zh:'语重心长',py:'yǔ zhòng xīn cháng',en:"in earnest / with deep feeling",ex:{zh:'老师语重心长地嘱咐我们。',py:'Lǎoshī yǔ zhòng xīn cháng de zhǔfu wǒmen.',en:"The teacher earnestly and sincerely advised us."}},
  {id:'5-893',zh:'愿景',py:'yuànjǐng',en:"vision / aspiration",ex:{zh:'我们要共同实现发展的美好愿景。',py:'Wǒmen yào gòngtóng shíxiàn fāzhǎn de měihǎo yuànjǐng.',en:"We must together realize the beautiful vision for development."}},
  {id:'5-894',zh:'跃然纸上',py:'yuè rán zhǐ shàng',en:"to leap off the page / to be vividly portrayed",ex:{zh:'人物形象跃然纸上。',py:'Rénwù xíngxiàng yuè rán zhǐ shàng.',en:"The character images leap vividly off the page."}},
  {id:'5-895',zh:'振臂高呼',py:'zhèn bì gāo hū',en:"to raise one's arm and cry out",ex:{zh:'他振臂高呼，号召大家团结起来。',py:'Tā zhèn bì gāo hū, hàozhào dàjiā tuánjié qǐlái.',en:"He raised his arm and called out, rallying everyone to unite."}},
  {id:'5-896',zh:'争分夺秒',py:'zhēng fēn duó miǎo',en:"to race against time",ex:{zh:'救援工作争分夺秒，刻不容缓。',py:'Jiùyuán gōngzuò zhēng fēn duó miǎo, kè bù róng huǎn.',en:"Rescue work races against time and cannot be delayed."}},
  {id:'5-897',zh:'整装待发',py:'zhěng zhuāng dài fā',en:"to be ready to set off",ex:{zh:'队伍整装待发，准备出征。',py:'Duìwǔ zhěng zhuāng dài fā, zhǔnbèi chūzhēng.',en:"The team is ready to set off and prepared for the expedition."}},
  {id:'5-898',zh:'振聋发聩',py:'zhèn lóng fā kuì',en:"to shake the deaf and rouse the ignorant",ex:{zh:'他的话振聋发聩，令人深思。',py:'Tā de huà zhèn lóng fā kuì, lìng rén shēnsī.',en:"His words were eye-opening and made people think deeply."}},
  {id:'5-899',zh:'忠言逆耳',py:'zhōng yán nì ěr',en:"good advice is harsh to the ear",ex:{zh:'忠言逆耳利于行。',py:'Zhōng yán nì ěr lì yú xíng.',en:"Good advice is harsh to the ear but beneficial to conduct."}},
  {id:'5-900',zh:'珠联璧合',py:'zhū lián bì hé',en:"a perfect pair / a match made in heaven",ex:{zh:'他们两人珠联璧合，相得益彰。',py:'Tāmen liǎng rén zhū lián bì hé, xiāngdé yì zhāng.',en:"The two of them are a perfect pair who bring out the best in each other."}},
  {id:'5-901',zh:'筑梦',py:'zhùmèng',en:"to build one's dream",ex:{zh:'青年要为筑梦中国而努力奋斗。',py:'Qīngnián yào wèi zhùmèng Zhōngguó ér nǔlì fèndòu.',en:"Young people must struggle hard to build China's dream."}},
  {id:'5-902',zh:'驻足',py:'zhùzú',en:"to pause / to stop and look",ex:{zh:'他驻足欣赏这幅画。',py:'Tā zhùzú xīnshǎng zhè fú huà.',en:"He paused to appreciate this painting."}},
  {id:'5-903',zh:'自我完善',py:'zìwǒ wánshàn',en:"self-improvement / self-perfection",ex:{zh:'要不断自我完善，追求卓越。',py:'Yào bùduàn zìwǒ wánshàn, zhuīqiú zhuōyuè.',en:"You must constantly improve yourself and pursue excellence."}},
  {id:'5-904',zh:'日新月异',py:'rì xīn yuè yì',en:"changing with each passing day",ex:{zh:'科技日新月异，日益进步。',py:'Kējì rì xīn yuè yì, rìyì jìnbù.',en:"Technology changes with each passing day and advances constantly."}},
  {id:'5-905',zh:'无微不至',py:'wú wēi bù zhì',en:"in every possible way / thoughtful and considerate",ex:{zh:'她对父母的照顾无微不至。',py:'Tā duì fùmǔ de zhàogù wú wēi bù zhì.',en:"Her care for her parents is thoughtful in every possible way."}},
  {id:'5-906',zh:'拨云见日',py:'bō yún jiàn rì',en:"to see the light through the clouds",ex:{zh:'他的帮助让我拨云见日，找到了方向。',py:'Tā de bāngzhù ràng wǒ bō yún jiàn rì, zhǎodàole fāngxiàng.',en:"His help let me see light through the clouds and find direction."}},
  {id:'5-907',zh:'聚沙成塔',py:'jù shā chéng tǎ',en:"many sands make a tower / small things add up",ex:{zh:'聚沙成塔，积少成多，坚持积累。',py:'Jù shā chéng tǎ, jī shǎo chéng duō, jiānchí jīlěi.',en:"Many sands make a tower — small accumulations add up to great things."}},
  {id:'5-908',zh:'继往开来',py:'jì wǎng kāi lái',en:"to inherit the past and usher in the future",ex:{zh:'我们要继往开来，开创未来。',py:'Wǒmen yào jì wǎng kāi lái, kāichuàng wèilái.',en:"We must inherit the past and usher in the future."}},
  {id:'5-909',zh:'明心见性',py:'míng xīn jiàn xìng',en:"to understand one's true nature",ex:{zh:'学习要明心见性，达到真正理解。',py:'Xuéxí yào míng xīn jiàn xìng, dádào zhēnzhèng lǐjiě.',en:"Learning must understand the true nature to achieve genuine understanding."}},
  {id:'5-910',zh:'破茧而出',py:'pò jiǎn ér chū',en:"to break out of the cocoon / to emerge transformed",ex:{zh:'他破茧而出，成为了优秀的人。',py:'Tā pò jiǎn ér chū, chéngle le yōuxiù de rén.',en:"He broke out of his cocoon and became an excellent person."}},
  {id:'5-911',zh:'气贯长虹',py:'qì guàn cháng hóng',en:"with heroic spirit / full of vigor",ex:{zh:'他气贯长虹，激情澎湃。',py:'Tā qì guàn cháng hóng, jīqíng péngpài.',en:"He is full of heroic spirit and enthusiasm."}},
  {id:'5-912',zh:'顺水推舟',py:'shùn shuǐ tuī zhōu',en:"to push the boat with the current / to go with the flow",ex:{zh:'要善于顺水推舟，把握时机。',py:'Yào shànyú shùn shuǐ tuī zhōu, bǎwò shíjī.',en:"Be good at going with the flow and seizing opportunities."}},
  {id:'5-913',zh:'循规蹈矩',py:'xún guī dǎo jǔ',en:"to follow established rules / conventional",ex:{zh:'创新不能循规蹈矩，要敢于突破。',py:'Chuàngxīn bùnéng xún guī dǎo jǔ, yào gǎnyú tūpò.',en:"Innovation cannot follow established rules — you must dare to break through."}},
  {id:'5-914',zh:'以理服人',py:'yǐ lǐ fú rén',en:"to convince by reasoning",ex:{zh:'要以理服人，不能强词夺理。',py:'Yào yǐ lǐ fú rén, bùnéng qiǎngcí duólǐ.',en:"Convince by reasoning, not by forcing your views on others."}},
  {id:'5-915',zh:'源远流长',py:'yuán yuǎn liú cháng',en:"of long standing and well-established",ex:{zh:'中华文明源远流长，博大精深。',py:'Zhōnghuá wénmíng yuán yuǎn liú cháng, bódà jīngshēn.',en:"Chinese civilization is of long standing and extensive and profound."}},
  {id:'5-916',zh:'正本清源',py:'zhèng běn qīng yuán',en:"to get back to the source / to rectify fundamentals",ex:{zh:'要正本清源，解决根本问题。',py:'Yào zhèng běn qīng yuán, jiějué gēnběn wèntí.',en:"You must get back to the source and resolve fundamental problems."}},
  {id:'5-917',zh:'枝繁叶茂',py:'zhī fán yè mào',en:"flourishing / with dense branches and luxuriant leaves",ex:{zh:'这棵大树枝繁叶茂，生机勃勃。',py:'Zhè kē dà shù zhī fán yè mào, shēngjī bóbó.',en:"This big tree has dense branches and luxuriant leaves, full of vitality."}},
  {id:'5-918',zh:'众多',py:'zhòngduō',en:"numerous / many / a large number of",ex:{zh:'众多专家学者出席了会议。',py:'Zhòngduō zhuānjiā xuézhě chūxíle huìyì.',en:"Numerous experts and scholars attended the meeting."}},
  {id:'5-919',zh:'自出机杼',py:'zì chū jī zhù',en:"original / to have one's own ideas",ex:{zh:'创作要自出机杼，不能模仿他人。',py:'Chuàngzuò yào zì chū jī zhù, bùnéng mófǎng tārén.',en:"Creation must be original and not imitate others."}},
  {id:'5-920',zh:'自强不息',py:'zìqiáng bù xī',en:"to strive constantly to improve oneself",ex:{zh:'自强不息是中华民族的精神支柱。',py:'Zìqiáng bù xī shì Zhōnghuá mínzú de jīngshén zhīzhù.',en:"Unceasing self-improvement is the spiritual pillar of the Chinese nation."}},
  {id:'5-921',zh:'走向',py:'zǒuxiàng',en:"trend / direction / to move toward",ex:{zh:'这是历史发展的走向。',py:'Zhè shì lìshǐ fāzhǎn de zǒuxiàng.',en:"This is the trend of historical development."}},
  {id:'5-922',zh:'人文精神',py:'rénwén jīngshén',en:"humanistic spirit",ex:{zh:'大学要培养学生的人文精神。',py:'Dàxué yào péiyǎng xuésheng de rénwén jīngshén.',en:"Universities must cultivate students' humanistic spirit."}},
  {id:'5-923',zh:'文化自信',py:'wénhuà zìxìn',en:"cultural confidence",ex:{zh:'要增强文化自信，传承优秀传统文化。',py:'Yào zēngqiáng wénhuà zìxìn, chuánchéng yōuxiù chuántǒng wénhuà.',en:"Cultural confidence must be strengthened and excellent traditional culture inherited."}},
  {id:'5-924',zh:'担忧',py:'dānyōu',en:"to worry / to be concerned",ex:{zh:'他担忧未来的发展。',py:'Tā dānyōu wèilái de fāzhǎn.',en:"He worries about future development."}},
  {id:'5-925',zh:'端倪',py:'duānní',en:"clue / sign / indication",ex:{zh:'从这件事可以看出一些端倪。',py:'Cóng zhè jiàn shì kěyǐ kànchū yīxiē duānní.',en:"Some clues can be seen from this matter."}},
  {id:'5-926',zh:'翻天覆地',py:'fān tiān fù dì',en:"earth-shaking / world-shaking changes",ex:{zh:'改革开放带来了翻天覆地的变化。',py:'Gǎigé kāifàng dàiláile fān tiān fù dì de biànhuà.',en:"Reform and opening up brought earth-shaking changes."}},
  {id:'5-927',zh:'丰碑',py:'fēngbēi',en:"monument / milestone",ex:{zh:'他为这个事业树立了一座丰碑。',py:'Tā wèi zhège shìyè shùlìle yī zuò fēngbēi.',en:"He erected a monument for this cause."}},
  {id:'5-928',zh:'敢为人先',py:'gǎn wéi rén xiān',en:"to dare to be the first / pioneering spirit",ex:{zh:'改革需要敢为人先的勇气。',py:'Gǎigé xūyào gǎn wéi rén xiān de yǒngqì.',en:"Reform requires the courage to dare to be the first."}},
  {id:'5-929',zh:'感同身受',py:'gǎn tóng shēn shòu',en:"to feel as if in the same boat / to deeply empathize",ex:{zh:'他的遭遇让我感同身受。',py:'Tā de zāoyù ràng wǒ gǎn tóng shēn shòu.',en:"His experience made me deeply empathize."}},
  {id:'5-930',zh:'高山仰止',py:'gāo shān yǎng zhǐ',en:"to look up to like a lofty mountain",ex:{zh:'他的品德高山仰止，令人敬佩。',py:'Tā de pǐndé gāo shān yǎng zhǐ, lìng rén jìngpèi.',en:"His moral character is so lofty that one can only look up to it with admiration."}},
  {id:'5-931',zh:'共产',py:'gòngchǎn',en:"communism / communist",ex:{zh:'他学习共产主义理论。',py:'Tā xuéxí gòngchǎnzhǔyì lǐlùn.',en:"He studies communist theory."}},
  {id:'5-932',zh:'好学',py:'hàoxué',en:"eager to learn / studious",ex:{zh:'孔子说，知之者不如好之者。',py:'Kǒngzǐ shuō, zhī zhī zhě bùrú hào zhī zhě.',en:"Confucius said, those who know are not as good as those who love learning."}},
  {id:'5-933',zh:'耗费',py:'hàofèi',en:"to consume / to expend",ex:{zh:'这个项目耗费了大量时间和精力。',py:'Zhège xiàngmù hàofèile dàliàng shíjiān hé jīnglì.',en:"This project consumed a large amount of time and energy."}},
  {id:'5-934',zh:'宏愿',py:'hóngyuàn',en:"great aspiration / grand wish",ex:{zh:'他怀有宏愿，立志为国家服务。',py:'Tā huáiyǒu hóngyuàn, lìzhì wèi guójiā fúwù.',en:"He harbors grand aspirations and is determined to serve the country."}},
  {id:'5-935',zh:'厚望',py:'hòuwàng',en:"great expectations / high hopes",ex:{zh:'父母对他寄予厚望。',py:'Fùmǔ duì tā jìyǔ hòuwàng.',en:"His parents place great expectations in him."}},
  {id:'5-936',zh:'虎虎生风',py:'hǔ hǔ shēng fēng',en:"vigorous / full of vim and vigor",ex:{zh:'他做起事来虎虎生风。',py:'Tā zuòqǐ shì lái hǔ hǔ shēng fēng.',en:"He does things with great vigor."}},
  {id:'5-937',zh:'花样百出',py:'huāyàng bǎi chū',en:"with endless variety / constantly changing",ex:{zh:'市场竞争花样百出。',py:'Shìchǎng jìngzhēng huāyàng bǎi chū.',en:"Market competition has endless variety."}},
  {id:'5-938',zh:'焕发',py:'huànfā',en:"to glow / to radiate / to revitalize",ex:{zh:'改革焕发了新的活力。',py:'Gǎigé huànfāle xīn de huólì.',en:"Reform revitalized new energy."}},
  {id:'5-939',zh:'豁然开朗',py:'huò rán kāi lǎng',en:"to suddenly see the light / to become enlightened",ex:{zh:'他想通后豁然开朗，心情舒畅。',py:'Tā xiǎngtōng hòu huò rán kāi lǎng, xīnqíng shūchàng.',en:"After thinking it through he suddenly saw the light and felt at ease."}},
  {id:'5-940',zh:'家风',py:'jiāfēng',en:"family tradition / family ethos",ex:{zh:'好家风是最好的传家宝。',py:'Hǎo jiāfēng shì zuì hǎo de chuánjiābǎo.',en:"A good family tradition is the best heirloom."}},
  {id:'5-941',zh:'坚贞',py:'jiānzhēn',en:"firm and loyal / steadfast",ex:{zh:'他对信仰坚贞不屈。',py:'Tā duì xìnyǎng jiānzhēn bù qū.',en:"He is firm and loyal to his beliefs."}},
  {id:'5-942',zh:'精气神',py:'jīng qì shén',en:"spirit and vitality / mental and physical energy",ex:{zh:'年轻人要有精气神，充满朝气。',py:'Niánqīngrén yào yǒu jīng qì shén, chōngmǎn zhāoqì.',en:"Young people must have spirit and vitality."}},
  {id:'5-943',zh:'绝妙',py:'juémiào',en:"superb / exquisite / brilliant",ex:{zh:'这是一个绝妙的想法。',py:'Zhè shì yīgè juémiào de xiǎngfǎ.',en:"This is a brilliant idea."}},
  {id:'5-944',zh:'开天辟地',py:'kāi tiān pì dì',en:"to open the sky and split the earth / epoch-making",ex:{zh:'这是开天辟地的伟大创举。',py:'Zhè shì kāi tiān pì dì de wěidà chuàngjǔ.',en:"This is an epoch-making great initiative."}},
  {id:'5-945',zh:'慷慨解囊',py:'kāngkǎi jiě náng',en:"to be generous with money / to open one's purse",ex:{zh:'他慷慨解囊，捐助了学校建设。',py:'Tā kāngkǎi jiě náng, juānzhùle xuéxiào jiànshè.',en:"He generously opened his purse and donated to school construction."}},
  {id:'5-946',zh:'刻不容缓',py:'kè bù róng huǎn',en:"not a moment to lose / urgent",ex:{zh:'这件事刻不容缓，必须立即行动。',py:'Zhè jiàn shì kè bù róng huǎn, bìxū lìjí xíngdòng.',en:"This matter is urgent and action must be taken immediately."}},
  {id:'5-947',zh:'来之不易',py:'lái zhī bù yì',en:"hard-won / not easily obtained",ex:{zh:'成功来之不易，要倍加珍惜。',py:'Chénggōng lái zhī bù yì, yào bèi jiā zhēnxī.',en:"Success is hard-won and must be especially cherished."}},
  {id:'5-948',zh:'滥竽充数',py:'làn yú chōng shù',en:"to make up the number / to be a mere makeweight",ex:{zh:'团队中不能有滥竽充数之人。',py:'Tuánduì zhōng bùnéng yǒu làn yú chōng shù zhī rén.',en:"There should be no mere makeweights in a team."}},
  {id:'5-949',zh:'赖以',py:'lài yǐ',en:"to depend on / to rely on",ex:{zh:'这是他赖以生存的技能。',py:'Zhè shì tā lài yǐ shēngcún de jìnéng.',en:"This is the skill he depends on to survive."}},
  {id:'5-950',zh:'刚强',py:'gāngqiáng',en:"strong / firm / unyielding",ex:{zh:'他性格刚强，从不屈服于困难。',py:'Tā xìnggé gāngqiáng, cóng bù qūfú yú kùnnan.',en:"He has a strong and unyielding character and never yields to difficulties."}},
  {id:'5-951',zh:'老骥伏枥',py:'lǎo jì fú lì',en:"an old steed in the stable still aspires to gallop",ex:{zh:'老骥伏枥，志在千里。',py:'Lǎo jì fú lì, zhì zài qiān lǐ.',en:"An old steed in the stable still aspires to gallop a thousand miles."}},
  {id:'5-952',zh:'历久弥坚',py:'lì jiǔ mí jiān',en:"to grow stronger with time",ex:{zh:'他们的友谊历久弥坚。',py:'Tāmen de yǒuyì lì jiǔ mí jiān.',en:"Their friendship grows stronger with time."}},
  {id:'5-953',zh:'厉兵秣马',py:'lì bīng mò mǎ',en:"to prepare for war / to make active preparations",ex:{zh:'赛前他厉兵秣马，认真备战。',py:'Sài qián tā lì bīng mò mǎ, rènzhēn bèizhàn.',en:"Before the competition he made active preparations and trained seriously."}},
  {id:'5-954',zh:'联动',py:'liándòng',en:"to coordinate / linkage",ex:{zh:'各部门要联动配合，共同解决问题。',py:'Gè bùmén yào liándòng pèihé, gòngtóng jiějué wèntí.',en:"All departments must coordinate and work together to solve problems."}},
  {id:'5-955',zh:'鳞次栉比',py:'lín cì zhì bǐ',en:"row upon row / closely packed",ex:{zh:'城市里高楼鳞次栉比。',py:'Chéngshì lǐ gāolóu lín cì zhì bǐ.',en:"Tall buildings stand row upon row in the city."}},
  {id:'5-956',zh:'灵动',py:'língdòng',en:"lively / vivid / nimble",ex:{zh:'他的舞姿灵动优美。',py:'Tā de wǔzī língdòng yōuměi.',en:"His dance movements are lively and graceful."}},
  {id:'5-957',zh:'令行禁止',py:'lìng xíng jìn zhǐ',en:"to have orders strictly followed",ex:{zh:'军队要令行禁止，纪律严明。',py:'Jūnduì yào lìng xíng jìn zhǐ, jìlǜ yánmíng.',en:"The army must have orders strictly followed and strict discipline."}},
  {id:'5-958',zh:'留传',py:'liúchuán',en:"to pass down / to hand down",ex:{zh:'这门手艺代代留传。',py:'Zhè mén shǒuyì dài dài liúchuán.',en:"This craft has been handed down from generation to generation."}},
  {id:'5-959',zh:'栩栩如生',py:'xǔ xǔ rú shēng',en:"lifelike / vivid as life",ex:{zh:'这幅画的人物栩栩如生。',py:'Zhè fú huà de rénwù xǔ xǔ rú shēng.',en:"The figures in this painting are lifelike."}},
  {id:'5-960',zh:'一马当先',py:'yī mǎ dāng xiān',en:"to be the first to lead the charge",ex:{zh:'他一马当先，勇往直前。',py:'Tā yī mǎ dāng xiān, yǒng wǎng zhí qián.',en:"He was the first to lead the charge and pressed bravely forward."}},
  {id:'5-961',zh:'以点带面',py:'yǐ diǎn dài miàn',en:"using the point to lead the broader area",ex:{zh:'要以点带面，推广成功经验。',py:'Yào yǐ diǎn dài miàn, tuīguǎng chénggōng jīngyàn.',en:"Use the point to lead the broader area and promote successful experience."}},
  {id:'5-962',zh:'彰善瘅恶',py:'zhāng shàn dàn è',en:"to praise virtue and condemn vice",ex:{zh:'文学要彰善瘅恶，弘扬正气。',py:'Wénxué yào zhāng shàn dàn è, hóngyáng zhèngqì.',en:"Literature must praise virtue and condemn vice to promote righteousness."}},
  {id:'5-963',zh:'真才实学',py:'zhēn cái shí xué',en:"genuine talent and real learning",ex:{zh:'要有真才实学，才能立足社会。',py:'Yào yǒu zhēn cái shí xué, cái néng lìzú shèhuì.',en:"You must have genuine talent and real learning to stand in society."}},
  {id:'5-964',zh:'振兴中华',py:'zhènxīng Zhōnghuá',en:"to revitalize China",ex:{zh:'振兴中华是每一个中国人的使命。',py:'Zhènxīng Zhōnghuá shì měi yīgè Zhōngguórén de shǐmìng.',en:"Revitalizing China is the mission of every Chinese person."}},
  {id:'5-965',zh:'政通人和',py:'zhèng tōng rén hé',en:"good governance and harmonious society",ex:{zh:'政通人和，国泰民安。',py:'Zhèng tōng rén hé, guó tài mín ān.',en:"Good governance and a harmonious society bring national prosperity and people's peace."}},
  {id:'5-966',zh:'志存高远',py:'zhì cún gāo yuǎn',en:"to have lofty aspirations",ex:{zh:'年轻人要志存高远，胸怀大志。',py:'Niánqīngrén yào zhì cún gāo yuǎn, xiōnghuái dàzhì.',en:"Young people must have lofty aspirations and great ambitions."}},
  {id:'5-967',zh:'智谋',py:'zhìmóu',en:"wisdom and strategy / resourcefulness",ex:{zh:'他有过人的智谋。',py:'Tā yǒu guòrén de zhìmóu.',en:"He has outstanding wisdom and strategy."}},
  {id:'5-968',zh:'治国理政',py:'zhì guó lǐ zhèng',en:"to govern the country and administer politics",ex:{zh:'治国理政需要高超的智慧。',py:'Zhì guó lǐ zhèng xūyào gāochāo de zhìhuì.',en:"Governing the country and administering politics requires superb wisdom."}},
  {id:'5-969',zh:'中流',py:'zhōngliú',en:"midstream / the middle",ex:{zh:'他在历史的中流发挥了重要作用。',py:'Tā zài lìshǐ de zhōngliú fāhuīle zhòngyào zuòyòng.',en:"He played an important role in the midst of history."}},
  {id:'5-970',zh:'独领风骚',py:'dú lǐng fēng sāo',en:"to be uniquely outstanding",ex:{zh:'她的才华使她独领风骚。',py:'Tā de cáihuá shǐ tā dú lǐng fēng sāo.',en:"Her talent makes her uniquely outstanding."}},
  {id:'5-971',zh:'勃兴',py:'bóxīng',en:"to rise vigorously / to flourish",ex:{zh:'这个行业正在勃兴之中。',py:'Zhège hángyè zhèngzài bóxīng zhī zhōng.',en:"This industry is in the midst of vigorous growth."}},
  {id:'5-972',zh:'出类拔萃',py:'chū lèi bá cuì',en:"outstanding / to stand out",ex:{zh:'他在同学中出类拔萃。',py:'Tā zài tóngxué zhōng chū lèi bá cuì.',en:"He stands out among his classmates."}},
  {id:'5-973',zh:'殊荣',py:'shūróng',en:"special honor / rare privilege",ex:{zh:'他获得了殊荣，受到国家表彰。',py:'Tā huòdéle shūróng, shòudào guójiā biǎozhāng.',en:"He received special honor and national commendation."}},
  {id:'5-974',zh:'披沙拣金',py:'pī shā jiǎn jīn',en:"to sift through sand to find gold / to select the best",ex:{zh:'要善于披沙拣金，发现人才。',py:'Yào shànyú pī shā jiǎn jīn, fāxiàn réncái.',en:"Be good at sifting through to find gold and discovering talent."}},
  {id:'5-975',zh:'无往不利',py:'wú wǎng bù lì',en:"to always succeed / to be invincible",ex:{zh:'有知识和能力，可以无往不利。',py:'Yǒu zhīshí hé nénglì, kěyǐ wú wǎng bù lì.',en:"With knowledge and ability, one can always succeed."}},
  {id:'5-976',zh:'海内存知己',py:'hǎi nèi cún zhī jǐ',en:"a true friend far away",ex:{zh:'海内存知己，天涯若比邻。',py:'Hǎi nèi cún zhī jǐ, tiānyá ruò bǐ lín.',en:"A true friend far away makes the world seem close."}},
  {id:'5-977',zh:'驱散',py:'qūsàn',en:"to dispel / to scatter",ex:{zh:'阳光驱散了心中的阴霾。',py:'Yángguāng qūsànle xīn zhōng de yīnmái.',en:"Sunlight dispelled the gloom in the heart."}},
  {id:'5-978',zh:'穿越',py:'chuānyuè',en:"to cross / to traverse / time travel",ex:{zh:'穿越历史，感受文化的魅力。',py:'Chuānyuè lìshǐ, gǎnshòu wénhuà de mèilì.',en:"Traverse history and feel the charm of culture."}},
  {id:'5-979',zh:'浩瀚',py:'hàohàn',en:"vast / immense / boundless",ex:{zh:'宇宙浩瀚无垠，令人叹为观止。',py:'Yǔzhòu hàohàn wúyín, lìng rén tàn wéi guān zhǐ.',en:"The universe is boundlessly vast, making people marvel."}},
  {id:'5-980',zh:'傲然',py:'àorán',en:"proudly / with dignity / loftily",ex:{zh:'他傲然挺立，不屈不挠。',py:'Tā àorán tǐnglì, bù qū bù náo.',en:"He stood proudly upright, unyielding and indomitable."}},
  {id:'5-981',zh:'逆流而上',py:'nì liú ér shàng',en:"to swim against the current",ex:{zh:'他逆流而上，克服了重重困难。',py:'Tā nì liú ér shàng, kèfúle zhòng zhòng kùnnan.',en:"He swam against the current and overcame many difficulties."}},
  {id:'5-982',zh:'万象更新',py:'wàn xiàng gēng xīn',en:"everything taking on a new look",ex:{zh:'春天来了，万象更新。',py:'Chūntiān lái le, wàn xiàng gēng xīn.',en:"Spring has come and everything takes on a new look."}},
  {id:'5-983',zh:'拼搏',py:'pīnbó',en:"to struggle / to fight hard",ex:{zh:'他不断拼搏，终于实现了梦想。',py:'Tā bùduàn pīnbó, zhōngyú shíxiànle mèngxiǎng.',en:"He kept struggling and finally realized his dream."}},
  {id:'5-984',zh:'奔赴',py:'bēnfù',en:"to rush to / to hasten to",ex:{zh:'他奔赴前线，投入工作。',py:'Tā bēnfù qiánxiàn, tóurù gōngzuò.',en:"He rushed to the front line and threw himself into work."}},
  {id:'5-985',zh:'绽放',py:'zhànfàng',en:"to bloom / to blossom",ex:{zh:'青春在奋斗中绽放光彩。',py:'Qīngchūn zài fèndòu zhōng zhànfàng guāngcǎi.',en:"Youth blossoms with brilliance in the struggle."}},
  {id:'5-986',zh:'凝结',py:'níngjié',en:"to congeal / to crystallize",ex:{zh:'这首诗凝结了他多年的心血。',py:'Zhè shǒu shī níngjié le tā duō nián de xīnxuè.',en:"This poem crystallizes his many years of painstaking effort."}},
  {id:'5-987',zh:'奠基',py:'diànjī',en:"to lay the foundation",ex:{zh:'他为后代奠基，功勋卓著。',py:'Tā wèi hòudài diànjī, gōngxūn zhuōzhù.',en:"He laid the foundation for later generations with outstanding merit."}},
  {id:'5-988',zh:'磅礴',py:'pángbó',en:"vast / grand / overwhelming",ex:{zh:'长江磅礴的气势让人叹为观止。',py:'Cháng Jiāng pángbó de qìshì ràng rén tàn wéi guān zhǐ.',en:"The vast and grand momentum of the Yangtze River makes people marvel."}},
  {id:'5-989',zh:'生生不息',py:'shēng shēng bù xī',en:"to go on forever / endlessly",ex:{zh:'中华文化生生不息，薪火相传。',py:'Zhōnghuá wénhuà shēng shēng bù xī, xīn huǒ xiāng chuán.',en:"Chinese culture goes on forever and is passed down like a torch."}},
  {id:'5-990',zh:'民族复兴',py:'mínzú fùxīng',en:"national rejuvenation",ex:{zh:'实现民族复兴是中国人民的伟大梦想。',py:'Shíxiàn mínzú fùxīng shì Zhōngguó rénmín de wěidà mèngxiǎng.',en:"Achieving national rejuvenation is the great dream of the Chinese people."}},
  {id:'5-991',zh:'辉煌',py:'huīhuáng',en:"glorious / brilliant / splendid",ex:{zh:'中国正在创造新的辉煌。',py:'Zhōngguó zhèngzài chuàngzào xīn de huīhuáng.',en:"China is creating new glory."}},
  {id:'5-992',zh:'践行',py:'jiànxíng',en:"to put into practice / to act on",ex:{zh:'我们要践行社会主义核心价值观。',py:'Wǒmen yào jiànxíng shèhuìzhǔyì héxīn jiàzhíguān.',en:"We must put socialist core values into practice."}},
  {id:'5-993',zh:'凝聚',py:'níngjù',en:"to converge / to unite / to crystallize",ex:{zh:'伟大成就凝聚了几代人的心血。',py:'Wěidà chéngjiù níngjùle jǐ dài rén de xīnxuè.',en:"Great achievements crystallize the painstaking effort of several generations."}},
  {id:'5-994',zh:'奋发',py:'fènfā',en:"to strive / to work hard",ex:{zh:'要奋发图强，为国争光。',py:'Yào fènfā túqiáng, wèi guó zhēngguāng.',en:"Strive to strengthen and win glory for the country."}},
  {id:'5-995',zh:'旗帜鲜明',py:'qízhì xiānmíng',en:"clear-cut / with a clear position",ex:{zh:'要旗帜鲜明地反对不正之风。',py:'Yào qízhì xiānmíng de fǎnduì bù zhèng zhī fēng.',en:"You must have a clear-cut position in opposing unhealthy tendencies."}},
  {id:'5-996',zh:'勠力',py:'lùlì',en:"to exert joint effort",ex:{zh:'大家勠力同心，共克难关。',py:'Dàjiā lùlì tóngxīn, gòng kè nánguān.',en:"Everyone exerts joint effort with one heart to overcome difficulties together."}},
  {id:'5-997',zh:'同舟共济',py:'tóng zhōu gòng jì',en:"in the same boat / to pull together",ex:{zh:'面对困难，我们要同舟共济。',py:'Miànduì kùnnan, wǒmen yào tóng zhōu gòng jì.',en:"Facing difficulties, we must pull together in the same boat."}},
  {id:'5-998',zh:'长风破浪',py:'cháng fēng pò làng',en:"to brave the waves / to forge ahead",ex:{zh:'他长风破浪，勇往直前。',py:'Tā cháng fēng pò làng, yǒng wǎng zhí qián.',en:"He braved the waves and pressed forward bravely."}},
  {id:'5-999',zh:'奔腾',py:'bēnténg',en:"to gallop / to surge",ex:{zh:'历史的洪流奔腾向前。',py:'Lìshǐ de hóngliú bēnténg xiàng qián.',en:"The torrent of history surges forward."}},
  {id:'5-1000',zh:'厚植',py:'hòuzhí',en:"to deeply cultivate / to firmly establish",ex:{zh:'要厚植爱国主义情怀。',py:'Yào hòuzhí àiguózhǔyì qínghuái.',en:"Patriotic sentiments must be deeply cultivated."}},

  {id:'5-1001',zh:'把握机遇',py:'bǎwò jīyù',en:"to seize opportunities",ex:{zh:'要善于把握机遇，开创新局面。',py:'Yào shànyú bǎwò jīyù, kāichuàng xīn júmiàn.',en:"Be good at seizing opportunities to open up a new situation."}},
  {id:'5-1002',zh:'变幻莫测',py:'biànhuàn mò cè',en:"unpredictable / ever-changing",ex:{zh:'国际形势变幻莫测。',py:'Guójì xíngshì biànhuàn mò cè.',en:"The international situation is unpredictable."}},
  {id:'5-1003',zh:'博学多才',py:'bóxué duōcái',en:"learned and talented",ex:{zh:'他博学多才，德才兼备。',py:'Tā bóxué duōcái, dé cái jiān bèi.',en:"He is learned and talented, both virtuous and capable."}},
  {id:'5-1004',zh:'不可思议',py:'bù kě sī yì',en:"unthinkable / incredible",ex:{zh:'这个结果令人不可思议。',py:'Zhège jiéguǒ lìng rén bù kě sī yì.',en:"This result is beyond comprehension."}},
  {id:'5-1005',zh:'才华横溢',py:'cáihuá héngyì',en:"brimming with talent",ex:{zh:'她才华横溢，令人钦佩。',py:'Tā cáihuá héngyì, lìng rén qīnpèi.',en:"She is brimming with talent and commands admiration."}},
  {id:'5-1006',zh:'灿烂',py:'cànlàn',en:"brilliant / glorious / splendid",ex:{zh:'中华文明灿烂辉煌，源远流长。',py:'Zhōnghuá wénmíng cànlàn huīhuáng, yuányuǎn liúcháng.',en:"Chinese civilization is brilliant and of long standing."}},
  {id:'5-1007',zh:'沧桑',py:'cāngsāng',en:"vicissitudes / ravages of time",ex:{zh:'他的脸上写满了沧桑。',py:'Tā de liǎn shàng xiě mǎnle cāngsāng.',en:"His face was written with the vicissitudes of life."}},
  {id:'5-1008',zh:'大显身手',py:'dà xiǎn shēnshǒu',en:"to demonstrate one's abilities",ex:{zh:'他在这次活动中大显身手。',py:'Tā zài zhè cì huódòng zhōng dà xiǎn shēnshǒu.',en:"He demonstrated his abilities in this event."}},
  {id:'5-1009',zh:'当机立断',py:'dāng jī lì duàn',en:"to make a prompt decision",ex:{zh:'面对危机，他当机立断，果断行动。',py:'Miànduì wēijī, tā dāng jī lì duàn, guǒduàn xíngdòng.',en:"Facing the crisis, he made a prompt decision and acted decisively."}},
  {id:'5-1010',zh:'代代相传',py:'dài dài xiāng chuán',en:"passed down from generation to generation",ex:{zh:'这种精神代代相传，薪火不息。',py:'Zhè zhǒng jīngshén dài dài xiāng chuán, xīn huǒ bù xī.',en:"This spirit is passed down from generation to generation."}},
  {id:'5-1011',zh:'奋不顾身',py:'fèn bù gù shēn',en:"to dash ahead regardless of danger",ex:{zh:'他奋不顾身，冲入火场救人。',py:'Tā fèn bù gù shēn, chōng rù huǒ chǎng jiù rén.',en:"He dashed into the fire regardless of danger to save people."}},
  {id:'5-1012',zh:'风雨同舟',py:'fēng yǔ tóng zhōu',en:"to weather storms together",ex:{zh:'我们风雨同舟，共克时艰。',py:'Wǒmen fēng yǔ tóng zhōu, gòng kè shí jiān.',en:"We weather storms together and overcome difficulties."}},
  {id:'5-1013',zh:'高歌猛进',py:'gāo gē měng jìn',en:"to forge ahead vigorously",ex:{zh:'改革开放高歌猛进。',py:'Gǎigé kāifàng gāo gē měng jìn.',en:"Reform and opening up forged ahead vigorously."}},
  {id:'5-1014',zh:'光辉历程',py:'guānghuī lìchéng',en:"glorious journey",ex:{zh:'回顾光辉历程，展望美好未来。',py:'Huígù guānghuī lìchéng, zhānwàng měihǎo wèilái.',en:"Looking back on the glorious journey and forward to a bright future."}},
  {id:'5-1015',zh:'豪情壮志',py:'háoqíng zhuàngzhì',en:"lofty sentiments and high aspirations",ex:{zh:'他怀着豪情壮志，踏上了新的征程。',py:'Tā huáizhe háoqíng zhuàngzhì, tàshàngle xīn de zhēngchéng.',en:"With lofty sentiments and high aspirations, he set out on a new journey."}},
  {id:'5-1016',zh:'浩然正气',py:'hàorán zhèngqì',en:"noble and righteous spirit",ex:{zh:'他一身浩然正气，令人敬仰。',py:'Tā yī shēn hàorán zhèngqì, lìng rén jìngyǎng.',en:"He has a noble and righteous spirit that commands reverence."}},
  {id:'5-1017',zh:'宏伟',py:'hóngwěi',en:"grand / magnificent / imposing",ex:{zh:'这是一项宏伟的工程。',py:'Zhè shì yī xiàng hóngwěi de gōngchéng.',en:"This is a magnificent project."}},
  {id:'5-1018',zh:'厚德载物',py:'hòu dé zài wù',en:"virtue that bears all things",ex:{zh:'厚德载物，自强不息。',py:'Hòu dé zài wù, zìqiáng bù xī.',en:"Great virtue bears all things; one constantly strives to improve oneself."}},
  {id:'5-1019',zh:'精彩纷呈',py:'jīngcǎi fēnchéng',en:"brilliant and varied",ex:{zh:'晚会节目精彩纷呈。',py:'Wǎnhuì jiémù jīngcǎi fēnchéng.',en:"The evening show had brilliant and varied performances."}},
  {id:'5-1020',zh:'久经磨砺',py:'jiǔ jīng mólì',en:"seasoned by hardship",ex:{zh:'他久经磨砺，成为了行家里手。',py:'Tā jiǔ jīng mólì, chéngle le hángjia lǐshǒu.',en:"Seasoned by long hardship, he became an expert."}},
  {id:'5-1021',zh:'励精图治',py:'lì jīng tú zhì',en:"to govern with diligence and aspiration",ex:{zh:'领导励精图治，国家走向繁荣。',py:'Lǐngdǎo lì jīng tú zhì, guójiā zǒuxiàng fánróng.',en:"Governing with diligence and aspiration, the country moves toward prosperity."}},
  {id:'5-1022',zh:'领先',py:'lǐngxiān',en:"to be in the lead / ahead",ex:{zh:'中国在多个领域领先世界。',py:'Zhōngguó zài duō gè lǐngyù lǐngxiān shìjiè.',en:"China leads the world in multiple fields."}},
  {id:'5-1023',zh:'流连忘返',py:'liú lián wàng fǎn',en:"to linger and forget to return",ex:{zh:'这里风景如画，令人流连忘返。',py:'Zhèlǐ fēngjǐng rú huà, lìng rén liú lián wàng fǎn.',en:"The scenery here is picturesque, making people linger."}},
  {id:'5-1024',zh:'敏锐',py:'mǐnruì',en:"keen / sharp / acute",ex:{zh:'他有敏锐的观察力。',py:'Tā yǒu mǐnruì de guānchá lì.',en:"He has keen observational ability."}},
  {id:'5-1025',zh:'默默无闻',py:'mòmò wúwén',en:"unknown / obscure",ex:{zh:'他默默无闻地奉献了一生。',py:'Tā mòmò wúwén de fèngxiànle yī shēng.',en:"He dedicated his entire life in obscurity."}},
  {id:'5-1026',zh:'目光如炬',py:'mùguāng rú jù',en:"eyes as bright as torches / clear-sighted",ex:{zh:'他目光如炬，洞察秋毫。',py:'Tā mùguāng rú jù, dòngchá qiū háo.',en:"His eyes are as bright as torches and he is perceptive."}},
  {id:'5-1027',zh:'旁征博引',py:'páng zhēng bó yǐn',en:"to cite copiously from many sources",ex:{zh:'他旁征博引，论据充分。',py:'Tā páng zhēng bó yǐn, lùnjù chōngfèn.',en:"He cited copiously from many sources with sufficient evidence."}},
  {id:'5-1028',zh:'平易近人',py:'píng yì jìn rén',en:"easy to approach / amiable",ex:{zh:'他平易近人，没有一点架子。',py:'Tā píng yì jìn rén, méiyǒu yīdiǎn jiàzi.',en:"He is easy to approach with no airs at all."}},
  {id:'5-1029',zh:'披肝沥胆',py:'pī gān lì dǎn',en:"to give one's heart and soul",ex:{zh:'他为事业披肝沥胆，无怨无悔。',py:'Tā wèi shìyè pī gān lì dǎn, wú yuàn wú huǐ.',en:"He gave his heart and soul to his career without regret."}},
  {id:'5-1030',zh:'千锤百炼',py:'qiān chuí bǎi liàn',en:"thoroughly tempered / refined through hard work",ex:{zh:'这句话是千锤百炼的经典。',py:'Zhè jù huà shì qiān chuí bǎi liàn de jīngdiǎn.',en:"This phrase is a classic refined through much effort."}},
  {id:'5-1031',zh:'前车之鉴',py:'qián chē zhī jiàn',en:"a lesson from a predecessor's failure",ex:{zh:'要以前车之鉴，避免重蹈覆辙。',py:'Yào yǐ qián chē zhī jiàn, bìmiǎn chóngdǎo fùzhé.',en:"Learn from predecessors' failures to avoid repeating the same mistakes."}},
  {id:'5-1032',zh:'情真意切',py:'qíng zhēn yì qiē',en:"sincere feelings / heartfelt",ex:{zh:'他的信写得情真意切。',py:'Tā de xìn xiě de qíng zhēn yì qiē.',en:"His letter was written with sincere and heartfelt feelings."}},
  {id:'5-1033',zh:'求贤若渴',py:'qiú xián ruò kě',en:"to eagerly seek talented people",ex:{zh:'他求贤若渴，广纳人才。',py:'Tā qiú xián ruò kě, guǎng nà réncái.',en:"He eagerly seeks talented people and recruits them widely."}},
  {id:'5-1034',zh:'热泪盈眶',py:'rè lèi yíng kuàng',en:"eyes brimming with tears",ex:{zh:'听到这个消息，他热泪盈眶。',py:'Tīngdào zhège xiāoxi, tā rè lèi yíng kuàng.',en:"Upon hearing this news, his eyes brimmed with tears."}},
  {id:'5-1035',zh:'如梦初醒',py:'rú mèng chū xǐng',en:"as if awakening from a dream",ex:{zh:'听了他的话，我如梦初醒。',py:'Tīngle tā de huà, wǒ rú mèng chū xǐng.',en:"After hearing his words, I awoke as if from a dream."}},
  {id:'5-1036',zh:'任劳任怨',py:'rèn láo rèn yuàn',en:"to bear hardship without complaint",ex:{zh:'他任劳任怨，无私奉献。',py:'Tā rèn láo rèn yuàn, wúsī fèngxiàn.',en:"He bears hardship without complaint and gives selflessly."}},
  {id:'5-1037',zh:'深耕',py:'shēngēng',en:"to till deeply / to work in depth",ex:{zh:'要深耕专业领域，提高核心能力。',py:'Yào shēngēng zhuānyè lǐngyù, tígāo héxīn nénglì.',en:"Work deeply in your professional field to improve core capabilities."}},
  {id:'5-1038',zh:'守望相助',py:'shǒu wàng xiāng zhù',en:"to keep watch and help each other",ex:{zh:'邻里之间要守望相助。',py:'Línlǐ zhī jiān yào shǒu wàng xiāng zhù.',en:"Neighbors must keep watch and help each other."}},
  {id:'5-1039',zh:'势如破竹',py:'shì rú pò zhú',en:"with irresistible force",ex:{zh:'他们势如破竹，一路高歌猛进。',py:'Tāmen shì rú pò zhú, yīlù gāo gē měng jìn.',en:"They advanced with irresistible force."}},
  {id:'5-1040',zh:'硕果累累',py:'shuò guǒ léi léi',en:"laden with fruit / great achievements",ex:{zh:'他的科研成果硕果累累。',py:'Tā de kēyán chéngguǒ shuò guǒ léi léi.',en:"His scientific research achievements are abundant."}},
  {id:'5-1041',zh:'踏踏实实',py:'tātā shíshí',en:"steady and earnest",ex:{zh:'做事要踏踏实实。',py:'Zuòshì yào tātā shíshí.',en:"Be steady and earnest in everything you do."}},
  {id:'5-1042',zh:'填补',py:'tiánbǔ',en:"to fill in / to make up for",ex:{zh:'这项研究填补了领域内的空白。',py:'Zhè xiàng yánjiū tiánbǔle lǐngyù nèi de kòngbái.',en:"This research filled in the gaps in the field."}},
  {id:'5-1043',zh:'脱颖而出',py:'tuō yǐng ér chū',en:"to stand out / to distinguish oneself",ex:{zh:'他在众多候选人中脱颖而出。',py:'Tā zài zhòngduō hòuxuǎnrén zhōng tuō yǐng ér chū.',en:"He stood out among many candidates."}},
  {id:'5-1044',zh:'万众一心',py:'wàn zhòng yī xīn',en:"millions of people united as one",ex:{zh:'万众一心，共克时艰。',py:'Wàn zhòng yī xīn, gòng kè shí jiān.',en:"Millions united as one to overcome difficulties together."}},
  {id:'5-1045',zh:'蔚然成风',py:'wèi rán chéng fēng',en:"to become the norm / to form a good trend",ex:{zh:'读书学习蔚然成风。',py:'Dúshū xuéxí wèi rán chéng fēng.',en:"Reading and learning has become the norm."}},
  {id:'5-1046',zh:'携手',py:'xiéshǒu',en:"hand in hand / to join hands",ex:{zh:'两国携手合作，共同发展。',py:'Liǎng guó xiéshǒu hézuò, gòngtóng fāzhǎn.',en:"The two countries join hands to cooperate and develop together."}},
  {id:'5-1047',zh:'行之有效',py:'xíng zhī yǒu xiào',en:"effective / proven to work",ex:{zh:'这是一个行之有效的方法。',py:'Zhè shì yīgè xíng zhī yǒu xiào de fāngfǎ.',en:"This is a proven and effective method."}},
  {id:'5-1048',zh:'雄心壮志',py:'xióng xīn zhuàng zhì',en:"great ambitions / heroic aspirations",ex:{zh:'他怀有雄心壮志，立志报国。',py:'Tā huáiyǒu xióng xīn zhuàng zhì, lìzhì bào guó.',en:"He harbors great ambitions and is determined to serve his country."}},
  {id:'5-1049',zh:'虚心',py:'xūxīn',en:"open-minded / humble",ex:{zh:'要虚心向他人学习。',py:'Yào xūxīn xiàng tārén xuéxí.',en:"You must be open-minded and learn from others."}},
  {id:'5-1050',zh:'一脉相承',py:'yī mài xiāng chéng',en:"to come from the same origin",ex:{zh:'这两种思想一脉相承。',py:'Zhè liǎng zhǒng sīxiǎng yī mài xiāng chéng.',en:"These two schools of thought come from the same origin."}},
  {id:'5-1051',zh:'一鸣惊人',py:'yī míng jīng rén',en:"to amaze the world with a single brilliant feat",ex:{zh:'他一鸣惊人，获得了世界冠军。',py:'Tā yī míng jīng rén, huòdéle shìjiè guànjūn.',en:"He amazed the world by winning the world championship."}},
  {id:'5-1052',zh:'毅力',py:'yìlì',en:"perseverance / willpower",ex:{zh:'成功需要坚强的毅力。',py:'Chénggōng xūyào jiānqiáng de yìlì.',en:"Success requires strong perseverance."}},
  {id:'5-1053',zh:'英才',py:'yīngcái',en:"outstanding talent",ex:{zh:'这所学校培养了无数英才。',py:'Zhè suǒ xuéxiào péiyǎngle wúshù yīngcái.',en:"This school has cultivated countless outstanding talents."}},
  {id:'5-1054',zh:'永葆',py:'yǒngbǎo',en:"to forever maintain",ex:{zh:'要永葆初心，不忘使命。',py:'Yào yǒngbǎo chūxīn, bùwàng shǐmìng.',en:"Always maintain the original aspiration and never forget the mission."}},
  {id:'5-1055',zh:'忧患意识',py:'yōuhuàn yìshí',en:"sense of crisis / awareness of potential problems",ex:{zh:'要有忧患意识，居安思危。',py:'Yào yǒu yōuhuàn yìshí, jū ān sī wēi.',en:"You must have a sense of crisis and think of danger in times of peace."}},
  {id:'5-1056',zh:'游刃有余',py:'yóu rèn yǒu yú',en:"to handle things with ease",ex:{zh:'他处理这些工作游刃有余。',py:'Tā chǔlǐ zhèxiē gōngzuò yóu rèn yǒu yú.',en:"He handles this work with ease."}},
  {id:'5-1057',zh:'语重心长',py:'yǔ zhòng xīn cháng',en:"in earnest / with deep feeling",ex:{zh:'老师语重心长地嘱咐我们。',py:'Lǎoshī yǔ zhòng xīn cháng de zhǔfu wǒmen.',en:"The teacher earnestly and sincerely advised us."}},
  {id:'5-1058',zh:'愿景',py:'yuànjǐng',en:"vision / aspiration",ex:{zh:'我们要共同实现发展的美好愿景。',py:'Wǒmen yào gòngtóng shíxiàn fāzhǎn de měihǎo yuànjǐng.',en:"We must together realize the beautiful vision for development."}},
  {id:'5-1059',zh:'再接再厉',py:'zài jiē zài lì',en:"to continue to make further efforts",ex:{zh:'取得成绩后，要再接再厉。',py:'Qǔdé chéngjì hòu, yào zài jiē zài lì.',en:"After achieving results, you must continue to make further efforts."}},
  {id:'5-1060',zh:'朝气蓬勃',py:'zhāo qì péng bó',en:"full of youthful energy and vitality",ex:{zh:'年轻人要朝气蓬勃，充满活力。',py:'Niánqīngrén yào zhāo qì péng bó, chōngmǎn huólì.',en:"Young people should be full of youthful energy and vitality."}},
  {id:'5-1061',zh:'震撼',py:'zhènhàn',en:"to shake / to shock / deeply moved",ex:{zh:'这个故事深深震撼了他。',py:'Zhège gùshi shēnshēn zhènhànle tā.',en:"This story deeply moved him."}},
  {id:'5-1062',zh:'知行合一',py:'zhī xíng hé yī',en:"unity of knowing and doing",ex:{zh:'知行合一是儒家的重要理念。',py:'Zhī xíng hé yī shì Rújiā de zhòngyào lǐniàn.',en:"Unity of knowing and doing is an important Confucian concept."}},
  {id:'5-1063',zh:'志同道合',py:'zhì tóng dào hé',en:"to have the same ideals and follow the same path",ex:{zh:'他们是志同道合的伙伴。',py:'Tāmen shì zhì tóng dào hé de huǒbàn.',en:"They are partners with the same ideals."}},
  {id:'5-1064',zh:'中流砥柱',py:'zhōng liú dǐ zhù',en:"mainstay / backbone / pillar",ex:{zh:'他是团队中的中流砥柱。',py:'Tā shì tuánduì zhōng de zhōng liú dǐ zhù.',en:"He is the backbone of the team."}},
  {id:'5-1065',zh:'众志成城',py:'zhòng zhì chéng chéng',en:"united will is an impregnable fortress",ex:{zh:'众志成城，没有克服不了的困难。',py:'Zhòng zhì chéng chéng, méiyǒu kèfú bùliǎo de kùnnan.',en:"With united will, no difficulty is insurmountable."}},
  {id:'5-1066',zh:'注入',py:'zhùrù',en:"to inject / to pour into",ex:{zh:'改革为发展注入了新活力。',py:'Gǎigé wèi fāzhǎn zhùrùle xīn huólì.',en:"Reform injected new vitality into development."}},
  {id:'5-1067',zh:'自豪',py:'zìháo',en:"proud / pride",ex:{zh:'他为自己的成就感到自豪。',py:'Tā wèi zìjǐ de chéngjiù gǎndào zìháo.',en:"He feels proud of his achievements."}},
  {id:'5-1068',zh:'自律',py:'zìlǜ',en:"self-discipline",ex:{zh:'自律是成功的重要品质。',py:'Zìlǜ shì chénggōng de zhòngyào pǐnzhì.',en:"Self-discipline is an important quality for success."}},
  {id:'5-1069',zh:'宗旨',py:'zōngzhǐ',en:"purpose / aim / mission",ex:{zh:'服务人民是我们工作的宗旨。',py:'Fúwù rénmín shì wǒmen gōngzuò de zōngzhǐ.',en:"Serving the people is the purpose of our work."}},
  {id:'5-1070',zh:'滋生',py:'zīshēng',en:"to breed / to give rise to",ex:{zh:'不良环境容易滋生犯罪。',py:'Bùliáng huánjìng róngyì zīshēng fànzuì.',en:"Bad environments easily breed crime."}},
  {id:'5-1071',zh:'标杆',py:'biāogǎn',en:"model / benchmark",ex:{zh:'他是行业内的标杆人物。',py:'Tā shì hángyè nèi de biāogǎn rénwù.',en:"He is a model figure in the industry."}},
  {id:'5-1072',zh:'薄弱',py:'bóruò',en:"weak / frail",ex:{zh:'这个环节是整体的薄弱之处。',py:'Zhège huánjié shì zhěngtǐ de bóruò zhīchù.',en:"This link is the weak point of the whole."}},
  {id:'5-1073',zh:'操守',py:'cāoshǒu',en:"moral integrity / professional ethics",ex:{zh:'他有良好的职业操守。',py:'Tā yǒu liánghǎo de zhíyè cāoshǒu.',en:"He has good professional ethics."}},
  {id:'5-1074',zh:'承上启下',py:'chéng shàng qǐ xià',en:"to connect the preceding and the following",ex:{zh:'这段文字起到承上启下的作用。',py:'Zhè duàn wénzì qǐdào chéng shàng qǐ xià de zuòyòng.',en:"This passage serves to connect what comes before and after."}},
  {id:'5-1075',zh:'创意',py:'chuàngyì',en:"creativity / creative idea",ex:{zh:'这个广告充满了创意。',py:'Zhège guǎnggào chōngmǎnle chuàngyì.',en:"This advertisement is full of creativity."}},
  {id:'5-1076',zh:'传承',py:'chuánchéng',en:"to pass on / to inherit and carry forward",ex:{zh:'文化需要一代代传承下去。',py:'Wénhuà xūyào yī dài dài chuánchéng xiàqù.',en:"Culture needs to be passed on from generation to generation."}},
  {id:'5-1077',zh:'打磨',py:'dǎmó',en:"to polish / to hone / to refine",ex:{zh:'他不断打磨自己的技艺。',py:'Tā bùduàn dǎmó zìjǐ de jìyì.',en:"He constantly hones his craft."}},
  {id:'5-1078',zh:'担当',py:'dāndāng',en:"to take responsibility / to bear",ex:{zh:'要有担当精神，勇于承担责任。',py:'Yào yǒu dāndāng jīngshén, yǒngyú chéngdān zérèn.',en:"You must have the spirit of responsibility."}},
  {id:'5-1079',zh:'低调',py:'dīdiào',en:"low-key / modest",ex:{zh:'他为人低调，从不张扬。',py:'Tā wéirén dīdiào, cóng bù zhāngyáng.',en:"He keeps a low profile and never shows off."}},
  {id:'5-1080',zh:'典范',py:'diǎnfàn',en:"model / paragon / example",ex:{zh:'他是我们学习的典范。',py:'Tā shì wǒmen xuéxí de diǎnfàn.',en:"He is a model for us to learn from."}},
  {id:'5-1081',zh:'定义',py:'dìngyì',en:"definition / to define",ex:{zh:'请给这个概念下一个定义。',py:'Qǐng gěi zhège gàiniàn xià yīgè dìngyì.',en:"Please give a definition of this concept."}},
  {id:'5-1082',zh:'独到',py:'dúdào',en:"original / unique / distinctive",ex:{zh:'他对问题有独到的见解。',py:'Tā duì wèntí yǒu dúdào de jiànjiě.',en:"He has original insights into the problem."}},
  {id:'5-1083',zh:'对策',py:'duìcè',en:"countermeasure / strategy",ex:{zh:'我们需要制定有效的对策。',py:'Wǒmen xūyào zhìdìng yǒuxiào de duìcè.',en:"We need to formulate effective countermeasures."}},
  {id:'5-1084',zh:'发达',py:'fādá',en:"developed / prosperous / advanced",ex:{zh:'发达国家经济水平较高。',py:'Fādá guójiā jīngjì shuǐpíng jiào gāo.',en:"Developed countries have a higher economic level."}},
  {id:'5-1085',zh:'分歧',py:'fēnqí',en:"divergence / disagreement",ex:{zh:'双方存在较大分歧。',py:'Shuāngfāng cúnzài jiào dà fēnqí.',en:"There are significant differences between the two sides."}},
  {id:'5-1086',zh:'感染',py:'gǎnrǎn',en:"to infect / to move / to influence",ex:{zh:'他的热情感染了周围的人。',py:'Tā de rèqíng gǎnrǎnle zhōuwéi de rén.',en:"His enthusiasm infected the people around him."}},
  {id:'5-1087',zh:'根基',py:'gēnjī',en:"foundation / basis / root",ex:{zh:'教育是社会发展的根基。',py:'Jiàoyù shì shèhuì fāzhǎn de gēnjī.',en:"Education is the foundation of social development."}},
  {id:'5-1088',zh:'共识',py:'gòngshí',en:"consensus / common understanding",ex:{zh:'各方达成了共识。',py:'Gèfāng dáchéngle gòngshí.',en:"All parties reached a consensus."}},
  {id:'5-1089',zh:'贯穿',py:'guànchuān',en:"to run through / to penetrate",ex:{zh:'这个主题贯穿了整部作品。',py:'Zhège zhǔtí guànchuānle zhěng bù zuòpǐn.',en:"This theme runs through the entire work."}},
  {id:'5-1090',zh:'汇总',py:'huìzǒng',en:"to compile / to summarize",ex:{zh:'请将所有数据汇总上报。',py:'Qǐng jiāng suǒyǒu shùjù huìzǒng shàngbào.',en:"Please compile all data and report upward."}},
  {id:'5-1091',zh:'豁达',py:'huòdá',en:"open-minded / magnanimous",ex:{zh:'他性格豁达，待人宽厚。',py:'Tā xìnggé huòdá, dài rén kuānhòu.',en:"He has an open-minded character and is generous to others."}},
  {id:'5-1092',zh:'激发',py:'jīfā',en:"to inspire / to stimulate / to arouse",ex:{zh:'好奇心激发了他的探索欲。',py:'Hàoqíxīn jīfāle tā de tànsuǒ yù.',en:"Curiosity stimulated his desire to explore."}},
  {id:'5-1093',zh:'坚守',py:'jiānshǒu',en:"to stick to / to hold fast to",ex:{zh:'要坚守自己的原则。',py:'Yào jiānshǒu zìjǐ de yuánzé.',en:"You must stick to your own principles."}},
  {id:'5-1094',zh:'见解',py:'jiànjiě',en:"view / opinion / insight",ex:{zh:'他对这个问题有独到的见解。',py:'Tā duì zhège wèntí yǒu dúdào de jiànjiě.',en:"He has a unique insight into this problem."}},
  {id:'5-1095',zh:'竞争力',py:'jìngzhēnglì',en:"competitiveness",ex:{zh:'提高核心竞争力很重要。',py:'Tígāo héxīn jìngzhēnglì hěn zhòngyào.',en:"Improving core competitiveness is very important."}},
  {id:'5-1096',zh:'开拓',py:'kāituò',en:"to open up / to pioneer",ex:{zh:'他致力于开拓新市场。',py:'Tā zhìlì yú kāituò xīn shìchǎng.',en:"He is committed to opening up new markets."}},
  {id:'5-1097',zh:'刻苦',py:'kèkǔ',en:"hardworking / assiduous",ex:{zh:'他刻苦学习，终于取得了好成绩。',py:'Tā kèkǔ xuéxí, zhōngyú qǔdéle hǎo chéngjì.',en:"He studied assiduously and finally achieved good results."}},
  {id:'5-1098',zh:'理念',py:'lǐniàn',en:"concept / idea / philosophy",ex:{zh:'要树立正确的发展理念。',py:'Yào shùlì zhèngquè de fāzhǎn lǐniàn.',en:"A correct development philosophy must be established."}},
  {id:'5-1099',zh:'立足',py:'lìzú',en:"to stand firm / to base oneself on",ex:{zh:'要立足实际，解决问题。',py:'Yào lìzú shíjì, jiějué wèntí.',en:"You must stand firm in reality and solve problems."}},
  {id:'5-1100',zh:'领军',py:'lǐngjūn',en:"leading / pioneering",ex:{zh:'他是这个领域的领军人物。',py:'Tā shì zhège lǐngyù de lǐngjūn rénwù.',en:"He is a leading figure in this field."}},
  {id:'5-1101',zh:'磨砺',py:'mólì',en:"to hone / to sharpen",ex:{zh:'艰苦的环境磨砺了他的意志。',py:'Jiānkǔ de huánjìng mólìle tā de yìzhì.',en:"The harsh environment honed his willpower."}},
  {id:'5-1102',zh:'谋划',py:'móuhuà',en:"to plan / to map out",ex:{zh:'他谋划了长远的发展策略。',py:'Tā móuhuàle chángyuǎn de fāzhǎn cèlüè.',en:"He mapped out a long-term development strategy."}},
  {id:'5-1103',zh:'培育',py:'péiyù',en:"to cultivate / to nurture",ex:{zh:'学校培育了一批优秀人才。',py:'Xuéxiào péiyùle yī pī yōuxiù réncái.',en:"The school nurtured a group of outstanding talents."}},
  {id:'5-1104',zh:'拼搏',py:'pīnbó',en:"to struggle / to fight hard",ex:{zh:'他不断拼搏，终于实现了梦想。',py:'Tā bùduàn pīnbó, zhōngyú shíxiànle mèngxiǎng.',en:"He kept struggling and finally realized his dream."}},
  {id:'5-1105',zh:'强化',py:'qiánghuà',en:"to strengthen / to intensify",ex:{zh:'要强化安全意识。',py:'Yào qiánghuà ānquán yìshí.',en:"Safety awareness must be strengthened."}},
  {id:'5-1106',zh:'情怀',py:'qínghuái',en:"sentiments / feelings / mindset",ex:{zh:'他有爱国情怀。',py:'Tā yǒu àiguó qínghuái.',en:"He has patriotic sentiments."}},
  {id:'5-1107',zh:'确立',py:'quèlì',en:"to establish / to set up",ex:{zh:'要确立正确的价值观。',py:'Yào quèlì zhèngquè de jiàzhíguān.',en:"Correct values must be established."}},
  {id:'5-1108',zh:'人文',py:'rénwén',en:"humanities / human culture",ex:{zh:'大学注重人文素养教育。',py:'Dàxué zhùzhòng rénwén sùyǎng jiàoyù.',en:"Universities emphasize humanistic education."}},
  {id:'5-1109',zh:'融通',py:'róngtōng',en:"to connect / to reconcile / to fuse",ex:{zh:'中西文化在这里融通交汇。',py:'Zhōngxī wénhuà zài zhèlǐ róngtōng jiāohuì.',en:"Chinese and Western cultures connect and merge here."}},
  {id:'5-1110',zh:'深化',py:'shēnhuà',en:"to deepen / to intensify",ex:{zh:'要深化改革开放。',py:'Yào shēnhuà gǎigé kāifàng.',en:"Reform and opening up must be deepened."}},
  {id:'5-1111',zh:'审慎',py:'shěnshèn',en:"careful / cautious / prudent",ex:{zh:'要对这件事持审慎态度。',py:'Yào duì zhè jiàn shì chí shěnshèn tàidù.',en:"You must take a cautious attitude toward this matter."}},
  {id:'5-1112',zh:'生机',py:'shēngjī',en:"vitality / life force",ex:{zh:'春天万物充满生机。',py:'Chūntiān wànwù chōngmǎn shēngjī.',en:"All things in spring are full of vitality."}},
  {id:'5-1113',zh:'实证',py:'shízhèng',en:"evidence / empirical proof",ex:{zh:'要用实证说话。',py:'Yào yòng shízhèng shuōhuà.',en:"You must speak with evidence."}},
  {id:'5-1114',zh:'世代',py:'shìdài',en:"generation / era / age",ex:{zh:'这段历史影响了几个世代。',py:'Zhè duàn lìshǐ yǐngxiǎngle jǐ gè shìdài.',en:"This period of history influenced several generations."}},
  {id:'5-1115',zh:'首要',py:'shǒuyào',en:"primary / first / foremost",ex:{zh:'学习是我的首要任务。',py:'Xuéxí shì wǒ de shǒuyào rènwù.',en:"Studying is my primary task."}},
  {id:'5-1116',zh:'思维',py:'sīwéi',en:"thinking / thought / mindset",ex:{zh:'要培养批判性思维能力。',py:'Yào péiyǎng pīpànxìng sīwéi nénglì.',en:"Critical thinking ability must be cultivated."}},
  {id:'5-1117',zh:'缩影',py:'suōyǐng',en:"miniature / epitome / microcosm",ex:{zh:'这个村庄是中国农村发展的缩影。',py:'Zhège cūnzhuāng shì Zhōngguó nóngcūn fāzhǎn de suōyǐng.',en:"This village is a microcosm of rural development in China."}},
  {id:'5-1118',zh:'体系',py:'tǐxì',en:"system / framework",ex:{zh:'要建立完整的知识体系。',py:'Yào jiànlì wánzhěng de zhīshí tǐxì.',en:"A complete knowledge framework must be built."}},
  {id:'5-1119',zh:'突破',py:'tūpò',en:"breakthrough / to break through",ex:{zh:'科学研究取得了重大突破。',py:'Kēxué yánjiū qǔdéle zhòngdà tūpò.',en:"Scientific research achieved a major breakthrough."}},
  {id:'5-1120',zh:'推崇',py:'tuīchóng',en:"to hold in high esteem",ex:{zh:'这位学者被后人推崇。',py:'Zhè wèi xuézhě bèi hòurén tuīchóng.',en:"This scholar is held in high esteem by later generations."}},
  {id:'5-1121',zh:'维护',py:'wéihù',en:"to safeguard / to protect",ex:{zh:'要维护国家的统一和尊严。',py:'Yào wéihù guójiā de tǒngyī hé zūnyán.',en:"The unity and dignity of the country must be safeguarded."}},
  {id:'5-1122',zh:'文脉',py:'wénmài',en:"cultural vein / cultural lineage",ex:{zh:'要保护地方文脉，传承历史文化。',py:'Yào bǎohù dìfāng wénmài, chuánchéng lìshǐ wénhuà.',en:"Local cultural lineage must be protected."}},
  {id:'5-1123',zh:'务实',py:'wùshí',en:"pragmatic / realistic",ex:{zh:'要务实求真，拒绝空谈。',py:'Yào wùshí qiúzhēn, jùjué kōngtán.',en:"Be pragmatic and realistic, rejecting empty talk."}},
  {id:'5-1124',zh:'息息相关',py:'xī xī xiāng guān',en:"closely linked / intimately related",ex:{zh:'学习与未来息息相关。',py:'Xuéxí yǔ wèilái xī xī xiāng guān.',en:"Learning is closely linked to the future."}},
  {id:'5-1125',zh:'先进',py:'xiānjìn',en:"advanced / progressive",ex:{zh:'要学习先进的技术和经验。',py:'Yào xuéxí xiānjìn de jìshù hé jīngyàn.',en:"Advanced technology and experience must be learned."}},
  {id:'5-1126',zh:'心血',py:'xīnxuè',en:"painstaking effort / blood and sweat",ex:{zh:'这部作品凝聚了他多年的心血。',py:'Zhè bù zuòpǐn níngjùle tā duō nián de xīnxuè.',en:"This work condenses his many years of painstaking effort."}},
  {id:'5-1127',zh:'新颖',py:'xīnyǐng',en:"novel / original / fresh",ex:{zh:'他的想法新颖独特。',py:'Tā de xiǎngfǎ xīnyǐng dútè.',en:"His ideas are novel and unique."}},
  {id:'5-1128',zh:'雄厚',py:'xiónghòu',en:"strong / powerful / substantial",ex:{zh:'公司有雄厚的资金实力。',py:'Gōngsī yǒu xiónghòu de zījīn shílì.',en:"The company has substantial financial strength."}},
  {id:'5-1129',zh:'寻根',py:'xúngēn',en:"to trace one's roots",ex:{zh:'他踏上寻根之旅，探寻祖先足迹。',py:'Tā tàshàng xúngēn zhī lǚ, tànxún zǔxiān zújì.',en:"He set out on a journey to trace his roots."}},
  {id:'5-1130',zh:'研习',py:'yánxí',en:"to study and practice",ex:{zh:'他研习古典文学多年。',py:'Tā yánxí gǔdiǎn wénxué duō nián.',en:"He has studied and practiced classical literature for many years."}},
  {id:'5-1131',zh:'一往无前',py:'yī wǎng wú qián',en:"to press forward with indomitable will",ex:{zh:'他一往无前，勇往直前。',py:'Tā yī wǎng wú qián, yǒng wǎng zhí qián.',en:"He pressed forward with indomitable will."}},
  {id:'5-1132',zh:'以身作则',py:'yǐ shēn zuò zé',en:"to set an example",ex:{zh:'领导者要以身作则。',py:'Lǐngdǎo zhě yào yǐ shēn zuò zé.',en:"Leaders must set an example."}},
  {id:'5-1133',zh:'英明',py:'yīngmíng',en:"wise / brilliant / enlightened",ex:{zh:'他做出了英明的决策。',py:'Tā zuòchūle yīngmíng de juécè.',en:"He made a wise decision."}},
  {id:'5-1134',zh:'迎难而上',py:'yíng nán ér shàng',en:"to press on despite difficulties",ex:{zh:'面对挑战，要迎难而上。',py:'Miànduì tiǎozhàn, yào yíng nán ér shàng.',en:"Face challenges and press on despite difficulties."}},
  {id:'5-1135',zh:'营造',py:'yíngzào',en:"to create / to build",ex:{zh:'要营造良好的学习氛围。',py:'Yào yíngzào liánghǎo de xuéxí fēnwéi.',en:"A good learning atmosphere must be created."}},
  {id:'5-1136',zh:'涌现',py:'yǒngxiàn',en:"to emerge in great numbers",ex:{zh:'优秀人才不断涌现。',py:'Yōuxiù réncái bùduàn yǒngxiàn.',en:"Outstanding talents keep emerging."}},
  {id:'5-1137',zh:'有机',py:'yǒujī',en:"organic / integrated",ex:{zh:'理论与实践要有机结合。',py:'Lǐlùn yǔ shíjiàn yào yǒujī jiéhé.',en:"Theory and practice must be organically integrated."}},
  {id:'5-1138',zh:'与时俱进',py:'yǔ shí jù jìn',en:"to advance with the times",ex:{zh:'思想要与时俱进。',py:'Sīxiǎng yào yǔ shí jù jìn.',en:"Thinking must advance with the times."}},
  {id:'5-1139',zh:'渊博',py:'yuānbó',en:"learned / erudite / extensive",ex:{zh:'他学识渊博，见多识广。',py:'Tā xuéshí yuānbó, jiàn duō shí guǎng.',en:"He is erudite and has broad knowledge."}},
  {id:'5-1140',zh:'源泉',py:'yuánquán',en:"source / fountain / origin",ex:{zh:'人民是创造历史的源泉。',py:'Rénmín shì chuàngzào lìshǐ de yuánquán.',en:"The people are the source of historical creation."}},
  {id:'5-1141',zh:'运转',py:'yùnzhuǎn',en:"to run / to operate / to function",ex:{zh:'机器正常运转。',py:'Jīqì zhèngcháng yùnzhuǎn.',en:"The machine is running normally."}},
  {id:'5-1142',zh:'赞叹',py:'zàntàn',en:"to exclaim with admiration",ex:{zh:'众人对他的作品赞叹不已。',py:'Zhòng rén duì tā de zuòpǐn zàntàn bùyǐ.',en:"Everyone exclaimed with admiration at his works."}},
  {id:'5-1143',zh:'崭新',py:'zhǎnxīn',en:"brand new",ex:{zh:'我们迎来了崭新的时代。',py:'Wǒmen yínglái le zhǎnxīn de shídài.',en:"We welcome a brand new era."}},
  {id:'5-1144',zh:'正大光明',py:'zhèng dà guāng míng',en:"upright and open / above board",ex:{zh:'做事要正大光明，不能有私心。',py:'Zuòshì yào zhèng dà guāng míng, bùnéng yǒu sīxīn.',en:"You must be upright and open in everything."}},
  {id:'5-1145',zh:'铸魂育人',py:'zhù hún yù rén',en:"to forge souls and cultivate people",ex:{zh:'教育要铸魂育人，培根铸魂。',py:'Jiàoyù yào zhù hún yù rén, péi gēn zhù hún.',en:"Education must forge souls and cultivate talented people."}},
  {id:'5-1146',zh:'自强不息',py:'zìqiáng bù xī',en:"to strive constantly to improve oneself",ex:{zh:'自强不息是中华民族的精神支柱。',py:'Zìqiáng bù xī shì Zhōnghuá mínzú de jīngshén zhīzhù.',en:"Unceasing self-improvement is the spiritual pillar of the Chinese nation."}},
  {id:'5-1147',zh:'综述',py:'zōngshù',en:"overview / summary",ex:{zh:'这篇文章是对该领域的综述。',py:'Zhè piān wénzhāng shì duì gāi lǐngyù de zōngshù.',en:"This article is an overview of the field."}},
  {id:'5-1148',zh:'走向',py:'zǒuxiàng',en:"trend / direction / to move toward",ex:{zh:'这是历史发展的走向。',py:'Zhè shì lìshǐ fāzhǎn de zǒuxiàng.',en:"This is the trend of historical development."}},
  {id:'5-1149',zh:'尊严',py:'zūnyán',en:"dignity / self-respect",ex:{zh:'每个人都有自己的尊严。',py:'Měi gè rén dōu yǒu zìjǐ de zūnyán.',en:"Everyone has their own dignity."}},
  {id:'5-1150',zh:'卓越',py:'zhuōyuè',en:"outstanding / excellent / remarkable",ex:{zh:'他取得了卓越的成就。',py:'Tā qǔdéle zhuōyuè de chéngjiù.',en:"He achieved outstanding accomplishments."}},

  {id:'5-1151',zh:'奋发图强',py:'fènfā túqiáng',en:"to strive to strengthen oneself",ex:{zh:'要奋发图强，为实现中国梦而努力。',py:'Yào fènfā túqiáng, wèi shíxiàn Zhōngguó mèng ér nǔlì.',en:"Strive to strengthen yourself and work hard to realize the Chinese dream."}},
  {id:'5-1152',zh:'初心',py:'chūxīn',en:"original aspiration / initial purpose",ex:{zh:'不忘初心，方得始终。',py:'Bùwàng chūxīn, fāng dé shǐzhōng.',en:"Remember the original aspiration and you will persevere to the end."}},
  {id:'5-1153',zh:'传奇',py:'chuánqí',en:"legend / legendary",ex:{zh:'他的一生就是一段传奇。',py:'Tā de yīshēng jiùshì yī duàn chuánqí.',en:"His entire life was a legend."}},
  {id:'5-1154',zh:'大展宏图',py:'dà zhǎn hóngtú',en:"to realize one's great ambitions",ex:{zh:'愿你大展宏图，事业有成。',py:'Yuàn nǐ dà zhǎn hóngtú, shìyè yǒu chéng.',en:"May you realize your great ambitions and succeed in your career."}},
  {id:'5-1155',zh:'担忧',py:'dānyōu',en:"to worry / to be concerned",ex:{zh:'他担忧未来的发展。',py:'Tā dānyōu wèilái de fāzhǎn.',en:"He worries about future development."}},
  {id:'5-1156',zh:'翻天覆地',py:'fān tiān fù dì',en:"earth-shaking / world-shaking",ex:{zh:'改革开放带来了翻天覆地的变化。',py:'Gǎigé kāifàng dàiláile fān tiān fù dì de biànhuà.',en:"Reform and opening up brought earth-shaking changes."}},
  {id:'5-1157',zh:'丰碑',py:'fēngbēi',en:"monument / milestone",ex:{zh:'他为这个事业树立了一座丰碑。',py:'Tā wèi zhège shìyè shùlìle yī zuò fēngbēi.',en:"He erected a monument for this cause."}},
  {id:'5-1158',zh:'感同身受',py:'gǎn tóng shēn shòu',en:"to deeply empathize",ex:{zh:'他的遭遇让我感同身受。',py:'Tā de zāoyù ràng wǒ gǎn tóng shēn shòu.',en:"His experience made me deeply empathize."}},
  {id:'5-1159',zh:'高山仰止',py:'gāo shān yǎng zhǐ',en:"to look up to like a lofty mountain",ex:{zh:'他的品德高山仰止，令人敬佩。',py:'Tā de pǐndé gāo shān yǎng zhǐ, lìng rén jìngpèi.',en:"His moral character is so lofty one can only look up with admiration."}},
  {id:'5-1160',zh:'好学',py:'hàoxué',en:"eager to learn / studious",ex:{zh:'他好学上进，从不懈怠。',py:'Tā hàoxué shàngjìn, cóng bù xièdài.',en:"He is eager to learn and make progress, never slacking."}},
  {id:'5-1161',zh:'宏愿',py:'hóngyuàn',en:"great aspiration / grand wish",ex:{zh:'他怀有宏愿，立志为国家服务。',py:'Tā huáiyǒu hóngyuàn, lìzhì wèi guójiā fúwù.',en:"He harbors grand aspirations and is determined to serve the country."}},
  {id:'5-1162',zh:'焕发',py:'huànfā',en:"to glow / to radiate / to revitalize",ex:{zh:'改革焕发了新的活力。',py:'Gǎigé huànfāle xīn de huólì.',en:"Reform revitalized new energy."}},
  {id:'5-1163',zh:'家风',py:'jiāfēng',en:"family tradition / family ethos",ex:{zh:'好家风是最好的传家宝。',py:'Hǎo jiāfēng shì zuì hǎo de chuánjiābǎo.',en:"A good family tradition is the best heirloom."}},
  {id:'5-1164',zh:'精气神',py:'jīng qì shén',en:"spirit and vitality",ex:{zh:'年轻人要有精气神，充满朝气。',py:'Niánqīngrén yào yǒu jīng qì shén, chōngmǎn zhāoqì.',en:"Young people must have spirit and vitality."}},
  {id:'5-1165',zh:'绝妙',py:'juémiào',en:"superb / exquisite / brilliant",ex:{zh:'这是一个绝妙的想法。',py:'Zhè shì yīgè juémiào de xiǎngfǎ.',en:"This is a brilliant idea."}},
  {id:'5-1166',zh:'开天辟地',py:'kāi tiān pì dì',en:"epoch-making / to create a new era",ex:{zh:'这是开天辟地的伟大创举。',py:'Zhè shì kāi tiān pì dì de wěidà chuàngjǔ.',en:"This is an epoch-making great initiative."}},
  {id:'5-1167',zh:'刻不容缓',py:'kè bù róng huǎn',en:"not a moment to lose / urgent",ex:{zh:'这件事刻不容缓，必须立即行动。',py:'Zhè jiàn shì kè bù róng huǎn, bìxū lìjí xíngdòng.',en:"This matter is urgent and action must be taken immediately."}},
  {id:'5-1168',zh:'来之不易',py:'lái zhī bù yì',en:"hard-won / not easily obtained",ex:{zh:'成功来之不易，要倍加珍惜。',py:'Chénggōng lái zhī bù yì, yào bèi jiā zhēnxī.',en:"Success is hard-won and must be especially cherished."}},
  {id:'5-1169',zh:'赖以',py:'lài yǐ',en:"to depend on / to rely on",ex:{zh:'这是他赖以生存的技能。',py:'Zhè shì tā lài yǐ shēngcún de jìnéng.',en:"This is the skill he depends on to survive."}},
  {id:'5-1170',zh:'老骥伏枥',py:'lǎo jì fú lì',en:"an old steed still aspires to gallop",ex:{zh:'老骥伏枥，志在千里。',py:'Lǎo jì fú lì, zhì zài qiān lǐ.',en:"An old steed in the stable still aspires to gallop a thousand miles."}},
  {id:'5-1171',zh:'联动',py:'liándòng',en:"to coordinate / linkage",ex:{zh:'各部门要联动配合，共同解决问题。',py:'Gè bùmén yào liándòng pèihé, gòngtóng jiějué wèntí.',en:"All departments must coordinate and work together to solve problems."}},
  {id:'5-1172',zh:'灵动',py:'língdòng',en:"lively / vivid / nimble",ex:{zh:'他的舞姿灵动优美。',py:'Tā de wǔzī língdòng yōuměi.',en:"His dance movements are lively and graceful."}},
  {id:'5-1173',zh:'留传',py:'liúchuán',en:"to pass down / to hand down",ex:{zh:'这门手艺代代留传。',py:'Zhè mén shǒuyì dài dài liúchuán.',en:"This craft has been handed down from generation to generation."}},
  {id:'5-1174',zh:'鳞次栉比',py:'lín cì zhì bǐ',en:"row upon row / closely packed",ex:{zh:'城市里高楼鳞次栉比。',py:'Chéngshì lǐ gāolóu lín cì zhì bǐ.',en:"Tall buildings stand row upon row in the city."}},
  {id:'5-1175',zh:'铭记',py:'míngjì',en:"to keep firmly in mind",ex:{zh:'这段历史要铭记于心。',py:'Zhè duàn lìshǐ yào míngjì yú xīn.',en:"This period of history must be firmly kept in mind."}},
  {id:'5-1176',zh:'民族',py:'mínzú',en:"ethnic group / nation",ex:{zh:'中华民族有悠久的历史。',py:'Zhōnghuá mínzú yǒu yōujiǔ de lìshǐ.',en:"The Chinese nation has a long history."}},
  {id:'5-1177',zh:'默契',py:'mòqì',en:"tacit understanding / rapport",ex:{zh:'他们两人配合默契。',py:'Tāmen liǎng rén pèihé mòqì.',en:"The two of them have a tacit understanding."}},
  {id:'5-1178',zh:'宁死不屈',py:'nìng sǐ bù qū',en:"to rather die than submit",ex:{zh:'他宁死不屈，坚守信仰。',py:'Tā nìng sǐ bù qū, jiānshǒu xìnyǎng.',en:"He would rather die than submit and held fast to his beliefs."}},
  {id:'5-1179',zh:'排除',py:'páichú',en:"to eliminate / to rule out",ex:{zh:'要排除一切干扰因素。',py:'Yào páichú yīqiē gānrǎo yīnsù.',en:"All interfering factors must be eliminated."}},
  {id:'5-1180',zh:'普及',py:'pǔjí',en:"to popularize / widespread",ex:{zh:'互联网的普及改变了生活。',py:'Hùliánwǎng de pǔjí gǎibiànle shēnghuó.',en:"The spread of the internet changed life."}},
  {id:'5-1181',zh:'奇迹',py:'qíjì',en:"miracle / wonder",ex:{zh:'他创造了医学奇迹。',py:'Tā chuàngzàole yīxué qíjì.',en:"He created a medical miracle."}},
  {id:'5-1182',zh:'潜力',py:'qiánlì',en:"potential / latent ability",ex:{zh:'他有很大的发展潜力。',py:'Tā yǒu hěn dà de fāzhǎn qiánlì.',en:"He has great development potential."}},
  {id:'5-1183',zh:'权威',py:'quánwēi',en:"authority / authoritative",ex:{zh:'他在这个领域很有权威。',py:'Tā zài zhège lǐngyù hěn yǒu quánwēi.',en:"He has great authority in this field."}},
  {id:'5-1184',zh:'忍耐',py:'rěnnài',en:"to endure / to be patient",ex:{zh:'面对困难要有忍耐力。',py:'Miànduì kùnnan yào yǒu rěnnài lì.',en:"You must have patience when facing difficulties."}},
  {id:'5-1185',zh:'融入',py:'róngrù',en:"to blend in / to integrate into",ex:{zh:'他很快融入了新环境。',py:'Tā hěn kuài róngrùle xīn huánjìng.',en:"He quickly blended into the new environment."}},
  {id:'5-1186',zh:'如实',py:'rúshí',en:"truthfully / as it really is",ex:{zh:'他如实反映了情况。',py:'Tā rúshí fǎnyìngle qíngkuàng.',en:"He truthfully reported the situation."}},
  {id:'5-1187',zh:'沙漠化',py:'shāmòhuà',en:"desertification",ex:{zh:'土地沙漠化是全球性问题。',py:'Tǔdì shāmòhuà shì quánqiúxìng wèntí.',en:"Land desertification is a global problem."}},
  {id:'5-1188',zh:'善待',py:'shàndài',en:"to treat well / to be kind to",ex:{zh:'要善待他人，才能赢得尊重。',py:'Yào shàndài tārén, cái néng yíngdé zūnzhòng.',en:"Treat others well to win their respect."}},
  {id:'5-1189',zh:'深情厚谊',py:'shēnqíng hòuyì',en:"deep feelings and profound friendship",ex:{zh:'他们之间有深情厚谊。',py:'Tāmen zhī jiān yǒu shēnqíng hòuyì.',en:"There are deep feelings and profound friendship between them."}},
  {id:'5-1190',zh:'生动',py:'shēngdòng',en:"vivid / lively / animated",ex:{zh:'他的讲解生动形象。',py:'Tā de jiǎngjiě shēngdòng xíngxiàng.',en:"His explanation is vivid and graphic."}},
  {id:'5-1191',zh:'胜利',py:'shènglì',en:"victory / success / to win",ex:{zh:'胜利属于坚持不懈的人。',py:'Shènglì shǔyú jiānchí bù xiè de rén.',en:"Victory belongs to those who persevere."}},
  {id:'5-1192',zh:'时不我待',py:'shí bù wǒ dài',en:"time waits for no one",ex:{zh:'时不我待，我们要抓紧行动。',py:'Shí bù wǒ dài, wǒmen yào zhuājǐn xíngdòng.',en:"Time waits for no one — we must act quickly."}},
  {id:'5-1193',zh:'使命',py:'shǐmìng',en:"mission / calling",ex:{zh:'他把教育视为自己的使命。',py:'Tā bǎ jiàoyù shì wéi zìjǐ de shǐmìng.',en:"He regards education as his mission."}},
  {id:'5-1194',zh:'守正创新',py:'shǒu zhèng chuàng xīn',en:"to uphold integrity and pursue innovation",ex:{zh:'守正创新是新时代的要求。',py:'Shǒu zhèng chuàng xīn shì xīn shídài de yāoqiú.',en:"Upholding integrity while pursuing innovation is the requirement of the new era."}},
  {id:'5-1195',zh:'数以万计',py:'shù yǐ wàn jì',en:"tens of thousands / countless",ex:{zh:'有数以万计的人参加了这次活动。',py:'Yǒu shù yǐ wàn jì de rén cānjiāle zhè cì huódòng.',en:"Tens of thousands of people participated in this event."}},
  {id:'5-1196',zh:'探寻',py:'tànxún',en:"to explore / to seek",ex:{zh:'他不断探寻真理。',py:'Tā bùduàn tànxún zhēnlǐ.',en:"He constantly seeks truth."}},
  {id:'5-1197',zh:'天赋',py:'tiānfù',en:"talent / gift / natural endowment",ex:{zh:'她有音乐天赋。',py:'Tā yǒu yīnyuè tiānfù.',en:"She has a natural talent for music."}},
  {id:'5-1198',zh:'天道酬勤',py:'tiān dào chóu qín',en:"heaven rewards the diligent",ex:{zh:'天道酬勤，努力终有回报。',py:'Tiān dào chóu qín, nǔlì zhōng yǒu huíbào.',en:"Heaven rewards the diligent — hard work will be rewarded."}},
  {id:'5-1199',zh:'透彻',py:'tòuchè',en:"thorough / penetrating / incisive",ex:{zh:'他的分析非常透彻。',py:'Tā de fēnxī fēicháng tòuchè.',en:"His analysis is very thorough."}},
  {id:'5-1200',zh:'拓展',py:'tuòzhǎn',en:"to expand / to develop / to broaden",ex:{zh:'要拓展自己的视野。',py:'Yào tuòzhǎn zìjǐ de shìyě.',en:"You must broaden your horizons."}},
  {id:'5-1201',zh:'完善',py:'wánshàn',en:"to perfect / to improve",ex:{zh:'不断完善自己是成功的关键。',py:'Bùduàn wánshàn zìjǐ shì chénggōng de guānjiàn.',en:"Constantly improving oneself is the key to success."}},
