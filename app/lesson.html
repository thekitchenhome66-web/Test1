  {id:'4-570',zh:'以下',py:'yǐxià',en:"below / under / the following",ex:{zh:'请完成以下练习。',py:'Qǐng wánchéng yǐxià liànxí.',en:"Please complete the following exercises."}},
  {id:'4-571',zh:'一般来说',py:'yībān lái shuō',en:"generally speaking",ex:{zh:'一般来说，早起对健康有益。',py:'Yībān lái shuō, zǎoqǐ duì jiànkāng yǒuyì.',en:"Generally speaking, getting up early is good for health."}},
  {id:'4-572',zh:'尤其',py:'yóuqí',en:"especially / particularly",ex:{zh:'他尤其喜欢数学。',py:'Tā yóuqí xǐhuān shùxué.',en:"He especially likes mathematics."}},
  {id:'4-573',zh:'有利',py:'yǒulì',en:"favorable / advantageous / beneficial",ex:{zh:'这对我们很有利。',py:'Zhè duì wǒmen hěn yǒulì.',en:"This is very favorable for us."}},
  {id:'4-574',zh:'有望',py:'yǒuwàng',en:"hopeful / promising / likely",ex:{zh:'他有望获得奖学金。',py:'Tā yǒuwàng huòdé jiǎngxuéjīn.',en:"He is likely to receive a scholarship."}},
  {id:'4-575',zh:'由此',py:'yóucǐ',en:"from this / thus / hence",ex:{zh:'由此可以得出结论。',py:'Yóucǐ kěyǐ déchū jiélùn.',en:"From this a conclusion can be drawn."}},
  {id:'4-576',zh:'运气',py:'yùnqi',en:"luck / fortune",ex:{zh:'成功不只靠运气。',py:'Chénggōng bù zhǐ kào yùnqi.',en:"Success does not only depend on luck."}},
  {id:'4-577',zh:'杂志',py:'zázhì',en:"magazine / journal",ex:{zh:'他经常阅读学术杂志。',py:'Tā jīngcháng yuèdú xuéshù zázhì.',en:"He often reads academic journals."}},
  {id:'4-578',zh:'在于',py:'zàiyú',en:"to lie in / to consist in",ex:{zh:'成功在于坚持不懈。',py:'Chénggōng zàiyú jiānchí bù xiè.',en:"Success lies in persistent effort."}},
  {id:'4-579',zh:'长处',py:'chángchù',en:"strong point / advantage / merit",ex:{zh:'每个人都有自己的长处。',py:'Měi gè rén dōu yǒu zìjǐ de chángchù.',en:"Everyone has their own strong points."}},
  {id:'4-580',zh:'着重',py:'zhuózhòng',en:"to emphasize / to stress",ex:{zh:'他着重讲解了这个知识点。',py:'Tā zhuózhòng jiǎngjiěle zhège zhīshí diǎn.',en:"He stressed the explanation of this knowledge point."}},
  {id:'4-581',zh:'精彩',py:'jīngcǎi',en:"wonderful / brilliant / excellent",ex:{zh:'这场表演非常精彩。',py:'Zhè chǎng biǎoyǎn fēicháng jīngcǎi.',en:"This performance was absolutely wonderful."}},
  {id:'4-582',zh:'诚实',py:'chéngshí',en:"honest / truthful",ex:{zh:'做人要诚实。',py:'Zuòrén yào chéngshí.',en:"A person must be honest."}},
  {id:'4-583',zh:'勤奋',py:'qínfèn',en:"diligent / hardworking / industrious",ex:{zh:'他是一个非常勤奋的学生。',py:'Tā shì yīgè fēicháng qínfèn de xuésheng.',en:"He is a very diligent student."}},
  {id:'4-584',zh:'谦虚',py:'qiānxū',en:"humble / modest",ex:{zh:'成功后要保持谦虚。',py:'Chénggōng hòu yào bǎochí qiānxū.',en:"You must remain humble after success."}},
  {id:'4-585',zh:'机构',py:'jīgòu',en:"organization / institution / agency",ex:{zh:'他在一个研究机构工作。',py:'Tā zài yīgè yánjiū jīgòu gōngzuò.',en:"He works at a research institution."}},
  {id:'4-586',zh:'竞赛',py:'jìngsài',en:"competition / contest",ex:{zh:'他参加了全国竞赛并获奖。',py:'Tā cānjiāle quánguó jìngsài bìng huòjiǎng.',en:"He participated in the national competition and won an award."}},
  {id:'4-587',zh:'报道',py:'bàodào',en:"to report / news report",ex:{zh:'记者报道了这个事件。',py:'Jìzhě bàodàole zhège shìjiàn.',en:"The reporter reported on this event."}},
  {id:'4-588',zh:'本质',py:'běnzhì',en:"essence / nature / fundamental",ex:{zh:'要抓住问题的本质。',py:'Yào zhuāzhù wèntí de běnzhì.',en:"You must grasp the essence of the problem."}},
  {id:'4-589',zh:'比例',py:'bǐlì',en:"proportion / ratio",ex:{zh:'男女生的比例是一比一。',py:'Nán nǚ shēng de bǐlì shì yī bǐ yī.',en:"The ratio of male to female students is one to one."}},
  {id:'4-590',zh:'并且',py:'bìngqiě',en:"and / moreover / besides",ex:{zh:'他聪明，并且勤奋。',py:'Tā cōngming, bìngqiě qínfèn.',en:"He is smart and moreover hardworking."}},
  {id:'4-591',zh:'不足',py:'bùzú',en:"insufficient / not enough / shortcoming",ex:{zh:'时间不足，无法完成。',py:'Shíjiān bùzú, wúfǎ wánchéng.',en:"There is insufficient time to complete it."}},
  {id:'4-592',zh:'策划',py:'cèhuà',en:"to plan / to devise / planning",ex:{zh:'他策划了这次活动。',py:'Tā cèhuàle zhè cì huódòng.',en:"He planned this activity."}},
  {id:'4-593',zh:'长远',py:'chángyuǎn',en:"long-term / far-sighted",ex:{zh:'要有长远的眼光。',py:'Yào yǒu chángyuǎn de yǎnguāng.',en:"You must have a long-term vision."}},
  {id:'4-594',zh:'承担',py:'chéngdān',en:"to take on / to bear / to shoulder",ex:{zh:'他愿意承担所有责任。',py:'Tā yuànyì chéngdān suǒyǒu zérèn.',en:"He is willing to shoulder all responsibility."}},
  {id:'4-595',zh:'迫使',py:'pòshǐ',en:"to force / to compel",ex:{zh:'困难迫使他做出改变。',py:'Kùnnan pòshǐ tā zuòchū gǎibiàn.',en:"Difficulty forced him to make changes."}},
  {id:'4-596',zh:'吸收',py:'xīshōu',en:"to absorb / to assimilate",ex:{zh:'要积极吸收新知识。',py:'Yào jījí xīshōu xīn zhīshì.',en:"You must actively absorb new knowledge."}},
  {id:'4-597',zh:'展览',py:'zhǎnlǎn',en:"exhibition / to exhibit",ex:{zh:'博物馆正在举办艺术展览。',py:'Bówùguǎn zhèngzài jǔbàn yìshù zhǎnlǎn.',en:"The museum is holding an art exhibition."}},
  {id:'4-598',zh:'遵循',py:'zūnxún',en:"to follow / to abide by",ex:{zh:'做事要遵循规律。',py:'Zuòshì yào zūnxún guīlǜ.',en:"You must follow the rules in everything you do."}},
  {id:'4-599',zh:'充满',py:'chōngmǎn',en:"full of / filled with",ex:{zh:'他充满了自信。',py:'Tā chōngmǎnle zìxìn.',en:"He is filled with confidence."}},
  {id:'4-600',zh:'包含',py:'bāohán',en:"to contain / to include",ex:{zh:'这本书包含了很多有用的信息。',py:'Zhè běn shū bāohánle hěn duō yǒuyòng de xìnxī.',en:"This book contains a lot of useful information."}},
],grammar:[
  {title:'不管...都',pattern:'不管 + condition + 都/也 + result',explain:'Means "no matter... always". Used to show a result is constant regardless of conditions.',examples:[{zh:'不管多忙，他都会回家吃饭。',en:"No matter how busy, he always comes home to eat."},{zh:'不管天气怎样，我都要去。',en:"No matter what the weather is like, I will go."}]},
  {title:'只有...才',pattern:'只有 + condition + 才 + result',explain:'Means "only if... then". Emphasizes that the condition is the ONLY way to get the result.',examples:[{zh:'只有努力，才能成功。',en:"Only through hard work can one succeed."},{zh:'只有你来，我才放心。',en:"Only when you come will I feel at ease."}]},
  {title:'既然...就',pattern:'既然 + known fact + 就 + conclusion',explain:'Means "since... then". Used when drawing a logical conclusion from an established fact.',examples:[{zh:'既然你同意，我们就开始吧。',en:"Since you agree, let us begin."},{zh:'既然已经来了，就好好玩吧。',en:"Since you are already here, enjoy yourself."}]},
  {title:'宁可...也不',pattern:'宁可 + accepted option + 也不 + rejected option',explain:'Means "would rather... than". Shows a preference for one undesirable option over another.',examples:[{zh:'宁可站着死，也不跪着生。',en:"Would rather die standing than live kneeling."},{zh:'我宁可少睡，也不能不学习。',en:"I would rather sleep less than not study."}]},
  {title:'越来越',pattern:'越来越 + adjective/verb',explain:'Means "more and more". Shows a gradual increase or change.',examples:[{zh:'他的中文越来越好了。',en:"His Chinese is getting better and better."},{zh:'天气越来越冷了。',en:"The weather is getting colder and colder."}]},
  {title:'越...越',pattern:'越 + A + 越 + B',explain:'Means "the more A, the more B". Shows two things increasing together.',examples:[{zh:'越努力，越成功。',en:"The harder you work, the more successful you are."},{zh:'他越说越兴奋。',en:"The more he talked the more excited he got."}]},
  {title:'尽管...还是',pattern:'尽管 + obstacle + 还是 + action',explain:'Means "despite/although... still". Shows an action continues despite difficulties.',examples:[{zh:'尽管很难，他还是坚持了。',en:"Despite the difficulty, he still persisted."},{zh:'尽管下雨，他还是来了。',en:"Despite the rain, he still came."}]},
  {title:'不是...而是',pattern:'不是 + wrong interpretation + 而是 + correct one',explain:'Means "not... but rather". Used to correct a misconception or clarify.',examples:[{zh:'他不是不想去，而是没时间。',en:"He doesn't not want to go, but rather has no time."},{zh:'问题不是钱，而是态度。',en:"The issue is not money but attitude."}]},
  {title:'对...来说',pattern:'对 + person/group + 来说',explain:'Means "for... / from the perspective of...". Used to introduce a viewpoint.',examples:[{zh:'对学生来说，学习是最重要的。',en:"For students, studying is the most important thing."},{zh:'对我来说，健康比金钱重要。',en:"For me, health is more important than money."}]},
  {title:'由于...因此',pattern:'由于 + cause + 因此/所以 + result',explain:'Means "due to... therefore". A formal way to express cause and effect.',examples:[{zh:'由于天气原因，比赛取消了。',en:"Due to weather conditions, the match was cancelled."},{zh:'由于努力学习，他考了第一名。',en:"Due to studying hard, he came first in the exam."}]},
  {title:'一旦...就',pattern:'一旦 + condition + 就 + result',explain:'Means "once/as soon as... then". Signals that a result follows immediately from a condition.',examples:[{zh:'一旦开始，就不能停下来。',en:"Once you start, you cannot stop."},{zh:'一旦下决心，就要坚持。',en:"Once you make up your mind, you must persist."}]},
  {title:'与其...不如',pattern:'与其 + less preferred + 不如 + more preferred',explain:'Means "rather than A, it is better to B". Used to compare options and recommend one.',examples:[{zh:'与其抱怨，不如行动。',en:"Rather than complaining, it is better to take action."},{zh:'与其等待，不如主动出击。',en:"Rather than waiting, it is better to take the initiative."}]},
]},

5:{words:[
  {id:'5-1',zh:'折腾',py:'zhēteng',en:"to toss about repeatedly",ex:{zh:'别折腾了，快睡觉。',py:'Bié zhēteng le, kuài shuìjiào.',en:"Stop fussing, go to sleep."}},
  {id:'5-2',zh:'斟酌',py:'zhēnzhuó',en:"to deliberate carefully",ex:{zh:'这个方案需要仔细斟酌。',py:'Zhège fāngàn xūyào zǐxì zhēnzhuó.',en:"This plan needs careful deliberation."}},

  {id:'5-1',zh:'哀悼',py:'āidào',en:"to mourn / to grieve",ex:{zh:'全国人民哀悼这位伟大的科学家。',py:'Quánguó rénmín āidào zhè wèi wěidà de kēxuéjiā.',en:"The whole nation mourned this great scientist."}},
  {id:'5-2',zh:'暧昧',py:'àimèi',en:"ambiguous / vague / equivocal",ex:{zh:'他的回答很暧昧，让人搞不清楚。',py:'Tā de huídá hěn àimèi, ràng rén gǎo bù qīngchǔ.',en:"His answer was ambiguous and hard to understand."}},
  {id:'5-3',zh:'安慰',py:'ānwèi',en:"to comfort / consolation",ex:{zh:'朋友的话给了我很大安慰。',py:'Péngyǒu de huà gěile wǒ hěn dà ānwèi.',en:"My friend's words gave me great comfort."}},
  {id:'5-4',zh:'岸',py:'àn',en:"shore / bank / coast",ex:{zh:'他站在河岸边眺望远方。',py:'Tā zhàn zài hé àn biān tiàowàng yuǎnfāng.',en:"He stood on the riverbank gazing into the distance."}},
  {id:'5-5',zh:'案件',py:'ànjiàn',en:"case / legal case",ex:{zh:'这个案件非常复杂。',py:'Zhège ànjiàn fēicháng fùzá.',en:"This case is very complex."}},
  {id:'5-6',zh:'昂贵',py:'ángguì',en:"expensive / costly",ex:{zh:'这件珠宝十分昂贵。',py:'Zhè jiàn zhūbǎo shífēn ángguì.',en:"This piece of jewelry is very expensive."}},
  {id:'5-7',zh:'熬',py:'áo',en:"to endure / to boil slowly",ex:{zh:'他熬了一整夜完成报告。',py:'Tā áole yī zhěng yè wánchéng bàogào.',en:"He stayed up all night to finish the report."}},
  {id:'5-8',zh:'把握',py:'bǎwò',en:"certainty / to grasp firmly",ex:{zh:'他对这次考试很有把握。',py:'Tā duì zhè cì kǎoshì hěn yǒu bǎwò.',en:"He is very confident about this exam."}},
  {id:'5-9',zh:'拜访',py:'bàifǎng',en:"to visit / to call on",ex:{zh:'他去拜访了恩师。',py:'Tā qù bàifǎngle ēnshī.',en:"He went to visit his mentor."}},
  {id:'5-10',zh:'颁布',py:'bānbù',en:"to promulgate / to issue",ex:{zh:'政府颁布了新政策。',py:'Zhèngfǔ bānbùle xīn zhèngcè.',en:"The government promulgated a new policy."}},
  {id:'5-11',zh:'包含',py:'bāohán',en:"to contain / to include",ex:{zh:'这个概念包含了多层含义。',py:'Zhège gàiniàn bāohánle duō céng hányì.',en:"This concept contains multiple layers of meaning."}},
  {id:'5-12',zh:'报酬',py:'bàochou',en:"remuneration / reward / pay",ex:{zh:'他的工作报酬很高。',py:'Tā de gōngzuò bàochou hěn gāo.',en:"His work remuneration is very high."}},
  {id:'5-13',zh:'悲剧',py:'bēijù',en:"tragedy",ex:{zh:'这部电影是一个悲剧。',py:'Zhè bù diànyǐng shì yīgè bēijù.',en:"This film is a tragedy."}},
  {id:'5-14',zh:'本能',py:'běnnéng',en:"instinct / natural ability",ex:{zh:'自我保护是一种本能。',py:'Zìwǒ bǎohù shì yī zhǒng běnnéng.',en:"Self-protection is an instinct."}},
  {id:'5-15',zh:'必要',py:'bìyào',en:"necessary / essential",ex:{zh:'这是必要的措施。',py:'Zhè shì bìyào de cuòshī.',en:"This is a necessary measure."}},
  {id:'5-16',zh:'彼此',py:'bǐcǐ',en:"each other / one another",ex:{zh:'他们彼此了解很深。',py:'Tāmen bǐcǐ liǎojiě hěn shēn.',en:"They understand each other very deeply."}},
  {id:'5-17',zh:'毕竟',py:'bìjìng',en:"after all / in the end",ex:{zh:'毕竟他是你的父亲。',py:'Bìjìng tā shì nǐ de fùqīn.',en:"After all, he is your father."}},
  {id:'5-18',zh:'辨别',py:'biànbié',en:"to distinguish / to differentiate",ex:{zh:'要辨别真假信息。',py:'Yào biànbié zhēn jiǎ xìnxī.',en:"You must distinguish between true and false information."}},
  {id:'5-19',zh:'辩解',py:'biànjié',en:"to justify / to make excuses",ex:{zh:'他为自己的行为辩解。',py:'Tā wèi zìjǐ de xíngwéi biànjié.',en:"He justified his behavior."}},
  {id:'5-20',zh:'标志',py:'biāozhì',en:"symbol / sign / landmark",ex:{zh:'长城是中国的重要标志。',py:'Chángchéng shì Zhōngguó de zhòngyào biāozhì.',en:"The Great Wall is an important symbol of China."}},
  {id:'5-21',zh:'波动',py:'bōdòng',en:"to fluctuate / fluctuation",ex:{zh:'股市价格波动很大。',py:'Gǔshì jiàgé bōdòng hěn dà.',en:"Stock market prices fluctuate greatly."}},
  {id:'5-22',zh:'博览会',py:'bólǎnhuì',en:"exposition / trade fair",ex:{zh:'他参加了国际博览会。',py:'Tā cānjiāle guójì bólǎnhuì.',en:"He attended the international exposition."}},
  {id:'5-23',zh:'不得不',py:'bùdébù',en:"have no choice but to",ex:{zh:'他不得不接受这个决定。',py:'Tā bùdébù jiēshòu zhège juédìng.',en:"He had no choice but to accept this decision."}},
  {id:'5-24',zh:'不顾',py:'bùgù',en:"to disregard / regardless of",ex:{zh:'他不顾危险，勇敢前进。',py:'Tā bùgù wēixiǎn, yǒnggǎn qiánjìn.',en:"He disregarded the danger and pressed forward bravely."}},
  {id:'5-25',zh:'不惜',py:'bùxī',en:"to not hesitate / regardless of cost",ex:{zh:'他不惜一切代价完成任务。',py:'Tā bùxī yīqiē dàijià wánchéng rènwù.',en:"He completed the task regardless of the cost."}},
  {id:'5-26',zh:'才干',py:'cáigàn',en:"talent / ability / capability",ex:{zh:'他有出色的管理才干。',py:'Tā yǒu chūsè de guǎnlǐ cáigàn.',en:"He has outstanding management talent."}},
  {id:'5-27',zh:'残酷',py:'cánkù',en:"cruel / brutal / ruthless",ex:{zh:'战争是残酷的。',py:'Zhànzhēng shì cánkù de.',en:"War is brutal."}},
  {id:'5-28',zh:'层面',py:'céngmiàn',en:"level / aspect / dimension",ex:{zh:'要从多个层面分析这个问题。',py:'Yào cóng duō gè céngmiàn fēnxī zhège wèntí.',en:"You must analyze this problem from multiple dimensions."}},
  {id:'5-29',zh:'阐述',py:'chǎnshù',en:"to expound / to elaborate",ex:{zh:'他详细阐述了自己的观点。',py:'Tā xiángxì chǎnshùle zìjǐ de guāndiǎn.',en:"He elaborated his viewpoint in detail."}},
  {id:'5-30',zh:'常识',py:'chángshí',en:"common sense / general knowledge",ex:{zh:'这是一个基本常识问题。',py:'Zhè shì yīgè jīběn chángshí wèntí.',en:"This is a basic common sense question."}},
  {id:'5-31',zh:'嘲笑',py:'cháoxiào',en:"to mock / to ridicule",ex:{zh:'不应该嘲笑别人的缺点。',py:'Bù yīnggāi cháoxiào biéren de quēdiǎn.',en:"You should not mock others' shortcomings."}},
  {id:'5-32',zh:'彻底',py:'chèdǐ',en:"thorough / complete",ex:{zh:'这个问题被彻底解决了。',py:'Zhège wèntí bèi chèdǐ jiějué le.',en:"This problem has been thoroughly resolved."}},
  {id:'5-33',zh:'沉默',py:'chénmò',en:"silence / to be silent",ex:{zh:'他沉默了很长时间后才开口。',py:'Tā chénmòle hěn cháng shíjiān hòu cái kāikǒu.',en:"He was silent for a long time before speaking."}},
  {id:'5-34',zh:'沉重',py:'chénzhòng',en:"heavy / grave / deep",ex:{zh:'他心情沉重地离开了会场。',py:'Tā xīnqíng chénzhòng de líkāile huìchǎng.',en:"He left the venue with a heavy heart."}},
  {id:'5-35',zh:'承受',py:'chéngshòu',en:"to bear / to endure / to withstand",ex:{zh:'他承受了巨大的压力。',py:'Tā chéngshòule jùdà de yālì.',en:"He endured enormous pressure."}},
  {id:'5-36',zh:'驰名',py:'chímíng',en:"famous / renowned",ex:{zh:'这是一家驰名中外的餐厅。',py:'Zhè shì yī jiā chímíng zhōngwài de cāntīng.',en:"This is a restaurant famous both in China and abroad."}},
  {id:'5-37',zh:'持续',py:'chíxù',en:"to continue / to persist / sustained",ex:{zh:'经济持续增长。',py:'Jīngjì chíxù zēngzhǎng.',en:"The economy continues to grow."}},
  {id:'5-38',zh:'充足',py:'chōngzú',en:"sufficient / ample / adequate",ex:{zh:'我们有充足的时间准备。',py:'Wǒmen yǒu chōngzú de shíjiān zhǔnbèi.',en:"We have sufficient time to prepare."}},
  {id:'5-39',zh:'崇拜',py:'chóngbài',en:"to worship / to adore",ex:{zh:'年轻人崇拜偶像。',py:'Niánqīngrén chóngbài ǒuxiàng.',en:"Young people worship their idols."}},
  {id:'5-40',zh:'抽象',py:'chōuxiàng',en:"abstract",ex:{zh:'这个概念很抽象。',py:'Zhège gàiniàn hěn chōuxiàng.',en:"This concept is very abstract."}},
  {id:'5-41',zh:'触动',py:'chùdòng',en:"to touch / to move emotionally",ex:{zh:'这个故事深深地触动了我。',py:'Zhège gùshi shēnshēn de chùdòngle wǒ.',en:"This story deeply touched me."}},
  {id:'5-42',zh:'粗心',py:'cūxīn',en:"careless / negligent",ex:{zh:'他太粗心了，总是出错。',py:'Tā tài cūxīn le, zǒngshì chū cuò.',en:"He is too careless and always makes mistakes."}},
  {id:'5-43',zh:'促进',py:'cùjìn',en:"to promote / to accelerate",ex:{zh:'这项政策促进了经济发展。',py:'Zhè xiàng zhèngcè cùjìnle jīngjì fāzhǎn.',en:"This policy promoted economic development."}},
  {id:'5-44',zh:'催促',py:'cuīcù',en:"to urge / to press",ex:{zh:'他催促大家快点完成任务。',py:'Tā cuīcù dàjiā kuài diǎn wánchéng rènwù.',en:"He urged everyone to finish the task quickly."}},
  {id:'5-45',zh:'存在',py:'cúnzài',en:"to exist / existence",ex:{zh:'问题依然存在。',py:'Wèntí yīrán cúnzài.',en:"The problem still exists."}},
  {id:'5-46',zh:'大纲',py:'dàgāng',en:"outline / syllabus",ex:{zh:'老师提供了课程大纲。',py:'Lǎoshī tígōngle kèchéng dàgāng.',en:"The teacher provided the course syllabus."}},
  {id:'5-47',zh:'代价',py:'dàijià',en:"cost / price / sacrifice",ex:{zh:'成功是有代价的。',py:'Chénggōng shì yǒu dàijià de.',en:"Success comes at a cost."}},
  {id:'5-48',zh:'诞生',py:'dànshēng',en:"to be born / to come into being",ex:{zh:'新中国于1949年诞生。',py:'Xīn Zhōngguó yú 1949 nián dànshēng.',en:"New China was born in 1949."}},
  {id:'5-49',zh:'当局',py:'dāngjú',en:"the authorities / the administration",ex:{zh:'当局正在处理此事。',py:'Dāngjú zhèngzài chǔlǐ cǐ shì.',en:"The authorities are handling this matter."}},
  {id:'5-50',zh:'当务之急',py:'dāng wù zhī jí',en:"the most pressing matter / top priority",ex:{zh:'当务之急是解决就业问题。',py:'Dāng wù zhī jí shì jiějué jiùyè wèntí.',en:"The most pressing matter is to solve the employment problem."}},
  {id:'5-51',zh:'导向',py:'dǎoxiàng',en:"guidance / orientation / direction",ex:{zh:'舆论导向非常重要。',py:'Yúlùn dǎoxiàng fēicháng zhòngyào.',en:"Public opinion guidance is very important."}},
  {id:'5-52',zh:'德才兼备',py:'dé cái jiān bèi',en:"both virtuous and talented",ex:{zh:'我们需要德才兼备的人才。',py:'Wǒmen xūyào dé cái jiān bèi de réncái.',en:"We need people who are both virtuous and talented."}},
  {id:'5-53',zh:'的确',py:'díquè',en:"indeed / truly / certainly",ex:{zh:'他的确是一位出色的领导者。',py:'Tā díquè shì yī wèi chūsè de lǐngdǎo zhě.',en:"He is indeed an outstanding leader."}},
  {id:'5-54',zh:'抵触',py:'dǐchù',en:"to conflict / to resist / contradiction",ex:{zh:'他的观点与主流意见相抵触。',py:'Tā de guāndiǎn yǔ zhǔliú yìjiàn xiāng dǐchù.',en:"His viewpoint conflicts with mainstream opinion."}},
  {id:'5-55',zh:'抵制',py:'dǐzhì',en:"to boycott / to resist",ex:{zh:'他们抵制了不正当竞争。',py:'Tāmen dǐzhìle bù zhèngdàng jìngzhēng.',en:"They boycotted unfair competition."}},
  {id:'5-56',zh:'缔结',py:'dìjié',en:"to conclude / to form (an alliance)",ex:{zh:'两国缔结了友好协议。',py:'Liǎng guó dìjiéle yǒuhǎo xiéyì.',en:"The two countries concluded a friendship agreement."}},
  {id:'5-57',zh:'颠覆',py:'diānfù',en:"to overturn / to subvert",ex:{zh:'新技术颠覆了传统行业。',py:'Xīn jìshù diānfùle chuántǒng hángyè.',en:"New technology has overturned traditional industries."}},
  {id:'5-58',zh:'调动',py:'diàodòng',en:"to mobilize / to transfer / to arouse",ex:{zh:'要调动大家的积极性。',py:'Yào diàodòng dàjiā de jījíxìng.',en:"You must mobilize everyone's enthusiasm."}},
  {id:'5-59',zh:'鼎盛',py:'dǐngshèng',en:"at the peak / flourishing",ex:{zh:'唐朝是中国历史上的鼎盛时期。',py:'Táng cháo shì Zhōngguó lìshǐ shàng de dǐngshèng shíqī.',en:"The Tang Dynasty was a flourishing period in Chinese history."}},
  {id:'5-60',zh:'动摇',py:'dòngyáo',en:"to shake / to waver / to vacillate",ex:{zh:'他的信念从未动摇过。',py:'Tā de xìnniàn cóng wèi dòngyáo guò.',en:"His conviction has never wavered."}},
  {id:'5-61',zh:'堕落',py:'duòluò',en:"to degenerate / to fall morally",ex:{zh:'要防止道德堕落。',py:'Yào fángzhǐ dàodé duòluò.',en:"Moral degeneration must be prevented."}},
  {id:'5-62',zh:'发觉',py:'fājué',en:"to discover / to find out",ex:{zh:'他发觉自己犯了一个错误。',py:'Tā fājué zìjǐ fànle yīgè cuòwù.',en:"He discovered that he had made a mistake."}},
  {id:'5-63',zh:'发扬',py:'fāyáng',en:"to carry forward / to develop",ex:{zh:'要发扬艰苦奋斗的精神。',py:'Yào fāyáng jiānkǔ fèndòu de jīngshén.',en:"You must carry forward the spirit of hard struggle."}},
  {id:'5-64',zh:'繁荣',py:'fánróng',en:"prosperous / thriving / flourishing",ex:{zh:'经济繁荣是国家强大的基础。',py:'Jīngjì fánróng shì guójiā qiángdà de jīchǔ.',en:"Economic prosperity is the foundation of national strength."}},
  {id:'5-65',zh:'反驳',py:'fǎnbó',en:"to refute / to rebut",ex:{zh:'他有力地反驳了对方的论点。',py:'Tā yǒulì de fǎnbóle duìfāng de lùndiǎn.',en:"He forcefully refuted the other party's argument."}},
  {id:'5-66',zh:'反思',py:'fǎnsī',en:"to reflect / to rethink",ex:{zh:'我们需要认真反思这次失败。',py:'Wǒmen xūyào rènzhēn fǎnsī zhè cì shībài.',en:"We need to seriously reflect on this failure."}},
  {id:'5-67',zh:'防范',py:'fánfàn',en:"to guard against / to take precautions",ex:{zh:'要防范各种风险。',py:'Yào fánfàn gèzhǒng fēngxiǎn.',en:"You must guard against all kinds of risks."}},
  {id:'5-68',zh:'放纵',py:'fàngzòng',en:"to indulge / to let loose",ex:{zh:'不能放纵自己的坏习惯。',py:'Bùnéng fàngzòng zìjǐ de huài xíguàn.',en:"You must not indulge your bad habits."}},
  {id:'5-69',zh:'奋斗',py:'fèndòu',en:"to struggle / to strive / to fight",ex:{zh:'为梦想奋斗，永不放弃。',py:'Wèi mèngxiǎng fèndòu, yǒng bù fàngqì.',en:"Strive for your dreams and never give up."}},
  {id:'5-70',zh:'丰厚',py:'fēnghòu',en:"generous / substantial / rich",ex:{zh:'他获得了丰厚的回报。',py:'Tā huòdéle fēnghòu de huíbào.',en:"He received generous returns."}},
  {id:'5-71',zh:'否则',py:'fǒuzé',en:"otherwise / or else",ex:{zh:'你必须努力，否则会失败。',py:'Nǐ bìxū nǔlì, fǒuzé huì shībài.',en:"You must work hard, otherwise you will fail."}},
  {id:'5-72',zh:'赋予',py:'fùyǔ',en:"to endow with / to give",ex:{zh:'教育赋予人改变命运的力量。',py:'Jiàoyù fùyǔ rén gǎibiàn mìngyùn de lìliàng.',en:"Education endows people with the power to change their fate."}},
  {id:'5-73',zh:'改良',py:'gǎiliáng',en:"to improve / to reform",ex:{zh:'他们改良了生产工艺。',py:'Tāmen gǎiliángle shēngchǎn gōngyì.',en:"They improved the production process."}},
  {id:'5-74',zh:'干扰',py:'gānrǎo',en:"to interfere / to disturb",ex:{zh:'不要干扰别人的工作。',py:'Bùyào gānrǎo biéren de gōngzuò.',en:"Don't interfere with others' work."}},
  {id:'5-75',zh:'刚毅',py:'gāngyì',en:"firm / resolute / unyielding",ex:{zh:'他性格刚毅，从不屈服。',py:'Tā xìnggé gāngyì, cóng bù qūfú.',en:"He has a resolute character and never submits."}},
  {id:'5-76',zh:'高超',py:'gāochāo',en:"superb / highly skilled",ex:{zh:'他的技术十分高超。',py:'Tā de jìshù shífēn gāochāo.',en:"His skills are superb."}},
  {id:'5-77',zh:'高尚',py:'gāoshàng',en:"noble / lofty / morally elevated",ex:{zh:'他有高尚的品格。',py:'Tā yǒu gāoshàng de pǐngé.',en:"He has a noble character."}},
  {id:'5-78',zh:'格局',py:'géjú',en:"pattern / structure / mindset",ex:{zh:'要有大格局，才能成大事。',py:'Yào yǒu dà géjú, cái néng chéng dà shì.',en:"You must have a broad mindset to achieve great things."}},
  {id:'5-79',zh:'根深蒂固',py:'gēn shēn dì gù',en:"deep-rooted / ingrained",ex:{zh:'这种观念已经根深蒂固了。',py:'Zhè zhǒng guānniàn yǐjīng gēn shēn dì gù le.',en:"This concept has become deep-rooted."}},
  {id:'5-80',zh:'功绩',py:'gōngjì',en:"achievement / merit / contribution",ex:{zh:'他对国家有很大的功绩。',py:'Tā duì guójiā yǒu hěn dà de gōngjì.',en:"He has made great contributions to the country."}},
  {id:'5-81',zh:'公认',py:'gōngrèn',en:"universally acknowledged / generally recognized",ex:{zh:'他是公认的专家。',py:'Tā shì gōngrèn de zhuānjiā.',en:"He is a universally acknowledged expert."}},
  {id:'5-82',zh:'贡献',py:'gòngxiàn',en:"contribution / to contribute",ex:{zh:'他为社会做出了重大贡献。',py:'Tā wèi shèhuì zuòchūle zhòngdà gòngxiàn.',en:"He made significant contributions to society."}},
  {id:'5-83',zh:'构建',py:'gòujiàn',en:"to build / to construct / to establish",ex:{zh:'我们要构建和谐社会。',py:'Wǒmen yào gòujiàn héxié shèhuì.',en:"We must build a harmonious society."}},
  {id:'5-84',zh:'孤立',py:'gūlì',en:"isolated / to isolate",ex:{zh:'他感到孤立无援。',py:'Tā gǎndào gūlì wú yuán.',en:"He felt isolated and helpless."}},
  {id:'5-85',zh:'固执',py:'gùzhí',en:"stubborn / obstinate",ex:{zh:'他太固执了，不肯改变主意。',py:'Tā tài gùzhí le, bù kěn gǎibiàn zhǔyì.',en:"He is too stubborn and refuses to change his mind."}},
  {id:'5-86',zh:'归纳',py:'guīnà',en:"to summarize / to generalize / induction",ex:{zh:'请归纳一下主要观点。',py:'Qǐng guīnà yīxià zhǔyào guāndiǎn.',en:"Please summarize the main points."}},
  {id:'5-87',zh:'规范',py:'guīfàn',en:"norm / standard / to standardize",ex:{zh:'要规范市场行为。',py:'Yào guīfàn shìchǎng xíngwéi.',en:"Market behavior must be standardized."}},
  {id:'5-88',zh:'过渡',py:'guòdù',en:"transition / to transition",ex:{zh:'社会正处于过渡期。',py:'Shèhuì zhèng chǔyú guòdù qī.',en:"Society is in a transitional period."}},
  {id:'5-89',zh:'含糊',py:'hánhu',en:"vague / ambiguous / unclear",ex:{zh:'他的解释含糊其辞。',py:'Tā de jiěshì hánhu qící.',en:"His explanation was vague and evasive."}},
  {id:'5-90',zh:'和谐',py:'héxié',en:"harmonious / harmoniously",ex:{zh:'构建和谐社会是重要目标。',py:'Gòujiàn héxié shèhuì shì zhòngyào mùbiāo.',en:"Building a harmonious society is an important goal."}},
  {id:'5-91',zh:'宏观',py:'hóngguān',en:"macro / macroscopic",ex:{zh:'要从宏观角度分析问题。',py:'Yào cóng hóngguān jiǎodù fēnxī wèntí.',en:"You must analyze the problem from a macro perspective."}},
  {id:'5-92',zh:'弘扬',py:'hóngyáng',en:"to promote / to carry forward",ex:{zh:'要弘扬中华传统文化。',py:'Yào hóngyáng Zhōnghuá chuántǒng wénhuà.',en:"We must carry forward traditional Chinese culture."}},
  {id:'5-93',zh:'虎头蛇尾',py:'hǔ tóu shé wěi',en:"a fine start but poor finish",ex:{zh:'做事不能虎头蛇尾。',py:'Zuòshì bùnéng hǔ tóu shé wěi.',en:"You cannot have a fine start but poor finish."}},
  {id:'5-94',zh:'回归',py:'huíguī',en:"to return / to revert",ex:{zh:'香港于1997年回归祖国。',py:'Xiānggǎng yú 1997 nián huíguī zǔguó.',en:"Hong Kong returned to the motherland in 1997."}},
  {id:'5-95',zh:'汇聚',py:'huìjù',en:"to converge / to gather",ex:{zh:'各地的人才汇聚于此。',py:'Gèdì de réncái huìjù yú cǐ.',en:"Talented people from all over gather here."}},
  {id:'5-96',zh:'混乱',py:'hùnluàn',en:"chaos / disorder / confused",ex:{zh:'战争带来了社会混乱。',py:'Zhànzhēng dàiláile shèhuì hùnluàn.',en:"War brought social chaos."}},
  {id:'5-97',zh:'积极性',py:'jījíxìng',en:"enthusiasm / initiative / activeness",ex:{zh:'要调动大家的积极性。',py:'Yào diàodòng dàjiā de jījíxìng.',en:"You must arouse everyone's enthusiasm."}},
  {id:'5-98',zh:'激烈',py:'jīliè',en:"intense / fierce / heated",ex:{zh:'比赛竞争十分激烈。',py:'Bǐsài jìngzhēng shífēn jīliè.',en:"The competition is very intense."}},
  {id:'5-99',zh:'极端',py:'jíduān',en:"extreme / extremism",ex:{zh:'不能走极端，要保持平衡。',py:'Bùnéng zǒu jíduān, yào bǎochí pínghéng.',en:"You must not go to extremes, you must maintain balance."}},
  {id:'5-100',zh:'给予',py:'jǐyǔ',en:"to give / to grant / to provide",ex:{zh:'社会给予了他很大支持。',py:'Shèhuì jǐyǔle tā hěn dà zhīchí.',en:"Society gave him great support."}},
  {id:'5-101',zh:'坚定不移',py:'jiāndìng bùyí',en:"firm and unwavering",ex:{zh:'他坚定不移地走在自己的道路上。',py:'Tā jiāndìng bùyí de zǒu zài zìjǐ de dàolù shàng.',en:"He walked on his own path firm and unwavering."}},
  {id:'5-102',zh:'坚实',py:'jiānshí',en:"solid / firm / substantial",ex:{zh:'要打下坚实的基础。',py:'Yào dǎ xià jiānshí de jīchǔ.',en:"You must lay a solid foundation."}},
  {id:'5-103',zh:'兼顾',py:'jiāngù',en:"to take into account both / to balance",ex:{zh:'要兼顾工作和家庭。',py:'Yào jiāngù gōngzuò hé jiātíng.',en:"You must balance work and family."}},
  {id:'5-104',zh:'监督',py:'jiāndū',en:"to supervise / to oversee",ex:{zh:'政府需要监督企业行为。',py:'Zhèngfǔ xūyào jiāndū qǐyè xíngwéi.',en:"The government needs to supervise business conduct."}},
  {id:'5-105',zh:'交融',py:'jiāoróng',en:"to blend / to merge / to fuse",ex:{zh:'东西方文化相互交融。',py:'Dōngxīfāng wénhuà xiānghù jiāoróng.',en:"Eastern and Western cultures blend with each other."}},
  {id:'5-106',zh:'揭示',py:'jiēshì',en:"to reveal / to disclose",ex:{zh:'这项研究揭示了新的规律。',py:'Zhè xiàng yánjiū jiēshìle xīn de guīlǜ.',en:"This research revealed new patterns."}},
  {id:'5-107',zh:'拘束',py:'jūshù',en:"restrained / constrained",ex:{zh:'他在陌生人面前感到很拘束。',py:'Tā zài mòshēngrén miànqián gǎndào hěn jūshù.',en:"He feels constrained in front of strangers."}},
  {id:'5-108',zh:'决策',py:'juécè',en:"decision-making / policy decision",ex:{zh:'领导者要善于做出正确决策。',py:'Lǐngdǎo zhě yào shànyú zuòchū zhèngquè juécè.',en:"Leaders must be good at making correct decisions."}},
  {id:'5-109',zh:'绝对',py:'juéduì',en:"absolute / definitely / unconditional",ex:{zh:'这是绝对正确的。',py:'Zhè shì juéduì zhèngquè de.',en:"This is absolutely correct."}},
  {id:'5-110',zh:'开明',py:'kāimíng',en:"enlightened / open-minded",ex:{zh:'他是一位开明的领导者。',py:'Tā shì yī wèi kāimíng de lǐngdǎo zhě.',en:"He is an enlightened leader."}},
  {id:'5-111',zh:'慷慨',py:'kāngkǎi',en:"generous / magnanimous",ex:{zh:'他慷慨地捐助了慈善机构。',py:'Tā kāngkǎi de juānzhùle císhàn jīgòu.',en:"He generously donated to a charity organization."}},
  {id:'5-112',zh:'克服',py:'kèfú',en:"to overcome / to surmount",ex:{zh:'要克服一切困难。',py:'Yào kèfú yīqiē kùnnan.',en:"You must overcome all difficulties."}},
  {id:'5-113',zh:'空洞',py:'kōngdòng',en:"hollow / empty / devoid of substance",ex:{zh:'他的演讲内容空洞无物。',py:'Tā de yǎnjiǎng nèiróng kōngdòng wúwù.',en:"His speech was hollow and devoid of substance."}},
  {id:'5-114',zh:'口号',py:'kǒuhào',en:"slogan / watchword",ex:{zh:'口号要简洁有力。',py:'Kǒuhào yào jiǎnjié yǒulì.',en:"Slogans should be concise and powerful."}},
  {id:'5-115',zh:'宽广',py:'kuānguǎng',en:"vast / broad / wide",ex:{zh:'他有宽广的胸怀。',py:'Tā yǒu kuānguǎng de xiōnghuái.',en:"He has a vast and broad mind."}},
  {id:'5-116',zh:'扩充',py:'kuòchōng',en:"to expand / to enlarge",ex:{zh:'他们扩充了员工队伍。',py:'Tāmen kuòchōngle yuángōng duìwǔ.',en:"They expanded their workforce."}},
  {id:'5-117',zh:'历程',py:'lìchéng',en:"course / journey / process",ex:{zh:'这段历程让他受益匪浅。',py:'Zhè duàn lìchéng ràng tā shòuyì fěiqiǎn.',en:"This journey benefited him greatly."}},
  {id:'5-118',zh:'历史性',py:'lìshǐxìng',en:"historic / historical",ex:{zh:'这是一次历史性的会议。',py:'Zhè shì yī cì lìshǐxìng de huìyì.',en:"This was a historic meeting."}},
  {id:'5-119',zh:'连贯',py:'liánguàn',en:"coherent / continuous / connected",ex:{zh:'文章要写得连贯流畅。',py:'Wénzhāng yào xiě de liánguàn liúchàng.',en:"Articles should be written coherently and fluently."}},
  {id:'5-120',zh:'灵感',py:'línggǎn',en:"inspiration / creative impulse",ex:{zh:'他从自然中得到了灵感。',py:'Tā cóng zìrán zhōng dédàole línggǎn.',en:"He got his inspiration from nature."}},
  {id:'5-121',zh:'灵魂',py:'línghún',en:"soul / spirit",ex:{zh:'音乐是艺术的灵魂。',py:'Yīnyuè shì yìshù de línghún.',en:"Music is the soul of art."}},
  {id:'5-122',zh:'流露',py:'liúlù',en:"to show / to reveal / to betray",ex:{zh:'他的眼神流露出悲伤。',py:'Tā de yǎnshén liúlùchū bēishāng.',en:"His eyes revealed sadness."}},
  {id:'5-123',zh:'隆重',py:'lóngzhòng',en:"grand / solemn / ceremonious",ex:{zh:'典礼举行得十分隆重。',py:'Diǎnlǐ jǔxíng de shífēn lóngzhòng.',en:"The ceremony was held very grandly."}},
  {id:'5-124',zh:'论断',py:'lùnduàn',en:"judgment / conclusion / assertion",ex:{zh:'他的论断有充分的依据。',py:'Tā de lùnduàn yǒu chōngfèn de yījù.',en:"His conclusion has sufficient basis."}},
  {id:'5-125',zh:'弥漫',py:'mímàn',en:"to pervade / to fill / to spread",ex:{zh:'雾气弥漫在山间。',py:'Wùqì mímàn zài shān jiān.',en:"Mist pervades the mountains."}},
  {id:'5-126',zh:'密切',py:'mìqiē',en:"close / intimate / to monitor closely",ex:{zh:'两国关系密切。',py:'Liǎng guó guānxi mìqiē.',en:"The two countries have a close relationship."}},
  {id:'5-127',zh:'面临',py:'miànlín',en:"to face / to confront",ex:{zh:'我们面临严峻的挑战。',py:'Wǒmen miànlín yánjùn de tiǎozhàn.',en:"We are facing severe challenges."}},
  {id:'5-128',zh:'磨合',py:'móhé',en:"to run in / to coordinate / to adapt",ex:{zh:'新员工需要时间磨合。',py:'Xīn yuángōng xūyào shíjiān móhé.',en:"New employees need time to adapt."}},
  {id:'5-129',zh:'谋求',py:'móuqiú',en:"to seek / to strive for",ex:{zh:'他在谋求新的发展机会。',py:'Tā zài móuqiú xīn de fāzhǎn jīhuì.',en:"He is seeking new development opportunities."}},
  {id:'5-130',zh:'目睹',py:'mùdǔ',en:"to witness / to see firsthand",ex:{zh:'他目睹了整个历史事件。',py:'Tā mùdǔle zhěnggè lìshǐ shìjiàn.',en:"He witnessed the entire historical event."}},
  {id:'5-131',zh:'内涵',py:'nèihán',en:"meaning / connotation / substance",ex:{zh:'这首诗内涵丰富。',py:'Zhè shǒu shī nèihán fēngfù.',en:"This poem is rich in meaning."}},
  {id:'5-132',zh:'能量',py:'néngliàng',en:"energy / strength / power",ex:{zh:'他充满了正能量。',py:'Tā chōngmǎnle zhèng néngliàng.',en:"He is full of positive energy."}},
  {id:'5-133',zh:'宁静',py:'níngjìng',en:"tranquil / peaceful / serene",ex:{zh:'乡村的夜晚十分宁静。',py:'Xiāngcūn de yèwǎn shífēn níngjìng.',en:"The countryside night is very tranquil."}},
  {id:'5-134',zh:'扭转',py:'niǔzhuǎn',en:"to reverse / to turn around",ex:{zh:'他们扭转了不利局面。',py:'Tāmen niǔzhuǎnle bùlì júmiàn.',en:"They reversed the unfavorable situation."}},
  {id:'5-135',zh:'偏见',py:'piānjiàn',en:"prejudice / bias",ex:{zh:'要克服对他人的偏见。',py:'Yào kèfú duì tārén de piānjiàn.',en:"You must overcome prejudice against others."}},
  {id:'5-136',zh:'平稳',py:'píngwěn',en:"smooth / stable / steady",ex:{zh:'飞机平稳降落了。',py:'Fēijī píngwěn jiàngluò le.',en:"The plane landed smoothly."}},
  {id:'5-137',zh:'品德',py:'pǐndé',en:"moral character / virtue",ex:{zh:'品德比才能更重要。',py:'Pǐndé bǐ cáinéng gèng zhòngyào.',en:"Moral character is more important than talent."}},
  {id:'5-138',zh:'朴素',py:'pǔsù',en:"plain / simple / unpretentious",ex:{zh:'他生活朴素，从不铺张。',py:'Tā shēnghuó pǔsù, cóng bù pūzhāng.',en:"He lives simply and never extravagantly."}},
  {id:'5-139',zh:'期望',py:'qīwàng',en:"expectation / hope",ex:{zh:'我们没有辜负大家的期望。',py:'Wǒmen méiyǒu gūfù dàjiā de qīwàng.',en:"We did not let everyone's expectations down."}},
  {id:'5-140',zh:'奇迹',py:'qíjì',en:"miracle / wonder",ex:{zh:'他创造了医学奇迹。',py:'Tā chuàngzàole yīxué qíjì.',en:"He created a medical miracle."}},
  {id:'5-141',zh:'潜力',py:'qiánlì',en:"potential / latent ability",ex:{zh:'他有很大的发展潜力。',py:'Tā yǒu hěn dà de fāzhǎn qiánlì.',en:"He has great development potential."}},
  {id:'5-142',zh:'强制',py:'qiángzhì',en:"to force / to compel / compulsory",ex:{zh:'强制执行这项规定。',py:'Qiángzhì zhíxíng zhè xiàng guīdìng.',en:"This regulation is compulsorily enforced."}},
  {id:'5-143',zh:'切实',py:'qièshí',en:"practical / realistic / effective",ex:{zh:'要提出切实可行的方案。',py:'Yào tíchū qièshí kěxíng de fāngàn.',en:"You must put forward a practical and feasible plan."}},
  {id:'5-144',zh:'侵犯',py:'qīnfàn',en:"to violate / to infringe on",ex:{zh:'侵犯他人权利是违法的。',py:'Qīnfàn tārén quánlì shì wéifǎ de.',en:"Violating others' rights is illegal."}},
  {id:'5-145',zh:'清晰',py:'qīngxī',en:"clear / distinct",ex:{zh:'思路要清晰。',py:'Sīlù yào qīngxī.',en:"Your thinking must be clear."}},
  {id:'5-146',zh:'驱动',py:'qūdòng',en:"to drive / to motivate",ex:{zh:'利益驱动着人们的行为。',py:'Lìyì qūdòngzhe rénmen de xíngwéi.',en:"Interests drive people's behavior."}},
  {id:'5-147',zh:'权威',py:'quánwēi',en:"authority / authoritative",ex:{zh:'他在这个领域很有权威。',py:'Tā zài zhège lǐngyù hěn yǒu quánwēi.',en:"He has great authority in this field."}},
  {id:'5-148',zh:'忍耐',py:'rěnnài',en:"to endure / to be patient",ex:{zh:'面对困难要有忍耐力。',py:'Miànduì kùnnan yào yǒu rěnnài lì.',en:"You must have patience when facing difficulties."}},
  {id:'5-149',zh:'融洽',py:'róngqià',en:"harmonious / congenial",ex:{zh:'他们的关系非常融洽。',py:'Tāmen de guānxi fēicháng róngqià.',en:"Their relationship is very harmonious."}},
  {id:'5-150',zh:'如实',py:'rúshí',en:"truthfully / as it really is",ex:{zh:'他如实反映了情况。',py:'Tā rúshí fǎnyìngle qíngkuàng.',en:"He truthfully reported the situation."}},
  {id:'5-151',zh:'软肋',py:'ruǎnlèi',en:"weak point / Achilles heel",ex:{zh:'这是他的软肋所在。',py:'Zhè shì tā de ruǎnlèi suǒzài.',en:"This is his weak point."}},
  {id:'5-152',zh:'散漫',py:'sǎnmàn',en:"loose / undisciplined / careless",ex:{zh:'他工作散漫，缺乏纪律。',py:'Tā gōngzuò sǎnmàn, quēfá jìlǜ.',en:"He is undisciplined at work and lacks discipline."}},
  {id:'5-153',zh:'深刻',py:'shēnkè',en:"profound / deep",ex:{zh:'这篇文章给我留下了深刻印象。',py:'Zhè piān wénzhāng gěi wǒ liú xià le shēnkè yìnxiàng.',en:"This article left a profound impression on me."}},
  {id:'5-154',zh:'深远',py:'shēnyuǎn',en:"far-reaching / profound",ex:{zh:'这个决定影响深远。',py:'Zhège juédìng yǐngxiǎng shēnyuǎn.',en:"This decision has far-reaching implications."}},
  {id:'5-155',zh:'审视',py:'shěnshì',en:"to examine / to scrutinize",ex:{zh:'要认真审视自己的行为。',py:'Yào rènzhēn shěnshì zìjǐ de xíngwéi.',en:"You must carefully examine your own behavior."}},
  {id:'5-156',zh:'胜利',py:'shènglì',en:"victory / success / to win",ex:{zh:'胜利属于坚持不懈的人。',py:'Shènglì shǔyú jiānchí bù xiè de rén.',en:"Victory belongs to those who persevere."}},
  {id:'5-157',zh:'实质',py:'shízhì',en:"essence / substance / nature",ex:{zh:'要看清事物的实质。',py:'Yào kànqīng shìwù de shízhì.',en:"You must see clearly the essence of things."}},
  {id:'5-158',zh:'使命',py:'shǐmìng',en:"mission / calling",ex:{zh:'他把教育视为自己的使命。',py:'Tā bǎ jiàoyù shì wéi zìjǐ de shǐmìng.',en:"He regards education as his mission."}},
  {id:'5-159',zh:'势力',py:'shìlì',en:"force / power / influence",ex:{zh:'他的政治势力很大。',py:'Tā de zhèngzhì shìlì hěn dà.',en:"His political influence is very great."}},
  {id:'5-160',zh:'顺应',py:'shùnyìng',en:"to conform to / to comply with",ex:{zh:'要顺应时代的发展趋势。',py:'Yào shùnyìng shídài de fāzhǎn qūshì.',en:"You must conform to the development trends of the times."}},
  {id:'5-161',zh:'思潮',py:'sīcháo',en:"ideological trend / school of thought",ex:{zh:'新思潮影响了年轻一代。',py:'Xīn sīcháo yǐngxiǎngle niánqīng yī dài.',en:"New ideological trends influenced the younger generation."}},
  {id:'5-162',zh:'素养',py:'sùyǎng',en:"cultivation / accomplishment / quality",ex:{zh:'良好的文化素养很重要。',py:'Liánghǎo de wénhuà sùyǎng hěn zhòngyào.',en:"Good cultural cultivation is very important."}},
  {id:'5-163',zh:'随机应变',py:'suí jī yìng biàn',en:"to act according to circumstances",ex:{zh:'遇到突发情况要随机应变。',py:'Yùdào tūfā qíngkuàng yào suí jī yìng biàn.',en:"When encountering unexpected situations you must act accordingly."}},
  {id:'5-164',zh:'所在',py:'suǒzài',en:"where something is / location",ex:{zh:'问题的所在还不清楚。',py:'Wèntí de suǒzài hái bù qīngchǔ.',en:"Where the problem lies is not yet clear."}},
  {id:'5-165',zh:'态势',py:'tàishì',en:"situation / posture / state",ex:{zh:'目前的态势对我们有利。',py:'Mùqián de tàishì duì wǒmen yǒulì.',en:"The current situation is favorable to us."}},
  {id:'5-166',zh:'体制',py:'tǐzhì',en:"system / structure / institution",ex:{zh:'要改革现行的管理体制。',py:'Yào gǎigé xiànxíng de guǎnlǐ tǐzhì.',en:"The current management system must be reformed."}},
  {id:'5-167',zh:'天赋',py:'tiānfù',en:"talent / gift / natural endowment",ex:{zh:'她有音乐天赋。',py:'Tā yǒu yīnyuè tiānfù.',en:"She has a natural talent for music."}},
  {id:'5-168',zh:'透彻',py:'tòuchè',en:"thorough / penetrating / incisive",ex:{zh:'他的分析非常透彻。',py:'Tā de fēnxī fēicháng tòuchè.',en:"His analysis is very thorough."}},
  {id:'5-169',zh:'拓展',py:'tuòzhǎn',en:"to expand / to develop / to broaden",ex:{zh:'要拓展自己的视野。',py:'Yào tuòzhǎn zìjǐ de shìyě.',en:"You must broaden your horizons."}},
  {id:'5-170',zh:'完善',py:'wánshàn',en:"to perfect / to improve",ex:{zh:'不断完善自己是成功的关键。',py:'Bùduàn wánshàn zìjǐ shì chénggōng de guānjiàn.',en:"Constantly improving oneself is the key to success."}},
  {id:'5-171',zh:'微妙',py:'wēimiào',en:"subtle / delicate / intricate",ex:{zh:'两者之间的关系很微妙。',py:'Liǎng zhě zhī jiān de guānxi hěn wēimiào.',en:"The relationship between the two is very subtle."}},
  {id:'5-172',zh:'维持',py:'wéichí',en:"to maintain / to keep / to sustain",ex:{zh:'要维持良好的生活习惯。',py:'Yào wéichí liánghǎo de shēnghuó xíguàn.',en:"You must maintain good living habits."}},
  {id:'5-173',zh:'文献',py:'wénxiàn',en:"document / literature / reference",ex:{zh:'这项研究参考了大量文献。',py:'Zhè xiàng yánjiū cānkǎole dàliàng wénxiàn.',en:"This research consulted a large number of documents."}},
  {id:'5-174',zh:'稳步',py:'wěnbù',en:"steadily / steadily and surely",ex:{zh:'经济稳步增长。',py:'Jīngjì wěnbù zēngzhǎng.',en:"The economy grows steadily."}},
  {id:'5-175',zh:'无形',py:'wúxíng',en:"invisible / intangible",ex:{zh:'压力是一种无形的负担。',py:'Yālì shì yī zhǒng wúxíng de fùdān.',en:"Pressure is a kind of invisible burden."}},
  {id:'5-176',zh:'无疑',py:'wúyí',en:"without doubt / undoubtedly",ex:{zh:'这无疑是最好的解决方案。',py:'Zhè wúyí shì zuì hǎo de jiějué fāngàn.',en:"This is undoubtedly the best solution."}},
  {id:'5-177',zh:'吸纳',py:'xīnà',en:"to absorb / to recruit / to take in",ex:{zh:'公司吸纳了大量新员工。',py:'Gōngsī xīnàle dàliàng xīn yuángōng.',en:"The company absorbed a large number of new employees."}},
  {id:'5-178',zh:'细节',py:'xìjié',en:"detail / particulars",ex:{zh:'成功在于关注细节。',py:'Chénggōng zàiyú guānzhù xìjié.',en:"Success lies in paying attention to details."}},
  {id:'5-179',zh:'现实',py:'xiànshí',en:"reality / realistic / practical",ex:{zh:'理想与现实之间有差距。',py:'Lǐxiǎng yǔ xiànshí zhī jiān yǒu chājù.',en:"There is a gap between ideals and reality."}},
  {id:'5-180',zh:'相辅相成',py:'xiāng fǔ xiāng chéng',en:"to complement each other",ex:{zh:'理论与实践相辅相成。',py:'Lǐlùn yǔ shíjiàn xiāng fǔ xiāng chéng.',en:"Theory and practice complement each other."}},
  {id:'5-181',zh:'消亡',py:'xiāowáng',en:"to die out / to perish / to become extinct",ex:{zh:'这种语言正在逐渐消亡。',py:'Zhè zhǒng yǔyán zhèngzài zhújiàn xiāowáng.',en:"This language is gradually dying out."}},
  {id:'5-182',zh:'宵衣旰食',py:'xiāo yī gàn shí',en:"to work from dawn to dusk",ex:{zh:'他宵衣旰食，为国家奉献。',py:'Tā xiāo yī gàn shí, wèi guójiā fèngxiàn.',en:"He works from dawn to dusk, dedicating himself to the country."}},
  {id:'5-183',zh:'协商',py:'xiéshāng',en:"to consult / to negotiate",ex:{zh:'双方通过协商解决了争端。',py:'Shuāngfāng tōngguò xiéshāng jiějuéle zhēngduān.',en:"Both sides resolved the dispute through negotiation."}},
  {id:'5-184',zh:'心境',py:'xīnjìng',en:"state of mind / mood",ex:{zh:'他保持着平静的心境。',py:'Tā bǎochízhe píngjìng de xīnjìng.',en:"He maintains a calm state of mind."}},
  {id:'5-185',zh:'信任',py:'xìnrèn',en:"trust / confidence",ex:{zh:'信任是合作的基础。',py:'Xìnrèn shì hézuò de jīchǔ.',en:"Trust is the foundation of cooperation."}},
  {id:'5-186',zh:'胸怀',py:'xiōnghuái',en:"breadth of mind / ambition",ex:{zh:'他有宽广的胸怀。',py:'Tā yǒu kuānguǎng de xiōnghuái.',en:"He has a broad mind."}},
  {id:'5-187',zh:'需求',py:'xūqiú',en:"need / demand / requirement",ex:{zh:'满足客户需求是关键。',py:'Mǎnzú kèhù xūqiú shì guānjiàn.',en:"Meeting customer needs is the key."}},
  {id:'5-188',zh:'循序渐进',py:'xún xù jiàn jìn',en:"to follow a prescribed order gradually",ex:{zh:'学习要循序渐进。',py:'Xuéxí yào xún xù jiàn jìn.',en:"Learning should follow a prescribed order gradually."}},
  {id:'5-189',zh:'延伸',py:'yánshēn',en:"to extend / to stretch",ex:{zh:'影响延伸到各个领域。',py:'Yǐngxiǎng yánshēn dào gègè lǐngyù.',en:"The influence extends to all fields."}},
  {id:'5-190',zh:'严峻',py:'yánjùn',en:"severe / grim / stern",ex:{zh:'形势十分严峻。',py:'Xíngshì shífēn yánjùn.',en:"The situation is very severe."}},
  {id:'5-191',zh:'摇篮',py:'yáolán',en:"cradle / birthplace",ex:{zh:'黄河是中华文明的摇篮。',py:'Huánghé shì Zhōnghuá wénmíng de yáolán.',en:"The Yellow River is the cradle of Chinese civilization."}},
  {id:'5-192',zh:'一味',py:'yīwèi',en:"blindly / stubbornly / persistently",ex:{zh:'不能一味追求速度。',py:'Bùnéng yīwèi zhuīqiú sùdù.',en:"You cannot blindly pursue speed."}},
  {id:'5-193',zh:'遗产',py:'yíchǎn',en:"heritage / legacy / inheritance",ex:{zh:'要保护文化遗产。',py:'Yào bǎohù wénhuà yíchǎn.',en:"Cultural heritage must be protected."}},
  {id:'5-194',zh:'异议',py:'yìyì',en:"objection / dissent / disagreement",ex:{zh:'他对这个方案提出了异议。',py:'Tā duì zhège fāngàn tíchūle yìyì.',en:"He raised objections to this plan."}},
  {id:'5-195',zh:'引领',py:'yǐnlǐng',en:"to lead / to guide",ex:{zh:'他引领团队走向成功。',py:'Tā yǐnlǐng tuánduì zǒuxiàng chénggōng.',en:"He led the team toward success."}},
  {id:'5-196',zh:'隐患',py:'yǐnhuàn',en:"hidden danger / potential hazard",ex:{zh:'要消除安全隐患。',py:'Yào xiāochú ānquán yǐnhuàn.',en:"Hidden safety hazards must be eliminated."}},
  {id:'5-197',zh:'迎合',py:'yínghé',en:"to cater to / to pander to",ex:{zh:'不能一味迎合大众口味。',py:'Bùnéng yīwèi yínghé dàzhòng kǒuwèi.',en:"You cannot blindly cater to popular taste."}},
  {id:'5-198',zh:'优化',py:'yōuhuà',en:"to optimize / optimization",ex:{zh:'要不断优化工作流程。',py:'Yào bùduàn yōuhuà gōngzuò liúchéng.',en:"You must constantly optimize the work process."}},
  {id:'5-199',zh:'有据可查',py:'yǒu jù kě chá',en:"verifiable / on record",ex:{zh:'这个事实有据可查。',py:'Zhège shìshí yǒu jù kě chá.',en:"This fact is verifiable on record."}},
  {id:'5-200',zh:'于是乎',py:'yúshìhū',en:"therefore / hence / as a result",ex:{zh:'于是乎，他决定改变策略。',py:'Yúshìhū, tā juédìng gǎibiàn cèlüè.',en:"Therefore, he decided to change his strategy."}},

  {id:'5-201',zh:'预见',py:'yùjiàn',en:"to foresee / to predict",ex:{zh:'他预见到了这个问题。',py:'Tā yùjiàn dào le zhège wèntí.',en:"He foresaw this problem."}},
  {id:'5-202',zh:'寓意',py:'yùyì',en:"implied meaning / moral / lesson",ex:{zh:'这个故事的寓意很深刻。',py:'Zhège gùshi de yùyì hěn shēnkè.',en:"The implied meaning of this story is very profound."}},
  {id:'5-203',zh:'缘由',py:'yuányóu',en:"reason / cause / origin",ex:{zh:'他解释了事情的缘由。',py:'Tā jiěshìle shìqing de yuányóu.',en:"He explained the reason for the matter."}},
  {id:'5-204',zh:'运筹',py:'yùnchóu',en:"to plan and coordinate / to map out",ex:{zh:'他运筹帷幄，指挥若定。',py:'Tā yùnchóu wéiwò, zhǐhuī ruò dìng.',en:"He planned and coordinated, commanding with certainty."}},
  {id:'5-205',zh:'蕴含',py:'yùnhán',en:"to contain / to embody",ex:{zh:'这首诗蕴含着丰富的情感。',py:'Zhè shǒu shī yùnhánzhe fēngfù de qínggǎn.',en:"This poem contains rich emotions."}},
  {id:'5-206',zh:'展望',py:'zhānwàng',en:"to look forward / prospect",ex:{zh:'让我们展望美好的未来。',py:'Ràng wǒmen zhānwàng měihǎo de wèilái.',en:"Let us look forward to a bright future."}},
  {id:'5-207',zh:'折射',py:'zhéshè',en:"to refract / to reflect",ex:{zh:'这个现象折射出深层次的问题。',py:'Zhège xiànxiàng zhéshèchū shēn céngcì de wèntí.',en:"This phenomenon reflects deeper problems."}},
  {id:'5-208',zh:'争议',py:'zhēngyì',en:"controversy / dispute",ex:{zh:'这个问题存在很大争议。',py:'Zhège wèntí cúnzài hěn dà zhēngyì.',en:"There is great controversy about this issue."}},
  {id:'5-209',zh:'征服',py:'zhēngfú',en:"to conquer / to overcome",ex:{zh:'他征服了这座高山。',py:'Tā zhēngfúle zhè zuò gāoshān.',en:"He conquered this mountain."}},
  {id:'5-210',zh:'整顿',py:'zhěngdùn',en:"to rectify / to reorganize",ex:{zh:'政府整顿了市场秩序。',py:'Zhèngfǔ zhěngdùnle shìchǎng zhìxù.',en:"The government rectified market order."}},
  {id:'5-211',zh:'支撑',py:'zhīchēng',en:"to support / to prop up",ex:{zh:'他用双手支撑起了这个家。',py:'Tā yòng shuāng shǒu zhīchēng qǐ le zhège jiā.',en:"He propped up this family with both hands."}},
  {id:'5-212',zh:'至关重要',py:'zhì guān zhòng yào',en:"of vital importance / crucial",ex:{zh:'这个决定至关重要。',py:'Zhège juédìng zhì guān zhòng yào.',en:"This decision is of vital importance."}},
  {id:'5-213',zh:'制约',py:'zhìyuē',en:"to restrict / to constrain",ex:{zh:'资金不足制约了项目发展。',py:'Zījīn bùzú zhìyuēle xiàngmù fāzhǎn.',en:"Insufficient funding constrained the project's development."}},
  {id:'5-214',zh:'忠诚',py:'zhōngchéng',en:"loyal / faithful / devoted",ex:{zh:'他对国家忠诚无比。',py:'Tā duì guójiā zhōngchéng wúbǐ.',en:"He is incomparably loyal to his country."}},
  {id:'5-215',zh:'中肯',py:'zhōngkěn',en:"pertinent / apt / to the point",ex:{zh:'他的意见非常中肯。',py:'Tā de yìjiàn fēicháng zhōngkěn.',en:"His opinion is very pertinent."}},
  {id:'5-216',zh:'周密',py:'zhōumì',en:"thorough / careful / meticulous",ex:{zh:'计划制定得十分周密。',py:'Jìhuà zhìdìng de shífēn zhōumì.',en:"The plan was formulated very meticulously."}},
  {id:'5-217',zh:'逐步',py:'zhúbù',en:"step by step / gradually",ex:{zh:'问题将逐步得到解决。',py:'Wèntí jiāng zhúbù dédào jiějué.',en:"The problem will gradually be resolved."}},
  {id:'5-218',zh:'追究',py:'zhuījiū',en:"to investigate / to look into",ex:{zh:'要追究这次事故的责任。',py:'Yào zhuījiū zhè cì shìgù de zérèn.',en:"The responsibility for this accident must be investigated."}},
  {id:'5-219',zh:'自强',py:'zìqiáng',en:"self-improvement / self-reliance",ex:{zh:'自强不息是中华民族的精神。',py:'Zìqiáng bù xī shì Zhōnghuá mínzú de jīngshén.',en:"Unceasing self-improvement is the spirit of the Chinese people."}},
  {id:'5-220',zh:'综述',py:'zōngshù',en:"overview / summary",ex:{zh:'这篇文章是对该领域的综述。',py:'Zhè piān wénzhāng shì duì gāi lǐngyù de zōngshù.',en:"This article is an overview of the field."}},
  {id:'5-221',zh:'棕色',py:'zōngsè',en:"brown",ex:{zh:'他穿了一件棕色外套。',py:'Tā chuānle yī jiàn zōngsè wàitào.',en:"He wore a brown coat."}},
  {id:'5-222',zh:'尊严',py:'zūnyán',en:"dignity / self-respect",ex:{zh:'每个人都有自己的尊严。',py:'Měi gè rén dōu yǒu zìjǐ de zūnyán.',en:"Everyone has their own dignity."}},
  {id:'5-223',zh:'遵从',py:'zūncóng',en:"to comply with / to follow",ex:{zh:'要遵从道德准则。',py:'Yào zūncóng dàodé zhǔnzé.',en:"You must comply with moral principles."}},
  {id:'5-224',zh:'作息',py:'zuòxī',en:"work and rest / daily routine",ex:{zh:'要养成规律的作息习惯。',py:'Yào yǎngchéng guīlǜ de zuòxī xíguàn.',en:"You must develop a regular work and rest routine."}},
  {id:'5-225',zh:'挫折',py:'cuòzhé',en:"setback / frustration",ex:{zh:'遇到挫折不要气馁。',py:'Yùdào cuòzhé bùyào qìněi.',en:"Don't be discouraged when encountering setbacks."}},
  {id:'5-226',zh:'表彰',py:'biǎozhāng',en:"to commend / to praise publicly",ex:{zh:'他在会上受到了表彰。',py:'Tā zài huì shàng shòudào le biǎozhāng.',en:"He was commended at the meeting."}},
  {id:'5-227',zh:'本着',py:'běnzhe',en:"in accordance with / in the spirit of",ex:{zh:'本着诚信的原则处理事务。',py:'Běnzhe chéngxìn de yuánzé chǔlǐ shìwù.',en:"Handle affairs in accordance with the principle of integrity."}},
  {id:'5-228',zh:'比较而言',py:'bǐjiào ér yán',en:"comparatively speaking / by comparison",ex:{zh:'比较而言，这个方案更可行。',py:'Bǐjiào ér yán, zhège fāngàn gèng kěxíng.',en:"Comparatively speaking, this plan is more feasible."}},
  {id:'5-229',zh:'比喻',py:'bǐyù',en:"metaphor / to use a metaphor",ex:{zh:'他用了一个生动的比喻。',py:'Tā yòngle yīgè shēngdòng de bǐyù.',en:"He used a vivid metaphor."}},
  {id:'5-230',zh:'充沛',py:'chōngpèi',en:"abundant / plentiful / vigorous",ex:{zh:'他精力充沛，干劲十足。',py:'Tā jīnglì chōngpèi, gànjìn shízú.',en:"He is full of energy and enthusiasm."}},
  {id:'5-231',zh:'抽取',py:'chōuqǔ',en:"to extract / to draw out",ex:{zh:'从数据中抽取关键信息。',py:'Cóng shùjù zhōng chōuqǔ guānjiàn xìnxī.',en:"Extract key information from the data."}},
  {id:'5-232',zh:'传承',py:'chuánchéng',en:"to pass on / to inherit and carry forward",ex:{zh:'文化需要一代代传承下去。',py:'Wénhuà xūyào yī dài dài chuánchéng xiàqù.',en:"Culture needs to be passed on from generation to generation."}},
  {id:'5-233',zh:'创新',py:'chuàngxīn',en:"innovation / to innovate",ex:{zh:'创新是推动发展的动力。',py:'Chuàngxīn shì tuīdòng fāzhǎn de dònglì.',en:"Innovation is the driving force of development."}},
  {id:'5-234',zh:'措施',py:'cuòshī',en:"measure / step / action",ex:{zh:'政府采取了有力措施。',py:'Zhèngfǔ cǎiqǔle yǒulì cuòshī.',en:"The government took powerful measures."}},
  {id:'5-235',zh:'大量',py:'dàliàng',en:"a large number / a lot",ex:{zh:'他阅读了大量的书籍。',py:'Tā yuèdúle dàliàng de shūjí.',en:"He read a large number of books."}},
  {id:'5-236',zh:'典范',py:'diǎnfàn',en:"model / paragon / example",ex:{zh:'他是我们学习的典范。',py:'Tā shì wǒmen xuéxí de diǎnfàn.',en:"He is a model for us to learn from."}},
  {id:'5-237',zh:'定义',py:'dìngyì',en:"definition / to define",ex:{zh:'请给这个概念下一个定义。',py:'Qǐng gěi zhège gàiniàn xià yīgè dìngyì.',en:"Please give a definition of this concept."}},
  {id:'5-238',zh:'独到',py:'dúdào',en:"original / unique / distinctive",ex:{zh:'他对问题有独到的见解。',py:'Tā duì wèntí yǒu dúdào de jiànjiě.',en:"He has original insights into the problem."}},
  {id:'5-239',zh:'对策',py:'duìcè',en:"countermeasure / strategy",ex:{zh:'我们需要制定有效的对策。',py:'Wǒmen xūyào zhìdìng yǒuxiào de duìcè.',en:"We need to formulate effective countermeasures."}},
  {id:'5-240',zh:'多元',py:'duōyuán',en:"pluralistic / diverse / multi-dimensional",ex:{zh:'现代社会是多元化的。',py:'Xiàndài shèhuì shì duōyuánhuà de.',en:"Modern society is pluralistic."}},
  {id:'5-241',zh:'发达',py:'fādá',en:"developed / prosperous / advanced",ex:{zh:'发达国家经济水平较高。',py:'Fādá guójiā jīngjì shuǐpíng jiào gāo.',en:"Developed countries have a higher economic level."}},
  {id:'5-242',zh:'反省',py:'fǎnxǐng',en:"to introspect / to examine oneself",ex:{zh:'失败后要认真反省自己。',py:'Shībài hòu yào rènzhēn fǎnxǐng zìjǐ.',en:"After failure you must seriously examine yourself."}},
  {id:'5-243',zh:'分歧',py:'fēnqí',en:"divergence / disagreement / difference",ex:{zh:'双方存在较大分歧。',py:'Shuāngfāng cúnzài jiào dà fēnqí.',en:"There are significant differences between the two sides."}},
  {id:'5-244',zh:'赋能',py:'fùnéng',en:"to empower / empowerment",ex:{zh:'技术赋能传统产业转型。',py:'Jìshù fùnéng chuántǒng chǎnyè zhuǎnxíng.',en:"Technology empowers the transformation of traditional industries."}},
  {id:'5-245',zh:'感染',py:'gǎnrǎn',en:"to infect / to move / to influence",ex:{zh:'他的热情感染了周围的人。',py:'Tā de rèqíng gǎnrǎnle zhōuwéi de rén.',en:"His enthusiasm infected the people around him."}},
  {id:'5-246',zh:'高峰',py:'gāofēng',en:"peak / summit / high point",ex:{zh:'学习要攀登知识的高峰。',py:'Xuéxí yào pāndēng zhīshí de gāofēng.',en:"Learning means climbing to the peak of knowledge."}},
  {id:'5-247',zh:'各界',py:'gèjiè',en:"all walks of life / all circles",ex:{zh:'各界人士出席了会议。',py:'Gèjiè rénshì chūxíle huìyì.',en:"People from all walks of life attended the meeting."}},
  {id:'5-248',zh:'根基',py:'gēnjī',en:"foundation / basis / root",ex:{zh:'教育是社会发展的根基。',py:'Jiàoyù shì shèhuì fāzhǎn de gēnjī.',en:"Education is the foundation of social development."}},
  {id:'5-249',zh:'共识',py:'gòngshí',en:"consensus / common understanding",ex:{zh:'各方达成了共识。',py:'Gèfāng dáchéngle gòngshí.',en:"All parties reached a consensus."}},
  {id:'5-250',zh:'观点',py:'guāndiǎn',en:"viewpoint / perspective / standpoint",ex:{zh:'他的观点很有独创性。',py:'Tā de guāndiǎn hěn yǒu dúchuàngxìng.',en:"His viewpoint is very original."}},
  {id:'5-251',zh:'规律',py:'guīlǜ',en:"law / pattern / regularity",ex:{zh:'要掌握事物发展的规律。',py:'Yào zhǎngwò shìwù fāzhǎn de guīlǜ.',en:"You must grasp the laws of how things develop."}},
  {id:'5-252',zh:'合理',py:'hélǐ',en:"reasonable / rational / justified",ex:{zh:'这个安排很合理。',py:'Zhège ānpái hěn hélǐ.',en:"This arrangement is very reasonable."}},
  {id:'5-253',zh:'宏大',py:'hóngdà',en:"grand / magnificent / great",ex:{zh:'他有宏大的理想和抱负。',py:'Tā yǒu hóngdà de lǐxiǎng hé bàofù.',en:"He has grand ideals and ambitions."}},
  {id:'5-254',zh:'后续',py:'hòuxù',en:"subsequent / follow-up",ex:{zh:'后续工作需要继续跟进。',py:'Hòuxù gōngzuò xūyào jìxù gēnjìn.',en:"Follow-up work needs to continue."}},
  {id:'5-255',zh:'怀抱',py:'huáibào',en:"embrace / to cherish / aspiration",ex:{zh:'他怀抱着伟大的理想。',py:'Tā huáibàozhe wěidà de lǐxiǎng.',en:"He cherishes great ideals."}},
  {id:'5-256',zh:'化解',py:'huàjiě',en:"to dissolve / to resolve / to defuse",ex:{zh:'他成功化解了矛盾。',py:'Tā chénggōng huàjiěle máodùn.',en:"He successfully defused the conflict."}},
  {id:'5-257',zh:'机制',py:'jīzhì',en:"mechanism / system",ex:{zh:'要建立有效的激励机制。',py:'Yào jiànlì yǒuxiào de jīlì jīzhì.',en:"An effective incentive mechanism must be established."}},
  {id:'5-258',zh:'坚守',py:'jiānshǒu',en:"to stick to / to hold fast to",ex:{zh:'要坚守自己的原则。',py:'Yào jiānshǒu zìjǐ de yuánzé.',en:"You must stick to your own principles."}},
  {id:'5-259',zh:'艰辛',py:'jiānxīn',en:"hardship / toil / arduous",ex:{zh:'他经历了许多艰辛。',py:'Tā jīnglìle xǔduō jiānxīn.',en:"He experienced many hardships."}},
  {id:'5-260',zh:'践行',py:'jiànxíng',en:"to practice / to put into practice",ex:{zh:'要践行社会主义核心价值观。',py:'Yào jiànxíng shèhuìzhǔyì héxīn jiàzhíguān.',en:"We must put socialist core values into practice."}},
  {id:'5-261',zh:'角色',py:'juésè',en:"role / character",ex:{zh:'他在这个项目中扮演了重要角色。',py:'Tā zài zhège xiàngmù zhōng bànyǎnle zhòngyào juésè.',en:"He played an important role in this project."}},
  {id:'5-262',zh:'精华',py:'jīnghuá',en:"essence / cream / best part",ex:{zh:'这是中国文化的精华。',py:'Zhè shì Zhōngguó wénhuà de jīnghuá.',en:"This is the essence of Chinese culture."}},
  {id:'5-263',zh:'精通',py:'jīngtōng',en:"to be proficient in / to master",ex:{zh:'他精通多门外语。',py:'Tā jīngtōng duō mén wàiyǔ.',en:"He is proficient in multiple foreign languages."}},
  {id:'5-264',zh:'竞争力',py:'jìngzhēnglì',en:"competitiveness",ex:{zh:'提高核心竞争力很重要。',py:'Tígāo héxīn jìngzhēnglì hěn zhòngyào.',en:"Improving core competitiveness is very important."}},
  {id:'5-265',zh:'开创',py:'kāichuàng',en:"to pioneer / to open up",ex:{zh:'他开创了一个新时代。',py:'Tā kāichuàngle yīgè xīn shídài.',en:"He pioneered a new era."}},
  {id:'5-266',zh:'可行性',py:'kěxíngxìng',en:"feasibility",ex:{zh:'要进行可行性分析。',py:'Yào jìnxíng kěxíngxìng fēnxī.',en:"A feasibility analysis must be conducted."}},
  {id:'5-267',zh:'跨越',py:'kuàyuè',en:"to span / to cross / to transcend",ex:{zh:'科技跨越了时空的界限。',py:'Kējì kuàyuèle shí kōng de jièxiàn.',en:"Technology has transcended the boundaries of time and space."}},
  {id:'5-268',zh:'客观性',py:'kèguānxìng',en:"objectivity",ex:{zh:'科学研究要保持客观性。',py:'Kēxué yánjiū yào bǎochí kèguānxìng.',en:"Scientific research must maintain objectivity."}},
  {id:'5-269',zh:'类别',py:'lèibié',en:"category / type / class",ex:{zh:'请按类别整理资料。',py:'Qǐng àn lèibié zhěnglǐ zīliào.',en:"Please organize the materials by category."}},
  {id:'5-270',zh:'历来',py:'lìlái',en:"always / throughout history",ex:{zh:'他历来认真对待每一件事。',py:'Tā lìlái rènzhēn duìdài měi yī jiàn shì.',en:"He has always dealt with everything seriously."}},
  {id:'5-271',zh:'立足',py:'lìzú',en:"to stand firm / to base oneself on",ex:{zh:'要立足实际，解决问题。',py:'Yào lìzú shíjì, jiějué wèntí.',en:"You must stand firm in reality and solve problems."}},
  {id:'5-272',zh:'连绵',py:'liánmián',en:"continuous / unbroken / stretching",ex:{zh:'连绵的山脉延伸到远方。',py:'Liánmián de shānmài yánshēn dào yuǎnfāng.',en:"The continuous mountain range stretches into the distance."}},
  {id:'5-273',zh:'恋爱',py:'liàn\'ài',en:"romantic love / to be in love",ex:{zh:'他们正在恋爱。',py:"Tāmen zhèngzài liàn'ài.",en:"They are in a romantic relationship."}},
  {id:'5-274',zh:'两极',py:'liǎngjí',en:"the two poles / extremes",ex:{zh:'两极分化是一种社会现象。',py:'Liǎngjí fēnhuà shì yī zhǒng shèhuì xiànxiàng.',en:"Polarization is a social phenomenon."}},
  {id:'5-275',zh:'领会',py:'lǐnghuì',en:"to understand / to comprehend / to grasp",ex:{zh:'他领会了老师的意图。',py:'Tā lǐnghuìle lǎoshī de yìtú.',en:"He grasped the teacher's intention."}},
  {id:'5-276',zh:'论证',py:'lùnzhèng',en:"to demonstrate / argumentation",ex:{zh:'他对这个论点进行了充分论证。',py:'Tā duì zhège lùndiǎn jìnxíngle chōngfèn lùnzhèng.',en:"He fully demonstrated this argument."}},
  {id:'5-277',zh:'漫长',py:'màncháng',en:"long / endless / drawn out",ex:{zh:'通往成功的道路是漫长的。',py:'Tōngwǎng chénggōng de dàolù shì màncháng de.',en:"The road to success is long."}},
  {id:'5-278',zh:'茂盛',py:'màoshèng',en:"luxuriant / lush / thriving",ex:{zh:'园子里的花木茂盛。',py:'Yuánzi lǐ de huāmù màoshèng.',en:"The flowers and trees in the garden are lush."}},
  {id:'5-279',zh:'命运',py:'mìngyùn',en:"fate / destiny",ex:{zh:'要掌握自己的命运。',py:'Yào zhǎngwò zìjǐ de mìngyùn.',en:"You must take control of your own destiny."}},
  {id:'5-280',zh:'默默',py:'mòmò',en:"silently / quietly / without a word",ex:{zh:'他默默地为大家付出。',py:'Tā mòmò de wèi dàjiā fùchū.',en:"He quietly dedicates himself for everyone."}},
  {id:'5-281',zh:'纳入',py:'nàrù',en:"to incorporate into / to bring into",ex:{zh:'这项工作被纳入整体计划。',py:'Zhè xiàng gōngzuò bèi nàrù zhěngtǐ jìhuà.',en:"This work was incorporated into the overall plan."}},
  {id:'5-282',zh:'凝练',py:'nínglíàn',en:"concise and refined / condensed",ex:{zh:'语言要凝练，不要冗长。',py:'Yǔyán yào nínglíàn, bùyào rǒngcháng.',en:"Language should be concise and not verbose."}},
  {id:'5-283',zh:'凝视',py:'níngshì',en:"to gaze at / to stare",ex:{zh:'他凝视着远处的星空。',py:'Tā níngshìzhe yuǎnchù de xīngkōng.',en:"He gazed at the distant starry sky."}},
  {id:'5-284',zh:'培育',py:'péiyù',en:"to cultivate / to nurture / to foster",ex:{zh:'学校培育了一批优秀人才。',py:'Xuéxiào péiyùle yī pī yōuxiù réncái.',en:"The school nurtured a group of outstanding talents."}},
  {id:'5-285',zh:'披荆斩棘',py:'pī jīng zhǎn jí',en:"to brave difficulties and forge ahead",ex:{zh:'他披荆斩棘，终于成功了。',py:'Tā pī jīng zhǎn jí, zhōngyú chénggōng le.',en:"He braved all difficulties and finally succeeded."}},
  {id:'5-286',zh:'平坦',py:'píngtǎn',en:"flat / level / smooth",ex:{zh:'成功的道路不是平坦的。',py:'Chénggōng de dàolù bù shì píngtǎn de.',en:"The road to success is not smooth."}},
  {id:'5-287',zh:'迫不及待',py:'pò bù jí dài',en:"unable to wait / impatient",ex:{zh:'他迫不及待地打开了礼物。',py:'Tā pò bù jí dài de dǎkāile lǐwù.',en:"He impatiently opened the gift."}},
  {id:'5-288',zh:'普及',py:'pǔjí',en:"to popularize / widespread",ex:{zh:'互联网的普及改变了生活。',py:'Hùliánwǎng de pǔjí gǎibiànle shēnghuó.',en:"The spread of the internet changed life."}},
  {id:'5-289',zh:'谦逊',py:'qiānxùn',en:"modest / humble / unpretentious",ex:{zh:'他为人谦逊，从不自大。',py:'Tā wéirén qiānxùn, cóng bù zìdà.',en:"He is humble and never arrogant."}},
  {id:'5-290',zh:'情操',py:'qíngcāo',en:"sentiment / moral integrity",ex:{zh:'高尚的情操是品格的体现。',py:'Gāoshàng de qíngcāo shì pǐngé de tǐxiàn.',en:"Noble moral integrity is a reflection of character."}},
  {id:'5-291',zh:'求知',py:'qiúzhī',en:"to seek knowledge",ex:{zh:'求知欲是学习的源动力。',py:'Qiúzhī yù shì xuéxí de yuán dònglì.',en:"The desire for knowledge is the driving force of learning."}},
  {id:'5-292',zh:'融会贯通',py:'róng huì guān tōng',en:"to achieve mastery through comprehensive study",ex:{zh:'要融会贯通，而不是死记硬背。',py:'Yào róng huì guān tōng, ér bù shì sǐ jì yìng bèi.',en:"You should achieve mastery through understanding, not rote memorization."}},
  {id:'5-293',zh:'深化',py:'shēnhuà',en:"to deepen / to intensify",ex:{zh:'要深化改革开放。',py:'Yào shēnhuà gǎigé kāifàng.',en:"Reform and opening up must be deepened."}},
  {id:'5-294',zh:'深思熟虑',py:'shēn sī shú lǜ',en:"to deliberate carefully / well-considered",ex:{zh:'做决定要深思熟虑。',py:'Zuò juédìng yào shēn sī shú lǜ.',en:"You must deliberate carefully when making decisions."}},
  {id:'5-295',zh:'审慎',py:'shěnshèn',en:"careful / cautious / prudent",ex:{zh:'要对这件事持审慎态度。',py:'Yào duì zhè jiàn shì chí shěnshèn tàidù.',en:"You must take a cautious attitude toward this matter."}},
  {id:'5-296',zh:'生机',py:'shēngjī',en:"vitality / life force",ex:{zh:'春天万物充满生机。',py:'Chūntiān wànwù chōngmǎn shēngjī.',en:"All things in spring are full of vitality."}},
  {id:'5-297',zh:'圣地',py:'shèngdì',en:"holy land / sacred place",ex:{zh:'这里是文化圣地。',py:'Zhèlǐ shì wénhuà shèngdì.',en:"This is a sacred place of culture."}},
  {id:'5-298',zh:'诗意',py:'shīyì',en:"poetic quality / poetic charm",ex:{zh:'这幅画充满了诗意。',py:'Zhè fú huà chōngmǎnle shīyì.',en:"This painting is full of poetic charm."}},
  {id:'5-299',zh:'实证',py:'shízhèng',en:"evidence / empirical proof",ex:{zh:'要用实证说话。',py:'Yào yòng shízhèng shuōhuà.',en:"You must speak with evidence."}},
  {id:'5-300',zh:'世代',py:'shìdài',en:"generation / era / age",ex:{zh:'这段历史影响了几个世代。',py:'Zhè duàn lìshǐ yǐngxiǎngle jǐ gè shìdài.',en:"This period of history influenced several generations."}},
  {id:'5-301',zh:'势不可挡',py:'shì bù kě dǎng',en:"irresistible / unstoppable",ex:{zh:'改革的浪潮势不可挡。',py:'Gǎigé de làngcháo shì bù kě dǎng.',en:"The tide of reform is unstoppable."}},
  {id:'5-302',zh:'首要',py:'shǒuyào',en:"primary / first / foremost",ex:{zh:'学习是我的首要任务。',py:'Xuéxí shì wǒ de shǒuyào rènwù.',en:"Studying is my primary task."}},
  {id:'5-303',zh:'诉说',py:'sùshuō',en:"to tell / to relate / to recount",ex:{zh:'他向朋友诉说了内心的苦恼。',py:'Tā xiàng péngyǒu sùshuōle nèixīn de kǔnǎo.',en:"He told his friends about his inner troubles."}},
  {id:'5-304',zh:'探寻',py:'tànxún',en:"to explore / to seek",ex:{zh:'他不断探寻真理。',py:'Tā bùduàn tànxún zhēnlǐ.',en:"He constantly seeks truth."}},
  {id:'5-305',zh:'特质',py:'tèzhì',en:"unique quality / special characteristic",ex:{zh:'每个人都有自己独特的特质。',py:'Měi gè rén dōu yǒu zìjǐ dútè de tèzhì.',en:"Everyone has their own unique characteristics."}},
  {id:'5-306',zh:'体系',py:'tǐxì',en:"system / framework",ex:{zh:'要建立完整的知识体系。',py:'Yào jiànlì wánzhěng de zhīshí tǐxì.',en:"A complete knowledge framework must be built."}},
  {id:'5-307',zh:'廷伸',py:'tíngshēn',en:"to extend / to elongate",ex:{zh:'道路向远方廷伸。',py:'Dàolù xiàng yuǎnfāng tíngshēn.',en:"The road extends into the distance."}},
  {id:'5-308',zh:'突破',py:'tūpò',en:"breakthrough / to break through",ex:{zh:'科学研究取得了重大突破。',py:'Kēxué yánjiū qǔdéle zhòngdà tūpò.',en:"Scientific research achieved a major breakthrough."}},
  {id:'5-309',zh:'推崇',py:'tuīchóng',en:"to hold in high esteem / to advocate",ex:{zh:'这位学者被后人推崇。',py:'Zhè wèi xuézhě bèi hòurén tuīchóng.',en:"This scholar is held in high esteem by later generations."}},
  {id:'5-310',zh:'脱离',py:'tuōlí',en:"to break away from / to get away from",ex:{zh:'要脱离旧思想的束缚。',py:'Yào tuōlí jiù sīxiǎng de shùfù.',en:"You must break away from the shackles of old thinking."}},
  {id:'5-311',zh:'王道',py:'wángdào',en:"the right path / sound approach",ex:{zh:'努力学习才是王道。',py:'Nǔlì xuéxí cái shì wángdào.',en:"Hard study is the right path."}},
  {id:'5-312',zh:'潜移默化',py:'qián yí mò huà',en:"to imperceptibly influence",ex:{zh:'环境对人有潜移默化的影响。',py:'Huánjìng duì rén yǒu qián yí mò huà de yǐngxiǎng.',en:"The environment has an imperceptible influence on people."}},
  {id:'5-313',zh:'钻研',py:'zuānyán',en:"to study intensively / to delve into",ex:{zh:'他钻研这个课题多年。',py:'Tā zuānyán zhège kètí duō nián.',en:"He delved into this subject for many years."}},
  {id:'5-314',zh:'有所',py:'yǒusuǒ',en:"to have some / somewhat",ex:{zh:'情况有所改善。',py:'Qíngkuàng yǒusuǒ gǎishàn.',en:"The situation has somewhat improved."}},
  {id:'5-315',zh:'意志',py:'yìzhì',en:"willpower / will / determination",ex:{zh:'坚强的意志是成功的关键。',py:'Jiānqiáng de yìzhì shì chénggōng de guānjiàn.',en:"Strong willpower is the key to success."}},
  {id:'5-316',zh:'言论',py:'yánlùn',en:"speech / remarks / discourse",ex:{zh:'要尊重不同的言论。',py:'Yào zūnzhòng bùtóng de yánlùn.',en:"Different opinions must be respected."}},
  {id:'5-317',zh:'压制',py:'yāzhì',en:"to suppress / to repress",ex:{zh:'不能压制创新精神。',py:'Bùnéng yāzhì chuàngxīn jīngshén.',en:"The spirit of innovation must not be suppressed."}},
  {id:'5-318',zh:'演变',py:'yǎnbiàn',en:"to evolve / to develop",ex:{zh:'语言随时间演变。',py:'Yǔyán suí shíjiān yǎnbiàn.',en:"Language evolves with time."}},
  {id:'5-319',zh:'映射',py:'yìngshè',en:"to map / to reflect / to project",ex:{zh:'艺术映射社会现实。',py:'Yìshù yìngshè shèhuì xiànshí.',en:"Art reflects social reality."}},
  {id:'5-320',zh:'优越',py:'yōuyuè',en:"superior / advantageous",ex:{zh:'他处于优越的地位。',py:'Tā chǔyú yōuyuè de dìwèi.',en:"He is in a superior position."}},
  {id:'5-321',zh:'运转',py:'yùnzhuǎn',en:"to run / to operate / to function",ex:{zh:'机器正常运转。',py:'Jīqì zhèngcháng yùnzhuǎn.',en:"The machine is running normally."}},
  {id:'5-322',zh:'约束',py:'yuēshù',en:"to bind / to restrain / constraint",ex:{zh:'道德约束人的行为。',py:'Dàodé yuēshù rén de xíngwéi.',en:"Morality constrains human behavior."}},
  {id:'5-323',zh:'圆满',py:'yuánmǎn',en:"satisfactory / successful / perfect",ex:{zh:'活动取得了圆满成功。',py:'Huódòng qǔdéle yuánmǎn chénggōng.',en:"The event achieved great success."}},
  {id:'5-324',zh:'责无旁贷',py:'zé wú páng dài',en:"duty-bound / unshirkable responsibility",ex:{zh:'这是我们责无旁贷的职责。',py:'Zhè shì wǒmen zé wú páng dài de zhízé.',en:"This is an unshirkable responsibility for us."}},
  {id:'5-325',zh:'增益',py:'zēngyì',en:"to increase benefit / augment",ex:{zh:'这项技术增益了生产效率。',py:'Zhè xiàng jìshù zēngyìle shēngchǎn xiàolǜ.',en:"This technology increased production efficiency."}},
  {id:'5-326',zh:'占据',py:'zhànjù',en:"to occupy / to hold / to take up",ex:{zh:'他在这个领域占据重要地位。',py:'Tā zài zhège lǐngyù zhànjù zhòngyào dìwèi.',en:"He occupies an important position in this field."}},
  {id:'5-327',zh:'振兴',py:'zhènxīng',en:"to revitalize / to rejuvenate",ex:{zh:'振兴乡村是国家的战略目标。',py:'Zhènxīng xiāngcūn shì guójiā de zhànlüè mùbiāo.',en:"Rural revitalization is the country's strategic goal."}},
  {id:'5-328',zh:'整合',py:'zhěnghé',en:"to integrate / to consolidate",ex:{zh:'要整合各方资源形成合力。',py:'Yào zhěnghé gèfāng zīyuán xíngchéng hélì.',en:"Resources from all parties must be integrated to form synergy."}},
  {id:'5-329',zh:'执著',py:'zhízhuó',en:"persistent / tenacious / devoted",ex:{zh:'他对艺术的执著令人敬佩。',py:'Tā duì yìshù de zhízhuó lìng rén jìngpèi.',en:"His persistence in art is admirable."}},
  {id:'5-330',zh:'主导',py:'zhǔdǎo',en:"to dominate / to lead / dominant",ex:{zh:'他在这次讨论中发挥了主导作用。',py:'Tā zài zhè cì tǎolùn zhōng fāhuīle zhǔdǎo zuòyòng.',en:"He played a dominant role in this discussion."}},
  {id:'5-331',zh:'专业性',py:'zhuānyèxìng',en:"professionalism / professional quality",ex:{zh:'这份报告的专业性很强。',py:'Zhè fèn bàogào de zhuānyèxìng hěn qiáng.',en:"This report has strong professional quality."}},
  {id:'5-332',zh:'自立',py:'zìlì',en:"self-reliant / independent",ex:{zh:'要培养自立能力。',py:'Yào péiyǎng zìlì nénglì.',en:"You must cultivate self-reliance."}},
  {id:'5-333',zh:'总体',py:'zǒngtǐ',en:"overall / as a whole",ex:{zh:'总体来看，情况还不错。',py:'Zǒngtǐ lái kàn, qíngkuàng hái bùcuò.',en:"Overall, the situation is not bad."}},
  {id:'5-334',zh:'佐证',py:'zuǒzhèng',en:"supporting evidence / corroboration",ex:{zh:'这些事实可以作为佐证。',py:'Zhèxiē shìshí kěyǐ zuòwéi zuǒzhèng.',en:"These facts can serve as supporting evidence."}},
  {id:'5-335',zh:'哲学',py:'zhéxué',en:"philosophy",ex:{zh:'他对东方哲学有深入研究。',py:'Tā duì dōngfāng zhéxué yǒu shēnrù yánjiū.',en:"He has done in-depth research on Eastern philosophy."}},
  {id:'5-336',zh:'阻力',py:'zǔlì',en:"resistance / obstacle",ex:{zh:'改革遇到了很多阻力。',py:'Gǎigé yùdàole hěn duō zǔlì.',en:"The reform encountered much resistance."}},
  {id:'5-337',zh:'阻碍',py:'zǔ\'ài',en:"to hinder / obstacle",ex:{zh:'困难阻碍不了他前进的步伐。',py:'Kùnnan zǔ\'ài bùliǎo tā qiánjìn de bùfá.',en:"Difficulties cannot hinder his steps forward."}},
  {id:'5-338',zh:'着眼',py:'zhuóyǎn',en:"to focus on / to view from",ex:{zh:'要着眼于长远发展。',py:'Yào zhuóyǎn yú chángyuǎn fāzhǎn.',en:"You must focus on long-term development."}},
  {id:'5-339',zh:'竹筒',py:'zhútǒng',en:"bamboo tube / bamboo container",ex:{zh:'他用竹筒盛水。',py:'Tā yòng zhútǒng chéng shuǐ.',en:"He used a bamboo tube to hold water."}},
  {id:'5-340',zh:'珍贵',py:'zhēnguì',en:"precious / valuable / rare",ex:{zh:'时间是最珍贵的财富。',py:'Shíjiān shì zuì zhēnguì de cáifù.',en:"Time is the most precious wealth."}},
  {id:'5-341',zh:'助力',py:'zhùlì',en:"to assist / to empower / driving force",ex:{zh:'科技助力教育发展。',py:'Kējì zhùlì jiàoyù fāzhǎn.',en:"Technology empowers educational development."}},
  {id:'5-342',zh:'汲取',py:'jíqǔ',en:"to draw / to absorb / to extract",ex:{zh:'要从失败中汲取教训。',py:'Yào cóng shībài zhōng jíqǔ jiàoxùn.',en:"You must draw lessons from failure."}},
  {id:'5-343',zh:'力挽狂澜',py:'lì wǎn kuáng lán',en:"to turn the tide / to save a desperate situation",ex:{zh:'他力挽狂澜，扭转了局面。',py:'Tā lì wǎn kuáng lán, niǔzhuǎnle júmiàn.',en:"He turned the tide and reversed the situation."}},
  {id:'5-344',zh:'励志',py:'lìzhì',en:"inspirational / motivating",ex:{zh:'这本书非常励志。',py:'Zhè běn shū fēicháng lìzhì.',en:"This book is very inspirational."}},
  {id:'5-345',zh:'砥砺前行',py:'dǐlì qiánxíng',en:"to forge ahead courageously",ex:{zh:'面对挑战，要砥砺前行。',py:'Miànduì tiǎozhàn, yào dǐlì qiánxíng.',en:"In the face of challenges, forge ahead courageously."}},
  {id:'5-346',zh:'激情',py:'jīqíng',en:"passion / enthusiasm / fervor",ex:{zh:'他对工作充满激情。',py:'Tā duì gōngzuò chōngmǎn jīqíng.',en:"He is full of passion for his work."}},
  {id:'5-347',zh:'格物致知',py:'gé wù zhì zhī',en:"to investigate things to extend knowledge",ex:{zh:'格物致知是探索真理的方法。',py:'Gé wù zhì zhī shì tànsuǒ zhēnlǐ de fāngfǎ.',en:"Investigating things to extend knowledge is a method of exploring truth."}},
  {id:'5-348',zh:'高屋建瓴',py:'gāo wū jiàn líng',en:"to have a commanding view / far-sighted",ex:{zh:'领导者要有高屋建瓴的视野。',py:'Lǐngdǎo zhě yào yǒu gāo wū jiàn líng de shìyě.',en:"Leaders must have a far-sighted vision."}},
  {id:'5-349',zh:'奠定',py:'diàndìng',en:"to establish / to lay (a foundation)",ex:{zh:'他为后人奠定了基础。',py:'Tā wèi hòurén diàndìngle jīchǔ.',en:"He laid the foundation for future generations."}},
  {id:'5-350',zh:'渗透',py:'shèntòu',en:"to permeate / to penetrate / to seep into",ex:{zh:'文化渗透到社会的每一个角落。',py:'Wénhuà shèntòu dào shèhuì de měi yīgè jiǎoluò.',en:"Culture permeates every corner of society."}},
  {id:'5-351',zh:'昭示',py:'zhāoshì',en:"to demonstrate / to show clearly",ex:{zh:'历史昭示我们要珍惜和平。',py:'Lìshǐ zhāoshì wǒmen yào zhēnxī hépíng.',en:"History demonstrates that we must cherish peace."}},
  {id:'5-352',zh:'诠释',py:'quánshì',en:"to interpret / to explain",ex:{zh:'他用行动诠释了责任的含义。',py:'Tā yòng xíngdòng quánshìle zérèn de hányì.',en:"He interpreted the meaning of responsibility through actions."}},
  {id:'5-353',zh:'印证',py:'yìnzhèng',en:"to verify / to confirm",ex:{zh:'事实印证了他的判断。',py:'Shìshí yìnzhèngle tā de pànduàn.',en:"The facts confirmed his judgment."}},
  {id:'5-354',zh:'契合',py:'qìhé',en:"to fit / to match / to align with",ex:{zh:'这个方案与实际需求契合。',py:'Zhège fāngàn yǔ shíjì xūqiú qìhé.',en:"This plan aligns with actual needs."}},
  {id:'5-355',zh:'彰显',py:'zhāngxiǎn',en:"to highlight / to manifest / to demonstrate",ex:{zh:'这彰显了中国的综合国力。',py:'Zhè zhāngxiǎnle Zhōngguó de zōnghé guólì.',en:"This highlights China's comprehensive national strength."}},
  {id:'5-356',zh:'感召',py:'gǎnzhào',en:"to inspire / to call upon",ex:{zh:'他的精神感召了无数人。',py:'Tā de jīngshén gǎnzhàole wúshù rén.',en:"His spirit inspired countless people."}},
  {id:'5-357',zh:'波澜壮阔',py:'bō lán zhuàng kuò',en:"surging and majestic",ex:{zh:'改革开放是波澜壮阔的历史进程。',py:'Gǎigé kāifàng shì bō lán zhuàng kuò de lìshǐ jìnchéng.',en:"Reform and opening up is a surging and majestic historical process."}},
  {id:'5-358',zh:'薪火相传',py:'xīn huǒ xiāng chuán',en:"to pass on like a torch",ex:{zh:'文化薪火相传，生生不息。',py:'Wénhuà xīn huǒ xiāng chuán, shēng shēng bù xī.',en:"Culture is passed on like a torch, enduring forever."}},
  {id:'5-359',zh:'正能量',py:'zhèng néngliàng',en:"positive energy",ex:{zh:'要向社会传递正能量。',py:'Yào xiàng shèhuì chuándì zhèng néngliàng.',en:"We must transmit positive energy to society."}},
  {id:'5-360',zh:'勠力同心',py:'lù lì tóng xīn',en:"to work together with one heart",ex:{zh:'全国人民勠力同心，共克时艰。',py:'Quánguó rénmín lù lì tóng xīn, gòng kè shí jiān.',en:"The people of the whole country work together to overcome difficulties."}},
  {id:'5-361',zh:'把脉',py:'bǎ mài',en:"to take a pulse / to diagnose",ex:{zh:'他为企业把脉，提出建议。',py:'Tā wèi qǐyè bǎ mài, tíchū jiànyì.',en:"He diagnosed the enterprise and offered suggestions."}},
  {id:'5-362',zh:'阶梯',py:'jiētī',en:"ladder / steps / gradation",ex:{zh:'知识是通向成功的阶梯。',py:'Zhīshí shì tōngxiàng chénggōng de jiētī.',en:"Knowledge is the ladder to success."}},
  {id:'5-363',zh:'凸显',py:'tūxiǎn',en:"to highlight / to bring to the fore",ex:{zh:'这凸显了教育的重要性。',py:'Zhè tūxiǎnle jiàoyù de zhòng yào xìng.',en:"This highlights the importance of education."}},
  {id:'5-364',zh:'与日俱增',py:'yǔ rì jù zēng',en:"to grow with each passing day",ex:{zh:'他的影响力与日俱增。',py:'Tā de yǐngxiǎnglì yǔ rì jù zēng.',en:"His influence grows with each passing day."}},
  {id:'5-365',zh:'百折不挠',py:'bǎi zhé bù náo',en:"indomitable / undaunted",ex:{zh:'他有百折不挠的精神。',py:'Tā yǒu bǎi zhé bù náo de jīngshén.',en:"He has an indomitable spirit."}},
  {id:'5-366',zh:'浮现',py:'fúxiàn',en:"to come to mind / to emerge",ex:{zh:'往事在脑海中浮现。',py:'Wǎngshì zài nǎohǎi zhōng fúxiàn.',en:"Past events emerged in his mind."}},
  {id:'5-367',zh:'旗帜',py:'qízhì',en:"banner / flag / symbol",ex:{zh:'他是时代的旗帜。',py:'Tā shì shídài de qízhì.',en:"He is the banner of the era."}},
  {id:'5-368',zh:'沉淀',py:'chéndiàn',en:"to settle / to accumulate / precipitate",ex:{zh:'岁月沉淀了他的智慧。',py:'Suìyuè chéndiànle tā de zhìhuì.',en:"The years have allowed his wisdom to accumulate."}},
  {id:'5-369',zh:'驰骋',py:'chíchěng',en:"to gallop / to roam / to have free rein",ex:{zh:'他在自己的领域里驰骋。',py:'Tā zài zìjǐ de lǐngyù lǐ chíchěng.',en:"He gallops freely in his own field."}},
  {id:'5-370',zh:'跌宕起伏',py:'diē dàng qǐ fú',en:"full of ups and downs",ex:{zh:'他的人生跌宕起伏。',py:'Tā de rénshēng diē dàng qǐ fú.',en:"His life was full of ups and downs."}},
  {id:'5-371',zh:'磅礴',py:'pángbó',en:"vast / majestic / boundless",ex:{zh:'大海磅礴的气势令人震撼。',py:'Dàhǎi pángbó de qìshì lìng rén zhènhàn.',en:"The vast and majestic power of the sea is breathtaking."}},
  {id:'5-372',zh:'绵延',py:'miányán',en:"to stretch without end / continuous",ex:{zh:'长城绵延数千里。',py:'Chángchéng miányán shù qiān lǐ.',en:"The Great Wall stretches for thousands of miles."}},
  {id:'5-373',zh:'深邃',py:'shēnsuì',en:"deep / profound / abstruse",ex:{zh:'他的思想深邃而广博。',py:'Tā de sīxiǎng shēnsuì ér guǎngbó.',en:"His thinking is profound and broad."}},
  {id:'5-374',zh:'迸发',py:'bèngfā',en:"to burst out / to erupt",ex:{zh:'他心中迸发出强烈的创作冲动。',py:'Tā xīn zhōng bèngfāchū qiángliè de chuàngzuò chōngdòng.',en:"A strong creative impulse burst out in his heart."}},
  {id:'5-375',zh:'沁人心脾',py:'qìn rén xīn pí',en:"refreshing / soul-stirring",ex:{zh:'清新的空气沁人心脾。',py:'Qīngxīn de kōngqì qìn rén xīn pí.',en:"The fresh air is refreshing to the heart."}},
  {id:'5-376',zh:'如虎添翼',py:'rú hǔ tiān yì',en:"to add wings to a tiger / much stronger",ex:{zh:'有了这项技术，真是如虎添翼。',py:'Yǒule zhè xiàng jìshù, zhēnshì rú hǔ tiān yì.',en:"With this technology, it truly adds wings to a tiger."}},
  {id:'5-377',zh:'夯实',py:'hāngshí',en:"to tamp down / to consolidate / to strengthen",ex:{zh:'要夯实基础，才能走得更远。',py:'Yào hāngshí jīchǔ, cái néng zǒu de gèng yuǎn.',en:"You must consolidate the foundation to go further."}},
  {id:'5-378',zh:'淡化',py:'dànhuà',en:"to weaken / to downplay / to dilute",ex:{zh:'不能淡化安全意识。',py:'Bùnéng dànhuà ānquán yìshí.',en:"Safety awareness must not be weakened."}},
  {id:'5-379',zh:'内驱力',py:'nèi qū lì',en:"intrinsic motivation / inner drive",ex:{zh:'学生需要培养内驱力。',py:'Xuésheng xūyào péiyǎng nèi qū lì.',en:"Students need to cultivate intrinsic motivation."}},
  {id:'5-380',zh:'塑造',py:'sùzào',en:"to shape / to mold / to model",ex:{zh:'教育塑造了他的人格。',py:'Jiàoyù sùzàole tā de réngé.',en:"Education shaped his personality."}},
  {id:'5-381',zh:'辩证',py:'biànzhèng',en:"dialectical / to analyze dialectically",ex:{zh:'要辩证地看待这个问题。',py:'Yào biànzhèng de kàndài zhège wèntí.',en:"You must look at this problem dialectically."}},
  {id:'5-382',zh:'铸就',py:'zhùjiù',en:"to forge / to create / to form",ex:{zh:'奋斗铸就辉煌。',py:'Fèndòu zhùjiù huīhuáng.',en:"Struggle forges glory."}},
  {id:'5-383',zh:'磅礴',py:'pángbó',en:"vast / grand / majestic",ex:{zh:'他的文章气势磅礴。',py:'Tā de wénzhāng qìshì pángbó.',en:"His articles have a grand and majestic momentum."}},
  {id:'5-384',zh:'先驱',py:'xiānqū',en:"pioneer / trailblazer / forerunner",ex:{zh:'他是这个领域的先驱。',py:'Tā shì zhège lǐngyù de xiānqū.',en:"He is a pioneer in this field."}},
  {id:'5-385',zh:'典籍',py:'diǎnjí',en:"classical texts / ancient books",ex:{zh:'他博览群书，通晓典籍。',py:'Tā bólǎn qúnshū, tōngxiǎo diǎnjí.',en:"He read widely and is well-versed in classical texts."}},
  {id:'5-386',zh:'历久弥新',py:'lì jiǔ mí xīn',en:"to grow stronger with age",ex:{zh:'这种精神历久弥新。',py:'Zhè zhǒng jīngshén lì jiǔ mí xīn.',en:"This spirit grows stronger with age."}},
  {id:'5-387',zh:'精益求精',py:'jīng yì qiú jīng',en:"to constantly improve / to strive for perfection",ex:{zh:'工匠精神就是精益求精。',py:'Gōngjiàng jīngshén jiùshì jīng yì qiú jīng.',en:"The craftsman spirit means constantly striving for perfection."}},
  {id:'5-388',zh:'凝心聚力',py:'níng xīn jù lì',en:"to unify hearts and pool strength",ex:{zh:'要凝心聚力，共同奋斗。',py:'Yào níng xīn jù lì, gòngtóng fèndòu.',en:"We must unify hearts and pool strength to struggle together."}},
  {id:'5-389',zh:'砥砺',py:'dǐlì',en:"to hone / to temper / to strengthen",ex:{zh:'在逆境中砥砺自己的意志。',py:'Zài nìjìng zhōng dǐlì zìjǐ de yìzhì.',en:"Temper your willpower in adversity."}},
  {id:'5-390',zh:'卓越',py:'zhuōyuè',en:"outstanding / excellent / remarkable",ex:{zh:'他取得了卓越的成就。',py:'Tā qǔdéle zhuōyuè de chéngjiù.',en:"He achieved outstanding accomplishments."}},
  {id:'5-391',zh:'深厚',py:'shēnhòu',en:"deep / profound / solid",ex:{zh:'他对祖国有深厚的感情。',py:'Tā duì zǔguó yǒu shēnhòu de gǎnqíng.',en:"He has a deep and profound feeling for his homeland."}},
  {id:'5-392',zh:'历历在目',py:'lì lì zài mù',en:"as if it were before one's eyes",ex:{zh:'当年的情景历历在目。',py:'Dāngnián de qíngjǐng lì lì zài mù.',en:"The scenes from back then are as if before my eyes."}},
  {id:'5-393',zh:'勤勤恳恳',py:'qín qín kěn kěn',en:"diligent and earnest",ex:{zh:'他勤勤恳恳地工作了一辈子。',py:'Tā qín qín kěn kěn de gōngzuòle yībèizi.',en:"He worked diligently and earnestly for a lifetime."}},
  {id:'5-394',zh:'脚踏实地',py:'jiǎo tà shí dì',en:"down-to-earth / realistic",ex:{zh:'做事要脚踏实地，不能好高骛远。',py:'Zuòshì yào jiǎo tà shí dì, bùnéng hào gāo wù yuǎn.',en:"Be down-to-earth and don't have unrealistic ambitions."}},
