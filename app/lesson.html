  {id:'5-1202',zh:'无私',py:'wúsī',en:"selfless / unselfish",ex:{zh:'他无私地奉献着自己的一切。',py:'Tā wúsī de fèngxiànzhe zìjǐ de yīqiè.',en:"He selflessly dedicates everything he has."}},
  {id:'5-1203',zh:'无疑',py:'wúyí',en:"without doubt / undoubtedly",ex:{zh:'这无疑是最好的解决方案。',py:'Zhè wúyí shì zuì hǎo de jiějué fāngàn.',en:"This is undoubtedly the best solution."}},
  {id:'5-1204',zh:'细节',py:'xìjié',en:"detail / particulars",ex:{zh:'成功在于关注细节。',py:'Chénggōng zàiyú guānzhù xìjié.',en:"Success lies in paying attention to details."}},
  {id:'5-1205',zh:'心境',py:'xīnjìng',en:"state of mind / mood",ex:{zh:'他保持着平静的心境。',py:'Tā bǎochízhe píngjìng de xīnjìng.',en:"He maintains a calm state of mind."}},
  {id:'5-1206',zh:'信任',py:'xìnrèn',en:"trust / confidence",ex:{zh:'信任是合作的基础。',py:'Xìnrèn shì hézuò de jīchǔ.',en:"Trust is the foundation of cooperation."}},
  {id:'5-1207',zh:'胸怀',py:'xiōnghuái',en:"breadth of mind / ambition",ex:{zh:'他有宽广的胸怀。',py:'Tā yǒu kuānguǎng de xiōnghuái.',en:"He has a broad mind."}},
  {id:'5-1208',zh:'寓意',py:'yùyì',en:"implied meaning / moral / lesson",ex:{zh:'这个故事的寓意很深刻。',py:'Zhège gùshi de yùyì hěn shēnkè.',en:"The implied meaning of this story is very profound."}},
  {id:'5-1209',zh:'严峻',py:'yánjùn',en:"severe / grim / stern",ex:{zh:'形势十分严峻。',py:'Xíngshì shífēn yánjùn.',en:"The situation is very severe."}},
  {id:'5-1210',zh:'演绎',py:'yǎnyì',en:"to deduce / to perform / deduction",ex:{zh:'他精彩地演绎了这个角色。',py:'Tā jīngcǎi de yǎnyìle zhège juésè.',en:"He brilliantly performed this role."}},
  {id:'5-1211',zh:'仰望',py:'yǎngwàng',en:"to look up at / to admire",ex:{zh:'我们仰望星空，思考未来。',py:'Wǒmen yǎngwàng xīngkōng, sīkǎo wèilái.',en:"We look up at the starry sky and think about the future."}},
  {id:'5-1212',zh:'意蕴',py:'yìyùn',en:"aesthetic appeal / connotation",ex:{zh:'这幅画意蕴深远。',py:'Zhè fú huà yìyùn shēnyuǎn.',en:"This painting has deep aesthetic appeal."}},
  {id:'5-1213',zh:'引领',py:'yǐnlǐng',en:"to lead / to guide",ex:{zh:'他引领团队走向成功。',py:'Tā yǐnlǐng tuánduì zǒuxiàng chénggōng.',en:"He led the team toward success."}},
  {id:'5-1214',zh:'隐患',py:'yǐnhuàn',en:"hidden danger / potential hazard",ex:{zh:'要消除安全隐患。',py:'Yào xiāochú ānquán yǐnhuàn.',en:"Hidden safety hazards must be eliminated."}},
  {id:'5-1215',zh:'优化',py:'yōuhuà',en:"to optimize / optimization",ex:{zh:'要不断优化工作流程。',py:'Yào bùduàn yōuhuà gōngzuò liúchéng.',en:"You must constantly optimize the work process."}},
  {id:'5-1216',zh:'有据可查',py:'yǒu jù kě chá',en:"verifiable / on record",ex:{zh:'这个事实有据可查。',py:'Zhège shìshí yǒu jù kě chá.',en:"This fact is verifiable on record."}},
  {id:'5-1217',zh:'预见',py:'yùjiàn',en:"to foresee / to predict",ex:{zh:'他预见到了这个问题。',py:'Tā yùjiàn dào le zhège wèntí.',en:"He foresaw this problem."}},
  {id:'5-1218',zh:'蕴含',py:'yùnhán',en:"to contain / to embody",ex:{zh:'这首诗蕴含着丰富的情感。',py:'Zhè shǒu shī yùnhánzhe fēngfù de qínggǎn.',en:"This poem contains rich emotions."}},
  {id:'5-1219',zh:'展望',py:'zhānwàng',en:"to look forward / prospect",ex:{zh:'让我们展望美好的未来。',py:'Ràng wǒmen zhānwàng měihǎo de wèilái.',en:"Let us look forward to a bright future."}},
  {id:'5-1220',zh:'争议',py:'zhēngyì',en:"controversy / dispute",ex:{zh:'这个问题存在很大争议。',py:'Zhège wèntí cúnzài hěn dà zhēngyì.',en:"There is great controversy about this issue."}},
  {id:'5-1221',zh:'振兴',py:'zhènxīng',en:"to revitalize / to rejuvenate",ex:{zh:'振兴乡村是国家的战略目标。',py:'Zhènxīng xiāngcūn shì guójiā de zhànlüè mùbiāo.',en:"Rural revitalization is the country's strategic goal."}},
  {id:'5-1222',zh:'正能量',py:'zhèng néngliàng',en:"positive energy",ex:{zh:'要向社会传递正能量。',py:'Yào xiàng shèhuì chuándì zhèng néngliàng.',en:"We must transmit positive energy to society."}},
  {id:'5-1223',zh:'制约',py:'zhìyuē',en:"to restrict / to constrain",ex:{zh:'资金不足制约了项目发展。',py:'Zījīn bùzú zhìyuēle xiàngmù fāzhǎn.',en:"Insufficient funding constrained the project's development."}},
  {id:'5-1224',zh:'忠诚',py:'zhōngchéng',en:"loyal / faithful / devoted",ex:{zh:'他对国家忠诚无比。',py:'Tā duì guójiā zhōngchéng wúbǐ.',en:"He is incomparably loyal to his country."}},
  {id:'5-1225',zh:'筑梦',py:'zhùmèng',en:"to build one's dream",ex:{zh:'青年要为筑梦中国而努力奋斗。',py:'Qīngnián yào wèi zhùmèng Zhōngguó ér nǔlì fèndòu.',en:"Young people must struggle hard to build China's dream."}},
  {id:'5-1226',zh:'自古以来',py:'zìgǔ yǐlái',en:"since ancient times",ex:{zh:'自古以来，勤劳是中华民族的美德。',py:'Zìgǔ yǐlái, qínláo shì Zhōnghuá mínzú de měidé.',en:"Since ancient times, diligence has been a virtue of the Chinese nation."}},
  {id:'5-1227',zh:'文化自信',py:'wénhuà zìxìn',en:"cultural confidence",ex:{zh:'要增强文化自信，传承优秀传统文化。',py:'Yào zēngqiáng wénhuà zìxìn, chuánchéng yōuxiù chuántǒng wénhuà.',en:"Cultural confidence must be strengthened."}},
  {id:'5-1228',zh:'民族复兴',py:'mínzú fùxīng',en:"national rejuvenation",ex:{zh:'实现民族复兴是中国人民的伟大梦想。',py:'Shíxiàn mínzú fùxīng shì Zhōngguó rénmín de wěidà mèngxiǎng.',en:"Achieving national rejuvenation is the great dream of the Chinese people."}},
  {id:'5-1229',zh:'辉煌',py:'huīhuáng',en:"glorious / brilliant / splendid",ex:{zh:'中国正在创造新的辉煌。',py:'Zhōngguó zhèngzài chuàngzào xīn de huīhuáng.',en:"China is creating new glory."}},
  {id:'5-1230',zh:'奔腾',py:'bēnténg',en:"to gallop / to surge",ex:{zh:'历史的洪流奔腾向前。',py:'Lìshǐ de hóngliú bēnténg xiàng qián.',en:"The torrent of history surges forward."}},
  {id:'5-1231',zh:'绽放',py:'zhànfàng',en:"to bloom / to blossom",ex:{zh:'青春在奋斗中绽放光彩。',py:'Qīngchūn zài fèndòu zhōng zhànfàng guāngcǎi.',en:"Youth blossoms with brilliance in the struggle."}},
  {id:'5-1232',zh:'凝聚',py:'níngjù',en:"to converge / to unite",ex:{zh:'伟大成就凝聚了几代人的心血。',py:'Wěidà chéngjiù níngjùle jǐ dài rén de xīnxuè.',en:"Great achievements crystallize the painstaking effort of several generations."}},
  {id:'5-1233',zh:'旗帜鲜明',py:'qízhì xiānmíng',en:"clear-cut / with a clear position",ex:{zh:'要旗帜鲜明地反对不正之风。',py:'Yào qízhì xiānmíng de fǎnduì bù zhèng zhī fēng.',en:"You must have a clear-cut position in opposing unhealthy tendencies."}},
  {id:'5-1234',zh:'同舟共济',py:'tóng zhōu gòng jì',en:"in the same boat / to pull together",ex:{zh:'面对困难，我们要同舟共济。',py:'Miànduì kùnnan, wǒmen yào tóng zhōu gòng jì.',en:"Facing difficulties, we must pull together."}},
  {id:'5-1235',zh:'厚植',py:'hòuzhí',en:"to deeply cultivate / to firmly establish",ex:{zh:'要厚植爱国主义情怀。',py:'Yào hòuzhí àiguózhǔyì qínghuái.',en:"Patriotic sentiments must be deeply cultivated."}},
  {id:'5-1236',zh:'浩荡',py:'hàodàng',en:"vast / mighty / rushing",ex:{zh:'历史浩荡向前，不可阻挡。',py:'Lìshǐ hàodàng xiàng qián, bùkě zǔdǎng.',en:"History rushes mightily forward and cannot be stopped."}},
  {id:'5-1237',zh:'胸有成竹',py:'xiōng yǒu chéng zhú',en:"to have a plan ready",ex:{zh:'他胸有成竹，从容应对。',py:'Tā xiōng yǒu chéng zhú, cóngróng yìngduì.',en:"He has a plan ready and handles things calmly."}},
  {id:'5-1238',zh:'崛起',py:'juéqǐ',en:"to rise / to emerge",ex:{zh:'中国正在和平崛起，走向世界。',py:'Zhōngguó zhèngzài hépíng juéqǐ, zǒuxiàng shìjiè.',en:"China is peacefully rising and moving toward the world."}},
  {id:'5-1239',zh:'刚正不阿',py:'gāng zhèng bù ē',en:"upright and never submitting to pressure",ex:{zh:'他刚正不阿，秉公处理事务。',py:'Tā gāng zhèng bù ē, bǐng gōng chǔlǐ shìwù.',en:"He is upright and never submits to pressure."}},
  {id:'5-1240',zh:'璀璨',py:'cuǐcàn',en:"glittering / dazzling / brilliant",ex:{zh:'中华文明如璀璨星空，光芒四射。',py:'Zhōnghuá wénmíng rú cuǐcàn xīngkōng, guāngmáng sìshè.',en:"Chinese civilization is like a glittering starry sky."}},
  {id:'5-1241',zh:'拔地而起',py:'bá dì ér qǐ',en:"to rise up from the ground",ex:{zh:'一座座高楼拔地而起。',py:'Yī zuò zuò gāolóu bá dì ér qǐ.',en:"Tall buildings rise up from the ground one after another."}},
  {id:'5-1242',zh:'博古通今',py:'bó gǔ tōng jīn',en:"wide knowledge of past and present",ex:{zh:'他博古通今，学识渊博。',py:'Tā bó gǔ tōng jīn, xuéshí yuānbó.',en:"He has wide knowledge of past and present."}},
  {id:'5-1243',zh:'乘势而上',py:'chéng shì ér shàng',en:"to ride the trend and rise",ex:{zh:'要乘势而上，把握发展机遇。',py:'Yào chéng shì ér shàng, bǎwò fāzhǎn jīyù.',en:"Ride the trend and seize the opportunity for development."}},
  {id:'5-1244',zh:'赤诚',py:'chìchéng',en:"wholeheartedly sincere / absolutely loyal",ex:{zh:'他对祖国赤诚无比。',py:'Tā duì zǔguó chìchéng wúbǐ.',en:"He is wholeheartedly sincere toward his homeland."}},
  {id:'5-1245',zh:'叱咤风云',py:'chìzhà fēngyún',en:"all-powerful / to make the world tremble",ex:{zh:'他叱咤风云，名震天下。',py:'Tā chìzhà fēngyún, míng zhèn tiānxià.',en:"He was all-powerful and his name shook the world."}},
  {id:'5-1246',zh:'传道授业',py:'chuán dào shòu yè',en:"to transmit truth and impart knowledge",ex:{zh:'老师的职责是传道授业解惑。',py:'Lǎoshī de zhízé shì chuán dào shòu yè jiě huò.',en:"A teacher's duty is to transmit truth and impart knowledge."}},
  {id:'5-1247',zh:'大气磅礴',py:'dàqì pángbó',en:"grand and majestic",ex:{zh:'他的作品大气磅礴，震撼人心。',py:'Tā de zuòpǐn dàqì pángbó, zhènhàn rénxīn.',en:"His works are grand and majestic."}},
  {id:'5-1248',zh:'涓涓细流',py:'juān juān xì liú',en:"tiny trickling streams",ex:{zh:'涓涓细流，汇成大江大河。',py:'Juān juān xì liú, huìchéng dà jiāng dà hé.',en:"Tiny trickling streams converge to form great rivers."}},
  {id:'5-1249',zh:'奋发',py:'fènfā',en:"to strive / to work hard",ex:{zh:'要奋发图强，为国争光。',py:'Yào fènfā túqiáng, wèi guó zhēngguāng.',en:"Strive to strengthen and win glory for the country."}},
  {id:'5-1250',zh:'心怀天下',py:'xīn huái tiān xià',en:"to have the world in one's heart",ex:{zh:'心怀天下，志在高远。',py:'Xīn huái tiān xià, zhì zài gāoyuǎn.',en:"Have the world in your heart and lofty aspirations."}},
  {id:'5-1251',zh:'宏才大略',py:'hóng cái dà lüè',en:"grand talent and great strategy",ex:{zh:'他宏才大略，深谋远虑。',py:'Tā hóng cái dà lüè, shēn móu yuǎn lǜ.',en:"He has grand talent and great strategy."}},
  {id:'5-1252',zh:'攻坚克难',py:'gōng jiān kè nán',en:"to tackle key problems and overcome difficulties",ex:{zh:'要攻坚克难，推进改革。',py:'Yào gōng jiān kè nán, tuījìn gǎigé.',en:"Tackle key problems and overcome difficulties to advance reform."}},
  {id:'5-1253',zh:'跬步',py:'kuǐbù',en:"a half-step / small steps",ex:{zh:'不积跬步，无以至千里。',py:'Bù jī kuǐbù, wú yǐ zhì qiān lǐ.',en:"Without accumulating small steps, you cannot reach a thousand miles."}},
  {id:'5-1254',zh:'万里征程',py:'wànlǐ zhēngchéng',en:"a journey of ten thousand miles",ex:{zh:'万里征程，从脚下开始。',py:'Wànlǐ zhēngchéng, cóng jiǎoxià kāishǐ.',en:"A journey of ten thousand miles begins with a single step."}},
  {id:'5-1255',zh:'破旧立新',py:'pò jiù lì xīn',en:"to break with the old and establish the new",ex:{zh:'改革要破旧立新，推陈出新。',py:'Gǎigé yào pò jiù lì xīn, tuī chén chū xīn.',en:"Reform must break with the old and establish the new."}},
  {id:'5-1256',zh:'文以载道',py:'wén yǐ zài dào',en:"literature as a vehicle for truth",ex:{zh:'文以载道，书以传情。',py:'Wén yǐ zài dào, shū yǐ chuán qíng.',en:"Literature carries truth, books transmit feelings."}},
  {id:'5-1257',zh:'笃学',py:'dúxué',en:"to study earnestly / devoted to learning",ex:{zh:'笃学善思，学以致用。',py:'Dúxué shànsī, xué yǐ zhì yòng.',en:"Study earnestly and think well, applying what you learn."}},
  {id:'5-1258',zh:'弄潮儿',py:'nòngcháo ér',en:"a person who leads the trend",ex:{zh:'他是时代的弄潮儿，引领潮流。',py:'Tā shì shídài de nòngcháo ér, yǐnlǐng cháoliú.',en:"He is a surfer of the times, leading the trend."}},
  {id:'5-1259',zh:'前途无量',py:'qiántú wúliàng',en:"unlimited prospects",ex:{zh:'他年轻有为，前途无量。',py:'Tā niánqīng yǒuwéi, qiántú wúliàng.',en:"He is young and capable with unlimited prospects."}},
  {id:'5-1260',zh:'生生不息',py:'shēng shēng bù xī',en:"to go on forever / endlessly",ex:{zh:'中华文化生生不息，薪火相传。',py:'Zhōnghuá wénhuà shēng shēng bù xī, xīn huǒ xiāng chuán.',en:"Chinese culture goes on forever."}},
  {id:'5-1261',zh:'山河壮丽',py:'shān hé zhuànglì',en:"magnificent mountains and rivers",ex:{zh:'祖国山河壮丽，令人心旷神怡。',py:'Zǔguó shān hé zhuànglì, lìng rén xīn kuàng shén yí.',en:"The homeland's mountains and rivers are magnificent."}},
  {id:'5-1262',zh:'岁月峥嵘',py:'suìyuè zhēngróng',en:"eventful years / remarkable era",ex:{zh:'那是一段岁月峥嵘的历史。',py:'Nà shì yī duàn suìyuè zhēngróng de lìshǐ.',en:"Those were remarkable and eventful years of history."}},
  {id:'5-1263',zh:'日新月异',py:'rì xīn yuè yì',en:"changing with each passing day",ex:{zh:'科技日新月异，日益进步。',py:'Kējì rì xīn yuè yì, rìyì jìnbù.',en:"Technology changes with each passing day."}},
  {id:'5-1264',zh:'无微不至',py:'wú wēi bù zhì',en:"in every possible way / considerate",ex:{zh:'她对父母的照顾无微不至。',py:'Tā duì fùmǔ de zhàogù wú wēi bù zhì.',en:"Her care for her parents is thoughtful in every possible way."}},
  {id:'5-1265',zh:'继往开来',py:'jì wǎng kāi lái',en:"to inherit the past and usher in the future",ex:{zh:'我们要继往开来，开创未来。',py:'Wǒmen yào jì wǎng kāi lái, kāichuàng wèilái.',en:"We must inherit the past and usher in the future."}},
  {id:'5-1266',zh:'汲取',py:'jíqǔ',en:"to draw / to absorb / to extract",ex:{zh:'要从失败中汲取教训。',py:'Yào cóng shībài zhōng jíqǔ jiàoxùn.',en:"You must draw lessons from failure."}},
  {id:'5-1267',zh:'源远流长',py:'yuán yuǎn liú cháng',en:"of long standing and well-established",ex:{zh:'中华文明源远流长，博大精深。',py:'Zhōnghuá wénmíng yuán yuǎn liú cháng, bódà jīngshēn.',en:"Chinese civilization is of long standing and extensive."}},
  {id:'5-1268',zh:'奠定',py:'diàndìng',en:"to establish / to lay a foundation",ex:{zh:'他为后人奠定了基础。',py:'Tā wèi hòurén diàndìngle jīchǔ.',en:"He laid the foundation for future generations."}},
  {id:'5-1269',zh:'蓬勃',py:'péngbó',en:"vigorous / thriving / booming",ex:{zh:'经济蓬勃发展。',py:'Jīngjì péngbó fāzhǎn.',en:"The economy is developing vigorously."}},
  {id:'5-1270',zh:'宝贵',py:'bǎoguì',en:"precious / valuable",ex:{zh:'时间是最宝贵的资源。',py:'Shíjiān shì zuì bǎoguì de zīyuán.',en:"Time is the most precious resource."}},
  {id:'5-1271',zh:'珍贵',py:'zhēnguì',en:"precious / valuable / rare",ex:{zh:'时间是最珍贵的财富。',py:'Shíjiān shì zuì zhēnguì de cáifù.',en:"Time is the most precious wealth."}},
  {id:'5-1272',zh:'助力',py:'zhùlì',en:"to assist / to empower",ex:{zh:'科技助力教育发展。',py:'Kējì zhùlì jiàoyù fāzhǎn.',en:"Technology empowers educational development."}},
  {id:'5-1273',zh:'历久弥新',py:'lì jiǔ mí xīn',en:"becoming fresher the longer it lasts",ex:{zh:'这种精神历久弥新，永放光芒。',py:'Zhè zhǒng jīngshén lì jiǔ mí xīn, yǒng fàng guāngmáng.',en:"This spirit becomes fresher the longer it lasts."}},
  {id:'5-1274',zh:'磅礴',py:'pángbó',en:"vast / grand / majestic",ex:{zh:'长江磅礴的气势令人叹为观止。',py:'Cháng Jiāng pángbó de qìshì ràng rén tàn wéi guān zhǐ.',en:"The vast and grand momentum of the Yangtze River makes people marvel."}},
  {id:'5-1275',zh:'铸就',py:'zhùjiù',en:"to forge / to create",ex:{zh:'奋斗铸就辉煌。',py:'Fèndòu zhùjiù huīhuáng.',en:"Struggle forges glory."}},
  {id:'5-1276',zh:'精益求精',py:'jīng yì qiú jīng',en:"to constantly improve / to strive for perfection",ex:{zh:'工匠精神就是精益求精。',py:'Gōngjiàng jīngshén jiùshì jīng yì qiú jīng.',en:"The craftsman spirit means constantly striving for perfection."}},
  {id:'5-1277',zh:'卓尔不群',py:'zhuó ěr bù qún',en:"outstanding / standing above the rest",ex:{zh:'他才华出众，卓尔不群。',py:'Tā cáihuá chūzhòng, zhuó ěr bù qún.',en:"He is outstandingly talented and stands above the rest."}},
  {id:'5-1278',zh:'脚踏实地',py:'jiǎo tà shí dì',en:"down-to-earth / realistic",ex:{zh:'做事要脚踏实地，不能好高骛远。',py:'Zuòshì yào jiǎo tà shí dì, bùnéng hào gāo wù yuǎn.',en:"Be down-to-earth and don't have unrealistic ambitions."}},
  {id:'5-1279',zh:'一丝不苟',py:'yī sī bù gǒu',en:"meticulous / not the least bit careless",ex:{zh:'他工作一丝不苟。',py:'Tā gōngzuò yī sī bù gǒu.',en:"He is meticulous in his work."}},
  {id:'5-1280',zh:'波澜壮阔',py:'bō lán zhuàng kuò',en:"surging and majestic",ex:{zh:'改革开放是波澜壮阔的历史进程。',py:'Gǎigé kāifàng shì bō lán zhuàng kuò de lìshǐ jìnchéng.',en:"Reform and opening up is a surging and majestic historical process."}},
  {id:'5-1281',zh:'薪火相传',py:'xīn huǒ xiāng chuán',en:"to pass on like a torch",ex:{zh:'文化薪火相传，生生不息。',py:'Wénhuà xīn huǒ xiāng chuán, shēng shēng bù xī.',en:"Culture is passed on like a torch, enduring forever."}},
  {id:'5-1282',zh:'勠力同心',py:'lù lì tóng xīn',en:"to work together with one heart",ex:{zh:'全国人民勠力同心，共克时艰。',py:'Quánguó rénmín lù lì tóng xīn, gòng kè shí jiān.',en:"The people work together with one heart to overcome difficulties."}},
  {id:'5-1283',zh:'彰显',py:'zhāngxiǎn',en:"to highlight / to manifest",ex:{zh:'这彰显了中国的综合国力。',py:'Zhè zhāngxiǎnle Zhōngguó de zōnghé guólì.',en:"This highlights China's comprehensive national strength."}},
  {id:'5-1284',zh:'精诚',py:'jīngchéng',en:"sincere / with great sincerity",ex:{zh:'精诚所至，金石为开。',py:'Jīngchéng suǒ zhì, jīn shí wèi kāi.',en:"With great sincerity, even gold and stone can be opened."}},
  {id:'5-1285',zh:'悠久',py:'yōujiǔ',en:"long-standing / of long duration",ex:{zh:'中华民族有悠久的文明历史。',py:'Zhōnghuá mínzú yǒu yōujiǔ de wénmíng lìshǐ.',en:"The Chinese nation has a long-standing history of civilization."}},
  {id:'5-1286',zh:'博大精深',py:'bódà jīngshēn',en:"extensive and profound",ex:{zh:'中国文化博大精深，令人叹为观止。',py:'Zhōngguó wénhuà bódà jīngshēn, lìng rén tàn wéi guān zhǐ.',en:"Chinese culture is extensive and profound."}},
  {id:'5-1287',zh:'孜孜不倦',py:'zī zī bù juàn',en:"diligent and tireless",ex:{zh:'他孜孜不倦地钻研学问。',py:'Tā zī zī bù juàn de zuānyán xuéwèn.',en:"He diligently and tirelessly devoted himself to scholarship."}},
  {id:'5-1288',zh:'砥砺前行',py:'dǐlì qiánxíng',en:"to forge ahead with determination",ex:{zh:'砥砺前行，不负时代。',py:'Dǐlì qiánxíng, bù fù shídài.',en:"Forge ahead with determination and not let the era down."}},
  {id:'5-1289',zh:'功在当代',py:'gōng zài dāng dài',en:"achievement of the present era",ex:{zh:'植树造林，功在当代，利在千秋。',py:'Zhí shù zào lín, gōng zài dāng dài, lì zài qiān qiū.',en:"Planting trees is an achievement of the present era."}},
  {id:'5-1290',zh:'志存高远',py:'zhì cún gāo yuǎn',en:"to have lofty aspirations",ex:{zh:'年轻人要志存高远，胸怀大志。',py:'Niánqīngrén yào zhì cún gāo yuǎn, xiōnghuái dàzhì.',en:"Young people must have lofty aspirations."}},
  {id:'5-1291',zh:'英雄本色',py:'yīngxióng běnsè',en:"true heroic character",ex:{zh:'危难时刻，方显英雄本色。',py:'Wēinàn shíkè, fāng xiǎn yīngxióng běnsè.',en:"In times of crisis, true heroic character is revealed."}},
  {id:'5-1292',zh:'厚望',py:'hòuwàng',en:"great expectations / high hopes",ex:{zh:'父母对他寄予厚望。',py:'Fùmǔ duì tā jìyǔ hòuwàng.',en:"His parents place great expectations in him."}},
  {id:'5-1293',zh:'开拓进取',py:'kāituò jìnqǔ',en:"to pioneer and make progress",ex:{zh:'要开拓进取，勇于创新。',py:'Yào kāituò jìnqǔ, yǒngyú chuàngxīn.',en:"Pioneer and make progress, daring to innovate."}},
  {id:'5-1294',zh:'立德树人',py:'lì dé shù rén',en:"to establish virtue and cultivate people",ex:{zh:'教育要立德树人，培根铸魂。',py:'Jiàoyù yào lì dé shù rén, péi gēn zhù hún.',en:"Education must establish virtue and cultivate people."}},
  {id:'5-1295',zh:'守望初心',py:'shǒuwàng chūxīn',en:"to keep watch over the original aspiration",ex:{zh:'守望初心，牢记使命，永不懈怠。',py:'Shǒuwàng chūxīn, láojì shǐmìng, yǒng bù xièdài.',en:"Keep watch over the original aspiration and never slacken."}},

// TING SOUNDS — Web Audio API
// ══════════════════════════════════════════════════════════
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _audioCtx;
}

function playTing(correct) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  // Unlock audio context on first user interaction
  if (ctx.state === 'suspended') ctx.resume();
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  if (correct) {
    // Bright happy ting: two rising notes
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1320, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.type = 'sine';
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } else {
    // Sad low ting: descending
    osc.frequency.setValueAtTime(440, ctx.currentTime);
    osc.frequency.setValueAtTime(330, ctx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.14, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.type = 'triangle';
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
  }
}

function speak(text, rate = 0.85) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = rate; u.pitch = 1;
  if (zhVoice) u.voice = zhVoice;
  window.speechSynthesis.speak(u);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(arr, n) { return shuffle(arr).slice(0, n); }
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getDistractors(correct, pool, field, n = 3) {
  const others = pool.filter(w => w[field] !== correct[field]);
  return shuffle(others).slice(0, n);
}

// ── ENERGY & DIAMONDS
function renderEnergy() {
  const pct = Math.round((energy / MAX_ENERGY) * 100);
  const fill = document.getElementById('energy-fill');
  const count = document.getElementById('energy-count');
  if (fill) fill.style.width = pct + '%';
  if (count) count.textContent = energy + '/' + MAX_ENERGY;
  if (_uid) {
    localStorage.setItem(key('energy'), energy);
    localStorage.setItem(key('energy_ts'), Date.now());
  }
}

function renderDiamonds() {
  const el = document.getElementById('diamond-count');
  if (el) el.textContent = diamonds;
  if (_uid) localStorage.setItem(key('diamonds'), diamonds);
}

function loadEnergy() {
  if (!_uid) return;
  const saved = Number(localStorage.getItem(key('energy')));
  const ts    = Number(localStorage.getItem(key('energy_ts')) || 0);
  if (!isNaN(saved) && saved >= 0) {
    // Refill based on time elapsed
    const elapsed = Date.now() - ts;
    const refilled = Math.floor(elapsed / ENERGY_REFILL_RATE_MS);
    energy = Math.min(MAX_ENERGY, saved + refilled);
  } else {
    energy = MAX_ENERGY;
  }
  diamonds = Number(localStorage.getItem(key('diamonds')) || 0);
  renderEnergy();
  renderDiamonds();
  // Start refill timer
  setInterval(() => {
    if (energy < MAX_ENERGY) {
      energy = Math.min(MAX_ENERGY, energy + 1);
      renderEnergy();
    }
  }, ENERGY_REFILL_RATE_MS);
}

function consumeEnergy() {
  if (energy <= 0) {
    showEnergyOverlay();
    return false;
  }
  energy = Math.max(0, energy - 1);
  renderEnergy();
  if (energy === 0) {
    setTimeout(() => showEnergyOverlay(), 400);
  }
  return true;
}

function showEnergyOverlay() {
  document.getElementById('energy-overlay').classList.add('show');
}

function hideEnergyOverlay() {
  document.getElementById('energy-overlay').classList.remove('show');
  clearInterval(eoAdTimer);
  document.getElementById('eo-bar-wrap').style.display = 'none';
  document.getElementById('eo-bar-lbl').textContent = '';
  const adBtn = document.getElementById('eo-ad-btn');
  if (adBtn) { adBtn.disabled = false; adBtn.textContent = '📺 Watch Ad (+5 Energy)'; }
}

function watchEnergyAd() {
  const btn  = document.getElementById('eo-ad-btn');
  const bar  = document.getElementById('eo-bar-wrap');
  const fill = document.getElementById('eo-bar-fill');
  const lbl  = document.getElementById('eo-bar-lbl');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = 'Loading ad…';
  bar.style.display = 'block';
  fill.style.width = '0%';
  let elapsed = 0;
  clearInterval(eoAdTimer);
  eoAdTimer = setInterval(() => {
    elapsed += 80;
    fill.style.width = Math.min(100, (elapsed / 5000) * 100) + '%';
    if (elapsed >= 5000) {
      clearInterval(eoAdTimer);
      lbl.textContent = 'Done!';
      energy = Math.min(MAX_ENERGY, energy + 5);
      renderEnergy();
      hideEnergyOverlay();
      showToast('⚡ +5 Energy! Keep going!');
    } else {
      lbl.textContent = 'Ad playing… ' + Math.ceil((5000 - elapsed) / 1000) + 's';
    }
  }, 80);
}

function buyEnergyDiamonds(amount, cost) {
  if (diamonds < cost) { showToast('Not enough diamonds! 💎'); return; }
  diamonds -= cost;
  energy = Math.min(MAX_ENERGY, energy + amount);

  showToast('⚡ +' + amount + ' Energy!');

// LESSON PLAN GENERATOR
// ══════════════════════════════════════════════════════════
function getLessonPlan(levelNum, lessonNum) {
  const posInBlock = ((lessonNum - 1) % 6); // 0=Intro,1=Reinforce,2=Expand,3=Mixed,4=Speed,5=Checkpoint
  const blockNum   = Math.ceil(lessonNum / 6);
  const words      = HSK[levelNum]?.words || [];
  const grammar    = HSK[levelNum]?.grammar || [];

  // Words for this block — 5 per block, cycle if stub level doesn't have enough
  const blockStart  = words.length > 0 ? ((blockNum - 1) * 5) % Math.max(words.length, 1) : 0;
  const rawNew      = words.slice(blockStart, blockStart + 5);
  const newWords    = rawNew.length >= 2 ? rawNew : words.slice(0, Math.min(5, words.length));
  const reviewStart = Math.max(0, blockStart - 10);
  const reviewWords = blockStart > 0 ? words.slice(reviewStart, blockStart) : [];
  const grammarItem = grammar.length > 0 ? (grammar[blockNum % grammar.length] || grammar[0]) : null;

  const LESSON_NAMES = ['Introduction','Reinforcement','Expansion','Mixed Practice','⚡ Speed Challenge','✓ Checkpoint'];
  const plan = {
    name: LESSON_NAMES[posInBlock],
    posInBlock,
    blockNum,
    levelNum,
    lessonNum,
    newWords,
    reviewWords,
    grammarItem,
    isSpeed: posInBlock === 4,
    isCheckpoint: posInBlock === 5,
  };
  return plan;
}

function buildSteps(plan) {
  const { posInBlock, newWords, reviewWords, grammarItem, levelNum } = plan;
  const allWords = HSK[levelNum]?.words || [];
  let s = [];

  if (plan.isCheckpoint) {
    return buildCheckpointSteps(plan);
  }

  if (plan.isSpeed) {
    return buildSpeedSteps(plan);
  }

  if (posInBlock === 0) {
    // LESSON 1: Introduction — word cards + grammar + basic MCQ
    newWords.forEach(w => s.push({ type:'word_card', word: w }));
    if (grammarItem) s.push({ type:'grammar', grammar: grammarItem });
    newWords.forEach(w => s.push({ type:'mcq_meaning', word: w, pool: allWords }));
    s.push({ type:'match', words: newWords.slice(0,4) });
  } else if (posInBlock === 1) {
    // LESSON 2: Reinforcement — TF + fill blank + translate order
    newWords.forEach(w => s.push({ type:'tf_sentence', word: w, pool: allWords }));
    newWords.forEach(w => s.push({ type:'mcq_hanzi', word: w, pool: allWords }));
    newWords.slice(0,3).forEach(w => s.push({ type:'fill_blank', word: w }));
    newWords.slice(0,2).forEach(w => s.push({ type:'translate_order', word: w }));
    if (reviewWords.length > 0) pick(reviewWords, 2).forEach(w => s.push({ type:'mcq_meaning', word: w, pool: allWords }));
    s.push({ type:'match', words: newWords.slice(0,4) });
  } else if (posInBlock === 2) {
    // LESSON 3: Expansion — 2 new + listening + sentence build
    const extraStart = Math.min(newWords.length * 2, allWords.length - 2);
    const extraWords = allWords.slice(extraStart, extraStart + 2);
    extraWords.forEach(w => s.push({ type:'word_card', word: w }));
    newWords.forEach(w => s.push({ type:'listen_tf', word: w }));
    newWords.slice(0,2).forEach(w => s.push({ type:'listen_sentence', word: w }));
    newWords.slice(0,3).forEach(w => s.push({ type:'sentence_order', word: w }));
    if (reviewWords.length > 0) pick(reviewWords, 3).forEach(w => s.push({ type:'mcq_meaning', word: w, pool: allWords }));
    s.push({ type:'match', words: [...newWords.slice(0,2), ...extraWords.slice(0,2)] });
  } else if (posInBlock === 3) {
    // LESSON 4: Mixed Practice — no new words, error correction, reading passage
    const practiceWords = [...newWords, ...reviewWords.slice(0,3)];
    practiceWords.forEach(w => s.push({ type:'mcq_meaning', word: w, pool: allWords }));
    practiceWords.slice(0,3).forEach(w => s.push({ type:'error_correction', word: w, pool: allWords }));
    newWords.slice(0,2).forEach(w => s.push({ type:'reading_passage', word: w }));
    if (newWords.length >= 4) s.push({ type:'match', words: newWords.slice(0,4) });
    practiceWords.slice(0,3).forEach(w => s.push({ type:'pinyin_type', word: w }));
  }

  return s.filter(Boolean);
}

function buildSpeedSteps(plan) {
  const { newWords, reviewWords, levelNum } = plan;
  const allWords = HSK[levelNum]?.words || [];
  const pool = shuffle([...newWords, ...reviewWords]).slice(0, 10);
  const types = ['mcq_meaning','mcq_hanzi','tf_sentence','listen_tf'];
  return pool.map(w => ({ type: rand(types), word: w, pool: allWords, speed: true }));
}

function buildCheckpointSteps(plan) {
  const { newWords, reviewWords, levelNum } = plan;
  const allWords = HSK[levelNum]?.words || [];
  const pool = [...newWords, ...reviewWords].filter(Boolean);
  let s = [];
  // Part 1 — Listening (5 questions)
  shuffle(pool).slice(0,5).forEach(w => s.push({ type:'listen_tf', word: w, section:'listen' }));
  // Part 2 — Reading (5 questions)
  shuffle(pool).slice(0,3).forEach(w => s.push({ type:'mcq_meaning', word: w, pool: allWords, section:'read' }));
  shuffle(pool).slice(0,2).forEach(w => s.push({ type:'reading_passage', word: w, section:'read' }));
  // Part 3 — Writing (3 questions)
  shuffle(pool).slice(0,2).forEach(w => s.push({ type:'sentence_order', word: w, section:'write' }));
  shuffle(pool).slice(0,1).forEach(w => s.push({ type:'pinyin_type', word: w, section:'write' }));
  return s;
}

function renderStep(idx) {
  if (idx >= steps.length) { showComplete(); return; }
  answeredStep = false;
  matchState = null;
  wordBankState = null;
  clearInterval(speedTimer);

  const step = steps[idx];
  stepArea.className = 'step-area step-in';
  bottomArea.innerHTML = '';
  updateProgress();

  // Update info bar section indicator
  const sectionColors = { listen:'var(--blue)', read:'var(--green)', write:'var(--purple)' };
  const sectionLabels = { listen:'🎧 Listening', read:'📖 Reading', write:'✍️ Writing' };
  if (step.section) {
    document.getElementById('info-type').style.background = `rgba(${step.section === 'listen' ? '96,165,250' : step.section === 'read' ? '61,219,122' : '167,139,250'},.1)`;
    document.getElementById('info-type').textContent = sectionLabels[step.section] + (lesson.plan.isCheckpoint ? ' · Checkpoint' : '');
  }

  switch (step.type) {
    case 'word_card':     renderWordCard(step); break;
    case 'grammar':       renderGrammar(step); break;
    case 'mcq_meaning':   renderMCQ(step, 'meaning'); break;
    case 'mcq_hanzi':     renderMCQ(step, 'hanzi'); break;
    case 'tf_sentence':   renderTrueFalse(step, false); break;
    case 'listen_tf':     renderListenTF(step); break;
    case 'fill_blank':    renderFillBlank(step); break;
    case 'sentence_order':renderSentenceOrder(step); break;
    case 'match':         renderMatch(step); break;
    case 'error_correction': renderErrorCorrection(step); break;
    case 'reading_passage':  renderReadingPassage(step); break;
    case 'pinyin_type':      renderPinyinType(step); break;
    case 'listen_sentence':  renderListenSentence(step); break;
    case 'translate_order':  renderTranslateOrder(step); break;
    default: nextStep();
  }

  if (step.speed) startSpeedTimer();
}

// ── MCQ
function renderMCQ(step, mode) {
  const w = step.word;
  const pool = step.pool || [];
  let question, options, correct;

  if (mode === 'meaning') {
    question = `What does <span class="zh">${w.zh}</span> mean?`;
    correct  = w.en;
    const wrong = getDistractors(w, pool, 'en', 3).map(d => d.en);
    options = shuffle([correct, ...wrong]);
  } else {
    question = `How do you write <em style="color:var(--green);font-style:normal">"${w.en}"</em> in Chinese?`;
    correct  = w.zh;
    const wrong = getDistractors(w, pool, 'zh', 3).map(d => d.zh);
    options = shuffle([correct, ...wrong]);
  }

  const section = step.section || '';
  const sectionClass = section === 'listen' ? 'listen' : section === 'write' ? 'write' : 'read';
  const sectionLabel = section === 'listen' ? '🎧 Listening' : section === 'write' ? '✍️ Writing' : '📖 Reading';

  stepArea.innerHTML = `
    <div class="q-label ${sectionClass}">${sectionLabel}</div>
    <div class="q-text">${question}</div>
    <div class="options-grid" id="opts"></div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;

  const grid = document.getElementById('opts');
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = mode === 'hanzi' ? `<span style="font-family:'Noto Sans SC',sans-serif;font-size:22px">${opt}</span>` : opt;
    btn.addEventListener('click', () => {
      if (answeredStep) return;
      answeredStep = true;
      clearInterval(speedTimer);
      consumeEnergy();
      const isCorrect = opt === correct;
      grid.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
      btn.classList.add(isCorrect ? 'correct' : 'wrong');
      if (!isCorrect) {
        grid.querySelectorAll('.opt-btn').forEach(b => { if (b.innerHTML.includes(correct) || b.textContent.trim() === correct) b.classList.add('correct'); });
        loseHeart();
        sessionMistakes.push({ word: w, type: mode });
        addToRetry(step);
      } else {
        sessionXP += step.speed ? 2 : 1;
        updateSRS(w.id, true);
      }
      showFeedback(isCorrect, w);
      if (step.section) updateCheckpointScore(step.section, isCorrect);
      const nextBtn = document.createElement('button');
      nextBtn.className = 'btn-primary';
      nextBtn.textContent = isCorrect ? 'Continue →' : 'I understand →';
      nextBtn.addEventListener('click', nextStep);
      bottomArea.innerHTML = '';
      bottomArea.appendChild(nextBtn);
    });
    grid.appendChild(btn);
  });
}

// ── TRUE/FALSE
// _tfCorrect/_tfHint as module vars — no onclick string escaping needed
let _tfCorrect = "";
let _tfHint    = "";

function renderTrueFalse(step, isListen) {
  const w    = step.word;
  const pool = (step.pool || HSK[lesson.plan.levelNum]?.words || []).filter(x => x.zh !== w.zh);
  const isTrue     = Math.random() > 0.5;
  const spokenWord = (isTrue || pool.length === 0) ? w : rand(pool);

  _tfCorrect = isTrue ? "对" : "错";
  _tfHint    = isTrue
    ? (w.zh + " = " + w.en)
    : (spokenWord.zh + ' means "' + spokenWord.en + '", not "' + w.en + '"');

  let questionHtml;
  if (isListen) {
    questionHtml =
      '<div class="q-label listen">🎧 Listening — True or False</div>' +
      '<div class="q-text">Does the spoken word mean: <span class="zh">' + w.en + '</span></div>';
  } else {
    questionHtml =
      '<div class="q-label read">📖 Reading — True or False</div>' +
      '<div class="q-text">Does <span class="zh">' + spokenWord.zh + '</span> mean "' + w.en + '"?</div>';
  }

  stepArea.innerHTML = questionHtml +
    '<div class="tf-grid">' +
      '<button class="tf-btn" id="btn-tf-true">✓ <span class="tf-label">对 (True)</span></button>' +
      '<button class="tf-btn" id="btn-tf-false">✗ <span class="tf-label">错 (False)</span></button>' +
    '</div>' +
    '<div class="feedback" id="feedback">' +
      '<div class="fb-icon"></div>' +
      '<div><div class="fb-main"></div><div class="fb-hint"></div></div>' +
    '</div>';

  document.getElementById("btn-tf-true").addEventListener("click",  function() { handleTF("对", this); });
  document.getElementById("btn-tf-false").addEventListener("click", function() { handleTF("错", this); });

  if (isListen) {
    speak(spokenWord.zh);
    const listenBtn = document.createElement("button");
    listenBtn.className = "btn-play-big";
    listenBtn.innerHTML = '<span class="play-icon">🔊</span> Tap to hear again';
    listenBtn.addEventListener("click", function() { speak(spokenWord.zh); });
    const tfGrid = stepArea.querySelector(".tf-grid");
    if (tfGrid) stepArea.insertBefore(listenBtn, tfGrid);
  }
}

function renderListenTF(step) { renderTrueFalse(step, true); }

function handleTF(chosen, btn) {
  if (answeredStep) return;
  answeredStep = true;
  clearInterval(speedTimer);
  const isCorrect = (chosen === _tfCorrect);
  const step      = steps[currentStep];
  const truBtn = document.getElementById("btn-tf-true");
  const flsBtn = document.getElementById("btn-tf-false");
  if (truBtn) truBtn.disabled = true;
  if (flsBtn) flsBtn.disabled = true;
  btn.classList.add(isCorrect ? "correct" : "wrong");
  consumeEnergy();
  if (!isCorrect) {
    const correctBtn = (_tfCorrect === "对") ? truBtn : flsBtn;
    if (correctBtn) correctBtn.classList.add("correct");
    loseHeart();
    sessionMistakes.push({ word: step.word, type: "tf" });
    addToRetry(step);
  } else {
    sessionXP += 1;
    updateSRS(step.word && step.word.id, true);
  }
  const fb = document.getElementById("feedback");
  if (fb) {
    fb.className = "feedback show " + (isCorrect ? "ok" : "err");
    fb.querySelector(".fb-icon").textContent = isCorrect ? "✓" : "✕";
    fb.querySelector(".fb-main").textContent = isCorrect ? "Correct!" : "Not quite";
    fb.querySelector(".fb-hint").textContent = _tfHint;
  }
  if (step.section) updateCheckpointScore(step.section, isCorrect);
  const tfnb = document.createElement('button'); tfnb.className='btn-primary';
  tfnb.textContent = isCorrect ? 'Continue →' : 'I understand →';
  tfnb.addEventListener('click', nextStep);
  bottomArea.innerHTML=''; bottomArea.appendChild(tfnb);
}

// SENTENCE ORDER
// ══════════════════════════════════════════════════════════
function renderSentenceOrder(step) {
  const w = step.word;
  const ex = w.ex;
  if (!ex) { nextStep(); return; }
  const fullSentence = ex.zh;
  // Split into ~4 chunks
  const chunkSize = Math.ceil(fullSentence.length / 4);
  const chunks = [];
  for (let i = 0; i < fullSentence.length; i += chunkSize) {
    chunks.push(fullSentence.slice(i, i + chunkSize));
  }
  const shuffled = shuffle([...chunks]);
  wordBankState = { chunks, shuffled, placed: [], answer: fullSentence };

  stepArea.innerHTML = `
    <div class="q-label write">✍️ Build the Sentence</div>
    <div style="font-size:12px;color:var(--ink2);margin-bottom:4px">${ex.en}</div>
    <div class="sentence-display" id="sentence-display">
      <span style="color:var(--ink3);font-size:14px">Tap words in order</span>
    </div>
    <div class="word-chips" id="word-chips"></div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;
  renderChips();
}

function renderChips() {
  const chipsEl = document.getElementById('word-chips');
  const dispEl  = document.getElementById('sentence-display');
  if (!chipsEl || !dispEl) return;
  chipsEl.innerHTML = '';
  dispEl.innerHTML = wordBankState.placed.length
    ? wordBankState.placed.join('')
    : '<span style="color:var(--ink3);font-size:14px">Tap words in order</span>';

  if (wordBankState.placed.length > 0) {
    const clearBtn = document.createElement('button');
    clearBtn.style.cssText = 'background:none;border:none;color:var(--rose);font-size:11px;font-weight:700;cursor:pointer;margin-left:6px';
    clearBtn.textContent = '✕ Clear';
    clearBtn.onclick = () => { wordBankState.placed = []; renderChips(); };
    dispEl.appendChild(clearBtn);
  }

  wordBankState.shuffled.forEach(chunk => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (wordBankState.placed.includes(chunk) ? ' used' : '');
    chip.textContent = chunk;
    chip.onclick = () => {
      if (answeredStep || wordBankState.placed.includes(chunk)) return;
      wordBankState.placed.push(chunk);
      renderChips();
      // Show Check button when all chips placed
      if (wordBankState.placed.length === wordBankState.shuffled.length) {
        const ckBtn = document.createElement('button');
        ckBtn.className = 'btn-check';
        ckBtn.textContent = 'Check →';
        ckBtn.addEventListener('click', checkSentenceOrder);
        bottomArea.innerHTML = '';
        bottomArea.appendChild(ckBtn);
      } else {
        bottomArea.innerHTML = '';
      }
    };
    chipsEl.appendChild(chip);
  });
}

function checkSentenceOrder() {
  if (answeredStep) return;
  if (!wordBankState || wordBankState.placed.length !== wordBankState.shuffled.length) return;
  answeredStep = true;
  consumeEnergy();
  const built = wordBankState.placed.join('');
  const isCorrect = built === wordBankState.answer;
  const step = steps[currentStep];
  const dispEl = document.getElementById('sentence-display');
  if (!isCorrect) {
    loseHeart();
    sessionMistakes.push({ word: step.word, type:'sentence_order' });
    addToRetry(step);
    if (dispEl) dispEl.classList.add('wrong-border');
    showFeedback(false, step.word, 'Wrong order', wordBankState.answer);
    setTimeout(() => {
      wordBankState.placed = [];
      answeredStep = false;
      if (dispEl) dispEl.classList.remove('wrong-border');
      renderChips();
      bottomArea.innerHTML = '';
    }, 1200);
    answeredStep = false;
  } else {
    sessionXP += 3;
    if (dispEl) { dispEl.classList.add('correct-border'); }
    updateSRS(step.word?.id, true);
    showFeedback(true, step.word);
    if (step.section) updateCheckpointScore(step.section, true);
    const nb = document.createElement('button'); nb.className='btn-primary';
    nb.textContent='Continue →'; nb.addEventListener('click', nextStep);
    bottomArea.innerHTML=''; bottomArea.appendChild(nb);
  }
}


// ══════════════════════════════════════════════════════════
// LISTENING SENTENCE — hear sentence, tap words to rebuild
// ══════════════════════════════════════════════════════════
function renderListenSentence(step) {
  const w = step.word;
  const ex = w.ex;
  if (!ex || !ex.zh) { nextStep(); return; }

  // Split sentence into individual Chinese words/chars (split at spaces or every 2-3 chars)
  const raw = ex.zh.replace(/[。！？，]/g,'').trim();
  // Create word tokens: prefer splitting by natural breaks
  let tokens = [];
  // Try to split into 3-5 meaningful chunks
  const allWords = HSK[lesson.plan.levelNum]?.words || [];
  // Find words from this level that appear in the sentence
  const foundWords = allWords.filter(wd => raw.includes(wd.zh) && wd.zh.length >= 2)
    .sort((a,b) => b.zh.length - a.zh.length);
  let remaining = raw;
  const usedTokens = [];
  foundWords.forEach(fw => {
    if (remaining.includes(fw.zh)) {
      remaining = remaining.replace(fw.zh, '|' + fw.zh + '|');
      usedTokens.push(fw.zh);
    }
  });
  tokens = remaining.split('|').filter(t => t.trim().length > 0);
  if (tokens.length < 3) {
    // Fallback: split every 2 chars
    tokens = [];
    for (let i=0; i<raw.length; i+=2) tokens.push(raw.slice(i,i+2));
  }
  tokens = tokens.filter(t=>t.length>0);
  const shuffled = shuffle([...tokens]);
  listenSentState = { tokens, shuffled, placed: [], answer: tokens.join('') };

  stepArea.innerHTML = '';
  const lbl = document.createElement('div'); lbl.className='q-label listen'; lbl.textContent='🎧 Build what you hear';
  stepArea.appendChild(lbl);

  // Play button
  const playBtn = document.createElement('button');
  playBtn.className = 'ls-play-btn';
  playBtn.innerHTML = '<span style="font-size:20px">🔊</span> Tap to hear the sentence';
  playBtn.addEventListener('click', () => speak(ex.zh, 0.8));
  stepArea.appendChild(playBtn);

  // Build area
  const buildArea = document.createElement('div');
  buildArea.className = 'ls-build-area'; buildArea.id = 'ls-build';
  const placeholder = document.createElement('div');
  placeholder.className = 'ls-placeholder'; placeholder.id = 'ls-ph'; placeholder.textContent = 'Tap words below to build the sentence';
  buildArea.appendChild(placeholder);
  stepArea.appendChild(buildArea);

  // Word bank
  const bank = document.createElement('div'); bank.className = 'ls-word-bank'; bank.id = 'ls-bank';
  stepArea.appendChild(bank);

  // Feedback
  const fb = document.createElement('div'); fb.className='feedback'; fb.id='feedback';
  fb.innerHTML='<div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div>';
  stepArea.appendChild(fb);

  speak(ex.zh, 0.85);
  renderListenSentChips();
}

function renderListenSentChips() {
  const buildArea = document.getElementById('ls-build');
  const bank      = document.getElementById('ls-bank');
  const ph        = document.getElementById('ls-ph');
  if (!buildArea || !bank || !listenSentState) return;

  // Update build area
  if (ph) ph.style.display = listenSentState.placed.length ? 'none' : 'block';
  // Remove old placed chips
  buildArea.querySelectorAll('.ls-chip-placed').forEach(e=>e.remove());
  listenSentState.placed.forEach((tok, idx) => {
    const chip = document.createElement('div');
    chip.className = 'ls-chip-placed';
    chip.textContent = tok;
    chip.title = 'Tap to remove';
    chip.addEventListener('click', () => {
      listenSentState.placed.splice(idx,1);
      renderListenSentChips();
      bottomArea.innerHTML = '';
    });
    buildArea.appendChild(chip);
  });

  // Rebuild bank
  bank.innerHTML = '';
  listenSentState.shuffled.forEach(tok => {
    const chip = document.createElement('div');
    chip.className = 'ls-chip' + (listenSentState.placed.includes(tok) ? ' used' : '');
    chip.textContent = tok;
    chip.addEventListener('click', () => {
      if (answeredStep) return;
      // Allow same token twice if it appears twice (use count check)
      const usedCount = listenSentState.placed.filter(t=>t===tok).length;
      const totalCount = listenSentState.shuffled.filter(t=>t===tok).length;
      if (usedCount >= totalCount) return;
      listenSentState.placed.push(tok);
      renderListenSentChips();
      if (listenSentState.placed.length === listenSentState.shuffled.length) {
        const ckBtn = document.createElement('button');
        ckBtn.className = 'btn-check'; ckBtn.textContent = 'Check →';
        ckBtn.addEventListener('click', checkListenSentence);
        bottomArea.innerHTML = ''; bottomArea.appendChild(ckBtn);
      }
    });
    bank.appendChild(chip);
  });
}

function checkListenSentence() {
  if (answeredStep || !listenSentState) return;
  answeredStep = true;
  consumeEnergy();
  const built = listenSentState.placed.join('');
  const isCorrect = built === listenSentState.answer;
  const step = steps[currentStep];
  const buildArea = document.getElementById('ls-build');
  if (isCorrect) {
    if (buildArea) buildArea.classList.add('correct-border');
    sessionXP += 3; updateSRS(step.word?.id, true);
    showFeedback(true, step.word);
    if (step.section) updateCheckpointScore(step.section, true);
    const nb = document.createElement('button'); nb.className='btn-primary';
    nb.textContent='Continue →'; nb.addEventListener('click', nextStep);
    bottomArea.innerHTML=''; bottomArea.appendChild(nb);
  } else {
    loseHeart();
    sessionMistakes.push({ word: step.word, type:'listen_sentence' });
    addToRetry(step);
    if (buildArea) buildArea.classList.add('wrong-border');
    showFeedback(false, step.word, 'Not quite', listenSentState.answer);
    setTimeout(() => {
      listenSentState.placed = [];
      answeredStep = false;
      if (buildArea) { buildArea.classList.remove('wrong-border'); }
      renderListenSentChips();
      bottomArea.innerHTML = '';
    }, 1200);
    answeredStep = false;
  }
}

// MATCHING
// ══════════════════════════════════════════════════════════
function renderMatch(step) {
  const words = (step.words || []).filter(Boolean).slice(0, 4);
  if (words.length < 2) { nextStep(); return; }
  const zhItems = shuffle(words.map(w => ({ text: w.zh, id: w.id, side:'zh' })));
  const enItems = shuffle(words.map(w => ({ text: w.en, id: w.id, side:'en' })));
  let selected = null;
  let matched  = new Set();

  stepArea.innerHTML = `
    <div class="q-label read">📖 Match the Words</div>
    <div class="match-grid" id="match-grid"></div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;

  const grid = document.getElementById('match-grid');
  const col1 = document.createElement('div');
  const col2 = document.createElement('div');
  col1.style.cssText = col2.style.cssText = 'display:flex;flex-direction:column;gap:8px';

  function makeItem(item) {
    const el = document.createElement('div');
    el.className = 'match-item' + (item.side === 'zh' ? ' zh' : '');
    el.dataset.id = item.id; el.dataset.side = item.side;
    el.textContent = item.text;
    el.onclick = () => {
      if (matched.has(item.id + item.side)) return;
      if (selected === null) {
        selected = { el, item }; el.classList.add('selected');
      } else {
        if (selected.item.side === item.side) {
          selected.el.classList.remove('selected');
          selected = { el, item }; el.classList.add('selected'); return;
        }
        const isCorrect = selected.item.id === item.id;
        if (isCorrect) {
          selected.el.classList.remove('selected');
          selected.el.classList.add('matched'); el.classList.add('matched');
          matched.add(item.id + 'zh'); matched.add(item.id + 'en');
          sessionXP += 1;
          speak(words.find(w => w.id === item.id)?.zh || '');
          if (matched.size === words.length * 2) {
            answeredStep = true;
            showFeedback(true, null);
            bottomArea.innerHTML = `<button class="btn-primary" onclick="nextStep()">Continue →</button>`;
          }
        } else {
          selected.el.classList.add('wrong-shake'); el.classList.add('wrong-shake');
          loseHeart();
          setTimeout(() => { selected.el.classList.remove('selected','wrong-shake'); el.classList.remove('wrong-shake'); }, 400);
        }
        selected = null;
      }
    };
    return el;
  }
  zhItems.forEach(item => col1.appendChild(makeItem(item)));
  enItems.forEach(item => col2.appendChild(makeItem(item)));
  grid.appendChild(col1); grid.appendChild(col2);
}

// ══════════════════════════════════════════════════════════
// ERROR CORRECTION
// ══════════════════════════════════════════════════════════
function renderErrorCorrection(step) {
  const w = step.word;
  const pool = (HSK[lesson.plan.levelNum]?.words || []).filter(x => x.zh !== w.zh);
  const wrongWord = pool.length > 0 ? rand(pool) : w;
  const useWrong  = Math.random() > 0.5;
  const sentence  = w.ex?.zh || (w.zh + '很好。');
  const displayed = useWrong ? sentence.replace(w.zh, wrongWord.zh) : sentence;
  const correct   = !useWrong ? '对' : '错';
  _tfCorrect = correct;
  _tfHint    = useWrong
    ? ('Should be: ' + sentence)
    : ('Correct! ' + w.zh + ' = ' + w.en);

  stepArea.innerHTML = `
    <div class="q-label read">📖 Error Correction</div>
    <div class="q-text">Is this sentence correct?</div>
    <div class="passage-card">
      <div class="passage-text" style="font-size:18px;text-align:center">${displayed}</div>
      ${w.ex ? `<div class="passage-en" style="text-align:center">${w.ex.en}</div>` : ''}
    </div>
    <div class="tf-grid">
      <button class="tf-btn" id="btn-tf-true">✓ <span class="tf-label">Correct</span></button>
      <button class="tf-btn" id="btn-tf-false">✗ <span class="tf-label">Has an error</span></button>
    </div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;

  document.getElementById('btn-tf-true').addEventListener('click',  function() { handleTF('对', this); });
  document.getElementById('btn-tf-false').addEventListener('click', function() { handleTF('错', this); });
  speak(displayed);
}

// ══════════════════════════════════════════════════════════
// READING PASSAGE
// ══════════════════════════════════════════════════════════
function renderReadingPassage(step) {
  const w = step.word;
  const ex = w.ex;
  if (!ex) { nextStep(); return; }
  const pool = HSK[lesson.plan.levelNum]?.words || [];
  const wrong = getDistractors(w, pool, 'en', 3).map(d => d.en);
  const options = shuffle([w.en, ...wrong]);

  stepArea.innerHTML = `
    <div class="q-label read">📖 Reading Comprehension</div>
    <div class="passage-card">
      <div class="passage-title">Read and answer</div>
      <div class="passage-text">${ex.zh}</div>
      <div class="passage-py">${ex.py}</div>
    </div>
    <div class="q-text" style="margin-top:4px">What does <strong style="color:var(--green)">${w.zh}</strong> mean here?</div>
    <div class="options-grid single" id="pass-opts"></div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;

  speak(ex.zh);
  const grid = document.getElementById('pass-opts');
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.style.fontFamily = "'DM Sans', sans-serif";
    btn.onclick = () => {
      if (answeredStep) return;
      answeredStep = true;
      const isCorrect = opt === w.en;
      grid.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
      btn.classList.add(isCorrect ? 'correct' : 'wrong');
      consumeEnergy();
      if (!isCorrect) {
        grid.querySelectorAll('.opt-btn').forEach(b => { if (b.textContent === w.en) b.classList.add('correct'); });
        loseHeart();
        sessionMistakes.push({ word: w, type:'reading' });
        addToRetry(step);
      } else {
        sessionXP += 2; updateSRS(w.id, true);
      }
      showFeedback(isCorrect, w);
      if (step.section) updateCheckpointScore(step.section, isCorrect);
      const rpnb = document.createElement('button'); rpnb.className='btn-primary';
      rpnb.textContent = isCorrect ? 'Continue →' : 'I understand →';
      rpnb.addEventListener('click', nextStep);
      bottomArea.innerHTML=''; bottomArea.appendChild(rpnb);
    };
    grid.appendChild(btn);
  });
}

// ══════════════════════════════════════════════════════════
// PINYIN TYPING
// ══════════════════════════════════════════════════════════
function renderPinyinType(step) {
  const w = step.word;
  stepArea.innerHTML = `
    <div class="q-label write">✍️ Type the Pinyin</div>
    <div class="q-text">Type the pinyin for: <span class="zh">${w.zh}</span></div>
    <div style="font-size:13px;color:var(--ink3);text-align:center;margin-bottom:4px">"${w.en}"</div>
    <div class="typing-wrap">
      <input class="typing-input" id="py-input" type="text" placeholder="e.g. ni hao" autocomplete="off" autocapitalize="none" spellcheck="false"/>
    </div>
    <div class="typing-hint">Tip: type without tone marks, e.g. "ni hao"</div>
    <div class="feedback" id="feedback"><div class="fb-icon"></div><div><div class="fb-main"></div><div class="fb-hint"></div></div></div>`;
  const input = document.getElementById('py-input');
  if (input) input.focus();
  bottomArea.innerHTML = `<button class="btn-primary" onclick="checkPinyin()">Check →</button>`;
}

function stripTones(s) {
  return s.toLowerCase()
    .replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e').replace(/[īíǐì]/g,'i')
    .replace(/[ōóǒò]/g,'o').replace(/[ūúǔùǖǘǚǜ]/g,'u')
    .replace(/\s+/g,' ').trim();
}

function checkPinyin() {
  if (answeredStep) return;
  const input = document.getElementById('py-input');
  if (!input) return;
  const w = steps[currentStep].word;
  const isCorrect = stripTones(input.value.trim()) === stripTones(w.py);
  answeredStep = true;
  input.classList.add(isCorrect ? 'ok' : 'err');
  input.disabled = true;
  consumeEnergy();
  if (!isCorrect) {
    loseHeart();
    sessionMistakes.push({ word: w, type:'pinyin' });
    addToRetry(steps[currentStep]);
  } else {
    sessionXP += 2; updateSRS(w.id, true);
  }
  showFeedback(isCorrect, w, isCorrect ? null : ('Correct: ' + w.py));
  if (steps[currentStep].section) updateCheckpointScore(steps[currentStep].section, isCorrect);
  const pynb = document.createElement('button'); pynb.className='btn-primary';
  pynb.textContent = isCorrect ? 'Continue →' : 'I understand →';
  pynb.addEventListener('click', nextStep);
  bottomArea.innerHTML=''; bottomArea.appendChild(pynb);
}

// ══════════════════════════════════════════════════════════
// SPEED TIMER
// ══════════════════════════════════════════════════════════
function startSpeedTimer() {
  speedTimeLeft = 8;
  const timerWrap = document.createElement('div');
  timerWrap.innerHTML =
    '<div class="speed-bar-wrap"><div class="speed-bar" id="speed-bar" style="width:100%"></div></div>' +
    '<div class="speed-counter" id="speed-counter">8s</div>';
  stepArea.insertBefore(timerWrap, stepArea.firstChild);

  speedTimer = setInterval(() => {
    speedTimeLeft = Math.max(0, speedTimeLeft - 0.1);
    const bar = document.getElementById('speed-bar');
    const cnt = document.getElementById('speed-counter');
    if (!bar || !cnt) { clearInterval(speedTimer); return; }
    const pct = (speedTimeLeft / 8) * 100;
    bar.style.width = pct + '%';
    bar.className = 'speed-bar' + (pct < 40 ? ' warning' : '') + (pct < 15 ? ' danger' : '');
    cnt.textContent = Math.ceil(speedTimeLeft) + 's';
    if (speedTimeLeft <= 0) {
      clearInterval(speedTimer);
      if (!answeredStep) {
        answeredStep = true;
        loseHeart();
        showFeedback(false, steps[currentStep]?.word, 'Too slow!');
        bottomArea.innerHTML = `<button class="btn-primary" onclick="nextStep()">Next →</button>`;
      }
    }
  }, 100);
}

// ══════════════════════════════════════════════════════════
// FEEDBACK
// ══════════════════════════════════════════════════════════
function showFeedback(isOk, word, overrideMsg, hint) {
  playTing(isOk);
  const fb = document.getElementById('feedback');
  if (!fb) return;
  const positives = ['Great!','Perfect!','Excellent!','Correct!','Well done!'];
  fb.className = 'feedback show ' + (isOk ? 'ok' : 'err');
  fb.querySelector('.fb-icon').textContent = isOk ? '✓' : '✕';
  fb.querySelector('.fb-main').textContent = isOk
    ? positives[Math.floor(Math.random() * positives.length)]
    : (overrideMsg || 'Not quite');
  fb.querySelector('.fb-hint').textContent = hint || (word ? word.zh + ' = ' + word.en : '');
}

// ══════════════════════════════════════════════════════════
// CHECKPOINT SCORING
// ══════════════════════════════════════════════════════════
function updateCheckpointScore(section, isCorrect) {
  if (!section) return;
  checkpointScores[section + 'Total'] = (checkpointScores[section + 'Total'] || 0) + 1;
  if (isCorrect) checkpointScores[section] = (checkpointScores[section] || 0) + 1;
}

// ══════════════════════════════════════════════════════════
// SRS
// ══════════════════════════════════════════════════════════
function updateSRS(wordId, correct) {
  if (!wordId || !_uid) return;
  try {
    const srs = JSON.parse(localStorage.getItem(key('srs')) || '{}');
    const entry = srs[wordId] || { score: 0 };
    const intervals = [0, 86400000, 259200000, 604800000, 1209600000, 2592000000];
    entry.score = correct ? Math.min(5, entry.score + 1) : Math.max(0, entry.score - 1);
    entry.nextReview = Date.now() + (intervals[entry.score] || 0);
    srs[wordId] = entry;
    localStorage.setItem(key('srs'), JSON.stringify(srs));
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════
// NEXT STEP
// ══════════════════════════════════════════════════════════
function nextStep() {
  clearInterval(speedTimer);
  currentStep++;
  // If we've finished original steps, add any retry items to the end once
  if (currentStep >= steps.length && retryQueue.length > 0) {
    steps.push(...retryQueue);
    retryQueue = [];
  }
  if (currentStep >= steps.length) { showComplete(); return; }
  stepArea.className = 'step-area';
  setTimeout(() => {
    stepArea.className = 'step-area step-in';
    renderStep(currentStep);
  }, 60);
}

// Add a step to retry queue (wrong answer → added to end)
function addToRetry(step) {
  // Don't add speed or word_card/grammar steps to retry
  if (step.speed || step.type === 'word_card' || step.type === 'grammar') return;
  retryQueue.push({...step, isRetry: true});
}

// ══════════════════════════════════════════════════════════
// COMPLETE SCREEN
// ══════════════════════════════════════════════════════════
async function showComplete() {
  clearInterval(speedTimer);
  progressEl.style.width = '100%';
  bottomArea.innerHTML = '';

  const plan    = lesson.plan;
  const isCP    = plan.isCheckpoint;
  const isSpeed = plan.isSpeed;
  let earnedXP  = sessionXP + (isSpeed ? 20 : 10);
  if (isCP) earnedXP += 15;

  // Save progress
  const completedLessons = JSON.parse(localStorage.getItem(key('completed_lessons')) || '[]');
  if (!completedLessons.includes(plan.lessonNum)) {
    const newXP = Number(localStorage.getItem(key('xp')) || 0) + earnedXP;
    localStorage.setItem(key('xp'), newXP);
    localStorage.setItem(key('completed_lessons'), JSON.stringify([...completedLessons, plan.lessonNum]));
    localStorage.setItem(key('user_lesson'), String(plan.lessonNum + 1));

    // Daily count
    const today = new Date().toDateString();
    if (localStorage.getItem(key('lesson_day')) !== today) {
      localStorage.setItem(key('lesson_day'), today);
      localStorage.setItem(key('lessons_today'), '0');
    }
    const done = Number(localStorage.getItem(key('lessons_today')) || 0) + 1;
    localStorage.setItem(key('lessons_today'), done);

    // Streak
    const streakToday   = new Date().toDateString();
    const yesterday     = new Date(Date.now() - 86400000).toDateString();
    const lastStreakDay = localStorage.getItem(key('streak_day'));
    let streak = Number(localStorage.getItem(key('streak')) || 0);
    if (lastStreakDay !== streakToday) {
      streak = lastStreakDay === yesterday ? streak + 1 : 1;
      localStorage.setItem(key('streak'), streak);
      localStorage.setItem(key('streak_day'), streakToday);
    }
    await saveXP(earnedXP);

    // Diamonds reward
    const diamondsEarned = isCP ? 10 : isSpeed ? 5 : 3;
    diamonds += diamondsEarned;
    renderDiamonds();
  }

  // Perfect lesson bonus energy
  const isPerfect = sessionMistakes.length === 0 && steps.length >= 5;
  if (isPerfect) {
    energy = Math.min(MAX_ENERGY, energy + 1);
    renderEnergy();
    // Show energy bonus animation
    setTimeout(() => {
      const anim = document.getElementById('energy-bonus-anim');
      if (anim) {
        anim.classList.add('show');
        playTing(true);
        setTimeout(() => anim.classList.remove('show'), 1800);
      }
    }, 600);
  }

  // Checkpoint ring
  let ringHtml = '';
  if (isCP) {
    const total   = (checkpointScores.listenTotal||0) + (checkpointScores.readTotal||0) + (checkpointScores.writeTotal||0);
    const correct = (checkpointScores.listen||0) + (checkpointScores.read||0) + (checkpointScores.write||0);
    const pct     = total > 0 ? Math.round((correct / total) * 100) : 0;
    const circ    = 2 * Math.PI * 52;
    const offset  = circ * (1 - pct / 100);
    ringHtml = `
      <div class="score-ring-wrap">
        <svg viewBox="0 0 120 120"><circle class="score-ring-track" cx="60" cy="60" r="52"/><circle class="score-ring-fill" cx="60" cy="60" r="52" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/></svg>
        <div class="score-ring-text"><div class="score-pct">${pct}%</div><div class="score-label">Score</div></div>
      </div>
      <div class="checkpoint-section-scores">
        <div class="section-score"><div class="ss-label">Listening</div><div class="ss-val listen">${checkpointScores.listen||0}/${checkpointScores.listenTotal||0}</div></div>
        <div class="section-score"><div class="ss-label">Reading</div><div class="ss-val read">${checkpointScores.read||0}/${checkpointScores.readTotal||0}</div></div>
        <div class="section-score"><div class="ss-label">Writing</div><div class="ss-val write">${checkpointScores.write||0}/${checkpointScores.writeTotal||0}</div></div>
      </div>`;
  }

  const accuracy = steps.length > 0
    ? Math.round(((steps.length - sessionMistakes.length) / steps.length) * 100)
    : 100;

  stepArea.innerHTML = `
    <div class="complete-screen">
      <div class="complete-emoji">${isCP ? '🏆' : isSpeed ? '⚡' : '🎉'}</div>
      <div class="complete-title">${isCP ? 'Checkpoint Complete!' : isSpeed ? 'Speed Challenge Done!' : 'Lesson Complete!'}</div>
      <div class="complete-sub">${plan.name} · HSK ${plan.levelNum}</div>
      ${ringHtml}
      <div class="xp-pill" id="xp-pill">+${earnedXP} XP</div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        ${isPerfect ? '<div style="background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);border-radius:999px;padding:5px 14px;font-size:13px;font-weight:700;color:var(--gold)">⚡ +1 Energy Bonus!</div>' : ''}
        <div style="background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);border-radius:999px;padding:5px 14px;font-size:13px;font-weight:700;color:var(--purple)">💎 +${isCP?10:isSpeed?5:3} Diamonds</div>
      </div>
      <div class="complete-stats">
        <div class="stat-box"><div class="sv">${steps.length}</div><div class="sl">Steps</div></div>
        <div class="stat-box"><div class="sv">${sessionMistakes.length}</div><div class="sl">Errors</div></div>
        <div class="stat-box"><div class="sv">${accuracy}%</div><div class="sl">Accuracy</div></div>
        <div class="stat-box"><div class="sv">${hearts}❤️</div><div class="sl">Hearts</div></div>
      </div>
      <div class="complete-actions">
        <button class="btn-primary" onclick="window.location.href='/app/dashboard.html'">Back to Home</button>
        <button class="btn-ad" id="btn-double-xp" onclick="doubleXP(${earnedXP})">🎥 Watch Ad for Bonus XP</button>
      </div>
    </div>`;
}

let doubleUsed = false;
function doubleXP(base) {
  if (doubleUsed) return;
  const btn = document.getElementById('btn-double-xp');
  if (btn) { btn.disabled = true; btn.textContent = '🎥 Loading ad…'; }
  setTimeout(() => {
    doubleUsed = true;
    const bonus = Math.round(base / 2) + 5;
    const newXP = Number(localStorage.getItem(key('xp')) || 0) + bonus;
    localStorage.setItem(key('xp'), newXP);
    saveXP(bonus);
    const pill = document.getElementById('xp-pill');
    if (pill) { const cur = parseInt(pill.textContent) || 0; pill.textContent = '+' + (cur + bonus) + ' XP 🔥'; }
    if (btn) btn.textContent = '✅ Bonus XP Claimed!';
    showToast('+' + bonus + ' Bonus XP! 🔥');
  }, 1500);
}

// ══════════════════════════════════════════════════════════
// SAVE XP TO SUPABASE
// ══════════════════════════════════════════════════════════
async function saveXP(earned) {
  try {
    const sb = window._sb;
    if (!sb || !_uid) return;
    const totalXP  = Number(localStorage.getItem(key('xp')) || 0);
    const hskLevel = Number(localStorage.getItem(key('user_level')) || 1);
    // Resolve username: localStorage → user_metadata → email prefix → fallback
    let username = localStorage.getItem('username_' + _uid);
    if (!username) {
      try {
        const { data: ud } = await sb.auth.getUser();
        const u = ud?.user;
        username = u?.user_metadata?.full_name
          || u?.user_metadata?.username
          || u?.email?.split('@')[0]
          || null;
        if (username) localStorage.setItem('username_' + _uid, username);
      } catch(_e) {}
    }
    if (!username) username = 'Learner ' + _uid.slice(0,6).toUpperCase();
    await sb.from('leaderboard').upsert({
      user_id: _uid,
      xp: totalXP,
      username: username,
      hsk_level: hskLevel
    }, { onConflict: 'user_id' });
  } catch(e) { console.warn('saveXP:', e); }
}

// ══════════════════════════════════════════════════════════
// NO HEARTS AD
// ══════════════════════════════════════════════════════════
function watchAdForHeart() {
  const btn = document.getElementById('nh-watch-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
  const barWrap = document.getElementById('nh-ad-bar');
  const fill    = document.getElementById('nh-ad-fill');
  const label   = document.getElementById('nh-ad-label');
  if (barWrap) barWrap.style.display = 'block';
  let elapsed = 0;
  nhAdTimer = setInterval(() => {
    elapsed += 80;
    if (fill)  fill.style.width = Math.min(100, (elapsed / 5000) * 100) + '%';
    if (label) label.textContent = elapsed < 5000 ? 'Please wait ' + Math.ceil((5000 - elapsed) / 1000) + 's…' : 'Done!';
    if (elapsed >= 5000) {
      clearInterval(nhAdTimer);
      hearts = Math.min(5, hearts + 1);
      localStorage.setItem(key('hearts'), hearts);
      renderHearts();
      document.getElementById('nh-overlay').classList.remove('show');
      showToast('❤️ +1 Heart! Keep going!');
    }
  }, 80);
}

// ══════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
async function init() {
  try {
    const { data } = await sb.auth.getSession();
    const user = data?.session?.user;
    if (!user) { window.location.replace('/app/login.html'); return; }
    _uid = user.id;

    hearts = Number(localStorage.getItem(key('hearts')) ?? 5);
    xp     = Number(localStorage.getItem(key('xp')) || 0);
    if (isNaN(hearts) || hearts < 0) hearts = 5;
    renderHearts();
    loadEnergy();

    const levelNum  = Number(params.get('level')  || localStorage.getItem(key('user_level'))  || 1);
    const lessonNum = Number(params.get('lesson') || localStorage.getItem(key('user_lesson')) || 1);

    const plan = getLessonPlan(levelNum, lessonNum);
    lesson = { plan };
    steps  = buildSteps(plan);

    if (!steps || steps.length === 0) {
      window.location.replace('/app/dashboard.html'); return;
    }

    document.getElementById('info-tag').textContent  = 'HSK ' + levelNum + ' · Lesson ' + lessonNum;
    document.getElementById('info-type').textContent = plan.name;

    document.getElementById('btn-close').onclick = () => {
      if (confirm('Leave this lesson? Progress will be lost.')) {
        window.location.href = '/app/dashboard.html';
      }
    };

    // Wire energy overlay buttons
    const eoAdBtn = document.getElementById('eo-ad-btn');
    if (eoAdBtn) eoAdBtn.addEventListener('click', watchEnergyAd);
    const eoProBtn = document.getElementById('eo-pro-btn');
    if (eoProBtn) eoProBtn.addEventListener('click', () => showToast('Pro subscription coming soon! 🌟'));
    const eoQuitBtn = document.getElementById('eo-quit-btn');
    if (eoQuitBtn) eoQuitBtn.addEventListener('click', loseAllPointsAndQuit);

    if (hearts <= 0) {
      document.getElementById('nh-overlay').classList.add('show');
    } else {
      try {
        renderStep(0);
      } catch(renderErr) {
        const sa = document.getElementById('step-area');
        if (sa) sa.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--rose);font-size:14px;word-break:break-all"><strong>Render Error:</strong><br/>' + renderErr.message + '<br/><br/><a href="/app/dashboard.html" style="color:var(--green)">← Back</a></div>';
      }
    }

  } catch(e) {
    const sa = document.getElementById('step-area');
    if (sa) sa.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--rose);font-size:14px;word-break:break-all"><strong>Init Error:</strong><br/>' + e.message + '<br/><br/><a href="/app/dashboard.html" style="color:var(--green)">← Back</a></div>';
  }
}

init();
</script>
