  {id:'3-265',zh:'损失',py:'sǔnshī',en:"loss / to lose",ex:{zh:'这次投资造成了很大损失。',py:'Zhè cì tóuzī zàochéngle hěn dà sǔnshī.',en:"This investment caused great losses."}},
  {id:'3-266',zh:'塔',py:'tǎ',en:"tower / pagoda",ex:{zh:'这是一座很高的塔。',py:'Zhè shì yī zuò hěn gāo de tǎ.',en:"This is a very tall tower."}},
  {id:'3-267',zh:'台',py:'tái',en:"platform / stage (measure word)",ex:{zh:'舞台上有很多表演者。',py:'Wǔtái shàng yǒu hěn duō biǎoyǎnzhě.',en:"There are many performers on the stage."}},
  {id:'3-268',zh:'抬',py:'tái',en:"to lift / to carry together",ex:{zh:'他们抬着重物走路。',py:'Tāmen táizhe zhòngwù zǒulù.',en:"They walked while carrying heavy objects."}},
  {id:'3-269',zh:'讨厌',py:'tǎoyàn',en:"to dislike / annoying",ex:{zh:'我讨厌噪音。',py:'Wǒ tǎoyàn zàoyīn.',en:"I dislike noise."}},
  {id:'3-270',zh:'提',py:'tí',en:"to mention / to carry",ex:{zh:'他提了一些好建议。',py:'Tā tíle yīxiē hǎo jiànyì.',en:"He made some good suggestions."}},
  {id:'3-271',zh:'推',py:'tuī',en:"to push",ex:{zh:'他推开了门。',py:'Tā tuīkāile mén.',en:"He pushed open the door."}},
  {id:'3-272',zh:'脱',py:'tuō',en:"to take off / to remove",ex:{zh:'进屋请脱鞋。',py:'Jìn wū qǐng tuō xié.',en:"Please take off your shoes when entering."}},
  {id:'3-273',zh:'外',py:'wài',en:"outside / foreign",ex:{zh:'门外有人。',py:'Mén wài yǒu rén.',en:"There is someone outside the door."}},
  {id:'3-274',zh:'万',py:'wàn',en:"ten thousand",ex:{zh:'这本书卖了一万册。',py:'Zhè běn shū màile yīwàn cè.',en:"This book sold ten thousand copies."}},
  {id:'3-275',zh:'危险',py:'wēixiǎn',en:"dangerous",ex:{zh:'那条路很危险。',py:'Nà tiáo lù hěn wēixiǎn.',en:"That road is very dangerous."}},
  {id:'3-276',zh:'味道',py:'wèidào',en:"taste / flavor",ex:{zh:'这道菜味道很好。',py:'Zhè dào cài wèidào hěn hǎo.',en:"This dish tastes very good."}},
  {id:'3-277',zh:'温度',py:'wēndù',en:"temperature",ex:{zh:'今天温度很高。',py:'Jīntiān wēndù hěn gāo.',en:"The temperature is very high today."}},
  {id:'3-278',zh:'文件',py:'wénjiàn',en:"document / file",ex:{zh:'请把文件发给我。',py:'Qǐng bǎ wénjiàn fā gěi wǒ.',en:"Please send me the document."}},
  {id:'3-279',zh:'问候',py:'wènhòu',en:"to send greetings / regards",ex:{zh:'请代我问候他的家人。',py:'Qǐng dài wǒ wènhòu tā de jiārén.',en:"Please convey my regards to his family."}},
  {id:'3-280',zh:'握手',py:'wòshǒu',en:"to shake hands",ex:{zh:'他们握手表示友好。',py:'Tāmen wòshǒu biǎoshì yǒuhǎo.',en:"They shook hands to show friendliness."}},
  {id:'3-281',zh:'西瓜',py:'xīguā',en:"watermelon",ex:{zh:'夏天吃西瓜很解暑。',py:'Xiàtiān chī xīguā hěn jiě shǔ.',en:"Eating watermelon in summer beats the heat."}},
  {id:'3-282',zh:'吸引',py:'xīyǐn',en:"to attract",ex:{zh:'这部电影很吸引人。',py:'Zhè bù diànyǐng hěn xīyǐn rén.',en:"This movie is very attractive."}},
  {id:'3-283',zh:'习惯',py:'xíguàn',en:"habit / to be used to",ex:{zh:'我已经习惯了这里的生活。',py:'Wǒ yǐjīng xíguàn le zhèlǐ de shēnghuó.',en:"I am already used to life here."}},
  {id:'3-284',zh:'细心',py:'xìxīn',en:"careful / attentive",ex:{zh:'做事要细心。',py:'Zuòshì yào xìxīn.',en:"You should be careful in everything you do."}},
  {id:'3-285',zh:'系',py:'xì',en:"department / to tie",ex:{zh:'他在中文系学习。',py:'Tā zài Zhōngwén xì xuéxí.',en:"He studies in the Chinese department."}},
  {id:'3-286',zh:'下载',py:'xiàzǎi',en:"to download",ex:{zh:'我下载了一个新应用。',py:'Wǒ xiàzǎile yīgè xīn yìngyòng.',en:"I downloaded a new application."}},
  {id:'3-287',zh:'现代',py:'xiàndài',en:"modern",ex:{zh:'他喜欢现代风格的建筑。',py:'Tā xǐhuān xiàndài fēnggé de jiànzhù.',en:"He likes modern style architecture."}},
  {id:'3-288',zh:'限制',py:'xiànzhì',en:"to limit / restriction",ex:{zh:'这里速度有限制。',py:'Zhèlǐ sùdù yǒu xiànzhì.',en:"There is a speed limit here."}},
  {id:'3-289',zh:'羡慕',py:'xiànmù',en:"to envy / to admire",ex:{zh:'我很羡慕他的才能。',py:'Wǒ hěn xiànmù tā de cáinéng.',en:"I admire his talent greatly."}},
  {id:'3-290',zh:'消费',py:'xiāofèi',en:"to consume / consumption",ex:{zh:'这家店消费很高。',py:'Zhè jiā diàn xiāofèi hěn gāo.',en:"Spending at this shop is very high."}},
  {id:'3-291',zh:'小心',py:'xiǎoxīn',en:"careful / watch out",ex:{zh:'小心，地上很滑。',py:'Xiǎoxīn, dì shàng hěn huá.',en:"Be careful, the floor is slippery."}},
  {id:'3-292',zh:'心情',py:'xīnqíng',en:"mood / state of mind",ex:{zh:'今天他心情很好。',py:'Jīntiān tā xīnqíng hěn hǎo.',en:"He is in a good mood today."}},
  {id:'3-293',zh:'幸福',py:'xìngfú',en:"happiness / happy",ex:{zh:'他们一家人很幸福。',py:'Tāmen yījiārén hěn xìngfú.',en:"Their whole family is very happy."}},
  {id:'3-294',zh:'许多',py:'xǔduō',en:"many / a lot of",ex:{zh:'这里有许多有趣的地方。',py:'Zhèlǐ yǒu xǔduō yǒuqù de dìfang.',en:"There are many interesting places here."}},
  {id:'3-295',zh:'学期',py:'xuéqī',en:"semester / school term",ex:{zh:'这个学期很充实。',py:'Zhège xuéqī hěn chōngshí.',en:"This semester has been very fulfilling."}},
  {id:'3-296',zh:'压力',py:'yālì',en:"pressure / stress",ex:{zh:'他工作压力很大。',py:'Tā gōngzuò yālì hěn dà.',en:"He has a lot of work pressure."}},
  {id:'3-297',zh:'严格',py:'yángé',en:"strict / rigorous",ex:{zh:'这位老师要求很严格。',py:'Zhè wèi lǎoshī yāoqiú hěn yángé.',en:"This teacher has very strict requirements."}},
  {id:'3-298',zh:'研究',py:'yánjiū',en:"research / to study",ex:{zh:'他正在研究这个问题。',py:'Tā zhèngzài yánjiū zhège wèntí.',en:"He is researching this problem."}},
  {id:'3-299',zh:'演讲',py:'yǎnjiǎng',en:"speech / to give a speech",ex:{zh:'他做了一个精彩的演讲。',py:'Tā zuòle yīgè jīngcǎi de yǎnjiǎng.',en:"He gave a wonderful speech."}},
  {id:'3-300',zh:'一般',py:'yībān',en:"general / ordinary / usually",ex:{zh:'他一般七点起床。',py:'Tā yībān qī diǎn qǐchuáng.',en:"He usually gets up at seven."}},
],grammar:[
  {title:'把 Construction',pattern:'Subject + 把 + Object + Verb + Result',explain:'把 moves the object before the verb to emphasize what happens to it.',examples:[{zh:'请把窗户关上。',en:"Please close the window."},{zh:'他把作业做完了。',en:"He finished the homework."}]},
  {title:'比 Comparison',pattern:'A + 比 + B + Adjective',explain:'Used to compare two things directly.',examples:[{zh:'今天比昨天冷。',en:"Today is colder than yesterday."},{zh:'他比我高。',en:"He is taller than me."}]},
  {title:'是...的 Construction',pattern:'是 + time/place/manner + 的',explain:'Emphasizes when, where, or how a past action occurred.',examples:[{zh:'我是昨天来的。',en:"It was yesterday that I came."},{zh:'他是坐飞机去的。',en:"He went by plane."}]},
{title:'得 Degree Complement',pattern:'Verb + 得 + Adjective/Result',explain:'得 connects a verb to describe HOW the action was performed. Used to evaluate quality or result.',examples:[{zh:'他说得很好。',en:"He speaks very well."},{zh:'她跑得很快。',en:"She runs very fast."}]},
  {title:'被 Passive',pattern:'Subject + 被 + Agent + Verb',explain:'被 marks passive voice. The subject receives the action. Common when something negative happens.',examples:[{zh:'他的钱包被偷了。',en:"His wallet was stolen."},{zh:'作业被老师批改了。',en:"The homework was corrected by the teacher."}]},
  {title:'连...都/也',pattern:'连 + noun/verb + 都/也 + verb',explain:'Emphasizes "even". Shows something surprising or extreme is included.',examples:[{zh:'他连饭都没吃就去上学了。',en:"He went to school without even eating."},{zh:'这道题连老师也不会。',en:"Even the teacher can't do this question."}]},
  {title:'不但...而且',pattern:'不但 + A + 而且 + B',explain:'Means "not only A but also B". Used to add emphasis by stacking positive qualities.',examples:[{zh:'他不但会说中文，而且会说日语。',en:"He not only speaks Chinese but also Japanese."},{zh:'这里不但便宜，而且好吃。',en:"Not only is it cheap here, but also delicious."}]},
  {title:'虽然...但是',pattern:'虽然 + A + 但是/可是 + B',explain:'Means "although A, but B". A concession followed by a contrasting point.',examples:[{zh:'虽然很贵，但是质量很好。',en:"Although expensive, the quality is very good."},{zh:'虽然下雨了，但是我们还是去了。',en:"Although it rained, we still went."}]},
  {title:'只要...就',pattern:'只要 + condition + 就 + result',explain:'Means "as long as... then". A sufficient condition for the result.',examples:[{zh:'只要努力，就会成功。',en:"As long as you work hard, you will succeed."},{zh:'只要你来，我就高兴。',en:"As long as you come, I will be happy."}]},
  {title:'先...再/然后',pattern:'先 + action 1 + 再/然后 + action 2',explain:'Shows sequential actions: first do A then do B.',examples:[{zh:'先洗手，再吃饭。',en:"Wash hands first, then eat."},{zh:'先做完作业，然后再玩。',en:"Finish homework first, then play."}]},
  {title:'一边...一边',pattern:'一边 + action 1 + 一边 + action 2',explain:'Shows two actions happening simultaneously.',examples:[{zh:'他一边吃饭一边看电视。',en:"He eats while watching TV."},{zh:'她一边唱歌一边跳舞。',en:"She sings while dancing."}]},
  {title:'既...又',pattern:'既 + A + 又 + B',explain:'Means "both A and B". Used to describe two qualities that coexist.',examples:[{zh:'这道菜既好看又好吃。',en:"This dish is both beautiful and delicious."},{zh:'他既聪明又勤奋。',en:"He is both smart and hardworking."}]},
  {title:'越来越 / 越...越',pattern:'越来越 + adj  OR  越 + A + 越 + B',explain:'越来越 = getting more and more. 越A越B = the more A the more B.',examples:[{zh:'他的中文越来越好了。',en:"His Chinese is getting better and better."},{zh:'越努力越成功。',en:"The harder you work the more successful you are."}]},
  {title:'除了...以外/之外',pattern:'除了 + exception + 以外/之外',explain:'Means "besides / except for". Can add with 还/都.',examples:[{zh:'除了他以外，大家都来了。',en:"Everyone came except for him."},{zh:'除了中文，他还学了日语。',en:"Besides Chinese, he also studied Japanese."}]},
]},
4:{words:[
  {id:'4-1',zh:'按时',py:'ànshí',en:"on time",ex:{zh:'请按时完成作业。',py:'Qǐng ànshí wánchéng zuòyè.',en:"Please finish the homework on time."}},
  {id:'4-2',zh:'把握',py:'bǎwò',en:"to grasp / confidence",ex:{zh:'他对这次考试很有把握。',py:'Tā duì zhè cì kǎoshì hěn yǒu bǎwò.',en:"He is very confident about this exam."}},
  {id:'4-3',zh:'摆',py:'bǎi',en:"to place / to arrange",ex:{zh:'把书摆整齐。',py:'Bǎ shū bǎi zhěngqí.',en:"Arrange the books neatly."}},
  {id:'4-4',zh:'保持',py:'bǎochí',en:"to keep / to maintain",ex:{zh:'保持联系很重要。',py:'Bǎochí liánxì hěn zhòngyào.',en:"Keeping in touch is important."}},
  {id:'4-5',zh:'保存',py:'bǎocún',en:"to preserve / to save",ex:{zh:'请保存好这份文件。',py:'Qǐng bǎocún hǎo zhè fèn wénjiàn.',en:"Please save this document."}},
  {id:'4-6',zh:'报告',py:'bàogào',en:"report / to report",ex:{zh:'他写了一份工作报告。',py:'Tā xiěle yī fèn gōngzuò bàogào.',en:"He wrote a work report."}},
  {id:'4-7',zh:'报名',py:'bàomíng',en:"to sign up / to register",ex:{zh:'我已经报名参加比赛了。',py:'Wǒ yǐjīng bàomíng cānjiā bǐsài le.',en:"I have already signed up for the competition."}},
  {id:'4-8',zh:'悲观',py:'bēiguān',en:"pessimistic",ex:{zh:'不要太悲观，要有信心。',py:'Bùyào tài bēiguān, yào yǒu xìnxīn.',en:"Don't be too pessimistic, have confidence."}},
  {id:'4-9',zh:'本来',py:'běnlái',en:"originally / at first",ex:{zh:'本来我想去，但是太忙了。',py:'Běnlái wǒ xiǎng qù, dànshì tài máng le.',en:"I originally wanted to go but was too busy."}},
  {id:'4-10',zh:'必然',py:'bìrán',en:"inevitable / certainly",ex:{zh:'努力学习必然会成功。',py:'Nǔlì xuéxí bìrán huì chénggōng.',en:"Hard study will inevitably lead to success."}},
  {id:'4-11',zh:'避免',py:'bìmiǎn',en:"to avoid",ex:{zh:'我们要避免犯同样的错误。',py:'Wǒmen yào bìmiǎn fàn tóngyàng de cuòwù.',en:"We should avoid making the same mistakes."}},
  {id:'4-12',zh:'编辑',py:'biānjí',en:"editor / to edit",ex:{zh:'他是一名杂志编辑。',py:'Tā shì yī míng zázhì biānjí.',en:"He is a magazine editor."}},
  {id:'4-13',zh:'标准',py:'biāozhǔn',en:"standard / criterion",ex:{zh:'这个产品符合质量标准。',py:'Zhège chǎnpǐn fúhé zhìliàng biāozhǔn.',en:"This product meets quality standards."}},
  {id:'4-14',zh:'表达',py:'biǎodá',en:"to express",ex:{zh:'他很难表达自己的感情。',py:'Tā hěn nán biǎodá zìjǐ de gǎnqíng.',en:"He finds it hard to express his feelings."}},
  {id:'4-15',zh:'表面',py:'biǎomiàn',en:"surface / appearance",ex:{zh:'不要只看表面现象。',py:'Bùyào zhǐ kàn biǎomiàn xiànxiàng.',en:"Don't just look at the surface phenomenon."}},
  {id:'4-16',zh:'表明',py:'biǎomíng',en:"to indicate / to show",ex:{zh:'数据表明情况在改善。',py:'Shùjù biǎomíng qíngkuàng zài gǎishàn.',en:"The data shows the situation is improving."}},
  {id:'4-17',zh:'不断',py:'bùduàn',en:"continuously / constantly",ex:{zh:'他不断努力提高自己。',py:'Tā bùduàn nǔlì tígāo zìjǐ.',en:"He constantly works to improve himself."}},
  {id:'4-18',zh:'不得不',py:'bùdébù',en:"have no choice but to",ex:{zh:'天黑了，我不得不回家。',py:'Tiān hēi le, wǒ bùdébù huíjiā.',en:"It got dark so I had no choice but to go home."}},
  {id:'4-19',zh:'不管',py:'bùguǎn',en:"no matter / regardless",ex:{zh:'不管多难，我都要坚持。',py:'Bùguǎn duō nán, wǒ dōu yào jiānchí.',en:"No matter how difficult, I will persist."}},
  {id:'4-20',zh:'不仅',py:'bùjǐn',en:"not only",ex:{zh:'他不仅聪明，而且勤奋。',py:'Tā bùjǐn cōngming, érqiě qínfèn.',en:"He is not only smart but also hardworking."}},
  {id:'4-21',zh:'财产',py:'cáichǎn',en:"property / assets",ex:{zh:'他拥有大量财产。',py:'Tā yōngyǒu dàliàng cáichǎn.',en:"He owns a large amount of property."}},
  {id:'4-22',zh:'采取',py:'cǎiqǔ',en:"to adopt / to take measures",ex:{zh:'政府采取了有效措施。',py:'Zhèngfǔ cǎiqǔle yǒuxiào cuòshī.',en:"The government adopted effective measures."}},
  {id:'4-23',zh:'策略',py:'cèlüè',en:"strategy / tactics",ex:{zh:'我们需要改变策略。',py:'Wǒmen xūyào gǎibiàn cèlüè.',en:"We need to change our strategy."}},
  {id:'4-24',zh:'曾经',py:'céngjīng',en:"once / formerly / used to",ex:{zh:'他曾经在北京工作过。',py:'Tā céngjīng zài Běijīng gōngzuò guò.',en:"He once worked in Beijing."}},
  {id:'4-25',zh:'产生',py:'chǎnshēng',en:"to produce / to generate",ex:{zh:'压力会产生负面影响。',py:'Yālì huì chǎnshēng fùmiàn yǐngxiǎng.',en:"Stress can produce negative effects."}},
  {id:'4-26',zh:'超过',py:'chāoguò',en:"to exceed / to surpass",ex:{zh:'他的成绩超过了我。',py:'Tā de chéngjì chāoguòle wǒ.',en:"His grades exceeded mine."}},
  {id:'4-27',zh:'沉默',py:'chénmò',en:"silent / to be silent",ex:{zh:'他沉默了很长时间。',py:'Tā chénmòle hěn cháng shíjiān.',en:"He was silent for a long time."}},
  {id:'4-28',zh:'程度',py:'chéngdù',en:"degree / extent / level",ex:{zh:'他的中文达到了很高的程度。',py:'Tā de Zhōngwén dádàole hěn gāo de chéngdù.',en:"His Chinese has reached a high level."}},
  {id:'4-29',zh:'吃亏',py:'chīkuī',en:"to suffer a loss / to be at a disadvantage",ex:{zh:'不懂法律会吃亏。',py:'Bù dǒng fǎlǜ huì chīkuī.',en:"Not knowing the law puts you at a disadvantage."}},
  {id:'4-30',zh:'传统',py:'chuántǒng',en:"tradition / traditional",ex:{zh:'中国有很多传统节日。',py:'Zhōngguó yǒu hěn duō chuántǒng jiérì.',en:"China has many traditional festivals."}},
  {id:'4-31',zh:'此外',py:'cǐwài',en:"moreover / in addition",ex:{zh:'此外，我们还需要更多时间。',py:'Cǐwài, wǒmen hái xūyào gèng duō shíjiān.',en:"Moreover, we also need more time."}},
  {id:'4-32',zh:'聪明',py:'cōngming',en:"clever / intelligent",ex:{zh:'她是一个聪明的孩子。',py:'Tā shì yīgè cōngming de háizi.',en:"She is a clever child."}},
  {id:'4-33',zh:'存在',py:'cúnzài',en:"to exist / existence",ex:{zh:'这个问题依然存在。',py:'Zhège wèntí yīrán cúnzài.',en:"This problem still exists."}},
  {id:'4-34',zh:'错误',py:'cuòwù',en:"mistake / error",ex:{zh:'每个人都会犯错误。',py:'Měi gè rén dōu huì fàn cuòwù.',en:"Everyone makes mistakes."}},
  {id:'4-35',zh:'达到',py:'dádào',en:"to achieve / to reach",ex:{zh:'他达到了自己的目标。',py:'Tā dádàole zìjǐ de mùbiāo.',en:"He achieved his goal."}},
  {id:'4-36',zh:'代表',py:'dàibiǎo',en:"representative / to represent",ex:{zh:'她代表学校参加比赛。',py:'Tā dàibiǎo xuéxiào cānjiā bǐsài.',en:"She represented the school in the competition."}},
  {id:'4-37',zh:'当地',py:'dāngdì',en:"local",ex:{zh:'当地居民非常友好。',py:'Dāngdì jūmín fēicháng yǒuhǎo.',en:"The local residents are very friendly."}},
  {id:'4-38',zh:'当时',py:'dāngshí',en:"at that time",ex:{zh:'当时我不知道这件事。',py:'Dāngshí wǒ bù zhīdào zhè jiàn shì.',en:"At that time I didn't know about this."}},
  {id:'4-39',zh:'导致',py:'dǎozhì',en:"to lead to / to cause",ex:{zh:'粗心导致了这次失败。',py:'Cūxīn dǎozhìle zhè cì shībài.',en:"Carelessness led to this failure."}},
  {id:'4-40',zh:'道理',py:'dàolǐ',en:"reason / truth / principle",ex:{zh:'你说的很有道理。',py:'Nǐ shuō de hěn yǒu dàolǐ.',en:"What you say makes a lot of sense."}},
  {id:'4-41',zh:'得意',py:'déyì',en:"proud / complacent",ex:{zh:'他考了第一名，非常得意。',py:'Tā kǎole dì yī míng, fēicháng déyì.',en:"He came first in the exam and was very proud."}},
  {id:'4-42',zh:'登记',py:'dēngjì',en:"to register / to check in",ex:{zh:'请先在前台登记。',py:'Qǐng xiān zài qiántái dēngjì.',en:"Please register at the front desk first."}},
  {id:'4-43',zh:'等于',py:'děngyú',en:"to equal / to be equivalent to",ex:{zh:'一公里等于一千米。',py:'Yī gōnglǐ děngyú yīqiān mǐ.',en:"One kilometer equals one thousand meters."}},
  {id:'4-44',zh:'地球',py:'dìqiú',en:"the Earth",ex:{zh:'我们只有一个地球。',py:'Wǒmen zhǐyǒu yīgè dìqiú.',en:"We only have one Earth."}},
  {id:'4-45',zh:'地区',py:'dìqū',en:"region / area",ex:{zh:'这个地区经济发展很快。',py:'Zhège dìqū jīngjì fāzhǎn hěn kuài.',en:"This region's economy is developing rapidly."}},
  {id:'4-46',zh:'调查',py:'diàochá',en:"investigation / to investigate",ex:{zh:'警察正在调查这件事。',py:'Jǐngchá zhèngzài diàochá zhè jiàn shì.',en:"The police are investigating this matter."}},
  {id:'4-47',zh:'独立',py:'dúlì',en:"independent / independence",ex:{zh:'年轻人要学会独立生活。',py:'Niánqīngrén yào xuéhuì dúlì shēnghuó.',en:"Young people should learn to live independently."}},
  {id:'4-48',zh:'丰富',py:'fēngfù',en:"rich / abundant",ex:{zh:'他有丰富的工作经验。',py:'Tā yǒu fēngfù de gōngzuò jīngyàn.',en:"He has rich work experience."}},
  {id:'4-49',zh:'否则',py:'fǒuzé',en:"otherwise / or else",ex:{zh:'要努力，否则会失败。',py:'Yào nǔlì, fǒuzé huì shībài.',en:"You must work hard, otherwise you will fail."}},
  {id:'4-50',zh:'符合',py:'fúhé',en:"to conform to / to meet",ex:{zh:'这个结果符合我们的预期。',py:'Zhège jiéguǒ fúhé wǒmen de yùqī.',en:"This result meets our expectations."}},
  {id:'4-51',zh:'负责',py:'fùzé',en:"responsible / to be in charge of",ex:{zh:'他负责这个项目。',py:'Tā fùzé zhège xiàngmù.',en:"He is responsible for this project."}},
  {id:'4-52',zh:'改革',py:'gǎigé',en:"reform / to reform",ex:{zh:'教育改革势在必行。',py:'Jiàoyù gǎigé shì zài bìxíng.',en:"Educational reform is imperative."}},
  {id:'4-53',zh:'改善',py:'gǎishàn',en:"to improve",ex:{zh:'生活条件不断改善。',py:'Shēnghuó tiáojiàn bùduàn gǎishàn.',en:"Living conditions are constantly improving."}},
  {id:'4-54',zh:'干燥',py:'gānzào',en:"dry / arid",ex:{zh:'冬天空气很干燥。',py:'Dōngtiān kōngqì hěn gānzào.',en:"The air is very dry in winter."}},
  {id:'4-55',zh:'感激',py:'gǎnjī',en:"grateful / to appreciate",ex:{zh:'我非常感激你的帮助。',py:'Wǒ fēicháng gǎnjī nǐ de bāngzhù.',en:"I am very grateful for your help."}},
  {id:'4-56',zh:'个别',py:'gèbié',en:"individual / exceptional",ex:{zh:'个别学生没有完成作业。',py:'Gèbié xuésheng méiyǒu wánchéng zuòyè.',en:"Individual students didn't complete their homework."}},
  {id:'4-57',zh:'工资',py:'gōngzī',en:"wages / salary",ex:{zh:'他的工资比以前高多了。',py:'Tā de gōngzī bǐ yǐqián gāo duō le.',en:"His salary is much higher than before."}},
  {id:'4-58',zh:'公平',py:'gōngpíng',en:"fair / just",ex:{zh:'比赛结果是公平的。',py:'Bǐsài jiéguǒ shì gōngpíng de.',en:"The competition result is fair."}},
  {id:'4-59',zh:'功能',py:'gōngnéng',en:"function / feature",ex:{zh:'这个手机功能很多。',py:'Zhège shǒujī gōngnéng hěn duō.',en:"This phone has many functions."}},
  {id:'4-60',zh:'贡献',py:'gòngxiàn',en:"contribution / to contribute",ex:{zh:'他为公司做出了很大贡献。',py:'Tā wèi gōngsī zuòchūle hěn dà gòngxiàn.',en:"He made a great contribution to the company."}},
  {id:'4-61',zh:'构成',py:'gòuchéng',en:"to constitute / to form",ex:{zh:'这些元素构成了整体。',py:'Zhèxiē yuánsù gòuchéngle zhěngtǐ.',en:"These elements form the whole."}},
  {id:'4-62',zh:'鼓励',py:'gǔlì',en:"to encourage",ex:{zh:'老师经常鼓励我们。',py:'Lǎoshī jīngcháng gǔlì wǒmen.',en:"The teacher often encourages us."}},
  {id:'4-63',zh:'顾客',py:'gùkè',en:"customer / client",ex:{zh:'这家店的顾客很多。',py:'Zhè jiā diàn de gùkè hěn duō.',en:"This shop has many customers."}},
  {id:'4-64',zh:'关注',py:'guānzhù',en:"to pay attention to / to follow",ex:{zh:'大家都很关注这件事。',py:'Dàjiā dōu hěn guānzhù zhè jiàn shì.',en:"Everyone is paying close attention to this."}},
  {id:'4-65',zh:'管理',py:'guǎnlǐ',en:"management / to manage",ex:{zh:'他擅长管理团队。',py:'Tā shàncháng guǎnlǐ tuánduì.',en:"He is good at managing teams."}},
  {id:'4-66',zh:'规定',py:'guīdìng',en:"regulation / to stipulate",ex:{zh:'请遵守公司规定。',py:'Qǐng zūnshǒu gōngsī guīdìng.',en:"Please follow company regulations."}},
  {id:'4-67',zh:'规律',py:'guīlǜ',en:"law / pattern / regularity",ex:{zh:'学习要有规律。',py:'Xuéxí yào yǒu guīlǜ.',en:"Studying should be done regularly."}},
  {id:'4-68',zh:'过分',py:'guòfèn',en:"excessive / going too far",ex:{zh:'他的要求有点过分。',py:'Tā de yāoqiú yǒudiǎn guòfèn.',en:"His demands are a bit excessive."}},
  {id:'4-69',zh:'豪华',py:'háohuá',en:"luxurious / luxury",ex:{zh:'这是一家豪华酒店。',py:'Zhè shì yī jiā háohuá jiǔdiàn.',en:"This is a luxury hotel."}},
  {id:'4-70',zh:'何况',py:'hékuàng',en:"let alone / much less",ex:{zh:'小事都做不好，何况大事？',py:'Xiǎo shì dōu zuò bù hǎo, hékuàng dà shì?',en:"Can't even do small things well, let alone big things."}},
  {id:'4-71',zh:'合法',py:'héfǎ',en:"legal / lawful",ex:{zh:'这种行为是合法的。',py:'Zhè zhǒng xíngwéi shì héfǎ de.',en:"This behavior is legal."}},
  {id:'4-72',zh:'忽视',py:'hūshì',en:"to ignore / to neglect",ex:{zh:'不能忽视这个问题。',py:'Bù néng hūshì zhège wèntí.',en:"We cannot ignore this problem."}},
  {id:'4-73',zh:'积极',py:'jījí',en:"positive / active / enthusiastic",ex:{zh:'他工作态度非常积极。',py:'Tā gōngzuò tàidù fēicháng jījí.',en:"His work attitude is very positive."}},
  {id:'4-74',zh:'基本',py:'jīběn',en:"basic / fundamental",ex:{zh:'这是最基本的要求。',py:'Zhè shì zuì jīběn de yāoqiú.',en:"This is the most basic requirement."}},
  {id:'4-75',zh:'及时',py:'jíshí',en:"timely / promptly",ex:{zh:'问题要及时解决。',py:'Wèntí yào jíshí jiějué.',en:"Problems should be solved promptly."}},
  {id:'4-76',zh:'集中',py:'jízhōng',en:"to concentrate / to focus",ex:{zh:'上课时要集中注意力。',py:'Shàngkè shí yào jízhōng zhùyìlì.',en:"You should concentrate in class."}},
  {id:'4-77',zh:'坚持',py:'jiānchí',en:"to persist / to insist",ex:{zh:'无论多难，都要坚持。',py:'Wúlùn duō nán, dōu yào jiānchí.',en:"No matter how hard, you must persist."}},
  {id:'4-78',zh:'减少',py:'jiǎnshǎo',en:"to reduce / to decrease",ex:{zh:'要减少不必要的浪费。',py:'Yào jiǎnshǎo bù bìyào de làngfèi.',en:"We should reduce unnecessary waste."}},
  {id:'4-79',zh:'交流',py:'jiāoliú',en:"to exchange / communication",ex:{zh:'多交流可以增进了解。',py:'Duō jiāoliú kěyǐ zēngjìn liǎojiě.',en:"More communication can deepen understanding."}},
  {id:'4-80',zh:'角度',py:'jiǎodù',en:"angle / perspective",ex:{zh:'从不同角度看问题。',py:'Cóng bùtóng jiǎodù kàn wèntí.',en:"Look at the problem from different angles."}},
  {id:'4-81',zh:'阶段',py:'jiēduàn',en:"stage / phase",ex:{zh:'我们处于发展的初级阶段。',py:'Wǒmen chǔyú fāzhǎn de chūjí jiēduàn.',en:"We are at the initial stage of development."}},
  {id:'4-82',zh:'结合',py:'jiéhé',en:"to combine / to integrate",ex:{zh:'理论要结合实践。',py:'Lǐlùn yào jiéhé shíjiàn.',en:"Theory should be combined with practice."}},
  {id:'4-83',zh:'解决',py:'jiějué',en:"to solve / to resolve",ex:{zh:'我们需要立刻解决这个问题。',py:'Wǒmen xūyào lìkè jiějué zhège wèntí.',en:"We need to solve this problem immediately."}},
  {id:'4-84',zh:'尽管',py:'jǐnguǎn',en:"although / even though",ex:{zh:'尽管很难，他还是坚持了。',py:'Jǐnguǎn hěn nán, tā hái shì jiānchí le.',en:"Although it was hard, he still persisted."}},
  {id:'4-85',zh:'紧张',py:'jǐnzhāng',en:"nervous / tense",ex:{zh:'考试前他非常紧张。',py:'Kǎoshì qián tā fēicháng jǐnzhāng.',en:"He was very nervous before the exam."}},
  {id:'4-86',zh:'精神',py:'jīngshén',en:"spirit / mental / energy",ex:{zh:'学习需要良好的精神状态。',py:'Xuéxí xūyào liánghǎo de jīngshén zhuàngtài.',en:"Studying requires a good mental state."}},
  {id:'4-87',zh:'究竟',py:'jiūjìng',en:"actually / in the end / what on earth",ex:{zh:'这究竟是怎么回事？',py:'Zhè jiūjìng shì zěnme huí shì?',en:"What on earth is going on here?"}},
  {id:'4-88',zh:'拒绝',py:'jùjué',en:"to refuse / to reject",ex:{zh:'他拒绝了那份工作邀请。',py:'Tā jùjuéle nà fèn gōngzuò yāoqǐng.',en:"He rejected that job offer."}},
  {id:'4-89',zh:'开心',py:'kāixīn',en:"happy / joyful",ex:{zh:'看到你我很开心。',py:'Kàndào nǐ wǒ hěn kāixīn.',en:"I'm very happy to see you."}},
  {id:'4-90',zh:'可见',py:'kějiàn',en:"it is clear that / evidently",ex:{zh:'可见，努力学习是很重要的。',py:'Kějiàn, nǔlì xuéxí shì hěn zhòngyào de.',en:"It is clear that studying hard is very important."}},
  {id:'4-91',zh:'客观',py:'kèguān',en:"objective",ex:{zh:'我们要客观地分析问题。',py:'Wǒmen yào kèguān de fēnxī wèntí.',en:"We should analyze the problem objectively."}},
  {id:'4-92',zh:'空间',py:'kōngjiān',en:"space / room",ex:{zh:'这个房间空间很大。',py:'Zhège fángjiān kōngjiān hěn dà.',en:"This room has a lot of space."}},
  {id:'4-93',zh:'困难',py:'kùnnan',en:"difficulty / difficult",ex:{zh:'任何困难都是暂时的。',py:'Rènhé kùnnan dōu shì zànshí de.',en:"Any difficulty is only temporary."}},
  {id:'4-94',zh:'来自',py:'láizì',en:"to come from / from",ex:{zh:'他来自上海。',py:'Tā láizì Shànghǎi.',en:"He comes from Shanghai."}},
  {id:'4-95',zh:'浪费',py:'làngfèi',en:"to waste / waste",ex:{zh:'不要浪费食物。',py:'Bùyào làngfèi shíwù.',en:"Don't waste food."}},
  {id:'4-96',zh:'乐观',py:'lèguān',en:"optimistic",ex:{zh:'她总是保持乐观的态度。',py:'Tā zǒngshì bǎochí lèguān de tàidù.',en:"She always maintains an optimistic attitude."}},
  {id:'4-97',zh:'理解',py:'lǐjiě',en:"to understand / understanding",ex:{zh:'我理解你的感受。',py:'Wǒ lǐjiě nǐ de gǎnshòu.',en:"I understand your feelings."}},
  {id:'4-98',zh:'理由',py:'lǐyóu',en:"reason / grounds",ex:{zh:'你有什么理由拒绝？',py:'Nǐ yǒu shénme lǐyóu jùjué?',en:"What reason do you have to refuse?"}},
  {id:'4-99',zh:'力量',py:'lìliàng',en:"strength / power / force",ex:{zh:'团结就是力量。',py:'Tuánjié jiùshì lìliàng.',en:"Unity is strength."}},
  {id:'4-100',zh:'立即',py:'lìjí',en:"immediately / at once",ex:{zh:'请立即回复我的邮件。',py:'Qǐng lìjí huífù wǒ de yóujiàn.',en:"Please reply to my email immediately."}},
  {id:'4-101',zh:'连续',py:'liánxù',en:"continuous / successive",ex:{zh:'他连续工作了十个小时。',py:'Tā liánxù gōngzuòle shí gè xiǎoshí.',en:"He worked continuously for ten hours."}},
  {id:'4-102',zh:'灵活',py:'línghuó',en:"flexible / agile",ex:{zh:'思维要灵活。',py:'Sīwéi yào línghuó.',en:"Thinking should be flexible."}},
  {id:'4-103',zh:'领导',py:'lǐngdǎo',en:"leader / to lead",ex:{zh:'他是公司的领导。',py:'Tā shì gōngsī de lǐngdǎo.',en:"He is a company leader."}},
  {id:'4-104',zh:'麻烦',py:'máfan',en:"trouble / troublesome",ex:{zh:'这件事真是太麻烦了。',py:'Zhè jiàn shì zhēn shì tài máfan le.',en:"This matter is really too troublesome."}},
  {id:'4-105',zh:'矛盾',py:'máodùn',en:"contradiction / conflict",ex:{zh:'他们之间存在矛盾。',py:'Tāmen zhī jiān cúnzài máodùn.',en:"There is a conflict between them."}},
  {id:'4-106',zh:'冒险',py:'màoxiǎn',en:"to take risks / adventure",ex:{zh:'他喜欢冒险。',py:'Tā xǐhuān màoxiǎn.',en:"He likes to take risks."}},
  {id:'4-107',zh:'模仿',py:'mófǎng',en:"to imitate / to copy",ex:{zh:'孩子喜欢模仿大人。',py:'Háizi xǐhuān mófǎng dàrén.',en:"Children like to imitate adults."}},
  {id:'4-108',zh:'目标',py:'mùbiāo',en:"goal / target / objective",ex:{zh:'我的目标是考上大学。',py:'Wǒ de mùbiāo shì kǎo shàng dàxué.',en:"My goal is to get into university."}},
  {id:'4-109',zh:'宁可',py:'nìngkě',en:"would rather / prefer to",ex:{zh:'宁可少睡，也要完成任务。',py:'Nìngkě shǎo shuì, yě yào wánchéng rènwù.',en:"I would rather sleep less than not complete the task."}},
  {id:'4-110',zh:'努力',py:'nǔlì',en:"to work hard / effort",ex:{zh:'只有努力才能成功。',py:'Zhǐyǒu nǔlì cái néng chénggōng.',en:"Only through hard work can one succeed."}},
  {id:'4-111',zh:'偶尔',py:'ǒuěr',en:"occasionally / once in a while",ex:{zh:'他偶尔会来这里吃饭。',py:'Tā ǒuěr huì lái zhèlǐ chīfàn.',en:"He occasionally comes here to eat."}},
  {id:'4-112',zh:'培养',py:'péiyǎng',en:"to cultivate / to train",ex:{zh:'学校要培养学生的能力。',py:'Xuéxiào yào péiyǎng xuésheng de nénglì.',en:"Schools should cultivate students' abilities."}},
  {id:'4-113',zh:'批评',py:'pīpíng',en:"to criticize / criticism",ex:{zh:'老师批评了那个学生。',py:'Lǎoshī pīpíngle nàge xuésheng.',en:"The teacher criticized that student."}},
  {id:'4-114',zh:'平等',py:'píngděng',en:"equal / equality",ex:{zh:'人人生而平等。',py:'Rénrén shēng ér píngděng.',en:"All people are born equal."}},
  {id:'4-115',zh:'平静',py:'píngjìng',en:"calm / peaceful",ex:{zh:'他的心情很平静。',py:'Tā de xīnqíng hěn píngjìng.',en:"His mood is very calm."}},
  {id:'4-116',zh:'评价',py:'píngjià',en:"evaluation / to evaluate",ex:{zh:'大家对他的评价很高。',py:'Dàjiā duì tā de píngjià hěn gāo.',en:"Everyone has a high evaluation of him."}},
  {id:'4-117',zh:'气候',py:'qìhòu',en:"climate",ex:{zh:'这里的气候很好。',py:'Zhèlǐ de qìhòu hěn hǎo.',en:"The climate here is very good."}},
  {id:'4-118',zh:'前提',py:'qiántí',en:"prerequisite / precondition",ex:{zh:'努力是成功的前提。',py:'Nǔlì shì chénggōng de qiántí.',en:"Hard work is a prerequisite for success."}},
  {id:'4-119',zh:'强调',py:'qiángdiào',en:"to emphasize / to stress",ex:{zh:'老师强调了这个知识点。',py:'Lǎoshī qiángdiàole zhège zhīshí diǎn.',en:"The teacher emphasized this knowledge point."}},
  {id:'4-120',zh:'确定',py:'quèdìng',en:"to confirm / to determine",ex:{zh:'请确定你的出行时间。',py:'Qǐng quèdìng nǐ de chūxíng shíjiān.',en:"Please confirm your travel time."}},
  {id:'4-121',zh:'热烈',py:'rèliè',en:"warm / enthusiastic",ex:{zh:'大家热烈地欢迎新同学。',py:'Dàjiā rèliè de huānyíng xīn tóngxué.',en:"Everyone warmly welcomed the new classmate."}},
  {id:'4-122',zh:'仍然',py:'réngrán',en:"still / nevertheless",ex:{zh:'他仍然坚持自己的观点。',py:'Tā réngrán jiānchí zìjǐ de guāndiǎn.',en:"He still insists on his own view."}},
  {id:'4-123',zh:'容易',py:'róngyì',en:"easy",ex:{zh:'这道题不容易。',py:'Zhè dào tí bù róngyì.',en:"This question is not easy."}},
  {id:'4-124',zh:'如何',py:'rúhé',en:"how / in what way",ex:{zh:'如何提高学习效率？',py:'Rúhé tígāo xuéxí xiàolǜ?',en:"How can one improve study efficiency?"}},
  {id:'4-125',zh:'深刻',py:'shēnkè',en:"deep / profound",ex:{zh:'他给我留下了深刻的印象。',py:'Tā gěi wǒ liú xià le shēnkè de yìnxiàng.',en:"He left a deep impression on me."}},
  {id:'4-126',zh:'甚至',py:'shènzhì',en:"even / so much so that",ex:{zh:'他甚至没有时间吃饭。',py:'Tā shènzhì méiyǒu shíjiān chīfàn.',en:"He doesn't even have time to eat."}},
  {id:'4-127',zh:'实际',py:'shíjì',en:"actual / practical / realistic",ex:{zh:'理论要联系实际。',py:'Lǐlùn yào liánxi shíjì.',en:"Theory should be connected to practice."}},
  {id:'4-128',zh:'实现',py:'shíxiàn',en:"to realize / to achieve",ex:{zh:'他实现了自己的梦想。',py:'Tā shíxiànle zìjǐ de mèngxiǎng.',en:"He realized his dream."}},
  {id:'4-129',zh:'适合',py:'shìhé',en:"to suit / appropriate for",ex:{zh:'这份工作很适合你。',py:'Zhè fèn gōngzuò hěn shìhé nǐ.',en:"This job suits you very well."}},
  {id:'4-130',zh:'收入',py:'shōurù',en:"income / revenue",ex:{zh:'他的收入比以前高了。',py:'Tā de shōurù bǐ yǐqián gāo le.',en:"His income is higher than before."}},
  {id:'4-131',zh:'顺序',py:'shùnxù',en:"order / sequence",ex:{zh:'按照顺序来。',py:'Ànzhào shùnxù lái.',en:"Come in order."}},
  {id:'4-132',zh:'虽然',py:'suīrán',en:"although / even though",ex:{zh:'虽然很累，但他还是坚持了。',py:'Suīrán hěn lèi, dàn tā hái shì jiānchí le.',en:"Although very tired, he still persisted."}},
  {id:'4-133',zh:'随着',py:'suízhe',en:"along with / as",ex:{zh:'随着时间的推移，他越来越好。',py:'Suízhe shíjiān de tuīyí, tā yuèlái yuè hǎo.',en:"As time went on, he got better and better."}},
  {id:'4-134',zh:'态度',py:'tàidù',en:"attitude",ex:{zh:'工作态度很重要。',py:'Gōngzuò tàidù hěn zhòngyào.',en:"Work attitude is very important."}},
  {id:'4-135',zh:'讨论',py:'tǎolùn',en:"to discuss / discussion",ex:{zh:'我们讨论了很多方案。',py:'Wǒmen tǎolùnle hěn duō fāngàn.',en:"We discussed many plans."}},
  {id:'4-136',zh:'特征',py:'tèzhēng',en:"characteristic / feature",ex:{zh:'这是这种植物的特征。',py:'Zhè shì zhè zhǒng zhíwù de tèzhēng.',en:"This is a characteristic of this plant."}},
  {id:'4-137',zh:'体现',py:'tǐxiàn',en:"to embody / to reflect",ex:{zh:'这件事体现了他的精神。',py:'Zhè jiàn shì tǐxiànle tā de jīngshén.',en:"This reflects his spirit."}},
  {id:'4-138',zh:'条件',py:'tiáojiàn',en:"condition / requirement",ex:{zh:'在这种条件下很难工作。',py:'Zài zhè zhǒng tiáojiàn xià hěn nán gōngzuò.',en:"It's hard to work under these conditions."}},
  {id:'4-139',zh:'通过',py:'tōngguò',en:"to pass through / by means of",ex:{zh:'通过努力，他终于成功了。',py:'Tōngguò nǔlì, tā zhōngyú chénggōng le.',en:"Through hard work, he finally succeeded."}},
  {id:'4-140',zh:'推广',py:'tuīguǎng',en:"to promote / to spread",ex:{zh:'他们在推广新产品。',py:'Tāmen zài tuīguǎng xīn chǎnpǐn.',en:"They are promoting a new product."}},
  {id:'4-141',zh:'完善',py:'wánshàn',en:"to perfect / perfect",ex:{zh:'我们需要完善这个系统。',py:'Wǒmen xūyào wánshàn zhège xìtǒng.',en:"We need to perfect this system."}},
  {id:'4-142',zh:'危险',py:'wēixiǎn',en:"dangerous / danger",ex:{zh:'独自上山很危险。',py:'Dúzì shàng shān hěn wēixiǎn.',en:"Going up the mountain alone is dangerous."}},
  {id:'4-143',zh:'维护',py:'wéihù',en:"to maintain / to safeguard",ex:{zh:'我们要维护和平。',py:'Wǒmen yào wéihù hépíng.',en:"We must safeguard peace."}},
  {id:'4-144',zh:'无论',py:'wúlùn',en:"no matter / regardless of",ex:{zh:'无论发生什么，我都支持你。',py:'Wúlùn fāshēng shénme, wǒ dōu zhīchí nǐ.',en:"No matter what happens, I support you."}},
  {id:'4-145',zh:'吸引',py:'xīyǐn',en:"to attract",ex:{zh:'这部电影很吸引人。',py:'Zhè bù diànyǐng hěn xīyǐn rén.',en:"This movie is very attractive."}},
  {id:'4-146',zh:'相互',py:'xiānghù',en:"mutual / each other",ex:{zh:'我们要相互帮助。',py:'Wǒmen yào xiānghù bāngzhù.',en:"We should help each other."}},
  {id:'4-147',zh:'象征',py:'xiàngzhēng',en:"symbol / to symbolize",ex:{zh:'鸽子是和平的象征。',py:'Gēzi shì hépíng de xiàngzhēng.',en:"The dove is a symbol of peace."}},
  {id:'4-148',zh:'消失',py:'xiāoshī',en:"to disappear / to vanish",ex:{zh:'他突然消失了。',py:'Tā tūrán xiāoshī le.',en:"He suddenly disappeared."}},
  {id:'4-149',zh:'效率',py:'xiàolǜ',en:"efficiency",ex:{zh:'提高工作效率很重要。',py:'Tígāo gōngzuò xiàolǜ hěn zhòngyào.',en:"Improving work efficiency is important."}},
  {id:'4-150',zh:'形成',py:'xíngchéng',en:"to form / to take shape",ex:{zh:'良好的习惯需要慢慢形成。',py:'Liánghǎo de xíguàn xūyào màn man xíngchéng.',en:"Good habits need to form slowly."}},

  {id:'4-151',zh:'学术',py:'xuéshù',en:"academic / scholarship",ex:{zh:'他对学术研究很感兴趣。',py:'Tā duì xuéshù yánjiū hěn gǎn xìngqù.',en:"He is very interested in academic research."}},
  {id:'4-152',zh:'压',py:'yā',en:"to press / to weigh down",ex:{zh:'别把书压坏了。',py:'Bié bǎ shū yāhuài le.',en:"Don't crush the book."}},
  {id:'4-153',zh:'严肃',py:'yánsù',en:"serious / solemn",ex:{zh:'他说话的语气很严肃。',py:'Tā shuōhuà de yǔqì hěn yánsù.',en:"His tone of speaking is very serious."}},
  {id:'4-154',zh:'研究',py:'yánjiū',en:"to research / research",ex:{zh:'科学家们正在研究这个问题。',py:'Kēxuéjiāmen zhèngzài yánjiū zhège wèntí.',en:"Scientists are researching this problem."}},
  {id:'4-155',zh:'演讲',py:'yǎnjiǎng',en:"to give a speech / lecture",ex:{zh:'他做了一个精彩的演讲。',py:'Tā zuòle yīgè jīngcǎi de yǎnjiǎng.',en:"He gave a wonderful speech."}},
  {id:'4-156',zh:'依靠',py:'yīkào',en:"to rely on / to depend on",ex:{zh:'不能总是依靠别人。',py:'Bùnéng zǒngshì yīkào biéren.',en:"You cannot always rely on others."}},
  {id:'4-157',zh:'意识',py:'yìshí',en:"consciousness / to be aware of",ex:{zh:'他意识到了自己的错误。',py:'Tā yìshídào le zìjǐ de cuòwù.',en:"He became aware of his own mistakes."}},
  {id:'4-158',zh:'因素',py:'yīnsù',en:"factor / element",ex:{zh:'成功有很多因素。',py:'Chénggōng yǒu hěn duō yīnsù.',en:"There are many factors for success."}},
  {id:'4-159',zh:'引起',py:'yǐnqǐ',en:"to cause / to arouse",ex:{zh:'这件事引起了大家的注意。',py:'Zhè jiàn shì yǐnqǐle dàjiā de zhùyì.',en:"This matter aroused everyone's attention."}},
  {id:'4-160',zh:'应付',py:'yìngfu',en:"to cope with / to deal with",ex:{zh:'他能应付各种困难。',py:'Tā néng yìngfu gè zhǒng kùnnan.',en:"He can cope with all kinds of difficulties."}},
  {id:'4-161',zh:'营养',py:'yíngyǎng',en:"nutrition / nourishment",ex:{zh:'这道菜营养丰富。',py:'Zhè dào cài yíngyǎng fēngfù.',en:"This dish is very nutritious."}},
  {id:'4-162',zh:'影子',py:'yǐngzi',en:"shadow / reflection",ex:{zh:'太阳落山，影子变长了。',py:'Tàiyáng luòshān, yǐngzi biàn cháng le.',en:"As the sun set, the shadows grew longer."}},
  {id:'4-163',zh:'勇气',py:'yǒngqì',en:"courage / bravery",ex:{zh:'你需要勇气去尝试。',py:'Nǐ xūyào yǒngqì qù chángshì.',en:"You need courage to try."}},
  {id:'4-164',zh:'优先',py:'yōuxiān',en:"priority / to give priority to",ex:{zh:'安全应该优先考虑。',py:'Ānquán yīnggāi yōuxiān kǎolǜ.',en:"Safety should be given priority."}},
  {id:'4-165',zh:'于是',py:'yúshì',en:"therefore / as a result",ex:{zh:'他累了，于是早点睡了。',py:'Tā lèi le, yúshì zǎo diǎn shuì le.',en:"He was tired, so he went to sleep early."}},
  {id:'4-166',zh:'愉快',py:'yúkuài',en:"happy / pleasant",ex:{zh:'今天过得很愉快。',py:'Jīntiān guò de hěn yúkuài.',en:"Today was very pleasant."}},
  {id:'4-167',zh:'与',py:'yǔ',en:"and / with / to",ex:{zh:'他与朋友一起去旅行。',py:'Tā yǔ péngyǒu yīqǐ qù lǚxíng.',en:"He traveled with his friends."}},
  {id:'4-168',zh:'预防',py:'yùfáng',en:"to prevent / prevention",ex:{zh:'预防疾病比治疗更重要。',py:'Yùfáng jíbìng bǐ zhìliáo gèng zhòngyào.',en:"Preventing disease is more important than treating it."}},
  {id:'4-169',zh:'预期',py:'yùqī',en:"expected / anticipated",ex:{zh:'结果超出了预期。',py:'Jiéguǒ chāochūle yùqī.',en:"The result exceeded expectations."}},
  {id:'4-170',zh:'元素',py:'yuánsù',en:"element / component",ex:{zh:'这幅画有很多设计元素。',py:'Zhè fú huà yǒu hěn duō shèjì yuánsù.',en:"This painting has many design elements."}},
  {id:'4-171',zh:'原来',py:'yuánlái',en:"originally / as it turns out",ex:{zh:'原来他早就知道了。',py:'Yuánlái tā zǎo jiù zhīdào le.',en:"It turns out he already knew."}},
  {id:'4-172',zh:'原则',py:'yuánzé',en:"principle / rule",ex:{zh:'做事要有原则。',py:'Zuòshì yào yǒu yuánzé.',en:"You must have principles in what you do."}},
  {id:'4-173',zh:'愿望',py:'yuànwàng',en:"wish / desire / aspiration",ex:{zh:'他实现了自己的愿望。',py:'Tā shíxiànle zìjǐ de yuànwàng.',en:"He realized his wish."}},
  {id:'4-174',zh:'运用',py:'yùnyòng',en:"to use / to apply",ex:{zh:'要学会运用所学知识。',py:'Yào xuéhuì yùnyòng suǒ xué zhīshì.',en:"You should learn to apply what you have learned."}},
  {id:'4-175',zh:'再三',py:'zàisān',en:"again and again / repeatedly",ex:{zh:'老师再三强调这个问题。',py:'Lǎoshī zàisān qiángdiào zhège wèntí.',en:"The teacher repeatedly emphasized this issue."}},
  {id:'4-176',zh:'在乎',py:'zàihu',en:"to care about / to mind",ex:{zh:'他不在乎别人的看法。',py:'Tā bù zàihu biéren de kànfǎ.',en:"He doesn't care about other people's opinions."}},
  {id:'4-177',zh:'赞成',py:'zànchéng',en:"to agree / to approve",ex:{zh:'我赞成这个方案。',py:'Wǒ zànchéng zhège fāngàn.',en:"I approve of this plan."}},
  {id:'4-178',zh:'造成',py:'zàochéng',en:"to cause / to bring about",ex:{zh:'粗心造成了这次事故。',py:'Cūxīn zàochéngle zhè cì shìgù.',en:"Carelessness caused this accident."}},
  {id:'4-179',zh:'责任',py:'zérèn',en:"responsibility / duty",ex:{zh:'这是你的责任。',py:'Zhè shì nǐ de zérèn.',en:"This is your responsibility."}},
  {id:'4-180',zh:'增加',py:'zēngjiā',en:"to increase / to add",ex:{zh:'我们需要增加人手。',py:'Wǒmen xūyào zēngjiā rénshǒu.',en:"We need to increase staff."}},
  {id:'4-181',zh:'展示',py:'zhǎnshì',en:"to display / to show",ex:{zh:'他展示了自己的才能。',py:'Tā zhǎnshìle zìjǐ de cáinéng.',en:"He displayed his talent."}},
  {id:'4-182',zh:'占',py:'zhàn',en:"to occupy / to take up",ex:{zh:'这张桌子占了太多空间。',py:'Zhè zhāng zhuōzi zhànle tài duō kōngjiān.',en:"This table takes up too much space."}},
  {id:'4-183',zh:'掌握',py:'zhǎngwò',en:"to master / to grasp",ex:{zh:'他已经掌握了这门技术。',py:'Tā yǐjīng zhǎngwòle zhè mén jìshù.',en:"He has already mastered this technique."}},
  {id:'4-184',zh:'整体',py:'zhěngtǐ',en:"overall / as a whole",ex:{zh:'要从整体上考虑问题。',py:'Yào cóng zhěngtǐ shàng kǎolǜ wèntí.',en:"You should consider the problem as a whole."}},
  {id:'4-185',zh:'正式',py:'zhèngshì',en:"formal / official",ex:{zh:'这是一个正式的场合。',py:'Zhè shì yīgè zhèngshì de chǎnghé.',en:"This is a formal occasion."}},
  {id:'4-186',zh:'政策',py:'zhèngcè',en:"policy",ex:{zh:'政府出台了新政策。',py:'Zhèngfǔ chūtáile xīn zhèngcè.',en:"The government introduced a new policy."}},
  {id:'4-187',zh:'知识',py:'zhīshí',en:"knowledge",ex:{zh:'知识就是力量。',py:'Zhīshí jiùshì lìliàng.',en:"Knowledge is power."}},
  {id:'4-188',zh:'至今',py:'zhìjīn',en:"up to now / to this day",ex:{zh:'他至今还没有回来。',py:'Tā zhìjīn hái méiyǒu huílai.',en:"He has not returned to this day."}},
  {id:'4-189',zh:'至于',py:'zhìyú',en:"as for / as to",ex:{zh:'至于这件事，我不清楚。',py:'Zhìyú zhè jiàn shì, wǒ bù qīngchǔ.',en:"As for this matter, I am not clear."}},
  {id:'4-190',zh:'制度',py:'zhìdù',en:"system / institution",ex:{zh:'公司有严格的制度。',py:'Gōngsī yǒu yángé de zhìdù.',en:"The company has strict systems."}},
  {id:'4-191',zh:'智慧',py:'zhìhuì',en:"wisdom / intelligence",ex:{zh:'解决这个问题需要智慧。',py:'Jiějué zhège wèntí xūyào zhìhuì.',en:"Solving this problem requires wisdom."}},
  {id:'4-192',zh:'中心',py:'zhōngxīn',en:"center / core",ex:{zh:'北京是中国的政治中心。',py:'Běijīng shì Zhōngguó de zhèngzhì zhōngxīn.',en:"Beijing is China's political center."}},
  {id:'4-193',zh:'主动',py:'zhǔdòng',en:"initiative / active / proactive",ex:{zh:'他主动承担了这个任务。',py:'Tā zhǔdòng chéngdānle zhège rènwù.',en:"He proactively took on this task."}},
  {id:'4-194',zh:'主要',py:'zhǔyào',en:"main / major / primary",ex:{zh:'这是主要问题。',py:'Zhè shì zhǔyào wèntí.',en:"This is the main issue."}},
  {id:'4-195',zh:'注重',py:'zhùzhòng',en:"to emphasize / to stress",ex:{zh:'学习要注重方法。',py:'Xuéxí yào zhùzhòng fāngfǎ.',en:"Learning should emphasize methods."}},
  {id:'4-196',zh:'逐渐',py:'zhújiàn',en:"gradually / little by little",ex:{zh:'他的中文水平逐渐提高。',py:'Tā de Zhōngwén shuǐpíng zhújiàn tígāo.',en:"His Chinese level is gradually improving."}},
  {id:'4-197',zh:'转变',py:'zhuǎnbiàn',en:"to transform / to change",ex:{zh:'他的态度发生了转变。',py:'Tā de tàidù fāshēngle zhuǎnbiàn.',en:"His attitude underwent a transformation."}},
  {id:'4-198',zh:'自信',py:'zìxìn',en:"self-confident / confidence",ex:{zh:'他是一个很自信的人。',py:'Tā shì yīgè hěn zìxìn de rén.',en:"He is a very self-confident person."}},
  {id:'4-199',zh:'自愿',py:'zìyuàn',en:"voluntary / willingly",ex:{zh:'他自愿参加了志愿活动。',py:'Tā zìyuàn cānjiāle zhìyuàn huódòng.',en:"He voluntarily participated in volunteer activities."}},
  {id:'4-200',zh:'综合',py:'zōnghé',en:"comprehensive / to synthesize",ex:{zh:'这是一个综合性问题。',py:'Zhè shì yīgè zōnghéxìng wèntí.',en:"This is a comprehensive problem."}},
  {id:'4-201',zh:'阻碍',py:'zǔ\'ài',en:"to hinder / obstacle",ex:{zh:'不要让困难阻碍你前进。',py:'Bùyào ràng kùnnan zǔ\'ài nǐ qiánjìn.',en:"Don't let difficulties hinder your progress."}},
  {id:'4-202',zh:'最终',py:'zuìzhōng',en:"final / ultimately / in the end",ex:{zh:'他最终实现了目标。',py:'Tā zuìzhōng shíxiànle mùbiāo.',en:"He ultimately achieved his goal."}},
  {id:'4-203',zh:'尊重',py:'zūnzhòng',en:"to respect / respect",ex:{zh:'我们要尊重每一个人。',py:'Wǒmen yào zūnzhòng měi yīgè rén.',en:"We should respect every person."}},
  {id:'4-204',zh:'作用',py:'zuòyòng',en:"function / effect / role",ex:{zh:'运动对健康有很大作用。',py:'Yùndòng duì jiànkāng yǒu hěn dà zuòyòng.',en:"Exercise has a great effect on health."}},
  {id:'4-205',zh:'做到',py:'zuòdào',en:"to achieve / to accomplish",ex:{zh:'说到就要做到。',py:'Shuōdào jiù yào zuòdào.',en:"If you say it, you must accomplish it."}},
  {id:'4-206',zh:'安慰',py:'ānwèi',en:"to comfort / consolation",ex:{zh:'她安慰了伤心的朋友。',py:'Tā ānwèile shāngxīn de péngyǒu.',en:"She comforted her sad friend."}},
  {id:'4-207',zh:'暗示',py:'ànshì',en:"to hint / to imply",ex:{zh:'他暗示我明天不用来了。',py:'Tā ànshì wǒ míngtiān bùyòng lái le.',en:"He hinted that I didn't need to come tomorrow."}},
  {id:'4-208',zh:'背景',py:'bèijǐng',en:"background / context",ex:{zh:'了解历史背景很重要。',py:'Liǎojiě lìshǐ bèijǐng hěn zhòngyào.',en:"Understanding the historical background is important."}},
  {id:'4-209',zh:'便于',py:'biànyú',en:"convenient for / easy to",ex:{zh:'这种设计便于使用。',py:'Zhè zhǒng shèjì biànyú shǐyòng.',en:"This design is convenient to use."}},
  {id:'4-210',zh:'辩论',py:'biànlùn',en:"to debate / debate",ex:{zh:'他们就这个问题展开了辩论。',py:'Tāmen jiù zhège wèntí zhǎnkāile biànlùn.',en:"They debated this issue."}},
  {id:'4-211',zh:'补充',py:'bǔchōng',en:"to supplement / to add",ex:{zh:'我想补充一点。',py:'Wǒ xiǎng bǔchōng yīdiǎn.',en:"I would like to add one point."}},
  {id:'4-212',zh:'不得了',py:'bùdéliǎo',en:"terrible / extremely",ex:{zh:'这道题难得不得了。',py:'Zhè dào tí nán de bùdéliǎo.',en:"This question is extremely difficult."}},
  {id:'4-213',zh:'不免',py:'bùmiǎn',en:"unavoidably / inevitably",ex:{zh:'看到这个，不免让人担心。',py:'Kàndào zhège, bùmiǎn ràng rén dānxīn.',en:"Seeing this, one can't help but worry."}},
  {id:'4-214',zh:'财富',py:'cáifù',en:"wealth / fortune",ex:{zh:'知识是最大的财富。',py:'Zhīshí shì zuìdà de cáifù.',en:"Knowledge is the greatest wealth."}},
  {id:'4-215',zh:'参考',py:'cānkǎo',en:"to refer to / reference",ex:{zh:'你可以参考这本书。',py:'Nǐ kěyǐ cānkǎo zhè běn shū.',en:"You can refer to this book."}},
  {id:'4-216',zh:'层次',py:'céngcì',en:"level / layer / hierarchy",ex:{zh:'这篇文章层次分明。',py:'Zhè piān wénzhāng céngcì fēnmíng.',en:"This article has a clear structure."}},
  {id:'4-217',zh:'差距',py:'chājù',en:"gap / disparity",ex:{zh:'两者之间有很大差距。',py:'Liǎng zhě zhī jiān yǒu hěn dà chājù.',en:"There is a large gap between the two."}},
  {id:'4-218',zh:'长期',py:'chángqī',en:"long-term",ex:{zh:'这需要长期坚持。',py:'Zhè xūyào chángqī jiānchí.',en:"This requires long-term persistence."}},
  {id:'4-219',zh:'倡导',py:'chàngdǎo',en:"to advocate / to promote",ex:{zh:'他倡导环保生活方式。',py:'Tā chàngdǎo huánbǎo shēnghuó fāngshì.',en:"He advocates an eco-friendly lifestyle."}},
  {id:'4-220',zh:'超越',py:'chāoyuè',en:"to surpass / to transcend",ex:{zh:'他超越了自己的极限。',py:'Tā chāoyuèle zìjǐ de jíxiàn.',en:"He surpassed his own limits."}},
  {id:'4-221',zh:'彻底',py:'chèdǐ',en:"thorough / complete / thoroughly",ex:{zh:'问题被彻底解决了。',py:'Wèntí bèi chèdǐ jiějué le.',en:"The problem was thoroughly solved."}},
  {id:'4-222',zh:'称赞',py:'chēngzàn',en:"to praise / to commend",ex:{zh:'老师称赞了他的努力。',py:'Lǎoshī chēngzànle tā de nǔlì.',en:"The teacher praised his hard work."}},
  {id:'4-223',zh:'充分',py:'chōngfèn',en:"full / sufficient / ample",ex:{zh:'要做充分的准备。',py:'Yào zuò chōngfèn de zhǔnbèi.',en:"You must make sufficient preparation."}},
  {id:'4-224',zh:'充实',py:'chōngshí',en:"rich / fulfilling / to enrich",ex:{zh:'他的生活很充实。',py:'Tā de shēnghuó hěn chōngshí.',en:"His life is very fulfilling."}},
  {id:'4-225',zh:'冲突',py:'chōngtū',en:"conflict / clash",ex:{zh:'他们之间发生了冲突。',py:'Tāmen zhī jiān fāshēngle chōngtū.',en:"A conflict arose between them."}},
  {id:'4-226',zh:'重视',py:'zhòngshì',en:"to attach importance to / to value",ex:{zh:'我们要重视这个问题。',py:'Wǒmen yào zhòngshì zhège wèntí.',en:"We must attach importance to this issue."}},
  {id:'4-227',zh:'出色',py:'chūsè',en:"outstanding / excellent",ex:{zh:'他的表现非常出色。',py:'Tā de biǎoxiàn fēicháng chūsè.',en:"His performance was outstanding."}},
  {id:'4-228',zh:'创造',py:'chuàngzào',en:"to create / creation",ex:{zh:'他创造了一个新纪录。',py:'Tā chuàngzàole yīgè xīn jìlù.',en:"He created a new record."}},
  {id:'4-229',zh:'纯粹',py:'chúncuì',en:"pure / purely / simply",ex:{zh:'这纯粹是误会。',py:'Zhè chúncuì shì wùhuì.',en:"This is purely a misunderstanding."}},
  {id:'4-230',zh:'大量',py:'dàliàng',en:"a large amount / large quantities",ex:{zh:'他读了大量的书。',py:'Tā dúle dàliàng de shū.',en:"He read a large number of books."}},
  {id:'4-231',zh:'大力',py:'dàlì',en:"vigorously / energetically",ex:{zh:'政府大力支持教育。',py:'Zhèngfǔ dàlì zhīchí jiàoyù.',en:"The government vigorously supports education."}},
  {id:'4-232',zh:'担任',py:'dānrèn',en:"to hold a post / to serve as",ex:{zh:'她担任了班长。',py:'Tā dānrènle bānzhǎng.',en:"She served as class monitor."}},
  {id:'4-233',zh:'当然',py:'dāngrán',en:"of course / naturally",ex:{zh:'当然，你可以来。',py:'Dāngrán, nǐ kěyǐ lái.',en:"Of course, you can come."}},
  {id:'4-234',zh:'倒',py:'dào',en:"on the contrary / but",ex:{zh:'他倒没什么意见。',py:'Tā dào méi shénme yìjiàn.',en:"He has no objections on the contrary."}},
  {id:'4-235',zh:'道德',py:'dàodé',en:"morality / ethics / moral",ex:{zh:'我们要有道德。',py:'Wǒmen yào yǒu dàodé.',en:"We must have morality."}},
  {id:'4-236',zh:'地位',py:'dìwèi',en:"status / position",ex:{zh:'他在公司里地位很高。',py:'Tā zài gōngsī lǐ dìwèi hěn gāo.',en:"He has a high status in the company."}},
  {id:'4-237',zh:'典型',py:'diǎnxíng',en:"typical / representative",ex:{zh:'这是一个典型的例子。',py:'Zhè shì yīgè diǎnxíng de lìzi.',en:"This is a typical example."}},
  {id:'4-238',zh:'调整',py:'tiáozhěng',en:"to adjust / adjustment",ex:{zh:'需要调整学习计划。',py:'Xūyào tiáozhěng xuéxí jìhuà.',en:"The study plan needs to be adjusted."}},
  {id:'4-239',zh:'动力',py:'dònglì',en:"motivation / driving force",ex:{zh:'兴趣是学习的动力。',py:'Xìngqù shì xuéxí de dònglì.',en:"Interest is the driving force of learning."}},
  {id:'4-240',zh:'独特',py:'dútè',en:"unique / distinctive",ex:{zh:'他有独特的风格。',py:'Tā yǒu dútè de fēnggé.',en:"He has a unique style."}},
  {id:'4-241',zh:'对待',py:'duìdài',en:"to treat / to deal with",ex:{zh:'要认真对待每一件事。',py:'Yào rènzhēn duìdài měi yī jiàn shì.',en:"You should deal with everything seriously."}},
  {id:'4-242',zh:'对于',py:'duìyú',en:"regarding / concerning / as for",ex:{zh:'对于这个问题，我有不同看法。',py:'Duìyú zhège wèntí, wǒ yǒu bùtóng kànfǎ.',en:"Regarding this issue, I have a different view."}},
  {id:'4-243',zh:'发挥',py:'fāhuī',en:"to play a role / to bring into play",ex:{zh:'要充分发挥自己的优势。',py:'Yào chōngfèn fāhuī zìjǐ de yōushì.',en:"You should fully play to your strengths."}},
  {id:'4-244',zh:'反映',py:'fǎnyìng',en:"to reflect / to report",ex:{zh:'这反映了社会的现状。',py:'Zhè fǎnyìngle shèhuì de xiànzhuàng.',en:"This reflects the current state of society."}},
  {id:'4-245',zh:'范围',py:'fànwéi',en:"scope / range / extent",ex:{zh:'这超出了我的知识范围。',py:'Zhè chāochūle wǒ de zhīshí fànwéi.',en:"This is beyond the scope of my knowledge."}},
  {id:'4-246',zh:'方案',py:'fāngàn',en:"plan / scheme / solution",ex:{zh:'我们制定了新方案。',py:'Wǒmen zhìdìngle xīn fāngàn.',en:"We formulated a new plan."}},
  {id:'4-247',zh:'分析',py:'fēnxī',en:"to analyze / analysis",ex:{zh:'需要仔细分析这个问题。',py:'Xūyào zǐxì fēnxī zhège wèntí.',en:"This problem needs to be analyzed carefully."}},
  {id:'4-248',zh:'风险',py:'fēngxiǎn',en:"risk / hazard",ex:{zh:'投资有一定的风险。',py:'Tóuzī yǒu yīdìng de fēngxiǎn.',en:"Investment carries certain risks."}},
  {id:'4-249',zh:'否认',py:'fǒurèn',en:"to deny / to negate",ex:{zh:'他否认了这件事。',py:'Tā fǒurènle zhè jiàn shì.',en:"He denied this matter."}},
  {id:'4-250',zh:'付出',py:'fùchū',en:"to give / to put in effort",ex:{zh:'成功需要付出努力。',py:'Chénggōng xūyào fùchū nǔlì.',en:"Success requires putting in effort."}},
  {id:'4-251',zh:'改变',py:'gǎibiàn',en:"to change / change",ex:{zh:'他改变了自己的想法。',py:'Tā gǎibiànle zìjǐ de xiǎngfǎ.',en:"He changed his mind."}},
  {id:'4-252',zh:'概念',py:'gàiniàn',en:"concept / notion / idea",ex:{zh:'你理解这个概念吗？',py:'Nǐ lǐjiě zhège gàiniàn ma?',en:"Do you understand this concept?"}},
  {id:'4-253',zh:'感受',py:'gǎnshòu',en:"to feel / feeling / experience",ex:{zh:'这次旅行感受很深。',py:'Zhè cì lǚxíng gǎnshòu hěn shēn.',en:"This trip was a very deep experience."}},
  {id:'4-254',zh:'高度',py:'gāodù',en:"height / highly / highly",ex:{zh:'他对这件事高度重视。',py:'Tā duì zhè jiàn shì gāodù zhòngshì.',en:"He attaches great importance to this matter."}},
  {id:'4-255',zh:'告别',py:'gàobié',en:"to say goodbye / farewell",ex:{zh:'他与朋友告别后离开了。',py:'Tā yǔ péngyǒu gàobié hòu líkāi le.',en:"He said goodbye to his friends and left."}},
  {id:'4-256',zh:'各种',py:'gèzhǒng',en:"various / all kinds of",ex:{zh:'他有各种各样的爱好。',py:'Tā yǒu gèzhǒng gèyàng de àihào.',en:"He has all kinds of hobbies."}},
  {id:'4-257',zh:'根本',py:'gēnběn',en:"fundamental / at all / basically",ex:{zh:'这是根本问题。',py:'Zhè shì gēnběn wèntí.',en:"This is the fundamental problem."}},
  {id:'4-258',zh:'更加',py:'gèngjiā',en:"even more / further",ex:{zh:'他变得更加努力了。',py:'Tā biàn de gèngjiā nǔlì le.',en:"He became even more hardworking."}},
  {id:'4-259',zh:'工程',py:'gōngchéng',en:"engineering / project",ex:{zh:'这是一个大型工程。',py:'Zhè shì yīgè dàxíng gōngchéng.',en:"This is a large engineering project."}},
  {id:'4-260',zh:'公正',py:'gōngzhèng',en:"fair / impartial / just",ex:{zh:'评判要公正。',py:'Pínpàn yào gōngzhèng.',en:"Judgments must be fair."}},
  {id:'4-261',zh:'沟通',py:'gōutōng',en:"to communicate / communication",ex:{zh:'良好的沟通很重要。',py:'Liánghǎo de gōutōng hěn zhòngyào.',en:"Good communication is very important."}},
  {id:'4-262',zh:'估计',py:'gūjì',en:"to estimate / to reckon",ex:{zh:'我估计他明天会来。',py:'Wǒ gūjì tā míngtiān huì lái.',en:"I estimate that he will come tomorrow."}},
  {id:'4-263',zh:'观察',py:'guānchá',en:"to observe / observation",ex:{zh:'仔细观察才能发现问题。',py:'Zǐxì guānchá cái néng fāxiàn wèntí.',en:"Only by observing carefully can you find problems."}},
  {id:'4-264',zh:'观念',py:'guānniàn',en:"concept / idea / view",ex:{zh:'观念需要不断更新。',py:'Guānniàn xūyào bùduàn gēngxīn.',en:"Ideas need to be constantly updated."}},
  {id:'4-265',zh:'广泛',py:'guǎngfàn',en:"extensive / wide-ranging",ex:{zh:'他的兴趣非常广泛。',py:'Tā de xìngqù fēicháng guǎngfàn.',en:"His interests are very wide-ranging."}},
  {id:'4-266',zh:'规模',py:'guīmó',en:"scale / scope",ex:{zh:'这次活动规模很大。',py:'Zhè cì huódòng guīmó hěn dà.',en:"This event was on a large scale."}},
  {id:'4-267',zh:'过程',py:'guòchéng',en:"process / course",ex:{zh:'学习是一个漫长的过程。',py:'Xuéxí shì yīgè màncháng de guòchéng.',en:"Learning is a long process."}},
  {id:'4-268',zh:'含义',py:'hányì',en:"meaning / implication",ex:{zh:'这句话有深刻含义。',py:'Zhè jù huà yǒu shēnkè hányì.',en:"This sentence has a deep meaning."}},
  {id:'4-269',zh:'好处',py:'hǎochù',en:"benefit / advantage / good point",ex:{zh:'坚持运动有很多好处。',py:'Jiānchí yùndòng yǒu hěn duō hǎochù.',en:"Sticking to exercise has many benefits."}},
  {id:'4-270',zh:'合作',py:'hézuò',en:"to cooperate / cooperation",ex:{zh:'团队合作很重要。',py:'Tuánduì hézuò hěn zhòngyào.',en:"Teamwork is very important."}},
  {id:'4-271',zh:'核心',py:'héxīn',en:"core / nucleus",ex:{zh:'这是问题的核心。',py:'Zhè shì wèntí de héxīn.',en:"This is the core of the problem."}},
  {id:'4-272',zh:'后果',py:'hòuguǒ',en:"consequence / result",ex:{zh:'要考虑行动的后果。',py:'Yào kǎolǜ xíngdòng de hòuguǒ.',en:"You must consider the consequences of your actions."}},

  {id:'4-275',zh:'缓解',py:'huǎnjiě',en:"to alleviate / to ease",ex:{zh:'这个方法能缓解压力。',py:'Zhège fāngfǎ néng huǎnjiě yālì.',en:"This method can alleviate stress."}},
  {id:'4-276',zh:'回顾',py:'huígù',en:"to look back / to review",ex:{zh:'让我们回顾一下这一年。',py:'Ràng wǒmen huígù yīxià zhè yī nián.',en:"Let us look back on this past year."}},
  {id:'4-277',zh:'回应',py:'huíyìng',en:"to respond / response",ex:{zh:'他没有回应我的问题。',py:'Tā méiyǒu huíyìng wǒ de wèntí.',en:"He did not respond to my question."}},
  {id:'4-278',zh:'积累',py:'jīlěi',en:"to accumulate / accumulation",ex:{zh:'知识需要慢慢积累。',py:'Zhīshí xūyào mànman jīlěi.',en:"Knowledge needs to be accumulated gradually."}},
  {id:'4-279',zh:'激励',py:'jīlì',en:"to motivate / to inspire",ex:{zh:'老师的话激励了我。',py:'Lǎoshī de huà jīlìle wǒ.',en:"The teacher's words motivated me."}},
  {id:'4-280',zh:'即使',py:'jíshǐ',en:"even if / even though",ex:{zh:'即使很难，也要坚持。',py:'Jíshǐ hěn nán, yě yào jiānchí.',en:"Even if it is difficult, you must persist."}},
  {id:'4-281',zh:'技巧',py:'jìqiǎo',en:"skill / technique",ex:{zh:'写作需要一定的技巧。',py:'Xiězuò xūyào yīdìng de jìqiǎo.',en:"Writing requires certain skills."}},
  {id:'4-282',zh:'记录',py:'jìlù',en:"to record / record",ex:{zh:'请把这些内容记录下来。',py:'Qǐng bǎ zhèxiē nèiróng jìlù xiàlái.',en:"Please record this content."}},
  {id:'4-283',zh:'加强',py:'jiāqiáng',en:"to strengthen / to enhance",ex:{zh:'我们要加强学习。',py:'Wǒmen yào jiāqiáng xuéxí.',en:"We must strengthen our studies."}},
  {id:'4-284',zh:'坚定',py:'jiāndìng',en:"firm / resolute / steadfast",ex:{zh:'他坚定地走完了全程。',py:'Tā jiāndìng de zǒuwánle quánchéng.',en:"He firmly completed the whole journey."}},
  {id:'4-285',zh:'简称',py:'jiǎnchēng',en:"abbreviation / abbreviated name",ex:{zh:'中国的简称是"中"。',py:'"Zhōngguó" de jiǎnchēng shì "Zhōng".',en:'The abbreviation of China is "Zhōng".'}},
  {id:'4-286',zh:'建立',py:'jiànlì',en:"to establish / to set up",ex:{zh:'他们建立了良好的关系。',py:'Tāmen jiànlìle liánghǎo de guānxi.',en:"They established a good relationship."}},
  {id:'4-287',zh:'进步',py:'jìnbù',en:"progress / advance / to improve",ex:{zh:'他的学习进步很快。',py:'Tā de xuéxí jìnbù hěn kuài.',en:"His studies are progressing rapidly."}},
  {id:'4-288',zh:'精确',py:'jīngquè',en:"precise / accurate / exact",ex:{zh:'计算结果要精确。',py:'Jìsuàn jiéguǒ yào jīngquè.',en:"The calculated result must be precise."}},

  {id:'4-290',zh:'具备',py:'jùbèi',en:"to possess / to have",ex:{zh:'他具备了所需的条件。',py:'Tā jùbèile suǒ xū de tiáojiàn.',en:"He possesses the necessary conditions."}},
  {id:'4-291',zh:'具体',py:'jùtǐ',en:"specific / concrete",ex:{zh:'请说得具体一些。',py:'Qǐng shuō de jùtǐ yīxiē.',en:"Please be more specific."}},
  {id:'4-292',zh:'巨大',py:'jùdà',en:"huge / enormous / gigantic",ex:{zh:'这是一个巨大的挑战。',py:'Zhè shì yīgè jùdà de tiǎozhàn.',en:"This is an enormous challenge."}},
  {id:'4-293',zh:'开展',py:'kāizhǎn',en:"to carry out / to launch",ex:{zh:'学校开展了各种活动。',py:'Xuéxiào kāizhǎnle gèzhǒng huódòng.',en:"The school launched various activities."}},
  {id:'4-294',zh:'科技',py:'kējì',en:"science and technology",ex:{zh:'科技改变了我们的生活。',py:'Kējì gǎibiànle wǒmen de shēnghuó.',en:"Science and technology have changed our lives."}},
  {id:'4-295',zh:'可靠',py:'kěkào',en:"reliable / dependable",ex:{zh:'他是一个可靠的人。',py:'Tā shì yīgè kěkào de rén.',en:"He is a reliable person."}},
  {id:'4-296',zh:'控制',py:'kòngzhì',en:"to control / control",ex:{zh:'要学会控制自己的情绪。',py:'Yào xuéhuì kòngzhì zìjǐ de qíngxù.',en:"Learn to control your emotions."}},
  {id:'4-297',zh:'困境',py:'kùnjìng',en:"difficult situation / predicament",ex:{zh:'他陷入了困境。',py:'Tā xiànrùle kùnjìng.',en:"He fell into a difficult situation."}},
  {id:'4-298',zh:'扩大',py:'kuòdà',en:"to expand / to enlarge",ex:{zh:'公司计划扩大规模。',py:'Gōngsī jìhuà kuòdà guīmó.',en:"The company plans to expand its scale."}},
  {id:'4-299',zh:'来源',py:'láiyuán',en:"source / origin",ex:{zh:'这个消息来源不可靠。',py:'Zhège xiāoxi láiyuán bùkěkào.',en:"The source of this news is unreliable."}},
  {id:'4-300',zh:'朗读',py:'lǎngdú',en:"to read aloud / to recite",ex:{zh:'请大声朗读这段文章。',py:'Qǐng dàshēng lǎngdú zhè duàn wénzhāng.',en:"Please read this passage aloud."}},

  {id:'4-301',zh:'理论',py:'lǐlùn',en:"theory",ex:{zh:'理论要联系实际。',py:'Lǐlùn yào liánxì shíjì.',en:"Theory should be linked to practice."}},
  {id:'4-302',zh:'立场',py:'lìchǎng',en:"standpoint / position / stance",ex:{zh:'他的立场很坚定。',py:'Tā de lìchǎng hěn jiāndìng.',en:"His standpoint is very firm."}},
  {id:'4-303',zh:'利益',py:'lìyì',en:"benefit / interest / profit",ex:{zh:'要维护大家的利益。',py:'Yào wéihù dàjiā de lìyì.',en:"We must safeguard everyone's interests."}},
  {id:'4-304',zh:'逻辑',py:'luójí',en:"logic",ex:{zh:'他的思维很有逻辑。',py:'Tā de sīwéi hěn yǒu luójí.',en:"His thinking is very logical."}},
  {id:'4-305',zh:'落实',py:'luòshí',en:"to implement / to carry out",ex:{zh:'计划需要认真落实。',py:'Jìhuà xūyào rènzhēn luòshí.',en:"The plan needs to be implemented seriously."}},
  {id:'4-306',zh:'面临',py:'miànlín',en:"to face / to be confronted with",ex:{zh:'我们面临很多挑战。',py:'Wǒmen miànlín hěn duō tiǎozhàn.',en:"We are facing many challenges."}},
  {id:'4-307',zh:'明确',py:'míngquè',en:"clear / explicit / to clarify",ex:{zh:'目标要明确。',py:'Mùbiāo yào míngquè.',en:"Goals must be clear."}},
  {id:'4-308',zh:'模式',py:'móshì',en:"mode / pattern / model",ex:{zh:'他们改变了工作模式。',py:'Tāmen gǎibiànle gōngzuò móshì.',en:"They changed their work pattern."}},
  {id:'4-309',zh:'目前',py:'mùqián',en:"at present / currently",ex:{zh:'目前情况还不错。',py:'Mùqián qíngkuàng hái bùcuò.',en:"The current situation is not bad."}},
  {id:'4-310',zh:'内容',py:'nèiróng',en:"content / substance",ex:{zh:'这本书内容很丰富。',py:'Zhè běn shū nèiróng hěn fēngfù.',en:"The content of this book is very rich."}},
  {id:'4-311',zh:'能够',py:'nénggòu',en:"to be able to / can",ex:{zh:'他能够独立完成任务。',py:'Tā nénggòu dúlì wánchéng rènwù.',en:"He is able to complete the task independently."}},
  {id:'4-312',zh:'拟定',py:'nǐdìng',en:"to draft / to draw up",ex:{zh:'他们拟定了新计划。',py:'Tāmen nǐdìngle xīn jìhuà.',en:"They drafted a new plan."}},
  {id:'4-313',zh:'凝聚',py:'níngjù',en:"to concentrate / to unite",ex:{zh:'我们要凝聚力量。',py:'Wǒmen yào níngjù lìliàng.',en:"We must concentrate our strength."}},
  {id:'4-314',zh:'排列',py:'páiliè',en:"to arrange / to line up",ex:{zh:'请按顺序排列。',py:'Qǐng àn shùnxù páiliè.',en:"Please arrange in order."}},
  {id:'4-315',zh:'判断',py:'pànduàn',en:"to judge / judgment",ex:{zh:'要正确判断形势。',py:'Yào zhèngquè pànduàn xíngshì.',en:"You must judge the situation correctly."}},
  {id:'4-316',zh:'配合',py:'pèihé',en:"to cooperate / to coordinate",ex:{zh:'请配合我们的工作。',py:'Qǐng pèihé wǒmen de gōngzuò.',en:"Please cooperate with our work."}},
  {id:'4-317',zh:'品质',py:'pǐnzhì',en:"quality / character",ex:{zh:'这件产品品质很好。',py:'Zhè jiàn chǎnpǐn pǐnzhì hěn hǎo.',en:"The quality of this product is very good."}},
  {id:'4-318',zh:'平衡',py:'pínghéng',en:"balance / equilibrium",ex:{zh:'要保持工作和生活的平衡。',py:'Yào bǎochí gōngzuò hé shēnghuó de pínghéng.',en:"You must maintain balance between work and life."}},
  {id:'4-319',zh:'迫切',py:'pòqiē',en:"urgent / pressing",ex:{zh:'这是一个迫切需要解决的问题。',py:'Zhè shì yīgè pòqiē xūyào jiějué de wèntí.',en:"This is an urgently pressing problem."}},
  {id:'4-320',zh:'普遍',py:'pǔbiàn',en:"universal / common / widespread",ex:{zh:'这是一个普遍的现象。',py:'Zhè shì yīgè pǔbiàn de xiànxiàng.',en:"This is a widespread phenomenon."}},
  {id:'4-321',zh:'期望',py:'qīwàng',en:"expectation / hope / to expect",ex:{zh:'他没有达到父母的期望。',py:'Tā méiyǒu dádào fùmǔ de qīwàng.',en:"He did not meet his parents' expectations."}},
  {id:'4-322',zh:'其次',py:'qícì',en:"next / secondly / in addition",ex:{zh:'首先要努力，其次要有方法。',py:'Shǒuxiān yào nǔlì, qícì yào yǒu fāngfǎ.',en:"First you must work hard, and secondly have a method."}},
  {id:'4-323',zh:'气氛',py:'qìfēn',en:"atmosphere / ambience",ex:{zh:'教室里的学习气氛很浓。',py:'Jiàoshì lǐ de xuéxí qìfēn hěn nóng.',en:"The study atmosphere in the classroom is very strong."}},
  {id:'4-324',zh:'切实',py:'qièshí',en:"practical / realistic / effective",ex:{zh:'要制定切实可行的方案。',py:'Yào zhìdìng qièshí kěxíng de fāngàn.',en:"You must formulate a practical and feasible plan."}},
  {id:'4-325',zh:'倾向',py:'qīngxiàng',en:"tendency / inclination",ex:{zh:'他有懒惰的倾向。',py:'Tā yǒu lǎnduò de qīngxiàng.',en:"He has a tendency to be lazy."}},
  {id:'4-326',zh:'情感',py:'qínggǎn',en:"emotion / feeling",ex:{zh:'他的文章充满了情感。',py:'Tā de wénzhāng chōngmǎnle qínggǎn.',en:"His articles are full of emotion."}},
  {id:'4-327',zh:'趋势',py:'qūshì',en:"trend / tendency",ex:{zh:'这是未来的发展趋势。',py:'Zhè shì wèilái de fāzhǎn qūshì.',en:"This is the future development trend."}},
  {id:'4-328',zh:'取得',py:'qǔdé',en:"to obtain / to achieve",ex:{zh:'他取得了很好的成绩。',py:'Tā qǔdéle hěn hǎo de chéngjì.',en:"He achieved very good results."}},
  {id:'4-329',zh:'确保',py:'quèbǎo',en:"to ensure / to guarantee",ex:{zh:'要确保工程质量。',py:'Yào quèbǎo gōngchéng zhìliàng.',en:"The quality of the project must be ensured."}},
  {id:'4-330',zh:'热爱',py:'rè\'ài',en:"to love deeply / to be passionate about",ex:{zh:'他热爱自己的工作。',py:"Tā rè'ài zìjǐ de gōngzuò.",en:"He is passionate about his work."}},
  {id:'4-331',zh:'认可',py:'rènkě',en:"to approve / to recognize",ex:{zh:'他的努力得到了认可。',py:'Tā de nǔlì dédàole rènkě.',en:"His hard work was recognized."}},
  {id:'4-332',zh:'融入',py:'róngrù',en:"to blend in / to integrate into",ex:{zh:'他很快融入了新环境。',py:'Tā hěn kuài róngrùle xīn huánjìng.',en:"He quickly blended into the new environment."}},
  {id:'4-333',zh:'如今',py:'rújīn',en:"nowadays / now / at present",ex:{zh:'如今科技发展很快。',py:'Rújīn kējì fāzhǎn hěn kuài.',en:"Nowadays technology is developing rapidly."}},

  {id:'4-431',zh:'类似',py:'lèisì',en:"similar / alike",ex:{zh:'这两件事类似。',py:'Zhè liǎng jiàn shì lèisì.',en:"These two matters are similar."}},
  {id:'4-432',zh:'理想',py:'lǐxiǎng',en:"ideal / aspiration / dream",ex:{zh:'他有远大的理想。',py:'Tā yǒu yuǎndà de lǐxiǎng.',en:"He has great ideals."}},
  {id:'4-433',zh:'力争',py:'lìzhēng',en:"to strive for / to work hard to",ex:{zh:'他力争第一名。',py:'Tā lìzhēng dì yī míng.',en:"He strives to come in first place."}},
  {id:'4-434',zh:'联合',py:'liánhé',en:"to unite / joint / combined",ex:{zh:'两公司联合开展项目。',py:'Liǎng gōngsī liánhé kāizhǎn xiàngmù.',en:"Two companies jointly launched a project."}},
  {id:'4-435',zh:'列举',py:'lièjǔ',en:"to list / to enumerate",ex:{zh:'请列举几个例子。',py:'Qǐng lièjǔ jǐ gè lìzi.',en:"Please list a few examples."}},
  {id:'4-436',zh:'客观',py:'kèguān',en:"objective / impartial",ex:{zh:'要客观评价这件事。',py:'Yào kèguān píngjià zhè jiàn shì.',en:"Evaluate this matter objectively."}},
  {id:'4-437',zh:'抗拒',py:'kàngjù',en:"to resist / to defy",ex:{zh:'他无法抗拒这种诱惑。',py:'Tā wúfǎ kàngjù zhè zhǒng yòuhuò.',en:"He cannot resist this temptation."}},
  {id:'4-438',zh:'竞争',py:'jìngzhēng',en:"competition / to compete",ex:{zh:'市场竞争越来越激烈。',py:'Shìchǎng jìngzhēng yuèlái yuè jīliè.',en:"Market competition is becoming increasingly fierce."}},

  {id:'4-440',zh:'解读',py:'jiědú',en:"to interpret / to analyze",ex:{zh:'如何解读这首诗？',py:'Rúhé jiědú zhè shǒu shī?',en:"How do you interpret this poem?"}},
  {id:'4-441',zh:'借助',py:'jièzhù',en:"with the help of / by means of",ex:{zh:'借助工具，事半功倍。',py:'Jièzhù gōngjù, shì bàn gōng bèi.',en:"With the help of tools, you can achieve twice the result."}},
  {id:'4-442',zh:'渐渐',py:'jiànjiàn',en:"gradually / little by little",ex:{zh:'天色渐渐暗了。',py:'Tiānsè jiànjiàn àn le.',en:"The sky gradually darkened."}},
  {id:'4-443',zh:'减轻',py:'jiǎnqīng',en:"to reduce / to lighten",ex:{zh:'要减轻学生的压力。',py:'Yào jiǎnqīng xuésheng de yālì.',en:"Student pressure must be reduced."}},
  {id:'4-444',zh:'检验',py:'jiǎnyàn',en:"to test / to examine",ex:{zh:'实践是检验真理的标准。',py:'Shíjiàn shì jiǎnyàn zhēnlǐ de biāozhǔn.',en:"Practice is the standard for testing truth."}},
  {id:'4-445',zh:'互动',py:'hùdòng',en:"interaction / interactive",ex:{zh:'师生互动很重要。',py:'Shīshēng hùdòng hěn zhòngyào.',en:"Teacher-student interaction is very important."}},

  {id:'4-447',zh:'欢呼',py:'huānhū',en:"to cheer / to acclaim",ex:{zh:'观众欢呼雀跃。',py:'Guānzhòng huānhū quèyuè.',en:"The audience cheered and jumped for joy."}},
  {id:'4-448',zh:'活跃',py:'huóyuè',en:"active / lively / vibrant",ex:{zh:'课堂气氛很活跃。',py:'Kètáng qìfēn hěn huóyuè.',en:"The classroom atmosphere is very lively."}},
  {id:'4-449',zh:'获得',py:'huòdé',en:"to obtain / to gain / to win",ex:{zh:'他获得了冠军。',py:'Tā huòdéle guànjūn.',en:"He won the championship."}},
  {id:'4-450',zh:'基础',py:'jīchǔ',en:"foundation / basis / basic",ex:{zh:'打好基础很重要。',py:'Dǎ hǎo jīchǔ hěn zhòngyào.',en:"Building a solid foundation is very important."}},

  {id:'4-451',zh:'纪律',py:'jìlǜ',en:"discipline / rules",ex:{zh:'要遵守课堂纪律。',py:'Yào zūnshǒu kètáng jìlǜ.',en:"You must observe classroom discipline."}},
  {id:'4-452',zh:'继承',py:'jìchéng',en:"to inherit / to carry on",ex:{zh:'我们要继承优良传统。',py:'Wǒmen yào jìchéng yōuliáng chuántǒng.',en:"We must carry on good traditions."}},

  {id:'4-454',zh:'坚韧',py:'jiānrèn',en:"tenacious / resilient",ex:{zh:'他性格坚韧，从不放弃。',py:'Tā xìnggé jiānrèn, cóng bù fàngqì.',en:"He is tenacious and never gives up."}},
  {id:'4-455',zh:'交往',py:'jiāowǎng',en:"to associate with / social contact",ex:{zh:'与不同的人交往可以增长见识。',py:'Yǔ bùtóng de rén jiāowǎng kěyǐ zēngzhǎng jiànshi.',en:"Associating with different people can broaden your horizons."}},
  {id:'4-456',zh:'解放',py:'jiěfàng',en:"to liberate / liberation",ex:{zh:'教育是思想解放的途径。',py:'Jiàoyù shì sīxiǎng jiěfàng de tújìng.',en:"Education is a path to liberation of thought."}},

  {id:'4-459',zh:'经营',py:'jīngyíng',en:"to manage / to operate / to run",ex:{zh:'他经营着一家小店。',py:'Tā jīngyíngzhe yī jiā xiǎo diàn.',en:"He runs a small shop."}},

  {id:'4-462',zh:'开发',py:'kāifā',en:"to develop / to exploit",ex:{zh:'他们正在开发新产品。',py:'Tāmen zhèngzài kāifā xīn chǎnpǐn.',en:"They are developing new products."}},

  {id:'4-473',zh:'流程',py:'liúchéng',en:"process / procedure / workflow",ex:{zh:'请按照流程操作。',py:'Qǐng ànzhào liúchéng cāozuò.',en:"Please operate according to the procedure."}},

  {id:'4-481',zh:'民主',py:'mínzhǔ',en:"democracy / democratic",ex:{zh:'要通过民主方式解决问题。',py:'Yào tōngguò mínzhǔ fāngshì jiějué wèntí.',en:"Problems should be resolved through democratic means."}},
  {id:'4-482',zh:'模糊',py:'móhu',en:"vague / blurry / unclear",ex:{zh:'他的回答很模糊。',py:'Tā de huídá hěn móhu.',en:"His answer was very vague."}},

  {id:'4-485',zh:'培训',py:'péixùn',en:"training / to train",ex:{zh:'公司提供专业培训。',py:'Gōngsī tígōng zhuānyè péixùn.',en:"The company provides professional training."}},
  {id:'4-486',zh:'频率',py:'pínlǜ',en:"frequency / rate",ex:{zh:'他出错的频率很低。',py:'Tā chū cuò de pínlǜ hěn dī.',en:"His error frequency is very low."}},
  {id:'4-487',zh:'平均',py:'píngjūn',en:"average / on average",ex:{zh:'全班平均成绩是八十分。',py:'Quán bān píngjūn chéngjì shì bāshí fēn.',en:"The class average score is eighty points."}},
  {id:'4-488',zh:'批判',py:'pīpàn',en:"to criticize / criticism",ex:{zh:'要学会批判性思维。',py:'Yào xuéhuì pīpànxìng sīwéi.',en:"You must learn critical thinking."}},

  {id:'4-490',zh:'启示',py:'qǐshì',en:"inspiration / revelation / enlightenment",ex:{zh:'这个故事给了我很多启示。',py:'Zhège gùshi gěile wǒ hěn duō qǐshì.',en:"This story gave me a lot of inspiration."}},
  {id:'4-491',zh:'恰当',py:'qiàdàng',en:"appropriate / proper / fitting",ex:{zh:'用词要恰当。',py:'Yòngcí yào qiàdàng.',en:"Word choice must be appropriate."}},
  {id:'4-492',zh:'亲密',py:'qīnmì',en:"close / intimate / dear",ex:{zh:'他们是非常亲密的朋友。',py:'Tāmen shì fēicháng qīnmì de péngyǒu.',en:"They are very close friends."}},

  {id:'4-497',zh:'热门',py:'rèmén',en:"popular / hot / in demand",ex:{zh:'这个专业很热门。',py:'Zhège zhuānyè hěn rèmén.',en:"This major is very popular."}},
  {id:'4-498',zh:'认真',py:'rènzhēn',en:"serious / earnest / conscientious",ex:{zh:'做任何事都要认真。',py:'Zuò rènhé shì dōu yào rènzhēn.',en:"You must be serious in everything you do."}},
  {id:'4-499',zh:'任务',py:'rènwù',en:"task / mission / assignment",ex:{zh:'他顺利完成了任务。',py:'Tā shùnlì wánchéngle rènwù.',en:"He successfully completed the task."}},
  {id:'4-500',zh:'融资',py:'róngzī',en:"to raise funds / financing",ex:{zh:'公司正在进行融资。',py:'Gōngsī zhèngzài jìnxíng róngzī.',en:"The company is conducting financing."}},
  {id:'4-501',zh:'散布',py:'sànbù',en:"to spread / to disseminate",ex:{zh:'谣言散布得很快。',py:'Yáoyán sànbù de hěn kuài.',en:"Rumors spread very quickly."}},
  {id:'4-502',zh:'善于',py:'shànyú',en:"to be good at / to be skilled in",ex:{zh:'他善于表达自己的想法。',py:'Tā shànyú biǎodá zìjǐ de xiǎngfǎ.',en:"He is good at expressing his ideas."}},
  {id:'4-503',zh:'深入',py:'shēnrù',en:"in-depth / thorough / to go deep into",ex:{zh:'要深入研究这个问题。',py:'Yào shēnrù yánjiū zhège wèntí.',en:"This problem needs to be studied in depth."}},
  {id:'4-504',zh:'身份',py:'shēnfèn',en:"identity / status",ex:{zh:'请出示你的身份证。',py:'Qǐng chūshì nǐ de shēnfènzhèng.',en:"Please show your identity card."}},
  {id:'4-505',zh:'盛行',py:'shèngxíng',en:"to be prevalent / to be popular",ex:{zh:'这种文化在年轻人中很盛行。',py:'Zhè zhǒng wénhuà zài niánqīngrén zhōng hěn shèngxíng.',en:"This culture is very prevalent among young people."}},
  {id:'4-506',zh:'失败',py:'shībài',en:"failure / to fail",ex:{zh:'失败是成功之母。',py:'Shībài shì chénggōng zhī mǔ.',en:"Failure is the mother of success."}},
  {id:'4-507',zh:'实施',py:'shíshī',en:"to implement / to carry out",ex:{zh:'计划开始实施了。',py:'Jìhuà kāishǐ shíshī le.',en:"The plan has begun to be implemented."}},
  {id:'4-508',zh:'适应',py:'shìyìng',en:"to adapt / to adjust to",ex:{zh:'他很快适应了新环境。',py:'Tā hěn kuài shìyìngle xīn huánjìng.',en:"He quickly adapted to the new environment."}},
  {id:'4-509',zh:'顺利',py:'shùnlì',en:"smooth / without a hitch",ex:{zh:'希望一切进展顺利。',py:'Xīwàng yīqiē jìnzhǎn shùnlì.',en:"I hope everything proceeds smoothly."}},
  {id:'4-510',zh:'说服',py:'shuōfú',en:"to persuade / to convince",ex:{zh:'他说服了大家接受新方案。',py:'Tā shuōfúle dàjiā jiēshòu xīn fāngàn.',en:"He persuaded everyone to accept the new plan."}},
  {id:'4-511',zh:'素质',py:'sùzhì',en:"quality / overall ability / caliber",ex:{zh:'提高学生的综合素质很重要。',py:'Tígāo xuésheng de zōnghé sùzhì hěn zhòngyào.',en:"Improving the overall quality of students is important."}},
  {id:'4-512',zh:'缩小',py:'suōxiǎo',en:"to reduce / to narrow / to shrink",ex:{zh:'两者的差距在逐渐缩小。',py:'Liǎng zhě de chājù zài zhújiàn suōxiǎo.',en:"The gap between the two is gradually narrowing."}},

  {id:'4-514',zh:'体验',py:'tǐyàn',en:"experience / to experience",ex:{zh:'这是一次难忘的体验。',py:'Zhè shì yī cì nánwàng de tǐyàn.',en:"This is an unforgettable experience."}},

  {id:'4-516',zh:'统一',py:'tǒngyī',en:"to unify / unified / consistent",ex:{zh:'思想上要统一认识。',py:'Sīxiǎng shàng yào tǒngyī rènshi.',en:"Understanding must be unified in thinking."}},

  {id:'4-518',zh:'突出',py:'tūchū',en:"prominent / outstanding / to stand out",ex:{zh:'他的成绩很突出。',py:'Tā de chéngjì hěn tūchū.',en:"His achievements are outstanding."}},

  {id:'4-520',zh:'推理',py:'tuīlǐ',en:"to reason / reasoning / inference",ex:{zh:'逻辑推理能力很重要。',py:'Luójí tuīlǐ nénglì hěn zhòngyào.',en:"Logical reasoning ability is very important."}},
  {id:'4-521',zh:'未来',py:'wèilái',en:"future",ex:{zh:'我们要为未来做好准备。',py:'Wǒmen yào wèi wèilái zuò hǎo zhǔnbèi.',en:"We must prepare well for the future."}},
  {id:'4-522',zh:'文明',py:'wénmíng',en:"civilization / civilized",ex:{zh:'中国有悠久的文明历史。',py:'Zhōngguó yǒu yōujiǔ de wénmíng lìshǐ.',en:"China has a long history of civilization."}},
  {id:'4-523',zh:'务必',py:'wùbì',en:"must / be sure to / absolutely",ex:{zh:'你务必准时到达。',py:'Nǐ wùbì zhǔnshí dàodá.',en:"You must arrive on time."}},
  {id:'4-524',zh:'习惯',py:'xíguàn',en:"habit / to be accustomed to",ex:{zh:'好习惯要从小培养。',py:'Hǎo xíguàn yào cóng xiǎo péiyǎng.',en:"Good habits should be cultivated from an early age."}},
  {id:'4-525',zh:'显示',py:'xiǎnshì',en:"to show / to display / to demonstrate",ex:{zh:'数据显示情况在好转。',py:'Shùjù xiǎnshì qíngkuàng zài hǎozhuǎn.',en:"Data shows the situation is improving."}},
  {id:'4-526',zh:'相关',py:'xiāngguān',en:"related / relevant / associated",ex:{zh:'这与我的专业相关。',py:'Zhè yǔ wǒ de zhuānyè xiāngguān.',en:"This is related to my major."}},
  {id:'4-527',zh:'项目',py:'xiàngmù',en:"project / program / item",ex:{zh:'他主持了一个重要项目。',py:'Tā zhǔchíle yīgè zhòngyào xiàngmù.',en:"He led an important project."}},
  {id:'4-528',zh:'消极',py:'xiāojí',en:"negative / passive / pessimistic",ex:{zh:'不要有消极的态度。',py:'Bùyào yǒu xiāojí de tàidù.',en:"Don't have a negative attitude."}},
  {id:'4-529',zh:'协调',py:'xiétiáo',en:"to coordinate / coordination",ex:{zh:'各部门要协调合作。',py:'Gè bùmén yào xiétiáo hézuò.',en:"All departments must coordinate and cooperate."}},
  {id:'4-530',zh:'心理',py:'xīnlǐ',en:"psychology / mental / mindset",ex:{zh:'要有良好的心理素质。',py:'Yào yǒu liánghǎo de xīnlǐ sùzhì.',en:"You must have good psychological quality."}},
  {id:'4-531',zh:'信念',py:'xìnniàn',en:"belief / conviction / faith",ex:{zh:'坚定的信念是成功的基础。',py:'Jiāndìng de xìnniàn shì chénggōng de jīchǔ.',en:"Firm conviction is the foundation of success."}},
  {id:'4-532',zh:'兴趣',py:'xìngqù',en:"interest / hobby",ex:{zh:'培养兴趣爱好很重要。',py:'Péiyǎng xìngqù àihào hěn zhòngyào.',en:"Cultivating interests and hobbies is very important."}},
  {id:'4-533',zh:'修养',py:'xiūyǎng',en:"cultivation / accomplishment / self-improvement",ex:{zh:'他的艺术修养很高。',py:'Tā de yìshù xiūyǎng hěn gāo.',en:"His artistic cultivation is very high."}},
  {id:'4-534',zh:'熟悉',py:'shúxī',en:"familiar with / to know well",ex:{zh:'他对这个城市很熟悉。',py:'Tā duì zhège chéngshì hěn shúxī.',en:"He is very familiar with this city."}},
  {id:'4-535',zh:'摇摆',py:'yáobǎi',en:"to sway / to waver / to vacillate",ex:{zh:'做决定不能摇摆不定。',py:'Zuò juédìng bùnéng yáobǎi bùdìng.',en:"When making decisions you cannot keep wavering."}},
  {id:'4-536',zh:'一系列',py:'yī xìliè',en:"a series of",ex:{zh:'他采取了一系列措施。',py:'Tā cǎiqǔle yī xìliè cuòshī.',en:"He took a series of measures."}},
  {id:'4-537',zh:'以往',py:'yǐwǎng',en:"in the past / formerly",ex:{zh:'以往的经验对我很有帮助。',py:'Yǐwǎng de jīngyàn duì wǒ hěn yǒu bāngzhù.',en:"Past experience is very helpful to me."}},
  {id:'4-538',zh:'引导',py:'yǐndǎo',en:"to guide / to lead",ex:{zh:'老师引导学生思考问题。',py:'Lǎoshī yǐndǎo xuésheng sīkǎo wèntí.',en:"The teacher guides students to think about problems."}},
  {id:'4-539',zh:'应当',py:'yīngdāng',en:"should / ought to",ex:{zh:'我们应当尊重老人。',py:'Wǒmen yīngdāng zūnzhòng lǎorén.',en:"We ought to respect the elderly."}},
  {id:'4-540',zh:'永远',py:'yǒngyuǎn',en:"forever / always",ex:{zh:'友谊永远是宝贵的。',py:'Yǒuyì yǒngyuǎn shì bǎoguì de.',en:"Friendship is always precious."}},
  {id:'4-541',zh:'有效',py:'yǒuxiào',en:"effective / valid",ex:{zh:'这个方法很有效。',py:'Zhège fāngfǎ hěn yǒuxiào.',en:"This method is very effective."}},
  {id:'4-542',zh:'诱惑',py:'yòuhuò',en:"temptation / to tempt",ex:{zh:'他抵制了金钱的诱惑。',py:'Tā dǐzhìle jīnqián de yòuhuò.',en:"He resisted the temptation of money."}},
  {id:'4-543',zh:'与众不同',py:'yǔ zhòng bùtóng',en:"unique / different from others",ex:{zh:'他的想法与众不同。',py:'Tā de xiǎngfǎ yǔ zhòng bùtóng.',en:"His ideas are unique and different from others."}},
  {id:'4-544',zh:'预测',py:'yùcè',en:"to predict / forecast",ex:{zh:'很难预测未来的发展。',py:'Hěn nán yùcè wèilái de fāzhǎn.',en:"It is hard to predict future development."}},
  {id:'4-545',zh:'元旦',py:'Yuándàn',en:"New Year's Day",ex:{zh:'元旦是一月一日。',py:'Yuándàn shì yī yuè yī rì.',en:"New Year's Day is January first."}},
  {id:'4-546',zh:'月份',py:'yuèfèn',en:"month",ex:{zh:'下个月份我会回来。',py:'Xià gè yuèfèn wǒ huì huílái.',en:"I will return next month."}},
  {id:'4-547',zh:'允许',py:'yǔnxǔ',en:"to allow / to permit",ex:{zh:'这里不允许吸烟。',py:'Zhèlǐ bù yǔnxǔ xīyān.',en:"Smoking is not allowed here."}},
  {id:'4-548',zh:'运作',py:'yùnzuò',en:"to operate / to function",ex:{zh:'这个系统运作正常。',py:'Zhège xìtǒng yùnzuò zhèngcháng.',en:"This system is operating normally."}},
  {id:'4-549',zh:'赞扬',py:'zànyáng',en:"to praise / to commend",ex:{zh:'老师赞扬了他的进步。',py:'Lǎoshī zànyángle tā de jìnbù.',en:"The teacher praised his progress."}},
  {id:'4-550',zh:'造就',py:'zàojiù',en:"to bring up / to create / to mold",ex:{zh:'逆境造就了坚强的人。',py:'Nìjìng zàojiùle jiānqiáng de rén.',en:"Adversity creates strong people."}},
  {id:'4-551',zh:'增强',py:'zēngqiáng',en:"to strengthen / to enhance",ex:{zh:'要增强自信心。',py:'Yào zēngqiáng zìxìnxīn.',en:"You must strengthen your self-confidence."}},
  {id:'4-552',zh:'展开',py:'zhǎnkāi',en:"to unfold / to launch / to carry out",ex:{zh:'他们展开了激烈的讨论。',py:'Tāmen zhǎnkāile jīliè de tǎolùn.',en:"They launched a heated discussion."}},
  {id:'4-553',zh:'争取',py:'zhēngqǔ',en:"to strive for / to try hard to get",ex:{zh:'要争取每一个机会。',py:'Yào zhēngqǔ měi yīgè jīhuì.',en:"You must strive for every opportunity."}},
  {id:'4-554',zh:'整合',py:'zhěnghé',en:"to integrate / to consolidate",ex:{zh:'需要整合各方资源。',py:'Xūyào zhěnghé gèfāng zīyuán.',en:"Resources from all sides need to be integrated."}},
  {id:'4-555',zh:'正确',py:'zhèngquè',en:"correct / right / accurate",ex:{zh:'要用正确的方法解决问题。',py:'Yào yòng zhèngquè de fāngfǎ jiějué wèntí.',en:"You must use the correct method to solve problems."}},
  {id:'4-556',zh:'知名',py:'zhīmíng',en:"well-known / famous",ex:{zh:'他是一位知名学者。',py:'Tā shì yī wèi zhīmíng xuézhě.',en:"He is a well-known scholar."}},
  {id:'4-557',zh:'执行',py:'zhíxíng',en:"to execute / to carry out",ex:{zh:'计划需要认真执行。',py:'Jìhuà xūyào rènzhēn zhíxíng.',en:"The plan needs to be carried out seriously."}},
  {id:'4-558',zh:'主张',py:'zhǔzhāng',en:"to advocate / standpoint / position",ex:{zh:'他主张通过对话解决问题。',py:'Tā zhǔzhāng tōngguò duìhuà jiějué wèntí.',en:"He advocates solving problems through dialogue."}},
  {id:'4-559',zh:'专注',py:'zhuānzhù',en:"focused / concentrated / attentive",ex:{zh:'学习要专注。',py:'Xuéxí yào zhuānzhù.',en:"You must be focused when studying."}},
  {id:'4-560',zh:'自然',py:'zìrán',en:"nature / natural / naturally",ex:{zh:'保护自然环境是我们的责任。',py:'Bǎohù zìrán huánjìng shì wǒmen de zérèn.',en:"Protecting the natural environment is our responsibility."}},
  {id:'4-561',zh:'自主',py:'zìzhǔ',en:"independent / autonomous / self-directed",ex:{zh:'要培养自主学习的能力。',py:'Yào péiyǎng zìzhǔ xuéxí de nénglì.',en:"You must cultivate the ability to learn independently."}},
  {id:'4-562',zh:'综上',py:'zōng shàng',en:"in summary / to sum up",ex:{zh:'综上所述，这个计划是可行的。',py:'Zōng shàng suǒ shù, zhège jìhuà shì kěxíng de.',en:"In summary, this plan is feasible."}},
  {id:'4-563',zh:'足够',py:'zúgòu',en:"enough / sufficient",ex:{zh:'时间足够完成任务。',py:'Shíjiān zúgòu wánchéng rènwù.',en:"There is enough time to complete the task."}},
  {id:'4-564',zh:'尊敬',py:'zūnjìng',en:"to respect / to revere",ex:{zh:'我们要尊敬老师。',py:'Wǒmen yào zūnjìng lǎoshī.',en:"We must respect teachers."}},
  {id:'4-565',zh:'作风',py:'zuòfēng',en:"style of work / conduct",ex:{zh:'他的工作作风很严谨。',py:'Tā de gōngzuò zuòfēng hěn yánjǐn.',en:"His work style is very rigorous."}},
  {id:'4-566',zh:'作为',py:'zuòwéi',en:"as / in the capacity of / conduct",ex:{zh:'作为学生，要认真学习。',py:'Zuòwéi xuésheng, yào rènzhēn xuéxí.',en:"As a student, you must study seriously."}},
  {id:'4-567',zh:'妥当',py:'tuǒdàng',en:"appropriate / proper / well-arranged",ex:{zh:'这件事处理得很妥当。',py:'Zhè jiàn shì chǔlǐ de hěn tuǒdàng.',en:"This matter was handled very appropriately."}},
  {id:'4-568',zh:'相互',py:'xiānghù',en:"mutual / each other / reciprocal",ex:{zh:'同学之间要相互帮助。',py:'Tóngxué zhī jiān yào xiānghù bāngzhù.',en:"Classmates should help each other."}},
  {id:'4-569',zh:'以上',py:'yǐshàng',en:"above / more than / over",ex:{zh:'以上内容请认真学习。',py:'Yǐshàng nèiróng qǐng rènzhēn xuéxí.',en:"Please study the above content seriously."}},
