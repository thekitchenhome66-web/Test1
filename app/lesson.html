  {id:'5-395',zh:'一丝不苟',py:'yī sī bù gǒu',en:"meticulous / not the least bit careless",ex:{zh:'他工作一丝不苟。',py:'Tā gōngzuò yī sī bù gǒu.',en:"He is meticulous in his work."}},
  {id:'5-396',zh:'刚柔并济',py:'gāng róu bìng jì',en:"to balance hardness and softness",ex:{zh:'处理事情要刚柔并济。',py:'Chǔlǐ shìqing yào gāng róu bìng jì.',en:"Handle matters by balancing firmness and gentleness."}},
  {id:'5-397',zh:'蓬勃',py:'péngbó',en:"vigorous / thriving / booming",ex:{zh:'经济蓬勃发展。',py:'Jīngjì péngbó fāzhǎn.',en:"The economy is developing vigorously."}},
  {id:'5-398',zh:'宝贵',py:'bǎoguì',en:"precious / valuable",ex:{zh:'时间是最宝贵的资源。',py:'Shíjiān shì zuì bǎoguì de zīyuán.',en:"Time is the most precious resource."}},
  {id:'5-399',zh:'长远',py:'chángyuǎn',en:"long-term / far-sighted",ex:{zh:'要有长远的战略眼光。',py:'Yào yǒu chángyuǎn de zhànlüè yǎnguāng.',en:"You must have long-term strategic vision."}},
  {id:'5-400',zh:'化茧成蝶',py:'huà jiǎn chéng dié',en:"to transform / to emerge transformed",ex:{zh:'经过努力，他化茧成蝶，走向成功。',py:'Jīngguò nǔlì, tā huà jiǎn chéng dié, zǒuxiàng chénggōng.',en:"Through hard work, he transformed and walked toward success."}},

  {id:'5-401',zh:'把持',py:'bǎchí',en:"to control / to monopolize",ex:{zh:'他把持着公司的大权。',py:'Tā bǎchízhe gōngsī de dàquán.',en:"He monopolizes the power of the company."}},
  {id:'5-402',zh:'颁发',py:'bānfā',en:"to issue / to award / to confer",ex:{zh:'颁发奖状给优秀学生。',py:'Bānfā jiǎngzhuàng gěi yōuxiù xuésheng.',en:"Award certificates to outstanding students."}},
  {id:'5-403',zh:'包庇',py:'bāobì',en:"to shield / to cover up for",ex:{zh:'不能包庇违法行为。',py:'Bùnéng bāobì wéifǎ xíngwéi.',en:"Illegal behavior must not be covered up."}},
  {id:'5-404',zh:'背叛',py:'bèipàn',en:"to betray / betrayal",ex:{zh:'他背叛了朋友的信任。',py:'Tā bèipànle péngyǒu de xìnrèn.',en:"He betrayed his friend's trust."}},
  {id:'5-405',zh:'奔波',py:'bēnbō',en:"to rush about / to bustle",ex:{zh:'他为生活奔波劳碌。',py:'Tā wèi shēnghuó bēnbō láolù.',en:"He rushes about busily for a living."}},
  {id:'5-406',zh:'弊端',py:'bìduān',en:"drawback / malpractice / abuse",ex:{zh:'这个制度有很多弊端。',py:'Zhège zhìdù yǒu hěn duō bìduān.',en:"This system has many drawbacks."}},
  {id:'5-407',zh:'边缘',py:'biānyuán',en:"edge / margin / fringe",ex:{zh:'他生活在社会的边缘。',py:'Tā shēnghuó zài shèhuì de biānyuán.',en:"He lives on the fringe of society."}},
  {id:'5-408',zh:'变革',py:'biàngé',en:"reform / transformation / change",ex:{zh:'时代在不断变革。',py:'Shídài zài bùduàn biàngé.',en:"The times are constantly changing."}},
  {id:'5-409',zh:'辩护',py:'biànhù',en:"to defend / to speak in defense of",ex:{zh:'律师为被告进行辩护。',py:'Lǜshī wèi bèigào jìnxíng biànhù.',en:"The lawyer defended the defendant."}},
  {id:'5-410',zh:'别具一格',py:'bié jù yī gé',en:"unique / having a distinctive style",ex:{zh:'他的作品别具一格。',py:'Tā de zuòpǐn bié jù yī gé.',en:"His works have a distinctive style."}},
  {id:'5-411',zh:'博大',py:'bódà',en:"vast / broad / extensive",ex:{zh:'中国文化博大精深。',py:'Zhōngguó wénhuà bódà jīngshēn.',en:"Chinese culture is vast and profound."}},
  {id:'5-412',zh:'布局',py:'bùjú',en:"layout / arrangement / strategy",ex:{zh:'他对未来做了周密的布局。',py:'Tā duì wèilái zuòle zhōumì de bùjú.',en:"He made careful arrangements for the future."}},
  {id:'5-413',zh:'步伐',py:'bùfá',en:"pace / step / footstep",ex:{zh:'改革的步伐不断加快。',py:'Gǎigé de bùfá bùduàn jiākuài.',en:"The pace of reform keeps accelerating."}},
  {id:'5-414',zh:'猜测',py:'cāicè',en:"to guess / to speculate",ex:{zh:'不要随意猜测别人的意图。',py:'Bùyào suíyì cāicè biéren de yìtú.',en:"Don't casually speculate about others' intentions."}},
  {id:'5-415',zh:'参照',py:'cānzhào',en:"to refer to / to use as reference",ex:{zh:'请参照这个模板修改文件。',py:'Qǐng cānzhào zhège múbǎn xiūgǎi wénjiàn.',en:"Please modify the document referring to this template."}},
  {id:'5-416',zh:'操控',py:'cāokòng',en:"to manipulate / to operate",ex:{zh:'他善于操控局势。',py:'Tā shànyú cāokòng júshì.',en:"He is good at manipulating the situation."}},
  {id:'5-417',zh:'策略',py:'cèlüè',en:"strategy / tactics",ex:{zh:'要制定合适的竞争策略。',py:'Yào zhìdìng héshì de jìngzhēng cèlüè.',en:"Appropriate competitive strategies must be formulated."}},
  {id:'5-418',zh:'产业',py:'chǎnyè',en:"industry / enterprise",ex:{zh:'文化产业正在蓬勃发展。',py:'Wénhuà chǎnyè zhèngzài péngbó fāzhǎn.',en:"The cultural industry is developing vigorously."}},
  {id:'5-419',zh:'阐明',py:'chǎnmíng',en:"to clarify / to explain clearly",ex:{zh:'他阐明了自己的立场。',py:'Tā chǎnmíngle zìjǐ de lìchǎng.',en:"He clarified his own position."}},
  {id:'5-420',zh:'超前',py:'chāoqián',en:"ahead of the times / advanced",ex:{zh:'他的思想非常超前。',py:'Tā de sīxiǎng fēicháng chāoqián.',en:"His thinking is very advanced."}},
  {id:'5-421',zh:'沉稳',py:'chénwěn',en:"steady / composed / calm",ex:{zh:'他处事沉稳，从不慌乱。',py:'Tā chǔshì chénwěn, cóng bù huāngluàn.',en:"He is steady in handling matters and never panics."}},
  {id:'5-422',zh:'承诺',py:'chéngnuò',en:"promise / commitment / to promise",ex:{zh:'他履行了自己的承诺。',py:'Tā lǚxíngle zìjǐ de chéngnuò.',en:"He fulfilled his promise."}},
  {id:'5-423',zh:'惩处',py:'chéngchǔ',en:"to punish / to penalize",ex:{zh:'违法行为必须依法惩处。',py:'Wéifǎ xíngwéi bìxū yīfǎ chéngchǔ.',en:"Illegal behavior must be punished according to law."}},
  {id:'5-424',zh:'持之以恒',py:'chí zhī yǐ héng',en:"to persevere / to keep at it",ex:{zh:'学习要持之以恒。',py:'Xuéxí yào chí zhī yǐ héng.',en:"You must persevere in your studies."}},
  {id:'5-425',zh:'筹备',py:'chóubèi',en:"to prepare / to arrange",ex:{zh:'他们正在筹备这次活动。',py:'Tāmen zhèngzài chóubèi zhè cì huódòng.',en:"They are preparing for this event."}},
  {id:'5-426',zh:'出路',py:'chūlù',en:"way out / outlet / solution",ex:{zh:'他为年轻人找到了出路。',py:'Tā wèi niánqīngrén zhǎodào le chūlù.',en:"He found a way out for young people."}},
  {id:'5-427',zh:'传播',py:'chuánbō',en:"to spread / to disseminate",ex:{zh:'信息通过网络迅速传播。',py:'Xìnxī tōngguò wǎngluò xùnsù chuánbō.',en:"Information spreads rapidly through the internet."}},
  {id:'5-428',zh:'创业',py:'chuàngyè',en:"to start a business / entrepreneurship",ex:{zh:'越来越多的年轻人选择创业。',py:'Yuèlái yuè duō de niánqīngrén xuǎnzé chuàngyè.',en:"More and more young people choose to start businesses."}},
  {id:'5-429',zh:'错综复杂',py:'cuòzōng fùzá',en:"intricate / complicated / complex",ex:{zh:'形势错综复杂，难以判断。',py:'Xíngshì cuòzōng fùzá, nán yǐ pànduàn.',en:"The situation is intricate and complex, hard to judge."}},
  {id:'5-430',zh:'达到',py:'dádào',en:"to reach / to achieve / to attain",ex:{zh:'他达到了人生的目标。',py:'Tā dádàole rénshēng de mùbiāo.',en:"He attained his life goals."}},
  {id:'5-431',zh:'打破',py:'dǎpò',en:"to break / to shatter / to overcome",ex:{zh:'他打破了世界纪录。',py:'Tā dǎpòle shìjiè jìlù.',en:"He broke the world record."}},
  {id:'5-432',zh:'大局',py:'dàjú',en:"overall situation / big picture",ex:{zh:'要顾全大局，不能只顾个人利益。',py:'Yào gùquán dàjú, bùnéng zhǐ gù gèrén lìyì.',en:"You must consider the overall situation and not just personal interests."}},
  {id:'5-433',zh:'大幅',py:'dàfú',en:"by a large margin / significantly",ex:{zh:'经济大幅增长。',py:'Jīngjì dàfú zēngzhǎng.',en:"The economy grew significantly."}},
  {id:'5-434',zh:'淡然',py:'dànrán',en:"indifferent / calm / unmoved",ex:{zh:'他对荣誉十分淡然。',py:'Tā duì róngyù shífēn dànrán.',en:"He is very indifferent toward honors."}},
  {id:'5-435',zh:'当仁不让',py:'dāng rén bù ràng',en:"to take responsibility without hesitation",ex:{zh:'面对挑战，他当仁不让。',py:'Miànduì tiǎozhàn, tā dāng rén bù ràng.',en:"Facing the challenge, he took responsibility without hesitation."}},
  {id:'5-436',zh:'刀刃',py:'dāorèn',en:"blade / cutting edge",ex:{zh:'要把资源用在刀刃上。',py:'Yào bǎ zīyuán yòng zài dāorèn shàng.',en:"Resources must be used where they matter most."}},
  {id:'5-437',zh:'倒退',py:'dàotuì',en:"to retreat / to go backward",ex:{zh:'不能让历史倒退。',py:'Bùnéng ràng lìshǐ dàotuì.',en:"History must not be allowed to go backward."}},
  {id:'5-438',zh:'道路',py:'dàolù',en:"road / path / way",ex:{zh:'选择正确的人生道路很重要。',py:'Xuǎnzé zhèngquè de rénshēng dàolù hěn zhòngyào.',en:"Choosing the right path in life is very important."}},
  {id:'5-439',zh:'得失',py:'déshī',en:"gains and losses",ex:{zh:'不要太计较得失。',py:'Bùyào tài jìjiào déshī.',en:"Don't be too concerned about gains and losses."}},
  {id:'5-440',zh:'登峰造极',py:'dēng fēng zào jí',en:"to reach the peak / to attain the highest level",ex:{zh:'他的技艺已经登峰造极。',py:'Tā de jìyì yǐjīng dēng fēng zào jí.',en:"His skills have reached the highest level."}},
  {id:'5-441',zh:'底蕴',py:'dǐyùn',en:"inner quality / accumulation / foundation",ex:{zh:'他有深厚的文化底蕴。',py:'Tā yǒu shēnhòu de wénhuà dǐyùn.',en:"He has a profound cultural foundation."}},
  {id:'5-442',zh:'抵御',py:'dǐyù',en:"to resist / to defend against",ex:{zh:'要提高抵御风险的能力。',py:'Yào tígāo dǐyù fēngxiǎn de nénglì.',en:"The ability to resist risks must be improved."}},
  {id:'5-443',zh:'递进',py:'dìjìn',en:"to advance progressively / gradual",ex:{zh:'问题解决要循序渐进，逐步递进。',py:'Wèntí jiějué yào xúnxù jiànjìn, zhúbù dìjìn.',en:"Problem-solving should proceed gradually and progressively."}},
  {id:'5-444',zh:'调节',py:'tiáojié',en:"to regulate / to adjust",ex:{zh:'要学会调节自己的情绪。',py:'Yào xuéhuì tiáojié zìjǐ de qíngxù.',en:"Learn to regulate your own emotions."}},
  {id:'5-445',zh:'动荡',py:'dòngdàng',en:"turbulent / unstable / unrest",ex:{zh:'社会动荡影响了民众生活。',py:'Shèhuì dòngdàng yǐngxiǎngle mínzhòng shēnghuó.',en:"Social unrest affected people's lives."}},
  {id:'5-446',zh:'独树一帜',py:'dú shù yī zhì',en:"to be unique / to stand out",ex:{zh:'他的风格在同行中独树一帜。',py:'Tā de fēnggé zài tóngháng zhōng dú shù yī zhì.',en:"His style stands out among his peers."}},
  {id:'5-447',zh:'端正',py:'duānzhèng',en:"upright / proper / to straighten",ex:{zh:'态度要端正。',py:'Tàidù yào duānzhèng.',en:"Your attitude must be upright."}},
  {id:'5-448',zh:'对峙',py:'duìzhì',en:"to confront / to stand off",ex:{zh:'两国军队在边境对峙。',py:'Liǎng guó jūnduì zài biānjìng duìzhì.',en:"The armies of two countries stand off at the border."}},
  {id:'5-449',zh:'多元化',py:'duōyuánhuà',en:"diversification / pluralization",ex:{zh:'社会正在向多元化方向发展。',py:'Shèhuì zhèngzài xiàng duōyuánhuà fāngxiàng fāzhǎn.',en:"Society is developing toward diversification."}},
  {id:'5-450',zh:'饿',py:'è',en:"hungry / to starve",ex:{zh:'他因为工作忘了吃饭，现在很饿。',py:'Tā yīnwèi gōngzuò wàngle chīfàn, xiànzài hěn è.',en:"He forgot to eat because of work and is now very hungry."}},
  {id:'5-451',zh:'恩惠',py:'ēnhuì',en:"favor / grace / benefit",ex:{zh:'他感谢老师的恩惠。',py:'Tā gǎnxiè lǎoshī de ēnhuì.',en:"He is grateful for the teacher's kindness."}},
  {id:'5-452',zh:'反差',py:'fǎnchā',en:"contrast / discrepancy",ex:{zh:'理想与现实之间形成了强烈反差。',py:'Lǐxiǎng yǔ xiànshí zhī jiān xíngchéngle qiángliè fǎnchā.',en:"A strong contrast formed between ideals and reality."}},
  {id:'5-453',zh:'方向',py:'fāngxiàng',en:"direction / orientation",ex:{zh:'找准方向，才能事半功倍。',py:'Zhǎozhǔn fāngxiàng, cái néng shì bàn gōng bèi.',en:"Find the right direction to achieve twice the results."}},
  {id:'5-454',zh:'扶持',py:'fúchí',en:"to support / to help",ex:{zh:'政府扶持小微企业发展。',py:'Zhèngfǔ fúchí xiǎo wēi qǐyè fāzhǎn.',en:"The government supports the development of small enterprises."}},
  {id:'5-455',zh:'复苏',py:'fùsū',en:"to revive / recovery",ex:{zh:'经济开始复苏。',py:'Jīngjì kāishǐ fùsū.',en:"The economy began to recover."}},
  {id:'5-456',zh:'高瞻远瞩',py:'gāo zhān yuǎn zhǔ',en:"far-sighted / with a broad vision",ex:{zh:'领导者要高瞻远瞩。',py:'Lǐngdǎo zhě yào gāo zhān yuǎn zhǔ.',en:"Leaders must be far-sighted."}},
  {id:'5-457',zh:'根治',py:'gēnzhì',en:"to cure / to eradicate fundamentally",ex:{zh:'要根治腐败问题。',py:'Yào gēnzhì fǔbài wèntí.',en:"The problem of corruption must be fundamentally eradicated."}},
  {id:'5-458',zh:'攻克',py:'gōngkè',en:"to overcome / to capture / to conquer",ex:{zh:'他攻克了技术难关。',py:'Tā gōngkèle jìshù nánguān.',en:"He overcame the technical difficulties."}},
  {id:'5-459',zh:'功效',py:'gōngxiào',en:"effect / efficacy / function",ex:{zh:'这种药物功效显著。',py:'Zhè zhǒng yàowù gōngxiào xiǎnzhù.',en:"This medicine has remarkable efficacy."}},
  {id:'5-460',zh:'鼓舞',py:'gǔwǔ',en:"to inspire / to encourage / to hearten",ex:{zh:'胜利的消息鼓舞了大家。',py:'Shènglì de xiāoxi gǔwǔle dàjiā.',en:"The news of victory encouraged everyone."}},
  {id:'5-461',zh:'贯彻',py:'guànchè',en:"to implement / to carry through",ex:{zh:'要贯彻落实这项政策。',py:'Yào guànchè luòshí zhè xiàng zhèngcè.',en:"This policy must be implemented and carried through."}},
  {id:'5-462',zh:'规避',py:'guībì',en:"to evade / to avoid / to circumvent",ex:{zh:'要学会规避风险。',py:'Yào xuéhuì guībì fēngxiǎn.',en:"You must learn to avoid risks."}},
  {id:'5-463',zh:'过激',py:'guòjī',en:"excessive / extreme / too radical",ex:{zh:'不能做出过激的反应。',py:'Bùnéng zuòchū guòjī de fǎnyìng.',en:"You must not make an excessive reaction."}},
  {id:'5-464',zh:'海纳百川',py:'hǎi nà bǎi chuān',en:"all rivers run into the sea / inclusive",ex:{zh:'一个好的团队要海纳百川。',py:'Yīgè hǎo de tuánduì yào hǎi nà bǎi chuān.',en:"A good team must be inclusive of all."}},
  {id:'5-465',zh:'捍卫',py:'hànwèi',en:"to defend / to safeguard",ex:{zh:'要捍卫国家主权。',py:'Yào hànwèi guójiā zhǔquán.',en:"National sovereignty must be defended."}},
  {id:'5-466',zh:'好高骛远',py:'hào gāo wù yuǎn',en:"to aim too high / unrealistic ambition",ex:{zh:'不能好高骛远，要脚踏实地。',py:'Bùnéng hào gāo wù yuǎn, yào jiǎo tà shí dì.',en:"Don't aim too high — be down-to-earth."}},
  {id:'5-467',zh:'洪流',py:'hóngliú',en:"torrent / powerful current",ex:{zh:'改革的洪流势不可挡。',py:'Gǎigé de hóngliú shì bù kě dǎng.',en:"The torrent of reform is unstoppable."}},
  {id:'5-468',zh:'宏图',py:'hóngtú',en:"grand plan / great ambition",ex:{zh:'他胸怀宏图大志。',py:'Tā xiōnghuái hóngtú dàzhì.',en:"He harbors grand plans and great ambitions."}},
  {id:'5-469',zh:'画龙点睛',py:'huà lóng diǎn jīng',en:"to add the finishing touch",ex:{zh:'这句话画龙点睛，点明了主题。',py:'Zhè jù huà huà lóng diǎn jīng, diǎnmíngle zhǔtí.',en:"This sentence adds the finishing touch and clarifies the theme."}},
  {id:'5-470',zh:'宦海',py:'huànhǎi',en:"officialdom / bureaucratic world",ex:{zh:'宦海沉浮，人心难测。',py:'Huànhǎi chénfú, rénxīn nán cè.',en:"In officialdom, ups and downs come, and the human heart is hard to fathom."}},
  {id:'5-471',zh:'汇报',py:'huìbào',en:"to report / to brief",ex:{zh:'他向领导汇报了工作进展。',py:'Tā xiàng lǐngdǎo huìbàole gōngzuò jìnzhǎn.',en:"He reported the work progress to his superiors."}},
  {id:'5-472',zh:'彗星',py:'huìxīng',en:"comet",ex:{zh:'这颗彗星七十年才经过一次地球。',py:'Zhè kē huìxīng qīshí nián cái jīngguò yī cì dìqiú.',en:"This comet passes by Earth only once every seventy years."}},
  {id:'5-473',zh:'惠及',py:'huìjí',en:"to benefit / to extend benefits to",ex:{zh:'这项政策惠及广大群众。',py:'Zhè xiàng zhèngcè huìjí guǎngdà qúnzhòng.',en:"This policy benefits the broad masses."}},
  {id:'5-474',zh:'浑然天成',py:'hún rán tiān chéng',en:"naturally formed / perfect in itself",ex:{zh:'这首诗浑然天成，毫无斧凿之痕。',py:'Zhè shǒu shī hún rán tiān chéng, háo wú fǔzáo zhī hén.',en:"This poem is naturally formed with no trace of artificiality."}},
  {id:'5-475',zh:'积淀',py:'jīdiàn',en:"accumulated deposits / to accumulate",ex:{zh:'文化积淀需要漫长时间。',py:'Wénhuà jīdiàn xūyào màncháng shíjiān.',en:"Cultural accumulation takes a long time."}},
  {id:'5-476',zh:'基准',py:'jīzhǔn',en:"benchmark / reference standard",ex:{zh:'以高质量为基准评判产品。',py:'Yǐ gāo zhìliàng wéi jīzhǔn pínpàn chǎnpǐn.',en:"Judge products with high quality as the benchmark."}},
  {id:'5-477',zh:'激发',py:'jīfā',en:"to inspire / to stimulate / to arouse",ex:{zh:'好奇心激发了他的探索欲。',py:'Hàoqíxīn jīfāle tā de tànsuǒ yù.',en:"Curiosity stimulated his desire to explore."}},
  {id:'5-478',zh:'积极进取',py:'jījí jìnqǔ',en:"proactive / ambitious / striving",ex:{zh:'年轻人要积极进取。',py:'Niánqīngrén yào jījí jìnqǔ.',en:"Young people should be proactive and ambitious."}},
  {id:'5-479',zh:'坚持不懈',py:'jiānchí bù xiè',en:"to persist / to keep at it without giving up",ex:{zh:'坚持不懈是成功的秘诀。',py:'Jiānchí bù xiè shì chénggōng de mìjué.',en:"Persisting without giving up is the secret of success."}},
  {id:'5-480',zh:'践踏',py:'jiàntà',en:"to trample on / to violate",ex:{zh:'不能践踏他人的权利。',py:'Bùnéng jiàntà tārén de quánlì.',en:"You must not trample on others' rights."}},
  {id:'5-481',zh:'见解',py:'jiànjiě',en:"view / opinion / insight",ex:{zh:'他对这个问题有独到的见解。',py:'Tā duì zhège wèntí yǒu dúdào de jiànjiě.',en:"He has a unique insight into this problem."}},
  {id:'5-482',zh:'节制',py:'jiézhì',en:"to restrain / moderation / self-control",ex:{zh:'饮食要节制，不能暴饮暴食。',py:'Yǐnshí yào jiézhì, bùnéng bàoyǐn bàoshí.',en:"You must eat in moderation and not overindulge."}},
  {id:'5-483',zh:'解析',py:'jiěxī',en:"to analyze / to parse / analysis",ex:{zh:'老师详细解析了这道题。',py:'Lǎoshī xiángxì jiěxīle zhè dào tí.',en:"The teacher analyzed this problem in detail."}},
  {id:'5-484',zh:'界定',py:'jièdìng',en:"to define / to demarcate",ex:{zh:'要清晰界定各方的职责。',py:'Yào qīngxī jièdìng gèfāng de zhízé.',en:"The responsibilities of all parties must be clearly defined."}},
  {id:'5-485',zh:'进展',py:'jìnzhǎn',en:"progress / development",ex:{zh:'工作进展顺利。',py:'Gōngzuò jìnzhǎn shùnlì.',en:"Work is progressing smoothly."}},
  {id:'5-486',zh:'精准',py:'jīngzhǔn',en:"precise / accurate / targeted",ex:{zh:'措施要精准有效。',py:'Cuòshī yào jīngzhǔn yǒuxiào.',en:"Measures must be precise and effective."}},
  {id:'5-487',zh:'经典',py:'jīngdiǎn',en:"classic / classical / canonical",ex:{zh:'这是一部经典的文学作品。',py:'Zhè shì yī bù jīngdiǎn de wénxué zuòpǐn.',en:"This is a classic literary work."}},
  {id:'5-488',zh:'精神',py:'jīngshén',en:"spirit / mind / essence",ex:{zh:'奥运精神激励着无数人。',py:'Àoyùn jīngshén jīlìzhe wúshù rén.',en:"The Olympic spirit inspires countless people."}},
  {id:'5-489',zh:'警惕',py:'jǐngtì',en:"to be vigilant / to watch out",ex:{zh:'要时刻保持警惕。',py:'Yào shíkè bǎochí jǐngtì.',en:"You must always remain vigilant."}},
  {id:'5-490',zh:'竭尽全力',py:'jié jìn quán lì',en:"to do one's utmost",ex:{zh:'他竭尽全力完成了任务。',py:'Tā jié jìn quán lì wánchéngle rènwù.',en:"He completed the task with all his might."}},
  {id:'5-491',zh:'就此',py:'jiùcǐ',en:"thereupon / from this point",ex:{zh:'就此，讨论告一段落。',py:'Jiùcǐ, tǎolùn gào yī duànluò.',en:"Thereupon, the discussion came to a pause."}},
  {id:'5-492',zh:'举措',py:'jǔcuò',en:"measure / action / step",ex:{zh:'政府出台了一系列举措。',py:'Zhèngfǔ chūtáile yī xìliè jǔcuò.',en:"The government introduced a series of measures."}},
  {id:'5-493',zh:'开拓',py:'kāituò',en:"to open up / to pioneer / to develop",ex:{zh:'他致力于开拓新市场。',py:'Tā zhìlì yú kāituò xīn shìchǎng.',en:"He is committed to opening up new markets."}},
  {id:'5-494',zh:'卓有成效',py:'zhuō yǒu chéngyǒu xiào',en:"highly effective / fruitful",ex:{zh:'他的工作卓有成效。',py:'Tā de gōngzuò zhuō yǒu chéngyǒu xiào.',en:"His work is highly effective."}},
  {id:'5-495',zh:'科研',py:'kēyán',en:"scientific research",ex:{zh:'他专注于科研工作。',py:'Tā zhuānzhù yú kēyán gōngzuò.',en:"He is focused on scientific research."}},
  {id:'5-496',zh:'苦苦',py:'kǔkǔ',en:"painstakingly / persistently",ex:{zh:'他苦苦寻找答案。',py:'Tā kǔkǔ xúnzhǎo dá\'àn.',en:"He painstakingly searched for the answer."}},
  {id:'5-497',zh:'矿产',py:'kuàngchǎn',en:"mineral resources",ex:{zh:'该地区矿产资源丰富。',py:'Gāi dìqū kuàngchǎn zīyuán fēngfù.',en:"This region has abundant mineral resources."}},
  {id:'5-498',zh:'阔步',py:'kuòbù',en:"to stride forward / with big steps",ex:{zh:'他阔步走向未来。',py:'Tā kuòbù zǒuxiàng wèilái.',en:"He strides forward toward the future."}},
  {id:'5-499',zh:'蓝图',py:'lántú',en:"blueprint / plan",ex:{zh:'我们描绘了发展蓝图。',py:'Wǒmen miáohuìle fāzhǎn lántú.',en:"We drew a blueprint for development."}},
  {id:'5-500',zh:'朗朗上口',py:'lǎng lǎng shàng kǒu',en:"easy to read aloud / catchy",ex:{zh:'这首歌朗朗上口，很受欢迎。',py:'Zhè shǒu gē lǎng lǎng shàng kǒu, hěn shòu huānyíng.',en:"This song is catchy and very popular."}},
  {id:'5-501',zh:'浪潮',py:'làngcháo',en:"wave / tide / upsurge",ex:{zh:'改革浪潮席卷全国。',py:'Gǎigé làngcháo xíjuǎn quánguó.',en:"The wave of reform swept the whole country."}},
  {id:'5-502',zh:'老成持重',py:'lǎo chéng chí zhòng',en:"mature and prudent",ex:{zh:'他为人老成持重，值得信赖。',py:'Tā wéirén lǎo chéng chí zhòng, zhídé xìnlài.',en:"He is mature and prudent, and worthy of trust."}},
  {id:'5-503',zh:'离不开',py:'lí bu kāi',en:"cannot do without / inseparable from",ex:{zh:'成功离不开努力。',py:'Chénggōng lí bu kāi nǔlì.',en:"Success cannot do without hard work."}},
  {id:'5-504',zh:'历险',py:'lìxiǎn',en:"to undergo adventures / to brave dangers",ex:{zh:'他喜欢户外历险活动。',py:'Tā xǐhuān hùwài lìxiǎn huódòng.',en:"He likes outdoor adventure activities."}},
  {id:'5-505',zh:'立竿见影',py:'lì gān jiàn yǐng',en:"to get immediate results",ex:{zh:'这个方法立竿见影。',py:'Zhège fāngfǎ lì gān jiàn yǐng.',en:"This method gets immediate results."}},
  {id:'5-506',zh:'连锁',py:'liánsuǒ',en:"chain / linked / interrelated",ex:{zh:'这会引起一系列连锁反应。',py:'Zhè huì yǐnqǐ yī xìliè liánsuǒ fǎnyìng.',en:"This will trigger a series of chain reactions."}},
  {id:'5-507',zh:'流传',py:'liúchuán',en:"to spread / to circulate / to hand down",ex:{zh:'这个故事流传了几百年。',py:'Zhège gùshi liúchuánle jǐ bǎi nián.',en:"This story has been handed down for hundreds of years."}},
  {id:'5-508',zh:'路径',py:'lùjìng',en:"path / route / approach",ex:{zh:'找到解决问题的正确路径。',py:'Zhǎodào jiějué wèntí de zhèngquè lùjìng.',en:"Find the correct approach to solving the problem."}},
  {id:'5-509',zh:'落后',py:'luòhòu',en:"to lag behind / backward",ex:{zh:'不能让思想落后于时代。',py:'Bùnéng ràng sīxiǎng luòhòu yú shídài.',en:"Thinking must not lag behind the times."}},
  {id:'5-510',zh:'茫然',py:'mángrán',en:"at a loss / blank / confused",ex:{zh:'他茫然地看着四周。',py:'Tā mángrán de kànzhe sìzhōu.',en:"He looked around blankly."}},
  {id:'5-511',zh:'民心',py:'mínxīn',en:"popular sentiment / the will of the people",ex:{zh:'要赢得民心，才能长治久安。',py:'Yào yíngdé mínxīn, cái néng cháng zhì jiǔ ān.',en:"You must win the hearts of the people for lasting peace."}},
  {id:'5-512',zh:'明智',py:'míngzhì',en:"wise / sensible / prudent",ex:{zh:'他做出了明智的选择。',py:'Tā zuòchūle míngzhì de xuǎnzé.',en:"He made a wise choice."}},
  {id:'5-513',zh:'磨难',py:'mónàn',en:"hardship / suffering / ordeal",ex:{zh:'他经历了无数磨难，终于成功。',py:'Tā jīnglìle wúshù mónàn, zhōngyú chénggōng.',en:"He experienced countless hardships and finally succeeded."}},
  {id:'5-514',zh:'目不转睛',py:'mù bù zhuǎn jīng',en:"to stare / to gaze fixedly",ex:{zh:'他目不转睛地看着屏幕。',py:'Tā mù bù zhuǎn jīng de kànzhe píngmù.',en:"He stared fixedly at the screen."}},
  {id:'5-515',zh:'难以置信',py:'nán yǐ zhì xìn',en:"hard to believe / incredible",ex:{zh:'这个结果难以置信。',py:'Zhège jiéguǒ nán yǐ zhì xìn.',en:"This result is hard to believe."}},
  {id:'5-516',zh:'尿',py:'niào',en:"urine / to urinate",ex:{zh:'孩子需要经常排尿。',py:'Háizi xūyào jīngcháng páiniào.',en:"Children need to urinate frequently."}},
  {id:'5-517',zh:'年代',py:'niándài',en:"era / decade / age",ex:{zh:'这是一个新的年代。',py:'Zhè shì yīgè xīn de niándài.',en:"This is a new era."}},
  {id:'5-518',zh:'凝聚力',py:'níngjùlì',en:"cohesion / centripetal force",ex:{zh:'团队要有强大的凝聚力。',py:'Tuánduì yào yǒu qiángdà de níngjùlì.',en:"A team must have strong cohesion."}},
  {id:'5-519',zh:'浓缩',py:'nóngsuō',en:"to concentrate / to condense",ex:{zh:'这本书浓缩了他一生的智慧。',py:'Zhè běn shū nóngsuōle tā yīshēng de zhìhuì.',en:"This book condenses the wisdom of his lifetime."}},
  {id:'5-520',zh:'排除',py:'páichú',en:"to eliminate / to rule out",ex:{zh:'要排除一切干扰因素。',py:'Yào páichú yīqiē gānrǎo yīnsù.',en:"All interfering factors must be eliminated."}},
  {id:'5-521',zh:'培养',py:'péiyǎng',en:"to cultivate / to train / to foster",ex:{zh:'学校要培养学生的创新能力。',py:'Xuéxiào yào péiyǎng xuésheng de chuàngxīn nénglì.',en:"Schools must cultivate students' innovative ability."}},
  {id:'5-522',zh:'碰壁',py:'pèngbì',en:"to run into a wall / to meet a rebuff",ex:{zh:'他多次碰壁，但没有放弃。',py:'Tā duō cì pèngbì, dàn méiyǒu fàngqì.',en:"He ran into walls many times but did not give up."}},
  {id:'5-523',zh:'磅礴大气',py:'pángbó dàqì',en:"grand and majestic",ex:{zh:'这首乐曲磅礴大气。',py:'Zhè shǒu yuèqǔ pángbó dàqì.',en:"This piece of music is grand and majestic."}},
  {id:'5-524',zh:'披露',py:'pīlù',en:"to disclose / to reveal",ex:{zh:'他披露了事件的真相。',py:'Tā pīlùle shìjiàn de zhēnxiàng.',en:"He revealed the truth of the event."}},
  {id:'5-525',zh:'脾气',py:'píqi',en:"temper / temperament",ex:{zh:'他的脾气很好，从不发火。',py:'Tā de píqi hěn hǎo, cóng bù fāhuǒ.',en:"He has a good temper and never loses his cool."}},
  {id:'5-526',zh:'频繁',py:'pínfán',en:"frequent / frequent / often",ex:{zh:'他们频繁地互相联系。',py:'Tāmen pínfán de hùxiāng liánxì.',en:"They frequently contact each other."}},
  {id:'5-527',zh:'品位',py:'pǐnwèi',en:"taste / aesthetic sense / grade",ex:{zh:'这个设计很有品位。',py:'Zhège shèjì hěn yǒu pǐnwèi.',en:"This design is very tasteful."}},
  {id:'5-528',zh:'平凡',py:'píngfán',en:"ordinary / common / average",ex:{zh:'平凡的人也能做出不平凡的事。',py:'Píngfán de rén yě néng zuòchū bù píngfán de shì.',en:"Ordinary people can also do extraordinary things."}},
  {id:'5-529',zh:'破除',py:'pòchú',en:"to eliminate / to do away with",ex:{zh:'要破除迷信和偏见。',py:'Yào pòchú míxìn hé piānjiàn.',en:"Superstition and prejudice must be eliminated."}},
  {id:'5-530',zh:'扑面而来',py:'pū miàn ér lái',en:"to blow in one's face / to come head-on",ex:{zh:'春风扑面而来，令人心旷神怡。',py:'Chūnfēng pū miàn ér lái, lìng rén xīn kuàng shén yí.',en:"The spring breeze blows in one's face, making one feel refreshed."}},
  {id:'5-531',zh:'谦和',py:'qiānhé',en:"modest and amiable",ex:{zh:'他为人谦和，深受大家喜爱。',py:'Tā wéirén qiānhé, shēn shòu dàjiā xǐ\'ài.',en:"He is modest and amiable, and deeply loved by everyone."}},
  {id:'5-532',zh:'前所未有',py:'qián suǒ wèi yǒu',en:"unprecedented / never seen before",ex:{zh:'这是前所未有的挑战。',py:'Zhè shì qián suǒ wèi yǒu de tiǎozhàn.',en:"This is an unprecedented challenge."}},
  {id:'5-533',zh:'强化',py:'qiánghuà',en:"to strengthen / to intensify",ex:{zh:'要强化安全意识。',py:'Yào qiánghuà ānquán yìshí.',en:"Safety awareness must be strengthened."}},
  {id:'5-534',zh:'情怀',py:'qínghuái',en:"sentiments / feelings / mindset",ex:{zh:'他有爱国情怀。',py:'Tā yǒu àiguó qínghuái.',en:"He has patriotic sentiments."}},
  {id:'5-535',zh:'全力以赴',py:'quán lì yǐ fù',en:"to go all out / to spare no effort",ex:{zh:'他全力以赴，完成了任务。',py:'Tā quán lì yǐ fù, wánchéngle rènwù.',en:"He went all out and completed the task."}},
  {id:'5-536',zh:'确立',py:'quèlì',en:"to establish / to set up",ex:{zh:'要确立正确的价值观。',py:'Yào quèlì zhèngquè de jiàzhíguān.',en:"Correct values must be established."}},
  {id:'5-537',zh:'燃烧',py:'ránshāo',en:"to burn / to blaze",ex:{zh:'他心中燃烧着对理想的渴望。',py:'Tā xīn zhōng ránshāozhe duì lǐxiǎng de kěwàng.',en:"A longing for his ideals burned in his heart."}},
  {id:'5-538',zh:'饶有兴趣',py:'ráo yǒu xìngqù',en:"with great interest / very interested",ex:{zh:'他饶有兴趣地听完了演讲。',py:'Tā ráo yǒu xìngqù de tīngwánle yǎnjiǎng.',en:"He listened to the speech with great interest."}},
  {id:'5-539',zh:'人文',py:'rénwén',en:"humanities / human culture",ex:{zh:'大学注重人文素养教育。',py:'Dàxué zhùzhòng rénwén sùyǎng jiàoyù.',en:"Universities emphasize humanistic education."}},
  {id:'5-540',zh:'融通',py:'róngtōng',en:"to connect / to reconcile / to fuse",ex:{zh:'中西文化在这里融通交汇。',py:'Zhōngxī wénhuà zài zhèlǐ róngtōng jiāohuì.',en:"Chinese and Western cultures connect and merge here."}},
  {id:'5-541',zh:'如期',py:'rúqī',en:"as scheduled / on time",ex:{zh:'项目如期完成。',py:'Xiàngmù rúqī wánchéng.',en:"The project was completed as scheduled."}},
  {id:'5-542',zh:'润物无声',py:'rùn wù wú shēng',en:"to nourish silently / to influence imperceptibly",ex:{zh:'好的教育润物无声。',py:'Hǎo de jiàoyù rùn wù wú shēng.',en:"Good education nourishes silently."}},
  {id:'5-543',zh:'锐意',py:'ruìyì',en:"determined / with a sharp edge",ex:{zh:'他锐意进取，不断创新。',py:'Tā ruìyì jìnqǔ, bùduàn chuàngxīn.',en:"He is determined to make progress and keeps innovating."}},
  {id:'5-544',zh:'三思而行',py:'sān sī ér xíng',en:"to think thrice before acting",ex:{zh:'做重要决定要三思而行。',py:'Zuò zhòng yào juédìng yào sān sī ér xíng.',en:"Think thrice before acting on important decisions."}},
  {id:'5-545',zh:'沙漠化',py:'shāmòhuà',en:"desertification",ex:{zh:'土地沙漠化是全球性问题。',py:'Tǔdì shāmòhuà shì quánqiúxìng wèntí.',en:"Land desertification is a global problem."}},
  {id:'5-546',zh:'善待',py:'shàndài',en:"to treat well / to be kind to",ex:{zh:'要善待他人，才能赢得尊重。',py:'Yào shàndài tārén, cái néng yíngdé zūnzhòng.',en:"Treat others well to win their respect."}},
  {id:'5-547',zh:'深谋远虑',py:'shēn móu yuǎn lǜ',en:"to think deeply and plan far ahead",ex:{zh:'战略决策需要深谋远虑。',py:'Zhànlüè juécè xūyào shēn móu yuǎn lǜ.',en:"Strategic decisions require thinking deeply and planning far ahead."}},
  {id:'5-548',zh:'生机盎然',py:'shēngjī àngrán',en:"full of vitality / teeming with life",ex:{zh:'春天大地生机盎然。',py:'Chūntiān dàdì shēngjī àngrán.',en:"In spring the earth is full of vitality."}},
  {id:'5-549',zh:'失衡',py:'shīhéng',en:"imbalanced / out of balance",ex:{zh:'发展不能失衡。',py:'Fāzhǎn bùnéng shīhéng.',en:"Development must not become imbalanced."}},
  {id:'5-550',zh:'时不我待',py:'shí bù wǒ dài',en:"time waits for no one",ex:{zh:'时不我待，我们要抓紧行动。',py:'Shí bù wǒ dài, wǒmen yào zhuājǐn xíngdòng.',en:"Time waits for no one — we must act quickly."}},
  {id:'5-551',zh:'实干',py:'shígàn',en:"to work hard / to be practical",ex:{zh:'实干才能出成绩。',py:'Shígàn cái néng chū chéngjì.',en:"Hard practical work is what produces results."}},
  {id:'5-552',zh:'世界观',py:'shìjièguan',en:"worldview / outlook on the world",ex:{zh:'正确的世界观是人生的基础。',py:'Zhèngquè de shìjièguan shì rénshēng de jīchǔ.',en:"A correct worldview is the foundation of life."}},
  {id:'5-553',zh:'殊途同归',py:'shū tú tóng guī',en:"different paths leading to the same destination",ex:{zh:'方法不同，但殊途同归。',py:'Fāngfǎ bùtóng, dàn shū tú tóng guī.',en:"Methods differ but lead to the same destination."}},
  {id:'5-554',zh:'数以万计',py:'shù yǐ wàn jì',en:"tens of thousands / countless",ex:{zh:'有数以万计的人参加了这次活动。',py:'Yǒu shù yǐ wàn jì de rén cānjiāle zhè cì huódòng.',en:"Tens of thousands of people participated in this event."}},
  {id:'5-555',zh:'水乳交融',py:'shuǐ rǔ jiāo róng',en:"to blend together perfectly",ex:{zh:'理论与实践水乳交融。',py:'Lǐlùn yǔ shíjiàn shuǐ rǔ jiāo róng.',en:"Theory and practice blend together perfectly."}},
  {id:'5-556',zh:'顺势而为',py:'shùn shì ér wéi',en:"to act in line with the trend",ex:{zh:'要顺势而为，把握机遇。',py:'Yào shùn shì ér wéi, bǎwò jīyù.',en:"Act in line with the trend and seize opportunities."}},
  {id:'5-557',zh:'思维',py:'sīwéi',en:"thinking / thought / mindset",ex:{zh:'要培养批判性思维能力。',py:'Yào péiyǎng pīpànxìng sīwéi nénglì.',en:"Critical thinking ability must be cultivated."}},
  {id:'5-558',zh:'肆意',py:'sìyì',en:"wantonly / wilfully / without restraint",ex:{zh:'不能肆意妄为，要遵纪守法。',py:'Bùnéng sìyì wàngwéi, yào zūnjì shǒufǎ.',en:"You must not act wantonly but must abide by law."}},
  {id:'5-559',zh:'所向无敌',py:'suǒ xiàng wú dí',en:"invincible / to triumph everywhere",ex:{zh:'掌握知识，则所向无敌。',py:'Zhǎngwò zhīshí, zé suǒ xiàng wú dí.',en:"With knowledge mastered, one is invincible."}},
  {id:'5-560',zh:'踏实',py:'tāshi',en:"steady / reliable / down-to-earth",ex:{zh:'做事要踏实，不能浮躁。',py:'Zuòshì yào tāshi, bùnéng fúzào.',en:"Be steady and reliable, not impetuous."}},
  {id:'5-561',zh:'探究',py:'tànjīu',en:"to inquire into / to explore",ex:{zh:'要不断探究事物的本质。',py:'Yào bùduàn tànjīu shìwù de běnzhì.',en:"You must constantly explore the essence of things."}},
  {id:'5-562',zh:'桃李天下',py:'táo lǐ tiān xià',en:"to have students everywhere / widespread influence",ex:{zh:'这位老师桃李天下，桃李满园。',py:'Zhè wèi lǎoshī táo lǐ tiān xià, táo lǐ mǎn yuán.',en:"This teacher's students are found throughout the world."}},
  {id:'5-563',zh:'特立独行',py:'tè lì dú xíng',en:"to be unconventional / independent-minded",ex:{zh:'他特立独行，从不随波逐流。',py:'Tā tè lì dú xíng, cóng bù suíbō zhúliú.',en:"He is unconventional and never follows the crowd."}},
  {id:'5-564',zh:'提炼',py:'tíliàn',en:"to refine / to extract / to distill",ex:{zh:'要从经验中提炼智慧。',py:'Yào cóng jīngyàn zhōng tíliàn zhìhuì.',en:"You must distill wisdom from experience."}},
  {id:'5-565',zh:'天衣无缝',py:'tiān yī wú fèng',en:"seamless / perfect / flawless",ex:{zh:'他的计划天衣无缝。',py:'Tā de jìhuà tiān yī wú fèng.',en:"His plan is flawless."}},
  {id:'5-566',zh:'恬静',py:'tiánjìng',en:"quiet / tranquil / serene",ex:{zh:'她性格恬静，温柔大方。',py:'Tā xìnggé tiánjìng, wēnróu dàfāng.',en:"She has a quiet and tranquil character."}},
  {id:'5-567',zh:'铁杆',py:'tiěgǎn',en:"hardcore / staunch / diehard",ex:{zh:'他是这支球队的铁杆球迷。',py:'Tā shì zhè zhī qiúduì de tiěgǎn qiúmí.',en:"He is a hardcore fan of this team."}},
  {id:'5-568',zh:'拓宽',py:'tuòkuān',en:"to widen / to broaden / to expand",ex:{zh:'要拓宽视野，才能看得更远。',py:'Yào tuòkuān shìyě, cái néng kàn de gèng yuǎn.',en:"You must broaden your horizons to see further."}},
  {id:'5-569',zh:'望而生畏',py:'wàng ér shēng wèi',en:"to feel daunted at the sight of",ex:{zh:'这道题让他望而生畏。',py:'Zhè dào tí ràng tā wàng ér shēng wèi.',en:"This problem made him feel daunted."}},
  {id:'5-570',zh:'唯一',py:'wéiyī',en:"only / sole / unique",ex:{zh:'这是唯一的解决方案。',py:'Zhè shì wéiyī de jiějué fāng\'àn.',en:"This is the only solution."}},
  {id:'5-571',zh:'温润',py:'wēnrùn',en:"warm and moist / gentle",ex:{zh:'他的性格温润如玉。',py:'Tā de xìnggé wēnrùn rú yù.',en:"His character is warm and gentle like jade."}},
  {id:'5-572',zh:'稳中求进',py:'wěn zhōng qiú jìn',en:"to seek progress while maintaining stability",ex:{zh:'经济发展要稳中求进。',py:'Jīngjì fāzhǎn yào wěn zhōng qiú jìn.',en:"Economic development must seek progress while maintaining stability."}},
  {id:'5-573',zh:'无可厚非',py:'wú kě hòu fēi',en:"nothing to find fault with / understandable",ex:{zh:'他的做法无可厚非。',py:'Tā de zuòfǎ wú kě hòu fēi.',en:"His approach is understandable and nothing to find fault with."}},
  {id:'5-574',zh:'无私',py:'wúsī',en:"selfless / unselfish",ex:{zh:'他无私地奉献着自己的一切。',py:'Tā wúsī de fèngxiànzhe zìjǐ de yīqiè.',en:"He selflessly dedicates everything he has."}},
  {id:'5-575',zh:'悟',py:'wù',en:"to realize / to enlighten / to comprehend",ex:{zh:'他悟出了人生的真谛。',py:'Tā wùchūle rénshēng de zhēndì.',en:"He realized the true meaning of life."}},
  {id:'5-576',zh:'细腻',py:'xìnì',en:"delicate / meticulous / subtle",ex:{zh:'他的文章写得很细腻。',py:'Tā de wénzhāng xiě de hěn xìnì.',en:"His articles are written in a very delicate way."}},
  {id:'5-577',zh:'喜闻乐见',py:'xǐ wén lè jiàn',en:"well-received / popular / welcome",ex:{zh:'这种文艺形式喜闻乐见。',py:'Zhè zhǒng wényì xíngshì xǐ wén lè jiàn.',en:"This form of art is well-received by the public."}},
  {id:'5-578',zh:'先进',py:'xiānjìn',en:"advanced / progressive",ex:{zh:'要学习先进的技术和经验。',py:'Yào xuéxí xiānjìn de jìshù hé jīngyàn.',en:"Advanced technology and experience must be learned."}},
  {id:'5-579',zh:'心血',py:'xīnxuè',en:"painstaking effort / blood and sweat",ex:{zh:'这部作品凝聚了他多年的心血。',py:'Zhè bù zuòpǐn níngjùle tā duō nián de xīnxuè.',en:"This work condenses his many years of painstaking effort."}},
  {id:'5-580',zh:'新颖',py:'xīnyǐng',en:"novel / original / fresh",ex:{zh:'他的想法新颖独特。',py:'Tā de xiǎngfǎ xīnyǐng dútè.',en:"His ideas are novel and unique."}},
  {id:'5-581',zh:'形成',py:'xíngchéng',en:"to form / to take shape",ex:{zh:'良好的习惯需要长期培养才能形成。',py:'Liánghǎo de xíguàn xūyào chángqī péiyǎng cái néng xíngchéng.',en:"Good habits need long-term cultivation to take shape."}},
  {id:'5-582',zh:'兴旺',py:'xīngwàng',en:"prosperous / thriving / booming",ex:{zh:'家庭兴旺，国家强盛。',py:'Jiātíng xīngwàng, guójiā qiángshèng.',en:"Prosperous families make a powerful nation."}},
  {id:'5-583',zh:'雄厚',py:'xiónghòu',en:"strong / powerful / substantial",ex:{zh:'公司有雄厚的资金实力。',py:'Gōngsī yǒu xiónghòu de zījīn shílì.',en:"The company has substantial financial strength."}},
  {id:'5-584',zh:'虚心',py:'xūxīn',en:"open-minded / humble",ex:{zh:'要虚心向他人学习。',py:'Yào xūxīn xiàng tārén xuéxí.',en:"You must be open-minded and learn from others."}},
  {id:'5-585',zh:'寻根',py:'xúngēn',en:"to trace one's roots",ex:{zh:'他踏上寻根之旅，探寻祖先足迹。',py:'Tā tàshàng xúngēn zhī lǚ, tànxún zǔxiān zújì.',en:"He set out on a journey to trace his roots and explore his ancestors' footsteps."}},
  {id:'5-586',zh:'沿用',py:'yányòng',en:"to continue to use / to follow",ex:{zh:'沿用旧方法解决不了新问题。',py:'Yányòng jiù fāngfǎ jiějué bùliǎo xīn wèntí.',en:"Following old methods cannot solve new problems."}},
  {id:'5-587',zh:'一往无前',py:'yī wǎng wú qián',en:"to press forward with indomitable will",ex:{zh:'他一往无前，勇往直前。',py:'Tā yī wǎng wú qián, yǒng wǎng zhí qián.',en:"He pressed forward with indomitable will."}},
  {id:'5-588',zh:'义不容辞',py:'yì bù róng cí',en:"duty-bound / obligatory",ex:{zh:'帮助有困难的人是义不容辞的事。',py:'Bāngzhù yǒu kùnnan de rén shì yì bù róng cí de shì.',en:"Helping people in difficulty is an obligatory matter."}},
  {id:'5-589',zh:'以身作则',py:'yǐ shēn zuò zé',en:"to set an example",ex:{zh:'领导者要以身作则。',py:'Lǐngdǎo zhě yào yǐ shēn zuò zé.',en:"Leaders must set an example."}},
  {id:'5-590',zh:'亦步亦趋',py:'yì bù yì qū',en:"to follow in someone's footsteps / to imitate closely",ex:{zh:'不能亦步亦趋，要有自己的创新。',py:'Bùnéng yì bù yì qū, yào yǒu zìjǐ de chuàngxīn.',en:"Don't just imitate — you must have your own innovations."}},
  {id:'5-591',zh:'阴影',py:'yīnyǐng',en:"shadow / negative influence",ex:{zh:'要走出过去的阴影。',py:'Yào zǒuchū guòqù de yīnyǐng.',en:"You must walk out of the shadow of the past."}},
  {id:'5-592',zh:'英明',py:'yīngmíng',en:"wise / brilliant / enlightened",ex:{zh:'他做出了英明的决策。',py:'Tā zuòchūle yīngmíng de juécè.',en:"He made a wise decision."}},
  {id:'5-593',zh:'迎难而上',py:'yíng nán ér shàng',en:"to press on despite difficulties",ex:{zh:'面对挑战，要迎难而上。',py:'Miànduì tiǎozhàn, yào yíng nán ér shàng.',en:"Face challenges and press on despite difficulties."}},
  {id:'5-594',zh:'营造',py:'yíngzào',en:"to create / to build / to establish",ex:{zh:'要营造良好的学习氛围。',py:'Yào yíngzào liánghǎo de xuéxí fēnwéi.',en:"A good learning atmosphere must be created."}},
  {id:'5-595',zh:'涌现',py:'yǒngxiàn',en:"to emerge in great numbers",ex:{zh:'优秀人才不断涌现。',py:'Yōuxiù réncái bùduàn yǒngxiàn.',en:"Outstanding talents keep emerging in great numbers."}},
  {id:'5-596',zh:'有机',py:'yǒujī',en:"organic / integrated",ex:{zh:'理论与实践要有机结合。',py:'Lǐlùn yǔ shíjiàn yào yǒujī jiéhé.',en:"Theory and practice must be organically integrated."}},
  {id:'5-597',zh:'与时俱进',py:'yǔ shí jù jìn',en:"to advance with the times",ex:{zh:'思想要与时俱进。',py:'Sīxiǎng yào yǔ shí jù jìn.',en:"Thinking must advance with the times."}},
  {id:'5-598',zh:'渊博',py:'yuānbó',en:"learned / erudite / extensive",ex:{zh:'他学识渊博，见多识广。',py:'Tā xuéshí yuānbó, jiàn duō shí guǎng.',en:"He is erudite and has broad knowledge."}},
  {id:'5-599',zh:'源泉',py:'yuánquán',en:"source / fountain / origin",ex:{zh:'人民是创造历史的源泉。',py:'Rénmín shì chuàngzào lìshǐ de yuánquán.',en:"The people are the source of historical creation."}},
  {id:'5-600',zh:'韵味',py:'yùnwèi',en:"charm / appeal / flavor",ex:{zh:'这首诗韵味十足。',py:'Zhè shǒu shī yùnwèi shízú.',en:"This poem is full of charm."}},

  {id:'5-601',zh:'赞许',py:'zànxǔ',en:"to approve of / to praise",ex:{zh:'老师赞许地点了点头。',py:'Lǎoshī zànxǔ de diǎnle diǎn tóu.',en:"The teacher nodded approvingly."}},
  {id:'5-602',zh:'造诣',py:'zàoyì',en:"attainment / level of achievement",ex:{zh:'他在音乐方面造诣深厚。',py:'Tā zài yīnyuè fāngmiàn zàoyì shēnhòu.',en:"He has deep attainment in music."}},
  {id:'5-603',zh:'增添',py:'zēngtiān',en:"to add / to increase",ex:{zh:'节日增添了欢乐的气氛。',py:'Jiérì zēngtiānle huānlè de qìfēn.',en:"The holiday added a joyful atmosphere."}},
  {id:'5-604',zh:'长足',py:'zhǎngzú',en:"considerable / significant (progress)",ex:{zh:'科技取得了长足进步。',py:'Kējì qǔdéle zhǎngzú jìnbù.',en:"Technology has made considerable progress."}},
  {id:'5-605',zh:'丈量',py:'zhàngliáng',en:"to measure / to survey",ex:{zh:'他丈量着自己人生的宽度。',py:'Tā zhàngliángzhe zìjǐ rénshēng de kuāndù.',en:"He measures the breadth of his own life."}},
  {id:'5-606',zh:'振奋',py:'zhènfèn',en:"to invigorate / to inspire",ex:{zh:'好消息振奋人心。',py:'Hǎo xiāoxi zhènfèn rénxīn.',en:"Good news invigorates people's hearts."}},
  {id:'5-607',zh:'争鸣',py:'zhēngmíng',en:"to contend / to debate",ex:{zh:'百花齐放，百家争鸣。',py:'Bǎi huā qí fàng, bǎi jiā zhēngmíng.',en:"Let a hundred flowers bloom and a hundred schools of thought contend."}},
  {id:'5-608',zh:'正当',py:'zhèngdàng',en:"proper / legitimate / just",ex:{zh:'要通过正当途径解决问题。',py:'Yào tōngguò zhèngdàng tújìng jiějué wèntí.',en:"Problems must be solved through legitimate means."}},
  {id:'5-609',zh:'政绩',py:'zhèngjì',en:"political achievements / track record",ex:{zh:'他有着出色的政绩。',py:'Tā yǒuzhe chūsè de zhèngjì.',en:"He has an outstanding political track record."}},
  {id:'5-610',zh:'智力',py:'zhìlì',en:"intelligence / intellect",ex:{zh:'儿童智力开发很重要。',py:'Értóng zhìlì kāifā hěn zhòngyào.',en:"Children's intellectual development is very important."}},
  {id:'5-611',zh:'志向',py:'zhìxiàng',en:"aspiration / ambition / goal",ex:{zh:'他从小就有远大的志向。',py:'Tā cóng xiǎo jiù yǒu yuǎndà de zhìxiàng.',en:"He has had great ambitions since childhood."}},
  {id:'5-612',zh:'致力于',py:'zhìlì yú',en:"to devote oneself to / to be committed to",ex:{zh:'他致力于推动教育公平。',py:'Tā zhìlì yú tuīdòng jiàoyù gōngpíng.',en:"He is committed to promoting educational equity."}},
  {id:'5-613',zh:'周全',py:'zhōuquán',en:"thorough / comprehensive / considerate",ex:{zh:'他考虑问题很周全。',py:'Tā kǎolǜ wèntí hěn zhōuquán.',en:"He considers problems very thoroughly."}},
  {id:'5-614',zh:'逐渐',py:'zhújiàn',en:"gradually / little by little",ex:{zh:'他的能力逐渐增强了。',py:'Tā de nénglì zhújiàn zēngqiángle.',en:"His ability has gradually strengthened."}},
  {id:'5-615',zh:'铸造',py:'zhùzào',en:"to cast / to forge / to create",ex:{zh:'一代人铸造了一代的辉煌。',py:'Yī dài rén zhùzàole yī dài de huīhuáng.',en:"One generation creates the glory of their era."}},
  {id:'5-616',zh:'自豪',py:'zìháo',en:"proud / pride",ex:{zh:'他为自己的成就感到自豪。',py:'Tā wèi zìjǐ de chéngjiù gǎndào zìháo.',en:"He feels proud of his achievements."}},
  {id:'5-617',zh:'自律',py:'zìlǜ',en:"self-discipline",ex:{zh:'自律是成功的重要品质。',py:'Zìlǜ shì chénggōng de zhòngyào pǐnzhì.',en:"Self-discipline is an important quality for success."}},
  {id:'5-618',zh:'总览',py:'zǒnglǎn',en:"overview / to survey as a whole",ex:{zh:'让我们总览一下全局。',py:'Ràng wǒmen zǒnglǎn yīxià quánjú.',en:"Let us survey the overall situation."}},
  {id:'5-619',zh:'奏效',py:'zòuxiào',en:"to work / to be effective",ex:{zh:'这个方法果然奏效了。',py:'Zhège fāngfǎ guǒrán zòuxiào le.',en:"This method turned out to be effective."}},
  {id:'5-620',zh:'追随',py:'zhuīsuí',en:"to follow / to pursue",ex:{zh:'他追随梦想，从未停歇。',py:'Tā zhuīsuí mèngxiǎng, cóng wèi tíngxiē.',en:"He pursues his dreams without ever stopping."}},
  {id:'5-621',zh:'滋养',py:'zīyǎng',en:"to nourish / to nurture",ex:{zh:'书籍滋养了他的心灵。',py:'Shūjí zīyǎngle tā de xīnlíng.',en:"Books nourished his mind."}},
  {id:'5-622',zh:'标杆',py:'biāogǎn',en:"model / benchmark / pacemaker",ex:{zh:'他是行业内的标杆人物。',py:'Tā shì hángyè nèi de biāogǎn rénwù.',en:"He is a model figure in the industry."}},
  {id:'5-623',zh:'伯乐',py:'Bólè',en:"a good judge of talent",ex:{zh:'他慧眼识英雄，是个伯乐。',py:'Tā huìyǎn shí yīngxióng, shì gè Bólè.',en:"He can recognize talent with a discerning eye — he is a true Bole."}},
  {id:'5-624',zh:'薄弱',py:'bóruò',en:"weak / frail / thin",ex:{zh:'这个环节是整体的薄弱之处。',py:'Zhège huánjié shì zhěngtǐ de bóruò zhīchù.',en:"This link is the weak point of the whole."}},
  {id:'5-625',zh:'博采众长',py:'bó cǎi zhòng cháng',en:"to absorb the strong points of others",ex:{zh:'学习要博采众长，融会贯通。',py:'Xuéxí yào bó cǎi zhòng cháng, róng huì guān tōng.',en:"Learning means absorbing others' strengths and integrating them."}},
  {id:'5-626',zh:'参与感',py:'cānyùgǎn',en:"sense of participation / sense of involvement",ex:{zh:'要增强学生的参与感。',py:'Yào zēngqiáng xuésheng de cānyùgǎn.',en:"Students' sense of participation must be strengthened."}},
  {id:'5-627',zh:'操守',py:'cāoshǒu',en:"moral integrity / professional ethics",ex:{zh:'他有良好的职业操守。',py:'Tā yǒu liánghǎo de zhíyè cāoshǒu.',en:"He has good professional ethics."}},
  {id:'5-628',zh:'畅所欲言',py:'chàng suǒ yù yán',en:"to speak freely / to say all one wants to say",ex:{zh:'请大家畅所欲言，提出宝贵意见。',py:'Qǐng dàjiā chàng suǒ yù yán, tíchū bǎoguì yìjiàn.',en:"Please speak freely and offer valuable opinions."}},
  {id:'5-629',zh:'陈旧',py:'chénjiù',en:"outdated / obsolete / old-fashioned",ex:{zh:'陈旧的思想阻碍了进步。',py:'Chénjiù de sīxiǎng zǔ\'àile jìnbù.',en:"Outdated thinking hinders progress."}},
  {id:'5-630',zh:'承上启下',py:'chéng shàng qǐ xià',en:"to connect the preceding and the following",ex:{zh:'这段文字起到承上启下的作用。',py:'Zhè duàn wénzì qǐdào chéng shàng qǐ xià de zuòyòng.',en:"This passage serves to connect what comes before and after."}},
  {id:'5-631',zh:'驰援',py:'chíyuán',en:"to rush to aid / to support urgently",ex:{zh:'救援队驰援灾区。',py:'Jiùyuán duì chíyuán zāiqū.',en:"The rescue team rushed to aid the disaster area."}},
  {id:'5-632',zh:'抽丝剥茧',py:'chōu sī bō jiǎn',en:"to unravel gradually / to get to the bottom of things",ex:{zh:'他抽丝剥茧，找出了问题所在。',py:'Tā chōu sī bō jiǎn, zhǎochūle wèntí suǒzài.',en:"He unraveled the problem gradually and found its source."}},
  {id:'5-633',zh:'传递',py:'chuándì',en:"to transmit / to pass on",ex:{zh:'老师传递知识，学生接受学习。',py:'Lǎoshī chuándì zhīshí, xuésheng jiēshòu xuéxí.',en:"Teachers transmit knowledge, students receive and learn."}},
  {id:'5-634',zh:'创意',py:'chuàngyì',en:"creativity / creative idea",ex:{zh:'这个广告充满了创意。',py:'Zhège guǎnggào chōngmǎnle chuàngyì.',en:"This advertisement is full of creativity."}},
  {id:'5-635',zh:'存续',py:'cúnxù',en:"to continue to exist / survival",ex:{zh:'传统文化的存续需要保护。',py:'Chuántǒng wénhuà de cúnxù xūyào bǎohù.',en:"The continued existence of traditional culture needs protection."}},
  {id:'5-636',zh:'打磨',py:'dǎmó',en:"to polish / to hone / to refine",ex:{zh:'他不断打磨自己的技艺。',py:'Tā bùduàn dǎmó zìjǐ de jìyì.',en:"He constantly hones his craft."}},
  {id:'5-637',zh:'担当',py:'dāndāng',en:"to take responsibility / to bear",ex:{zh:'要有担当精神，勇于承担责任。',py:'Yào yǒu dāndāng jīngshén, yǒngyú chéngdān zérèn.',en:"You must have the spirit of responsibility and the courage to bear it."}},
  {id:'5-638',zh:'道义',py:'dàoyì',en:"morality and justice / sense of justice",ex:{zh:'他主持道义，为弱者发声。',py:'Tā zhǔchí dàoyì, wèi ruòzhě fāshēng.',en:"He upholds morality and speaks for the weak."}},
  {id:'5-639',zh:'低调',py:'dīdiào',en:"low-key / modest",ex:{zh:'他为人低调，从不张扬。',py:'Tā wéirén dīdiào, cóng bù zhāngyáng.',en:"He keeps a low profile and never shows off."}},
  {id:'5-640',zh:'抵达',py:'dǐdá',en:"to arrive / to reach",ex:{zh:'代表团抵达了目的地。',py:'Dàibiǎotuán dǐdále mùdìdì.',en:"The delegation arrived at the destination."}},
  {id:'5-641',zh:'点石成金',py:'diǎn shí chéng jīn',en:"to turn stone into gold / to transform something ordinary",ex:{zh:'好老师能点石成金，激发学生潜能。',py:'Hǎo lǎoshī néng diǎn shí chéng jīn, jīfā xuésheng qiánnéng.',en:"A good teacher can transform ordinary students and inspire their potential."}},
  {id:'5-642',zh:'调研',py:'diàoyán',en:"investigation / research",ex:{zh:'要深入调研，掌握第一手资料。',py:'Yào shēnrù diàoyán, zhǎngwò dì yī shǒu zīliào.',en:"Deep investigation must be conducted to gather first-hand materials."}},
  {id:'5-643',zh:'定论',py:'dìnglùn',en:"final conclusion / settled opinion",ex:{zh:'这个问题还没有定论。',py:'Zhège wèntí hái méiyǒu dìnglùn.',en:"There is no settled conclusion on this problem yet."}},
  {id:'5-644',zh:'笃定',py:'dǔdìng',en:"certain / confident / resolute",ex:{zh:'他对成功笃定不疑。',py:'Tā duì chénggōng dǔdìng bù yí.',en:"He is certain and unwavering about success."}},
  {id:'5-645',zh:'独当一面',py:'dú dāng yī miàn',en:"to be able to act independently",ex:{zh:'他已经能够独当一面了。',py:'Tā yǐjīng nénggòu dú dāng yī miàn le.',en:"He is already able to act independently."}},
  {id:'5-646',zh:'多维',py:'duōwéi',en:"multi-dimensional",ex:{zh:'要从多维角度分析问题。',py:'Yào cóng duōwéi jiǎodù fēnxī wèntí.',en:"Problems must be analyzed from multiple dimensions."}},
  {id:'5-647',zh:'而立之年',py:'érlì zhī nián',en:"age of thirty / age of maturity",ex:{zh:'三十而立，他在而立之年创业成功。',py:'Sānshí ér lì, tā zài érlì zhī nián chuàngyè chénggōng.',en:"At thirty one stands firm — he succeeded in entrepreneurship at thirty."}},
  {id:'5-648',zh:'发人深省',py:'fā rén shēn xǐng',en:"thought-provoking / inspiring deep reflection",ex:{zh:'这个故事发人深省。',py:'Zhège gùshi fā rén shēn xǐng.',en:"This story is deeply thought-provoking."}},
  {id:'5-649',zh:'辐射',py:'fúshè',en:"radiation / to radiate / to spread",ex:{zh:'先进思想向四周辐射传播。',py:'Xiānjìn sīxiǎng xiàng sìzhōu fúshè chuánbō.',en:"Advanced thinking radiates outward in all directions."}},
  {id:'5-650',zh:'覆盖',py:'fùgài',en:"to cover / to overlay",ex:{zh:'这项政策覆盖了全国各地。',py:'Zhè xiàng zhèngcè fùgàile quánguó gèdì.',en:"This policy covers all parts of the country."}},
  {id:'5-651',zh:'甘于',py:'gānyú',en:"to be willing to / to be content with",ex:{zh:'他甘于平凡，默默奉献。',py:'Tā gānyú píngfán, mòmò fèngxiàn.',en:"He is content with being ordinary and dedicates himself quietly."}},
  {id:'5-652',zh:'高歌猛进',py:'gāo gē měng jìn',en:"to advance singing loudly / to forge ahead vigorously",ex:{zh:'改革开放高歌猛进。',py:'Gǎigé kāifàng gāo gē měng jìn.',en:"Reform and opening up forged ahead vigorously."}},
  {id:'5-653',zh:'亘古',py:'gèngǔ',en:"since ancient times / throughout the ages",ex:{zh:'这是一个亘古不变的真理。',py:'Zhè shì yīgè gèngǔ bùbiàn de zhēnlǐ.',en:"This is a truth that has never changed throughout the ages."}},
  {id:'5-654',zh:'根植',py:'gēnzhí',en:"to be rooted in / to take root",ex:{zh:'文化根植于民间传统。',py:'Wénhuà gēnzhí yú mínjiān chuántǒng.',en:"Culture is rooted in folk traditions."}},
  {id:'5-655',zh:'共生',py:'gòngshēng',en:"symbiosis / to coexist",ex:{zh:'人与自然应当和谐共生。',py:'Rén yǔ zìrán yīngdāng héxié gòngshēng.',en:"Humans and nature should coexist harmoniously."}},
  {id:'5-656',zh:'共鸣',py:'gòngmíng',en:"resonance / to resonate",ex:{zh:'这首歌引起了广泛共鸣。',py:'Zhè shǒu gē yǐnqǐle guǎngfàn gòngmíng.',en:"This song aroused widespread resonance."}},
  {id:'5-657',zh:'贯穿',py:'guànchuān',en:"to run through / to penetrate",ex:{zh:'这个主题贯穿了整部作品。',py:'Zhège zhǔtí guànchuānle zhěng bù zuòpǐn.',en:"This theme runs through the entire work."}},
  {id:'5-658',zh:'光明磊落',py:'guāngmíng lěiluò',en:"open and above board / upright",ex:{zh:'他为人光明磊落，从不做见不得人的事。',py:'Tā wéirén guāngmíng lěiluò, cóng bù zuò jiàn bùdéle rén de shì.',en:"He is open and above board and never does anything shameful."}},
  {id:'5-659',zh:'轨道',py:'guǐdào',en:"orbit / track / right track",ex:{zh:'发展要走上正轨。',py:'Fāzhǎn yào zǒushàng zhèngguǐ.',en:"Development must get back on the right track."}},
  {id:'5-660',zh:'灌溉',py:'guàngài',en:"to irrigate",ex:{zh:'灌溉技术改善了农业生产。',py:'Guàngài jìshù gǎishànle nóngyè shēngchǎn.',en:"Irrigation technology improved agricultural production."}},
  {id:'5-661',zh:'恢弘',py:'huīhóng',en:"grand / magnificent / imposing",ex:{zh:'这座建筑气势恢弘。',py:'Zhè zuò jiànzhú qìshì huīhóng.',en:"This building is grand and imposing."}},
  {id:'5-662',zh:'汇总',py:'huìzǒng',en:"to compile / to summarize / to aggregate",ex:{zh:'请将所有数据汇总上报。',py:'Qǐng jiāng suǒyǒu shùjù huìzǒng shàngbào.',en:"Please compile all data and report upward."}},
  {id:'5-663',zh:'豁达',py:'huòdá',en:"open-minded / magnanimous",ex:{zh:'他性格豁达，待人宽厚。',py:'Tā xìnggé huòdá, dài rén kuānhòu.',en:"He has an open-minded character and is generous to others."}},
  {id:'5-664',zh:'汲汲',py:'jíjí',en:"anxiously striving / eagerly pursuing",ex:{zh:'他汲汲于功名，反而迷失了自我。',py:'Tā jíjí yú gōngmíng, fǎn\'ér míshīle zìwǒ.',en:"He strived so anxiously for fame that he lost himself."}},
  {id:'5-665',zh:'集大成',py:'jí dà chéng',en:"to synthesize the best of / a great summation",ex:{zh:'这部书集大成之作，博采众长。',py:'Zhè bù shū jí dà chéng zhī zuò, bócǎi zhòng cháng.',en:"This book is a great synthesis that draws on the best of many sources."}},
  {id:'5-666',zh:'坚不可摧',py:'jiān bù kě cuī',en:"indestructible / impregnable",ex:{zh:'他们建立了坚不可摧的友谊。',py:'Tāmen jiànlìle jiān bù kě cuī de yǒuyì.',en:"They built an indestructible friendship."}},
  {id:'5-667',zh:'检讨',py:'jiǎntǎo',en:"to review / to make a self-criticism",ex:{zh:'他认真检讨了自己的错误。',py:'Tā rènzhēn jiǎntǎole zìjǐ de cuòwù.',en:"He seriously reviewed his own mistakes."}},
  {id:'5-668',zh:'兼而有之',py:'jiān ér yǒu zhī',en:"to have both / to possess simultaneously",ex:{zh:'他智慧与勇气兼而有之。',py:'Tā zhìhuì yǔ yǒngqì jiān ér yǒu zhī.',en:"He possesses both wisdom and courage simultaneously."}},
  {id:'5-669',zh:'践履',py:'jiànlǚ',en:"to practice / to put into action",ex:{zh:'言必行，行必果，践履诺言。',py:'Yán bì xíng, xíng bì guǒ, jiànlǚ nuòyán.',en:"Words must be acted upon and promises must be kept."}},
  {id:'5-670',zh:'匠心',py:'jiàngxīn',en:"ingenuity / craftsmanship / creative effort",ex:{zh:'这件作品独具匠心。',py:'Zhè jiàn zuòpǐn dújù jiàngxīn.',en:"This work displays unique craftsmanship."}},
  {id:'5-671',zh:'浸润',py:'jìnrùn',en:"to soak / to permeate / to immerse",ex:{zh:'他在文化氛围中浸润成长。',py:'Tā zài wénhuà fēnwéi zhōng jìnrùn chéngzhǎng.',en:"He grew up immersed in a cultural atmosphere."}},
  {id:'5-672',zh:'精耕细作',py:'jīng gēng xì zuò',en:"intensive farming / meticulous work",ex:{zh:'要精耕细作，提高工作质量。',py:'Yào jīng gēng xì zuò, tígāo gōngzuò zhìliàng.',en:"Work meticulously and improve work quality."}},
  {id:'5-673',zh:'久久',py:'jiǔjiǔ',en:"for a long time / long-lasting",ex:{zh:'他久久地凝视着远方。',py:'Tā jiǔjiǔ de níngshìzhe yuǎnfāng.',en:"He gazed into the distance for a long time."}},
  {id:'5-674',zh:'局面',py:'júmiàn',en:"situation / state of affairs",ex:{zh:'他扭转了不利局面。',py:'Tā niǔzhuǎnle bùlì júmiàn.',en:"He reversed the unfavorable situation."}},
  {id:'5-675',zh:'举足轻重',py:'jǔ zú qīng zhòng',en:"to carry great weight / pivotal",ex:{zh:'他在这次谈判中举足轻重。',py:'Tā zài zhè cì tánpàn zhōng jǔ zú qīng zhòng.',en:"He played a pivotal role in this negotiation."}},
  {id:'5-676',zh:'绝境',py:'juéjìng',en:"desperate situation / dead end",ex:{zh:'即使身陷绝境，也不能放弃。',py:'Jíshǐ shēn xiàn juéjìng, yě bùnéng fàngqì.',en:"Even in a desperate situation, you must not give up."}},
  {id:'5-677',zh:'觉悟',py:'juéwù',en:"consciousness / awakening / to realize",ex:{zh:'他的政治觉悟很高。',py:'Tā de zhèngzhì juéwù hěn gāo.',en:"His political consciousness is very high."}},
  {id:'5-678',zh:'开阔',py:'kāikuò',en:"open / broad / to widen",ex:{zh:'读书能开阔视野。',py:'Dúshū néng kāikuò shìyě.',en:"Reading can broaden your horizons."}},
  {id:'5-679',zh:'慷慨陈词',py:'kāngkǎi chéncí',en:"to speak with passion and vigor",ex:{zh:'他慷慨陈词，表达了自己的立场。',py:'Tā kāngkǎi chéncí, biǎodále zìjǐ de lìchǎng.',en:"He spoke with passion and vigor to express his position."}},
  {id:'5-680',zh:'可圈可点',py:'kě quān kě diǎn',en:"noteworthy / praiseworthy",ex:{zh:'他的表现可圈可点。',py:'Tā de biǎoxiàn kě quān kě diǎn.',en:"His performance is praiseworthy."}},
  {id:'5-681',zh:'刻苦',py:'kèkǔ',en:"hardworking / assiduous",ex:{zh:'他刻苦学习，终于取得了好成绩。',py:'Tā kèkǔ xuéxí, zhōngyú qǔdéle hǎo chéngjì.',en:"He studied assiduously and finally achieved good results."}},
  {id:'5-682',zh:'旷日持久',py:'kuàng rì chí jiǔ',en:"protracted / long drawn out",ex:{zh:'这场谈判旷日持久。',py:'Zhè chǎng tánpàn kuàng rì chí jiǔ.',en:"These negotiations were protracted."}},
  {id:'5-683',zh:'宽厚',py:'kuānhòu',en:"generous / magnanimous / tolerant",ex:{zh:'他待人宽厚，受人爱戴。',py:'Tā dài rén kuānhòu, shòurén àidài.',en:"He is generous to others and well-loved."}},
  {id:'5-684',zh:'扩散',py:'kuòsàn',en:"to spread / to diffuse",ex:{zh:'信息迅速扩散到各地。',py:'Xìnxī xùnsù kuòsàn dào gèdì.',en:"Information quickly spread to various places."}},
  {id:'5-685',zh:'理念',py:'lǐniàn',en:"concept / idea / philosophy",ex:{zh:'要树立正确的发展理念。',py:'Yào shùlì zhèngquè de fāzhǎn lǐniàn.',en:"A correct development philosophy must be established."}},
  {id:'5-686',zh:'历历',py:'lìlì',en:"one by one / clearly / vividly",ex:{zh:'往事历历在目。',py:'Wǎngshì lìlì zài mù.',en:"Past events are vividly present before one's eyes."}},
  {id:'5-687',zh:'临危不惧',py:'lín wēi bù jù',en:"to face danger without fear",ex:{zh:'他临危不惧，沉着应对。',py:'Tā lín wēi bù jù, chénzhuó yìngduì.',en:"He faced danger without fear and responded calmly."}},
  {id:'5-688',zh:'凌云壮志',py:'líng yún zhuàng zhì',en:"soaring ambitions / lofty aspirations",ex:{zh:'年轻人要有凌云壮志。',py:'Niánqīngrén yào yǒu líng yún zhuàng zhì.',en:"Young people must have soaring ambitions."}},
  {id:'5-689',zh:'领军',py:'lǐngjūn',en:"leading / pioneering",ex:{zh:'他是这个领域的领军人物。',py:'Tā shì zhège lǐngyù de lǐngjūn rénwù.',en:"He is a leading figure in this field."}},
  {id:'5-690',zh:'流芳百世',py:'liú fāng bǎi shì',en:"to leave a good name for generations",ex:{zh:'他的功绩流芳百世。',py:'Tā de gōngjì liú fāng bǎi shì.',en:"His achievements will be remembered for generations."}},
  {id:'5-691',zh:'硫磺',py:'liúhuáng',en:"sulfur",ex:{zh:'硫磺是一种常见的化学物质。',py:'Liúhuáng shì yī zhǒng chángjiàn de huàxué wùzhì.',en:"Sulfur is a common chemical substance."}},
  {id:'5-692',zh:'炉火纯青',py:'lú huǒ chún qīng',en:"to reach the highest level of skill",ex:{zh:'他的演技已到炉火纯青的境界。',py:'Tā de yǎnjì yǐ dào lú huǒ chún qīng de jìngjiè.',en:"His acting has reached the highest level of skill."}},
  {id:'5-693',zh:'落地',py:'luòdì',en:"to land / to be implemented",ex:{zh:'政策要真正落地见效。',py:'Zhèngcè yào zhēnzhèng luòdì jiànxiào.',en:"Policies must truly be implemented and show results."}},
  {id:'5-694',zh:'铭记',py:'míngjì',en:"to keep firmly in mind / to engrave in one's memory",ex:{zh:'这段历史要铭记于心。',py:'Zhè duàn lìshǐ yào míngjì yú xīn.',en:"This period of history must be firmly kept in mind."}},
  {id:'5-695',zh:'明珠',py:'míngzhū',en:"pearl / treasure / gem",ex:{zh:'他是这片土地上的一颗明珠。',py:'Tā shì zhè piàn tǔdì shàng de yī kē míngzhū.',en:"He is a pearl on this land."}},
  {id:'5-696',zh:'民族',py:'mínzú',en:"ethnic group / nation / nationality",ex:{zh:'中华民族有悠久的历史。',py:'Zhōnghuá mínzú yǒu yōujiǔ de lìshǐ.',en:"The Chinese nation has a long history."}},
  {id:'5-697',zh:'磨砺',py:'mólì',en:"to hone / to sharpen",ex:{zh:'艰苦的环境磨砺了他的意志。',py:'Jiānkǔ de huánjìng mólìle tā de yìzhì.',en:"The harsh environment honed his willpower."}},
  {id:'5-698',zh:'谋划',py:'móuhuà',en:"to plan / to scheme / to map out",ex:{zh:'他谋划了长远的发展策略。',py:'Tā móuhuàle chángyuǎn de fāzhǎn cèlüè.',en:"He mapped out a long-term development strategy."}},
  {id:'5-699',zh:'目标明确',py:'mùbiāo míngquè',en:"clear goal / with a clear objective",ex:{zh:'学习要目标明确，有的放矢。',py:'Xuéxí yào mùbiāo míngquè, yǒu de fàng shǐ.',en:"Learning must have a clear goal and be targeted."}},
  {id:'5-700',zh:'拿手',py:'náshǒu',en:"skilled at / good at",ex:{zh:'这道菜是他的拿手好戏。',py:'Zhè dào cài shì tā de náshǒu hǎoxì.',en:"This dish is his specialty."}},
  {id:'5-701',zh:'纳闷',py:'nàmèn',en:"puzzled / bewildered",ex:{zh:'他感到很纳闷，不知道问题出在哪里。',py:'Tā gǎndào hěn nàmèn, bù zhīdào wèntí chū zài nǎlǐ.',en:"He was puzzled and did not know where the problem was."}},
  {id:'5-702',zh:'耐人寻味',py:'nài rén xún wèi',en:"thought-provoking / worth pondering",ex:{zh:'这句话耐人寻味，值得细细品味。',py:'Zhè jù huà nài rén xún wèi, zhídé xì xì pǐnwèi.',en:"This sentence is worth pondering and savoring carefully."}},
  {id:'5-703',zh:'南辕北辙',py:'nán yuán běi zhé',en:"to work against oneself / diametrically opposed",ex:{zh:'他的行动与目标南辕北辙。',py:'Tā de xíngdòng yǔ mùbiāo nán yuán běi zhé.',en:"His actions are diametrically opposed to his goals."}},
  {id:'5-704',zh:'凝望',py:'níngwàng',en:"to gaze / to stare",ex:{zh:'她凝望着远处的山峦。',py:'Tā níngwàngzhe yuǎnchù de shānluán.',en:"She gazed at the distant mountain range."}},
  {id:'5-705',zh:'宁缺毋滥',py:'nìng quē wú làn',en:"better to have less than to have bad quality",ex:{zh:'选人要宁缺毋滥，不降低标准。',py:'Xuǎn rén yào nìng quē wú làn, bù jiàngdī biāozhǔn.',en:"When selecting people, better to have fewer than to lower standards."}},
  {id:'5-706',zh:'牛刀小试',py:'niú dāo xiǎo shì',en:"a small display of one's talent",ex:{zh:'这次比赛只是牛刀小试。',py:'Zhè cì bǐsài zhǐshì niú dāo xiǎo shì.',en:"This competition was just a small display of talent."}},
  {id:'5-707',zh:'排忧解难',py:'pái yōu jiě nán',en:"to help solve problems / to relieve worries",ex:{zh:'要积极为群众排忧解难。',py:'Yào jījí wèi qúnzhòng pái yōu jiě nán.',en:"Actively help the masses solve their problems and relieve their worries."}},
  {id:'5-708',zh:'拍案而起',py:'pāi àn ér qǐ',en:"to rise in indignation",ex:{zh:'听到这个消息，他拍案而起。',py:'Tīngdào zhège xiāoxi, tā pāi àn ér qǐ.',en:"Upon hearing this news, he rose in indignation."}},
  {id:'5-709',zh:'抱负',py:'bàofù',en:"aspiration / ambition",ex:{zh:'他有远大的抱负，立志改变世界。',py:'Tā yǒu yuǎndà de bàofù, lìzhì gǎibiàn shìjiè.',en:"He has great ambitions and is determined to change the world."}},
  {id:'5-710',zh:'匹配',py:'pǐpèi',en:"to match / to pair",ex:{zh:'能力要与岗位相匹配。',py:'Nénglì yào yǔ gǎngwèi xiāng pǐpèi.',en:"Ability must match the position."}},
  {id:'5-711',zh:'品鉴',py:'pǐnjiàn',en:"to taste and evaluate / to appreciate",ex:{zh:'他善于品鉴艺术作品。',py:'Tā shànyú pǐnjiàn yìshù zuòpǐn.',en:"He is good at appreciating works of art."}},
  {id:'5-712',zh:'抢占',py:'qiǎngzhàn',en:"to seize / to capture",ex:{zh:'要抢占发展的制高点。',py:'Yào qiǎngzhàn fāzhǎn de zhìgāodiǎn.',en:"You must seize the commanding heights of development."}},
  {id:'5-713',zh:'求同存异',py:'qiú tóng cún yì',en:"to seek common ground while reserving differences",ex:{zh:'谈判要求同存异，找到共识。',py:'Tánpàn yào qiú tóng cún yì, zhǎodào gòngshí.',en:"Negotiations must seek common ground while reserving differences to find consensus."}},
  {id:'5-714',zh:'驱逐',py:'qūzhú',en:"to expel / to drive out",ex:{zh:'他们驱逐了入侵者。',py:'Tāmen qūzhúle rùqīnzhě.',en:"They expelled the invaders."}},
  {id:'5-715',zh:'取长补短',py:'qǔ cháng bǔ duǎn',en:"to learn from others' strengths to overcome one's weaknesses",ex:{zh:'团队合作可以取长补短。',py:'Tuánduì hézuò kěyǐ qǔ cháng bǔ duǎn.',en:"Teamwork allows you to learn from others' strengths to overcome your own weaknesses."}},
  {id:'5-716',zh:'绕不开',py:'rào bù kāi',en:"cannot avoid / unavoidable",ex:{zh:'这个问题是绕不开的。',py:'Zhège wèntí shì rào bù kāi de.',en:"This problem is unavoidable."}},
  {id:'5-717',zh:'热衷',py:'rèzhōng',en:"to be keen on / to be enthusiastic about",ex:{zh:'他热衷于公益活动。',py:'Tā rèzhōng yú gōngyì huódòng.',en:"He is keen on public welfare activities."}},
  {id:'5-718',zh:'任重道远',py:'rèn zhòng dào yuǎn',en:"the task is heavy and the road is long",ex:{zh:'实现梦想，任重道远。',py:'Shíxiàn mèngxiǎng, rèn zhòng dào yuǎn.',en:"To realize the dream, the task is heavy and the road is long."}},
  {id:'5-719',zh:'熔铸',py:'róngzhù',en:"to smelt and cast / to forge",ex:{zh:'历史把他熔铸成了伟大的人物。',py:'Lìshǐ bǎ tā róngzhùchéngle wěidà de rénwù.',en:"History forged him into a great figure."}},
  {id:'5-720',zh:'如鱼得水',py:'rú yú dé shuǐ',en:"like a fish in water / in one's element",ex:{zh:'他在这个领域如鱼得水。',py:'Tā zài zhège lǐngyù rú yú dé shuǐ.',en:"He is in his element in this field."}},
  {id:'5-721',zh:'思想',py:'sīxiǎng',en:"thought / ideology / thinking",ex:{zh:'解放思想是改革的前提。',py:'Jiěfàng sīxiǎng shì gǎigé de qiántí.',en:"Emancipating the mind is the prerequisite for reform."}},
  {id:'5-722',zh:'升华',py:'shēnghuá',en:"to sublimate / to elevate",ex:{zh:'艺术能升华人的精神境界。',py:'Yìshù néng shēnghuá rén de jīngshén jìngjiè.',en:"Art can elevate a person's spiritual realm."}},
  {id:'5-723',zh:'生动',py:'shēngdòng',en:"vivid / lively / animated",ex:{zh:'他的讲解生动形象。',py:'Tā de jiǎngjiě shēngdòng xíngxiàng.',en:"His explanation is vivid and graphic."}},
  {id:'5-724',zh:'顺畅',py:'shùnchàng',en:"smooth / unobstructed / fluent",ex:{zh:'沟通要顺畅，才能提高效率。',py:'Gōutōng yào shùnchàng, cái néng tígāo xiàolǜ.',en:"Communication must be smooth to improve efficiency."}},
  {id:'5-725',zh:'说到做到',py:'shuō dào zuò dào',en:"to do what one says / to keep one's word",ex:{zh:'他是个说到做到的人。',py:'Tā shì gè shuō dào zuò dào de rén.',en:"He is a person who does what he says."}},
  {id:'5-726',zh:'丝丝入扣',py:'sī sī rù kòu',en:"meticulous / precise / fitting together perfectly",ex:{zh:'他的分析丝丝入扣。',py:'Tā de fēnxī sī sī rù kòu.',en:"His analysis is meticulous and precise."}},
  {id:'5-727',zh:'宋',py:'Sòng',en:"Song (dynasty / surname)",ex:{zh:'宋朝是中国历史上文化繁荣的朝代。',py:'Sòng cháo shì Zhōngguó lìshǐ shàng wénhuà fánróng de cháodài.',en:"The Song Dynasty was a culturally prosperous period in Chinese history."}},
  {id:'5-728',zh:'缩影',py:'suōyǐng',en:"miniature / epitome / microcosm",ex:{zh:'这个村庄是中国农村发展的缩影。',py:'Zhège cūnzhuāng shì Zhōngguó nóngcūn fāzhǎn de suōyǐng.',en:"This village is a microcosm of rural development in China."}},
  {id:'5-729',zh:'所向披靡',py:'suǒ xiàng pī mǐ',en:"to overcome all obstacles / invincible",ex:{zh:'有了知识和技能，可以所向披靡。',py:'Yǒule zhīshí hé jìnéng, kěyǐ suǒ xiàng pī mǐ.',en:"With knowledge and skills, one can overcome all obstacles."}},
  {id:'5-730',zh:'踏踏实实',py:'tātā shíshí',en:"steady and earnest / down-to-earth",ex:{zh:'做事要踏踏实实。',py:'Zuòshì yào tātā shíshí.',en:"Be steady and earnest in everything you do."}},
  {id:'5-731',zh:'探幽',py:'tànyōu',en:"to explore hidden places / to seek the profound",ex:{zh:'他喜欢探幽访胜，游历名山大川。',py:'Tā xǐhuān tànyōu fǎngshèng, yóulì míng shān dà chuān.',en:"He loves exploring hidden places and travelling to famous mountains and rivers."}},
  {id:'5-732',zh:'桃花源',py:'Táohuāyuán',en:"Peach Blossom Spring / utopia / ideal world",ex:{zh:'他向往那样的桃花源式生活。',py:'Tā xiàngwǎng nàyàng de Táohuāyuán shì shēnghuó.',en:"He longs for that kind of Peach Blossom Spring life."}},
  {id:'5-733',zh:'体悟',py:'tǐwù',en:"to experience and understand",ex:{zh:'他对人生有深刻的体悟。',py:'Tā duì rénshēng yǒu shēnkè de tǐwù.',en:"He has a profound understanding of life."}},
  {id:'5-734',zh:'填补',py:'tiánbǔ',en:"to fill in / to make up for",ex:{zh:'这项研究填补了领域内的空白。',py:'Zhè xiàng yánjiū tiánbǔle lǐngyù nèi de kòngbái.',en:"This research filled in the gaps in the field."}},
  {id:'5-735',zh:'通盘',py:'tōngpán',en:"overall / comprehensive / across the board",ex:{zh:'要通盘考虑，做出全面决策。',py:'Yào tōngpán kǎolǜ, zuòchū quánmiàn juécè.',en:"You must consider everything overall and make comprehensive decisions."}},
  {id:'5-736',zh:'统筹',py:'tǒngchóu',en:"to make overall plans / to coordinate",ex:{zh:'要统筹兼顾，协调各方利益。',py:'Yào tǒngchóu jiāngù, xiétiáo gèfāng lìyì.',en:"Overall plans must be made and interests of all parties coordinated."}},
  {id:'5-737',zh:'团队精神',py:'tuánduì jīngshén',en:"team spirit",ex:{zh:'团队精神是取得成功的关键。',py:'Tuánduì jīngshén shì qǔdé chénggōng de guānjiàn.',en:"Team spirit is the key to achieving success."}},
  {id:'5-738',zh:'推陈出新',py:'tuī chén chū xīn',en:"to innovate / to replace the old with the new",ex:{zh:'创新就是要推陈出新。',py:'Chuàngxīn jiùshì yào tuī chén chū xīn.',en:"Innovation means replacing the old with the new."}},
  {id:'5-739',zh:'脱颖而出',py:'tuō yǐng ér chū',en:"to stand out / to distinguish oneself",ex:{zh:'他在众多候选人中脱颖而出。',py:'Tā zài zhòngduō hòuxuǎnrén zhōng tuō yǐng ér chū.',en:"He stood out among many candidates."}},
  {id:'5-740',zh:'外延',py:'wàiyán',en:"extension / outer scope",ex:{zh:'这个概念的外延很广。',py:'Zhège gàiniàn de wàiyán hěn guǎng.',en:"The extension of this concept is very broad."}},
  {id:'5-741',zh:'万古长青',py:'wàn gǔ cháng qīng',en:"evergreen / lasting forever",ex:{zh:'中华文明万古长青。',py:'Zhōnghuá wénmíng wàn gǔ cháng qīng.',en:"Chinese civilization will last forever."}},
  {id:'5-742',zh:'万众一心',py:'wàn zhòng yī xīn',en:"millions of people united as one",ex:{zh:'万众一心，共克时艰。',py:'Wàn zhòng yī xīn, gòng kè shí jiān.',en:"Millions united as one to overcome difficulties together."}},
  {id:'5-743',zh:'蔚然成风',py:'wèi rán chéng fēng',en:"to become the norm / to form a good trend",ex:{zh:'读书学习蔚然成风。',py:'Dúshū xuéxí wèi rán chéng fēng.',en:"Reading and learning has become the norm."}},
  {id:'5-744',zh:'文脉',py:'wénmài',en:"cultural vein / cultural lineage",ex:{zh:'要保护地方文脉，传承历史文化。',py:'Yào bǎohù dìfāng wénmài, chuánchéng lìshǐ wénhuà.',en:"Local cultural lineage must be protected and historical culture passed on."}},
  {id:'5-745',zh:'务实',py:'wùshí',en:"pragmatic / realistic / practical",ex:{zh:'要务实求真，拒绝空谈。',py:'Yào wùshí qiúzhēn, jùjué kōngtán.',en:"Be pragmatic and realistic, rejecting empty talk."}},
  {id:'5-746',zh:'息息相关',py:'xī xī xiāng guān',en:"closely linked / intimately related",ex:{zh:'学习与未来息息相关。',py:'Xuéxí yǔ wèilái xī xī xiāng guān.',en:"Learning is closely linked to the future."}},
  {id:'5-747',zh:'细水长流',py:'xì shuǐ cháng liú',en:"slow and steady / to make good use of limited resources",ex:{zh:'积累知识要细水长流。',py:'Jīlěi zhīshí yào xì shuǐ cháng liú.',en:"Accumulating knowledge should be slow and steady."}},
  {id:'5-748',zh:'行之有效',py:'xíng zhī yǒu xiào',en:"effective / proven to work",ex:{zh:'这是一个行之有效的方法。',py:'Zhè shì yīgè xíng zhī yǒu xiào de fāngfǎ.',en:"This is a proven and effective method."}},
  {id:'5-749',zh:'惜时',py:'xīshí',en:"to value time / to treasure time",ex:{zh:'要惜时如金，珍惜每一分钟。',py:'Yào xīshí rú jīn, zhēnxī měi yī fēnzhōng.',en:"Value time like gold and treasure every minute."}},
  {id:'5-750',zh:'雄心壮志',py:'xióng xīn zhuàng zhì',en:"great ambitions / heroic aspirations",ex:{zh:'他怀有雄心壮志，立志报国。',py:'Tā huáiyǒu xióng xīn zhuàng zhì, lìzhì bào guó.',en:"He harbors great ambitions and is determined to serve his country."}},
  {id:'5-751',zh:'修身',py:'xiūshēn',en:"self-cultivation / to cultivate oneself",ex:{zh:'修身齐家治国平天下。',py:'Xiū shēn qí jiā zhì guó píng tiān xià.',en:"Cultivate the self, regulate the family, govern the state, bring peace to the world."}},
  {id:'5-752',zh:'絮叨',py:'xùdao',en:"to talk on and on / long-winded",ex:{zh:'他不停絮叨，让人不耐烦。',py:'Tā bùtíng xùdao, ràng rén bù nàifán.',en:"He keeps talking on and on, making people impatient."}},
  {id:'5-753',zh:'悬壶济世',py:'xuán hú jì shì',en:"to practice medicine to save the world",ex:{zh:'他悬壶济世，救死扶伤。',py:'Tā xuán hú jì shì, jiù sǐ fú shāng.',en:"He practiced medicine to save lives and heal the wounded."}},
  {id:'5-754',zh:'学以致用',py:'xué yǐ zhì yòng',en:"to apply what one has learned",ex:{zh:'学以致用是学习的最高境界。',py:'Xué yǐ zhì yòng shì xuéxí de zuìgāo jìngjie.',en:"Applying what you have learned is the highest level of learning."}},
  {id:'5-755',zh:'研习',py:'yánxí',en:"to study and practice",ex:{zh:'他研习古典文学多年。',py:'Tā yánxí gǔdiǎn wénxué duō nián.',en:"He has studied and practiced classical literature for many years."}},
  {id:'5-756',zh:'一脉相承',py:'yī mài xiāng chéng',en:"to come from the same origin",ex:{zh:'这两种思想一脉相承。',py:'Zhè liǎng zhǒng sīxiǎng yī mài xiāng chéng.',en:"These two schools of thought come from the same origin."}},
  {id:'5-757',zh:'一鸣惊人',py:'yī míng jīng rén',en:"to amaze the world with a single brilliant feat",ex:{zh:'他一鸣惊人，获得了世界冠军。',py:'Tā yī míng jīng rén, huòdéle shìjiè guànjūn.',en:"He amazed the world by winning the world championship."}},
  {id:'5-758',zh:'意蕴',py:'yìyùn',en:"aesthetic appeal / connotation",ex:{zh:'这幅画意蕴深远。',py:'Zhè fú huà yìyùn shēnyuǎn.',en:"This painting has deep aesthetic appeal."}},
  {id:'5-759',zh:'毅力',py:'yìlì',en:"perseverance / willpower",ex:{zh:'成功需要坚强的毅力。',py:'Chénggōng xūyào jiānqiáng de yìlì.',en:"Success requires strong perseverance."}},
  {id:'5-760',zh:'引以为豪',py:'yǐn yǐ wéi háo',en:"to take pride in",ex:{zh:'我们以他的成就引以为豪。',py:'Wǒmen yǐ tā de chéngjiù yǐn yǐ wéi háo.',en:"We take pride in his achievements."}},
  {id:'5-761',zh:'英才',py:'yīngcái',en:"outstanding talent",ex:{zh:'这所学校培养了无数英才。',py:'Zhè suǒ xuéxiào péiyǎngle wúshù yīngcái.',en:"This school has cultivated countless outstanding talents."}},
  {id:'5-762',zh:'永葆',py:'yǒngbǎo',en:"to forever maintain",ex:{zh:'要永葆初心，不忘使命。',py:'Yào yǒngbǎo chūxīn, bùwàng shǐmìng.',en:"Always maintain the original aspiration and never forget the mission."}},
  {id:'5-763',zh:'勇于',py:'yǒngyú',en:"to have the courage to / to dare to",ex:{zh:'要勇于担当，敢于创新。',py:'Yào yǒngyú dāndāng, gǎnyú chuàngxīn.',en:"Have the courage to take responsibility and dare to innovate."}},
  {id:'5-764',zh:'忧患意识',py:'yōuhuàn yìshí',en:"sense of crisis / awareness of potential problems",ex:{zh:'要有忧患意识，居安思危。',py:'Yào yǒu yōuhuàn yìshí, jū ān sī wēi.',en:"You must have a sense of crisis and think of danger in times of peace."}},
  {id:'5-765',zh:'运筹帷幄',py:'yùn chóu wéi wò',en:"to devise strategies within a command tent",ex:{zh:'他运筹帷幄，决胜千里之外。',py:'Tā yùn chóu wéi wò, jué shèng qiān lǐ zhī wài.',en:"He devised strategies and won victories from afar."}},
  {id:'5-766',zh:'再接再厉',py:'zài jiē zài lì',en:"to continue to make further efforts",ex:{zh:'取得成绩后，要再接再厉。',py:'Qǔdé chéngjì hòu, yào zài jiē zài lì.',en:"After achieving results, you must continue to make further efforts."}},
  {id:'5-767',zh:'在所不惜',py:'zài suǒ bù xī',en:"to not hesitate regardless of the cost",ex:{zh:'为了理想，在所不惜。',py:'Wèile lǐxiǎng, zài suǒ bù xī.',en:"For the ideal, no cost is too great."}},
  {id:'5-768',zh:'朝气蓬勃',py:'zhāo qì péng bó',en:"full of youthful energy and vitality",ex:{zh:'年轻人要朝气蓬勃，充满活力。',py:'Niánqīngrén yào zhāo qì péng bó, chōngmǎn huólì.',en:"Young people should be full of youthful energy and vitality."}},
  {id:'5-769',zh:'震撼',py:'zhènhàn',en:"to shake / to shock / to be deeply moved",ex:{zh:'这个故事深深震撼了他。',py:'Zhège gùshi shēnshēn zhènhànle tā.',en:"This story deeply moved him."}},
  {id:'5-770',zh:'蒸蒸日上',py:'zhēng zhēng rì shàng',en:"to grow stronger with each passing day",ex:{zh:'事业蒸蒸日上，前途无量。',py:'Shìyè zhēng zhēng rì shàng, qiántú wúliàng.',en:"The career grows stronger each day with unlimited prospects."}},
  {id:'5-771',zh:'知行合一',py:'zhī xíng hé yī',en:"unity of knowing and doing",ex:{zh:'知行合一是儒家的重要理念。',py:'Zhī xíng hé yī shì Rújiā de zhòngyào lǐniàn.',en:"Unity of knowing and doing is an important Confucian concept."}},
  {id:'5-772',zh:'志同道合',py:'zhì tóng dào hé',en:"to have the same ideals and follow the same path",ex:{zh:'他们是志同道合的伙伴。',py:'Tāmen shì zhì tóng dào hé de huǒbàn.',en:"They are partners with the same ideals and following the same path."}},
  {id:'5-773',zh:'中流砥柱',py:'zhōng liú dǐ zhù',en:"mainstay / backbone / pillar",ex:{zh:'他是团队中的中流砥柱。',py:'Tā shì tuánduì zhōng de zhōng liú dǐ zhù.',en:"He is the backbone of the team."}},
  {id:'5-774',zh:'众志成城',py:'zhòng zhì chéng chéng',en:"united will is an impregnable fortress",ex:{zh:'众志成城，没有克服不了的困难。',py:'Zhòng zhì chéng chéng, méiyǒu kèfú bùliǎo de kùnnan.',en:"With united will, no difficulty is insurmountable."}},
  {id:'5-775',zh:'注入',py:'zhùrù',en:"to inject / to pour into",ex:{zh:'改革为发展注入了新活力。',py:'Gǎigé wèi fāzhǎn zhùrùle xīn huólì.',en:"Reform injected new vitality into development."}},
  {id:'5-776',zh:'追本溯源',py:'zhuī běn sù yuán',en:"to trace back to the source",ex:{zh:'解决问题要追本溯源。',py:'Jiějué wèntí yào zhuī běn sù yuán.',en:"When solving problems you must trace back to the source."}},
  {id:'5-777',zh:'追求卓越',py:'zhuīqiú zhuōyuè',en:"to pursue excellence",ex:{zh:'永远追求卓越是成功的秘诀。',py:'Yǒngyuǎn zhuīqiú zhuōyuè shì chénggōng de mìjué.',en:"Always pursuing excellence is the secret of success."}},
  {id:'5-778',zh:'卓尔不群',py:'zhuó ěr bù qún',en:"outstanding / standing above the rest",ex:{zh:'他才华出众，卓尔不群。',py:'Tā cáihuá chūzhòng, zhuó ěr bù qún.',en:"He is outstandingly talented and stands above the rest."}},
  {id:'5-779',zh:'字斟句酌',py:'zì zhēn jù zhuó',en:"to weigh every word carefully",ex:{zh:'写作要字斟句酌。',py:'Xiězuò yào zì zhēn jù zhuó.',en:"Writing must weigh every word carefully."}},
  {id:'5-780',zh:'自古以来',py:'zìgǔ yǐlái',en:"since ancient times",ex:{zh:'自古以来，勤劳是中华民族的美德。',py:'Zìgǔ yǐlái, qínláo shì Zhōnghuá mínzú de měidé.',en:"Since ancient times, diligence has been a virtue of the Chinese nation."}},
  {id:'5-781',zh:'滋生',py:'zīshēng',en:"to breed / to give rise to",ex:{zh:'不良环境容易滋生犯罪。',py:'Bùliáng huánjìng róngyì zīshēng fànzuì.',en:"Bad environments easily breed crime."}},
  {id:'5-782',zh:'宗旨',py:'zōngzhǐ',en:"purpose / aim / mission",ex:{zh:'服务人民是我们工作的宗旨。',py:'Fúwù rénmín shì wǒmen gōngzuò de zōngzhǐ.',en:"Serving the people is the purpose of our work."}},
  {id:'5-783',zh:'走马观花',py:'zǒu mǎ guān huā',en:"a quick and superficial look",ex:{zh:'走马观花式的学习不能真正掌握知识。',py:'Zǒu mǎ guān huā shì de xuéxí bùnéng zhēnzhèng zhǎngwò zhīshí.',en:"Superficial learning cannot truly master knowledge."}},
  {id:'5-784',zh:'佐料',py:'zuǒliào',en:"seasoning / condiment / ingredient",ex:{zh:'做菜要合理使用佐料。',py:'Zuò cài yào hélǐ shǐyòng zuǒliào.',en:"Seasonings must be used properly when cooking."}},
  {id:'5-785',zh:'坐井观天',py:'zuò jǐng guān tiān',en:"to have a very limited view",ex:{zh:'不能坐井观天，要放眼世界。',py:'Bùnéng zuò jǐng guān tiān, yào fàngyǎn shìjiè.',en:"Don't have a limited view — look at the world with open eyes."}},
  {id:'5-786',zh:'纵横捭阖',py:'zòng héng bǎi hé',en:"to maneuver skillfully",ex:{zh:'他在政界纵横捭阖，游刃有余。',py:'Tā zài zhèngjiè zòng héng bǎi hé, yóu rèn yǒu yú.',en:"He maneuvers skillfully in the political sphere."}},
  {id:'5-787',zh:'涵盖',py:'hángài',en:"to encompass / to cover",ex:{zh:'这个领域涵盖了多个学科。',py:'Zhège lǐngyù hángàile duō gè xuékē.',en:"This field encompasses multiple disciplines."}},
  {id:'5-788',zh:'号召力',py:'hàozhàolì',en:"appeal / power of appeal",ex:{zh:'他有极强的号召力。',py:'Tā yǒu jí qiáng de hàozhàolì.',en:"He has extremely strong appeal."}},
  {id:'5-789',zh:'厚积薄发',py:'hòu jī bó fā',en:"to accumulate over a long period and deliver in one stroke",ex:{zh:'厚积薄发才能成大器。',py:'Hòu jī bó fā cái néng chéng dà qì.',en:"Only through long accumulation and sudden delivery can one achieve great things."}},
  {id:'5-790',zh:'胡思乱想',py:'hú sī luàn xiǎng',en:"to let one's imagination run wild",ex:{zh:'不要胡思乱想，要专心工作。',py:'Bùyào hú sī luàn xiǎng, yào zhuānxīn gōngzuò.',en:"Don't let your imagination run wild — focus on work."}},
  {id:'5-791',zh:'化险为夷',py:'huà xiǎn wéi yí',en:"to turn danger into safety",ex:{zh:'他化险为夷，转危为安。',py:'Tā huà xiǎn wéi yí, zhuǎn wēi wéi ān.',en:"He turned danger into safety."}},
  {id:'5-792',zh:'欢声笑语',py:'huān shēng xiào yǔ',en:"laughter and cheerful talk",ex:{zh:'教室里充满欢声笑语。',py:'Jiàoshì lǐ chōngmǎn huān shēng xiào yǔ.',en:"The classroom is full of laughter and cheerful talk."}},
  {id:'5-793',zh:'黄金时代',py:'huángjīn shídài',en:"golden age",ex:{zh:'我们正处于发展的黄金时代。',py:'Wǒmen zhèng chǔyú fāzhǎn de huángjīn shídài.',en:"We are in the golden age of development."}},
  {id:'5-794',zh:'挥洒',py:'huīsǎ',en:"to wave / to write with great ease",ex:{zh:'他挥洒自如，尽情创作。',py:'Tā huīsǎ zìrú, jìnqíng chuàngzuò.',en:"He creates freely and easily."}},
  {id:'5-795',zh:'活学活用',py:'huó xué huó yòng',en:"to learn and apply flexibly",ex:{zh:'要活学活用，不能死记硬背。',py:'Yào huó xué huó yòng, bùnéng sǐ jì yìng bèi.',en:"You must learn and apply flexibly, not just memorize by rote."}},
  {id:'5-796',zh:'机遇',py:'jīyù',en:"opportunity / chance",ex:{zh:'要善于把握机遇。',py:'Yào shànyú bǎwò jīyù.',en:"You must be good at seizing opportunities."}},
  {id:'5-797',zh:'迹象',py:'jìxiàng',en:"sign / indication / trace",ex:{zh:'他发现了成功的迹象。',py:'Tā fāxiànle chénggōng de jìxiàng.',en:"He discovered signs of success."}},
  {id:'5-798',zh:'建树',py:'jiànshù',en:"achievement / accomplishment",ex:{zh:'他在科学领域建树颇丰。',py:'Tā zài kēxué lǐngyù jiànshù pōfēng.',en:"He has made abundant achievements in the field of science."}},
  {id:'5-799',zh:'精诚合作',py:'jīngchéng hézuò',en:"sincere cooperation",ex:{zh:'双方精诚合作，共同开创美好未来。',py:'Shuāngfāng jīngchéng hézuò, gòngtóng kāichuàng měihǎo wèilái.',en:"Both sides cooperate sincerely to create a bright future together."}},
  {id:'5-800',zh:'精髓',py:'jīngsuǐ',en:"essence / quintessence",ex:{zh:'这是中国文化的精髓。',py:'Zhè shì Zhōngguó wénhuà de jīngsuǐ.',en:"This is the quintessence of Chinese culture."}},

  {id:'5-801',zh:'经典传世',py:'jīngdiǎn chuánshì',en:"classic works that endure through the ages",ex:{zh:'这部作品经典传世，影响深远。',py:'Zhè bù zuòpǐn jīngdiǎn chuánshì, yǐngxiǎng shēnyuǎn.',en:"This work is a classic that endures through the ages with far-reaching influence."}},
  {id:'5-802',zh:'敬业',py:'jìngyè',en:"dedicated to one's work / professional",ex:{zh:'他敬业奉献，深受同事尊重。',py:'Tā jìngyè fèngxiàn, shēn shòu tóngshì zūnzhòng.',en:"He is dedicated to his work and deeply respected by colleagues."}},
  {id:'5-803',zh:'竭力',py:'jiélì',en:"to do one's utmost / with all one's strength",ex:{zh:'他竭力支持这个项目。',py:'Tā jiélì zhīchí zhège xiàngmù.',en:"He supports this project with all his strength."}},
  {id:'5-804',zh:'堪称',py:'kānchēng',en:"can be called / deserves to be called",ex:{zh:'他堪称业界楷模。',py:'Tā kānchēng yèjiè kǎimó.',en:"He deserves to be called a model in the industry."}},
  {id:'5-805',zh:'开源节流',py:'kāi yuán jié liú',en:"to increase income and cut expenditure",ex:{zh:'企业要开源节流，降低成本。',py:'Qǐyè yào kāi yuán jié liú, jiàngdī chéngběn.',en:"Enterprises must increase income and cut expenditure to reduce costs."}},
  {id:'5-806',zh:'侃侃而谈',py:'kǎn kǎn ér tán',en:"to talk confidently and fluently",ex:{zh:'他侃侃而谈，说得头头是道。',py:'Tā kǎn kǎn ér tán, shuō de tóu tóu shì dào.',en:"He talked confidently and fluently, making perfect sense."}},
  {id:'5-807',zh:'可望而不可即',py:'kě wàng ér bù kě jí',en:"within sight but out of reach",ex:{zh:'理想有时候可望而不可即。',py:'Lǐxiǎng yǒu shíhòu kě wàng ér bù kě jí.',en:"Ideals are sometimes within sight but out of reach."}},
  {id:'5-808',zh:'刻画',py:'kèhuà',en:"to depict / to portray",ex:{zh:'这部小说刻画了复杂的人性。',py:'Zhè bù xiǎoshuō kèhuàle fùzá de rénxìng.',en:"This novel depicts complex human nature."}},
  {id:'5-809',zh:'理所当然',py:'lǐ suǒ dāng rán',en:"natural / matter of course / only right",ex:{zh:'帮助他人是理所当然的事。',py:'Bāngzhù tārén shì lǐ suǒ dāng rán de shì.',en:"Helping others is only natural."}},
