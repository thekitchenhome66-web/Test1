<style>
  :root {
    --bg:        #0f1923;
    --card:      #162235;
    --card2:     #1c2d44;
    --border:    #1f3550;
    --border2:   #243d57;
    --green:     #4ade80;
    --green-dim: #22c55e;
    --red:       #f87171;
    --yellow:    #fbbf24;
    --blue:      #60a5fa;
    --purple:    #a78bfa;
    --text:      #e8f0f8;
    --muted:     #6b8aaa;
    --soft:      #4a6580;
    --radius:    16px;
    --t:         0.28s cubic-bezier(.4,0,.2,1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  #app {
    min-height: 100dvh;
    display: flex; flex-direction: column;
    max-width: 520px; margin: 0 auto;
    padding: 0 0 48px;
  }

  /* ── Header ── */
  .lesson-header {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg);
    padding: 16px 20px 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .btn-close {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; background: var(--card); color: var(--muted);
    cursor: pointer; display: grid; place-items: center; flex-shrink: 0;
    transition: background var(--t), color var(--t);
  }
  .btn-close:hover { background: var(--card2); color: var(--text); }
  .btn-close svg { width: 16px; height: 16px; }
  .progress-bar-wrap {
    flex: 1; height: 10px; background: var(--card);
    border-radius: 999px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 8px rgba(74,222,128,.45);
  }
  .hearts-display { display: flex; gap: 3px; flex-shrink: 0; }
  .heart-icon { font-size: 18px; transition: transform 0.2s, opacity 0.3s; filter: drop-shadow(0 0 4px rgba(248,113,113,.5)); }
  .heart-icon.lost { opacity: 0.18; filter: none; transform: scale(0.85); }

  /* ── Lesson Info Bar ── */
  .lesson-info-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px 10px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .lesson-tag {
    background: rgba(96,165,250,.1); border: 1px solid rgba(96,165,250,.2);
    border-radius: 999px; padding: 4px 10px; color: var(--blue);
  }
  .lesson-phase-tag {
    background: rgba(167,139,250,.1); border: 1px solid rgba(167,139,250,.2);
    border-radius: 999px; padding: 4px 10px; color: var(--purple);
  }

  /* ── Step area ── */
  .step-wrap { flex: 1; padding: 12px 20px 0; display: flex; flex-direction: column; gap: 20px; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(36px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(-36px); } }
  .step-visible { animation: slideIn 0.36s cubic-bezier(.4,0,.2,1) forwards; }
  .step-exit    { animation: slideOut 0.28s cubic-bezier(.4,0,.2,1) forwards; }

  /* ── Labels ── */
  .step-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: -8px; }
  .step-label.green  { color: var(--green); }
  .step-label.yellow { color: var(--yellow); }
  .step-label.purple { color: var(--purple); }
  .mini-quiz-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(96,165,250,.1); border: 1px solid rgba(96,165,250,.25);
    border-radius: 999px; padding: 4px 12px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    color: var(--blue); text-transform: uppercase;
    margin-bottom: -6px; width: fit-content;
  }
  .review-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(251,191,36,.08); border: 1px solid rgba(251,191,36,.25);
    border-radius: 999px; padding: 4px 12px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    color: var(--yellow); text-transform: uppercase;
    margin-bottom: -6px; width: fit-content;
  }

  /* ── Word Card ── */
  .word-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px 24px 28px;
    text-align: center; position: relative; overflow: hidden;
  }
  .word-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(74,222,128,.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .word-card.review-card::before {
    background: radial-gradient(ellipse at 50% 0%, rgba(251,191,36,.07) 0%, transparent 70%);
  }
  .word-card-top { display: flex; align-items: flex-start; justify-content: center; gap: 8px; margin-bottom: 4px; }
  .word-chinese { font-family: 'Noto Sans SC', sans-serif; font-size: clamp(52px, 13vw, 76px); font-weight: 700; line-height: 1; color: var(--text); text-shadow: 0 0 32px rgba(74,222,128,.2); }
  .word-card.review-card .word-chinese { text-shadow: 0 0 32px rgba(251,191,36,.2); }
  .btn-audio {
    background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.25);
    border-radius: 50%; width: 32px; height: 32px;
    display: grid; place-items: center; cursor: pointer;
    color: var(--green); flex-shrink: 0; margin-top: 6px;
    transition: background var(--t), transform 0.15s;
  }
  .btn-audio:hover { background: rgba(74,222,128,.2); transform: scale(1.08); }
  .btn-audio svg { width: 14px; height: 14px; }
  .word-pinyin { font-size: 19px; color: var(--green); font-weight: 500; margin-bottom: 6px; letter-spacing: 0.04em; }
  .word-card.review-card .word-pinyin { color: var(--yellow); }
  .word-meaning { font-size: 15px; color: var(--muted); font-weight: 400; margin-bottom: 20px; }
  .word-meaning strong { color: var(--text); font-weight: 600; }
  .word-example { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; text-align: left; }
  .example-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--soft); margin-bottom: 7px; }
  .example-chinese { font-family: 'Noto Sans SC', sans-serif; font-size: 15px; color: var(--text); margin-bottom: 3px; line-height: 1.4; }
  .example-pinyin  { font-size: 12px; color: var(--muted); margin-bottom: 3px; }
  .example-translation { font-size: 12px; color: var(--soft); font-style: italic; }

  /* ── Grammar ── */
  .grammar-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px 22px; }
  .grammar-card.purple-card { border-color: rgba(167,139,250,.25); background: rgba(167,139,250,.04); }
  .grammar-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 12px; line-height: 1.35; }
  .grammar-body  { font-size: 14px; line-height: 1.8; color: var(--muted); }
  .grammar-body .highlight { background: rgba(74,222,128,.12); color: var(--green); padding: 1px 5px; border-radius: 5px; font-weight: 500; }
  .grammar-examples { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
  .grammar-ex-item { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .grammar-ex-chinese { font-family: 'Noto Sans SC', sans-serif; font-size: 15px; color: var(--text); margin-bottom: 2px; }
  .grammar-ex-translation { font-size: 12px; color: var(--soft); font-style: italic; }

  /* ── Checkpoint ── */
  .checkpoint-header { text-align: center; padding: 20px 0 10px; }
  .checkpoint-icon { font-size: 40px; margin-bottom: 8px; }
  .checkpoint-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .checkpoint-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .checkpoint-progress { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
  .checkpoint-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .checkpoint-dot.done   { background: var(--green); }
  .checkpoint-dot.active { background: var(--yellow); box-shadow: 0 0 6px rgba(251,191,36,.6); }

  /* ── Sentence card ── */
  .sentence-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 22px; text-align: center; }
  .sentence-chinese { font-family: 'Noto Sans SC', sans-serif; font-size: clamp(20px, 5vw, 28px); font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
  .sentence-pinyin  { font-size: 13px; color: var(--muted); margin-bottom: 4px; }

  /* ── Exercise ── */
  .exercise-question { font-size: clamp(17px, 4.5vw, 21px); font-weight: 600; line-height: 1.6; color: var(--text); }
  .exercise-question .q-word {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: clamp(30px, 8vw, 40px);
    font-weight: 800; color: var(--green);
    display: block; margin-top: 10px; letter-spacing: 0.04em;
    text-shadow: 0 0 20px rgba(74,222,128,.25);
  }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .options-grid.single-col { grid-template-columns: 1fr; }
  .option-btn {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 12px; padding: 16px 12px;
    font-family: 'Sora', sans-serif; font-size: 14px;
    font-weight: 500; color: var(--text); cursor: pointer;
    transition: border-color var(--t), background var(--t), transform 0.15s;
    text-align: center; line-height: 1.3;
  }
  .option-btn:hover:not(:disabled) { border-color: rgba(74,222,128,.5); background: var(--card2); transform: translateY(-1px); }
  .option-btn.correct { border-color: var(--green); background: rgba(74,222,128,.12); color: var(--green); }
  .option-btn.wrong   { border-color: var(--red);   background: rgba(248,113,113,.10); color: var(--red); }
  .option-btn:disabled { cursor: not-allowed; }

  /* ── Typing ── */
  .typing-input-wrap { position: relative; }
  .typing-input {
    width: 100%; padding: 16px 18px; border-radius: 12px;
    border: 2px solid var(--border); background: var(--card);
    color: var(--text); font-family: 'Sora', sans-serif; font-size: 16px;
    outline: none; transition: border-color var(--t); caret-color: var(--green);
  }
  .typing-input:focus { border-color: rgba(74,222,128,.5); }
  .typing-input.correct-input { border-color: var(--green); background: rgba(74,222,128,.06); }
  .typing-input.wrong-input   { border-color: var(--red);   background: rgba(248,113,113,.06); }
  .typing-hint { font-size: 11px; color: var(--soft); margin-top: 6px; text-align: right; }

  /* ── Matching ── */
  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .match-col-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 6px; }
  .match-item {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 12px; padding: 16px 10px;
    font-size: 15px; font-weight: 500; text-align: center; cursor: pointer;
    transition: border-color var(--t), background var(--t), transform 0.15s;
    min-height: 58px; display: flex; align-items: center; justify-content: center;
    word-break: break-word;
  }
  .match-item.chinese-item { font-family: 'Noto Sans SC', sans-serif; font-size: 18px; }
  .match-item:hover:not(.matched):not(.disabled-match) { border-color: rgba(74,222,128,.4); background: var(--card2); transform: translateY(-1px); }
  .match-item.selected { border-color: var(--green); background: rgba(74,222,128,.1); color: var(--green); }
  .match-item.matched  { border-color: var(--green); background: rgba(74,222,128,.08); color: var(--green); opacity: 0.55; cursor: default; }
  .match-item.wrong-shake { border-color: var(--red); background: rgba(248,113,113,.1); animation: shake 0.4s ease; }
  .match-item.disabled-match { opacity: 0.35; cursor: not-allowed; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 60% { transform: translateX(6px); } }

  /* ── Fill-in ── */
  .fill-sentence {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: clamp(32px, 9vw, 44px);
    font-weight: 800; color: #ffffff;
    line-height: 2.1; text-align: center;
    background: var(--card2); border: 2px solid var(--border2);
    border-radius: var(--radius); padding: 32px 20px;
    letter-spacing: 0.06em;
    text-shadow: 0 2px 16px rgba(232,240,248,.15);
  }
  .fill-blank {
    display: inline-block;
    font-size: clamp(32px, 9vw, 44px); font-weight: 900;
    border-bottom: 4px solid var(--green);
    min-width: 80px; text-align: center;
    color: var(--green); padding: 0 8px;
    text-shadow: 0 0 20px rgba(74,222,128,.5);
    vertical-align: middle;
  }
  .word-bank-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .word-chip {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 10px; padding: 10px 18px;
    font-family: 'Noto Sans SC', sans-serif; font-size: 16px; font-weight: 500;
    color: var(--text); cursor: pointer;
    transition: border-color var(--t), background var(--t), transform 0.15s, opacity var(--t);
  }
  .word-chip:hover:not(:disabled) { border-color: rgba(74,222,128,.5); background: var(--card2); transform: translateY(-1px); }
  .word-chip:disabled { opacity: 0.3; cursor: not-allowed; }
  .word-chip.used { opacity: 0.25; pointer-events: none; }
  .word-chip.correct-chip { border-color: var(--green); background: rgba(74,222,128,.12); color: var(--green); }
  .word-chip.wrong-chip   { border-color: var(--red); background: rgba(248,113,113,.1); color: var(--red); animation: shake 0.4s ease; }

  /* ── Feedback ── */
  .feedback-banner {
    border-radius: 12px; padding: 14px 18px; font-size: 14px; font-weight: 500;
    display: flex; align-items: flex-start; gap: 10px;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s; min-height: 20px;
  }
  .feedback-banner.show { opacity: 1; transform: translateY(0); }
  .feedback-banner.correct-fb { background: rgba(74,222,128,.12); border: 1px solid rgba(74,222,128,.3); color: var(--green); }
  .feedback-banner.wrong-fb   { background: rgba(248,113,113,.1);  border: 1px solid rgba(248,113,113,.3); color: var(--red); }
  .feedback-icon { font-size: 20px; flex-shrink: 0; margin-top: -1px; }
  .feedback-text { line-height: 1.5; }
  .fb-main { font-weight: 600; }
  .fb-tip  { display: block; font-size: 12px; opacity: 0.8; margin-top: 4px; font-weight: 400; color: inherit; }

  /* ── Bottom ── */
  .bottom-area { padding: 20px 20px 0; display: flex; flex-direction: column; gap: 10px; }
  .btn-primary {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    background: var(--green); color: #0a1a0f;
    font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.02em;
    transition: background var(--t), transform 0.15s, box-shadow var(--t);
    box-shadow: 0 4px 16px rgba(74,222,128,.25);
  }
  .btn-primary:hover:not(:disabled) { background: #6bef9a; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(74,222,128,.35); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
  .btn-secondary {
    width: 100%; padding: 14px; border-radius: 14px;
    border: 2px solid var(--border); background: transparent;
    color: var(--muted); font-family: 'Sora', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: border-color var(--t), color var(--t);
  }
  .btn-secondary:hover { border-color: var(--green-dim); color: var(--text); }

  /* ── Overlay ── */
  .overlay { position: fixed; inset: 0; background: rgba(10,18,28,.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: none; place-items: center; z-index: 100; padding: 24px; }
  .overlay.show { display: grid; }
  .overlay-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 36px 28px; max-width: 360px; width: 100%; text-align: center; animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes popIn { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
  .overlay-icon  { font-size: 52px; margin-bottom: 16px; }
  .overlay-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .overlay-sub   { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .overlay-actions { display: flex; flex-direction: column; gap: 10px; }

  /* ── Complete ── */
  .complete-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 36px 24px; text-align: center; gap: 20px; animation: slideIn 0.4s ease; }
  .complete-emoji { font-size: 64px; animation: bounce 0.6s ease 0.15s both; }
  @keyframes bounce { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); } }
  .complete-title { font-size: 26px; font-weight: 700; color: var(--text); }
  .complete-sub   { font-size: 14px; color: var(--muted); margin-top: -10px; }
  .xp-pill { background: rgba(74,222,128,.14); border: 1px solid rgba(74,222,128,.3); border-radius: 999px; padding: 10px 28px; font-size: 22px; font-weight: 700; color: var(--green); letter-spacing: 0.02em; }
  .complete-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
  .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 8px; text-align: center; }
  .stat-val   { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
  .complete-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .btn-ad { width: 100%; padding: 14px; border-radius: 14px; border: 2px solid rgba(251,191,36,.4); background: rgba(251,191,36,.08); color: var(--yellow); font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all var(--t); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-ad:hover { background: rgba(251,191,36,.14); border-color: var(--yellow); }
  .btn-ad:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Checkpoint Complete ── */
  .checkpoint-result { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 20px 0; }
  .score-ring { position: relative; width: 120px; height: 120px; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring-track { fill: none; stroke: var(--card2); stroke-width: 8; }
  .score-ring-fill  { fill: none; stroke: var(--green); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .score-ring-text  { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .score-pct  { font-size: 26px; font-weight: 700; color: var(--text); }
  .score-sub  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  /* ── Toast ── */
  #xp-toast { position: fixed; top: 68px; left: 50%; transform: translateX(-50%) translateY(-16px); background: var(--green); color: #0a1a0f; padding: 7px 18px; border-radius: 999px; font-weight: 700; font-size: 13px; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 200; pointer-events: none; white-space: nowrap; }
  #xp-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Loading ── */
  .loading-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .spinner { width: 40px; height: 40px; border-radius: 50%; border: 3px solid var(--border2); border-top-color: var(--green); animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--muted); }
</style>
</head>
<body>

      { hanzi:"皈依",   pinyin:"guī yī",      meaning:"To convert (faith)",   example:{ chinese:"她在旅行后皈依了佛教。",     pinyin:"Tā zài lǚxíng hòu guīyīle Fójiào.",   translation:"She converted to Buddhism after her travels." } },

      { title:"Four-character idioms (成语)", explanation:"成语 (chéngyǔ) are four-character fixed expressions with historical or literary origins. Mastering them marks native-level fluency.", pattern:"Four characters = one fixed meaning", translation:"Idiomatic expression", examples:[{ chinese:"半途而废 — to give up halfway", translation:"半途 = halfway, 而废 = abandon" },{ chinese:"一石二鸟 — kill two birds with one stone", translation:"一石 = one stone, 二鸟 = two birds" }] },
      { title:"Literary 之 as classical possessive", explanation:"In formal and literary Chinese, 之 (zhī) functions like 的 but carries a classical, elevated tone. Common in idioms and formal writing.", pattern:"Owner + 之 + Object", translation:"Owner's [object] (literary)", examples:[{ chinese:"失败是成功之母。", translation:"Failure is the mother of success." },{ chinese:"君子之交淡如水。", translation:"The friendship of gentlemen is as plain as water." }] },
    ]

};

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(arr, n) { return shuffle(arr).slice(0, n); }
function rand(arr)    { return arr[Math.floor(Math.random() * arr.length)]; }
function stripTones(s) {
  return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[āáǎà]/g,"a").replace(/[ēéěè]/g,"e").replace(/[īíǐì]/g,"i")
    .replace(/[ōóǒò]/g,"o").replace(/[ūúǔùǖǘǚǜ]/g,"u")
    .replace(/\s+/g," ").trim().toLowerCase();
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function initLesson() {
  try {
    // 1. Get userId safely — getUser() returns null user when not logged in
    try {
      const { data } = await window._supabaseClient.auth.getUser();
      _userId = (data && data.user && data.user.id) ? data.user.id : "anonymous";
    } catch(e) {
      _userId = "anonymous";
    }

    // 2. Remove old unscoped keys
    localStorage.removeItem("hearts");
    localStorage.removeItem("xp");
    localStorage.removeItem("user_level");
    localStorage.removeItem("user_lesson");

    // 3. Read user level & lesson from URL or localStorage
    _level     = parseInt(params.get("level")  || localStorage.getItem(key("user_level"))  || "1", 10);
    _lessonNum = parseInt(params.get("lesson") || localStorage.getItem(key("user_lesson")) || "1", 10);
    lessonId   = _lessonNum;

    // 4. Clamp level to available HSK data (1–6)
    _level = Math.min(Math.max(_level, 1), 6);

    // 5. Load HSK data for this level — with safety checks
    if (!HSK || !HSK[_level]) {
      stepArea.innerHTML = `<div class="loading-screen"><div class="loading-text">Error: HSK level ${_level} data not found.</div></div>`;
      return;
    }
    const hskLevel = HSK[_level];
    _hskWords   = hskLevel.words   || [];
    _hskGrammar = hskLevel.grammar || [];

    if (_hskWords.length === 0) {
      stepArea.innerHTML = `<div class="loading-screen"><div class="loading-text">Error: No words found for HSK ${_level}.</div></div>`;
      return;
    }

    // 6. Load user-scoped state
    hearts           = parseInt(localStorage.getItem(key("hearts")) ?? "5", 10);
    xp               = parseInt(localStorage.getItem(key("xp"))     || "0", 10);
    allMistakes      = JSON.parse(localStorage.getItem(key("mistakes"))          || "[]");
    completedLessons = JSON.parse(localStorage.getItem(key("completed_lessons")) || "[]");
    alreadyCompleted = completedLessons.includes(lessonId);

    // 7. Generate lesson from HSK data
    lesson = generateLesson(_lessonNum);
    steps  = lesson.steps;

    // Safety: ensure steps is a non-empty array
    if (!steps || steps.length === 0) {
      stepArea.innerHTML = `<div class="loading-screen"><div class="loading-text">Error: Could not generate lesson steps.</div></div>`;
      return;
    }

    // 8. Update UI labels
    const isCP = lesson.config && lesson.config.isCheckpoint;
    document.getElementById("lesson-tag").textContent       = isCP ? `HSK ${_level} · Checkpoint` : `HSK ${_level} · Lesson ${_lessonNum}`;
    document.getElementById("lesson-phase-tag").textContent = (lesson.config && lesson.config.phase) || "Lesson";

    if (hearts <= 0) overlay.classList.add("show");

    renderHearts();
    if (hearts > 0) renderStep(0);

  } catch(err) {
    // Catch-all: log error and show fallback so it never hangs
    console.error("initLesson failed:", err);
    stepArea.innerHTML = `<div class="loading-screen"><div class="loading-text">Something went wrong loading the lesson. <br><br><a href="dashboard.html" style="color:var(--green)">← Back to Dashboard</a></div></div>`;
  }
}

// ═══════════════════════════════════════════════════════════
// DISTRACTOR HELPERS (use full level word bank)
// ═══════════════════════════════════════════════════════════
function getDistractorMeanings(correct, count=3) {
  const pool = shuffle(_hskWords.filter(w => w.meaning !== correct)).map(w => w.meaning);
  return shuffle([correct, ...pool.slice(0, count)]);
}
function getDistractorHanzi(correct, count=3) {
  const pool = shuffle(_hskWords.filter(w => w.hanzi !== correct)).map(w => w.hanzi);
  return shuffle([correct, ...pool.slice(0, count)]);
}
function getDistractorPinyin(correct, count=3) {
  const pool = shuffle(_hskWords.filter(w => stripTones(w.pinyin) !== stripTones(correct))).map(w => w.pinyin);
  return shuffle([correct, ...pool.slice(0, count)]);
}

// ═══════════════════════════════════════════════════════════
// LESSON PLAN CONFIG
// ═══════════════════════════════════════════════════════════
function getLessonConfig(lessonNum) {
  const cycle = ((lessonNum - 1) % 6) + 1;
  if (cycle === 6) return { newWordCount:0, reviewWordCount:5, grammarCount:0, isCheckpoint:true, phase:"Checkpoint" };
  return {
    1: { newWordCount:5, reviewWordCount:0, grammarCount:1, isCheckpoint:false, phase:"New Words"   },
    2: { newWordCount:1, reviewWordCount:4, grammarCount:0, isCheckpoint:false, phase:"Review + New" },
    3: { newWordCount:2, reviewWordCount:3, grammarCount:1, isCheckpoint:false, phase:"Expand"       },
    4: { newWordCount:3, reviewWordCount:3, grammarCount:0, isCheckpoint:false, phase:"Build Up"     },
    5: { newWordCount:2, reviewWordCount:4, grammarCount:1, isCheckpoint:false, phase:"Consolidate"  },
  }[cycle];
}

// ─── Get new words for this lesson (5 per lesson, cycling through level words)
function getNewWordsForLesson(lessonNum) {
  const total = _hskWords.length;
  if (total === 0) return [];
  const start = ((lessonNum - 1) * 5) % total;
  return _hskWords.slice(start, start + 5);
}

// ─── Get review words (previously introduced words before this lesson)
function getReviewWords(lessonNum, count) {
  const total = _hskWords.length;
  if (total === 0) return [];
  const start = ((lessonNum - 1) * 5) % total;
  const pool  = start > 0 ? _hskWords.slice(0, start) : _hskWords.slice(5);
  return pick(pool, count);
}

// ─── Get grammar note for lesson
function getGrammarForLesson(lessonNum) {
  if (!_hskGrammar.length) return null;
  const idx = Math.floor((lessonNum - 1) / 3) % _hskGrammar.length;
  return _hskGrammar[idx];
}

// ─── Build lesson title from level meta or lesson number
function buildLessonTitle(lessonNum) {
  const meta = HSK[_level]?.meta;
  return meta ? `${meta.label} · Lesson ${lessonNum}` : `Lesson ${lessonNum}`;
}

// ═══════════════════════════════════════════════════════════
// EXERCISE GENERATORS
// ═══════════════════════════════════════════════════════════
function makeWordStep(word, isReview=false) {
  return { type:"word", ...word, isReview };
}

function makeMCQ_MeaningFromHanzi(word, isMini=false, isReview=false) {
  return {
    type:"multiple_choice", isMini, isReview,
    question:`What does <span class='q-word'>${word.hanzi}</span> mean?`,
    options: getDistractorMeanings(word.meaning),
    correct: word.meaning,
    tip:`${word.hanzi} (${word.pinyin}) = "${word.meaning}".`
  };
}

function makeMCQ_HanziFromMeaning(word, isMini=false, isReview=false) {
  return {
    type:"multiple_choice", isMini, chineseOptions:true, isReview,
    question:`How do you say <em style="color:var(--green);font-style:normal">"${word.meaning}"</em> in Chinese?`,
    options: getDistractorHanzi(word.hanzi),
    correct: word.hanzi,
    tip:`"${word.meaning}" in Chinese is ${word.hanzi} (${word.pinyin}).`
  };
}

function makeMCQ_PinyinFromHanzi(word, isMini=false, isReview=false) {
  return {
    type:"multiple_choice", isMini, isReview,
    question:`What is the pinyin for <span class='q-word'>${word.hanzi}</span>?`,
    options: getDistractorPinyin(word.pinyin),
    correct: word.pinyin,
    tip:`The pinyin for ${word.hanzi} is ${word.pinyin}.`
  };
}

function makeTypingPinyin(word, isMini=false, isReview=false) {
  return {
    type:"typing", isMini, isReview, subtype:"pinyin",
    prompt:`Type the <strong>pinyin</strong> for <span class='q-word'>${word.hanzi}</span> <span style="color:var(--muted);font-size:0.85em">(${word.meaning})</span>`,
    correct: stripTones(word.pinyin),
    correctDisplay: word.pinyin,
    tip:`Pinyin: ${word.pinyin}`
  };
}

function makeTypingMeaning(word, isMini=false, isReview=false) {
  return {
    type:"typing", isMini, isReview, subtype:"meaning",
    prompt:`Type the <strong>English meaning</strong> of <span class='q-word'>${word.hanzi}</span>`,
    correct: word.meaning.toLowerCase().split(" / ")[0],
    correctDisplay: word.meaning,
    tip:`Meaning: ${word.meaning}`
  };
}

function makeMatchStep(words) {
  return {
    type:"matching",
    pairs: words.map(w => ({ chinese:w.hanzi, english:w.meaning, pinyin:w.pinyin }))
  };
}

function makeSentenceMCQ(word, isReview=false) {
  const ex = word.example;
  if (!ex) return makeMCQ_MeaningFromHanzi(word, false, isReview);
  const distractors = pick(_hskWords.filter(w => w.hanzi !== word.hanzi), 3)
    .map(w => w.example?.translation || w.meaning);
  return {
    type:"sentence_mcq", isReview,
    sentence: ex.chinese,
    pinyin:   ex.pinyin,
    question: `What does this sentence mean?`,
    options:  shuffle([ex.translation, ...distractors].filter(Boolean)).slice(0, 4),
    correct:  ex.translation,
    tip:`The sentence means: "${ex.translation}"`
  };
}

function makeWordBankFill(word, isReview=false) {
  const ex = word.example;
  if (!ex) return makeMCQ_MeaningFromHanzi(word, false, isReview);
  const idx = ex.chinese.indexOf(word.hanzi);
  if (idx === -1) return makeMCQ_HanziFromMeaning(word, false, isReview);
  const before      = ex.chinese.slice(0, idx);
  const after       = ex.chinese.slice(idx + word.hanzi.length);
  const distractors = pick(_hskWords.filter(w => w.hanzi !== word.hanzi), 3).map(w => w.hanzi);
  return {
    type:"word_bank", isReview, before, after,
    hint: ex.translation,
    correct: word.hanzi,
    options: shuffle([word.hanzi, ...distractors]),
    tip:`The missing word is ${word.hanzi} (${word.pinyin}) — ${word.meaning}.`
  };
}

function randomExercise(word, isMini=false, isReview=false) {
  const types = ["mcq_meaning","mcq_hanzi","mcq_pinyin","typing_pinyin","sentence_mcq","word_bank"];
  switch(rand(types)) {
    case "mcq_meaning":   return makeMCQ_MeaningFromHanzi(word, isMini, isReview);
    case "mcq_hanzi":     return makeMCQ_HanziFromMeaning(word, isMini, isReview);
    case "mcq_pinyin":    return makeMCQ_PinyinFromHanzi(word, isMini, isReview);
    case "typing_pinyin": return makeTypingPinyin(word, isMini, isReview);
    case "sentence_mcq":  return makeSentenceMCQ(word, isReview);
    case "word_bank":     return makeWordBankFill(word, isReview);
    default:              return makeMCQ_MeaningFromHanzi(word, isMini, isReview);
  }
}

// ═══════════════════════════════════════════════════════════
// LESSON GENERATOR — driven entirely by HSK data
// ═══════════════════════════════════════════════════════════
function generateLesson(lessonNum) {
  const config      = getLessonConfig(lessonNum);
  const steps       = [];
  const lessonWords = getNewWordsForLesson(lessonNum);

  // ── CHECKPOINT LESSON
  if (config.isCheckpoint) {
    const reviewWords = getReviewWords(lessonNum, 10);
    const useWords    = reviewWords.length >= 5 ? reviewWords : shuffle(lessonWords);

    steps.push({ type:"checkpoint_intro", lessonNum, totalQ: useWords.length });

    useWords.forEach((word, i) => {
      const exTypes = [
        makeMCQ_MeaningFromHanzi(word, false, true),
        makeMCQ_HanziFromMeaning(word, false, true),
        makeMCQ_PinyinFromHanzi(word, false, true),
        makeTypingPinyin(word, false, true),
        makeSentenceMCQ(word, true),
        makeWordBankFill(word, true),
      ];
      steps.push(exTypes[i % exTypes.length]);
    });

    steps.push(makeMatchStep(shuffle(useWords).slice(0, 4)));

    return {
      title: `Checkpoint ${Math.ceil(lessonNum / 6)}`,
      words: useWords.map(w => w.hanzi),
      steps, config
    };
  }

  // ── REGULAR LESSON
  const newWords    = shuffle(lessonWords).slice(0, config.newWordCount);
  const reviewWords = config.reviewWordCount > 0 ? getReviewWords(lessonNum, config.reviewWordCount) : [];

  // 1. Introduce each new word + 2 immediate exercises
  newWords.forEach(word => {
    steps.push(makeWordStep(word, false));
    steps.push(Math.random() > 0.4
      ? makeMCQ_MeaningFromHanzi(word, true, false)
      : makeTypingPinyin(word, true, false)
    );
    steps.push(rand([
      makeMCQ_HanziFromMeaning(word, true, false),
      makeWordBankFill(word, true, false),
    ]));
  });

  // 2. Grammar note — inserted at midpoint
  if (config.grammarCount > 0) {
    const g = getGrammarForLesson(lessonNum);
    if (g) {
      const insertAt = Math.max(1, Math.floor(steps.length / 2));
      steps.splice(insertAt, 0, { type:"grammar", ...g });
    }
  }

  // 3. Review section
  if (reviewWords.length > 0) {
    steps.push({ type:"review_intro", words: reviewWords });
    reviewWords.forEach(word => {
      steps.push(makeWordStep(word, true));
      steps.push(randomExercise(word, true, true));
    });
  }

  // 4. Mixed matching round
  const matchPool = shuffle([...newWords, ...reviewWords]).slice(0, 4);
  if (matchPool.length >= 3) {
    steps.push(makeMatchStep(matchPool));
  }

  // 5. Final blast: sentence MCQ or word bank for each new word
  newWords.forEach(word => {
    steps.push(rand([makeSentenceMCQ(word), makeWordBankFill(word)]));
  });

  return {
    title: buildLessonTitle(lessonNum),
    words: [...newWords.map(w => w.hanzi), ...reviewWords.map(w => w.hanzi)],
    steps, config
  };
}

// ═══════════════════════════════════════════════════════════
// HEARTS
// ═══════════════════════════════════════════════════════════
function renderHearts() {
  heartsEl.innerHTML = "";
  for (let i = 0; i < 5; i++) {
    const h = document.createElement("span");
    h.className = "heart-icon" + (i >= hearts ? " lost" : "");
    h.textContent = "❤️";
    heartsEl.appendChild(h);
  }
}
function loseHeart() {
  hearts = Math.max(0, hearts - 1);
  localStorage.setItem(key("hearts"), hearts);
  renderHearts();
  if (hearts === 0) setTimeout(() => overlay.classList.add("show"), 400);
}
function watchAd() {
  overlay.classList.remove("show");
  hearts = 5;
  localStorage.setItem(key("hearts"), hearts);
  renderHearts();
  showToast("❤️ Hearts restored!");
  if (currentStep === 0 && !stepArea.querySelector(".step-visible")) renderStep(0);
}

// ═══════════════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════════════
function updateProgress() {
  const pct = steps.length ? ((currentStep + 1) / steps.length) * 100 : 0;
  progressBar.style.width = Math.min(pct, 100) + "%";
}

// ═══════════════════════════════════════════════════════════
// RENDER STEP
// ═══════════════════════════════════════════════════════════
function renderStep(idx) {
  answeredStep     = false;
  typingAnswered   = false;
  wordBankAnswered = false;
  matchState       = null;
  updateProgress();

  // Clear loading spinner on first step, slide-out on subsequent steps
  if (idx === 0) {
    stepArea.innerHTML = "";
  } else {
    const old = stepArea.querySelector(".step-visible");
    if (old) {
      old.classList.remove("step-visible");
      old.classList.add("step-exit");
      setTimeout(() => old.remove(), 280);
    }
  }

  const step = steps[idx];
  if (!step) return showComplete();

  const wrapper = document.createElement("div");
  wrapper.className = "step-visible";
  wrapper.style.display = "contents";

  switch (step.type) {
    case "word":             buildWordStep(wrapper, step);        break;
    case "grammar":          buildGrammarStep(wrapper, step);     break;
    case "multiple_choice":  buildMCStep(wrapper, step);          break;
    case "matching":         buildMatchStep(wrapper, step);       break;
    case "typing":           buildTypingStep(wrapper, step);      break;
    case "sentence_mcq":     buildSentenceMCQ(wrapper, step);     break;
    case "word_bank":        buildWordBank(wrapper, step);        break;
    case "checkpoint_intro": buildCheckpointIntro(wrapper, step); break;
    case "review_intro":     buildReviewIntro(wrapper, step);     break;
    default:                 buildGrammarStep(wrapper, step);     break;
  }

  stepArea.appendChild(wrapper);
  renderBottom(step, false, step.type === "typing");
}

// ═══════════════════════════════════════════════════════════
// WORD STEP
// ═══════════════════════════════════════════════════════════
function buildWordStep(wrap, step) {
  const reviewClass = step.isReview ? "review-card" : "";
  const label = step.isReview
    ? `<div class="review-badge">🔄 Review Word</div>`
    : `<div class="step-label green">New Word</div>`;
  wrap.innerHTML = `
    ${label}
    <div class="word-card ${reviewClass}">
      <div class="word-card-top">
        <div class="word-chinese">${step.hanzi}</div>
        <button class="btn-audio" id="btn-audio-word" title="Play pronunciation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
      </div>
      <div class="word-pinyin">${step.pinyin}</div>
      <div class="word-meaning"><strong>${step.meaning}</strong></div>
      ${step.example ? `
      <div class="word-example">
        <div class="example-label">Example</div>
        <div class="example-chinese">${step.example.chinese}</div>
        <div class="example-pinyin">${step.example.pinyin || ""}</div>
        <div class="example-translation">${step.example.translation}</div>
      </div>` : ""}
    </div>
  `;
  const audioBtn = wrap.querySelector("#btn-audio-word");
  if (audioBtn) {
    audioBtn.addEventListener("click", () => speakChinese(step.hanzi));
    setTimeout(() => speakChinese(step.hanzi), 300);
  }
}

// ═══════════════════════════════════════════════════════════
// GRAMMAR STEP
// ═══════════════════════════════════════════════════════════
function buildGrammarStep(wrap, step) {
  const examplesHtml = step.examples ? `
    <div class="grammar-examples">
      ${step.examples.map(e => `
        <div class="grammar-ex-item">
          <div class="grammar-ex-chinese">${e.chinese}</div>
          <div class="grammar-ex-translation">${e.translation}</div>
        </div>
      `).join("")}
    </div>` : "";
  const patternHtml = step.pattern ? `<p style="margin-top:10px"><span class="highlight">${step.pattern}</span></p>` : "";
  wrap.innerHTML = `
    <div class="step-label purple">Grammar Note</div>
    <div class="grammar-card purple-card">
      <div class="grammar-title">${step.title}</div>
      <div class="grammar-body">${step.explanation}${patternHtml}${examplesHtml}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// REVIEW INTRO
// ═══════════════════════════════════════════════════════════
function buildReviewIntro(wrap, step) {
  const wordChips = step.words.map(w =>
    `<span style="font-family:'Noto Sans SC',sans-serif;font-size:16px;color:var(--yellow)">${w.hanzi}</span>`
  ).join(", ");
  wrap.innerHTML = `

// ═══════════════════════════════════════════════════════════
// MCQ
// ═══════════════════════════════════════════════════════════
function buildMCStep(wrap, step) {
  const isChinese = !!step.chineseOptions;
  const badge = step.isReview
    ? `<div class="review-badge">🔄 Review</div>`
    : step.isMini
      ? `<div class="mini-quiz-badge">⚡ Quick Check</div>`
      : `<div class="step-label green">Exercise</div>`;
  wrap.innerHTML = `
    ${badge}
    <div class="exercise-question">${step.question}</div>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-banner" id="feedback-banner"></div>
  `;
  const grid = wrap.querySelector("#options-grid");
  step.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    if (isChinese) { btn.style.fontFamily = "'Noto Sans SC', sans-serif"; btn.style.fontSize = "17px"; }
    btn.textContent = opt;
    btn.onclick = () => handleMCAnswer(btn, opt, step, wrap);
    grid.appendChild(btn);
  });
}

function handleMCAnswer(btn, chosen, step, wrap) {
  if (answeredStep) return;
  answeredStep = true;
  const allBtns   = wrap.querySelectorAll(".option-btn");
  const isCorrect = chosen === step.correct;
  const fb        = wrap.querySelector("#feedback-banner");
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === step.correct) b.classList.add("correct");
  });
  if (!isCorrect) {
    btn.classList.add("wrong");
    loseHeart();
    logMistake(step, chosen);
    const tipHtml = step.tip ? `<span class="fb-tip">💡 ${step.tip}</span>` : "";
    fb.innerHTML = `<span class="feedback-icon">❌</span><span class="feedback-text"><span class="fb-main">Not quite! The answer is <strong>${step.correct}</strong></span>${tipHtml}</span>`;
    fb.className = "feedback-banner wrong-fb show";
  } else {
    sessionXP += 2;
    if (step.isReview) checkpointCorrect++;
    showToast("+2 XP");
    fb.innerHTML = `<span class="feedback-icon">✅</span><span class="feedback-text"><span class="fb-main">${pickPraise()}</span></span>`;
    fb.className = "feedback-banner correct-fb show";
  }
  renderBottom(step, true);
}

function handleWordBank(chip, chosen, step, wrap) {

  } else {
    chip.classList.add("correct-chip");

    showToast("+2 XP");

// ═══════════════════════════════════════════════════════════
// TYPING STEP
// ═══════════════════════════════════════════════════════════
function buildTypingStep(wrap, step) {
  const badge = step.isReview
    ? `<div class="review-badge">🔄 Review</div>`
    : step.isMini
      ? `<div class="mini-quiz-badge">⚡ Quick Check</div>`
      : `<div class="step-label green">Type It</div>`;
  const hint = step.subtype === "meaning" ? "Type the English meaning" : "Type without tone marks (e.g. ni hao)";
  wrap.innerHTML = `
    ${badge}
    <div class="exercise-question">${step.prompt}</div>
    <div class="typing-input-wrap">
      <input class="typing-input" id="typing-input" type="text" placeholder="Type your answer…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <div class="typing-hint">${hint}</div>
    </div>
    <div class="feedback-banner" id="feedback-banner"></div>
  `;
  const input = wrap.querySelector("#typing-input");
  input.addEventListener("keydown", e => { if (e.key === "Enter") submitTyping(wrap, step); });
  input.focus();
}

function submitTyping(wrap, step) {
  if (typingAnswered) return;
  const input = wrap.querySelector("#typing-input");
  const raw   = input.value.trim().toLowerCase();
  if (!raw) return;
  typingAnswered = true;
  answeredStep   = true;
  const normalise = s => s.replace(/\s+/g," ").trim().toLowerCase();
  const isCorrect = normalise(raw) === normalise(step.correct) || stripTones(raw) === stripTones(step.correct);
  const fb = wrap.querySelector("#feedback-banner");
  input.disabled = true;
  if (!isCorrect) {
    input.classList.add("wrong-input");
    loseHeart();
    logMistake(step, raw);
    const tipHtml = step.tip ? `<span class="fb-tip">💡 ${step.tip}</span>` : "";
    fb.innerHTML  = `<span class="feedback-icon">❌</span><span class="feedback-text"><span class="fb-main">The answer is <strong>${step.correctDisplay}</strong></span>${tipHtml}</span>`;
    fb.className  = "feedback-banner wrong-fb show";
  } else {
    input.classList.add("correct-input");
    sessionXP += 2;
    showToast("+2 XP");
    fb.innerHTML = `<span class="feedback-icon">✅</span><span class="feedback-text"><span class="fb-main">${pickPraise()}</span></span>`;
    fb.className = "feedback-banner correct-fb show";
  }
  renderBottom(step, true);
}

// ═══════════════════════════════════════════════════════════
// MATCHING STEP
// ═══════════════════════════════════════════════════════════
function buildMatchStep(wrap, step) {
  matchState = {
    pairs: step.pairs,
    selectedChinese: null, selectedEnglish: null,
    matched: new Set(), total: step.pairs.length
  };
  const chineseItems = shuffle(step.pairs);
  const englishItems = shuffle(step.pairs);
  wrap.innerHTML = `
    <div class="step-label green">Match the Words</div>
    <div class="exercise-question">Match each Chinese word to its meaning</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="match-col-label">Chinese</div>
      <div class="match-col-label">English</div>
    </div>
    <div class="match-grid" id="match-grid"></div>
    <div class="feedback-banner" id="feedback-banner"></div>
  `;
  const grid = wrap.querySelector("#match-grid");
  chineseItems.forEach(p => {
    const el = document.createElement("div");
    el.className  = "match-item chinese-item";
    el.dataset.key  = p.chinese; el.dataset.side = "chinese";
    el.textContent  = p.chinese;
    el.onclick = () => handleMatchClick(el, wrap, step);
    grid.appendChild(el);
  });
  englishItems.forEach(p => {
    const el = document.createElement("div");
    el.className  = "match-item";
    el.dataset.key  = p.chinese; el.dataset.side = "english";
    el.textContent  = p.english;
    el.onclick = () => handleMatchClick(el, wrap, step);
    grid.appendChild(el);
  });
}

function handleMatchClick(el, wrap, step) {
  const ms = matchState;
  if (!ms || el.classList.contains("matched") || el.classList.contains("disabled-match")) return;
  const side = el.dataset.side;
  if (el.classList.contains("selected")) {
    el.classList.remove("selected");
    if (side === "chinese") ms.selectedChinese = null;
    else ms.selectedEnglish = null;
    return;
  }
  if (side === "chinese") {
    if (ms.selectedChinese) ms.selectedChinese.classList.remove("selected");
    ms.selectedChinese = el;
  } else {
    if (ms.selectedEnglish) ms.selectedEnglish.classList.remove("selected");
    ms.selectedEnglish = el;
  }
  el.classList.add("selected");

  if (ms.selectedChinese && ms.selectedEnglish) {
    const cKey = ms.selectedChinese.dataset.key;
    const eKey = ms.selectedEnglish.dataset.key;
    const fb   = wrap.querySelector("#feedback-banner");
    if (cKey === eKey) {
      ms.selectedChinese.classList.remove("selected"); ms.selectedEnglish.classList.remove("selected");
      ms.selectedChinese.classList.add("matched");     ms.selectedEnglish.classList.add("matched");
      ms.matched.add(cKey);
      ms.selectedChinese = null; ms.selectedEnglish = null;
      if (ms.matched.size === ms.total) {
        answeredStep = true;
        sessionXP += 2; showToast("+2 XP");
        fb.innerHTML = `<span class="feedback-icon">✅</span><span class="feedback-text"><span class="fb-main">🔥 All matched! Perfect!</span></span>`;
        fb.className = "feedback-banner correct-fb show";
        renderBottom(step, true);
      }
    } else {
      loseHeart();
      logMistake({ type:"matching", correct:cKey }, ms.selectedEnglish.textContent);
      const sc = ms.selectedChinese, se = ms.selectedEnglish;
      sc.classList.remove("selected"); se.classList.remove("selected");
      sc.classList.add("wrong-shake"); se.classList.add("wrong-shake");
      setTimeout(() => { sc.classList.remove("wrong-shake"); se.classList.remove("wrong-shake"); }, 450);
      ms.selectedChinese = null; ms.selectedEnglish = null;
      fb.innerHTML = `<span class="feedback-icon">❌</span><span class="feedback-text"><span class="fb-main">Not a match — try again!</span></span>`;
      fb.className = "feedback-banner wrong-fb show";
      setTimeout(() => { fb.className = "feedback-banner"; }, 1500);
    }
  }
}

// ═══════════════════════════════════════════════════════════
// BOTTOM BUTTONS
// ═══════════════════════════════════════════════════════════
function renderBottom(step, answered=false, isTyping=false) {
  bottomArea.innerHTML = "";
  const isExercise = ["multiple_choice","matching","typing","sentence_mcq","word_bank"].includes(step.type);
  const isPassive  = ["word","grammar","checkpoint_intro","review_intro"].includes(step.type);
  const isLast     = currentStep >= steps.length - 1;

  if (isPassive || (isExercise && answered)) {
    const btn = document.createElement("button");
    btn.className = "btn-primary";
    btn.textContent = isLast ? "Finish Lesson 🎉" : "Continue →";
    btn.onclick = nextStep;
    bottomArea.appendChild(btn);
  } else if (isTyping) {
    const btn = document.createElement("button");
    btn.className   = "btn-primary";
    btn.textContent = "Check Answer";
    btn.onclick = () => {
      const wrap = stepArea.querySelector(".step-visible");
      if (wrap) submitTyping(wrap, step);
    };
    bottomArea.appendChild(btn);
  } else if (!answered) {
    const btn = document.createElement("button");
    btn.className = "btn-primary";
    btn.disabled  = true;
    btn.textContent = "Select an answer";
    bottomArea.appendChild(btn);
  }
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function nextStep() {
  currentStep++;
  if (currentStep >= steps.length) showComplete();
  else renderStep(currentStep);
}

// ═══════════════════════════════════════════════════════════
// MISTAKES
// ═══════════════════════════════════════════════════════════
function logMistake(step, userAnswer) {
  const entry = { sessionId, lessonId, type:step.type||"mcq", correct:step.correct, userAnswer, timestamp:Date.now() };
  sessionMistakes.push(entry);
  allMistakes.push(entry);
  localStorage.setItem(key("mistakes"), JSON.stringify(allMistakes));
}

// ═══════════════════════════════════════════════════════════
// COMPLETE SCREEN
// ═══════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
// LEADERBOARD SYNC
// ═══════════════════════════════════════════════════════════
async function saveXP(xpEarned) {
  try {
    // Use window._supabaseClient directly — avoids any scoping issues
    const sb = window._supabaseClient;
    if (!sb) { alert("saveXP: CRASH — Supabase not initialized"); return; }

    // 1. Get current user via session
    const { data: sessionData } = await sb.auth.getSession();
    const user = sessionData?.session?.user;
    if (!user) {
      alert("saveXP: NO USER — not logged in");
      return;
    }
    alert("saveXP: user=" + user.id + " xp=" + xpEarned);

    // 2. Try INSERT first (new user)
    const { error: insertError } = await sb
      .from("leaderboard")
      .insert({ user_id: user.id, xp: xpEarned });

    if (insertError) {
      // Row exists — fetch current XP and UPDATE
      alert("saveXP: insert failed (" + insertError.message + "), trying update...");

      const { data: existing } = await sb
        .from("leaderboard")
        .select("xp")
        .eq("user_id", user.id)
        .maybeSingle();

      const currentXP = existing?.xp || 0;
      const newXP = currentXP + xpEarned;

      const { error: updateError } = await sb
        .from("leaderboard")
        .update({ xp: newXP })
        .eq("user_id", user.id);

      if (updateError) {
        alert("saveXP: UPDATE failed: " + updateError.message);
      } else {
        alert("saveXP: UPDATE SUCCESS — XP=" + newXP);
      }
    } else {
      alert("saveXP: INSERT SUCCESS — XP=" + xpEarned);
    }
  } catch(e) {
    alert("saveXP: CRASH — " + e.message);
  }
}

function showComplete() {
  progressBar.style.width = "100%";
  stepArea.innerHTML  = "";
  bottomArea.innerHTML = "";

  let earnedXP = sessionXP;
  if (!alreadyCompleted) {
    earnedXP += 10;
    xp += earnedXP;
    localStorage.setItem(key("completed_lessons"), JSON.stringify([...completedLessons, lessonId]));
  } else {
    xp += sessionXP;
  }
  localStorage.setItem(key("xp"), xp);
  saveXP(earnedXP); // Save XP to Supabase leaderboard

  // ── Advance lesson counter
  const savedLesson = parseInt(localStorage.getItem(key("user_lesson")) || "1", 10);
  if (lessonId >= savedLesson) {
    localStorage.setItem(key("user_lesson"), String(lessonId + 1));
  }

  // ── Daily challenge count (only once per unique lesson)
  if (!alreadyCompleted) {
    const today    = new Date().toDateString();
    const lastDate = localStorage.getItem(key("daily_date"));
    let   dailyCount = Number(localStorage.getItem(key("daily_done"))) || 0;
    if (lastDate !== today) {
      dailyCount = 0;
      localStorage.setItem(key("daily_date"), today);
    }
    dailyCount += 1;
    localStorage.setItem(key("daily_done"), dailyCount);
  }

  // ── Streak system
  const streakToday = new Date().toDateString();
  const yesterday   = new Date(Date.now() - 864e5).toDateString();
  const lastStreakDay = localStorage.getItem(key("streak_day"));
  let   streak = Number(localStorage.getItem(key("streak"))) || 0;

  if (lastStreakDay === streakToday) {
    // Already counted today — do nothing
  } else if (lastStreakDay === yesterday) {
    streak += 1;
    localStorage.setItem(key("streak"),     String(streak));
    localStorage.setItem(key("streak_day"), streakToday);
  } else {
    streak = 1;
    localStorage.setItem(key("streak"),     "1");
    localStorage.setItem(key("streak_day"), streakToday);
  }

  const accuracy     = calculateAccuracy();
  const mistakeCount = sessionMistakes.length;
  const wordsLearned = lesson.words.length;

  const isCheckpoint = lesson.config.isCheckpoint;
  const cpScore = isCheckpoint && checkpointTotal > 0
    ? Math.round((checkpointCorrect / checkpointTotal) * 100)
    : null;

  let ringHtml = "";
  if (cpScore !== null) {
    const circ   = 2 * Math.PI * 52;
    const offset = circ * (1 - cpScore / 100);
    ringHtml = `
      <div class="checkpoint-result">
        <div class="score-ring">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle class="score-ring-track" cx="60" cy="60" r="52"/>
            <circle class="score-ring-fill"  cx="60" cy="60" r="52"
              stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
          </svg>
          <div class="score-ring-text">
            <div class="score-pct">${cpScore}%</div>
            <div class="score-sub">Score</div>
          </div>
        </div>
        <div style="font-size:14px;color:var(--muted)">Checkpoint ${Math.ceil(lessonId/6)} complete!</div>
      </div>`;
  }

  stepArea.innerHTML = `
    <div class="complete-screen">
      <div class="complete-emoji">${isCheckpoint ? "🏆" : "🎉"}</div>
      <div class="complete-title">${isCheckpoint ? "Checkpoint Passed!" : "Lesson Complete!"}</div>
      <div class="complete-sub">${lesson.title}</div>
      <div style="font-size:13px;color:var(--yellow);font-weight:700;letter-spacing:.02em">🔥 ${streak} day streak</div>
      ${ringHtml}
      <div class="xp-pill" id="xp-pill">+${earnedXP} XP</div>
      <div class="complete-stats">
        <div class="stat-box"><div class="stat-val">${wordsLearned}</div><div class="stat-label">Words</div></div>
        <div class="stat-box"><div class="stat-val">${mistakeCount}</div><div class="stat-label">Mistakes</div></div>
        <div class="stat-box"><div class="stat-val">${accuracy}%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat-box"><div class="stat-val">${hearts}<span style="font-size:12px"> ❤️</span></div><div class="stat-label">Hearts</div></div>
      </div>
      <div class="complete-actions" style="width:100%">
        <button class="btn-primary" id="btn-continue-lesson">Continue</button>
        <button class="btn-ad" id="btn-double-xp">🎥 Watch Ad for +10 Bonus XP</button>
      </div>
    </div>
  `;
  document.getElementById("btn-continue-lesson").onclick = () => { window.location.href = "dashboard.html"; };
  document.getElementById("btn-double-xp").onclick = doubleXP;
}

function doubleXP() {
  const btn = document.getElementById("btn-double-xp");
  if (!btn || btn.disabled) return;
  btn.disabled    = true;
  btn.textContent = "🎥 Loading ad...";
  setTimeout(() => {
    xp += 10;
    localStorage.setItem(key("xp"), xp);
    saveXP(10); // Save bonus XP to leaderboard
    const pill = document.getElementById("xp-pill");
    if (pill) { const cur = parseInt(pill.textContent.replace(/\D/g,"")) || 0; pill.textContent = `+${cur + 10} XP 🔥`; }
    btn.textContent = "✅ Bonus XP Claimed!";
    showToast("+10 Bonus XP 🔥");
  }, 1200);
}

// ═══════════════════════════════════════════════════════════
// ACCURACY
// ═══════════════════════════════════════════════════════════
function calculateAccuracy() {
  const exerciseSteps = steps.filter(s => ["multiple_choice","matching","typing","sentence_mcq","word_bank"].includes(s.type));
  if (!exerciseSteps.length) return 100;
  const wrongs   = sessionMistakes.length;
  const attempts = exerciseSteps.length + wrongs;
  return Math.round((exerciseSteps.length / attempts) * 100);
}

// ═══════════════════════════════════════════════════════════
// PRAISE + TOAST
// ═══════════════════════════════════════════════════════════
const PRAISES = ["🔥 Perfect!","Nice! You got it!","Excellent!","🎯 Spot on!","Keep it up!","Great memory!","You've got this!","💪 Nailed it!","Well done!","🌟 Outstanding!"];
let lastPraiseIdx = -1;
function pickPraise() {
  let idx;
  do { idx = Math.floor(Math.random() * PRAISES.length); } while (idx === lastPraiseIdx);
  lastPraiseIdx = idx;
  return PRAISES[idx];
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById("xp-toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

// ═══════════════════════════════════════════════════════════
// SPEECH — Web Speech API (Chinese TTS)
// ═══════════════════════════════════════════════════════════
function speakChinese(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter  = new SpeechSynthesisUtterance(text);
  utter.lang   = "zh-CN";
  utter.rate   = 0.85;
  utter.pitch  = 1;
  const voices  = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v =>
    v.lang === "zh-CN" || v.lang === "zh_CN" ||
    v.lang.startsWith("zh") ||
    v.name.toLowerCase().includes("chinese") ||
    v.name.toLowerCase().includes("mandarin")
  );
  if (zhVoice) utter.voice = zhVoice;
  window.speechSynthesis.speak(utter);
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener("voiceschanged", () => window.speechSynthesis.getVoices());
}
</script>
</body>
