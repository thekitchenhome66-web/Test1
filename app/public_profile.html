<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080f0b;--bg2:#0c1610;--card:#111e16;--card2:#162218;
  --border:rgba(74,222,128,.12);--border2:rgba(74,222,128,.25);
  --green:#3ddb7a;--green2:#2ab862;--green-muted:rgba(61,219,122,.10);
  --gold:#f5c842;--gold-soft:rgba(245,200,66,.10);
  --blue:#60a5fa;--rose:#f87171;--purple:#a78bfa;--orange:#fb923c;
  --ink:#e8f2ee;--ink2:#9ab8aa;--ink3:#4a6b5a;
  --nav-h:68px;--t:.22s cubic-bezier(.4,0,.2,1);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;padding-bottom:calc(var(--nav-h)+16px)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(74,222,128,.2);border-radius:3px}

/* HEADER */
.header{position:sticky;top:0;z-index:60;height:64px;background:rgba(8,15,11,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.btn-back{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:6px 14px 6px 10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:var(--ink2);cursor:pointer;text-decoration:none;transition:all var(--t)}
.btn-back:hover{background:var(--card2);border-color:var(--border2);color:var(--ink)}
.header-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.header-spacer{width:80px}

/* PAGE */
.page{max-width:520px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}

/* SECTION LABEL */
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);padding:0 2px}

/* HERO CARD */
.hero-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px 18px;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(74,222,128,.06),transparent 65%);pointer-events:none}
.hero-top{display:flex;align-items:center;gap:15px;margin-bottom:16px}
.hero-av{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-size:24px;font-weight:900;flex-shrink:0;background:linear-gradient(135deg,rgba(74,222,128,.2),rgba(74,222,128,.06));border:2.5px solid rgba(74,222,128,.35);color:var(--green)}
.hero-info{flex:1;min-width:0}
.hero-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-level{display:inline-flex;align-items:center;gap:4px;background:var(--green-muted);border:1px solid rgba(74,222,128,.18);border-radius:999px;padding:3px 10px;font-size:10px;font-weight:800;color:var(--green);margin-top:6px;letter-spacing:.04em}
.hero-rank{font-size:12px;color:var(--ink3);margin-top:4px}
.hero-rank span{color:var(--gold);font-weight:700}

/* FOLLOW BUTTON */
.btn-follow-hero{width:100%;padding:13px;border-radius:13px;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all var(--t);letter-spacing:.02em}
.btn-follow-hero.follow{background:linear-gradient(135deg,var(--green),var(--green2));color:#080f0b;box-shadow:0 4px 16px rgba(61,219,122,.25)}
.btn-follow-hero.follow:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(61,219,122,.35)}
.btn-follow-hero.following{background:var(--card2);border:1.5px solid var(--border2);color:var(--ink2)}
.btn-follow-hero.following:hover{border-color:var(--rose);color:var(--rose)}
.btn-follow-hero:disabled{opacity:.55;cursor:not-allowed;transform:none}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 10px;display:flex;flex-direction:column;gap:5px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;inset:0;pointer-events:none}
.stat-card.xp::before{background:linear-gradient(135deg,rgba(74,222,128,.07),transparent)}
.stat-card.streak::before{background:linear-gradient(135deg,rgba(245,200,66,.07),transparent)}
.stat-card.lessons::before{background:linear-gradient(135deg,rgba(167,139,250,.07),transparent)}
.stat-icon{font-size:16px;line-height:1}
.stat-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;line-height:1}
.stat-card.xp .stat-val{color:var(--green)}
.stat-card.streak .stat-val{color:var(--gold)}
.stat-card.lessons .stat-val{color:var(--purple)}
.stat-lbl{font-size:9px;font-weight:700;color:var(--ink3)}

/* HSK PROGRESS */
.hsk-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px}
.hsk-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hsk-title{font-size:12px;font-weight:700;color:var(--ink)}
.hsk-pct{font-size:12px;font-weight:800;color:var(--green)}
.hsk-bars{display:flex;flex-direction:column;gap:7px}
.hsk-row{display:flex;align-items:center;gap:8px}
.hsk-name{font-size:9px;font-weight:700;color:var(--ink3);width:38px;flex-shrink:0}
.hsk-track{flex:1;height:5px;background:var(--border);border-radius:999px;overflow:hidden}
.hsk-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green2),var(--green));transition:width .8s cubic-bezier(.4,0,.2,1)}
.hsk-num{font-size:9px;font-weight:700;color:var(--ink2);width:18px;text-align:right;flex-shrink:0}

/* BADGES */
.badges-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.badge-wrap{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative}
.badge-wrap.earned{background:var(--card2);border:1.5px solid var(--border2)}
.badge-wrap.locked{background:var(--bg2);border:1.5px dashed var(--border);opacity:.3;filter:grayscale(1)}
.badge-lock{position:absolute;bottom:1px;right:1px;font-size:8px}
.badge-name{font-size:8px;font-weight:700;color:var(--ink3);text-align:center;line-height:1.3}
.badge-name.earned{color:var(--ink2)}

/* XP BATTLE */
.battle-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 16px;position:relative;overflow:hidden}
.battle-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(96,165,250,.05),rgba(248,113,113,.05));pointer-events:none}
.battle-title{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-align:center;margin-bottom:14px}
.battle-players{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.battle-player{display:flex;flex-direction:column;align-items:center;gap:3px;max-width:120px}
.bp-name{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;text-align:center}
.bp-xp{font-size:10px;font-weight:700}
.battle-player.me .bp-name{color:var(--blue)}
.battle-player.me .bp-xp{color:var(--blue)}
.battle-player.them .bp-name{color:var(--rose)}
.battle-player.them .bp-xp{color:var(--rose)}
.battle-vs{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink3);flex-shrink:0}
.battle-bar{height:18px;border-radius:999px;overflow:hidden;display:flex;background:var(--border)}
.bb-blue{height:100%;background:linear-gradient(90deg,#3b82f6,var(--blue));border-radius:999px 0 0 999px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;min-width:18px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.bb-red{height:100%;background:linear-gradient(90deg,var(--rose),#ef4444);border-radius:0 999px 999px 0;display:flex;align-items:center;padding-left:5px;min-width:18px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.bb-pct{font-size:8px;font-weight:900;color:#fff}
.battle-result{text-align:center;margin-top:9px;font-size:11px;font-weight:700}
.battle-result.winning{color:var(--green)}
.battle-result.losing{color:var(--rose)}
.battle-result.tied{color:var(--gold)}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(8,15,11,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 6px;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:8px 4px;cursor:pointer;text-decoration:none;border-radius:12px;transition:background var(--t);-webkit-tap-highlight-color:transparent}
.nav-item:hover{background:rgba(255,255,255,.04)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase}
.nav-item.active .nav-label{color:var(--green)}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 4px var(--green))}

/* LOADING */
.loading-screen{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--green);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--ink3);font-weight:600}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border2);border-radius:999px;padding:9px 18px;font-size:12px;font-weight:700;color:var(--ink);opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<header class="header">
  <a class="btn-back" id="btn-back" href="/app/leaderboard.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
  <div class="header-name" id="header-name">Profile</div>
  <div class="header-spacer"></div>
</header>

<div class="page" id="page">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Loading profile…</div>
  </div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="/app/dashboard.html"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
  <a class="nav-item" href="/app/practice.html"><span class="nav-icon">⚡</span><span class="nav-label">Practice</span></a>
  <a class="nav-item" href="/app/leaderboard.html"><span class="nav-icon">🏆</span><span class="nav-label">Ranks</span></a>
  <a class="nav-item" href="/app/profile.html"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
</nav>

<div class="toast" id="toast"></div>

<script>
const sb      = window._sb;
const params  = new URLSearchParams(location.search);
const targetUid = params.get('uid');
const backUrl   = params.get('from') || '/app/leaderboard.html';

document.getElementById('btn-back').href = backUrl;

let _myUid     = null;
let _myXP      = 0;
let _myName    = 'You';
let _isFollowing = false;

let _ttTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_ttTimer); _ttTimer = setTimeout(()=>t.classList.remove('show'), 2000);
}

const BADGES = [
  { icon:'🎓', name:'First Step',   check: s => s.lessons >= 1 },
  { icon:'🔥', name:'On Fire',      check: s => s.streak >= 3 },
  { icon:'⚡', name:'Unstoppable',  check: s => s.streak >= 7 },
  { icon:'💯', name:'Century',      check: s => s.xp >= 100 },
  { icon:'🏅', name:'Gold Rush',    check: s => s.xp >= 500 },
  { icon:'📚', name:'Bookworm',     check: s => s.lessons >= 10 },
  { icon:'🎯', name:'Dedicated',    check: s => s.lessons >= 30 },
  { icon:'🏆', name:'Podium',       check: s => s.rank > 0 && s.rank <= 3 },
  { icon:'🀄', name:'HSK 2',        check: s => s.level >= 2 },
  { icon:'🌟', name:'Intermediate', check: s => s.level >= 3 },
  { icon:'💎', name:'Perfectionist',check: s => false },
  { icon:'👑', name:'Champion',     check: s => s.streak >= 30 },
];

function safeInitials(name, rank) {
  if (!name) return '?';
  if (/[\u4e00-\u9fff]/.test(name)) return rank ? '#'+rank : '?';
  return name.slice(0,2).toUpperCase() || '?';
}

function renderPage(target, rank, allUsers) {
  const page = document.getElementById('page');
  page.innerHTML = '';

  const name    = target.username || ('Learner ' + target.user_id.slice(0,6).toUpperCase());
  const xp      = target.xp || 0;
  const level   = target.hsk_level || 1;
  const lessons = Math.max(0, Math.floor(xp / 10));
  const streak  = 0; // not public — private data

  const lvlNames = ['','HSK 1 · Beginner','HSK 2 · Elementary','HSK 3 · Intermediate','HSK 4 · Upper-Int.','HSK 5 · Advanced','HSK 6 · Mastery'];

  document.getElementById('header-name').textContent = name;

  // ── HERO CARD
  const hero = document.createElement('div');
  hero.className = 'hero-card';
  hero.style.animation = 'fadeUp .35s ease both';

  const heroTop = document.createElement('div');
  heroTop.className = 'hero-top';
  const av = document.createElement('div');
  av.className = 'hero-av';
  av.textContent = safeInitials(name, rank);
  const info = document.createElement('div');
  info.className = 'hero-info';
  info.innerHTML =
    '<div class="hero-name">' + name + '</div>' +
    '<div class="hero-level">' + (lvlNames[level]||'HSK 1 · Beginner') + '</div>' +
    '<div class="hero-rank">Global Rank: <span>' + (rank?'#'+rank:'Unranked') + '</span></div>';
  heroTop.appendChild(av);
  heroTop.appendChild(info);
  hero.appendChild(heroTop);

  // Follow button
  const followBtn = document.createElement('button');
  followBtn.id = 'btn-follow';
  followBtn.className = 'btn-follow-hero ' + (_isFollowing?'following':'follow');
  followBtn.textContent = _isFollowing ? '✓ Following' : '+ Follow';
  followBtn.addEventListener('click', toggleFollow);
  hero.appendChild(followBtn);
  page.appendChild(hero);

  // ── STATS
  const sLbl = document.createElement('div');
  sLbl.className = 'sec-lbl'; sLbl.textContent = 'Stats';
  sLbl.style.animation = 'fadeUp .35s ease .05s both';
  page.appendChild(sLbl);

  const grid = document.createElement('div');
  grid.className = 'stats-grid';
  grid.style.animation = 'fadeUp .35s ease .08s both';
  [
    { cls:'xp',      icon:'⚡', val:xp,      lbl:'Total XP' },
    { cls:'streak',  icon:'🔥', val:'—',      lbl:'Streak' },
    { cls:'lessons', icon:'📖', val:lessons,  lbl:'Lessons' },
  ].forEach(s => {
    const c = document.createElement('div');
    c.className = 'stat-card '+s.cls;
    c.innerHTML = '<div class="stat-icon">'+s.icon+'</div><div class="stat-val">'+s.val+'</div><div class="stat-lbl">'+s.lbl+'</div>';
    grid.appendChild(c);
  });
  page.appendChild(grid);

  // ── HSK PROGRESS
  const pLbl = document.createElement('div');
  pLbl.className = 'sec-lbl'; pLbl.textContent = 'HSK Progress';
  page.appendChild(pLbl);

  const TOTAL = 30;
  const hskCard = document.createElement('div');
  hskCard.className = 'hsk-card';
  hskCard.style.animation = 'fadeUp .35s ease .1s both';
  const hskLevels = [1,2,3,4,5,6].map(l => ({
    name:'HSK '+l,
    done: level > l ? TOTAL : level===l ? Math.min(lessons, TOTAL) : 0
  }));
  const totalDone = hskLevels.reduce((a,b)=>a+b.done,0);
  const pct = Math.round((totalDone/(TOTAL*6))*100);

  hskCard.innerHTML = '<div class="hsk-top"><div class="hsk-title">Overall Completion</div><div class="hsk-pct">'+pct+'%</div></div>';
  const barsWrap = document.createElement('div');
  barsWrap.className = 'hsk-bars';
  hskLevels.forEach(l => {
    const p = Math.round((l.done/TOTAL)*100);
    const row = document.createElement('div');
    row.className = 'hsk-row';
    row.innerHTML =
      '<div class="hsk-name">'+l.name+'</div>' +
      '<div class="hsk-track"><div class="hsk-fill" style="width:'+p+'%"></div></div>' +
      '<div class="hsk-num">'+l.done+'</div>';
    barsWrap.appendChild(row);
  });
  hskCard.appendChild(barsWrap);
  page.appendChild(hskCard);

  // ── BADGES
  const bLbl = document.createElement('div');
  bLbl.className = 'sec-lbl'; bLbl.textContent = 'Badges';
  page.appendChild(bLbl);

  const stats = { xp, streak:0, lessons, level, rank:rank||0 };
  const bgrid = document.createElement('div');
  bgrid.className = 'badges-grid';
  bgrid.style.animation = 'fadeUp .35s ease .12s both';
  BADGES.forEach(b => {
    const earned = b.check(stats);
    const item = document.createElement('div');
    item.className = 'badge-item';
    const wrap = document.createElement('div');
    wrap.className = 'badge-wrap '+(earned?'earned':'locked');
    wrap.textContent = b.icon;
    if (!earned) { const lk=document.createElement('span'); lk.className='badge-lock'; lk.textContent='🔒'; wrap.appendChild(lk); }
    const nm = document.createElement('div');
    nm.className = 'badge-name '+(earned?'earned':'');
    nm.textContent = b.name;
    item.appendChild(wrap); item.appendChild(nm);
    bgrid.appendChild(item);
  });
  page.appendChild(bgrid);

  // ── XP BATTLE BAR (only when viewing someone else and we have our own XP)
  if (_myUid && _myUid !== target.user_id && _myXP > 0 || xp > 0) {
    const btLbl = document.createElement('div');
    btLbl.className = 'sec-lbl'; btLbl.textContent = 'XP Battle';
    page.appendChild(btLbl);

    const total   = (_myXP + xp) || 1;
    const myPct   = Math.round((_myXP / total) * 100);
    const thPct   = 100 - myPct;
    const myWins  = _myXP > xp;
    const tied    = _myXP === xp;
    const diff    = Math.abs(_myXP - xp);
    const msg     = tied
      ? '⚖️ Tied — make your move!'
      : myWins
        ? '🔥 You lead by ' + diff + ' XP!'
        : '😤 ' + name + ' leads by ' + diff + ' XP — grind!';
    const cls = tied?'tied':myWins?'winning':'losing';

    const bc = document.createElement('div');
    bc.className = 'battle-card';
    bc.style.animation = 'fadeUp .4s ease .14s both';
    bc.innerHTML =
      '<div class="battle-title">⚔️ You vs ' + name + '</div>' +
      '<div class="battle-players">' +
        '<div class="battle-player me"><div class="bp-name">' + _myName + '</div><div class="bp-xp">⚡ ' + _myXP + ' XP</div></div>' +
        '<div class="battle-vs">VS</div>' +
        '<div class="battle-player them"><div class="bp-name">' + name + '</div><div class="bp-xp">⚡ ' + xp + ' XP</div></div>' +
      '</div>' +
      '<div class="battle-bar">' +
        '<div class="bb-blue" style="width:' + myPct + '%">' + (myPct>=12?'<span class="bb-pct">'+myPct+'%</span>':'') + '</div>' +
        '<div class="bb-red"  style="width:' + thPct + '%">' + (thPct>=12?'<span class="bb-pct">'+thPct+'%</span>':'') + '</div>' +
      '</div>' +
      '<div class="battle-result ' + cls + '">' + msg + '</div>';
    page.appendChild(bc);
  }
}

async function toggleFollow() {
  if (!_myUid || !targetUid) return;
  const btn = document.getElementById('btn-follow');
  btn.disabled = true;
  try {
    if (_isFollowing) {
      await sb.from('follows').delete().eq('follower_id',_myUid).eq('following_id',targetUid);
      _isFollowing = false;
      btn.className = 'btn-follow-hero follow';
      btn.textContent = '+ Follow';
      showToast('Unfollowed');
    } else {
      await sb.from('follows').insert({follower_id:_myUid,following_id:targetUid});
      _isFollowing = true;
      btn.className = 'btn-follow-hero following';
      btn.textContent = '✓ Following';
      showToast('✅ Following!');
    }
  } catch(e) { showToast('Error — try again'); }
  btn.disabled = false;
}

async function init() {
  if (!targetUid) {
    document.getElementById('page').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--rose);font-size:14px">No user specified.<br/><a href="/app/leaderboard.html" style="color:var(--green)">← Back</a></div>';
    return;
  }

  try {
    // Get current user
    const {data:sess} = await sb.auth.getSession();
    const me = sess?.session?.user;
    if (me) {
      _myUid  = me.id;
      // If viewing own profile — redirect
      if (_myUid === targetUid) { window.location.replace('/app/profile.html'); return; }
      const {data:myRow} = await sb.from('leaderboard').select('xp,username').eq('user_id',_myUid).maybeSingle();
      _myXP   = myRow?.xp || Number(localStorage.getItem('xp_'+_myUid)||0);
      _myName = myRow?.username
        || localStorage.getItem('username_'+_myUid)
        || me.email?.split('@')[0]
        || 'You';
    }

    // Get target user data
    const {data:target} = await sb.from('leaderboard').select('user_id,xp,username,hsk_level').eq('user_id',targetUid).maybeSingle();
    if (!target) {
      document.getElementById('page').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--rose);font-size:14px">User not found.<br/><a href="/app/leaderboard.html" style="color:var(--green)">← Back</a></div>';
      return;
    }

    // Get rank
    const {data:allUsers} = await sb.from('leaderboard').select('user_id,xp').order('xp',{ascending:false});
    const rank = allUsers ? allUsers.findIndex(u=>u.user_id===targetUid)+1 : 0;

    // Check if following
    if (_myUid) {
      const {data:followRow} = await sb.from('follows').select('follower_id').eq('follower_id',_myUid).eq('following_id',targetUid).maybeSingle();
      _isFollowing = !!followRow;
    }

    renderPage(target, rank, allUsers||[]);

  } catch(e) {
    console.error('Public profile error:', e);
    document.getElementById('page').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--rose);font-size:14px">Error loading profile.<br/><a href="/app/leaderboard.html" style="color:var(--green)">← Back</a></div>';
  }
}

init();
</script>
</body>
</html>
