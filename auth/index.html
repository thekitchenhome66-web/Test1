<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maobai — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            green: { DEFAULT: '#3ecf6e', dark: '#2db85a', light: '#e8f9ef', glow: 'rgba(62,207,110,0.18)' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          borderRadius: { xl2: '20px', xl3: '24px' }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes float  { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-12px); } }
    @keyframes spin   { to { transform:rotate(360deg); } }
    .animate-fade-up  { animation: fadeUp .45s cubic-bezier(.34,1.2,.64,1) both; }
    .animate-float    { animation: float 6s ease-in-out infinite; }
    .spinner          { animation: spin .7s linear infinite; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 40px #f7fdf9 inset !important; }
    .tab-active { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.08); color:#1a2e1e; }
    .tab-inactive { background:transparent; color:#6b8f77; }
    .tab-active::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:20px; height:2.5px; background:#3ecf6e; border-radius:2px; }
  </style>
</head>
<body class="min-h-dvh bg-white flex flex-col items-center justify-center px-4 py-10 relative overflow-hidden">

  <!-- Background glow -->
  <div class="pointer-events-none fixed inset-0 z-0">
    <div class="absolute -top-20 -right-16 w-64 h-64 rounded-full bg-green-light opacity-60 blur-3xl animate-float"></div>
    <div class="absolute bottom-10 -left-12 w-48 h-48 rounded-full bg-green-light opacity-40 blur-3xl animate-float" style="animation-delay:-3s"></div>
    <div class="absolute inset-0" style="background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(62,207,110,.10) 0%,transparent 70%)"></div>
  </div>

  <!-- Card -->
  <main class="relative z-10 w-full max-w-md bg-white border border-[#d8ede1] rounded-[24px] shadow-[0_16px_48px_rgba(62,207,110,.12),0_4px_16px_rgba(0,0,0,.07)] px-8 py-10 animate-fade-up">

    <!-- Logo -->
    <div class="flex items-center gap-3 mb-7">
      <div class="w-11 h-11 rounded-[14px] bg-green-light border border-[#d8ede1] flex items-center justify-center text-2xl select-none">🐼</div>
      <span class="font-extrabold text-2xl tracking-tight text-[#1a2e1e]">Mao<span class="text-[#3ecf6e]">bai</span></span>
    </div>

    <!-- Heading -->
    <h1 id="heading" class="font-bold text-[22px] text-[#1a2e1e] mb-1 tracking-tight"></h1>
    <p  id="subheading" class="text-sm text-[#6b8f77] mb-6 leading-relaxed"></p>

    <!-- Tabs -->
    <div class="flex bg-[#f7fdf9] border border-[#d8ede1] rounded-xl p-1 gap-1 mb-7">
      <button id="tab-signup" onclick="switchMode('signup')" class="relative flex-1 h-9 rounded-[10px] text-sm font-bold transition-all duration-200">Sign Up</button>
      <button id="tab-login"  onclick="switchMode('login')"  class="relative flex-1 h-9 rounded-[10px] text-sm font-bold transition-all duration-200">Log In</button>
    </div>

    <!-- Form -->
    <form id="auth-form" novalidate class="flex flex-col gap-4">

      <!-- Email -->
      <div class="flex flex-col gap-1.5">
        <label for="email" class="text-xs font-semibold text-[#6b8f77] tracking-wide uppercase">Email</label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-[#9ab8a4] text-base pointer-events-none">✉</span>
          <input
            id="email" type="email" name="email" autocomplete="email" required
            placeholder="you@example.com"
            class="w-full h-12 pl-10 pr-4 bg-[#f7fdf9] border border-[#d8ede1] rounded-xl text-[15px] text-[#1a2e1e] placeholder-[#9ab8a4] outline-none transition-all duration-200 focus:border-[#3ecf6e] focus:bg-white focus:shadow-[0_0_0_4px_rgba(62,207,110,.14)]"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="flex flex-col gap-1.5">
        <label for="password" class="text-xs font-semibold text-[#6b8f77] tracking-wide uppercase">Password</label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-[#9ab8a4] text-base pointer-events-none">🔒</span>
          <input
            id="password" type="password" name="password" required minlength="6"
            placeholder="Min. 6 characters"
            class="w-full h-12 pl-10 pr-11 bg-[#f7fdf9] border border-[#d8ede1] rounded-xl text-[15px] text-[#1a2e1e] placeholder-[#9ab8a4] outline-none transition-all duration-200 focus:border-[#3ecf6e] focus:bg-white focus:shadow-[0_0_0_4px_rgba(62,207,110,.14)]"
          />
          <button type="button" id="toggle-pw" onclick="togglePassword()" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-[#9ab8a4] hover:text-[#6b8f77] transition-colors text-base">👁</button>
        </div>
      </div>

      <!-- Message -->
      <div id="msg-box" class="hidden rounded-xl px-4 py-3 text-sm font-medium leading-snug flex items-start gap-2"></div>

      <!-- Submit -->
      <button
        type="submit" id="btn-submit"
        class="relative h-13 mt-1 rounded-xl font-bold text-base text-white transition-all duration-200 overflow-hidden disabled:opacity-70 disabled:cursor-not-allowed"
        style="height:52px;background:linear-gradient(135deg,#3ecf6e 0%,#2db85a 100%);"
        onmouseover="if(!this.disabled)this.style.transform='translateY(-1px)';this.style.boxShadow='0 8px 24px rgba(62,207,110,.40)'"
        onmouseout="this.style.transform='';this.style.boxShadow=''"
        onmousedown="this.style.transform='translateY(0)'"
      >
        <span id="btn-label" class="transition-opacity duration-150"></span>
        <!-- Shimmer -->
        <span class="absolute inset-0 pointer-events-none" style="background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%)"></span>
        <!-- Spinner -->
        <svg id="btn-spinner" class="spinner hidden absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-5 h-5" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,.35)" stroke-width="2.5"/>
          <path d="M12 2a10 10 0 0 1 10 10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>

    </form>

    <!-- Footnote -->
    <p id="footnote" class="text-center text-xs text-[#9ab8a4] mt-5 leading-relaxed"></p>

  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      'https://cuiznbvvlqtwcoocehnd.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1aXpuYnZ2bHF0d2Nvb2NlaG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzI0NTUsImV4cCI6MjA4OTI0ODQ1NX0.QXAjvDdvih1ue1W8BaoqBfBr_fUJb9W5FYFZSC_JI8w'
    );

    const DASHBOARD = '/app/dashboard.html';

    // ── DOM refs ────────────────────────────────────────────
    const emailEl    = document.getElementById('email');
    const pwEl       = document.getElementById('password');
    const form       = document.getElementById('auth-form');
    const btnSubmit  = document.getElementById('btn-submit');
    const btnLabel   = document.getElementById('btn-label');
    const btnSpinner = document.getElementById('btn-spinner');
    const msgBox     = document.getElementById('msg-box');
    const tabSignup  = document.getElementById('tab-signup');
    const tabLogin   = document.getElementById('tab-login');
    const heading    = document.getElementById('heading');
    const subheading = document.getElementById('subheading');
    const footnote   = document.getElementById('footnote');

    let mode = 'signup';

    // ── Render ───────────────────────────────────────────────
    function render() {
      const s = mode === 'signup';
      heading.textContent    = s ? 'Create your account' : 'Welcome back';
      subheading.textContent = s ? 'Start your Mandarin journey today 🐼' : 'Good to see you again — keep the streak alive!';
      btnLabel.textContent   = s ? 'Create Account' : 'Log In';
      footnote.innerHTML     = s
        ? 'Already have an account? <a href="#" id="fn-link" class="text-[#3ecf6e] font-semibold hover:underline">Log in</a>'
        : 'No account yet? <a href="#" id="fn-link" class="text-[#3ecf6e] font-semibold hover:underline">Sign up free</a>';

      tabSignup.className = `relative flex-1 h-9 rounded-[10px] text-sm font-bold transition-all duration-200 ${s ? 'tab-active' : 'tab-inactive'}`;
      tabLogin.className  = `relative flex-1 h-9 rounded-[10px] text-sm font-bold transition-all duration-200 ${!s ? 'tab-active' : 'tab-inactive'}`;

      clearMsg();

      document.getElementById('fn-link')?.addEventListener('click', e => {
        e.preventDefault();
        switchMode(s ? 'login' : 'signup');
      });
    }

    // ── Mode switch ─────────────────────────────────────────
    window.switchMode = function(m) {
      if (m === mode) return;
      mode = m;
      render();
    };

    // ── Password toggle ─────────────────────────────────────
    let pwVisible = false;
    window.togglePassword = function() {
      pwVisible = !pwVisible;
      pwEl.type = pwVisible ? 'text' : 'password';
      document.getElementById('toggle-pw').textContent = pwVisible ? '🙈' : '👁';
    };

    // ── Messages ────────────────────────────────────────────
    function showMsg(type, text) {
      msgBox.className = `rounded-xl px-4 py-3 text-sm font-medium leading-snug flex items-start gap-2 ${
        type === 'error'
          ? 'bg-red-50 text-red-600 border border-red-200'
          : 'bg-green-light text-[#166534] border border-[#bbf7d0]'
      }`;
      msgBox.innerHTML = `<span>${type === 'error' ? '⚠️' : '✅'}</span><span>${text}</span>`;
      msgBox.classList.remove('hidden');
    }
    function clearMsg() {
      msgBox.classList.add('hidden');
      msgBox.innerHTML = '';
    }

    // ── Loading ─────────────────────────────────────────────
    function setLoading(on) {
      btnSubmit.disabled = on;
      btnLabel.style.opacity  = on ? '0' : '1';
      btnSpinner.classList.toggle('hidden', !on);
    }

    // ── Clear error on input ────────────────────────────────
    [emailEl, pwEl].forEach(el => el.addEventListener('input', () => {
      if (!msgBox.classList.contains('hidden') && msgBox.querySelector('span:first-child')?.textContent === '⚠️') clearMsg();
    }));

    // ── Submit ───────────────────────────────────────────────
    form.addEventListener('submit', async e => {
      e.preventDefault();
      clearMsg();

      const email    = emailEl.value.trim();
      const password = pwEl.value;

      if (!email || !password)    { showMsg('error', 'Please fill in all fields.');                return; }
      if (password.length < 6)    { showMsg('error', 'Password must be at least 6 characters.');   return; }

      setLoading(true);

      try {
        if (mode === 'signup') {
          // 1. Create account
          const { data: signUpData, error: signUpErr } = await supabase.auth.signUp({ email, password });
          if (signUpErr) throw signUpErr;

          // 2. Immediately sign in (bypasses email confirmation UX)
          const { data: loginData, error: loginErr } = await supabase.auth.signInWithPassword({ email, password });
          if (loginErr) throw loginErr;

          const user = loginData.user;

          // 3. Upsert profile
          if (user) {
            await supabase.from('profiles').upsert({
              id:       user.id,
              email:    user.email,
              username: user.email.split('@')[0],
            });
          }

          showMsg('success', 'Account created successfully! Redirecting...');
          setTimeout(() => { window.location.href = DASHBOARD; }, 1000);

        } else {
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          showMsg('success', 'Logged in! Redirecting...');
          setTimeout(() => { window.location.href = DASHBOARD; }, 800);
        }

      } catch (err) {
        setLoading(false);
        const m = err?.message || '';
        if      (m.includes('Invalid login'))  showMsg('error', 'Invalid email or password.');
        else if (m.includes('already'))        showMsg('error', 'An account with this email already exists.');
        else if (m.includes('rate'))           showMsg('error', 'Too many attempts. Please wait a moment.');
        else                                   showMsg('error', m || 'Something went wrong. Please try again.');
      }
    });

    // ── Check existing session ───────────────────────────────
    supabase.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = DASHBOARD;
    });

    // ── Init ─────────────────────────────────────────────────
    render();
  </script>

</body>
</html>
```
