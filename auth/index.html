<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maobai — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #3ecf6e;
      --green-dark: #2db85a;
      --green-light: #d4f7e3;
      --green-glow: rgba(62, 207, 110, 0.25);
      --bg: #f6fdf9;
      --card: #ffffff;
      --text: #1a2e24;
      --muted: #6b8f79;
      --border: #d6ede2;
      --error: #ff4d6d;
      --error-bg: #fff0f3;
      --shadow-sm: 0 2px 8px rgba(62, 207, 110, 0.08);
      --shadow-md: 0 8px 32px rgba(62, 207, 110, 0.14);
      --shadow-lg: 0 20px 60px rgba(62, 207, 110, 0.18);
      --radius: 22px;
      --radius-sm: 14px;
      --radius-xs: 10px;
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      font-family: 'Nunito Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(62, 207, 110, 0.13) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(62, 207, 110, 0.08) 0%, transparent 60%);
    }

    /* ─── LANGUAGE BAR ─── */
    .lang-bar {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 6px;
      z-index: 100;
    }

    .lang-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 5px 13px;
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
      letter-spacing: 0.3px;
    }

    .lang-btn:hover {
      border-color: var(--green);
      color: var(--green-dark);
    }

    .lang-btn.active {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      box-shadow: 0 2px 10px var(--green-glow);
    }

    /* ─── CARD ─── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 40px 36px 36px;
      border: 1px solid rgba(62, 207, 110, 0.12);
      animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── LOGO ─── */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: var(--green-light);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px var(--green-glow);
      flex-shrink: 0;
      border: 2px solid rgba(62,207,110,0.25);
    }

    .logo-icon svg {
      width: 32px;
      height: 32px;
    }

    .logo-text {
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--green);
    }

    /* ─── HEADER ─── */
    .card-title {
      font-family: 'Nunito', sans-serif;
      font-size: 26px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 28px;
    }

    /* ─── TOGGLE ─── */
    .toggle-wrap {
      display: flex;
      background: #f0faf4;
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 28px;
      border: 1.5px solid var(--border);
    }

    .toggle-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: var(--muted);
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0.1px;
    }

    .toggle-btn.active {
      background: var(--card);
      color: var(--green-dark);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* ─── FORM ─── */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 7px;
      letter-spacing: 0.1px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .input-icon svg {
      width: 17px;
      height: 17px;
    }

    .form-input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xs);
      background: #f9fdfb;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: var(--transition);
    }

    .form-input::placeholder {
      color: #b0ccc0;
    }

    .form-input:focus {
      border-color: var(--green);
      background: #fff;
      box-shadow: 0 0 0 3.5px var(--green-glow);
    }

    /* ─── BUTTON ─── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius-xs);
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      transition: var(--transition);
      letter-spacing: 0.2px;
      box-shadow: 0 4px 16px var(--green-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--green-dark);
      box-shadow: 0 6px 22px rgba(62, 207, 110, 0.35);
      transform: translateY(-1px);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* ─── SPINNER ─── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-primary.loading .spinner { display: block; }
    .btn-primary.loading .btn-label { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── MESSAGES ─── */
    .msg {
      border-radius: var(--radius-xs);
      padding: 12px 14px;
      font-size: 13.5px;
      font-weight: 600;
      margin-top: 14px;
      display: none;
      align-items: flex-start;
      gap: 9px;
      line-height: 1.4;
    }

    .msg.visible { display: flex; animation: msgIn 0.25s ease forwards; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.error { background: var(--error-bg); color: var(--error); border: 1px solid rgba(255,77,109,0.2); }
    .msg.success { background: var(--green-light); color: var(--green-dark); border: 1px solid rgba(62,207,110,0.3); }

    .msg svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ─── FOOTER ─── */
    .card-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-footer a {
      color: var(--green-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .card-footer a:hover { text-decoration: underline; }

    /* ─── DIVIDER ─── */
    .divider {
      border: none;
      border-top: 1.5px solid var(--border);
      margin: 22px 0;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 480px) {
      .card { padding: 32px 22px 28px; }
      .card-title { font-size: 22px; }
      .lang-bar { top: 12px; right: 12px; }
      .lang-btn { padding: 4px 10px; font-size: 11px; }
    }
  </style>
</head>
<body>

  <!-- Language Selector -->
  <div class="lang-bar">
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" data-lang="tk" onclick="setLang('tk')">TK</button>
  </div>

  <!-- Auth Card -->
  <div class="card">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <!-- Panda face SVG -->
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Left ear (black) -->
          <ellipse cx="13" cy="16" rx="8" ry="8" fill="#1a1a1a"/>
          <!-- Right ear (black) -->
          <ellipse cx="51" cy="16" rx="8" ry="8" fill="#1a1a1a"/>
          <!-- Face (white) -->
          <ellipse cx="32" cy="36" rx="22" ry="20" fill="#ffffff"/>
          <!-- Left eye patch (black) -->
          <ellipse cx="22" cy="30" rx="7" ry="6" fill="#1a1a1a"/>
          <!-- Right eye patch (black) -->
          <ellipse cx="42" cy="30" rx="7" ry="6" fill="#1a1a1a"/>
          <!-- Left eye (white) -->
          <ellipse cx="22" cy="30" rx="4" ry="4" fill="#ffffff"/>
          <!-- Right eye (white) -->
          <ellipse cx="42" cy="30" rx="4" ry="4" fill="#ffffff"/>
          <!-- Left pupil -->
          <ellipse cx="23" cy="31" rx="2" ry="2.5" fill="#1a1a1a"/>
          <!-- Right pupil -->
          <ellipse cx="43" cy="31" rx="2" ry="2.5" fill="#1a1a1a"/>
          <!-- Nose -->
          <ellipse cx="32" cy="39" rx="4" ry="2.5" fill="#1a1a1a"/>
          <!-- Mouth -->
          <path d="M27 43 Q32 48 37 43" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          <!-- Cheek blush left -->
          <ellipse cx="17" cy="42" rx="4" ry="2.5" fill="#ffb3c6" opacity="0.5"/>
          <!-- Cheek blush right -->
          <ellipse cx="47" cy="42" rx="4" ry="2.5" fill="#ffb3c6" opacity="0.5"/>
        </svg>
      </div>
      <div class="logo-text">Mao<span>bai</span></div>
    </div>

    <!-- Title -->
    <h1 class="card-title" id="ui-title">Welcome back 👋</h1>
    <p class="card-subtitle" id="ui-subtitle">Sign in to continue your learning journey.</p>

    <!-- Toggle -->
    <div class="toggle-wrap">
      <button class="toggle-btn active" id="btn-login" onclick="setMode('login')" data-key="login">Log In</button>
      <button class="toggle-btn" id="btn-signup" onclick="setMode('signup')" data-key="signup">Sign Up</button>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label" for="input-email" id="label-email">Email</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
        <input class="form-input" type="email" id="input-email" autocomplete="email" placeholder="you@example.com" />
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label" for="input-password" id="label-password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input class="form-input" type="password" id="input-password" autocomplete="current-password" placeholder="••••••••" />
      </div>
    </div>

    <!-- Submit -->
    <button class="btn-primary" id="btn-submit" onclick="handleSubmit()">
      <span class="btn-label" id="ui-btn">Log In</span>
      <div class="spinner"></div>
    </button>

    <!-- Messages -->
    <div class="msg error" id="msg-error">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <span id="msg-error-text"></span>
    </div>
    <div class="msg success" id="msg-success">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <span id="msg-success-text"></span>
    </div>

    <hr class="divider" />

    <!-- Footer -->
    <div class="card-footer" id="ui-footer">
      By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
    </div>
  </div>

  <script>
    // ─── SUPABASE ───────────────────────────────────────────
    const SUPABASE_URL = 'https://cuiznbvvlqtwcoocehnd.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1aXpuYnZ2bHF0d2Nvb2NlaG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzI0NTUsImV4cCI6MjA4OTI0ODQ1NX0.QXAjvDdvih1ue1W8BaoqBfBr_fUJb9W5FYFZSC_JI8w';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─── TRANSLATIONS ────────────────────────────────────────
    const translations = {
      en: {
        titleLogin:  'Welcome back 👋',
        titleSignup: 'Create account 🌱',
        subtitleLogin:  'Sign in to continue your learning journey.',
        subtitleSignup: 'Join Maobai and start learning today.',
        login:  'Log In',
        signup: 'Sign Up',
        labelEmail:    'Email',
        labelPassword: 'Password',
        btnLogin:  'Log In',
        btnSignup: 'Sign Up',
        footer: 'By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.',
        successLogin:  'Logged in! Redirecting…',
        successSignup: 'Account created! Redirecting…',
        errFill:  'Please fill in all fields.',
        errShort: 'Password must be at least 6 characters.',
      },
      ru: {
        titleLogin:  'С возвращением 👋',
        titleSignup: 'Создать аккаунт 🌱',
        subtitleLogin:  'Войдите, чтобы продолжить обучение.',
        subtitleSignup: 'Присоединяйтесь к Maobai и начните учиться.',
        login:  'Войти',
        signup: 'Регистрация',
        labelEmail:    'Эл. почта',
        labelPassword: 'Пароль',
        btnLogin:  'Войти',
        btnSignup: 'Зарегистрироваться',
        footer: 'Продолжая, вы принимаете наши <a href="#">Условия</a> и <a href="#">Политику конфиденциальности</a>.',
        successLogin:  'Вход выполнен! Перенаправление…',
        successSignup: 'Аккаунт создан! Перенаправление…',
        errFill:  'Пожалуйста, заполните все поля.',
        errShort: 'Пароль должен быть не менее 6 символов.',
      },
      tk: {
        titleLogin:  'Hoş geldiňiz 👋',
        titleSignup: 'Hasap açmak 🌱',
        subtitleLogin:  'Öwrenmegi dowam etdirmek üçin giriň.',
        subtitleSignup: 'Maobai-a goşulyň we öwrenip başlaň.',
        login:  'Giriş',
        signup: 'Hasap açmak',
        labelEmail:    'E-poçta',
        labelPassword: 'Açar söz',
        btnLogin:  'Giriş yap',
        btnSignup: 'Hasap aç',
        footer: 'Dowam etmek bilen <a href="#">Şertleri</a> we <a href="#">Gizlinlik syýasatyny</a> kabul edýärsiňiz.',
        successLogin:  'Giriş edildi! Ugrukdyrylýar…',
        successSignup: 'Hasap döredildi! Ugrukdyrylýar…',
        errFill:  'Ähli meýdanlary dolduryň.',
        errShort: 'Açar söz azyndan 6 harpdan ybarat bolmaly.',
      },
    };

    // ─── STATE ───────────────────────────────────────────────
    let mode = 'login'; // 'login' | 'signup'
    let lang = localStorage.getItem('maobai_lang') || 'en';

    // ─── LANGUAGE ────────────────────────────────────────────
    function setLang(l) {
      lang = l;
      localStorage.setItem('maobai_lang', l);
      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === l);
      });
      renderUI();
    }

    function t(key) {
      return (translations[lang] || translations.en)[key] || '';
    }

    // ─── RENDER UI ───────────────────────────────────────────
    function renderUI() {
      const isLogin = mode === 'login';
      document.getElementById('ui-title').textContent    = isLogin ? t('titleLogin')    : t('titleSignup');
      document.getElementById('ui-subtitle').textContent = isLogin ? t('subtitleLogin') : t('subtitleSignup');
      document.getElementById('ui-btn').textContent      = isLogin ? t('btnLogin')      : t('btnSignup');
      document.getElementById('label-email').textContent    = t('labelEmail');
      document.getElementById('label-password').textContent = t('labelPassword');
      document.getElementById('btn-login').textContent  = t('login');
      document.getElementById('btn-signup').textContent = t('signup');
      document.getElementById('ui-footer').innerHTML = t('footer');
      clearMessages();
    }

    // ─── TOGGLE MODE ─────────────────────────────────────────
    function setMode(m) {
      mode = m;
      document.getElementById('btn-login').classList.toggle('active', m === 'login');
      document.getElementById('btn-signup').classList.toggle('active', m === 'signup');
      document.getElementById('input-email').value = '';
      document.getElementById('input-password').value = '';
      renderUI();
    }

    // ─── MESSAGES ────────────────────────────────────────────
    function showError(msg) {
      document.getElementById('msg-error-text').textContent = msg;
      document.getElementById('msg-error').classList.add('visible');
      document.getElementById('msg-success').classList.remove('visible');
    }

    function showSuccess(msg) {
      document.getElementById('msg-success-text').textContent = msg;
      document.getElementById('msg-success').classList.add('visible');
      document.getElementById('msg-error').classList.remove('visible');
    }

    function clearMessages() {
      document.getElementById('msg-error').classList.remove('visible');
      document.getElementById('msg-success').classList.remove('visible');
    }

    // ─── LOADING STATE ───────────────────────────────────────
    function setLoading(val) {
      const btn = document.getElementById('btn-submit');
      btn.disabled = val;
      btn.classList.toggle('loading', val);
    }

    // ─── SUBMIT ──────────────────────────────────────────────
    async function handleSubmit() {
      const email    = document.getElementById('input-email').value.trim();
      const password = document.getElementById('input-password').value;

      clearMessages();

      if (!email || !password) { showError(t('errFill')); return; }
      if (password.length < 6)  { showError(t('errShort')); return; }

      setLoading(true);

      try {
        if (mode === 'login') {
          await doLogin(email, password);
        } else {
          await doSignup(email, password);
        }
      } catch (err) {
        showError(err.message || 'Something went wrong.');
        setLoading(false);
      }
    }

    async function doLogin(email, password) {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      showSuccess(t('successLogin'));
      setTimeout(() => window.location.replace('/app/level.html'), 900);
    }

    async function doSignup(email, password) {
      // 1. Sign up (no email verification)
      const { data: signupData, error: signupError } = await sb.auth.signUp({
        email,
        password,
        options: { emailRedirectTo: null },
      });
      if (signupError) throw signupError;

      const userId = signupData?.user?.id;

      // 2. Immediately sign in
      const { error: loginError } = await sb.auth.signInWithPassword({ email, password });
      if (loginError) throw loginError;

      // 3. Create profile row (best-effort)
      if (userId) {
        await sb.from('profiles').upsert({ id: userId, email }, { onConflict: 'id' });
      }

      showSuccess(t('successSignup'));
      setTimeout(() => window.location.replace('/app/level.html'), 900);
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });

    // ─── INIT ────────────────────────────────────────────────
    setLang(lang);
  </script>
</body>
</html>
